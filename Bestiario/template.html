<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestiário — D&D 5e</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d0b0e;
  --bg2:#1a1520;
  --bg3:#241e2c;
  --fg:#e8dcc8;
  --fg2:#a89b8a;
  --accent:#d4a44a;
  --accent2:#e8c06a;
  --card:#1c1724;
  --border:#3a2f48;
  --cantrip:#8e44ad;
  --shadow:0 2px 12px rgba(0,0,0,0.5);
  --sidebar-w:280px;
}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--fg);
  font-family:'Lora',Georgia,serif;
  line-height:1.6;
  min-height:100vh;
}

header{
  background:linear-gradient(180deg,#1a0f25 0%,#0d0b0e 100%);
  border-bottom:2px solid var(--accent);
  padding:0 1rem;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  position:sticky;
  top:38px;
  z-index:100;
}

header h1{
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:1rem;
  color:var(--accent);
  letter-spacing:0.1em;
  text-transform:uppercase;
  text-shadow:0 0 20px rgba(212,164,74,0.3);
  white-space:nowrap;
  flex-shrink:0;
}

.module-nav{
  position:sticky;
  top:0;
  z-index:120;
  display:flex;
  justify-content:center;
  gap:0.35rem;
  padding:0.4rem 0.8rem 0.35rem;
  background:linear-gradient(180deg,rgba(13,11,14,0.98),rgba(26,15,37,0.96));
  border-bottom:1px solid var(--border);
  overflow-x:auto;
  box-shadow:0 8px 18px rgba(0,0,0,0.22);
}

.module-nav a{
  position:relative;
  flex:0 0 auto;
  padding:0.3rem 0.62rem 0.42rem;
  border:1px solid transparent;
  border-radius:0;
  color:var(--fg2);
  font-family:'Cinzel',serif;
  font-size:0.66rem;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  text-decoration:none;
  transition:color 0.2s, transform 0.2s;
}

.module-nav a:hover{
  color:var(--fg);
  transform:translateY(-1px);
}

.module-nav a.active{
  color:var(--accent2);
}

.module-nav a::after{
  content:"";
  position:absolute;
  left:0.55rem;
  right:0.55rem;
  bottom:0.08rem;
  height:2px;
  background:var(--accent);
  transform:scaleX(0);
  transform-origin:center;
  transition:transform 0.22s ease;
  box-shadow:0 0 10px rgba(212,164,74,0.35);
}

.module-nav a.active::after,
.module-nav a:hover::after{
  transform:scaleX(1);
}

body.d1-enter-left{animation:d1EnterLeft 0.22s ease-out both}
body.d1-enter-right{animation:d1EnterRight 0.22s ease-out both}
body.d1-exit-left{animation:d1ExitLeft 0.16s ease-in both}
body.d1-exit-right{animation:d1ExitRight 0.16s ease-in both}

@keyframes d1EnterLeft{
  from{opacity:0;transform:translateX(-18px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes d1EnterRight{
  from{opacity:0;transform:translateX(18px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes d1ExitLeft{
  to{opacity:0;transform:translateX(-18px)}
}
@keyframes d1ExitRight{
  to{opacity:0;transform:translateX(18px)}
}

#search-box{
  flex:1;
  max-width:500px;
  margin:0 auto;
  padding:0.4rem 0.8rem;
  font-size:0.9rem;
  font-family:'Lora',serif;
  background:var(--bg2);
  color:var(--fg);
  border:1px solid var(--border);
  border-radius:6px;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}

#search-box:focus{
  border-color:var(--accent);
  box-shadow:0 0 8px rgba(212,164,74,0.25);
}

#search-box::placeholder{color:var(--fg2);opacity:0.6}

.filter-toggle-btn{
  padding:0.35rem 0.7rem;
  font-size:0.85rem;
  font-family:'Cinzel',serif;
  font-weight:700;
  background:var(--bg3);
  color:var(--fg2);
  border:1px solid var(--border);
  border-radius:4px;
  cursor:pointer;
  transition:all 0.2s;
  white-space:nowrap;
  flex-shrink:0;
}

.filter-toggle-btn:hover{background:var(--border);color:var(--fg)}

.overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.6);
  z-index:200;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
}

.overlay.show{
  opacity:1;
  pointer-events:auto;
}

.sidebar{
  position:fixed;
  top:0;right:0;bottom:0;
  width:var(--sidebar-w);
  max-width:85vw;
  background:var(--bg2);
  border-left:2px solid var(--accent);
  z-index:300;
  transform:translateX(100%);
  transition:transform 0.3s ease;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

.sidebar.open{
  transform:translateX(0);
}

.sidebar-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0.8rem 1rem;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.sidebar-header h2{
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:0.95rem;
  color:var(--accent);
  letter-spacing:0.1em;
  text-transform:uppercase;
}

.sidebar-close{
  background:none;
  border:none;
  color:var(--fg2);
  font-size:1.2rem;
  cursor:pointer;
  padding:0.2rem 0.4rem;
  border-radius:4px;
  transition:all 0.2s;
}

.sidebar-close:hover{color:var(--fg);background:var(--bg3)}

.sidebar-body{
  padding:0.8rem 1rem;
  flex:1;
  overflow-y:auto;
}

.filter-section{
  margin-bottom:1rem;
}

.filter-section.collapsible .filter-section-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
}

.filter-section.collapsible .filter-section-title::after{
  content:"\25BE";
  color:var(--fg2);
  transition:transform 0.2s;
}

.filter-section.collapsible.collapsed .filter-section-title::after{
  transform:rotate(-90deg);
}

.filter-section.collapsible.collapsed .filter-section-body{
  display:none;
}

.filter-section-title{
  width:100%;
  background:none;
  border:0;
  border-bottom:1px solid var(--border);
  text-align:left;
  font-family:'Cinzel',serif;
  font-size:0.7rem;
  color:var(--fg2);
  text-transform:uppercase;
  letter-spacing:0.12em;
  margin-bottom:0.4rem;
  padding-bottom:0.3rem;
}

.type-filter-search{
  width:100%;
  margin-bottom:0.45rem;
  padding:0.35rem 0.55rem;
  font-size:0.78rem;
  font-family:'Lora',serif;
  background:var(--bg3);
  color:var(--fg);
  border:1px solid var(--border);
  border-radius:4px;
  outline:none;
}

.type-filter-search:focus{
  border-color:var(--accent);
  box-shadow:0 0 6px rgba(212,164,74,0.2);
}

.type-filter-search::placeholder{color:var(--fg2);opacity:0.65}

.filter-section-btns{
  display:flex;
  flex-wrap:wrap;
  gap:0.3rem;
}

.filter-section.collapsible .filter-section-btns{
  max-height:18rem;
  overflow:auto;
  padding-right:0.2rem;
}

.filter-btn{
  padding:0.25rem 0.55rem;
  font-size:0.75rem;
  font-family:'Lora',serif;
  background:var(--bg3);
  color:var(--fg2);
  border:1px solid var(--border);
  border-radius:4px;
  cursor:pointer;
  transition:all 0.2s;
  white-space:nowrap;
}

.filter-btn:hover{background:var(--border);color:var(--fg)}

.filter-btn.active{
  background:var(--accent);
  color:#1a0f25;
  border-color:var(--accent);
  font-weight:700;
}

.filter-btn.active-trick{
  background:var(--cantrip);
  color:#fff;
  border-color:var(--cantrip);
  font-weight:700;
}

#stats{
  text-align:center;
  font-size:0.75rem;
  color:var(--fg2);
  padding:0.3rem 1rem;
}

#monster-list{
  max-width:900px;
  margin:0 auto;
  padding:0 0.8rem 3rem;
  display:flex;
  flex-direction:column;
  gap:0.4rem;
}

.spell-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s;
}

.spell-card:hover{
  border-color:var(--accent);
  box-shadow:var(--shadow);
}

.spell-card.cantrip{border-left:3px solid var(--cantrip)}
.spell-card.leveled{border-left:3px solid var(--accent)}

.spell-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0.6rem 0.8rem;
  gap:0.5rem;
}

.spell-name{
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:0.95rem;
  color:var(--fg);
  flex:1;
}

.spell-meta{
  display:flex;
  gap:0.35rem;
  flex-shrink:0;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.badge{
  padding:0.1rem 0.4rem;
  font-size:0.65rem;
  font-family:'Cinzel',serif;
  font-weight:700;
  border-radius:3px;
  text-transform:uppercase;
  letter-spacing:0.05em;
}

.badge-level{
  background:rgba(212,164,74,0.15);
  color:var(--accent2);
  border:1px solid rgba(212,164,74,0.3);
}

.badge-cantrip{
  background:rgba(142,68,173,0.2);
  color:#bb6bd9;
  border:1px solid rgba(142,68,173,0.3);
}

.badge-school{
  background:rgba(52,152,219,0.12);
  color:#5dade2;
  border:1px solid rgba(52,152,219,0.25);
}

.badge-source{
  background:rgba(255,255,255,0.04);
  color:var(--fg2);
  border:1px solid var(--border);
}

.badge-nd{
  font-weight:700;
  font-size:0.65rem;
}

.icon-badge{
  min-width:1.45rem;
  text-align:center;
  font-size:0.78rem;
  line-height:1.2;
  background:rgba(212,164,74,0.12);
  color:var(--accent2);
  border:1px solid rgba(212,164,74,0.32);
}

.icon-badge.magic{
  background:rgba(142,68,173,0.2);
  color:#bb6bd9;
  border-color:rgba(142,68,173,0.3);
}

.spell-detail{
  display:none;
  padding:0 0.8rem 0.8rem;
  border-top:1px solid var(--border);
  margin-top:0;
}

.spell-card.open .spell-detail{
  display:block;
  padding-top:0.6rem;
}

.detail-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0.3rem 1rem;
  margin-bottom:0.6rem;
  font-size:0.82rem;
}

.detail-label{
  color:var(--fg2);
  font-size:0.7rem;
  text-transform:uppercase;
  letter-spacing:0.08em;
}

.detail-value{color:var(--fg)}

.ability-scores{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:0.4rem;
  margin-bottom:0.6rem;
  text-align:center;
}

.ability-score{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:4px;
  padding:0.35rem 0.2rem;
}

.ability-score-label{
  font-family:'Cinzel',serif;
  font-size:0.6rem;
  color:var(--fg2);
  text-transform:uppercase;
  letter-spacing:0.1em;
  margin-bottom:0.15rem;
}

.ability-score-value{
  font-size:1rem;
  font-weight:700;
  color:var(--fg);
}

.ability-score-mod{
  font-size:0.7rem;
  color:var(--accent2);
}

.spell-desc{
  font-size:0.85rem;
  color:var(--fg);
  line-height:1.7;
  margin-bottom:0.5rem;
  padding-top:0.4rem;
  border-top:1px dashed var(--border);
  overflow-x:auto;
}

.spell-desc p{margin:0 0 0.6em}
.spell-desc ul{
  margin:0 0 0.75em 1.1rem;
  padding:0;
}
.spell-desc li{margin:0.15rem 0}
.spell-desc .desc-block-title{
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:0.82rem;
  color:var(--accent);
  margin-top:0.6rem;
  margin-bottom:0.2rem;
  border-bottom:1px solid var(--border);
  padding-bottom:0.15rem;
}
.desc-table{
  width:100%;
  border-collapse:collapse;
  margin:0.4rem 0 0.8rem;
  font-size:0.8rem;
}
.desc-table th,
.desc-table td{
  border:1px solid var(--border);
  padding:0.28rem 0.4rem;
  vertical-align:top;
}
.desc-table th{
  color:var(--gold);
  background:rgba(212,164,74,0.08);
  text-align:left;
  text-transform:uppercase;
  font-size:0.7rem;
  letter-spacing:0.06em;
}
.desc-table td:first-child{
  width:5.5rem;
  white-space:nowrap;
  color:var(--fg2);
}

.spell-ref{
  font-size:0.75rem;
  color:var(--fg2);
  text-align:right;
}

.spell-ref span{
  background:var(--bg3);
  padding:0.15rem 0.5rem;
  border-radius:3px;
  border:1px solid var(--border);
}

.spell-classes{
  display:flex;
  gap:0.25rem;
  flex-wrap:wrap;
  margin-top:0.3rem;
}

.class-tag{
  font-size:0.65rem;
  padding:0.1rem 0.35rem;
  border-radius:3px;
  background:var(--bg2);
  color:var(--fg2);
  border:1px solid var(--border);
}

.class-tag.tag-Aberração{border-color:#9b59b6;color:#bb6bd9}
.class-tag.tag-Besta{border-color:#27ae60;color:#58d68d}
.class-tag.tag-Celestial{border-color:#f1c40f;color:#f7dc6f}
.class-tag.tag-Constructo{border-color:#95a5a6;color:#bdc3c7}
.class-tag.tag-Dragão{border-color:#e74c3c;color:#ec7063}
.class-tag.tag-Elemental{border-color:#3498db;color:#85c1e9}
.class-tag.tag-Fada{border-color:#2ecc71;color:#82e0aa}
.class-tag.tag-Fiend{border-color:#c0392b;color:#e74c3c}
.class-tag.tag-Gigante{border-color:#e67e22;color:#f0b27a}
.class-tag.tag-Humanoide{border-color:#1abc9c;color:#76d7c4}
.class-tag.tag-Monstruosidade{border-color:#d35400;color:#e67e22}
.class-tag.tag-Morto-vivo{border-color:#7f8c8d;color:#aab7b8}
.class-tag.tag-Planta{border-color:#229954;color:#52be80}
.class-tag.tag-Slime{border-color:#8e44ad;color:#bb6bd9}

#no-results{
  display:none;
  text-align:center;
  padding:3rem 1rem;
  color:var(--fg2);
}

#no-results .icon{font-size:3rem;margin-bottom:0.5rem}

footer{
  text-align:center;
  padding:1.5rem;
  font-size:0.75rem;
  color:var(--fg2);
  opacity:0.5;
  border-top:1px solid var(--border);
}

.expand-arrow{
  transition:transform 0.2s;
  color:var(--fg2);
  font-size:0.8rem;
}

.spell-card.open .expand-arrow{transform:rotate(90deg)}

.hidden{display:none!important}

@media(max-width:600px){
  header{
    gap:0.5rem;
    padding:0 0.5rem;
  }
  header h1{
    font-size:0.8rem;
    letter-spacing:0.05em;
  }
  #search-box{
    font-size:0.8rem;
    padding:0.3rem 0.6rem;
  }
  .filter-toggle-btn{
    font-size:0.75rem;
    padding:0.3rem 0.5rem;
  }
  .module-nav{justify-content:flex-start}
  .spell-header{flex-direction:column;align-items:flex-start}
  .spell-meta{justify-content:flex-start}
  .detail-grid{grid-template-columns:1fr}
  .ability-scores{grid-template-columns:repeat(3,1fr)}
}

@media(min-width:901px){
  .spell-card:hover{transform:translateX(2px)}
}

@media(prefers-reduced-motion:reduce){
  body.d1-enter-left,
  body.d1-enter-right,
  body.d1-exit-left,
  body.d1-exit-right{animation:none}
  .module-nav a{transition:none}
  .module-nav a::after{transition:none}
}
</style>
</head>

<script>
(function(){
  const dir = sessionStorage.getItem('d1NavDirection');
  sessionStorage.removeItem('d1NavDirection');
  if(dir === 'left' || dir === 'right'){
    document.body.classList.add('d1-enter-' + dir);
  }

</script>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>&#x2699; Filtros</h2>
    <button class="sidebar-close" onclick="toggleSidebar()" title="Fechar filtros">&#x2715;</button>

  <div class="sidebar-body" id="filters"></div>
</div>

<header>
  <h1>&#x1F480; Bestiário</h1>
  <input type="text" id="search-box" placeholder="Buscar monstro por nome..." autocomplete="off" spellcheck="false">
  <button class="filter-toggle-btn" onclick="toggleSidebar()">&#x2630; Filtros</button>
</header>

<div id="stats"></div>

<div id="monster-list"></div>

  <div class="icon">&#x1F50D;</div>
  <p>Nenhum monstro encontrado.</p>
</div>

<footer>Bestiário D&D 5e &mdash; Consulta de Monstros e Criaturas em Português Brasileiro</footer>

<script>
const MONSTERS = __MONSTERS_DATA__;

const TIPOS_CRIATURA = [...new Set(MONSTERS.map(m => m.tipo_criatura).filter(Boolean))]
  .sort((a,b) => a.localeCompare(b,'pt-BR',{sensitivity:'base'}));
const TAMANHOS = ['Minúsculo','Pequeno','Médio','Grande','Enorme','Imenso'];
const ND_RANGES = [
  {label:'0',test:nd => nd === 0},
  {label:'1/8–1/4',test:nd => nd > 0 && nd < 0.5},
  {label:'1/2–1',test:nd => nd >= 0.5 && nd <= 1},
  {label:'2–4',test:nd => nd >= 2 && nd <= 4},
  {label:'5–10',test:nd => nd >= 5 && nd <= 10},
  {label:'11–16',test:nd => nd >= 11 && nd <= 16},
  {label:'17–21',test:nd => nd >= 17 && nd <= 21},
  {label:'22–25',test:nd => nd >= 22 && nd <= 25},
  {label:'26–30',test:nd => nd >= 26 && nd <= 30}
];
const ND_RANGE_LABELS = ND_RANGES.map(r => r.label);
const ALINHAMENTOS = [...new Set(MONSTERS.map(m => m.alinhamento).filter(Boolean))]
  .sort((a,b) => a.localeCompare(b,'pt-BR',{sensitivity:'base'}));
const FONTES = [...new Set(MONSTERS.map(m => m.fonte).filter(Boolean))]
  .sort((a,b) => a.localeCompare(b,'pt-BR',{sensitivity:'base'}));

let activeFilters = {tipo:new Set(),tamanho:new Set(),nd:new Set(),alinhamento:new Set(),fonte:new Set()};
let searchQuery = '';
let openItem = null;

function parseNd(ndStr){
  if(!ndStr) return 0;
  const s = String(ndStr).trim();
  if(s.includes('/')){
    const parts = s.split('/');
    return parseFloat(parts[0]) / parseFloat(parts[1]);
  }
  return parseFloat(s) || 0;
}

function buildFilters(){
  const container = document.getElementById('filters');
  addFilterSection(container,'Tipo','tipo',TIPOS_CRIATURA,{collapsible:true,collapsed:true,search:true});
  addFilterSection(container,'Tamanho','tamanho',TAMANHOS);
  addFilterSection(container,'ND','nd',ND_RANGE_LABELS);
  addFilterSection(container,'Alinhamento','alinhamento',ALINHAMENTOS,{collapsible:true,collapsed:true});
  addFilterSection(container,'Fonte','fonte',FONTES);
}

function addFilterSection(container,title,type,values,options = {}){
  const section = document.createElement('div');
  section.className = 'filter-section' + (options.collapsible ? ' collapsible' : '') + (options.collapsed ? ' collapsed' : '');
  const btnsId = 'btns-' + type;
  const titleHtml = options.collapsible
    ? '<button class="filter-section-title" type="button">'+title+'</button>'
    : '<div class="filter-section-title">'+title+'</div>';
  const searchPlaceholder = type === 'tipo' ? 'Filtrar tipos...' : 'Filtrar...';
  const searchHtml = options.search
    ? '<input class="type-filter-search" id="'+type+'-filter-search" type="search" placeholder="'+searchPlaceholder+'" autocomplete="off" spellcheck="false">'
    : '';
  section.innerHTML = titleHtml + '<div class="filter-section-body">'+searchHtml+'<div class="filter-section-btns" id="'+btnsId+'"></div></div>';
  container.appendChild(section);

  if(options.collapsible){
    section.querySelector('.filter-section-title').onclick = () => section.classList.toggle('collapsed');
  }
  if(options.search){
    section.querySelector('#'+type+'-filter-search').addEventListener('input', event => {
      const query = normalize(event.target.value);
      section.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('hidden', query && !normalize(btn.dataset.value).includes(query));
      });
    });
  }

  values.forEach(value => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = value;
    btn.dataset.filter = type;
    btn.dataset.value = value;
    btn.onclick = () => toggleFilter(type,value,btn);
    section.querySelector('#'+btnsId).appendChild(btn);
  });
}

function toggleFilter(type,value,btn){
  if(activeFilters[type].has(value)){
    activeFilters[type].delete(value);
    btn.classList.remove('active','active-trick');
  } else {
    activeFilters[type].add(value);
    btn.classList.add('active');
  }
  render();
}

function getFiltered(){
  return MONSTERS.filter(monster => {
    const haystack = [
      monster.nome,monster.tipo_criatura,monster.tamanho,monster.alinhamento,
      monster.ca,monster.pv,monster.pv_dados,monster.deslocamento,
      monster.testes_resistencia,monster.pericias,monster.resistencia_dano,monster.imunidade_dano,
      monster.imunidade_condicao,monster.sentidos,monster.idiomas,
      monster.nd,monster.xp,monster.fonte,monster.descricao,
      (monster.habilidades_especiais || []).join(' '),
      (monster.acoes || []).join(' '),
      (monster.acoes_lendarias || []).join(' '),
      (monster.reacoes || []).join(' ')
    ].join(' ').toLowerCase();

    if(searchQuery && !normalize(haystack).includes(searchQuery)) return false;

    if(activeFilters.tipo.size && !activeFilters.tipo.has(monster.tipo_criatura)) return false;
    if(activeFilters.tamanho.size && !activeFilters.tamanho.has(monster.tamanho)) return false;
    if(activeFilters.nd.size){
      const ndVal = parseNd(monster.nd);
      const matchesRange = [...activeFilters.nd].some(label => {
        const range = ND_RANGES.find(r => r.label === label);
        return range && range.test(ndVal);
      });
      if(!matchesRange) return false;
    }
    if(activeFilters.alinhamento.size && !activeFilters.alinhamento.has(monster.alinhamento)) return false;
    if(activeFilters.fonte.size && !activeFilters.fonte.has(monster.fonte)) return false;
    return true;
  }).sort((a,b) => {
    const ndA = parseNd(a.nd);
    const ndB = parseNd(b.nd);
    if(ndA !== ndB) return ndA - ndB;
    return a.nome.localeCompare(b.nome,'pt-BR',{sensitivity:'base'});
  });
}

function normalize(str){
  return String(str || '').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

function escHtml(str){
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function attr(str){
  return escHtml(str).replace(/"/g,'&quot;');
}

function ndColor(ndStr){
  const nd = parseNd(ndStr);
  if(nd <= 0) return {bg:'rgba(39,174,96,0.15)',fg:'#58d68d',border:'rgba(39,174,96,0.3)'};
  if(nd <= 0.25) return {bg:'rgba(46,204,113,0.15)',fg:'#82e0aa',border:'rgba(46,204,113,0.3)'};
  if(nd <= 1) return {bg:'rgba(116,185,36,0.15)',fg:'#a9d85e',border:'rgba(116,185,36,0.3)'};
  if(nd <= 4) return {bg:'rgba(241,196,15,0.15)',fg:'#f7dc6f',border:'rgba(241,196,15,0.3)'};
  if(nd <= 10) return {bg:'rgba(230,126,34,0.15)',fg:'#f0b27a',border:'rgba(230,126,34,0.3)'};
  if(nd <= 16) return {bg:'rgba(211,84,0,0.15)',fg:'#e67e22',border:'rgba(211,84,0,0.3)'};
  if(nd <= 21) return {bg:'rgba(192,57,43,0.15)',fg:'#e74c3c',border:'rgba(192,57,43,0.3)'};
  if(nd <= 25) return {bg:'rgba(142,68,173,0.18)',fg:'#bb6bd9',border:'rgba(142,68,173,0.35)'};
  return {bg:'rgba(120,40,40,0.2)',fg:'#ff4444',border:'rgba(180,40,40,0.4)'};
}

function tipoColor(tipo){
  const colors = {
    'Aberração':{bg:'rgba(155,89,182,0.12)',fg:'#bb6bd9',border:'rgba(155,89,182,0.25)'},
    'Besta':{bg:'rgba(39,174,96,0.12)',fg:'#58d68d',border:'rgba(39,174,96,0.25)'},
    'Celestial':{bg:'rgba(241,196,15,0.12)',fg:'#f7dc6f',border:'rgba(241,196,15,0.25)'},
    'Constructo':{bg:'rgba(149,165,166,0.12)',fg:'#bdc3c7',border:'rgba(149,165,166,0.25)'},
    'Dragão':{bg:'rgba(231,76,60,0.12)',fg:'#ec7063',border:'rgba(231,76,60,0.25)'},
    'Elemental':{bg:'rgba(52,152,219,0.12)',fg:'#85c1e9',border:'rgba(52,152,219,0.25)'},
    'Fada':{bg:'rgba(46,204,113,0.12)',fg:'#82e0aa',border:'rgba(46,204,113,0.25)'},
    'Fiend':{bg:'rgba(192,57,43,0.12)',fg:'#e74c3c',border:'rgba(192,57,43,0.25)'},
    'Gigante':{bg:'rgba(230,126,34,0.12)',fg:'#f0b27a',border:'rgba(230,126,34,0.25)'},
    'Humanoide':{bg:'rgba(26,188,156,0.12)',fg:'#76d7c4',border:'rgba(26,188,156,0.25)'},
    'Monstruosidade':{bg:'rgba(211,84,0,0.12)',fg:'#e67e22',border:'rgba(211,84,0,0.25)'},
    'Morto-vivo':{bg:'rgba(127,140,141,0.12)',fg:'#aab7b8',border:'rgba(127,140,141,0.25)'},
    'Planta':{bg:'rgba(34,153,84,0.12)',fg:'#52be80',border:'rgba(34,153,84,0.25)'},
    'Slime':{bg:'rgba(142,68,173,0.12)',fg:'#bb6bd9',border:'rgba(142,68,173,0.25)'}
  };
  return colors[tipo] || {bg:'rgba(212,164,74,0.12)',fg:'var(--accent2)',border:'rgba(212,164,74,0.3)'};
}

function sourceLabel(source){
  if(source === 'Manual dos Monstros') return 'MM';
  if(source === 'Livro do Jogador') return 'LJ';
  if(source === 'Guia do Mestre') return 'GM';
  return source;
}

function render(){
  const filtered = getFiltered();
  const list = document.getElementById('monster-list');
  const noRes = document.getElementById('no-results');
  const stats = document.getElementById('stats');
  stats.textContent = filtered.length + ' de ' + MONSTERS.length + ' monstros';

  if(!filtered.length){
    list.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  let html = '';
  for(const monster of filtered){
    const ndVal = parseNd(monster.nd);
    const isHighThreat = ndVal >= 17;
    const cls = isHighThreat ? 'cantrip' : 'leveled';
    const ndC = ndColor(monster.nd);
    const tipoC = tipoColor(monster.tipo_criatura);
    const ndDisplay = formatNd(monster.nd);
    const xpDisplay = monster.xp ? ' ('+escHtml(monster.xp)+' XP)' : '';
    const source = sourceLabel(monster.fonte);
    const detailRows = buildDetailRows(monster);
    const abilityScores = buildAbilityScores(monster);
    const loreSection = buildLore(monster);
    const descSection = buildDescription(monster);

    html += '<div class="spell-card '+cls+'" data-name="'+attr(monster.nome)+'" onclick="toggleItem(this)">' +
      '<div class="spell-header">' +
        '<span class="spell-name">'+escHtml(monster.nome)+'</span>' +
        '<div class="spell-meta">' +
          '<span class="badge badge-nd" style="background:'+ndC.bg+';color:'+ndC.fg+';border:1px solid '+ndC.border+'">ND '+escHtml(ndDisplay)+'</span>' +
          '<span class="badge" style="background:'+tipoC.bg+';color:'+tipoC.fg+';border:1px solid '+tipoC.border+'">'+escHtml(monster.tipo_criatura || '')+'</span>' +
          '<span class="badge badge-source">'+escHtml(monster.tamanho || '')+'</span>' +
          '<span class="badge badge-source" title="'+attr(monster.fonte)+'">'+escHtml(source)+'</span>' +
          '<span class="expand-arrow">&#x25B6;</span>' +
        '</div>' +
      '</div>' +
      '<div class="spell-detail">' +
        loreSection +
        '<div class="detail-grid">' + detailRows + '</div>' +
        abilityScores +
        descSection +
        '<div class="spell-ref"><span>&#x1F4D6; '+escHtml(monster.referencia || '')+'</span></div>' +
      '</div>' +
    '</div>';
  }
  list.innerHTML = html;
}

function formatNd(ndStr){
  if(!ndStr) return '—';
  const s = String(ndStr).trim();
  return s;
}

function buildDetailRows(monster){
  const ndDisplay = formatNd(monster.nd);
  const xpDisplay = monster.xp ? ndDisplay + ' (' + monster.xp + ' XP)' : ndDisplay;
  const rows = [
    ['Tipo', monster.tipo_criatura],
    ['Tamanho', monster.tamanho],
    ['Alinhamento', monster.alinhamento],
    ['CA', monster.ca],
    ['PV', monster.pv_dados ? monster.pv + ' (' + monster.pv_dados + ')' : monster.pv],
    ['Deslocamento', monster.deslocamento],
    ['ND (XP)', xpDisplay],
    ['Testes de Resistência', monster.testes_resistencia],
    ['Perícias', monster.pericias],
    ['Resistência a Dano', monster.resistencia_dano],
    ['Imunidade a Dano', monster.imunidade_dano],
    ['Imunidade a Condição', monster.imunidade_condicao],
    ['Sentidos', monster.sentidos],
    ['Idiomas', monster.idiomas],
    ['Fonte', monster.fonte]
  ].filter(([,value]) => value);

  return rows.map(([label,value]) =>
    '<div><span class="detail-label">'+escHtml(label)+'</span><br><span class="detail-value">'+escHtml(value)+'</span></div>'
  ).join('');
}

function buildAbilityScores(monster){
  if(!monster.habilidades) return '';
  const names = {FOR:'FOR',DES:'DES',CON:'CON',INT:'INT',SAB:'SAB',CAR:'CAR'};
  let html = '<div class="ability-scores">';
  for(const key of ['FOR','DES','CON','INT','SAB','CAR']){
    const ab = monster.habilidades[key];
    if(ab){
      html += '<div class="ability-score">' +
        '<div class="ability-score-label">'+escHtml(names[key])+'</div>' +
        '<div class="ability-score-value">'+escHtml(String(ab.valor))+'</div>' +
        '<div class="ability-score-mod">('+escHtml(String(ab.mod))+')</div>' +
      '</div>';
    }
  }
  html += '</div>';
  return html;
}

function buildLore(monster){
  if(!monster.descricao) return '';
  return '<div class="spell-desc monster-lore"><p>'+escHtml(monster.descricao)+'</p></div>';
}

function buildDescription(monster){
  let html = '';

  if(monster.habilidades_especiais && monster.habilidades_especiais.length){
    html += '<div class="spell-desc">';
    html += '<div class="desc-block-title">Habilidades Especiais</div>';
    monster.habilidades_especiais.forEach(text => {
      html += '<p>'+escHtml(text)+'</p>';
    });
    html += '</div>';
  }

  if(monster.acoes && monster.acoes.length){
    html += '<div class="spell-desc">';
    html += '<div class="desc-block-title">Ações</div>';
    monster.acoes.forEach(text => {
      html += '<p>'+escHtml(text)+'</p>';
    });
    html += '</div>';
  }

  if(monster.acoes_lendarias && monster.acoes_lendarias.length){
    html += '<div class="spell-desc">';
    html += '<div class="desc-block-title">Ações Lendárias</div>';
    monster.acoes_lendarias.forEach(text => {
      html += '<p>'+escHtml(text)+'</p>';
    });
    html += '</div>';
  }

  if(monster.reacoes && monster.reacoes.length){
    html += '<div class="spell-desc">';
    html += '<div class="desc-block-title">Reações</div>';
    monster.reacoes.forEach(text => {
      html += '<p>'+escHtml(text)+'</p>';
    });
    html += '</div>';
  }

  if(!html && monster.descricao_blocos && monster.descricao_blocos.length){
    html = '<div class="spell-desc">' + monster.descricao_blocos.map(block => {
      if(block.type === 'paragraph') return '<p>'+escHtml(block.text)+'</p>';
      if(block.type === 'list') return '<ul>'+block.items.map(v => '<li>'+escHtml(v)+'</li>').join('')+'</ul>';
      return '';
    }).join('') + '</div>';
  }

  return html;
}

function toggleItem(el){
  if(openItem && openItem !== el){
    openItem.classList.remove('open');
  }
  el.classList.toggle('open');
  openItem = el.classList.contains('open') ? el : null;
  if(openItem){
    setTimeout(() => {
      openItem.scrollIntoView({behavior:'smooth',block:'nearest'});
    }, 50);
  }
}

function toggleSidebar(){
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const isOpen = sidebar.classList.contains('open');
  if(isOpen){
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
  } else {
    sidebar.classList.add('open');
    overlay.classList.add('show');
  }
}

document.getElementById('search-box').addEventListener('input', function(){
  searchQuery = normalize(this.value.trim());
  openItem = null;
  render();
});

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    const sidebar = document.getElementById('sidebar');
    if(sidebar.classList.contains('open')){
      toggleSidebar();
    } else {
      document.getElementById('search-box').value = '';
      searchQuery = '';
      render();
    }
  }
  if(e.key === '/' && document.activeElement !== document.getElementById('search-box')){
    e.preventDefault();
    document.getElementById('search-box').focus();
  }
});

document.querySelectorAll('.module-nav a').forEach(link => {
  link.addEventListener('click', function(e){
    if(e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
    const href = this.getAttribute('href');
    if(!href || href === '#') return;
    const active = document.querySelector('.module-nav a.active');
    const current = Number(active ? active.dataset.order : 0);
    const next = Number(this.dataset.order);
    if(Number.isNaN(next) || next === current) return;
    e.preventDefault();
    const target = new URL(href, window.location.href).href;
    const exitDir = next > current ? 'left' : 'right';
    const enterDir = next > current ? 'right' : 'left';
    try{
      sessionStorage.setItem('d1NavDirection', enterDir);
      document.body.classList.add('d1-exit-' + exitDir);
      window.setTimeout(() => { window.location.href = target; }, 150);
    } catch(err){
      window.location.href = target;
    }
  });
});

buildFilters();
render();
</script>
</body>
</html>
