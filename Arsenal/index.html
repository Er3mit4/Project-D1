rabilidade","categoria":"Item mágico","tipo":"Armadura (placas)","fonte":"Guia do Mestre","pagina_livro":156,"pagina_pdf":157,"referencia":"156 (PDF: 157)","preco":null,"peso":null,"raridade":"rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver vestindo esta armadura, você tem resistência a um dos seguintes tipos de dano: concussão, perfurante ou cortante. O Mestre escolhe o tipo de dano ou o determina aleatoriamente. Maldição. Essa armadura é amaldiçoada, um fato que é revelado apenas quando a magia identificação é conjurada na armadura ou quando você se sintoniza com ela. Se sintonizar com a armadura amaldiçoa você até que você seja alvo da magia remover maldição ou uma mágica similar, já que remover a armadura falha em terminar a maldição. Enquanto estiver amaldiçoado, você tem vulnerabilidade à dois dos três tipos de dano associados com a armadura (não ao tipo que ela confere resistência).","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Armadura (placas), rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver vestindo esta armadura, você tem resistência a um dos seguintes tipos de dano: concussão, perfurante ou cortante. O Mestre escolhe o tipo de dano ou o determina aleatoriamente."},{"type":"paragraph","text":"Maldição. Essa armadura é amaldiçoada, um fato que é revelado apenas quando a magia identificação é conjurada na armadura ou quando você se sintoniza com ela. Se sintonizar com a armadura amaldiçoa você até que você seja alvo da magia remover maldição ou uma mágica similar, já que remover a armadura falha em terminar a maldição. Enquanto estiver amaldiçoado, você tem vulnerabilidade à dois dos três tipos de dano associados com a armadura (não ao tipo que ela confere resistência)."}]},{"id":"guia-do-mestre-item-magico-armadura-demoniaca","nome":"Armadura Demoníaca","categoria":"Item mágico","tipo":"Armadura (placas)","fonte":"Guia do Mestre","pagina_livro":156,"pagina_pdf":157,"referencia":"156 (PDF: 157)","preco":null,"peso":null,"raridade":"muito rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver vestindo esta armadura, você recebe +1 de bônus na CA e você pode compreender e falar Abissal. Além disso, as manoplas com garras da armadura tornam ataques desarmados com suas mãos em armas mágicas que causam dano cortante, com +1 de bônus nas jogadas de ataque e dano, e tem 1d8 como dado de dano. Maldição. Uma vez que você vista essa armadura amaldiçoada, você não poderá remove-la a não ser que seja alvo da magia remover maldição ou mágica similar. Enquanto estiver vestindo a armadura, você tem desvantagem nas jogadas de ataque contra demônios e nos testes de resistência contra as magias e habilidades especiais deles.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Armadura (placas), muito rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver vestindo esta armadura, você recebe +1 de bônus na CA e você pode compreender e falar Abissal. Além disso, as manoplas com garras da armadura tornam ataques desarmados com suas mãos em armas mágicas que causam dano cortante, com +1 de bônus nas jogadas de ataque e dano, e tem 1d8 como dado de dano."},{"type":"paragraph","text":"Maldição. Uma vez que você vista essa armadura amaldiçoada, você não poderá remove-la a não ser que seja alvo da magia remover maldição ou mágica similar. Enquanto estiver vestindo a armadura, você tem desvantagem nas jogadas de ataque contra demônios e nos testes de resistência contra as magias e habilidades especiais deles."}]},{"id":"guia-do-mestre-item-magico-armadura-do-marinheiro","nome":"Armadura do Marinheiro","categoria":"Item mágico","tipo":"Armadura (leve, média ou pesada)","fonte":"Guia do Mestre","pagina_livro":156,"pagina_pdf":157,"referencia":"156 (PDF: 157)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Enquanto estiver vestindo esta armadura, você tem deslocamento de natação igual ao seu deslocamento de caminhada. Além disso, sempre que você começar seu turno embaixo d'água com 0 pontos de vida, a armadura faz com que você emerja 9 metros para a superfície. A armadura é decorada com temas de peixes e corais.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Armadura (leve, média ou pesada), incomum","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver vestindo esta armadura, você tem deslocamento de natação igual ao seu deslocamento de caminhada. Além disso, sempre que você começar seu turno embaixo d'água com 0 pontos de vida, a armadura faz com que você emerja 9 metros para a superfície. A armadura é decorada com temas de peixes e corais."}]},{"id":"guia-do-mestre-item-magico-arremessador-anao","nome":"Arremessador Anão","categoria":"Item mágico","tipo":"Arma (martelo de guerra)","fonte":"Guia do Mestre","pagina_livro":156,"pagina_pdf":157,"referencia":"156 (PDF: 157)","preco":null,"peso":null,"raridade":"muito rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Ela possui a propriedade arremesso com uma distância normal de 6 metros e distância longa de 18 metros. Quando você atinge com um ataque à distância usando essa arma, ela causa 1d8 de dano extra ou, se o alvo for um gigante, 2d8 de dano. Imediatamente após o ataque, a arma volta para sua mão.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (martelo de guerra), muito rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Ela possui a propriedade arremesso com uma distância normal de 6 metros e distância longa de 18 metros. Quando você atinge com um ataque à distância usando essa arma, ela causa 1d8 de dano extra ou, se o alvo for um gigante, 2d8 de dano. Imediatamente após o ataque, a arma volta para sua mão."}]},{"id":"guia-do-mestre-item-magico-asas-voadoras","nome":"Asas Voadoras","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":157,"pagina_pdf":158,"referencia":"157 (PDF: 158)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto vestir esta capa, você pode usar uma ação para falar a palavra de comando dela. Isso torna a capa em um par de asas de morcego ou de pássaro nas suas costas por 1 hora, ou até você repetir a palavra de comando com uma ação. As asas concedem deslocamento de voo de 18 metros. Quando elas desaparecerem, você não poderá usa-las novamente por 1d12 horas.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto vestir esta capa, você pode usar uma ação para falar a palavra de comando dela. Isso torna a capa em um par de asas de morcego ou de pássaro nas suas costas por 1 hora, ou até você repetir a palavra de comando com uma ação. As asas concedem deslocamento de voo de 18 metros. Quando elas desaparecerem, você não poderá usa-las novamente por 1d12 horas."}]},{"id":"guia-do-mestre-item-magico-azagaia-de-relampago","nome":"Azagaia de Relâmpago","categoria":"Item mágico","tipo":"Arma (azagaia)","fonte":"Guia do Mestre","pagina_livro":157,"pagina_pdf":158,"referencia":"157 (PDF: 158)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta azagaia é uma arma mágica. Quando você a arremessa e fala sua palavra de comando, ela se transforma em u relâmpago, formando uma linha de 1,5 metro de espessura que se expande a até 36 metros de você. Cada criatura na linha, excluindo você e o alvo, deve realizar um teste de resistência de Destreza CD 13, sofrendo 4d6 de dano elétrico se fracassar na resistência, e metade desse dano se obtiver sucesso. O relâmpago volta a se transformar em uma azagaia quando alcança o alvo. Se atingir, o alvo sofre 4d6 de dano elétrico adicionais da azagaia. A propriedade da azagaia não pode ser usada novamente até o próximo amanhecer. Nesse meio período, a azagaia ainda pode ser usada como uma arma mágica.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (azagaia), incomum","descricao_blocos":[{"type":"paragraph","text":"Esta azagaia é uma arma mágica. Quando você a arremessa e fala sua palavra de comando, ela se transforma em u relâmpago, formando uma linha de 1,5 metro de espessura que se expande a até 36 metros de você. Cada criatura na linha, excluindo você e o alvo, deve realizar um teste de resistência de Destreza CD 13, sofrendo 4d6 de dano elétrico se fracassar na resistência, e metade desse dano se obtiver sucesso. O relâmpago volta a se transformar em uma azagaia quando alcança o alvo. Se atingir, o alvo sofre 4d6 de dano elétrico adicionais da azagaia."},{"type":"paragraph","text":"A propriedade da azagaia não pode ser usada novamente até o próximo amanhecer. Nesse meio período, a azagaia ainda pode ser usada como uma arma mágica."}]},{"id":"guia-do-mestre-item-magico-bacia-de-comandar-elementais-da-agua","nome":"Bacia de Comandar Elementais da Água","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":157,"pagina_pdf":158,"referencia":"157 (PDF: 158)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Enquanto esta bacia estiver cheia de água, você pode usar uma ação para falar a palavra de comando da bacia e invocar um elemental da água, como se você tivesse conjurado a magia conjurar elemental. A bacia não pode ser usada dessa forma novamente até o próximo amanhecer. A bacia tem aproximadamente 30 centímetros de diâmetro e metade disso de profundidade. Ela pesa 1,5 quilo e comporta aproximadamente 11 litros.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Enquanto esta bacia estiver cheia de água, você pode usar uma ação para falar a palavra de comando da bacia e invocar um elemental da água, como se você tivesse conjurado a magia conjurar elemental. A bacia não pode ser usada dessa forma novamente até o próximo amanhecer."},{"type":"paragraph","text":"A bacia tem aproximadamente 30 centímetros de diâmetro e metade disso de profundidade. Ela pesa 1,5 quilo e comporta aproximadamente 11 litros."}]},{"id":"guia-do-mestre-item-magico-baralho-das-ilusoes","nome":"Baralho das Ilusões","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":157,"pagina_pdf":158,"referencia":"157 (PDF: 158)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta caixa contém um conjunto cartas de pergaminho. Um baralho completo tem 34 cartas. Um baralho encontrado em um tesouro geralmente tem 1d20-1 cartas faltando. A magia deste baralho funciona apenas se cartas forem puxadas aleatoriamente (você pode usar um baralho de cartas alterado para simular esse baralho). Você pode usar uma ação para puxar uma carta aleatória do baralho e joga-la no chão num local a até 9 metros de você. Uma ilusão de uma ou mais criaturas se forma em cima da carta jogada e permanece até se dissipar. Uma criatura ilusória parece real, de tamanho apropriado, e age como se fosse uma criatura real (como apresentado no Manual dos Monstros), exceto por ela não poder causar qualquer mazela. Enquanto você estiver a até 36 metros da criatura ilusória e puder vê-la, você pode usar uma ação para move-la magicamente para qualquer lugar a até 9 metros da carta. Qualquer interação física com a criatura ilusória a revela como sendo uma ilusão, já que objetos passam através dela. Alguém que use uma ação para inspecionar visualmente a criatura, identificará ela como sendo ilusória com um teste de Inteligência (Investigação) CD 15. A criatura então, parecerá translucida. A ilusão dura até a carta ser movida ou a ilusão ser dissipada. Quando a ilusão terminar, a imagem na carta desaparece e esta carta não poderá ser usada novamente. Ás de copas Dragão vermelho Rei de copas Cavaleiro e quatro guardas Rainha de copas Súcubo ou íncubo Valete de copas Druida Dez de copas Gigante das nuvens Nove de copas Ettin Oito de copas Bugbear Dois de copas Goblin Ás de ouros Observador Rei de ouros Arquimago e arcano Rainha de ouros Bruxa da noite Valete de ouros Assassino Dez de ouros Gigante do fogo Nove de ouros Ogro mago Oito de ouros Gnoll Dois de ouros Kobold Ás de espadas Lich Rei de espadas Sacerdote e dois acólitos Rainha de espadas Medusa Valete de espadas Veterano Dez de espadas Gigante do gelo Nove de espadas Troll Oito de espadas Hobgoblin Dois de espadas Goblin Ás de paus Golem de ferro Rei de paus Capitão dos bandidos e três bandidos Rainha de paus Erínia Valete de paus Furioso Dez de paus Gigante da colina Nove de paus Ogro Oito de paus Orc Dois de paus Kobold Coringas (2) Você (o dono do baralho)","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Esta caixa contém um conjunto cartas de pergaminho. Um baralho completo tem 34 cartas. Um baralho encontrado em um tesouro geralmente tem 1d20-1 cartas faltando."},{"type":"paragraph","text":"A magia deste baralho funciona apenas se cartas forem puxadas aleatoriamente (você pode usar um baralho de cartas alterado para simular esse baralho). Você pode usar uma ação para puxar uma carta aleatória do baralho e joga-la no chão num local a até 9 metros de você."},{"type":"paragraph","text":"Uma ilusão de uma ou mais criaturas se forma em cima da carta jogada e permanece até se dissipar. Uma criatura ilusória parece real, de tamanho apropriado, e age como se fosse uma criatura real (como apresentado no Manual dos Monstros), exceto por ela não poder causar qualquer mazela. Enquanto você estiver a até 36 metros da criatura ilusória e puder vê-la, você pode usar uma ação para move-la magicamente para qualquer lugar a até 9 metros da carta."},{"type":"paragraph","text":"Qualquer interação física com a criatura ilusória a revela como sendo uma ilusão, já que objetos passam através dela. Alguém que use uma ação para inspecionar visualmente a criatura, identificará ela como sendo ilusória com um teste de Inteligência (Investigação) CD 15. A criatura então, parecerá translucida."},{"type":"paragraph","text":"A ilusão dura até a carta ser movida ou a ilusão ser dissipada. Quando a ilusão terminar, a imagem na carta desaparece e esta carta não poderá ser usada novamente."},{"type":"table","headers":["Carta Jogada","Ilusão"],"rows":[["Ás de copas","Dragão vermelho"],["Rei de copas","Cavaleiro e quatro guardas"],["Rainha de copas","Súcubo ou íncubo"],["Valete de copas","Druida"],["Dez de copas","Gigante das nuvens"],["Nove de copas","Ettin"],["Oito de copas","Bugbear"],["Dois de copas","Goblin"],["Ás de ouros","Observador"],["Rei de ouros","Arquimago e arcano"],["Rainha de ouros","Bruxa da noite"],["Valete de ouros","Assassino"],["Dez de ouros","Gigante do fogo"],["Nove de ouros","Ogro mago"],["Oito de ouros","Gnoll"],["Dois de ouros","Kobold"],["Ás de espadas","Lich"],["Rei de espadas","Sacerdote e dois acólitos"],["Rainha de espadas","Medusa"],["Valete de espadas","Veterano"],["Dez de espadas","Gigante do gelo"],["Nove de espadas","Troll"],["Oito de espadas","Hobgoblin"],["Dois de espadas","Goblin"],["Ás de paus","Golem de ferro"],["Rei de paus","Capitão dos bandidos e três bandidos"],["Rainha de paus","Erínia"],["Valete de paus","Furioso"],["Dez de paus","Gigante da colina"],["Nove de paus","Ogro"],["Oito de paus","Orc"],["Dois de paus","Kobold"],["Coringas (2)","Você (o dono do baralho)"]]}]},{"id":"guia-do-mestre-item-magico-baralho-das-surpresas","nome":"Baralho das Surpresas","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":157,"pagina_pdf":158,"referencia":"157 (PDF: 158)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Geralmente encontrado em uma caixa ou bolsa, este baralho contém uma quantidade de cartas feitas de marfim ou velino. A maioria (75 por cento) desses baralhos tem apenas treze cartas, mas o resto tem vinte e duas. Ás de ouros Vizir* Rei de ouros Sol Rainha de ouros Lua Valete de ouros Estrela Dois de ouros Cometa* Ás de copas As parcas* Rei de copas Trono Rainha de copas Chave Valete de copas Cavaleiro Dois de copas Gema* Ás de paus Garras* Rei de paus O Vácuo Rainha de paus Chamas Valete de paus Crânio Dois de paus Idiota* Ás de espadas Masmorra* Rei de espadas Ruína Rainha de espadas Euríale Valete de espadas Ladino Dois de espadas Balança* Coringa (vermelho) Tolo* Coringa (preto) Bufão *Encontrada apenas em um baralho com vinte e duas cartas. Antes de você puxar uma carta, você deve declarar quantas cartas você deseja puxar e então puxa-las aleatoriamente (você pode usar um baralho de cartas alterado para simular esse baralho). Quaisquer cartas puxadas além desse número não terão nenhum efeito. Do contrário, assim que você puxar uma carta do baralho, sua mágica surte efeito. Você deve puxar cada carta a não mais de 1 hora da carta anterior. Se você falhar em puxar a quantidade escolhida, as cartas restantes voam do baralho sozinhas e surtem efeito todas de uma vez. Uma vez puxada, uma carta desaparece da existência. A não ser que a carta seja o Tolo ou Bufão, a carta reaparecerá no baralho, tornando possível puxar a mesma carda duas vezes. As parcasAs parcas. O tecido da realidade se desemaranha e se tece novamente, permitindo que você evite ou apague um evento como se ele nunca tivesse acontecido. Você pode usar a mágica desta carta no momento em que você a puxa ou em qualquer outro momento, antes de você morrer. BalançaBalança. Sua mente sofre uma alteração dolorosa, fazendo sua tendência mudar. Leal se torna caótico, bom se torna mau e vice versa. Se você for neutro ou imparcial, esta carta não produz efeito sobre você. BufãoBufão. Você ganha 10.000 XP, ou você pode puxar duas cartas adicionais além das cartas declaradas. CavaleiroCavaleiro. Você adquire os serviços de um guerreiro de 4° nível que aparece em um espaço de sua escolha, a até 9 metros de você. O guerreiro tem a mesma raça que você e serve você lealmente até a morte, acreditando que o destino levou ele até você. Você controla esse personagem. ChamasChamas. Um poderoso diabo torna-se seu inimigo. O diabo busca arruinar e importunar sua vida, saboreando seu sofrimento antes de tentar matar você. Esta inimizade perdura até que ou você ou o diabo morra. ChaveChave. Uma arma mágica rara ou mais rara com a qual você seja proficiente aparece em suas mãos. O Mestre escolhe a arma. CometaCometa. Se você derrotar o próximo monstro ou grupo de monstros hostis que você encontrar, sozinho, você ganha pontos de experiência suficientes para ganhar um nível. Do contrário, esta carta não produz efeito. CrânioCrânio. Você invoca o avatar da morte-um esqueleto humanoide fantasmagórico vestido por uma mortalha negra e carregando uma foice espectral. Ele aparece em um espaço à escolha do Mestre a até 3 metros de você e te UMA QUESTÃO DE INIMIZADE Duas das cartas do baralho das surpresas podem atrair a um personagem a inimizade de outro ser. Com a carta das Chamas, a inimizade é evidente. O personagem deveria experimentar os esforços malévolos do diabo em diversas ocasiões. Buscar o corruptor não deveria ser uma tarefa simples e o aventureiro deveria se deparar com os aliados e seguidores do diabo algumas vezes antes de poder confronta-lo realmente. No caso da carta do Ladino, a inimizade é secreta e deveria vir de alguém que devia ser um amigo ou aliado. Como Mestre, você deveria aguardar por um momento dramaticamente apropriado para revelar esta inimizade, deixando o aventureiro adivinhar quem poderia se tornar um traidor. AVATAR DA MORTE Morto-vivo médio, neutro e mau Classe de Armadura 20 Pontos de Vida metade do máximo de pontos de vida do seu invocador Deslocamento 18 m, voo 18 m (planar) FOR DES CON SAB CAR INT 16 (+3) 16 (+3) 16 (+3) 16 (+3) 16 (+3) 16 (+3) Imunidade a Dano necrótico, veneno Imunidade a Condição amedrontado, enfeitiçado, envenenado, inconsciente, paralisado, petrificado Sentidos visão no escuro 18 m, visão verdadeira 18 m, Percepção passiva 13 Idiomas todos os idiomas conhecidos pelo seu invocador Nível de Desafio-(0 XP) Movimento Incorpóreo. O avatar pode se mover através de outras criaturas e objetos como se eles fossem terreno difícil. Ele sofre 5 (1d10) de dano de energia se terminar seu turno dentro de um objeto. Imunidade à Expulsão. O avatar é imune à características que possam expulsar mortos-vivos. AÇÕES Foice Ceifadora. O avatar passa sua foice espectral através de uma criatura a até 1,5 metro dele, causando 7 (1d8 + 3) de dano cortante mais 4 (1d8) de dano necrótico. ataca, avisando a todos os outros que você deve vencer essa batalha sozinho. O avatar luta até você morrer ou até ele chegar a 0 pontos de vida, quando ele desaparecerá. Se qualquer um tentar ajudar você, o ajudante invocará seu próprio avatar da morte. Uma criatura morta por um avatar da morte não pode voltar a vida. EstrelaEstrela. Aumente um dos seus valores de habilidade em 2. O valor pode exceder 20, mas não pode passar de 24. EuríaleEuríale. A visão similar à medusa desta carta amaldiçoa você. Você sofre-2 de penalidade nos testes de resistência enquanto estiver amaldiçoado dessa forma. Apenas um deus ou a mágica da carta As Parcas pode terminar essa maldição.Garras. Cada item mágico que você esteja vestindo ou carregando é desintegrado. Artefatos em sua posse não são destruídos, mas desaparecem. GemaGema. Vinte e cinto peças de joalheria valendo 2.000 po cada ou quinze gemas valendo 1.000 po cada aparecem aos seus pés. IdiotaIdiota. Permanentemente reduza sua Inteligência em 1d4 +1 (até o valor mínimo de 1). Você pode puxar uma carta adicional além de suas cartas declaradas. LuaLua. Você é agraciado com a habilidade de conjurar a magia desejo 1d3 vezes. LadinoLadino. Um personagem do mestre, à escolha do Mestre, torna-se hostil a você. A identidade do seu novo inimigo não é conhecida até que o PdM ou alguém mais a revele. Nada além da magia desejo ou de intervenção divina pode terminar a hostilidade do PdM contra você. MasmorraMasmorra. Você desaparece e fica aprisionado em um estado de animação suspensa em uma esfera extradimensional. Tudo que você estava vestindo ou carregando fica para trás no espaço que você ocupava quando desapareceu. Você permanece aprisionado até que v ocê seja encontrado e removido da esfera. Você não pode ser localizado por qualquer magia de adivinhação, mas a magia desejo pode revelar a localização da sua prisão. Você não puxa mais cartas. RuínaRuína. Todas as riquezas que você carrega ou possui, diferente de itens mágicos, são perdidas. Propriedades portáteis desaparecem. Negócios, imóveis e terras que você possuía são perdidas de uma forma que altera a própria realidade. Qualquer documentação que prove que você deveria ser dono de qualquer coisa é perdida por esta carta também desaparece. SolSol. Você ganha 50.000 XP e um item maravilhoso (o qual o Mestre determina aleatoriamente) aparece em suas mãos. ToloTolo. Você perde 10.000 XP, descarte esta carta e puxa outra carta do baralho, contando ambas as puxadas com o um das suas cartas declaradas. Se essa perda de XP faria você perder um nível, você perde uma quantidade que deixaria você com XP suficiente para manter o nível. TronoTrono. Você ganha proficiência na perícia Persuasão e dobra o bônus de proficiência em testes feitos com esta perícia. Além disso, você ganha direito de posse de um pequeno forte em algum lugar do mundo. Porém, o forte está atualmente em posse de monstros, o qual você deve limpar antes de poder clamar como seu. O VácuoO Vácuo. Esta carta negra trás o desastre. Sua alma é sugada de seu corpo e levada a um objeto em um lugar à escolha do Mestre. Um ou mais seres poderosos guardam o local. Enquanto sua alma estiver aprisionada dessa forma, seu corpo está incapacitado. A magia desejo não pode restaurar sua alma, mas revela o local do objeto que contém ela. Você não puxa mais cartas. VizirVizir. A qualquer momento que você escolha dentro de um ano da puxada desta carta, você pode fazer uma pergunta em meditação e mentalmente receber uma resposta verdadeira a essa pergunta. Além da informação, a resposta ajuda você a resolver um problema intrigante ou outro dilema. Em outras palavras, o conhecimento vem com a forma de como aplica-lo.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, lendário","descricao_blocos":[{"type":"paragraph","text":"Geralmente encontrado em uma caixa ou bolsa, este baralho contém uma quantidade de cartas feitas de marfim ou velino. A maioria (75 por cento) desses baralhos tem apenas treze cartas, mas o resto tem vinte e duas."},{"type":"table","headers":["Carta Jogada","Carta"],"rows":[["Ás de ouros","Vizir*"],["Rei de ouros","Sol"],["Rainha de ouros","Lua"],["Valete de ouros","Estrela"],["Dois de ouros","Cometa*"],["Ás de copas","As parcas*"],["Rei de copas","Trono"],["Rainha de copas","Chave"],["Valete de copas","Cavaleiro"],["Dois de copas","Gema*"],["Ás de paus","Garras*"],["Rei de paus","O Vácuo"],["Rainha de paus","Chamas"],["Valete de paus","Crânio"],["Dois de paus","Idiota*"],["Ás de espadas","Masmorra*"],["Rei de espadas","Ruína"],["Rainha de espadas","Euríale"],["Valete de espadas","Ladino"],["Dois de espadas","Balança*"],["Coringa (vermelho)","Tolo*"],["Coringa (preto)","Bufão"]]},{"type":"paragraph","text":"*Encontrada apenas em um baralho com vinte e duas cartas."},{"type":"paragraph","text":"Antes de você puxar uma carta, você deve declarar quantas cartas você deseja puxar e então puxa-las aleatoriamente (você pode usar um baralho de cartas alterado para simular esse baralho). Quaisquer cartas puxadas além desse número não terão nenhum efeito. Do contrário, assim que você puxar uma carta do baralho, sua mágica surte efeito. Você deve puxar cada carta a não mais de 1 hora da carta anterior. Se você falhar em puxar a quantidade escolhida, as cartas restantes voam do baralho sozinhas e surtem efeito todas de uma vez. Uma vez puxada, uma carta desaparece da existência. A não ser que a carta seja o Tolo ou Bufão, a carta reaparecerá no baralho, tornando possível puxar a mesma carda duas vezes."},{"type":"paragraph","text":"As parcasAs parcas. O tecido da realidade se desemaranha e se tece novamente, permitindo que você evite ou apague um evento como se ele nunca tivesse acontecido. Você pode usar a mágica desta carta no momento em que você a puxa ou em qualquer outro momento, antes de você morrer."},{"type":"paragraph","text":"BalançaBalança. Sua mente sofre uma alteração dolorosa, fazendo sua tendência mudar. Leal se torna caótico, bom se torna mau e vice versa. Se você for neutro ou imparcial, esta carta não produz efeito sobre você."},{"type":"paragraph","text":"BufãoBufão. Você ganha 10.000 XP, ou você pode puxar duas cartas adicionais além das cartas declaradas."},{"type":"paragraph","text":"CavaleiroCavaleiro. Você adquire os serviços de um guerreiro de 4° nível que aparece em um espaço de sua escolha, a até 9 metros de você. O guerreiro tem a mesma raça que você e serve você lealmente até a morte, acreditando que o destino levou ele até você. Você controla esse personagem."},{"type":"paragraph","text":"ChamasChamas. Um poderoso diabo torna-se seu inimigo. O diabo busca arruinar e importunar sua vida, saboreando seu sofrimento antes de tentar matar você. Esta inimizade perdura até que ou você ou o diabo morra."},{"type":"paragraph","text":"ChaveChave. Uma arma mágica rara ou mais rara com a qual você seja proficiente aparece em suas mãos. O Mestre escolhe a arma."},{"type":"paragraph","text":"CometaCometa. Se você derrotar o próximo monstro ou grupo de monstros hostis que você encontrar, sozinho, você ganha pontos de experiência suficientes para ganhar um nível. Do contrário, esta carta não produz efeito."},{"type":"paragraph","text":"CrânioCrânio. Você invoca o avatar da morte-um esqueleto humanoide fantasmagórico vestido por uma mortalha negra e carregando uma foice espectral. Ele aparece em um espaço à escolha do Mestre a até 3 metros de você e te UMA QUESTÃO DE INIMIZADE Duas das cartas do baralho das surpresas podem atrair a um personagem a inimizade de outro ser. Com a carta das Chamas, a inimizade é evidente. O personagem deveria experimentar os esforços malévolos do diabo em diversas ocasiões. Buscar o corruptor não deveria ser uma tarefa simples e o aventureiro deveria se deparar com os aliados e seguidores do diabo algumas vezes antes de poder confronta-lo realmente. No caso da carta do Ladino, a inimizade é secreta e deveria vir de alguém que devia ser um amigo ou aliado. Como Mestre, você deveria aguardar por um momento dramaticamente apropriado para revelar esta inimizade, deixando o aventureiro adivinhar quem poderia se tornar um traidor. AVATAR DA MORTE Morto-vivo médio, neutro e mau Classe de Armadura 20 Pontos de Vida metade do máximo de pontos de vida do seu invocador Deslocamento 18 m, voo 18 m (planar) FOR DES CON SAB CAR INT 16 (+3) 16 (+3) 16 (+3) 16 (+3) 16 (+3) 16 (+3) Imunidade a Dano necrótico, veneno Imunidade a Condição amedrontado, enfeitiçado, envenenado, inconsciente, paralisado, petrificado Sentidos visão no escuro 18 m, visão verdadeira 18 m, Percepção passiva 13 Idiomas todos os idiomas conhecidos pelo seu invocador Nível de Desafio-(0 XP) Movimento Incorpóreo. O avatar pode se mover através de outras criaturas e objetos como se eles fossem terreno difícil. Ele sofre 5 (1d10) de dano de energia se terminar seu turno dentro de um objeto. Imunidade à Expulsão. O avatar é imune à características que possam expulsar mortos-vivos. AÇÕES Foice Ceifadora. O avatar passa sua foice espectral através de uma criatura a até 1,5 metro dele, causando 7 (1d8 + 3) de dano cortante mais 4 (1d8) de dano necrótico. ataca, avisando a todos os outros que você deve vencer essa batalha sozinho. O avatar luta até você morrer ou até ele chegar a 0 pontos de vida, quando ele desaparecerá. Se qualquer um tentar ajudar você, o ajudante invocará seu próprio avatar da morte. Uma criatura morta por um avatar da morte não pode voltar a vida."},{"type":"paragraph","text":"EstrelaEstrela. Aumente um dos seus valores de habilidade em 2. O valor pode exceder 20, mas não pode passar de 24."},{"type":"paragraph","text":"EuríaleEuríale. A visão similar à medusa desta carta amaldiçoa você. Você sofre-2 de penalidade nos testes de resistência enquanto estiver amaldiçoado dessa forma. Apenas um deus ou a mágica da carta As Parcas pode terminar essa maldição.Garras. Cada item mágico que você esteja vestindo ou carregando é desintegrado. Artefatos em sua posse não são destruídos, mas desaparecem."},{"type":"paragraph","text":"GemaGema. Vinte e cinto peças de joalheria valendo 2.000 po cada ou quinze gemas valendo 1.000 po cada aparecem aos seus pés."},{"type":"paragraph","text":"IdiotaIdiota. Permanentemente reduza sua Inteligência em 1d4 +1 (até o valor mínimo de 1). Você pode puxar uma carta adicional além de suas cartas declaradas."},{"type":"paragraph","text":"LuaLua. Você é agraciado com a habilidade de conjurar a magia desejo 1d3 vezes."},{"type":"paragraph","text":"LadinoLadino. Um personagem do mestre, à escolha do Mestre, torna-se hostil a você. A identidade do seu novo inimigo não é conhecida até que o PdM ou alguém mais a revele. Nada além da magia desejo ou de intervenção divina pode terminar a hostilidade do PdM contra você."},{"type":"paragraph","text":"MasmorraMasmorra. Você desaparece e fica aprisionado em um estado de animação suspensa em uma esfera extradimensional. Tudo que você estava vestindo ou carregando fica para trás no espaço que você ocupava quando desapareceu. Você permanece aprisionado até que v ocê seja encontrado e removido da esfera. Você não pode ser localizado por qualquer magia de adivinhação, mas a magia desejo pode revelar a localização da sua prisão. Você não puxa mais cartas."},{"type":"paragraph","text":"RuínaRuína. Todas as riquezas que você carrega ou possui, diferente de itens mágicos, são perdidas. Propriedades portáteis desaparecem. Negócios, imóveis e terras que você possuía são perdidas de uma forma que altera a própria realidade. Qualquer documentação que prove que você deveria ser dono de qualquer coisa é perdida por esta carta também desaparece."},{"type":"paragraph","text":"SolSol. Você ganha 50.000 XP e um item maravilhoso (o qual o Mestre determina aleatoriamente) aparece em suas mãos."},{"type":"paragraph","text":"ToloTolo. Você perde 10.000 XP, descarte esta carta e puxa outra carta do baralho, contando ambas as puxadas com o um das suas cartas declaradas. Se essa perda de XP faria você perder um nível, você perde uma quantidade que deixaria você com XP suficiente para manter o nível."},{"type":"paragraph","text":"TronoTrono. Você ganha proficiência na perícia Persuasão e dobra o bônus de proficiência em testes feitos com esta perícia. Além disso, você ganha direito de posse de um pequeno forte em algum lugar do mundo. Porém, o forte está atualmente em posse de monstros, o qual você deve limpar antes de poder clamar como seu."},{"type":"paragraph","text":"O VácuoO Vácuo. Esta carta negra trás o desastre. Sua alma é sugada de seu corpo e levada a um objeto em um lugar à escolha do Mestre. Um ou mais seres poderosos guardam o local. Enquanto sua alma estiver aprisionada dessa forma, seu corpo está incapacitado. A magia desejo não pode restaurar sua alma, mas revela o local do objeto que contém ela. Você não puxa mais cartas."},{"type":"paragraph","text":"VizirVizir. A qualquer momento que você escolha dentro de um ano da puxada desta carta, você pode fazer uma pergunta em meditação e mentalmente receber uma resposta verdadeira a essa pergunta. Além da informação, a resposta ajuda você a resolver um problema intrigante ou outro dilema. Em outras palavras, o conhecimento vem com a forma de como aplica-lo."}]},{"id":"guia-do-mestre-item-magico-barco-dobravel","nome":"Barco Dobrável","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":160,"pagina_pdf":161,"referencia":"160 (PDF: 161)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este objeto parece uma caixa de madeira medindo 30 centímetros de comprimento, 15 centímetros de largura e 15 centímetros de profundidade. Ela pesa 2 quilos e flutua. Ela pode ser aberta para armazenar itens dentro. Esse item também tem três palavras de comando, cada uma requer que você use uma ação para fala-la. Uma palavra de comando faz com que a caixa se desdobre em um bote de 3 metros de comprimento, 1,2 metro de largura e 0,6 metro de profundidade. O bote tem um par de remos, uma âncora, um mastro e uma vela. O barco pode conter até quatro criaturas Médias confortavelmente. A segunda palavra de comando faz com que a caixa se desdobre em um barco de 7 metros de comprimento, 2,5 metros de largura e 2 metros de profundidade. O barco tem um deck, assentos de remo, cinto pares de remos, um remo direcional, uma âncora, uma cabine e um mastro com uma vela quadrada. O barco pode conter até quinze criaturas Médias confortavelmente. Quando a caixa se transforma em uma embarcação, ela adquire o peso de uma embarcação de tamanho correspondente e tudo que estava dentro da caixa permanece dentro do barco. A terceira palavra de comando faz com que o barco dobrável se dobre novamente em uma caixa, considerando que não haja criaturas a bordo. Quaisquer objetos na embarcação que não caiba dentro da caixa permanecerá fora da caixa quando ela se dobrar. Quaisquer objetos na embarcação que possa caber dentro da caixa, ficará nela.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Este objeto parece uma caixa de madeira medindo 30 centímetros de comprimento, 15 centímetros de largura e 15 centímetros de profundidade. Ela pesa 2 quilos e flutua. Ela pode ser aberta para armazenar itens dentro. Esse item também tem três palavras de comando, cada uma requer que você use uma ação para fala-la."},{"type":"paragraph","text":"Uma palavra de comando faz com que a caixa se desdobre em um bote de 3 metros de comprimento, 1,2 metro de largura e 0,6 metro de profundidade. O bote tem um par de remos, uma âncora, um mastro e uma vela. O barco pode conter até quatro criaturas Médias confortavelmente."},{"type":"paragraph","text":"A segunda palavra de comando faz com que a caixa se desdobre em um barco de 7 metros de comprimento, 2,5 metros de largura e 2 metros de profundidade. O barco tem um deck, assentos de remo, cinto pares de remos, um remo direcional, uma âncora, uma cabine e um mastro com uma vela quadrada. O barco pode conter até quinze criaturas Médias confortavelmente."},{"type":"paragraph","text":"Quando a caixa se transforma em uma embarcação, ela adquire o peso de uma embarcação de tamanho correspondente e tudo que estava dentro da caixa permanece dentro do barco."},{"type":"paragraph","text":"A terceira palavra de comando faz com que o barco dobrável se dobre novamente em uma caixa, considerando que não haja criaturas a bordo. Quaisquer objetos na embarcação que não caiba dentro da caixa permanecerá fora da caixa quando ela se dobrar. Quaisquer objetos na embarcação que possa caber dentro da caixa, ficará nela."}]},{"id":"guia-do-mestre-item-magico-bastao-de-absorcao","nome":"Bastão de Absorção","categoria":"Item mágico","tipo":"Bastão","fonte":"Guia do Mestre","pagina_livro":161,"pagina_pdf":162,"referencia":"161 (PDF: 162)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver empunhando este bastão, você pode usar sua reação para absorver uma magia que tenha você como único alvo e não tenha uma área de efeito. O efeito da magia absorvida é cancelado e a energia da magia-não a magia propriamente dita-é armazenada no bastão. A energia tem o mesmo nível da magia quando ela foi conjurada. O bastão pode absorver e armazenar até 50 níveis d energia no decorrer de sua existência. Uma vez que o bastão tenha absorvido 50 níveis de energia, ele não poderá mais absorver. Se você for alvo de uma magia que o bastão não possa armazenar, o bastão não surtirá efeito na magia. Quando se sintoniza ao bastão, você sabe quantos níveis de energia o bastão absorveu ao longo de sua existência e quantos níveis de energia mágica ele tem armazenado atualmente. Se você for um conjurador empunhando o bastão, você pode converter a energia armazenada em espaços de magia para conjurar magias que você tenha preparado ou conheça. Você pode criar espaços de magia apenas de um nível igual ou menor que os seus próprios espaços de magia, até o máximo de 5° nível. Você usa os níveis armazenados no lugar dos seus espaços, mas, no mais, conjura a magia como normal. Por exemplo, você pode usar 3 níveis armazenados no bastão como um espaço de magia de 3° nível. Um bastão encontrado recentemente tem 1d10 espaços de magia já armazenados nele. Um bastão que não puder mais absorver energia mágica e não tiver mais energia remanescente, se torna um item não-mágico.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Bastão, muito raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver empunhando este bastão, você pode usar sua reação para absorver uma magia que tenha você como único alvo e não tenha uma área de efeito. O efeito da magia absorvida é cancelado e a energia da magia-não a magia propriamente dita-é armazenada no bastão. A energia tem o mesmo nível da magia quando ela foi conjurada. O bastão pode absorver e armazenar até 50 níveis d energia no decorrer de sua existência. Uma vez que o bastão tenha absorvido 50 níveis de energia, ele não poderá mais absorver. Se você for alvo de uma magia que o bastão não possa armazenar, o bastão não surtirá efeito na magia."},{"type":"paragraph","text":"Quando se sintoniza ao bastão, você sabe quantos níveis de energia o bastão absorveu ao longo de sua existência e quantos níveis de energia mágica ele tem armazenado atualmente."},{"type":"paragraph","text":"Se você for um conjurador empunhando o bastão, você pode converter a energia armazenada em espaços de magia para conjurar magias que você tenha preparado ou conheça. Você pode criar espaços de magia apenas de um nível igual ou menor que os seus próprios espaços de magia, até o máximo de 5° nível. Você usa os níveis armazenados no lugar dos seus espaços, mas, no mais, conjura a magia como normal. Por exemplo, você pode usar 3 níveis armazenados no bastão como um espaço de magia de 3° nível."},{"type":"paragraph","text":"Um bastão encontrado recentemente tem 1d10 espaços de magia já armazenados nele. Um bastão que não puder mais absorver energia mágica e não tiver mais energia remanescente, se torna um item não-mágico."}]},{"id":"guia-do-mestre-item-magico-bastao-de-obediencia","nome":"Bastão de Obediência","categoria":"Item mágico","tipo":"Bastão","fonte":"Guia do Mestre","pagina_livro":161,"pagina_pdf":162,"referencia":"161 (PDF: 162)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você pode usar um ação para mostrar o bastão e comandar a obediência de cada criatura, à sua escolha, que você puder ver a até 36 metros de você. Cada alvo deve ser bem sucedido num teste de resistência de Sabedoria CD 15 ou ficará enfeitiçado por você por 8 horas. Enquanto estiver enfeitiçado dessa forma, a criatura reconhece você como seu líder absoluto. Se for ferido por você ou por um dos seus companheiros, ou comandado a fazer algo contrário a sua natureza, um alvo deixa de estar enfeitiçado dessa forma. O bastão não pode ser usado novamente até o próximo amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Bastão, raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Você pode usar um ação para mostrar o bastão e comandar a obediência de cada criatura, à sua escolha, que você puder ver a até 36 metros de você. Cada alvo deve ser bem sucedido num teste de resistência de Sabedoria CD 15 ou ficará enfeitiçado por você por 8 horas. Enquanto estiver enfeitiçado dessa forma, a criatura reconhece você como seu líder absoluto. Se for ferido por você ou por um dos seus companheiros, ou comandado a fazer algo contrário a sua natureza, um alvo deixa de estar enfeitiçado dessa forma. O bastão não pode ser usado novamente até o próximo amanhecer."}]},{"id":"guia-do-mestre-item-magico-bastao-de-prontidao","nome":"Bastão de Prontidão","categoria":"Item mágico","tipo":"Bastão","fonte":"Guia do Mestre","pagina_livro":161,"pagina_pdf":162,"referencia":"161 (PDF: 162)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este bastão possui uma cabeça flangeada e as seguintes propriedades. Prontidão. Enquanto empunhar o bastão, você tem vantagem em testes de Sabedoria (Percepção) e nas jogadas de iniciativa. Magias. Enquanto empunhar o bastão, você pode usar uma ação para conjurar uma das seguintes magias através dele: detectar o mal e bem, detectar magia, detectar veneno e doença ou ver o invisível. Aura Protetora. Com uma ação, você pode enfiar o cabo do bastão no solo, quando a cabeça do bastão emitirá luz plena num raio de 18 metros e penumbra por mais 18 metros adicionais. Enquanto estiver na luz plena, você e qualquer criatura que seja amigável a você ganham +1 de bônus na CA e nos testes de resistência e podem sentir a localização de criaturas invisíveis hostis que também estejam na luz plena. A cabeça do bastão para de brilhar e o efeito terminar após 10 minutos, ou quando uma criatura usar uma ação para arrancar o bastão do solo. Esta propriedade não pode ser usada novamente até o próximo amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Bastão, muito raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este bastão possui uma cabeça flangeada e as seguintes propriedades."},{"type":"paragraph","text":"Prontidão. Enquanto empunhar o bastão, você tem vantagem em testes de Sabedoria (Percepção) e nas jogadas de iniciativa."},{"type":"paragraph","text":"Magias. Enquanto empunhar o bastão, você pode usar uma ação para conjurar uma das seguintes magias através dele: detectar o mal e bem, detectar magia, detectar veneno e doença ou ver o invisível."},{"type":"paragraph","text":"Aura Protetora. Com uma ação, você pode enfiar o cabo do bastão no solo, quando a cabeça do bastão emitirá luz plena num raio de 18 metros e penumbra por mais 18 metros adicionais. Enquanto estiver na luz plena, você e qualquer criatura que seja amigável a você ganham +1 de bônus na CA e nos testes de resistência e podem sentir a localização de criaturas invisíveis hostis que também estejam na luz plena."},{"type":"paragraph","text":"A cabeça do bastão para de brilhar e o efeito terminar após 10 minutos, ou quando uma criatura usar uma ação para arrancar o bastão do solo. Esta propriedade não pode ser usada novamente até o próximo amanhecer."}]},{"id":"guia-do-mestre-item-magico-bastao-de-ressurreicao","nome":"Bastão de Ressurreição","categoria":"Item mágico","tipo":"Bastão","fonte":"Guia do Mestre","pagina_livro":162,"pagina_pdf":163,"referencia":"162 (PDF: 163)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este bastão tem 5 cargas. Enquanto estiver empunhando-o, você pode usar uma ação para conjurar uma das seguintes magias através dele: cura completa (gastando 1 carga) ou ressurreição (gastando 5 cargas). O bastão recupera 1 carga gasta diariamente ao amanhecer. Se o bastão for reduzido a 0 cargas, role um d20. Em um 1, o bastão desaparece em uma explosão radiante.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Bastão, lendário (requer sintonização com um clérigo, druida ou paladino)","descricao_blocos":[{"type":"paragraph","text":"Este bastão tem 5 cargas. Enquanto estiver empunhando-o, você pode usar uma ação para conjurar uma das seguintes magias através dele: cura completa (gastando 1 carga) ou ressurreição (gastando 5 cargas)."},{"type":"paragraph","text":"O bastão recupera 1 carga gasta diariamente ao amanhecer. Se o bastão for reduzido a 0 cargas, role um d20. Em um 1, o bastão desaparece em uma explosão radiante."}]},{"id":"guia-do-mestre-item-magico-bastao-de-seguranca","nome":"Bastão de Segurança","categoria":"Item mágico","tipo":"Bastão","fonte":"Guia do Mestre","pagina_livro":162,"pagina_pdf":163,"referencia":"162 (PDF: 163)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Enquanto estiver empunhando este bastão, você pode usar um ação para ativa-lo. O bastão então, instantaneamente transporta você e até 199 outras criaturas voluntárias que você possa ver, para um paraíso existente em um espaço extraplanar. Você escolhe a forma que o paraíso tem. Ele pode ser um jardim tranquilo, uma clareira adorável, uma taverna animada, um palácio imenso, uma ilha tropical, um carnaval fantástico ou qualquer outra coisa que você imagine. Independentemente de sua natureza, o paraíso contem água e comida suficiente para sustentar seus visitantes. Todo resto das coisas com que se pode interagir enquanto estiver dentro do espaço extraplanar só existe dentro dele. Por exemplo, uma flor retirada de um jardim no paraíso desaparece se for levada para fora do espaço extraplanar. Para cada hora gasta no paraíso, um visitante recupera pontos de vida como se tivesse gasto 1 Dado de Vida. As criaturas também não envelhecem enquanto estiverem no paraíso, apesar do tempo se passar normalmente. Os visitantes podem permanecer no paraíso por até 200 dias, divididos pela quantidade de criaturas presentes (arredondado para baixo). Quando o tempo acabar ou você usar uma ação para termina-lo, todos os visitantes reaparecem no local em que ocupavam quando o bastão foi ativado, ou no espaço desocupado mais próximo desse local. O bastão não pode ser usado novamente até que dez dias se passem.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Bastão, muito raro","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver empunhando este bastão, você pode usar um ação para ativa-lo. O bastão então, instantaneamente transporta você e até 199 outras criaturas voluntárias que você possa ver, para um paraíso existente em um espaço extraplanar. Você escolhe a forma que o paraíso tem. Ele pode ser um jardim tranquilo, uma clareira adorável, uma taverna animada, um palácio imenso, uma ilha tropical, um carnaval fantástico ou qualquer outra coisa que você imagine. Independentemente de sua natureza, o paraíso contem água e comida suficiente para sustentar seus visitantes. Todo resto das coisas com que se pode interagir enquanto estiver dentro do espaço extraplanar só existe dentro dele. Por exemplo, uma flor retirada de um jardim no paraíso desaparece se for levada para fora do espaço extraplanar."},{"type":"paragraph","text":"Para cada hora gasta no paraíso, um visitante recupera pontos de vida como se tivesse gasto 1 Dado de Vida. As criaturas também não envelhecem enquanto estiverem no paraíso, apesar do tempo se passar normalmente. Os visitantes podem permanecer no paraíso por até 200 dias, divididos pela quantidade de criaturas presentes (arredondado para baixo)."},{"type":"paragraph","text":"Quando o tempo acabar ou você usar uma ação para termina-lo, todos os visitantes reaparecem no local em que ocupavam quando o bastão foi ativado, ou no espaço desocupado mais próximo desse local. O bastão não pode ser usado novamente até que dez dias se passem."}]},{"id":"guia-do-mestre-item-magico-bastao-do-grande-poder","nome":"Bastão do Grande Poder","categoria":"Item mágico","tipo":"Bastão","fonte":"Guia do Mestre","pagina_livro":162,"pagina_pdf":163,"referencia":"162 (PDF: 163)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este bastão tem a cabeça flangeada e funciona como uma maça mágica que concede +3 de bônus nas jogadas de ataque e dano feitas com ela. O bastão tem propriedades associadas com seis botões diferentes que estão enfileirados ao longo do cabo. Ele tem três propriedades também, detalhadas abaixo. Seis Botões. Você pode pressionar um dos seis botões do bastão, com uma ação bônus. O efeito do botão dura até você pressionar um botão diferente ou até você puxar o mesmo botão novamente, o que faz o bastão reverter a sua forma normal. Se você pressionar o botão 1, o bastão se torna uma língua flamejante, quando uma lâmina incandescente emerge da ponta oposta a cabeça flangeada do bastão. Se você pressionar o botão 2, a cabeça flangeada do bastão se dobra e duas lâminas em forma de meia-lua emergem, transformando o bastão em um machado de batalha mágico que concede +3 de bônus nas jogadas de ataque e dano feitas com ele. Se você pressionar o botão 3, a cabeça flangeada do bastão se dobra, uma ponta de lança emerge da ponta do bastão e a empunhadura do bastão se alonga em um cabo de 1,8 metro, transformando o bastão em uma lança mágica que concede +3 de bônus nas jogadas de ataque e dano feitas com ela. Se você pressionar o botão 4, o bastão se transforma em uma vara de escalada de até 15 metros de comprimento, como você especificar. Em superfícies tão duras quanto o granito, um cravo no fundo e três ganchos no topo ancoram a vara. Barras horizontais de 7,5 centímetros de comprimento emergem dos lados, com 30 centímetros de distância entre si, formando uma escada. A vara pode suportar até 2.000 quilos. Mais peso ou a falta de uma superfície sólida para se prender, faz com que o bastão volte a forma normal. Se você pressionar o botão 5, o bastão se transforma em um aríete portátil que concede ao usuário +10 de bônus em testes de Força feitos para arrombar portas, barricadas e outras barreiras. Se você pressionar o botão 6, o bastão assume ou permanece em sua forma normal e indica o norte magnético. (Nada acontece caso esta função do bastão seja usada em um local que não possua um norte magnético.) O bastão também lhe dá conhecimento da sua profundeza aproximada no solo ou de sua altura em relação a ele. Drenar Vida. Quando você atinge uma criatura com um ataque corpo-a-corpo usando o bastão, você pode forçar o alvo a realizar um teste de resistência de Constituição CD 17. Se fracassar, o alvo sofre 4d6 de dano necrótico extra e você recupera uma quantidade de pontos de vida igual a metade desse dano necrótico. Esta propriedade não pode ser usada novamente até o próximo amanhecer. Paralisar. Quando você atinge uma criatura com um ataque corpo-a-corpo usando o bastão, você pode forçar o alvo a realizar um teste de resistência de Força CD 17. Se fracassar, o alvo fica paralisado por 1 minuto. O alvo pode repetir o teste de resistência no final de cada um dos turnos dele, terminando o efeito sobre si, com um sucesso. Esta propriedade não pode ser usada novamente até o próximo amanhecer. Aterrorizar. Enquanto empunhar o bastão, você pode usar uma ação para forçar cada criatura que você puder ver, a até 9 metros de você a realizar um teste de resistência de Sabedoria CD 17. Se fracassar, um alvo fica amedrontado em relação a você por 1 minuto. Um alvo amedrontado pode repetir o teste de resistência no final de cada um dos turnos dele, terminando o efeito sobre si, com um sucesso. Esta propriedade não pode ser usada novamente até o próximo amanhecer.","tabela":null,"proficiência_requerida":null, e até o próximo amanhecer."}]},{"id":"guia-do-mestre-item-magico-bastao-do-tentaculo","nome":"Bastão do Tentáculo","categoria":"Item mágico","tipo":"Bastão","fonte":"Guia do Mestre","pagina_livro":163,"pagina_pdf":164,"referencia":"163 (PDF: 164)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Feito pelos drow, este bastão é uma arma mágica que termina em três tentáculos borrachudos. Enquanto empunhar o bastão, você pode usar uma ação para direcionar cada tentáculo a atacar uma criatura que você possa ver, a até 4,5 metros de você. Cada tentáculo realiza uma jogada de ataque corpo-acorpo com +9 de bônus. Se atingir, o tentáculo causa 1d6 de dano de concussão. Se você atingir um alvo com os três tentáculos, ele deve realizar um teste de resistência de Constituição CD 15. Se fracassar, o deslocamento da criatura é reduzido à metade, ela tem desvantagem em testes de resistência de Destreza e não pode usar reações por 1 minuto. Além disso, em cada um dos turnos dela, ela só pode realizar uma ação ou uma ação bônus, mas não ambas. No final de cada um dos turnos dela, ela pode repetir o teste de resistência, terminado o efeito sobre si com um sucesso.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Bastão, raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Feito pelos drow, este bastão é uma arma mágica que termina em três tentáculos borrachudos. Enquanto empunhar o bastão, você pode usar uma ação para direcionar cada tentáculo a atacar uma criatura que você possa ver, a até 4,5 metros de você. Cada tentáculo realiza uma jogada de ataque corpo-acorpo com +9 de bônus. Se atingir, o tentáculo causa 1d6 de dano de concussão. Se você atingir um alvo com os três tentáculos, ele deve realizar um teste de resistência de Constituição CD 15. Se fracassar, o deslocamento da criatura é reduzido à metade, ela tem desvantagem em testes de resistência de Destreza e não pode usar reações por 1 minuto. Além disso, em cada um dos turnos dela, ela só pode realizar uma ação ou uma ação bônus, mas não ambas. No final de cada um dos turnos dela, ela pode repetir o teste de resistência, terminado o efeito sobre si com um sucesso."}]},{"id":"guia-do-mestre-item-magico-bastao-guardiao-de-pactos","nome":"Bastão Guardião de Pactos","categoria":"Item mágico","tipo":"Bastão","fonte":"Guia do Mestre","pagina_livro":163,"pagina_pdf":164,"referencia":"163 (PDF: 164)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto empunhar este bastão, você ganha um bônus nas jogadas de ataque com magia e na CD de resistência de suas magias de bruxo. O bônus é determinado pela raridade do bastão. Além disso, você pode recuperar um espaço de magia de bruxo, com uma ação, enquanto empunhar o bastão. Você não pode usar essa propriedade novamente até terminar um descanso longo.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Bastão, incomum (+1), raro (+2) ou muito raro (+3) (requer sintonização com um bruxo)","descricao_blocos":[{"type":"paragraph","text":"Enquanto empunhar este bastão, você ganha um bônus nas jogadas de ataque com magia e na CD de resistência de suas magias de bruxo. O bônus é determinado pela raridade do bastão."},{"type":"paragraph","text":"Além disso, você pode recuperar um espaço de magia de bruxo, com uma ação, enquanto empunhar o bastão. Você não pode usar essa propriedade novamente até terminar um descanso longo."}]},{"id":"guia-do-mestre-item-magico-bastao-imovel","nome":"Bastão Imóvel","categoria":"Item mágico","tipo":"Bastão","fonte":"Guia do Mestre","pagina_livro":163,"pagina_pdf":164,"referencia":"163 (PDF: 164)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este bastão liso de ferro possui um botão em uma extremidade. Você pode usar uma ação para apertar o botão, fazendo com que o bastão se fixe magicamente a um lugar. Até você ou outra criatura usar uma ação para apertar o botão novamente, o bastão não pode ser movido, mesmo que ele esteja desafiando a gravidade. O bastão pode suportar até 4.000 quilos de peso. Mais peso fará o bastão se desativar e cair. Uma criatura pode usar uma ação para fazer um teste de Força CD 30, movendo o bastão até 3 metros com um sucesso.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Bastão, incomum","descricao_blocos":[{"type":"paragraph","text":"Este bastão liso de ferro possui um botão em uma extremidade. Você pode usar uma ação para apertar o botão, fazendo com que o bastão se fixe magicamente a um lugar. Até você ou outra criatura usar uma ação para apertar o botão novamente, o bastão não pode ser movido, mesmo que ele esteja desafiando a gravidade. O bastão pode suportar até 4.000 quilos de peso. Mais peso fará o bastão se desativar e cair. Uma criatura pode usar uma ação para fazer um teste de Força CD 30, movendo o bastão até 3 metros com um sucesso."}]},{"id":"guia-do-mestre-item-magico-bola-de-cristal","nome":"Bola de Cristal","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":163,"pagina_pdf":164,"referencia":"163 (PDF: 164)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"A bola de cristal típica, um item muito raro, tem aproximadamente 15 centímetros de diâmetro. Enquanto estiver tocando-a, você pode conjurar a magia vidência (CD de resistência 17) através dela. As variações de bola de cristal a seguir são itens lendários e possuem propriedades adicionais. Bola de Cristal de Ler Mentes. Você pode usar uma ação para conjurar a magia detectar pensamentos (CD de resistência 17) enquanto estiver usando vidência com a bola de cristal, tendo como alvo as criaturas que você puder ver a até 9 metros do sensor da magia. Você não precisa se concentrar nessa detectar pensamentos para manter a duração dela, mas ela termina se a vidência terminar. Bola de Cristal de Telepatia. Enquanto estiver usando vidência com a bola de cristal, você pode se comunicar telepaticamente com criaturas que você possa ver a até 9 metros do sensor da magia. Você também pode usar uma ação para conjurar a magia sugestão (CD de resistência 17) através do sensor em uma dessas criaturas. Você não precisa se concentrar nessa sugestão para manter a duração, mas ela termina se a vidência terminar. Uma vez usado, o poder de sugestão da bola de cristal não pode ser usado novamente até o próximo amanhecer. Bola de Cristal de Visão da Verdade. Enquanto estiver usando vidência com a bola de cristal, você tem visão verdadeira com raio de 36 metros centrado no sensor da magia.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, muito raro ou lendário (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"A bola de cristal típica, um item muito raro, tem aproximadamente 15 centímetros de diâmetro. Enquanto estiver tocando-a, você pode conjurar a magia vidência (CD de resistência 17) através dela."},{"type":"paragraph","text":"As variações de bola de cristal a seguir são itens lendários e possuem propriedades adicionais."},{"type":"paragraph","text":"Bola de Cristal de Ler Mentes. Você pode usar uma ação para conjurar a magia detectar pensamentos (CD de resistência 17) enquanto estiver usando vidência com a bola de cristal, tendo como alvo as criaturas que você puder ver a até 9 metros do sensor da magia. Você não precisa se concentrar nessa detectar pensamentos para manter a duração dela, mas ela termina se a vidência terminar."},{"type":"paragraph","text":"Bola de Cristal de Telepatia. Enquanto estiver usando vidência com a bola de cristal, você pode se comunicar telepaticamente com criaturas que você possa ver a até 9 metros do sensor da magia. Você também pode usar uma ação para conjurar a magia sugestão (CD de resistência 17) através do sensor em uma dessas criaturas. Você não precisa se concentrar nessa sugestão para manter a duração, mas ela termina se a vidência terminar. Uma vez usado, o poder de sugestão da bola de cristal não pode ser usado novamente até o próximo amanhecer."},{"type":"paragraph","text":"Bola de Cristal de Visão da Verdade. Enquanto estiver usando vidência com a bola de cristal, você tem visão verdadeira com raio de 36 metros centrado no sensor da magia."}]},{"id":"guia-do-mestre-item-magico-bolsa-de-truques","nome":"Bolsa de Truques","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":163,"pagina_pdf":164,"referencia":"163 (PDF: 164)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta bolsa ordinária, feita de tecido cinza, ferrugem ou bronze, parece vazia. Procurando dentro dela, no entanto, revelará a presença de pequenos objetos felpudos. A bolsa pesa 250 gramas. Você pode usar uma ação para puxar um objeto felpudo da bolsa e arremessa-lo a até 6 metros. Quando o objeto toca o solo, ele se transforma em uma criatura que você determina rolando um d8 e consultando a tabela correspondente a cor da bolsa. Veja o Manual dos Monstros para as estatísticas da criatura. A criatura desaparece na próxima manhã ou quando for reduzido a 0 pontos de vida. A criatura é amigável a você e aos seus companheiros, e ela age no seu turno. Você pode usar uma ação bônus para comandar como a criatura se move e qual ação ela realiza no seu próximo turno, ou para dar ordens genéricas a ela, como para atacar seus inimigos. Na ausência de tais ordens, a criatura age de uma forma apropriada a sua natureza. Quando três objetos felpudos tiverem sido tirados da bolsa, ela não poderá ser usada novamente até o próximo amanhecer. 1 Chacal 2 Gorila 3 Babuíno 4 Bico de machado 5 Urso negro 6 Arminho gigante 7 Hiena gigante 8 Tigre 1 Arminho 2 Rato gigante 3 Texugo 4 Javali 5 Pantera 6 Texugo gigante 7 Lobo atroz 8 Alce gigante 1 Rato 2 Coruja 3 Mastim 4 Bode 5 Bode gigante 6 Javali gigante 7 Leão 8 Urso marrom","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Esta bolsa ordinária, feita de tecido cinza, ferrugem ou bronze, parece vazia. Procurando dentro dela, no entanto, revelará a presença de pequenos objetos felpudos. A bolsa pesa 250 gramas."},{"type":"paragraph","text":"Você pode usar uma ação para puxar um objeto felpudo da bolsa e arremessa-lo a até 6 metros. Quando o objeto toca o solo, ele se transforma em uma criatura que você determina rolando um d8 e consultando a tabela correspondente a cor da bolsa. Veja o Manual dos Monstros para as estatísticas da criatura. A criatura desaparece na próxima manhã ou quando for reduzido a 0 pontos de vida."},{"type":"paragraph","text":"A criatura é amigável a você e aos seus companheiros, e ela age no seu turno. Você pode usar uma ação bônus para comandar como a criatura se move e qual ação ela realiza no seu próximo turno, ou para dar ordens genéricas a ela, como para atacar seus inimigos. Na ausência de tais ordens, a criatura age de uma forma apropriada a sua natureza."},{"type":"paragraph","text":"Quando três objetos felpudos tiverem sido tirados da bolsa, ela não poderá ser usada novamente até o próximo amanhecer."},{"type":"table","headers":["d8","Bolsa de Truques Bronze"],"rows":[["1","Chacal"],["2","Gorila"],["3","Babuíno"],["4","Bico de machado"],["5","Urso negro"],["6","Arminho gigante"],["7","Hiena gigante"],["8","Tigre"]]},{"type":"table","headers":["d8","Bolsa de Truques Cinza"],"rows":[["1","Arminho"],["2","Rato gigante"],["3","Texugo"],["4","Javali"],["5","Pantera"],["6","Texugo gigante"],["7","Lobo atroz"],["8","Alce gigante"]]},{"type":"table","headers":["d8","Bolsa de Truques Ferrugem"],"rows":[["1","Rato"],["2","Coruja"],["3","Mastim"],["4","Bode"],["5","Bode gigante"],["6","Javali gigante"],["7","Leão"],["8","Urso marrom"]]}]},{"id":"guia-do-mestre-item-magico-bolsa-devoradora","nome":"Bolsa Devoradora","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":164,"pagina_pdf":165,"referencia":"164 (PDF: 165)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta bolsa lembra superficialmente uma mochila de carga, mas é um orifício alimentar de uma criatura extradimensional gigantesca. A criatura extradimensional ligada a bolsa pode sentir o que quer que seja colocado dentro da bolsa. Matéria animal ou vegetal colocada totalmente dentro da bolsa é devorada e perdida para sempre. Quando parte de uma criatura vida é colocada na bolsa, como acontece quando alguém tenta pegar algo dentro dela, existe 50 por cento de chance da criatura ser puxada para dentro da bolsa. Uma criatura dentro da bolsa pode usar sua ação para tentar escapar com um sucesso num teste de Força CD 15. Outra criatura pode usar sua ação para alcançar uma criatura dentro da bolsa e puxa-la, fazendo isso com um teste de Força CD 20 bem sucedido (considerando que ela não tenha sido puxada para dentro da bolsa antes). Qualquer criatura que comece seu turno dentro da bolsa é devorada e seu corpo é destruído. Objetos inanimados podem ser armazenados na bolsa, que pode comportar até 30 centímetros cúbicos de tal material. Porém, uma vez por dia, a bolsa engole quaisquer objetos dentro dela e os cospe em outro plano de existência. O Mestre determina aleatoriamente o momento e plano. Se a bolsa for perfurada ou rasgada, ela é destruída e qualquer coisa contida nela é transportada para um local aleatório no Plano Astral.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, muito raro","descricao_blocos":[{"type":"paragraph","text":"Esta bolsa lembra superficialmente uma mochila de carga, mas é um orifício alimentar de uma criatura extradimensional gigantesca."},{"type":"paragraph","text":"A criatura extradimensional ligada a bolsa pode sentir o que quer que seja colocado dentro da bolsa. Matéria animal ou vegetal colocada totalmente dentro da bolsa é devorada e perdida para sempre. Quando parte de uma criatura vida é colocada na bolsa, como acontece quando alguém tenta pegar algo dentro dela, existe 50 por cento de chance da criatura ser puxada para dentro da bolsa. Uma criatura dentro da bolsa pode usar sua ação para tentar escapar com um sucesso num teste de Força CD 15. Outra criatura pode usar sua ação para alcançar uma criatura dentro da bolsa e puxa-la, fazendo isso com um teste de Força CD 20 bem sucedido (considerando que ela não tenha sido puxada para dentro da bolsa antes). Qualquer criatura que comece seu turno dentro da bolsa é devorada e seu corpo é destruído."},{"type":"paragraph","text":"Objetos inanimados podem ser armazenados na bolsa, que pode comportar até 30 centímetros cúbicos de tal material. Porém, uma vez por dia, a bolsa engole quaisquer objetos dentro dela e os cospe em outro plano de existência. O Mestre determina aleatoriamente o momento e plano."},{"type":"paragraph","text":"Se a bolsa for perfurada ou rasgada, ela é destruída e qualquer coisa contida nela é transportada para um local aleatório no Plano Astral."}]},{"id":"guia-do-mestre-item-magico-botas-aladas","nome":"Botas Aladas","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":164,"pagina_pdf":165,"referencia":"164 (PDF: 165)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver calçando estas botas, você tem deslocamento de voo igual ao seu deslocamento de caminhada. Você pode usar as botas para voar até 4 horas, tudo de uma vez ou em diversos voos curtos, cada um usando, no mínimo, 1 minuto da duração. Se você estiver voando quando a duração acabar, você desce a uma taxa de 9 metros por rodada até aterrissar. As botas recuperam 2 horas da capacidade de voo para cada 12 horas que elas não tiverem sido usadas.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver calçando estas botas, você tem deslocamento de voo igual ao seu deslocamento de caminhada. Você pode usar as botas para voar até 4 horas, tudo de uma vez ou em diversos voos curtos, cada um usando, no mínimo, 1 minuto da duração. Se você estiver voando quando a duração acabar, você desce a uma taxa de 9 metros por rodada até aterrissar."},{"type":"paragraph","text":"As botas recuperam 2 horas da capacidade de voo para cada 12 horas que elas não tiverem sido usadas."}]},{"id":"guia-do-mestre-item-magico-botas-de-caminhar-e-saltar","nome":"Botas de Caminhar e Saltar","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":164,"pagina_pdf":165,"referencia":"164 (PDF: 165)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver calçando estas botas, seu deslocamento de caminhada torna-se 9 metros, a não
