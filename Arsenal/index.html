adin. Se você for um anão sintonizado com o machado, você ganha os seguintes benefícios: Você tem imunidade a dano de veneno. O alcance da sua visão no escuro aumenta em 18 metros. Você ganha proficiência com ferramentas de artesão relacionadas a ferraria, cervejaria e pedraria. Conjurar Elemental da Terra. Se você estiver empunhando o machado, você pode usar sua ação para conjurar a magia conjurar elemental através dele, invocando um elemental da terra. Você não pode usar esta propriedade novamente até o próximo amanhecer. Viajar pelas Profundezas. Você pode usar uma ação para tocar o machado em uma peça fixa de alvenaria anã e conjurar a magia teletransporte através dele. Caso seu destino intencional seja no subterrâneo, não existe chance de falha ou de ir para um lugar indesejado. Você não pode usar essa propriedade novamente até que 3 dias se passem. Maldição. O machado carrega uma maldição que afeta qualquer não-anão que se sintoniza com ele. Mesmo que a sintonização termina, a maldição persiste. A cada dia passado, a aparência física e estatura da criatura se torna mais parecida com a anã. Após sete dias, a criatura se parecerá com um anão típico, mas a criatura nem perde seus traços raciais nem adquire os de um anão. As mudanças físicas causadas pelo machado não são consideradas de natureza mágica (e, por isso, não podem ser dissipadas), mas elas podem ser desfeitas por qualquer efeito que remova uma maldição, como as magias restauração maior ou remover maldição. Destruindo o Machado. A única forma de destruir o machado é derrete-lo na Forja do Coração da Terra, onde ele foi criado. Ele deve permanecer na forja ardente por quinze anos, até finalmente sucumbir ao fogo e ser consumido.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (machado de batalha), artefato (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Vendo o risco que seu povo enfrentava, um jovem príncipe anão veio a crer que seu povo precisava de algo para uni-lo. Então, ele decidiu forjar uma arma que seria tal símbolo."},{"type":"paragraph","text":"Aventurando-se nas profundezas abaixo das montanhas, mais fundo que qualquer anão já havia ido, o jovem príncipe chegou ao coração ardente de um grande vulcão. Com a ajuda de Moradin, o deus anão da criação, ele primeiro construiu quatro grandes ferramentas: a Picareta Brutal, a Forja do Coração da Terra, a Bigorna das Canções e o Martelo Modelador. Com eles, ele forjou o Machado dos Lordes Anões."},{"type":"paragraph","text":"Armado com o artefato, o príncipe retornou aos clãs anões e trouxe paz. Seu machado acabou com rancores e respondeu as desavenças. Os clãs se tornaram aliados e afastaram seus inimigos, entrando numa era de prosperidade. Este jovem anão é lembrando como o Primeiro Rei. Quando ele envelheceu, passou a arma, que se tornou o emblema do cargo, ao seu herdeiro. Os herdeiros de direito passaram o machado a diante por muitas gerações."},{"type":"paragraph","text":"Posteriormente, em uma era de trevas marcada pela traição e maldade, o machado se perdeu em uma sangrenta guerra civil fomentada pela ganância por seu poder e pela posição que ele outorga. Séculos depois, os anões ainda procura pelo machado e muitos aventureiros fizeram carreira atrás de rumores e saqueando câmaras antigas para encontra-lo."},{"type":"paragraph","text":"Arma Mágica. O Machado dos Lordes Anões é uma arma mágica que concede +3 de bônus nas jogadas de ataque e dano feitas com ele. O machado também funciona como um cinto dos anões, um arremessador anão e uma espada decepadora."},{"type":"paragraph","text":"Propriedades Aleatórias. O machado tem as seguintes propriedades determinadas aleatoriamente:"},{"type":"list","items":["2 propriedades benéficas menores","1 propriedade benéfica maior","2 propriedades prejudiciais menores"]},{"type":"paragraph","text":"Bênçãos de Moradin. Se você for um anão sintonizado com o machado, você ganha os seguintes benefícios:"},{"type":"list","items":["Você tem imunidade a dano de veneno.","O alcance da sua visão no escuro aumenta em 18 metros.","Você ganha proficiência com ferramentas de artesão relacionadas a ferraria, cervejaria e pedraria."]},{"type":"paragraph","text":"Conjurar Elemental da Terra. Se você estiver empunhando o machado, você pode usar sua ação para conjurar a magia conjurar elemental através dele, invocando um elemental da terra. Você não pode usar esta propriedade novamente até o próximo amanhecer."},{"type":"paragraph","text":"Viajar pelas Profundezas. Você pode usar uma ação para tocar o machado em uma peça fixa de alvenaria anã e conjurar a magia teletransporte através dele. Caso seu destino intencional seja no subterrâneo, não existe chance de falha ou de ir para um lugar indesejado. Você não pode usar essa propriedade novamente até que 3 dias se passem."},{"type":"paragraph","text":"Maldição. O machado carrega uma maldição que afeta qualquer não-anão que se sintoniza com ele. Mesmo que a sintonização termina, a maldição persiste. A cada dia passado, a aparência física e estatura da criatura se torna mais parecida com a anã. Após sete dias, a criatura se parecerá com um anão típico, mas a criatura nem perde seus traços raciais nem adquire os de um anão. As mudanças físicas causadas pelo machado não são consideradas de natureza mágica (e, por isso, não podem ser dissipadas), mas elas podem ser desfeitas por qualquer efeito que remova uma maldição, como as magias restauração maior ou remover maldição."},{"type":"paragraph","text":"Destruindo o Machado. A única forma de destruir o machado é derrete-lo na Forja do Coração da Terra, onde ele foi criado. Ele deve permanecer na forja ardente por quinze anos, até finalmente sucumbir ao fogo e ser consumido."}]},{"id":"guia-do-mestre-item-magico-olho-e-mao-de-vecna","nome":"Olho e Mão de Vecna","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":226,"pagina_pdf":227,"referencia":"226 (PDF: 227)","preco":null,"peso":null,"raridade":"artefato","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Raramente o nome de Vecna é falado, exceto em voz baixa. Vecna foi, em seu tempo, um dos mais poderosos de todos os magos. Através de magia negra e conquista, ele forjou um terrível império. Mesmo com todo seu poder, Vecna não poderia escapar de sua própria mortalidade. Ele começou a temer a morte e trilhou um caminho para prevenir que seu fim chegasse. Orcus, o príncipe demônio dos mortos-vivos, ensinou a Vecna um ritual que permitiria que ele vivesse como um lich. Além da morte, ele se tornou o maior de todos os liches. Mesmo conforme seu corpo gradualmente murchava e apodrecia, Vecna continuou a expandir seu domínio maligno. De tão formidável e horrendo que era seu temperamento que seus subordinados temiam falar seu nome. Ele era O Sussurrado, o Mestre do Trono da Aranha, o Rei Imortal e o Senhor da Torre Apodrecida. Alguns dizem que o tenente de Vecna, Kas, cobiçou o Trono da Aranha para si, ou que a espada que seu senhor fez para ele o seduziu a se rebelar. Qualquer que seja a razão, Kas levou o governo do Rei Imortal ao fim em uma terrível batalha que deixou a torre de Vecna em uma pilha de cinzas. De Vecna, tudo que restou foram uma mão e um olho, artefatos macabros que ainda buscam servir à vontade do Sussurrado no mundo. O Olho de Vecna e a Mão de Vecna podem ser encontrados juntos ou separados. O olho parece um órgão avermelhado recém-arrancado da órbita. A mão é uma extremidade esquerda mumificada e atrofiada. Para se sintonizar com a mão, você deve arrancar seu próprio olho e empurrar o artefato contra a órbita vazia. O olho se enxerta sozinho a sua cabeça e permanece nela até você morrer. Uma vez colocado, o olho se transforma em um olho dourado com uma pupila fendada, similar à de um gato. Se o olho for removido, você morre. Para se sintonizar com a mão, você deve decepar sua mão esquerda até o pulso e apertar o artefato contra o cepo. A mão se enxerta sozinha ao seu braço e se torna um apêndice funcional. Se a mão for removida, você morre. Propriedades Aleatórias. O Olho de Vecna e a Mão de Vecna cada um, tem as seguintes propriedades aleatórias: 1 propriedade benéfica menor 1 propriedade benéfica maior 1 propriedade prejudicial menor Propriedades do Olho. Sua tendência muda para neutro e mau e você adquire os seguintes benefícios: Você tem visão verdadeira. Você pode usar uma ação para ver como se estivesse usando um anel de visão de raio-X. Você pode terminar o efeito com uma ação bônus. O olho tem 8 cargas. Você pode usar uma ação e gastar 1 ou mais cargas para conjurar uma das seguintes magias (CD de resistência 18) através dele: ataque visual (4 cargas), clarividência (2 cargas), coroa da loucura (1 carga), desintegrar (4 cargas) ou dominar monstro (5 cargas). O olho recupera 1d4 + 4 cargas gastas diariamente ao amanhecer. Cada vez que você c onjurar uma magia através do olho, existe 5 por cento de chance de Vecna arrancar sua alma do seu corpo, devora-la e então tomar controle do corpo como uma marionete. Se isso acontecer, você se torna um PdM sob controle do Mestre. Propriedades da Mão. Sua tendência muda para neutro e mau e você adquire os seguintes benefícios: Seu valor de Força se torna 20, a não ser que já seja 20 ou maior. Qualquer ataque corpo-acorpo com magia que você faça com a mão e qualquer ataque corpo-a-corpo com arma feito com uma arma empunhada pela mão causa 2d8 de dano de frio extra, se atingir. A mão tem 8 cargas. Você pode usar uma ação e gastar 1 ou mais cargas para conjurar uma das seguintes magias (CD de resistência 18) através dela: dedo da morte (5 cargas), lentidão (2 cargas), sono (1 carga) ou teletransporte (3 cargas). A mão recupera 1d4 + 4 cargas gastas diariamente ao amanhecer. Cada vez que você conjura uma magia através da mão, ela conjura a magia sugestão em você (CD de resistência 18), exigindo que você cometa um ato maligno. A mão deveria ter um ato específico em mente ou pode deixar que você decida. Propriedades do Olho e da Mão. Se você estiver sintonizado tanto com o olho quanto com a mão, você adquire os seguintes benefícios adicionais: Você é imune a doenças e veneno. Usar a visão de raio-X do olho nunca faz com que você sofra exaustão. Você experimenta premonições do perigo e, a não ser que esteja incapacitado, não pode ser surpreendido. Se você começar seu turno com pelo menos 1 ponto de vida, você recupera 1d10 pontos de vida. Se uma criatura tiver um esqueleto, você pode tentar transformar os ossos dela em geleia com um toque da Mão de Vecna. Você pode fazê-lo usando uma ação para realizar um ataque corpo-a-corpo contra uma criatura ao seu alcance, usando seu ataque corpo-acorpo com arma ou com magias, à sua escolha. Se atingir, o alvo deve ser bem sucedido num teste de resistência de Constituição CD 18, ou cairá a 0 pontos de vida. Você pode usar uma ação para conjurar desejo. Esta propriedade não pode ser usada novamente até que 30 dias se passem. Destruindo o Olho e a Mão. Se o Olho de Vecna e a Mão de Vecna estiverem ambos presos a mesma criatura e a criatura seja morta pela Espada de Kas, tanto o olho quanto a mão se entrarão em combustão, tornando-se cinzas e sendo destruídos para sempre. Qualquer outra tentativa de destruir o olho ou a mão parecem funcionar, mas os artefatos reaparecem em um dos muitos cofres escondidos de Vecna, onde aguardam para serem redescobertos.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, artefato (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Raramente o nome de Vecna é falado, exceto em voz baixa. Vecna foi, em seu tempo, um dos mais poderosos de todos os magos. Através de magia negra e conquista, ele forjou um terrível império. Mesmo com todo seu poder, Vecna não poderia escapar de sua própria mortalidade. Ele começou a temer a morte e trilhou um caminho para prevenir que seu fim chegasse."},{"type":"paragraph","text":"Orcus, o príncipe demônio dos mortos-vivos, ensinou a Vecna um ritual que permitiria que ele vivesse como um lich. Além da morte, ele se tornou o maior de todos os liches. Mesmo conforme seu corpo gradualmente murchava e apodrecia, Vecna continuou a expandir seu domínio maligno. De tão formidável e horrendo que era seu temperamento que seus subordinados temiam falar seu nome. Ele era O Sussurrado, o Mestre do Trono da Aranha, o Rei Imortal e o Senhor da Torre Apodrecida."},{"type":"paragraph","text":"Alguns dizem que o tenente de Vecna, Kas, cobiçou o Trono da Aranha para si, ou que a espada que seu senhor fez para ele o seduziu a se rebelar. Qualquer que seja a razão, Kas levou o governo do Rei Imortal ao fim em uma terrível batalha que deixou a torre de Vecna em uma pilha de cinzas. De Vecna, tudo que restou foram uma mão e um olho, artefatos macabros que ainda buscam servir à vontade do Sussurrado no mundo."},{"type":"paragraph","text":"O Olho de Vecna e a Mão de Vecna podem ser encontrados juntos ou separados. O olho parece um órgão avermelhado recém-arrancado da órbita. A mão é uma extremidade esquerda mumificada e atrofiada."},{"type":"paragraph","text":"Para se sintonizar com a mão, você deve arrancar seu próprio olho e empurrar o artefato contra a órbita vazia. O olho se enxerta sozinho a sua cabeça e permanece nela até você morrer. Uma vez colocado, o olho se transforma em um olho dourado com uma pupila fendada, similar à de um gato. Se o olho for removido, você morre."},{"type":"paragraph","text":"Para se sintonizar com a mão, você deve decepar sua mão esquerda até o pulso e apertar o artefato contra o cepo. A mão se enxerta sozinha ao seu braço e se torna um apêndice funcional. Se a mão for removida, você morre."},{"type":"  humanos travaram uma terrível guerra contra os dragões malignos. Quando o mundo parecia condenado, os magos da Torre da Alta Feitiçaria se uniram e fizeram sua maior mágica, forjando cinco Orbes dos Dragões (ou Orbes Dracônicas) para ajudar a derrotar os dragões. Uma orbe foi levada para cada uma das cinco torres e lá elas foram usadas para acelerar a guerra a um fim vitorioso. Os magos usaram as orbes para atrair os dragões até eles, então destruindo-os com mágica poderosa. Conforme as Torres da Alta Feitiçaria ruíram eras depois, as orbes foram destruídas ou sumiram nas lendas e se crê que apenas três sobreviveram. Sua magia foi moldada e distorcida pelos séculos, então, apesar do seu propósito primário de convocar dragões ainda funcionar, elas também permitem algum tipo de controle sobre os dragões. Cada orbe contém a essência de um dragão maligno, uma presença que se ofende com qualquer tentativa de persuadir a magia dela. Aqueles que não tenham força de personalidade podem acabar escravizados por uma orbe. Uma orbe é um globo de cristal gravado de 25 centímetros de diâmetro. Quando usado, ele cresce até aproximadamente 50 centímetros de diâmetro e uma névoa rodopia dentro dele. Enquanto estiver sintonizado com uma orbe, você pode usar uma ação para penetrar nas profundezas da orbe e falar sua palavra de comando. Você deve realizar um teste de Carisma CD 15. Se for bem sucedido, você controla a orbe pelo tempo que se mantiver sintonizado com ela. Se fracassar, você fica enfeitiçado pela orbe pelo tempo que ficar sintonizado com ela. Enquanto estiver enfeitiçado pela orbe, você não pode terminar a sintonização voluntariamente e a orbe conjura sugestão (CD de resistência 18) em você, à vontade, incitando você a trabalhar para os fins malignos que ela desejar. A essência do dragão dentro da orbe poderia querer muitas coisas: a aniquilação de um povo em particular, libertar-se da orbe, para levar sofrimento ao mundo, para promover a veneração de Takhisis (o nome de Tiamat em Krynn), ou outra coisa que o Mestre decidir. Propriedades Aleatórias. Uma Orbe dos Dragões tem as seguintes propriedades aleatórias: 2 propriedades benéficas menores 1 propriedade prejudicial menor 1 propriedade prejudicial maior Magias. A orbe tem 7 cargas e recupera 1d4 + 3 cargas gastas diariamente ao amanhecer. Se controlar a orbe, você pode usar uma ação para gastar 1 ou mais cargas para conjurar uma das magias a seguir (CD de res istência 18) através dela: curar ferimentos (versão de 5° nível, 3 cargas), luz do dia (1 carga), proteção contra a morte (2 cargas) ou vidência (3 cargas). Você também pode usar uma ação para conjurar a magia detectar magia através da orbe sem gastar qualquer carga. Convocar Dragões. Enquanto controlar a orbe, você pode usar uma ação para fazer o artefato emitir um chamado telepático que se estende em todas as direções por 60 quilômetros. Dragões malignos no alcance sentem-se compelidos a vir até a orbe o mais rápido possível pela rota mais direta. Divindades dracônicas, como Tiamat, não são afetadas pelo chamado. Dragões atraídos até a orbe podem ser hostis a você por obriga-los contra a vontade deles. Uma vez que tenha usado esta propriedade, ela não pode ser usada novamente por 1 hora. Destruindo uma Orbe. Uma Orbe dos Dragões parece frágil, mas é imune a maioria dos danos, incluindo a ataques e armas de sopro de dragões. A magia desintegrar ou um ataque bem dado de uma arma mágica +3 é suficiente para destruir a orbe, no entanto. OUTRAS RECOMPENSAS Tanto quanto desejam tesouros, aventureiros frequentemente apreciam outras formas de recompensas. Esta seção apresenta uma variedade de formas que os deuses, monarcas e outros seres poderosos podem reconhecer as realizações dos personagens, incluindo dons sobrenaturais que concedem aos personagens novas capacidades; títulos, terras e outras marcas de prestígio; e dádivas que estão disponíveis apenas para aventureiros que alcançaram o 20° nível. DONS SOBRENATURAIS Um dom sobrenatural é uma recompensa especial concedida por um ser ou força de grande poder mágico. Tais dons sobrenaturais vem em duas formas: bênçãos e fetiches. Uma bênção é normalmente outorgada por um deus ou ser de poderes divinos. Um fetiche é geralmente o trabalho de um espírito poderoso, um local de magia ancestral ou uma criatura que possui ações lendárias. Diferente de um item mágico, um dom sobrenatural não é um objeto e não requer sintonização. Ele dá ao personagem uma habilidade extraordinária que pode ser usada uma ou mais vezes. BÊNÇÃOS Um personagem deveria receber uma bênção de uma divindade por fazer algo realmente importante-uma realização que chame a atenção tanto dos deuses quanto dos mortais. Matar gnolls furiosos raramente garantiria tal bênção, mas matar o sumo sacerdote de Tiamat enquanto ele tentava invocar a Rainha Dragão deveria. Uma bênção é uma recompensa apropriada para uma das seguintes realizações: Restaurar o mais importante santuário de um deus Frustrar a trama avassaladora dos inimigos de um deus Ajudar o servo favorito de um deus a cumprir uma busca sagrada Um aventureiro também deveria receber uma bênção ao avançar em uma missão perigosa. Por exemplo, um paladino poderia receber uma após se empenhar em uma missão de matar um terrível lich que é responsável por uma praga mágica que está varrendo a terra. Um personagem deveria receber apenas uma bênção que seja útil a ele, e algumas bênçãos vem com expectativas por parte do benfeitor. Um deus geralmente concede uma bênção por um propósito particular, como recuperar os restos mortais de uma pessoa sagrada ou derrubar um império tirânico. O deus pode revogar uma bênção caso o personagem falhe em perseguir esse propósito ou aja contra ele. Um personagem mantém os benefícios de uma bênção para sempre ou até ela ser retirada pelo deus que a concedeu. Diferente de um item mágico, tal bênção não pode ser suprimida por um campo antimagia ou efeito similar. A maioria dos aventureiros passam toda a sua vida sem receber sequer uma dessas bênçãos. Não existe limite no número de bênção que um personagem pode receber, mas deveria ser raro para um personagem ter mais de uma por vez. Além disso, um personagem não pode se beneficiar por múltiplas instâncias de bênção ao mesmo tempo. Por exemplo, um personagem não pode receber o benefício de duas instâncias da Benção da Saúde de uma vez.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, artefato (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Há eras atrás, no mundo de Krynn, elfos e humanos travaram uma terrível guerra contra os dragões malignos. Quando o mundo parecia condenado, os magos da Torre da Alta Feitiçaria se uniram e fizeram sua maior mágica, forjando cinco Orbes dos Dragões (ou Orbes Dracônicas) para ajudar a derrotar os dragões. Uma orbe foi levada para cada uma das cinco torres e lá elas foram usadas para acelerar a guerra a um fim vitorioso. Os magos usaram as orbes para atrair os dragões até eles, então destruindo-os com mágica poderosa. Conforme as Torres da Alta Feitiçaria ruíram eras depois, as orbes foram destruídas ou sumiram nas lendas e se crê que apenas três sobreviveram. Sua magia foi moldada e distorcida pelos séculos, então, apesar do seu propósito primário de convocar dragões ainda funcionar, elas também permitem algum tipo de controle sobre os dragões."},{"type":"paragraph","text":"Cada orbe contém a essência de um dragão maligno, uma presença que se ofende com qualquer tentativa de persuadir a magia dela. Aqueles que não tenham força de personalidade podem acabar escravizados por uma orbe."},{"type":"paragraph","text":"Uma orbe é um globo de cristal gravado de 25 centímetros de diâmetro. Quando usado, ele cresce até aproximadamente 50 centímetros de diâmetro e uma névoa rodopia dentro dele."},{"type":"paragraph","text":"Enquanto estiver sintonizado com uma orbe, você pode usar uma ação para penetrar nas profundezas da orbe e falar sua palavra de comando. Você deve realizar um teste de Carisma CD 15. Se for bem sucedido, você controla a orbe pelo tempo que se mantiver sintonizado com ela. Se fracassar, você fica enfeitiçado pela orbe pelo tempo que ficar sintonizado com ela."},{"type":"paragraph","text":"Enquanto estiver enfeitiçado pela orbe, você não pode terminar a sintonização voluntariamente e a orbe conjura sugestão (CD de resistência 18) em você, à vontade, incitando você a trabalhar para os fins malignos que ela desejar. A essência do dragão dentro da orbe poderia querer muitas coisas: a aniquilação de um povo em particular, libertar-se da orbe, para levar sofrimento ao mundo, para promover a veneração de Takhisis (o nome de Tiamat em Krynn), ou outra coisa que o Mestre decidir."},{"type":"paragraph","text":"Propriedades Aleatórias. Uma Orbe dos Dragões tem as seguintes propriedades aleatórias:"},{"type":"list","items":["2 propriedades benéficas menores","1 propriedade prejudicial menor","1 propriedade prejudicial maior"]},{"type":"paragraph","text":"Magias. A orbe tem 7 cargas e recupera 1d4 + 3 cargas gastas diariamente ao amanhecer. Se controlar a orbe, você pode usar uma ação para gastar 1 ou mais cargas para conjurar uma das magias a seguir (CD de res istência 18) através dela: curar ferimentos (versão de 5° nível, 3 cargas), luz do dia (1 carga), proteção contra a morte (2 cargas) ou vidência (3 cargas)."},{"type":"paragraph","text":"Você também pode usar uma ação para conjurar a magia detectar magia através da orbe sem gastar qualquer carga."},{"type":"paragraph","text":"Convocar Dragões. Enquanto controlar a orbe, você pode usar uma ação para fazer o artefato emitir um chamado telepático que se estende em todas as direções por 60 quilômetros. Dragões malignos no alcance sentem-se compelidos a vir até a orbe o mais rápido possível pela rota mais direta. Divin const CATEGORIAS = uniqueValues('categoria');
const TIPOS = uniqueValues('tipo');
const FONTES = uniqueValues('fonte');
const RARIDADES = uniqueValues('raridade');
const SINTONIZACOES = ['Requer sintonização','Não requer sintonização'];
const CLASSES = ['Bárbaro','Bardo','Bruxo','Clérigo','Druida','Feiticeiro','Guerreiro','Ladino','Mago','Monge','Paladino','Patrulheiro'];

let activeFilters = {categoria:new Set(),tipo:new Set(),fonte:new Set(),raridade:new Set(),sintonizacao:new Set(),classe:new Set()};
let searchQuery = '';
let openItem = null;

function uniqueValues(field){
  return [...new Set(ITEMS.map(i => i[field]).filter(Boolean))]
    .sort((a,b) => a.localeCompare(b,'pt-BR',{sensitivity:'base'}));
}

function buildFilters(){
  const container = document.getElementById('filters');
  addFilterSection(container,'Categoria','categoria',CATEGORIAS);
  addFilterSection(container,'Tipo','tipo',TIPOS,{collapsible:true,collapsed:true,search:true});
  addFilterSection(container,'Fonte','fonte',FONTES);
  addFilterSection(container,'Usável por classe','classe',CLASSES);
  addFilterSection(container,'Raridade','raridade',RARIDADES);
  addFilterSection(container,'Sintonização','sintonizacao',SINTONIZACOES);
}

function addFilterSection(container,title,type,values,options = {}){
  const section = document.createElement('div');
  section.className = 'filter-section' + (options.collapsible ? ' collapsible' : '') + (options.collapsed ? ' collapsed' : '');
  const btnsId = 'btns-' + type;
  const titleHtml = options.collapsible
    ? '<button class="filter-section-title" type="button">'+title+'</button>'
    : '<div class="filter-section-title">'+title+'</div>';
  const searchHtml = options.search
    ? '<input class="type-filter-search" id="'+type+'-filter-search" type="search" placeholder="Filtrar tipos..." autocomplete="off" spellcheck="false">'
    : '';
  section.innerHTML = titleHtml + '<div class="filter-section-body">'+searchHtml+'<div class="filter-section-btns" id="'+btnsId+'"></div></div>';
  container.appendChild(section);

  if(options.collapsible){
    section.querySelector('.filter-section-title').onclick = () => section.classList.toggle('collapsed');
  }
  if(options.search){
    section.querySelector('#'+type+'-filter-search').addEventListener('input', event => {
      const query = normalize(event.target.value);
      section.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('hidden', query && !normalize(btn.dataset.value).includes(query));
      });
    });
  }

  values.forEach(value => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = value;
    btn.dataset.filter = type;
    btn.dataset.value = value;
    btn.onclick = () => toggleFilter(type,value,btn);
    section.querySelector('#'+btnsId).appendChild(btn);
  });
}

function toggleFilter(type,value,btn){
  if(activeFilters[type].has(value)){
    activeFilters[type].delete(value);
    btn.classList.remove('active','active-trick');
  } else {
    activeFilters[type].add(value);
    if(type === 'categoria' && value === 'Item mágico'){
      btn.classList.add('active-trick');
    } else {
      btn.classList.add('active');
    }
  }
  render();
}

function getFiltered(){
  return ITEMS.filter(item => {
    const haystack = [
      item.nome,item.categoria,item.tipo,item.fonte,item.raridade,item.descricao,
      item.preco,item.peso,item.dano,item.ca,item.proficiência_requerida,
      (item.propriedades || []).join(' '),(item.classes || []).join(' ')
    ].join(' ').toLowerCase();

    if(searchQuery && !normalize(haystack).includes(searchQuery)) return false;
    if(activeFilters.categoria.size && !activeFilters.categoria.has(item.categoria)) return false;
    if(activeFilters.tipo.size && !activeFilters.tipo.has(item.tipo)) return false;
    if(activeFilters.fonte.size && !activeFilters.fonte.has(item.fonte)) return false;
    if(activeFilters.classe.size){
      const classes = item.classes || [];
      const hasClass = [...activeFilters.classe].some(className => classes.includes(className));
      if(!hasClass) return false;
    }
    if(activeFilters.raridade.size && !activeFilters.raridade.has(item.raridade)) return false;
    if(activeFilters.sintonizacao.size){
      const value = item.sintonizacao ? 'Requer sintonização' : 'Não requer sintonização';
      if(!activeFilters.sintonizacao.has(value)) return false;
    }
    return true;
  }).sort((a,b) => a.nome.localeCompare(b.nome,'pt-BR',{sensitivity:'base'}));
}

function normalize(str){
  return String(str || '').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

function escHtml(str){
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function attr(str){
  return escHtml(str).replace(/"/g,'&quot;');
}

function render(){
  const filtered = getFiltered();
  const list = document.getElementById('item-list');
  const noRes = document.getElementById('no-results');
  const stats = document.getElementById('stats');
  stats.textContent = filtered.length + ' de ' + ITEMS.length + ' itens';

  if(!filtered.length){
    list.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  let html = '';
  for(const item of filtered){
    const isMagic = item.categoria === 'Item mágico';
    const cls = isMagic ? 'cantrip' : 'leveled';
    const icon = categoryIcon(item.categoria);
    const source = sourceLabel(item.fonte);
    const rarity = item.raridade ? '<span class="badge badge-level">'+escHtml(item.raridade)+'</span>' : '';
    const attunement = item.sintonizacao ? '<span class="badge badge-school" title="Requer sintonização">&#9670;</span>' : '';
    const tags = buildTags(item);
    const detailRows = buildDetailRows(item);
    const desc = buildDescription(item);
    const descSection = desc ? '<div class="spell-desc">'+desc+'</div>' : '';

    html += '<div class="spell-card '+cls+'" data-name="'+attr(item.nome)+'" onclick="toggleItem(this)">' +
      '<div class="spell-header">' +
        '<span class="spell-name">'+escHtml(item.nome)+'</span>' +
        '<div class="spell-meta">' +
          '<span class="badge icon-badge '+(isMagic ? 'magic' : '')+'" title="'+attr(item.categoria)+'">'+icon+'</span>' +
          '<span class="badge badge-source" title="'+attr(item.fonte)+'">'+escHtml(source)+'</span>' +
          rarity +
          attunement +
          '<span class="expand-arrow">&#x25B6;</span>' +
        '</div>' +
      '</div>' +
      '<div class="spell-detail">' +
        '<div class="detail-grid">' + detailRows + '</div>' +
        tags +
        descSection +
        '<div class="spell-ref"><span>&#x1F4D6; '+escHtml(item.referencia || '')+'</span></div>' +
      '</div>' +
    '</div>';
  }
  list.innerHTML = html;
}

function categoryIcon(category){
  return {
    'Arma':'&#9876;',
    'Armadura':'&#128737;',
    'Equipamento':'&#9671;',
    'Ferramenta':'&#9881;',
    'Item mágico':'&#10022;',
    'Montaria':'&#9822;',
    'Veículo':'&#9973;',
    'Veículo e montaria':'&#9973;'
  }[category] || '&#9671;';
}

function sourceLabel(source){
  if(source === 'Livro do Jogador') return 'LJ';
  if(source === 'Guia do Mestre') return 'GM';
  if(source === 'Guia de Xanathar para Todas as Coisas') return 'Xanathar';
  return source;
}

function buildDetailRows(item){
  const rows = [
    ['Tipo', item.tipo],
    ['Fonte', item.fonte],
    ['Proficiência', item.proficiência_requerida],
    ['Classes', item.classes && item.classes.length === CLASSES.length ? 'Todas' : (item.classes || []).join(', ')],
    ['Preço', item.preco],
    ['Peso', item.peso],
    ['Dano', item.dano],
    ['CA', item.ca],
    ['Força', item.forca_minima],
    ['Furtividade', item.furtividade],
    ['Raridade', item.raridade],
    ['Sintonização', item.sintonizacao ? 'Requer' : null],
    ['Deslocamento', item.deslocamento],
    ['Velocidade', item.velocidade],
    ['Carga', item.capacidade_carga]
  ].filter(([,value]) => value);

  return rows.map(([label,value]) =>
    '<div><span class="detail-label">'+escHtml(label)+'</span><br><span class="detail-value">'+escHtml(value)+'</span></div>'
  ).join('');
}

function buildTags(item){
  const tags = [];
  if(item.propriedades && item.propriedades.length) tags.push(...item.propriedades);
  if(item.sintonizacao) tags.push('Sintonização');
  if(!tags.length) return '';

  return '<div class="spell-classes">' +
    tags.map(tag => '<span class="class-tag tag-'+tagClass(tag)+'">'+escHtml(tag)+'</span>').join('') +
    '</div>';
}

function tagClass(tag){
  if(tag === 'Item mágico') return 'Item';
  return normalize(tag).replace(/[^a-z0-9]+/g,'-');
}

function buildDescription(item){
  if(item.descricao_blocos && item.descricao_blocos.length){
    return item.descricao_blocos.map(block => {
      if(block.type === 'paragraph'){
        return '<p>'+escHtml(block.text)+'</p>';
      }
      if(block.type === 'list'){
        return '<ul>'+block.items.map(value => '<li>'+escHtml(value)+'</li>').join('')+'</ul>';
      }
      if(block.type === 'table'){
        const headers = block.headers || [];
        const rows = block.rows || [];
        return '<table class="desc-table"><thead><tr>' +
          headers.map(header => '<th>'+escHtml(header)+'</th>').join('') +
          '</tr></thead><tbody>' +
          rows.map(row => '<tr>'+row.map(value => '<td>'+escHtml(value)+'</td>').join('')+'</tr>').join('') +
          '</tbody></table>';
      }
      return '';
    }).join('');
  }
  if(item.descricao){
    return item.descricao
      .split(/(?<=\.)\s+(?=[A-ZÁÉÍÓÚÂÊÔÃÕ])/)
      .slice(0,10)
      .map(p => '<p>'+escHtml(p)+'</p>')
      .join('');
  }
  return '';
}

function toggleItem(el){
  if(openItem && openItem !== el){
    openItem.classList.remove('open');
  }
  el.classList.toggle('open');
  openItem = el.classList.contains('open') ? el : null;
  if(openItem){
    setTimeout(() => {
      openItem.scrollIntoView({behavior:'smooth',block:'nearest'});
    }, 50);
  }
}

function toggleSidebar(){
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const isOpen = sidebar.classList.contains('open');
  if(isOpen){
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
  } else {
    sidebar.classList.add('open');
    overlay.classList.add('show');
  }
}

document.getElementById('search-box').addEventListener('input', function(){
  searchQuery = normalize(this.value.trim());
  openItem = null;
  render();
});

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    const sidebar = document.getElementById('sidebar');
    if(sidebar.classList.contains('open')){
      toggleSidebar();
    } else {
      document.getElementById('search-box').value = '';
      searchQuery = '';
      render();
    }
  }
  if(e.key === '/' && document.activeElement !== document.getElementById('search-box')){
    e.preventDefault();
    document.getElementById('search-box').focus();
  }
});

document.querySelectorAll('.module-nav a').forEach(link => {
  link.addEventListener('click', function(e){
    if(e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
    const href = this.getAttribute('href');
    if(!href || href === '#') return;
    const active = document.querySelector('.module-nav a.active');
    const current = Number(active ? active.dataset.order : 0);
    const next = Number(this.dataset.order);
    if(Number.isNaN(next) || next === current) return;
    e.preventDefault();
    const target = new URL(href, window.location.href).href;
    const exitDir = next > current ? 'left' : 'right';
    const enterDir = next > current ? 'right' : 'left';
    try{
      sessionStorage.setItem('d1NavDirection', enterDir);
      document.body.classList.add('d1-exit-' + exitDir);
      window.setTimeout(() => { window.location.href = target; }, 150);
    } catch(err){
      window.location.href = target;
    }
  });
});

buildFilters();
render();
</script>
