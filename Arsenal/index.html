mas ele flui rapidamente quando derramado. O óleo pode cobrir uma criatura Média ou menor, junto com o equipamento que ela esteja vestindo e carregando (um frasco adicional é necessário para cada categoria de tamanho acima de Médio). Aplicar o óleo leva 10 minutos. A criatura afetada ganha os efeitos da magia movimentação livre por 8 horas. Alternativamente, o óleo pode ser derramado no chão com uma ação, cobrindo 3 metros quadrados, duplicando o efeito da magia área escorregadia na área por 8 horas.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, incomum","descricao_blocos":[{"type":"paragraph","text":"Este unguento negro pegajoso é grosso e pesado em seu recipiente, mas ele flui rapidamente quando derramado. O óleo pode cobrir uma criatura Média ou menor, junto com o equipamento que ela esteja vestindo e carregando (um frasco adicional é necessário para cada categoria de tamanho acima de Médio). Aplicar o óleo leva 10 minutos. A criatura afetada ganha os efeitos da magia movimentação livre por 8 horas."},{"type":"paragraph","text":"Alternativamente, o óleo pode ser derramado no chão com uma ação, cobrindo 3 metros quadrados, duplicando o efeito da magia área escorregadia na área por 8 horas."}]},{"id":"guia-do-mestre-item-magico-pedra-da-boa-sorte","nome":"Pedra da Boa Sorte","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":195,"pagina_pdf":196,"referencia":"195 (PDF: 196)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto esta ágata polida estiver em sua posse, você recebe +1 de bônus em testes de habilidade e testes de resistência.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto esta ágata polida estiver em sua posse, você recebe +1 de bônus em testes de habilidade e testes de resistência."}]},{"id":"guia-do-mestre-item-magico-pedra-de-comandar-elementais-da-terra","nome":"Pedra de Comandar Elementais da Terra","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":195,"pagina_pdf":196,"referencia":"195 (PDF: 196)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Se a pedra estiver tocando o solo, você pode usar uma ação para falar a palavra de comando da bacia e invocar um elemental da terra, como se você tivesse conjurado a magia conjurar elemental. A pedra não pode ser usada dessa forma novamente até o próximo amanhecer. A pedra pesa 2,5 quilos.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Se a pedra estiver tocando o solo, você pode usar uma ação para falar a palavra de comando da bacia e invocar um elemental da terra, como se você tivesse conjurado a magia conjurar elemental. A pedra não pode ser usada dessa forma novamente até o próximo amanhecer. A pedra pesa 2,5 quilos."}]},{"id":"guia-do-mestre-item-magico-pedra-ionica","nome":"Pedra Iônica","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":195,"pagina_pdf":196,"referencia":"195 (PDF: 196)","preco":null,"peso":null,"raridade":"raridade variável","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Uma pedra iônica é nomeada em homenagem a Ioun, um deus do conhecimento e profecia reverenciado em alguns mundos. Existem muitos tipos de pedras iônicas, cada tipo de uma combinação de forma e cor distinta. Quando você usa uma ação para arremessar uma dessas pedras no ar, a pedra orbita sua cabeça a uma distância de 30 centímetros e confere um benefício a você. Posteriormente, outra criatura deve usar uma ação para agarrar ou apanhar a pedra para separa-la de você, ou realizando um teste de ataque bem sucedido contra CA 24, ou sendo bem sucedido num teste de Destreza (Acrobacia) CD 24. Você pode usar uma ação para pegar e guardar a pedra, terminando seu efeito. Uma pedra tem CA 24, 10 pontos de vida e resistência a todos os danos. Ela é considerada um objeto que está sendo vestido enquanto estiver orbitando sua cabeça. Absorção (Muito Raro). Enquanto esta pedra elipsoide lavanda clara orbitar sua cabeça, você pode usar sua reação para cancelar uma magia de 4° nível ou inferior conjurada por uma criatura que você possa ver e esteja focando você. Uma vez que a pedra tenha cancelado 20 níveis de magia, ela se incinera ficando cinza fosco e perdendo sua mágica. Se você for alvo de uma magia cujo nível seja maior que o número de níveis de magia restantes na pedra, a magia não poderá cancela-la. Agilidade (Muito Raro). Seu valor de Destreza aumenta em 2, até o máximo de 20, enquanto esta esfera vermelha escura orbitar sua cabeça. Prontidão (Raro). Você não pode ser surpreendido enquanto esta pedra romboide azul escura orbitar sua cabeça. Fortitude (Muito Raro). Seu valor de Constituição aumenta em 2, até o máximo de 20, enquanto esta pedra romboide rosa orbitar sua cabeça. Grande Absorção (Lendário). Enquanto esta pedra elipsoide lavanda e verde orbitar sua cabeça, você pode usar sua reação para cancelar uma magia de 8° nível ou inferior conjurada por uma criatura que você possa ver e esteja focando você. Uma vez que a pedra tenha cancelado 50 níveis de magia, ela se incinera ficando cinza fosco e perdendo sua mágica. Se você for alvo de uma magia cujo nível seja maior que o número de níveis de magia restantes na pedra, a magia não poderá cancela-la. Intuição (Muito Raro). Seu valor de Sabedoria aumenta em 2, até o máximo de 20, enquanto esta esfera azul incandescente orbitar sua cabeça. Intelecto (Muito Raro). Seu valor de Inteligência aumenta em 2, até o máximo de 20, enquanto esta esfera escarlate e azul orbitar sua cabeça. Liderança (Muito Raro). Seu valor de Carisma aumenta em 2, até o máximo de 20, enquanto esta esfera rosa e verde orbitar sua cabeça. Maestria (Lendário). Seu bônus de proficiência aumenta em 1 enquanto este prisma verde claro orbitar sua cabeça. Proteção (Raro). Você ganha +1 de bônus na CA enquanto este prisma rosa pálido orbitar sua cabeça. Regeneração (Lendário). Você recupera 15 pontos de vida no final de cada hora enquanto este fuso branco perolado orbitar sua cabeça, considerando que você tenha pelo menos 1 ponto de vida. Armazenamento (Raro). Este prisma roxo brilhante armazena magias conjuradas nele, mantendo-as até você usalas. A pedra pode armazenar até 3 níveis de magia por vez. Quando é encontrado, ele conterá 1d4-1 níveis de magia armazenados, escolhidas pelo Mestre. Qualquer criatura pode conjurar uma magia de 1° até 3° nível na pedra ao toca-la enquanto a magia é conjurada. A magia não produz efeito, além do de ser armazenada na pedra. Se a pedra não puder conter a magia, a magia é gasta sem surtir efeito. O nível da magia usado para conjura-la determina quantos espaços são usados. Enquanto esta pedra orbitar sua cabeça, você pode conjurar qualquer magia armazenada nela. A magia usa o nível de magia, CD de magia, bônus de ataque de magia e habilidade de conjuração do conjurador original, mas, no resto, é tratada como se você tivesse conjurado a magia. A magia conjurada através da pedra não está mais armazenada nela, liberando os espaços. Força (Muito Raro). Seu valor de Força aumenta em 2, até o máximo de 20, enquanto esta pedra romboide azul clara orbitar sua cabeça. Sustento (Raro). Você não precisa comer ou beber enquanto este fuso iridescente orbitar sua cabeça.","tabela":null,"proficiência_requerida":nul hidas pelo Mestre."},{"type":"paragraph","text":"Qualquer criatura pode conjurar uma magia de 1° até 3° nível na pedra ao toca-la enquanto a magia é conjurada. A magia não produz efeito, além do de ser armazenada na pedra. Se a pedra não puder conter a magia, a magia é gasta sem surtir efeito. O nível da magia usado para conjura-la determina quantos espaços são usados."},{"type":"paragraph","text":"Enquanto esta pedra orbitar sua cabeça, você pode conjurar qualquer magia armazenada nela. A magia usa o nível de magia, CD de magia, bônus de ataque de magia e habilidade de conjuração do conjurador original, mas, no resto, é tratada como se você tivesse conjurado a magia. A magia conjurada através da pedra não está mais armazenada nela, liberando os espaços."},{"type":"paragraph","text":"Força (Muito Raro). Seu valor de Força aumenta em 2, até o máximo de 20, enquanto esta pedra romboide azul clara orbitar sua cabeça."},{"type":"paragraph","text":"Sustento (Raro). Você não precisa comer ou beber enquanto este fuso iridescente orbitar sua cabeça."}]},{"id":"guia-do-mestre-item-magico-pedras-de-mensagem","nome":"Pedras de Mensagem","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":196,"pagina_pdf":197,"referencia":"196 (PDF: 197)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"As pedras de mensagem vem em pares, com cada pedra polida esculpida para se encaixar na outra, então, os pares são facilmente reconhecidos. Enquanto você tocar uma pedra, você pode usar uma ação para conjurar a magia enviar mensagem através dela. O alvo é o portador da outra pedra. Se nenhuma criatura portar a outra pedra, você saberá disso logo que usar a pedra e não conjurar a magia. Uma vez que enviar mensagem seja conjurada através das pedras, elas não poderão ser usadas novamente até o próximo amanhecer. Se uma das pedras de um par for destruída, a outra se torna não-mágica.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"As pedras de mensagem vem em pares, com cada pedra polida esculpida para se encaixar na outra, então, os pares são facilmente reconhecidos. Enquanto você tocar uma pedra, você pode usar uma ação para conjurar a magia enviar mensagem através dela. O alvo é o portador da outra pedra. Se nenhuma criatura portar a outra pedra, você saberá disso logo que usar a pedra e não conjurar a magia."},{"type":"paragraph","text":"Uma vez que enviar mensagem seja conjurada através das pedras, elas não poderão ser usadas novamente até o próximo amanhecer. Se uma das pedras de um par for destruída, a outra se torna não-mágica."}]},{"id":"guia-do-mestre-item-magico-penas-de-quaal","nome":"Penas de Quaal","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":196,"pagina_pdf":197,"referencia":"196 (PDF: 197)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este pequeno objeto parece com uma pena. Existem diferentes tipos de penas, cada um com um uso único diferente. O Mestre escolhe o tipo de pena ou o determina aleatoriamente. 01-20 Âncora 21-35 Árvore 36-50 Chicote 51-65 Barco de cisne 66-90 Pássaro 91-00 Leque Âncora. Você pode usar uma ação para tocar a pena em um barco ou navio. Pelas próximas 24 horas, a embarcação não pode ser movida por quaisquer meios. Tocar a pena na embarcação novamente termina o efeito. Quando o efeito terminar, a pena desaparece. Árvore. Você deve estar ao ar livre para usar essa pena. Você pode usar uma ação para toca-la em um espaço desocupado no chão. A pena desaparece e, em seu lugar, um carvalho não-mágico brota do nada. A árvore tem 18 metros de altura e 1,5 metro de diâmetro de tronco, e a copa no seu topo se espalha num raio de 6 metros. Barco de Cisne. Você pode usar uma ação para tocar a pena num corpo de água de pelo menos 18 metros de diâmetro. A pena desaparece e um barco em forma de cisne de 15 metros de comprimento por 6 metros de largura toma seu lugar. O barco tem propulsão própria e se move pela água a uma velocidade de 9 quilômetros por hora. Você pode usar uma ação enquanto estiver no barco para comanda-lo a se mover ou virar 90 graus. O barco pode carregar até trinta e duas criaturas Médias ou menores. Uma criatura Grande conta como quatro criaturas Médias, enquanto que uma criatura Enorme conta como nove. O barco permanece por 24 horas e então desaparece. Você pode dispensar o barco com uma ação. Chicote. Você pode usar uma ação para arremessar a pena em um ponto a até 3 metros de você. A pena desaparece e um chicote flutuante toma seu lugar. Você pode então, usar uma ação bônus para realizar um ataque corpo-a-corpo com magia contra uma criatura a até 3 metros do chicote, com um bônus de ataque de +9. Se atingir, o alvo sofre 1d6 + 5 de dano de energia. Com uma ação bônus no seu turno, você pode direcionar o chicote a voar até 6 metros e repetir o ataque contra uma criatura a até 3 metros dele. O chicote desaparece depois de 1 hora, quando você usa uma ação para dispensa-lo ou quando você estiver incapacitado ou morto. Leque. Se você estiver em um barco ou navio, você pode usar uma ação para arremessar a pena a 3 metros no ar. A pena desaparece e um leque gigante toma seu lugar. O leque flutua e cria um vento forte o suficiente para encher a vela de um barco, aumentando seu deslocamento em 7,5 quilômetros por hora por 8 horas. Você pode dispensar o leque com uma ação. Pássaro. Você pode usar uma ação para arremessar essa pena 1,5 metro no ar. A pena desaparece e um pássaro multicolorido enorme toma seu lugar. O pássaro tem as estatísticas de um roca (veja no Manual dos Monstros), mas ele obedece seus comandos simples e não pode atacar. Ele pode carregar até 250 quilos enquanto estiver voando com seu deslocamento máximo, ou 500 quilos com metade do deslocamento. O pássaro desaparece após voar a distância máxima para um dia ou se cair a 0 pontos de vida. Você pode dispensar o pássaro com uma ação.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Este pequeno objeto parece com uma pena. Existem diferentes tipos de penas, cada um com um uso único diferente. O Mestre escolhe o tipo de pena ou o determina aleatoriamente."},{"type":"table","headers":["d100","Pena"],"rows":[["01-20","Âncora"],["21-35","Árvore"],["36-50","Chicote"],["51-65","Barco de cisne"],["66-90","Pássaro"],["91-00","Leque"]]},{"type":"paragraph","text":"Âncora. Você pode usar uma ação para tocar a pena em um barco ou navio. Pelas próximas 24 horas, a embarcação não pode ser movida por quaisquer meios. Tocar a pena na embarcação novamente termina o efeito. Quando o efeito terminar, a pena desaparece."},{"type":"paragraph","text":"Árvore. Você deve estar ao ar livre para usar essa pena. Você pode usar uma ação para toca-la em um espaço desocupado no chão. A pena desaparece e, em seu lugar, um carvalho não-mágico brota do nada. A árvore tem 18 metros de altura e 1,5 metro de diâmetro de tronco, e a copa no seu topo se espalha num raio de 6 metros."},{"type":"paragraph","text":"Barco de Cisne. Você pode usar uma ação para tocar a pena num corpo de água de pelo menos 18 metros de diâmetro. A pena desaparece e um barco em forma de cisne de 15 metros de comprimento por 6 metros de largura toma seu lugar. O barco tem propulsão própria e se move pela água a uma velocidade de 9 quilômetros por hora. Você pode usar uma ação enquanto estiver no barco para comanda-lo a se mover ou virar 90 graus. O barco pode carregar até trinta e duas criaturas Médias ou menores. Uma criatura Grande conta como quatro criaturas Médias, enquanto que uma criatura Enorme conta como nove. O barco permanece por 24 horas e então desaparece. Você pode dispensar o barco com uma ação."},{"type":"paragraph","text":"Chicote. Você pode usar uma ação para arremessar a pena em um ponto a até 3 metros de você. A pena desaparece e um chicote flutuante toma seu lugar. Você pode então, usar uma ação bônus para realizar um ataque corpo-a-corpo com magia contra uma criatura a até 3 metros do chicote, com um bônus de ataque de +9. Se atingir, o alvo sofre 1d6 + 5 de dano de energia."},{"type":"paragraph","text":"Com uma ação bônus no seu turno, você pode direcionar o chicote a voar até 6 metros e repetir o ataque contra uma criatura a até 3 metros dele. O chicote desaparece depois de 1 hora, quando você usa uma ação para dispensa-lo ou quando você estiver incapacitado ou morto."},{"type":"paragraph","text":"Leque. Se você estiver em um barco ou navio, você pode usar uma ação para arremessar a pena a 3 metros no ar. A pena desaparece e um leque gigante toma seu lugar. O leque flutua e cria um vento forte o suficiente para encher a vela de um barco, aumentando seu deslocamento em 7,5 quilômetros por hora por 8 horas. Você pode dispensar o leque com uma ação."},{"type":"paragraph","text":"Pássaro. Você pode usar uma ação para arremessar essa pena 1,5 metro no ar. A pena desaparece e um pássaro multicolorido enorme toma seu lugar. O pássaro tem as estatísticas de um roca (veja no Manual dos Monstros), mas ele obedece seus comandos simples e não pode atacar. Ele pode carregar até 250 quilos enquanto estiver voando com seu deslocamento máximo, ou 500 quilos com metade do deslocamento. O pássaro desaparece após voar a distância máxima para um dia ou se cair a 0 pontos de vida. Você pode dispensar o pássaro com uma ação."}]},{"id":"guia-do-mestre-item-magico-pergaminho-de-magia","nome":"Pergaminho de Magia","categoria":"Item mágico","tipo":"Pergaminho","fonte":"Guia do Mestre","pagina_livro":197,"pagina_pdf":198,"referencia":"197 (PDF: 198)","preco":null,"peso":null,"raridade":"raridade variável","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Um pergaminho de magia contém as palavras de uma única magia, escritas em cifras místicas. Se a magia estiver na sua lista de magias de classe, você pode ler o pergaminho e conjurar sua magia sem fornecer quaisquer componentes materiais. Do contrário, o pergaminho é inteligível. Conjurar a magia lendo o pergaminho requer o tempo normal de conjuração. Uma vez que tenha sido conjurada, as palavras no pergaminho desaparecem e ele se desfaz em pó. Se a conjuração for interrompida, o pergaminho não é gasto. Se a magia estiver na sua lista de magias de classe mas for de um nível maior que o que você normalmente conjura, você deve realizar um teste de habilidade usando sua habilidade de conjuração para determinar se a conjuração é bem sucedida. A CD é igual a 10 + o nível da magia. Se fracassar, a magia desaparece do pergaminho sem produzir outro efeito. O nível da magia num pergaminho determina a CD do teste de resistência da magia e o bônus de ataque, assim como a raridade do pergaminho, como mostrado na tabela Pergaminho de Magia. Truque Comum 13 +5 1° Comum 13 +5 2° Incomum 13 +5 3° Incomum 15 +7 4° Raro 15 +7 5° Raro 17 +9 6° Muito raro 17 +9 7° Muito raro 18 +10 8° Muito raro 18 +10 9° Lendário 19 +11 Um magia de mago em um pergaminho de magia pode ser copiada exatamente como magias de grimórios podem ser copiadas. Quando uma magia é copiada de um pergaminho de magia, o copiador deve ser bem sucedido num teste de Inteligência (Arcanismo) com CD igual a 10 + o nível da magia. Se o teste for bem sucedido, a magia é copiada. Independentemente do teste ser bem ou mal sucedido, o pergaminho de magia é destruído.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Pergaminho, raridade variável","descricao_blocos":[{"type":"paragraph","text":"Um pergaminho de magia contém as palavras de uma única magia, escritas em cifras místicas. Se a magia estiver na sua lista de magias de classe, você pode ler o pergaminho e conjurar sua magia sem fornecer quaisquer componentes materiais. Do contrário, o pergaminho é inteligível. Conjurar a magia lendo o pergaminho requer o tempo normal de conjuração. Uma vez que tenha sido conjurada, as palavras no pergaminho desaparecem e ele se desfaz em pó. Se a conjuração for interrompida, o pergaminho não é gasto."},{"type":"paragraph","text":"Se a magia estiver na sua lista de magias de classe mas for de um nível maior que o que você normalmente conjura, você deve realizar um teste de habilidade usando sua habilidade de conjuração para determinar se a conjuração é bem sucedida. A CD é igual a 10 + o nível da magia. Se fracassar, a magia desaparece do pergaminho sem produzir outro efeito."},{"type":"paragraph","text":"O nível da magia num pergaminho determina a CD do teste de resistência da magia e o bônus de ataque, assim como a raridade do pergaminho, como mostrado na tabela Pergaminho de Magia."},{"type":"table","headers":["Nível de Magia","Raridade","CD de Resistência","Bônus de Ataque"],"rows":[["Truque","Comum","13","+5"],["1°","Comum","13","+5"],["2°","Incomum","13","+5"],["3°","Incomum","15","+7"],["4°","Raro","15","+7"],["5°","Raro","17","+9"],["6°","Muito raro","17","+9"],["7°","Muito raro","18","+10"],["8°","Muito raro","18","+10"],["9°","Lendário","19","+11"]]},{"type":"paragraph","text":"Um magia de mago em um pergaminho de magia pode ser copiada exatamente como magias de grimórios podem ser copiadas. Quando uma magia é copiada de um pergaminho de magia, o copiador deve ser bem sucedido num teste de Inteligência (Arcanismo) com CD igual a 10 + o nível da magia. Se o teste for bem sucedido, a magia é copiada. Independentemente do teste ser bem ou mal sucedido, o pergaminho de magia é destruído."}]},{"id":"guia-do-mestre-item-magico-pergaminho-de-protecao","nome":"Pergaminho de Proteção","categoria":"Item mágico","tipo":"Pergaminho","fonte":"Guia do Mestre","pagina_livro":200,"pagina_pdf":200,"referencia":"200 (PDF: 200)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Cada pergaminho de proteção funciona contra um tipo específico de criatura, escolhido pelo Mestre ou determinado aleatoriamente ao rolar na tabela a seguir. 01-10 Aberrações 11-20 Bestas 21-30 Celestiais 31-40 Elementais 41-50 Fadas 51-75 Corruptores 76-80 Plantas 81-00 Mortos-vivos Usar uma ação para ler o pergaminho enclausura você em uma barreira invisível que se estende de você num cilindro de 1,5 metro de raio e 3 metros de altura. Por 5 minutos, esta barreira previne criaturas do tipo especificado de entrarem ou afetarem qualquer coisa dentro do cilindro. O cilindro se move com você e permanece centrado em você. Porém, caso você se mova de forma que uma criatura do tipo especificado entre no cilindro, o efeito termina. Uma criatura pode tentar sobrepujar a barreira usando uma ação para realizar um teste de Carisma CD 15. Com um sucesso, a criatura deixa de ser afetada pela barreira.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Pergaminho, raro","descricao_blocos":[{"type":"paragraph","text":"Cada pergaminho de proteção funciona contra um tipo específico de criatura, escolhido pelo Mestre ou determinado aleatoriamente ao rolar na tabela a seguir."},{"type":"table","headers":["d100","Tipo de Criatura"],"rows":[["01-10","Aberrações"],["11-20","Bestas"],["21-30","Celestiais"],["31-40","Elementais"],["41-50","Fadas"],["51-75","Corruptores"],["76-80","Plantas"],["81-00","Mortos-vivos"]]},{"type":"paragraph","text":"Usar uma ação para ler o pergaminho enclausura você em uma barreira invisível que se estende de você num cilindro de 1,5 metro de raio e 3 metros de altura. Por 5 minutos, esta barreira previne criaturas do tipo especificado de entrarem ou afetarem qualquer coisa dentro do cilindro."},{"type":"paragraph","text":"O cilindro se move com você e permanece centrado em você. Porém, caso você se mova de forma que uma criatura do tipo especificado entre no cilindro, o efeito termina."},{"type":"paragraph","text":"Uma criatura pode tentar sobrepujar a barreira usando uma ação para realizar um teste de Carisma CD 15. Com um sucesso, a criatura deixa de ser afetada pela barreira."}]},{"id":"guia-do-mestre-item-magico-periapto-de-cicatrizacao","nome":"Periapto de Cicatrização","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":200,"pagina_pdf":200,"referencia":"200 (PDF: 200)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto você usar este pingente, você se estabiliza toda vez que estiver morrendo no início do seu turno. Além disso, toda vez que você jogar um Dado de Vida para recuperar pontos de vida, dobre a quantidade de pontos de vida restaurados.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto você usar este pingente, você se estabiliza toda vez que estiver morrendo no início do seu turno. Além disso, toda vez que você jogar um Dado de Vida para recuperar pontos de vida, dobre a quantidade de pontos de vida restaurados."}]},{"id":"guia-do-mestre-item-magico-periapto-de-protecao-contra-veneno","nome":"Periapto de Proteção contra Veneno","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":200,"pagina_pdf":200,"referencia":"200 (PDF: 200)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta delicada corrente de prata possui um pingente com uma gema negra brilhante. Enquanto você usá-lo, venenos não surtiram efeito em você. Você é imune a condição envenenado e tem imunidade a dano de veneno.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Esta delicada corrente de prata possui um pingente com uma gema negra brilhante. Enquanto você usá-lo, venenos não surtiram efeito em você. Você é imune a condição envenenado e tem imunidade a dano de veneno."}]},{"id":"guia-do-mestre-item-magico-periapto-de-saude","nome":"Periapto de Saúde","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":200,"pagina_pdf":200,"referencia":"200 (PDF: 200)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Você fica imune a doenças enquanto estiver usando este pingente. Se você já estiver sendo afetado por uma doença, o efeito dessa doença é suprimido enquanto você usar o pingente.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Você fica imune a doenças enquanto estiver usando este pingente. Se você já estiver sendo afetado por uma doença, o efeito dessa doença é suprimido enquanto você usar o pingente."}]},{"id":"guia-do-mestre-item-magico-perola-do-poder","nome":"Pérola do Poder","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":200,"pagina_pdf":201,"referencia":"200 (PDF: 201)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto tiver essa pérola com você, você pode usar uma ação para falar a palavra de comando e recuperar um espaço de magia gasto. Se o espaço de magia gasto for de 4° nível ou superior, o espaço de magia novo é de 3° nível. Uma vez que tenha usado a pérola, ela não poderá ser usada novamente até o próximo amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização com um conjurador)","descricao_blocos":[{"type":"paragraph","text":"Enquanto tiver essa pérola com você, você pode usar uma ação para falar a palavra de comando e recuperar um espaço de magia gasto. Se o espaço de magia gasto for de 4° nível ou superior, o espaço de magia novo é de 3° nível. Uma vez que tenha usado a pérola, ela não poderá ser usada novamente até o próximo amanhecer."}]},{"id":"guia-do-mestre-item-magico-pigmentos-maravilhosos-de-nolzur","nome":"Pigmentos Maravilhosos de Nolzur","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":200,"pagina_pdf":201,"referencia":"200 (PDF: 201)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Geralmente encontrado em 1d4 potes dentro de uma caixa de madeira bem feita com um pincel (pesando 0,5 quilo ao todo), estes pigmentos permitem que você crie objetos tridimensionais ao pinta-los em duas dimensões. A pintura flui do pincel para formar o objeto desejado enquanto você se concentra na imagem. Cada pote de tinta é suficiente para cobrir 300 metros quadrados de superfície, o que permite a você criar objetos inanimados e características de cenário-como uma porta, fosso, flores, árvores, celas, salas ou armas-com até 3.000 metros cúbicos. Leva 10 minutos para cobrir 30 metros quadrados. Quando você completar a pintura, o objeto ou cenário pintado torna-se um objeto não-mágico real. Então, pintar uma porta ou parede criará uma porta real que pode ser aberta para o quer que exista do outro lado. Pintar um fosso em um piso criará um fosso real, e sua profundidade conta na área total dos objetos que você criou. Nada criado pelos pigmentos pode ter um valor superior a 25 po. Se você pintar um objeto de grande valor (como um diamante ou pilha de ouro) o objeto parecerá autentico, mas uma inspeção minuciosa o revelará como sendo feito de grude, osso ou algum outro material sem valor. Se você pintar um tipo de energia, como fogo ou eletricidade, a energia aparece mas desaparece assim que você completar a pintura, não causando qualquer ferimento a ninguém.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, muito raro","descricao_blocos":[{"type":"paragraph","text":"Geralmente encontrado em 1d4 potes dentro de uma caixa de madeira bem feita com um pincel (pesando 0,5 quilo ao todo), estes pigmentos permitem que você crie objetos tridimensionais ao pinta-los em duas dimensões. A pintura flui do pincel para formar o objeto desejado enquanto você se concentra na imagem."},{"type":"paragraph","text":"Cada pote de tinta é suficiente para cobrir 300 metros quadrados de superfície, o que permite a você criar objetos inanimados e características de cenário-como uma porta, fosso, flores, árvores, celas, salas ou armas-com até 3.000 metros cúbicos. Leva 10 minutos para cobrir 30 metros quadrados."},{"type":"paragraph","text":"Quando você completar a pintura, o objeto ou cenário pintado torna-se um objeto não-mágico real. Então, pintar uma porta ou parede criará uma porta real que pode ser aberta para o quer que exista do outro lado. Pintar um fosso em um piso criará um fosso real, e sua profundidade conta na área total dos objetos que você criou."},{"type":"paragraph","text":"Nada criado pelos pigmentos pode ter um valor superior a 25 po. Se você pintar um objeto de grande valor (como um diamante ou pilha de ouro) o objeto parecerá autentico, mas uma inspeção minuciosa o revelará como sendo feito de grude, osso ou algum outro material sem valor."},{"type":"paragraph","text":"Se você pintar um tipo de energia, como fogo ou eletricidade, a energia aparece mas desaparece assim que você completar a pintura, não causando qualquer ferimento a ninguém."}]},{"id":"guia-do-mestre-item-magico-po-da-seca","nome":"Pó da Seca","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":200,"pagina_pdf":201,"referencia":"200 (PDF: 201)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este pequeno pacote contém 1d6 + 4 punhados de pó. Você pode usar uma ação para polvilhar um punhado na água. O pó torna um cubo de 4,5 metros quadrados de água em uma esfera do tamanho de uma bola de gude, que flutua ou permanece próximo de onde o pó foi polvilhado. O peso da bolinha é irrelevante. Alguém pode usar uma ação para esmagar a bolinha contra uma superfície dura, fazendo com que ela se despedace e libere a água absorvida pelo pó. Fazer isso termina a mágica nessa bolinha. Um elemental composto praticamente só de água que seja exposto a um punhado de pó deve realizar um teste de resistência de Constituição CD 13, sofrendo 10d6 de dano necrótico se fracassar, ou metade desse dano caso obtenha sucesso.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Este pequeno pacote contém 1d6 + 4 punhados de pó. Você pode usar uma ação para polvilhar um punhado na água. O pó torna um cubo de 4,5 metros quadrados de água em uma esfera do tamanho de uma bola de gude, que flutua ou permanece próximo de onde o pó foi polvilhado. O peso da bolinha é irrelevante."},{"type":"paragraph","text":"Alguém pode usar uma ação para esmagar a bolinha contra uma superfície dura, fazendo com que ela se despedace e libere a água absorvida pelo pó. Fazer isso termina a mágica nessa bolinha."},{"type":"paragraph","text":"Um elemental composto praticamente só de água que seja exposto a um punhado de pó deve realizar um teste de resistência de Constituição CD 13, sofrendo 10d6 de dano necrótico se fracassar, ou metade desse dano caso obtenha sucesso."}]},{"id":"guia-do-mestre-item-magico-po-de-espirrar-e-tossir","nome":"Pó de Espirrar e Tossir","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":200,"pagina_pdf":201,"referencia":"200 (PDF: 201)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Encontrado em um pequeno pacote, este pó lembra areia muito fina. Ele se assemelha ao pó de desaparecimento e uma magia identificação revê-la o como tal. Tem o suficiente dele para um uso. Quando você usa uma ação para arremessa-lo no ar, você e cada criatura que precise respirar a até 9 metros de você, deve ser bem sucedida num teste de resistência de Constituição CD 15, ou ficará incapaz de respirar enquanto espirra incontrolavelmente. Uma criatura nessa condição está incapacitada e sufocando. Enquanto permanecer consciente, uma criatura pode repetir o teste de resistência no final de cada um dos seus turnos, terminando o efeito sobre si, caso obtenha sucesso. A magia restauração menor também pode terminar o efeito em uma criatura.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Encontrado em um torna-se invisível por 2d4 minutos. A duração é a mesma para todos os alvos e o pó é consumido quando sua mágica funciona. Se uma criatura afetada pelo pó atacar ou conjurar uma magia, a invisibilidade termina nessa criatura."}]},{"id":"guia-do-mestre-item-magico-pocao-de-amizade-animal","nome":"Poção de Amizade Animal","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":201,"pagina_pdf":202,"referencia":"201 (PDF: 202)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Quando bebe esta poção, você pode conjurar a magia amizade animal (CD de resistência 13) por 1 hora, à vontade. Agitar este líquido turvo traz pedacinhos a vista: uma escama de peixe, uma língua de colibri, uma garra de gato ou pelo de um esquilo.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, incomum","descricao_blocos":[{"type":"paragraph","text":"Quando bebe esta poção, você pode conjurar a magia amizade animal (CD de resistência 13) por 1 hora, à vontade. Agitar este líquido turvo traz pedacinhos a vista: uma escama de peixe, uma língua de colibri, uma garra de gato ou pelo de um esquilo."}]},{"id":"guia-do-mestre-item-magico-pocao-de-aumentar","nome":"Poção de Aumentar","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":201,"pagina_pdf":202,"referencia":"201 (PDF: 202)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Quando bebe esta poção, você ganha o efeito de \"aumentar\" da magia aumentar/reduzir por 1d4 horas (não requer concentração). O vermelho no líquido da poção se expande constantemente em uma gota minúscula e então se contrai para colorir o líquido transparente em volta dele. Sacudir a garrafa não interrompe este processo.","tabela":null,"proficiência_requerid
