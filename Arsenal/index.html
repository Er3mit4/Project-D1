rente em volta dele. Sacudir a garrafa não interrompe este processo."}]},{"id":"guia-do-mestre-item-magico-pocao-de-envenenamento","nome":"Poção de Envenenamento","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":202,"pagina_pdf":203,"referencia":"202 (PDF: 203)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta mistura parece, cheira e tem o gosto de uma poção de cura ou outra poção benéfica. Porém, na verdade é veneno mascarado por mágica de ilusão. Uma magia identificação revela sua natureza verdadeira. Se bebe-la, você sofrerá 3d6 de dano de veneno e deve ser bem sucedido num teste de resistência de Constituição CD 13 ou ficará envenenado. No começo de cada um dos seus turnos enquanto estiver envenenado dessa forma, você sofre 3d6 de dano de veneno. No final de cada um dos seus turnos, você pode repetir o teste de resistência. Com um sucesso, o dano de veneno que você sofre no seu turno subsequente é reduzido em 1d6. O veneno acaba quando o dano for reduzido a 0.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, incomum","descricao_blocos":[{"type":"paragraph","text":"Esta mistura parece, cheira e tem o gosto de uma poção de cura ou outra poção benéfica. Porém, na verdade é veneno mascarado por mágica de ilusão. Uma magia identificação revela sua natureza verdadeira."},{"type":"paragraph","text":"Se bebe-la, você sofrerá 3d6 de dano de veneno e deve ser bem sucedido num teste de resistência de Constituição CD 13 ou ficará envenenado. No começo de cada um dos seus turnos enquanto estiver envenenado dessa forma, você sofre 3d6 de dano de veneno. No final de cada um dos seus turnos, você pode repetir o teste de resistência. Com um sucesso, o dano de veneno que você sofre no seu turno subsequente é reduzido em 1d6. O veneno acaba quando o dano for reduzido a 0."}]},{"id":"guia-do-mestre-item-magico-pocao-de-escalar","nome":"Poção de Escalar","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":202,"pagina_pdf":203,"referencia":"202 (PDF: 203)","preco":null,"peso":null,"raridade":"comum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Quando bebe esta poção, você ganha deslocamento de escalada igual ao seu deslocamento de caminhada por 1 hora. Durante esse tempo, você tem vantagem em testes de Força (Atletismo) feitos para escalar. A poção é dividida em uma camada marrom, uma prata e uma cinza lembrando camadas de rocha. Sacudir a garrafa não mistura as cores.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, comum","descricao_blocos":[{"type":"paragraph","text":"Quando bebe esta poção, você ganha deslocamento de escalada igual ao seu deslocamento de caminhada por 1 hora. Durante esse tempo, você tem vantagem em testes de Força (Atletismo) feitos para escalar. A poção é dividida em uma camada marrom, uma prata e uma cinza lembrando camadas de rocha. Sacudir a garrafa não mistura as cores."}]},{"id":"guia-do-mestre-item-magico-pocao-de-forma-gasosa","nome":"Poção de Forma Gasosa","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":202,"pagina_pdf":203,"referencia":"202 (PDF: 203)","preco":null,"peso":null,"raridade":"rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Quando bebe esta poção, você ganha os efeitos da magia forma gasosa por 1 hora (não requer concentração) ou até você terminar o efeito com uma ação bônus. O recipiente dessa poção parece conter uma névoa que se move e flui como água.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, rara","descricao_blocos":[{"type":"paragraph","text":"Quando bebe esta poção, você ganha os efeitos da magia forma gasosa por 1 hora (não requer concentração) ou até você terminar o efeito com uma ação bônus. O recipiente dessa poção parece conter uma névoa que se move e flui como água."}]},{"id":"guia-do-mestre-item-magico-pocao-de-forca-do-gigante","nome":"Poção de Força do Gigante","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":202,"pagina_pdf":203,"referencia":"202 (PDF: 203)","preco":null,"peso":null,"raridade":"raridade variável","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Quando bebe esta poção, seu valor de Força muda por 1 hora. O tipo de gigante determinar o valor (veja na tabela abaixo). A poção não produz efeito em você caso sua Força seja igual ou maior que o valor dela. O líquido transparente dessa poção tem um pedaço de unha de um gigante do tipo apropriado flutuando nele. A poção de força do gigante do gelo e a poção de força do gigante de pedra têm o mesmo efeito. Gigante da colina 21 Incomum Gigante de pedra/gelo 23 Rara Gigante do fogo 25 Rara Gigante das nuvens 27 Muito rara Gigante da tempestade 29 Lendária","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, raridade variável","descricao_blocos":[{"type":"paragraph","text":"Quando bebe esta poção, seu valor de Força muda por 1 hora. O tipo de gigante determinar o valor (veja na tabela abaixo). A poção não produz efeito em você caso sua Força seja igual ou maior que o valor dela."},{"type":"paragraph","text":"O líquido transparente dessa poção tem um pedaço de unha de um gigante do tipo apropriado flutuando nele. A poção de força do gigante do gelo e a poção de força do gigante de pedra têm o mesmo efeito."},{"type":"table","headers":["Tipo de Gigante","Força","Raridade"],"rows":[["Gigante da colina","21","Incomum"],["Gigante de pedra/gelo","23","Rara"],["Gigante do fogo","25","Rara"],["Gigante das nuvens","27","Muito rara"],["Gigante da tempestade","29","Lendária"]]}]},{"id":"guia-do-mestre-item-magico-pocao-de-heroismo","nome":"Poção de Heroísmo","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":202,"pagina_pdf":203,"referencia":"202 (PDF: 203)","preco":null,"peso":null,"raridade":"rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Por 1 hora, após bebe-la, você ganha 10 pontos de vida temporários por 1 hora. Pela mesma duração, você está sob efeito da magia benção (não requer concentração). Esta poção azul borbulha e fumega como se estivesse fervendo. POÇÃO DE INVISIBILIDADE Poção, muito ara O recipiente desta poção aparenta estar vazio, mas parece conter um líquido. Quando o bebe, você fica invisível por 1 hora. Tudo que você estiver vestindo ou carregando fica invisível com você. O efeito termina prematuramente se você atacar ou conjurar uma magia.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, rara","descricao_blocos":[{"type":"paragraph","text":"Por 1 hora, após bebe-la, você ganha 10 pontos de vida temporários por 1 hora. Pela mesma duração, você está sob efeito da magia benção (não requer concentração). Esta poção azul borbulha e fumega como se estivesse fervendo."},{"type":"paragraph","text":"POÇÃO DE INVISIBILIDADE"},{"type":"paragraph","text":"Poção, muito ara"},{"type":"paragraph","text":"O recipiente desta poção aparenta estar vazio, mas parece conter um líquido. Quando o bebe, você fica invisível por 1 hora. Tudo que você estiver vestindo ou carregando fica invisível com você. O efeito termina prematuramente se você atacar ou conjurar uma magia."}]},{"id":"guia-do-mestre-item-magico-pocao-de-invulnerabilidade","nome":"Poção de Invulnerabilidade","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":203,"pagina_pdf":204,"referencia":"203 (PDF: 204)","preco":null,"peso":null,"raridade":"rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Por 1 minuto após beber esta poção, você adquire resistência a todos os danos. O líquido xaroposo dessa poção parece ferro derretido.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, rara","descricao_blocos":[{"type":"paragraph","text":"Por 1 minuto após beber esta poção, você adquire resistência a todos os danos. O líquido xaroposo dessa poção parece ferro derretido."}]},{"id":"guia-do-mestre-item-magico-pocao-de-ler-mentes","nome":"Poção de Ler Mentes","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":203,"pagina_pdf":204,"referencia":"203 (PDF: 204)","preco":null,"peso":null,"raridade":"rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Quando bebe esta poção, você ganha os efeitos da magia detectar pensamentos (CD de resistência 13). O líquido roxo denso dessa poção tem uma nuvem ovoide rosa flutuando nele.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, rara","descricao_blocos":[{"type":"paragraph","text":"Quando bebe esta poção, você ganha os efeitos da magia detectar pensamentos (CD de resistência 13). O líquido roxo denso dessa poção tem uma nuvem ovoide rosa flutuando nele."}]},{"id":"guia-do-mestre-item-magico-pocao-de-longevidade","nome":"Poção de Longevidade","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":203,"pagina_pdf":204,"referencia":"203 (PDF: 204)","preco":null,"peso":null,"raridade":"muito rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Quando bebe esta poção, sua idade física é reduzida em 1d6 + 6 anos, até o mínimo de 13 anos. Cada vez subsequente que você beber uma poção de longevidade, existe 10 por cento de chance, cumulativo, de você envelhecer 1d6 + 6 anos, invés. Suspenso no líquido âmbar tem um rabo de escorpião, uma presa de víbora, uma aranha morta e um minúsculo coração que, sem qualquer lógica, ainda bate. Estes ingredientes desaparecem quando a poção é aberta.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, muito rara","descricao_blocos":[{"type":"paragraph","text":"Quando bebe esta poção, sua idade física é reduzida em 1d6 + 6 anos, até o mínimo de 13 anos. Cada vez subsequente que você beber uma poção de longevidade, existe 10 por cento de chance, cumulativo, de você envelhecer 1d6 + 6 anos, invés. Suspenso no líquido âmbar tem um rabo de escorpião, uma presa de víbora, uma aranha morta e um minúsculo coração que, sem qualquer lógica, ainda bate. Estes ingredientes desaparecem quando a poção é aberta."}]},{"id":"guia-do-mestre-item-magico-pocao-de-resistencia","nome":"Poção de Resistência","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":203,"pagina_pdf":204,"referencia":"203 (PDF: 204)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Quando bebe esta poção, você ganha resistência a um tipo de dano por 1 hora. O Mestre escolhe o tipo ou o determina aleatoriamente das opções abaixo. 1 Ácido 2 Frio 3 Fogo 4 Energia 5 Elétrico 6 Necrótico 7 Veneno 8 Psíquico 9 Radiante 10 Trovejante","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, incomum","descricao_blocos":[{"type":"paragraph","text":"Quando bebe esta poção, você ganha resistência a um tipo de dano por 1 hora. O Mestre escolhe o tipo ou o determina aleatoriamente das opções abaixo."},{"type":"table","headers":["d10","Tipo de Dano"],"rows":[["1","Ácido"],["2","Frio"],["3","Fogo"],["4","Energia"],["5","Elétrico"],["6","Necrótico"],["7","Veneno"],["8","Psíquico"],["9","Radiante"],["10","Trovejante"]]}]},{"id":"guia-do-mestre-item-magico-pocao-de-respirar-na-agua","nome":"Poção de Respirar na Água","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":203,"pagina_pdf":204,"referencia":"203 (PDF: 204)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Você pode respirar embaixo d'água por 1 hora após beber esta poção. Seu fluido verde nebuloso cheira a maresia e possui uma bolha similar a uma água-viva flutuando nele.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, incomum","descricao_blocos":[{"type":"paragraph","text":"Você pode respirar embaixo d'água por 1 hora após beber esta poção. Seu fluido verde nebuloso cheira a maresia e possui uma bolha similar a uma água-viva flutuando nele."}]},{"id":"guia-do-mestre-item-magico-pocao-de-sopro-de-fogo","nome":"Poção de Sopro de Fogo","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":203,"pagina_pdf":204,"referencia":"203 (PDF: 204)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Quando bebe esta poção, você pode usar uma ação bônus para exalar fogo em um alvo a até 9 metros de você. O alvo deve realizar um teste de resistência de Destreza CD 13, sofrendo 4d6 de dano de fogo se falhar na resistência, ou metade desse dano caso obtenha sucesso. O efeito termina após você expelir fogo três vezes, ou após 1 hora se passar. O líquido laranja desta poção lampeja e fumaça preenche o topo do recipiente e vaza toda vez que ele é aberto.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, incomum","descricao_blocos":[{"type":"paragraph","text":"Quando bebe esta poção, você pode usar uma ação bônus para exalar fogo em um alvo a até 9 metros de você. O alvo deve realizar um teste de resistência de Destreza CD 13, sofrendo 4d6 de dano de fogo se falhar na resistência, ou metade desse dano caso obtenha sucesso. O efeito termina após você expelir fogo três vezes, ou após 1 hora se passar."},{"type":"paragraph","text":"O líquido laranja desta poção lampeja e fumaça preenche o topo do recipiente e vaza toda vez que ele é aberto."}]},{"id":"guia-do-mestre-item-magico-pocao-de-velocidade","nome":"Poção de Velocidade","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":203,"pagina_pdf":204,"referencia":"203 (PDF: 204)","preco":null,"peso":null,"raridade":"muito rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Quando bebe esta poção, você ganha os efeitos da magia velocidade por 1 minuto (não requer concentração). O fluido amarelo da poção é matizado de preto e gira em torno de si.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, muito rara","descricao_blocos":[{"type":"paragraph","text":"Quando bebe esta poção, você ganha os efeitos da magia velocidade por 1 minuto (não requer concentração). O fluido amarelo da poção é matizado de preto e gira em torno de si."}]},{"id":"guia-do-mestre-item-magico-pocao-de-vitalidade","nome":"Poção de Vitalidade","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":203,"pagina_pdf":204,"referencia":"203 (PDF: 204)","preco":null,"peso":null,"raridade":"muito rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Quando bebe esta poção, ela remove qualquer exaustão que você esteja sofrendo e cura qualquer doença ou veneno afetando você. Pelas próximas 24 horas, você recupera o valor máximo de pontos de vida para cada Dado de Vida que você gastar. O líquido carmesim da poção pulsa regularmente com luz pálida, lembrando as batidas de um coração.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, muito rara","descricao_blocos":[{"type":"paragraph","text":"Quando bebe esta poção, ela remove qualquer exaustão que você esteja sofrendo e cura qualquer doença ou veneno afetando você. Pelas próximas 24 horas, você recupera o valor máximo de pontos de vida para cada Dado de Vida que você gastar. O líquido carmesim da poção pulsa regularmente com luz pálida, lembrando as batidas de um coração."}]},{"id":"guia-do-mestre-item-magico-pocao-de-voo","nome":"Poção de Voo","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":203,"pagina_pdf":204,"referencia":"203 (PDF: 204)","preco":null,"peso":null,"raridade":"muito rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Quando bebe esta poção, você ganha deslocamento de voo igual ao seu deslocamento de caminhada por 1 hora, e pode planar. Se você estiver no ar quando o efeito da poção acabar, você cairá, a não ser que tenha outros meios de permanecer no ar. O líquido transparente dessa poção flutua no topo do recipiente dela e possui impurezas nebulosas flutuando nele.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, muito rara","descricao_blocos":[{"type":"paragraph","text":"Quando bebe esta poção, você ganha deslocamento de voo igual ao seu deslocamento de caminhada por 1 hora, e pode planar. Se você estiver no ar quando o efeito da poção acabar, você cairá, a não ser que tenha outros meios de permanecer no ar. O líquido transparente dessa poção flutua no topo do recipiente dela e possui impurezas nebulosas flutuando nele."}]},{"id":"guia-do-mestre-item-magico-poco-dos-muitos-mundos","nome":"Poço dos Muitos Mundos","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":203,"pagina_pdf":204,"referencia":"203 (PDF: 204)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este tecido negro elegante, macio como seda, é dobrado para ter as dimensões de um lenço. Ele se desdobra em uma folha circular de 1,8 metro de diâmetro. Você pode usar uma ação para desdobrar e colocar o poço dos muitos mundos em uma superfície sólida, onde ele criará um portal de via dupla para outro mundo ou plano de existência. Cada vez que o item abre um portal, o Mestre decide para onde ele leva. Você pode usar uma ação para fechar um portal aberto ao segurar as bordas do tecido e dobra-lo. Quando o poço dos muitos mundos abrir um portal, ele não poderá fazê-lo novamente por 1d8 horas.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, lendário","descricao_blocos":[{"type":"paragraph","text":"Este tecido negro elegante, macio como seda, é dobrado para ter as dimensões de um lenço. Ele se desdobra em uma folha circular de 1,8 metro de diâmetro."},{"type":"paragraph","text":"Você pode usar uma ação para desdobrar e colocar o poço dos muitos mundos em uma superfície sólida, onde ele criará um portal de via dupla para outro mundo ou plano de existência. Cada vez que o item abre um portal, o Mestre decide para onde ele leva. Você pode usar uma ação para fechar um portal aberto ao segurar as bordas do tecido e dobra-lo. Quando o poço dos muitos mundos abrir um portal, ele não poderá fazê-lo novamente por 1d8 horas."}]},{"id":"guia-do-mestre-item-magico-oculos-noturnos","nome":"Óculos Noturnos","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":203,"pagina_pdf":204,"referencia":"203 (PDF: 204)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este par de lentes negras, você tem visão no escuro com alcance de 18 metros. Se você já tiver visão no escuro, usar os óculos aumenta seu alcance em 18 metros.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este par de lentes negras, você tem visão no escuro com alcance de 18 metros. Se você já tiver visão no escuro, usar os óculos aumenta seu alcance em 18 metros."}]},{"id":"guia-do-mestre-item-magico-olhos-de-aguia","nome":"Olhos de Águia","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":203,"pagina_pdf":204,"referencia":"203 (PDF: 204)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Estas lentes de cristal se encaixam nos olhos. Enquanto estiver as usando, você tem vantagem em testes de Sabedoria (Percepção) que tenham a ver com a visão. Em condições de visibilidade clara, você pode perceber os detalhes mesmo de criatura e objetos extremamente distantes de até 60 centímetros de tamanho.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Estas lentes de cristal se encaixam nos olhos. Enquanto estiver as usando, você tem vantagem em testes de Sabedoria (Percepção) que tenham a ver com a visão. Em condições de visibilidade clara, você pode perceber os detalhes mesmo de criatura e objetos extremamente distantes de até 60 centímetros de tamanho."}]},{"id":"guia-do-mestre-item-magico-olhos-de-visao-momentanea","nome":"Olhos de Visão Momentânea","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":205,"pagina_pdf":205,"referencia":"205 (PDF: 205)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Estas lentes de cristal se encaixam nos olhos. Enquanto estiver as usando, você pode ver muito melhor que o normal numa distância de até 30 centímetros. Você tem vantagem em testes de Inteligência (Investigação) que tenham a ver com a visão enquanto procura em uma área ou estuda um objeto dentro do alcance.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Estas lentes de cristal se encaixam nos olhos. Enquanto estiver as usando, você pode ver muito melhor que o normal numa distância de até 30 centímetros. Você tem vantagem em testes de Inteligência (Investigação) que tenham a ver com a visão enquanto procura em uma área ou estuda um objeto dentro do alcance."}]},{"id":"guia-do-mestre-item-magico-olhos-do-encantamento","nome":"Olhos do Encantamento","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":205,"pagina_pdf":205,"referencia":"205 (PDF: 205)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Estas lentes de cristal se encaixam nos olhos. Elas tem 3 cargas. Enquanto estiver as usando, você pode gastar 1 carga, com uma ação, para conjurar a magia enfeitiçar pessoa (CD de resistência 13) em um humanoide a até 9 metros de você, considerando que você e o alvo possam ver um ao outro. As lentes recuperam todas as cargas diariamente ao amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Estas lentes de cristal se encaixam nos olhos. Elas tem 3 cargas. Enquanto estiver as usando, você pode gastar 1 carga, com uma ação, para conjurar a magia enfeitiçar pessoa (CD de resistência 13) em um humanoide a até 9 metros de você, considerando que você e o alvo possam ver um ao outro. As lentes recuperam todas as cargas diariamente ao amanhecer."}]},{"id":"guia-do-mestre-item-magico-robe-das-cores-cintilantes","nome":"Robe das Cores Cintilantes","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":205,"pagina_pdf":205,"referencia":"205 (PDF: 205)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este robe tem 3 cargas e recupera 1d3 cargas gastas diariamente ao amanhecer. Enquanto estiver vestindo-o, você pode usar uma ação para gastar 1 carga e fazer a vestimenta exibir um padrão mutável de tons ofuscantes até o final do seu próximo turno. Durante esse tempo, o robe emite luz plena num raio de 9 metros e penumbra por mais 9 metros adicionais. As criaturas que puderem ver você tem desvantagem nas jogadas de ataque contra você. Além disso, qualquer criatura na luz plena que puder ver você quando o poder do robe estiver ativado, deve realizar um teste de resistência de Sabedoria CD 15, ou ficará atordoada até o efeito acabar.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, muito raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este robe tem 3 cargas e recupera 1d3 cargas gastas diariamente ao amanhecer. Enquanto estiver vestindo-o, você pode usar uma ação para gastar 1 carga e fazer a vestimenta exibir um padrão mutável de tons ofuscantes até o final do seu próximo turno. Durante esse tempo, o robe emite luz plena num raio de 9 metros e penumbra por mais 9 metros adicionais. As criaturas que puderem ver você tem desvantagem nas jogadas de ataque contra você. Além disso, qualquer criatura na luz plena que puder ver você quando o poder do robe estiver ativado, deve realizar um teste de resistência de Sabedoria CD 15, ou ficará atordoada até o efeito acabar."}]},{"id":"guia-do-mestre-item-magico-robe-das-estrelas","nome":"Robe das Estrelas","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":205,"pagina_pdf":205,"referencia":"205 (PDF: 205)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este robe negro ou azul escuro é bordado com pequenas estrelas brancas ou prateadas. Você recebe +1 de bônus nos testes de resistência enquanto vesti-lo. Seis estrelas, localizadas na porção frontal superior do robe, são particularmente grandes. Enquanto estiver vestindo este robe, você pode usar uma ação para arrancar uma das estrelas e usa-la para conjurar mísseis mágicos como uma magia de 5° nível. Diariamente, ao escurecer, 1d6 estrelas removidas reaparecem no robe. Enquanto estiver vestindo o robe, você pode usar uma ação para entrar no Plano Astral junto com tudo que você está vestindo ou carregando. Você permanece lá até usar uma ação para retornar ao plano em que você estava. Você reaparece no ultimo espaço que ocupava, ou, caso esse espaço esteja ocupado, no espaço desocupado mais próximo.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, muito raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este robe negro ou azul escuro é bordado com pequenas estrelas brancas ou prateadas. Você recebe +1 de bônus nos testes de resistência enquanto vesti-lo."},{"type":"paragraph","text":"Seis estrelas, localizadas na porção frontal superior do robe, são particularmente grandes. Enquanto estiver vestindo este robe, você pode usar uma ação para arrancar uma das estrelas e usa-la para conjurar mísseis mágicos como uma magia de 5° nível. Diariamente, ao escurecer, 1d6 estrelas removidas reaparecem no robe."},{"type":"paragraph","text":"Enquanto estiver vestindo o robe, você pode usar uma ação para entrar no Plano Astral junto com tudo que você está vestindo ou carregando. Você permanece lá até usar uma ação para retornar ao plano em que você estava. Você reaparece no ultimo espaço que ocupava, ou, caso esse espaço esteja ocupado, no espaço desocupado mais próximo."}]},{"id":"guia-do-mestre-item-magico-robe-do-arquimago","nome":"Robe do Arquimago","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":205,"pagina_pdf":205,"referencia":"205 (PDF: 205)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Esta vestimenta elegante é feita de tecidos exóticos de cores branca, cinza ou preta e adornados com runas prateadas. A cor do robe corresponde à tendência para qual o item foi criado. Um robe branco foi feito para boa, cinza para neutra e preto para má. Você não pode se sintonizar a um robe do arquimago que não corresponda à sua tendência. Você ganha os seguintes benefícios enquanto estiver vestindo o robe: Se você não estiver vestindo uma armadura, sua Classe de Armadura base é 15 + seu modificador de Destreza. Você tem vantagem nos testes de resistência contra magias e outros efeitos mágicos. A CD de resistência de suas magias e seu bônus de ataque de magia aumentam em +2 cada.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, lendário (requer sintonização com um bruxo, feiticeiro ou mago)","descricao_blocos":[{"type":"paragraph","text":"Esta vestimenta elegante é feita de tecidos exóticos de cores branca, cinza ou preta e adornados com runas prateadas. A cor do robe corresponde à tendência para qual o item foi criado. Um robe branco foi feito para boa, cinza para neutra e preto para má. Você não pode se sintonizar a um robe do arquimago que não corresponda à sua tendência."},{"type":"paragraph","text":"Você ganha os seguintes benefícios enquanto estiver vestindo o robe:"},{"type":"list","items":["Se você não estiver vestindo uma armadura, sua Classe de Armadura base é 15 + seu modificador de Destreza.","Você tem vantagem nos testes de resistência contra magias e outros efeitos mágicos.","A CD de resistência de suas magias e seu bônus de ataque de magia aumentam em +2 cada."]}]},{"id":"guia-do-mestre-item-magico-robe-dos-itens-uteis","nome":"Robe dos Itens Úteis","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":206,"pagina_pdf":206,"referencia":"206 (PDF: 206)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este robe possui remendos de tecido de vários formatos e cores cobrindo-o. Enquanto estiver vestindo o robe, você pode usar uma ação para arrancar um desses remendos, fazendo com que ele se transforme no objeto ou criatura que ele representa. Quando o último remendo for removido, o robe se tornará um vestuário ordinário. O robe tem dois de cada dos seguintes remendos. Adaga Lanterna furta-fogo (cheia e acesa) Espelho de aço Vara de 3 metros Corda de cânhamo (15 metros, enrolada) Saco Além desses, o robe possui 4d4 outros remendos. O Mestre escolhe os remendos ou os determina aleatoriamente. d100 Remendo 01-08 Sacola com 100 po 09-15 Caixa de prata (30 centímetros de comprimento por 15 centímetros de largura e profundidade) valendo 500 po 16-22 Porta de ferro (com até 3 metros de largura por 3 metros de altura, barrada de um lado, à sua escolha), a qual você pode colocar em uma abertura que você possa alcançar; ela se acomoda para se encaixar na abertura, se fixando e prendendo sozinha 23-30 10 gemas valendo 100 po cada 31-44 Escada de madeira (7 metros de comprimento) 45-51 Um cavalo de montaria com alforjes (veja no Manual dos Monstros para as estatísticas) 52-59 Fosso (um cubo de 3 metros de lado), o qual você pode colocar no solo a até 3 metros de você. 60-68 4 poções de cura 69-75 Barco a remo (3,6 metros de comprimento) 76-83 Pergaminho de magia contendo uma magia de 1° a 3° nível 84-90 2 mastins (veja o Manual dos Monstros para as estatísticas) 91-96 Janela (0,60 metro por 1,20 metro, até 0,60 metro de profundidade), a qual você pode colocar em uma superfície vertical que você possa alcançar 97-00 Aríete portátil","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Este robe possui remendos de tecido de vários formatos e cores cobrindo-o. Enquanto estiver vestindo o robe, você pode usar uma ação para arrancar um desses remendos, fazendo com que ele se transforme no objeto ou criatura que ele representa. Quando o último remendo for removido, o robe se tornará um vestuário ordinário."},{"type":"paragraph","text":"O robe tem dois de cada dos seguintes remendos."},{"type":"list","items":["Adaga","Lanterna furta-fogo (cheia e acesa)","Espelho de aço","Vara de 3 metros","Corda de cânhamo (15 metros, enrolada)","Saco"]},{"type":"paragraph","text":"Além desses, o robe possui 4d4 outros remendos. O Mestre escolhe os remendos ou os determina aleatoriamente."},{"type":"table","headers":["d100","Remendo"],"rows":[["01-08","Sacola com 100 po"],["09-15","Caixa de prata (30 centímetros de comprimento por 15 centímetros de largura e profundidade) valendo 500 po"],["16-22","Porta de ferro (com até 3 metros de largura por 3 metros de altura, barrada de um lado, à sua escolha), a qual você pode colocar em uma abertura que você possa alcançar; ela se acomoda para se encaixar na abertura, se fixando e prendendo sozinha"],["23-30","10 gemas valendo 100 po cada"],["31-44","Escada de madeira (7 metros de comprimento)"],["45-51","Um cavalo de montaria com alforjes (veja no Manual dos Monstros para as estatísticas)"],["52-59","Fosso (um cubo de 3 metros de lado), o qual você pode colocar no solo a até 3 metros de você."],["60-68","4 poções de cura"],["69-75","Barco a remo (3,6 metros de comprimento)"],["76-83","Pergaminho de magia contendo uma magia de 1° a 3° nível"],["84-90","2 mastins (veja o Manual dos Monstros para as estatísticas)"],["91-96","Janela (0,60 metro por 1,20 metro, até 0,60 metro de profundidade), a qual você pode colocar em uma superfície vertical que você possa alcançar"],["97-00","Aríete portátil"]]}]},{"id":"guia-do-mestre-item-magico-robe-dos-olhos","nome":"Robe dos Olhos","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":206,"pagina_pdf":207,"referencia":"206 (PDF: 207)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este robe é adornado com padrões de olhos. Enquanto estiver vestindo ele, você ganha os seguintes benefícios: O robe permite que você veja em todas as direções e você tem vantagem em testes de Sabedoria (Percepção) relacionados à visão. Você tem visão no escuro com alcance de 36 metros. Você pode ver criaturas e objetos invisíveis, assim como pode ver no Plano Etéreo, com alcance de 36 metros. Os olhos no robe não podem se fechar ou se desviar. Apesar de você poder fechar ou desviar os seus próprios olhos, você nunca é considerado como fazendo isso enquanto estiver vestindo este robe. Uma magia luz conjurada no robe ou uma magia luz do dia conjurada a 1,5 metro do robe faz com que você fique cego por 1 minuto. No final de cada um dos seus turnos, você pode realizar um teste de resistência de Constituição (CD 11 para luz ou CD 15 para luz do dia), terminando a cegueira com um sucesso.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este robe é adornado com padrões de olhos. Enquanto estiver vestindo ele, você ganha os seguintes benefícios:"},{"type":"list","items":["O robe permite que você veja em todas as direções e você tem vantagem em testes de Sabedoria (Percepção) relacionados à visão.","Você tem visão no escuro com alcance de 36 metros.","Você pode ver criaturas e objetos invisíveis, assim como pode ver no Plano Etéreo, com alcance de 36 metros."]},{"type":"paragraph","text":"Os olhos no robe não podem se fechar ou se desviar. Apesar de você poder fechar ou desviar os seus próprios olhos, você nunca é considerado como fazendo isso enquanto estiver vestindo este robe."},{"type":"paragraph","text":"Uma magia luz conjurada no robe ou uma magia luz do dia conjurada a 1,5 metro do robe faz com que você fique cego por 1 minuto. No final de cada um dos seus turnos, você pode realizar um teste de resistência de Constituição (CD 11 para luz ou CD 15 para luz do dia), terminando a cegueira com um sucesso."}]},{"id":"guia-do-mestre-item-magico-sacola-prestativa-de-heward","nome":"Sacola Prestativa de Heward","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":206,"pagina_pdf":207,"referencia":"206 (PDF: 207)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta mochila possui uma bolsa central e duas bolsas laterais, cada uma é um espaço extradimensional. Cada bolsa lateral pode comportar até 10 quilos de matéria, não excedendo um volume de 60 centímetros cúbicos. A bolsa central maior pode comportar até 2 metros cúbicos ou 40 quilos de material. A mochila sempre pesa 2,5 quilos, independentemente do seu conteúdo. Colocar um objeto na sacola segue as regras normais de interação com objetos. Recuperar um item da sacola requer que você use uma ação. Quando você coloca a mão dentro da sacola para pegar um item especifico, o item sempre aparece magicamente no topo. A sacola tem algumas limitações. Se ela ficar sobrecarregada ou se um objeto afiado perfurar ou rasga-la, a sacola se rompe e é destruída. Se a sacola for destruída, seu conteúdo é perdido para sempre, apesar de um artefato sempre aparecer em algum lugar novamente. Se a sacola for virada do avesso, seu conteúdo é cuspido, ileso, e a sacola deve ser colocada direito antes de poder ser usada novamente. Se uma criatura que respire estiver dentro da sacola, ela pode sobreviver por até 10 minutos, quando começará a sufocar. Colocar a sacola dentro do espaço extradimensional criado por uma mochila de carga, buraco portátil ou item similar destrói ambos os itens instantaneamente e abre um portal para o Plano Astral. O portal se origina onde um item foi colocado dentro do outro. Qualquer criatura a até 3 metros do portal é sugada para dentro dele e arremessada num local aleatório no Plano Astral. O portal então se fecha. O portal é de via única e não pode ser reaberto.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Esta mochila possui uma bolsa central e duas bolsas laterais, cada uma é um espaço extradimensional. Cada bolsa lateral pode comportar até 10 quilos de matéria, não excedendo um volume de 60 centímetros cúbicos. A bolsa central maior pode comportar até 2 metros cúbicos ou 40 quilos de material. A mochila sempre pesa 2,5 quilos, independentemente do seu conteúdo."},{"type":"paragraph","text":"Colocar um objeto na sacola segue as regras normais de interação com objetos. Recuperar um item da sacola requer que você use uma ação. Quando você coloca a mão dentro da sacola para pegar um item especifico, o item sempre aparece magicamente no topo."},{"type":"paragraph","text":"A sacola tem algumas limitações. Se ela ficar sobrecarregada ou se um objeto afiado perfurar ou rasga-la, a sacola se rompe e é destruída. Se a sacola for destruída, seu conteúdo é perdido para sempre, apesar de um artefato sempre aparecer em algum lugar novamente. Se a sacola for virada do avesso, seu conteúdo é cuspido, ileso, e a sacola deve ser colocada direito antes de poder ser usada novamente. Se uma criatura que respire estiver dentro da sacola, ela pode sobreviver por até 10 minutos, quando começará a sufocar."},{"type":"paragraph","text":"Colocar a sacola dentro do espaço extradimensional criado por uma mochila de carga, buraco portátil ou item similar destrói ambos os itens instantaneamente e abre um portal para o Plano Astral. O portal se origina onde um item foi colocado dentro do outro. Qualquer criatura a até 3 metros do portal é sugada para dentro dele e arremessada num local aleatório no Plano Astral. O portal então se fecha. O portal é de via única e não pode ser reaberto."}]},{"id":"guia-do-mestre-item-magico-saco-de-feijoes","nome":"Saco de Feijões","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":206,"pagina_pdf":207,"referencia":"206 (PDF: 207)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Dentro deste pesado saco existem 3d4 feijões secos. O saco pesa 250 gramas mais 125 gramas por feijão que ele contenha. Se você despejar o conteúdo do saco no solo, eles explodem num raio de 3 metros, estendendo-se a partir dos feijões. Cada criatura na área, incluindo você, deve realizar um teste de resistência de Destreza CD 15, sofrendo 5d4 de dano de fogo se fracassar na resistência ou metade desse dano se obtiver sucesso. O fogo incendeia objetos inflamáveis na área que não estejam sendo vestidos ou carregados. Se você remover um feijão do saco, planta-lo na terra ou areia e depois rega-lo, o feijão produzirá um efeito 1 minuto depois do solo onde ele foi plantado. O Mestre pode escolher um efeito da tabela anterior, determina-lo aleatoriamente ou criar um efeito. d100 Efeito 01 5d4 cogumelos venenosos brotam. Se uma criatura comer um desses cogumelos, role qualquer dado. Numa rolagem ímpar, o alvo deve ser bem sucedido num teste de resistência de Constituição CD 15 ou sofrerá 5d6 de dano de veneno e ficará envenenado por 1 hora. Em uma rolagem par, o alvo ganha 5d6 pontos de vida temporários por 1 hora. 02-10 Um gêiser irrompe liberando água, cerveja, suco de frutas, chá, vinagre, vinho ou óleo (à escolha do Mestre) a 9 metros de altura por 1d12 rodadas. 11-20 Uma ente brota (veja o Manual dos Monstros para as estatísticas). Existe 50 por cento de chance da ente ser caótica e má e atacar. 21-30 Uma estátua de pedra imóvel, animada, semelhante a você, surge. Ela faz ameaças verbais contra você. Se você for embora e outra pessoa se aproximar, ela descreverá você como o mais hediondo dos vilões e incitará os recém-chegados a encontrar e atacar você. Se você estiver no mesmo plano de existência da estátua, ela saberá onde você está. A estátua se torna inanimada após 24 horas. 31-40 Uma fogueira de chamas azuis surge e queima por 24 horas (ou até ser extinta). 41-50 1d6 + 6 guinchadores brotam (veja no Manual dos Monstros para as estatísticas). 51-60 1d4 + 8 sapos rosas brilhantes rastejam. Sempre que um sapo for tocado, ele se transforma em um monstro Grande ou menor, à escolha do Mestre. O monstro permanece por 1 minuto, então se dissipa em uma explosão de fumaça rosa brilhante. 61-70 Um bulette faminto (veja no Manual dos Monstros para as estatísticas) escava e ataca. 71-80 Uma árvore frutífera cresce. Ela tem 1d10 + 20 frutos, 1d8 deles agem como poções mágicas determinadas aleatoriamente, enquanto que um age como um veneno de ingestão, à escolha do Mestre. A árvore desaparece após 1 hora. Os frutos coletados permanecem, mantendo qualquer mágica por 30 dias. 81-90 Um ninho com 1d4 + 3 ovos surge. Qualquer criatura que comer um ovo deve realizar um teste de resistência de Constituição CD 20. Se obtiver sucesso, uma criatura aumenta permanentemente seu valor de habilidade mais baixo em 1, escolhido aleatoriamente entre valores baixos iguais. Se fracassar, a criatura sofre 10d6 de dano de energia de uma explosão mágica interna. 91-99 Uma pirâmide de 18 metros quadrados de base emerge. Dentro dela existe um sarcófago contendo um senhor das múmias (veja o Manual dos Monstros para as estatísticas). A pirâmide é tratada como o covil da múmia e o sarcófago dela contém tesouro, à escolha do Mestre. 00 Um pé de feijão gigante brota, crescendo a uma altura escolhida pelo Mestre. O topo leva aonde o Mestre desejar, como a uma vista incrível, a um castelo de um gigante das nuvens ou a um plano de existência diferente.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Dentro deste pesado saco existem 3d4 feijões secos. O saco pesa 250 gramas mais 125 gramas por feijão que ele contenha."},{" do."}]},{"id":"guia-do-mestre-item-magico-talisma-da-esfera","nome":"Talismã da Esfera","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":207,"pagina_pdf":208,"referencia":"207 (PDF: 208)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Quando você faz um teste de Inteligência (Arcanismo) para controlar uma esfera da aniquilação enquanto está segurando este talismã, você cobra seu bônus de proficiência no teste. Além disso, quando você começa seu turno com uma esfera da aniquilação sob seu controle, você pode usar uma ação para levitar até 3 metros mais uma quantidade de metros igual a 3 x seu modificador de Inteligência.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, lendário (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Quando você faz um teste de Inteligência (Arcanismo) para controlar uma esfera da aniquilação enquanto está segurando este talismã, você cobra seu bônus de proficiência no teste. Além disso, quando você começa seu turno com uma esfera da aniquilação sob seu controle, você pode usar uma ação para levitar até 3 metros mais uma quantidade de metros igual a 3 x seu modificador de Inteligência."}]},{"id":"guia-do-mestre-item-magico-talisma-do-mal-absoluto","nome":"Talismã do Mal Absoluto","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":208,"pagina_pdf":209,"referencia":"208 (PDF: 209)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este item simboliza o mal impenitente. Uma criatura que não seja nem boa nem má na tendência sofre 6d6 de dano necrótico ao tocar o talismã. Uma criatura boa sofre 8d6 de dano necrótico ao tocar o talismã. Ambos os tipos de criatura sofr eta e então sopra-la, a qual emitirá uma explosão trovejante num cone de 9 metros, que é audível a até 180 metros de distância. Cada criatura no cone deve ser bem sucedida num teste de resistência de Constituição CD 15. Se fracassar, uma criatura sofre 5d6 de dano trovejante e fica surda por 1 minuto. Se obtiver sucesso, a criatura sofre metade desse dano e não ficará surda. Criaturas e objetos feitos de vidro ou cristal tem desvantagem no teste de resistência e sofrem 10d6 de dano trovejante ao invés de 5d6. Cada uso da trombeta tem 20 por cento de chance de fazê-la explodir. A explosão causa 10d6 de dano de fogo ao seu usuário e destrói a trombeta.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Você pode usar uma ação para falar a palavra de comando da trombeta e então sopra-la, a qual emitirá uma explosão trovejante num cone de 9 metros, que é audível a até 180 metros de distância. Cada criatura no cone deve ser bem sucedida num teste de resistência de Constituição CD 15. Se fracassar, uma criatura sofre 5d6 de dano trovejante e fica surda por 1 minuto. Se obtiver sucesso, a criatura sofre metade desse dano e não ficará surda. Criaturas e objetos feitos de vidro ou cristal tem desvantagem no teste de resistência e sofrem 10d6 de dano trovejante ao invés de 5d6."},{"type":"paragraph","text":"Cada uso da trombeta tem 20 por cento de chance de fazê-la explodir. A explosão causa 10d6 de dano de fogo ao seu usuário e destrói a trombeta."}]},{"id":"guia-do-mestre-item-magico-trombeta-do-valhalla","nome":"Trombeta do Valhalla","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":209,"pagina_pdf":210,"referencia":"209 (PDF: 210)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Você pode usar uma ação para soprar esta trombeta. Em resposta, guerreiros espirituais do plano de Ysgard aparecem a até 18 metros de você. Esses espíritos usam as estatísticas do furioso do Manual dos Monstros. Eles voltam para Ysgard após 1 hora ou quando caírem para 0 pontos de vida. Uma vez que você tenha usado a trombeta, ela não poderá ser usada novamente até que 7 dias se passem. Se têm conhecimento da existência de quatro tipos de trombetas do Valhalla, cada uma feita de um metal diferente. O tipo da trombeta determinar quantos furiosos respondem ao chamado, assim como o requerimento para seu uso. O Mestre escolhe o tipo da trombeta ou o determina aleatoriamente. 01-40 Prata 2d4 + 2 Nenhum 41-75 Latão 3d4 + 3 Proficiência com todas as armas simples 76-90 Bronze 4d4 + 4 Proficiência com todas as armaduras médias 91-00 Ferro 5d4 + 5 Proficiência com todas as armas marciais Se você soprar a trombeta sem atender o requerimento, os furiosos invocados atacarão você. Se você atender o requerimento, eles serão amigáveis a você e aos seus companheiros e seguirão seus comandos.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro (prata ou latão), muito raro (bronze) ou lendário (ferro)","descricao_blocos":[{"type":"paragraph","text":"Você pode usar uma ação para soprar esta trombeta. Em resposta, guerreiros espirituais do plano de Ysgard aparecem a até 18 metros de você. Esses espíritos usam as estatísticas do furioso do Manual dos Monstros. Eles voltam para Ysgard após 1 hora ou quando caírem para 0 pontos de vida. Uma vez que você tenha usado a trombeta, ela não poderá ser usada novamente até que 7 dias se passem."},{"type":"paragraph","text":"Se têm conhecimento da existência de quatro tipos de trombetas do Valhalla, cada uma feita de um metal diferente. O tipo da trombeta determinar quantos furiosos respondem ao chamado, assim como o requerimento para seu uso. O Mestre escolhe o tipo da trombeta ou o determina aleatoriamente."},{"type":"table","headers":["d100","Tipo de Trombeta","Furiosos Invocados","Requerimento"],"rows":[["01-40","Prata","2d4 + 2","Nenhum"],["41-75","Latão","3d4 + 3","Proficiência com todas as armas simples"],["76-90","Bronze","4d4 + 4","Proficiência com todas as armaduras médias"],["91-00","Ferro","5d4 + 5","Proficiência com todas as armas marciais"]]},{"type":"paragraph","text":"Se você soprar a trombeta sem atender o requerimento, os furiosos invocados atacarão você. Se você atender o requerimento, eles serão amigáveis a você e aos seus companheiros e seguirão seus comandos."}]},{"id":"guia-do-mestre-item-magico-unguento-de-keoghtom","nome":"Unguento de Keoghtom","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":210,"pagina_pdf":211,"referencia":"210 (PDF: 211)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este jarro de vidro de 7,5 centímetros de diâmetro, contém 1d4 +1 doses de uma mistura viscosa que possui um suave cheiro de babosa. O jarro e seu conteúdo pesam 250 gramas. Com uma ação, uma dose desse unguento pode ser engolida ou aplicada sobre a pele. A criatura em quem for aplicado recupera 2d8 +2 pontos de vida, se cura de envenenamento e de qualquer doença.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Este jarro de vidro de 7,5 centímetros de diâmetro, contém 1d4 +1 doses de uma mistura viscosa que possui um suave cheiro de babosa. O jarro e seu conteúdo pesam 250 gramas."},{"type":"paragraph","text":"Com uma ação, uma dose desse unguento pode ser engolida ou aplicada sobre a pele. A criatura em quem for aplicado recupera 2d8 +2 pontos de vida, se cura de envenenamento e de qualquer doença."}]},{"id":"guia-do-mestre-item-magico-varinha-das-maravillhas","nome":"Varinha das Maravillhas","categoria":"Item mágico","tipo":"Varinha","fonte":"Guia do Mestre","pagina_livro":210,"pagina_pdf":211,"referencia":"210 (PDF: 211)","preco":null,"peso":null,"raridade":"rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Esta varinha possui 7 cargas. Enquanto empunha-la, você pode usar uma ação para gastar 1 de suas cargas e escolher um alvo a até 36 metros de você. O alvo pode ser uma criatura, um objeto ou um ponto no espaço. Role um d100 e consulte a tabela Efeito da Varinha das Maravilhas a seguir para descobrir o que acontece. Se o efeito fizer você conjurar uma magia através da varinha, a CD de resistência da magia será 15. Se a magia normalmente tiver uma distância expressa em metros, a distância dela se torna 36 metros, caso já não seja. Se um efeito encobrir uma área, você deve centrar a magia nele e incluir o alvo. Se um efeito tiver diversas alvos possíveis, o Mestre determina aleatoriamente quais são afetados. A varinha recupera 1d6 + 1 cargas gastas diariamente ao amanhecer. Se você gastar a última carga da varinha, role um d20. Em um 1, a varinha se desfaz em cinzas e é destruída.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Varinha, rara (requer sintonização com um conjurador)","descricao_blocos":[{"type":"paragraph","text":"Esta varinha possui 7 cargas. Enquanto empunha-la, você pode usar uma ação para gastar 1 de suas cargas e escolher um alvo a até 36 metros de você. O alvo pode ser uma criatura, um objeto ou um ponto no espaço. Role um d100 e consulte a tabela Efeito da Varinha das Maravilhas a seguir para descobrir o que acontece."},{"type":"paragraph","text":"Se o efeito fizer você conjurar uma magia através da varinha, a CD de resistência da magia será 15. Se a magia normalmente tiver uma distância expressa em metros, a distância dela se torna 36 metros, caso já não seja."},{"type":"paragraph","text":"Se um efeito encobrir uma área, você deve centrar a magia nele e incluir o alvo. Se um efeito tiver diversas alvos possíveis, o Mestre determina aleatoriamente quais são afetados."},{"type":"paragraph","text":"A varinha recupera 1d6 + 1 cargas gastas diariamente ao amanhecer. Se você gastar a última carga da varinha, role um d20. Em um 1, a varinha se desfaz em cinzas e é destruída."}]},{"id":"guia-do-mestre-item-magico-varinha-de-bolas-de-fogo","nome":"Varinha de Bolas de Fogo","categoria":"Item mágico","tipo":"Varinha","fonte":"Guia do Mestre","pagina_livro":210,"pagina_pdf":211,"referencia":"210 (PDF: 211)","preco":null,"peso":null,"raridade":"rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Esta varinha possui 7 cargas. Enquanto empunha-la, você pode usar uma ação para gastar 1 ou mais de suas cargas para conjurar a magia bola de fogo (CD de resistência 15) através dela. Com 1 carga, você conjura a versão de 3° nível da magia. Você pode aumentar o espaço de magia em um para cada carga adicional que você gastar. A varinha recupera 1d6 + 1 cargas gastas diariamente ao amanhecer. Se você gastar a última carga da varinha, role um d20. Em um 1, a varinha se desfaz em cinzas e é destruída.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Varinha, rara (requer sintonização com um conjurador)","descricao_blocos":[{"type":"paragraph","text":"Esta varinha possui 7 cargas. Enquanto empunha-la, você pode usar uma ação para gastar 1 ou mais de suas cargas para conjurar a magia bola de fogo (CD de resistência 15) através dela. Com 1 carga, você conjura a versão de 3° nível da magia. Você pode aumentar o espaço de magia em um para cada carga adicional que você gastar."},{"type":"paragraph","text":"A varinha recupera 1d6 + 1 cargas gastas diariamente ao amanhecer. Se você gastar a última carga da varinha, role um d20. Em um 1, a varinha se desfaz em cinzas e é destruída."}]},{"id":"guia-do-mestre-item-magico-varinha-de-deteccao-de-inimigos","nome":"Varinha de Detecção de Inimigos","categoria":"Item mágico","tipo":"Varinha","fonte":"Guia do Mestre","pagina_livro":210,"pagina_pdf":211,"referencia":"210 (PDF: 211)","preco":null,"peso":null,"raridade":"rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Esta varinha possui 7 cargas. Enquanto empunha-la, você pode usar uma ação e gastar 1 carga para falar a palavra de comando dela. Pelo próximo minuto, você sabe a direção da criatura hostil mais próxima de você, a até 18 metros, mas não a distância de você. A varinha pode sentir a presença de criaturas hostis que estejam etéreas, invisíveis, disfarçadas ou escondidas, assim como as que estejam a vista. O efeito termina se você parar de segurar a varinha. A varinha recupera 1d6 + 1 cargas gastas diariamente ao amanhecer. Se você gastar a última carga da varinha, role um d20. Em um 1, a varinha se desfaz em cinzas e é destruída. EFEITO DA VARINHA DAS MARAVILHAS d100 Efeito 01-05 Você conjura lentidão. 06-10 Você conjura fogo das fadas. 11-15 Você fica atordoado até o início do seu próximo turno, acreditando que algo incrível acabou de acontecer. 16-20 Você conjura lufada de vento. 21-25 Você conjura detectar pensamentos em um alvo, à sua escolha. Se você não escolher uma criatura, você sofre 1d6 de dano psíquico, ao invés. 26-30 Você conjura névoa fétida. 31-33 Chuva pesada cai em um raio de 18 metros centrado no alvo. A área é de escuridão leve. A chuva cai até o início do seu próximo turno. 34-36 Um animal aparece no espaço desocupado mais próximo do alvo. O animal não está sob seu controle e age como normalmente faria. Role um d100 para determinar qual animal aparece. Entre 01-25, um rinoceronte aparece; entre 26-50, um elefante aparece; e entre 51-100, um rato aparece. Veja o Manual dos Monstros para as estatísticas do animal. 37-46 Você conjura relâmpago. 47-49 Uma nuvem de 600 borboletas gigantes preenche um raio de 9 metros centrado no alvo. A área torna-se de escuridão densa. As borboletas permanecem por 10 minutos. 50-53 Você aumenta o alvo como se você tivesse conjurado aumentar/reduzir. Se o alvo não puder ser afetado por essa magia, ou se você não escolheu uma criatura como alvo, você se torna o alvo. 54-58 Você conjura escuridão. 59-62 Grama cresce no solo num raio de 18 metros de raio, centrado no alvo. Se já houver grama ali, ela cresce dez vezes o tamanho normal e permanece grande por 1 minuto 63-65 Um objeto, à escolha do Mestre, é enviado para o Plano Etéreo. O objeto não pode estar sendo nem vestido nem carregado, deve estar a até 36 metros do alvo e não pode ter mais de 3 metros em qualquer dimensão. 66-69 Você se reduz, como se tivesse conjurado aumentar/reduzir em si mesmo. 70-79 Você conjura bola de fogo. 80-84 Você conjura invisibilidade em si mesmo. 85-87 Folhas crescem no alvo. Se você escolheu um ponto no espaço como alvo, folhas brotam da criatura mais próxima desse ponto. A não ser que sejam arrancadas, as folhas murcham e caem após 24 horas. 88-90 Uma cachoeira de 1d4 x 10 gemas, cada uma valendo 1 po, é disparada pela ponta da varinha em uma linha de 9 metros de comprimento por 1,5 metro de largura. Cada gema causa 1 de dano de concussão e o total de dano das gemas é dividido igualmente entre todas as criaturas na linha. 91-95 Uma explosão de luzes cintilantes coloridas se estende de você num raio de 9 metros. Você e cada criatura na área que puder ver, deve ser bem sucedido num teste de resistência de Constituição CD 15, ou ficará cego por 1 minuto. Uma criatura pode repetir o teste de resistência no final de cada um dos turnos dela, terminando o efeito em si, com um sucesso. 96-97 A pele do alvo adquire um brilho azulado por 1d10 dias. Se você escolher um ponto no espaço, a criatura mais próxima do ponto é afetada. 98-00 Se você escolher uma criatura como alvo, ela deve realizar um teste de resistência de Constituição CD 15. Se você não escolheu uma criatura, você se torna o alvo e deve realizar o teste de resistência. Se fracassar na resistência por 5 ou mais, o alvo é instantaneamente petrificado. Em qualquer outro resultado falho, o alvo fica impedido e começa a se transformar em pedra. Enquanto estiver impedido dessa forma, o alvo deve repetir o teste de resistência no final do seu próximo turno, ficando petrificado se fracassar ou terminado o efeito se obtiver sucesso. A petrificação dura até que o alvo seja liberto pela magia restauração maior ou mágica similar.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Varinha, rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Esta varinha possui 7 cargas. Enquanto empunha-la, você pode usar uma ação e gastar 1 carga para falar a palavra de comando dela. Pelo próximo minuto, você sabe a direção da criatura hostil mais próxima de você, a até 18 metros, mas não a distância de você. A varinha pode sentir a presença de criaturas hostis que estejam etéreas, invisíveis, disfarçadas ou escondidas, assim como as que estejam a vista. O efeito termina se você parar de segurar a varinha."},{"type":"paragraph","text":"A varinha recupera 1d6 + 1 cargas gastas diariamente ao amanhecer. Se você gastar a última carga da varinha, role um d20. Em um 1, a varinha se desfaz em cinzas e é destruída."},{"type":"paragraph","text":"EFEITO DA VARINHA DAS MARAVILHAS"},{"type":"table","headers":["d100","Efeito"],"rows":[["01-05","Você conjura lentidão."],["06-10","Você conjura fogo das fadas."],["11-15","Você fica atordoado até o início do seu próximo turno, acreditando qu ndo o efeito sobre si com um sucesso.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Varinha, rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Esta varinha possui 7 cargas para suas propriedades. Ela recupera 1d6 + 1 cargas gastas diariamente ao amanhecer. Se você gastar a última carga da varinha, role um d20. Em um 1, a varinha se desfaz em cinzas e é destruída."},{"type":"paragraph","text":"Comando. Enquanto empunhar a varinha, você pode usar uma ação para gastar 1 carga e comandar outra criatura a correr ou agachar, como através da magia comando (CD de resistência 15)."},{"type":"paragraph","text":"Cone de Medo. Enquanto empunhar a varinha, você pode usar uma ação para gastar 2 cargas, fazendo com que a ponta da varinha emita um cone de 18 metros de luz âmbar. Cada criatura no cone deve ser bem sucedida num teste de resistência de Sabedoria CD 15, ou ficará amedrontada em relação a você por 1 minuto. Enquanto estiver amedrontada dessa forma, uma criatura deve gastar seu turno tentando se afastar de você como puder e ela não pode se aproximar mais de 9 metros de você voluntariamente. Ela também não pode realizar reações."},{"type":"paragraph","text":"Para sua ação, ela pode usar a ação de Disparada ou tentar escapar de um efeito que a impeça de se mover. Caso não tenha para onde se mover, a criatura pode usar a ação de Esquivar. Ao final de cada um dos turnos dela, uma criatura pode repetir o teste de resistência, terminando o efeito sobre si com um sucesso."}]},{"id":"guia-do-mestre-item-magico-varinha-de-metamorfose","nome":"Varinha de Metamorfose","categoria":"Item mágico","tipo":"Varinha","fonte":"Guia do Mestre","pagina_livro":212,"pagina_pdf":213,"referencia":"212 (PDF: 213)","preco":null,"peso":null,"raridade":"muito rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Esta v e","Paladino","Patrulheiro"],"metadados":"Varinha, incomum","descricao_blocos":[{"type":"paragraph","text":"Esta varinha possui 7 cargas. Enquanto empunha-la, você pode usar uma ação para gastar 1 ou mais de suas cargas para conjurar a magia mísseis mágicos através dela. Com 1 carga, você conjura a versão de 1° nível da magia. Você pode aumentar o espaço de magia em um para cada carga adicional que você gastar."},{"type":"paragraph","text":"A varinha recupera 1d6 + 1 cargas gastas diariamente ao amanhecer. Se você gastar a última carga da varinha, role um d20. Em um 1, a varinha se desfaz em cinzas e é destruída."}]},{"id":"guia-do-mestre-item-magico-varinha-de-obrigacao","nome":"Varinha de Obrigação","categoria":"Item mágico","tipo":"Varinha","fonte":"Guia do Mestre","pagina_livro":214,"pagina_pdf":214,"referencia":"214 (PDF: 214)","preco":null,"peso":null,"raridade":"rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Esta varinha possui 7 cargas para suas propriedades. Ela recupera 1d6 + 1 cargas gastas diariamente ao amanhecer. Se você gastar a última carga da varinha, role um d20. Em um 1, a varinha se desfaz em cinzas e é destruída. Magias. Enquanto empunhar a varinha, você pode usar uma ação para gastar algumas das cargas dela para conjurar uma das seguintes magias (CD de resistência 17): imobilizar monstro (5 cargas) ou imobilizar pessoa (2 cargas). Escapada Assistida. Enquanto empunhar a varinha, você pode usar sua reação para gastar 1 carga e ganhar vantagem em um teste de resistência que você fizer para evitar ser paralisado ou impedido, ou você pode gastar 1 carga para ganhar vantagem em um teste feito para escapar de um agarrão.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Varinha, rara (requer sintonização com um conjurador)","descricao_blocos":[{"type":"paragraph","text":"Esta varinha possui 7 cargas para suas propriedades. Ela recupera 1d6 + 1 cargas gastas diariamente ao amanhecer. Se você gastar a última carga da varinha, role um d20. Em um 1, a varinha se desfaz em cinzas e é destruída."},{"type":"paragraph","text":"Magias. Enquanto empunhar a varinha, você pode usar uma ação para gastar algumas das cargas dela para conjurar uma das seguintes magias (CD de resistência 17): imobilizar monstro (5 cargas) ou imobilizar pessoa (2 cargas)."},{"type":"paragraph","text":"Escapada Assistida. Enquanto empunhar a varinha, você pode usar sua reação para gastar 1 carga e ganhar vantagem em um teste de resistência que você fizer para evitar ser paralisado ou impedido, ou você pode gastar 1 carga para ganhar vantagem em um teste feito para escapar de um agarrão."}]},{"id":"guia-do-mestre-item-magico-varinha-de-paralisia","nome":"Varinha de Paralisia","categoria":"Item mágico","tipo":"Varinha","fonte":"Guia do Mestre","pagina_livro":214,"pagina_pdf":214,"referencia":"214 (PDF: 214)","preco":null,"peso":null,"raridade":"rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Esta varinha possui 7 cargas. Enquanto empunha-la, você pode usar uma ação para gastar 1 das cargas dela para fazer com que um fino raio azulado saia da ponta dela em direção a uma criatura que você possa ver, a até 18 metros de você. O alvo deve ser bem sucedido num teste de resistência de Constituição CD 15 ou ficará paralisado por 1 minuto. No final de cada um dos turnos do alvo, ele pode repetir o teste de resistência, terminando o efeito sobre si, com um sucesso. A varinha recupera 1d6 + 1 cargas gastas diariamente ao amanhecer. Se você gastar a última carga da varinha, role um d20. Em um 1, a varinha se desfaz em cinzas e é destruída.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Varinha, rara (requer sintonização com um conjurador)","d -magico-vassoura-voadora","nome":"Vassoura Voadora","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":215,"pagina_pdf":215,"referencia":"215 (PDF: 215)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta vassoura de madeira, que pesa 1,5 quilo, funciona como uma vassoura mundana até você montar nela e falar a palavra de comando. Então ela flutua abaixo de você e pode ser cavalgada no ar. Ela tem deslocamento de voo de 15 metros. Ela pode carregar até 200 quilos, mas seu deslocamento de voo torna-se 9 metros enquanto ela carregar mais de 100 quilos. A vassoura para de flutuar quando você aterrissa. Você pode fazer a vassoura viajar sozinha para um destino a até 1,5 quilômetro de você, se falar a palavra de comando, nomear o local e for familiarizado com o local. A vassoura volta para você quando você pronuncia a palavra de comando novamente, considerando que a vassoura ainda esteja a até 1,5 quilômetro de você.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Esta vassoura de madeira, que pesa 1,5 quilo, funciona como uma vassoura mundana até você montar nela e falar a palavra de comando. Então ela flutua abaixo de você e pode ser cavalgada no ar. Ela tem deslocamento de voo de 15 metros. Ela pode carregar até 200 quilos, mas seu deslocamento de voo torna-se 9 metros enquanto ela carregar mais de 100 quilos. A vassoura para de flutuar quando você aterrissa."},{"type":"paragraph","text":"Você pode fazer a vassoura viajar sozinha para um destino a até 1,5 quilômetro de você, se falar a palavra de comando, nomear o local e for familiarizado com o local. A vassoura volta para você quando você pronuncia a palavra de comando novamente, considerando que a vassoura ainda esteja a até 1,5 quilômetro de você."}]},{"id":"guia-do-mestre-item-magico-vela-de-invocacao","nome":"Vela de Invocação","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":215,"pagina_pdf":215,"referencia":"215 (PDF: 215)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este cilindro delgado é dedicado a uma divindade e partilha da tendência da divindade. A tendência da vela pode ser detectada com a magia detectar mal e bem. O Mestre escolhe o deus e tendência associada ou determinar a tendência aleatoriamente. A mágica da vela é ativada quando ela é acessa, o que requer uma ação. Após queimar por 4 horas, a vela é destruída. Você pode apaga-la antes para usa-la posteriormente. Deduza o tempo que ela queimou em incrementos de 1 minuto do tempo de queima total da vela. 1-2 Caótico e mau 3-4 Caótico e neutro 5-7 Caótico e bom 8-9 Neutro e mau 10-11 Neutro 12-13 Neutro e bom 14-15 Leal e mau 16-17 Leal e neutro 18-20 Leal e bom Enquanto estiver acesa, a vela emite penumbra num raio de 9 metros. Qualquer criatura dentro dessa área cuja tendência combine com a da vela realiza jogadas de ataque, testes de resistência e testes de habilidade com vantagem. Além disso, um clérigo ou druida nessa área cuja tendência combine com a da vela, pode conjurar magias de 1° nível que tenha preparado sem gastar espaços de magia, apesar do efeito da magia ser o de um conjurado com um espaço de 1° nível. Alternativamente, quando você acender a vela pela primeira vez, você pode conjurar a magia portal através dela. Fazer isso destruirá a vela.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, muito raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este cilindro delgado é dedicado a uma divindade e partilha da tendência da divindade. A tendência da vela pode ser detectada com a magia detectar mal e bem. O Mestre escolhe o deus e tendência associada ou determinar a tendência aleatoriamente."},{"type":"paragraph","text":"A mágica da vela é ativada quando ela é acessa, o que requer uma ação. Após queimar por 4 horas, a vela é destruída. Você pode apaga-la antes para usa-la posteriormente. Deduza o tempo que ela queimou em incrementos de 1 minuto do tempo de queima total da vela."},{"type":"table","headers":["d20","Tendência"],"rows":[["1-2","Caótico e mau"],["3-4","Caótico e neutro"],["5-7","Caótico e bom"],["8-9","Neutro e mau"],["10-11","Neutro"],["12-13","Neutro e bom"],["14-15","Leal e mau"],["16-17","Leal e neutro"],["18-20","Leal e bom"]]},{"type":"paragraph","text":"Enquanto estiver acesa, a vela emite penumbra num raio de 9 metros. Qualquer criatura dentro dessa área cuja tendência combine com a da vela realiza jogadas de ataque, testes de resistência e testes de habilidade com vantagem. Além disso, um clérigo ou druida nessa área cuja tendência combine com a da vela, pode conjurar magias de 1° nível que tenha preparado sem gastar espaços de magia, apesar do efeito da magia ser o de um conjurado com um espaço de 1° nível."},{"type":"paragraph","text":"Alternativamente, quando você acender a vela pela primeira vez, você pode conjurar a magia portal através dela. Fazer isso destruirá a vela."}]},{"id":"guia-do-mestre-item-magico-vingadora-sagrada","nome":"Vingadora Sagrada","categoria":"Item mágico","tipo":"Arma (qualquer espada)","fonte":"Guia do Mestre","pagina_livro":215,"pagina_pdf":215,"referencia":"215 (PDF: 215)","preco":null,"peso":null,"raridade":"lendária","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Quando você atinge um corruptor ou morto-vivo com ela, a criatura sofre 2d10 de dano radiante extra. Enquanto estiver empunhando a espada, ela cria uma aura de 3 metros de raio em sua volta. Você e todas as criaturas amigáveis a você dentro da aura tem vantagem nos testes de resistência contra magias ou outros efeitos mágicos. Se você tiver 17 ou mais níveis da classe paladino, o raio da aura aumenta para 9 metros. ITENS MÁGICOS INTELIGENTES Alguns itens mágicos possuem inteligência e personalidade. Tal item pode estar possuído, assombrado pelo espírito do dono anterior, ou autoconsciente graças a mágica usada para cria-lo. De qualquer forma, o item age como um personagem, possuindo sofismas de personalidade, ideias, vínculos e alguns defeitos. Um item inteligente pode ser um aliado caridoso com seu portador ou um estorvo constante ao seu lado. A maioria dos itens inteligentes são armas. Outros tipos de itens podem manifestar inteligência, mas itens c onsumíveis, como poções e pergaminhos nunca serão inteligentes. Itens mágicos inteligentes funcionam como PdMs sob controle do Mestre. Qualquer propriedade ativável do item está sob controle do item, não do usuário. Enquanto o usuário mantiver um bom relacionamento com o item, ele poderá acessar estas propriedades normalmente. Caso o relacionamento fique tenso, o item pode suprimir suas propriedades ativáveis ou mesmo usa-las contra seu portador. CRIANDO ITENS MÁGICOS INTELIGENTES Quando você decidir dar inteligência a um item mágico, você cria a persona do item da mesma forma que criaria um PdM, com algumas exceções descritas aqui. HABILIDADES Um item mágico inteligente tem valores de Inteligência, Sabedoria e Carisma. Você pode escolher as habilidades do item ou determina-las aleatoriamente. Para determina-las aleatoriamente, role 4d6 para cada uma, ignorando a pior rolagem e somando o resto. COMUNICAÇÃO Um item inteligente tem algumas habilidades para se comunicar, tanto ao partilhar suas emoções, transmitir seus pensamentos telepaticamente ou falar em voz alta. Você pode escolher como ele se comunica ou rolar na tabela a seguir. d100 Comunicação 01-60 O item se comunica ao transmitir emoções à criatura que está carregando ou empunhando-o. 61-90 O item pode falar, ler e compreender um ou mais idiomas. 91-00 O item pode falar, ler e compreender um ou mais idiomas. Além disso, ele pode se comunicar telepaticamente com qualquer personagem que esteja carregando ou empunhando-o. SENTIDOS Com inteligência vem consciência. Um item inteligente pode perceber o que está a sua volta a um alcance limitado. Você pode escolher os sentidos ou rolar na tabela a seguir. d4 Sentidos 1 Audição e visão normal com alcance de 9 metros. 2 Audição e visão normal com alcance de 18 metros. 3 Audição e visão normal com alcance de 36 metros. 4 Audição e visão no escuro com alcance de 36 metros. TENDÊNCIA Um item mágico inteligente possui uma tendência. Seu criador ou natureza pode sugerir uma tendência. Caso contrário, você pode escolher uma tendência ou rolar na tabela a seguir. Tendência Tendência d100 d100 Caótico e neutro Leal e bom Neutro e bom Leal e mau Caótico e bom Neutro e mau Caótico e mau Leal e neutro 51-63 Neutro CARACTERÍSTICAS Use as informações de criação de PdMs no capítulo 4 para desenvolver os maneirismos, traços de personalidade, ideias, vínculos e defeitos de um item inteligente. Você também pode se basear na seção \"Características Especiais\" mostrada anteriormente neste capítulo. Se você determinar essas características aleatoriamente, ignore ou adapte qualquer resultado que não faça sentido para um objeto inanimado. Você pode rolar novamente até ter um resultado satisfatório. PROPÓSITO ESPECIAL Você pode dar a um item inteligente um objetivo que ele persegue, talvez em detrimento de todos os outros. Contanto que o uso do item pelo portador esteja de acordo com o propósito especial do item, o item continuará a cooperar. Desviar do curso dele pode causar um conflito entre o portador e o item e pode, até mesmo, fazer com que o item impeça o uso de suas propriedades ativáveis. Você pode escolher um propósito ou rolar na tabela
