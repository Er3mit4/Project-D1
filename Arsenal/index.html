<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arsenal — D&D 5e</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d0b0e;
  --bg2:#1a1520;
  --bg3:#241e2c;
  --fg:#e8dcc8;
  --fg2:#a89b8a;
  --accent:#d4a44a;
  --accent2:#e8c06a;
  --card:#1c1724;
  --border:#3a2f48;
  --cantrip:#8e44ad;
  --shadow:0 2px 12px rgba(0,0,0,0.5);
  --sidebar-w:280px;
}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--fg);
  font-family:'Lora',Georgia,serif;
  line-height:1.6;
  min-height:100vh;
}

header{
  background:linear-gradient(180deg,#1a0f25 0%,#0d0b0e 100%);
  border-bottom:2px solid var(--accent);
  padding:0 1rem;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  position:sticky;
  top:38px;
  z-index:100;
}

header h1{
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:1rem;
  color:var(--accent);
  letter-spacing:0.1em;
  text-transform:uppercase;
  text-shadow:0 0 20px rgba(212,164,74,0.3);
  white-space:nowrap;
  flex-shrink:0;
}

.module-nav{
  position:sticky;
  top:0;
  z-index:120;
  display:flex;
  justify-content:center;
  gap:0.35rem;
  padding:0.4rem 0.8rem 0.35rem;
  background:linear-gradient(180deg,rgba(13,11,14,0.98),rgba(26,15,37,0.96));
  border-bottom:1px solid var(--border);
  overflow-x:auto;
  box-shadow:0 8px 18px rgba(0,0,0,0.22);
}

.module-nav a{
  position:relative;
  flex:0 0 auto;
  padding:0.3rem 0.62rem 0.42rem;
  border:1px solid transparent;
  border-radius:0;
  color:var(--fg2);
  font-family:'Cinzel',serif;
  font-size:0.66rem;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  text-decoration:none;
  transition:color 0.2s, transform 0.2s;
}

.module-nav a:hover{
  color:var(--fg);
  transform:translateY(-1px);
}

.module-nav a.active{
  color:var(--accent2);
}

.module-nav a::after{
  content:"";
  position:absolute;
  left:0.55rem;
  right:0.55rem;
  bottom:0.08rem;
  height:2px;
  background:var(--accent);
  transform:scaleX(0);
  transform-origin:center;
  transition:transform 0.22s ease;
  box-shadow:0 0 10px rgba(212,164,74,0.35);
}

.module-nav a.active::after,
.module-nav a:hover::after{
  transform:scaleX(1);
}

body.d1-enter-left{animation:d1EnterLeft 0.22s ease-out both}
body.d1-enter-right{animation:d1EnterRight 0.22s ease-out both}
body.d1-exit-left{animation:d1ExitLeft 0.16s ease-in both}
body.d1-exit-right{animation:d1ExitRight 0.16s ease-in both}

@keyframes d1EnterLeft{
  from{opacity:0;transform:translateX(-18px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes d1EnterRight{
  from{opacity:0;transform:translateX(18px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes d1ExitLeft{
  to{opacity:0;transform:translateX(-18px)}
}
@keyframes d1ExitRight{
  to{opacity:0;transform:translateX(18px)}
}

#search-box{
  flex:1;
  max-width:500px;
  margin:0 auto;
  padding:0.4rem 0.8rem;
  font-size:0.9rem;
  font-family:'Lora',serif;
  background:var(--bg2);
  color:var(--fg);
  border:1px solid var(--border);
  border-radius:6px;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}

#search-box:focus{
  border-color:var(--accent);
  box-shadow:0 0 8px rgba(212,164,74,0.25);
}

#search-box::placeholder{color:var(--fg2);opacity:0.6}

.filter-toggle-btn{
  padding:0.35rem 0.7rem;
  font-size:0.85rem;
  font-family:'Cinzel',serif;
  font-weight:700;
  background:var(--bg3);
  color:var(--fg2);
  border:1px solid var(--border);
  border-radius:4px;
  cursor:pointer;
  transition:all 0.2s;
  white-space:nowrap;
  flex-shrink:0;
}

.filter-toggle-btn:hover{background:var(--border);color:var(--fg)}

.overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.6);
  z-index:200;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
}

.overlay.show{
  opacity:1;
  pointer-events:auto;
}

.sidebar{
  position:fixed;
  top:0;right:0;bottom:0;
  width:var(--sidebar-w);
  max-width:85vw;
  background:var(--bg2);
  border-left:2px solid var(--accent);
  z-index:300;
  transform:translateX(100%);
  transition:transform 0.3s ease;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

.sidebar.open{
  transform:translateX(0);
}

.sidebar-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0.8rem 1rem;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.sidebar-header h2{
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:0.95rem;
  color:var(--accent);
  letter-spacing:0.1em;
  text-transform:uppercase;
}

.sidebar-close{
  background:none;
  border:none;
  color:var(--fg2);
  font-size:1.2rem;
  cursor:pointer;
  padding:0.2rem 0.4rem;
  border-radius:4px;
  transition:all 0.2s;
}

.sidebar-close:hover{color:var(--fg);background:var(--bg3)}

.sidebar-body{
  padding:0.8rem 1rem;
  flex:1;
  overflow-y:auto;
}

.filter-section{
  margin-bottom:1rem;
}

.filter-section.collapsible .filter-section-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
}

.filter-section.collapsible .filter-section-title::after{
  content:"\25BE";
  color:var(--fg2);
  transition:transform 0.2s;
}

.filter-section.collapsible.collapsed .filter-section-title::after{
  transform:rotate(-90deg);
}

.filter-section.collapsible.collapsed .filter-section-body{
  display:none;
}

.filter-section-title{
  width:100%;
  background:none;
  border:0;
  border-bottom:1px solid var(--border);
  text-align:left;
  font-family:'Cinzel',serif;
  font-size:0.7rem;
  color:var(--fg2);
  text-transform:uppercase;
  letter-spacing:0.12em;
  margin-bottom:0.4rem;
  padding-bottom:0.3rem;
}

.type-filter-search{
  width:100%;
  margin-bottom:0.45rem;
  padding:0.35rem 0.55rem;
  font-size:0.78rem;
  font-family:'Lora',serif;
  background:var(--bg3);
  color:var(--fg);
  border:1px solid var(--border);
  border-radius:4px;
  outline:none;
}

.type-filter-search:focus{
  border-color:var(--accent);
  box-shadow:0 0 6px rgba(212,164,74,0.2);
}

.type-filter-search::placeholder{color:var(--fg2);opacity:0.65}

.filter-section-btns{
  display:flex;
  flex-wrap:wrap;
  gap:0.3rem;
}

.filter-section.collapsible .filter-section-btns{
  max-height:18rem;
  overflow:auto;
  padding-right:0.2rem;
}

.filter-btn{
  padding:0.25rem 0.55rem;
  font-size:0.75rem;
  font-family:'Lora',serif;
  background:var(--bg3);
  color:var(--fg2);
  border:1px solid var(--border);
  border-radius:4px;
  cursor:pointer;
  transition:all 0.2s;
  white-space:nowrap;
}

.filter-btn:hover{background:var(--border);color:var(--fg)}

.filter-btn.active{
  background:var(--accent);
  color:#1a0f25;
  border-color:var(--accent);
  font-weight:700;
}

.filter-btn.active-trick{
  background:var(--cantrip);
  color:#fff;
  border-color:var(--cantrip);
  font-weight:700;
}

#stats{
  text-align:center;
  font-size:0.75rem;
  color:var(--fg2);
  padding:0.3rem 1rem;
}

#item-list{
  max-width:900px;
  margin:0 auto;
  padding:0 0.8rem 3rem;
  display:flex;
  flex-direction:column;
  gap:0.4rem;
}

.spell-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s;
}

.spell-card:hover{
  border-color:var(--accent);
  box-shadow:var(--shadow);
}

.spell-card.cantrip{border-left:3px solid var(--cantrip)}
.spell-card.leveled{border-left:3px solid var(--accent)}

.spell-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0.6rem 0.8rem;
  gap:0.5rem;
}

.spell-name{
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:0.95rem;
  color:var(--fg);
  flex:1;
}

.spell-meta{
  display:flex;
  gap:0.35rem;
  flex-shrink:0;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.badge{
  padding:0.1rem 0.4rem;
  font-size:0.65rem;
  font-family:'Cinzel',serif;
  font-weight:700;
  border-radius:3px;
  text-transform:uppercase;
  letter-spacing:0.05em;
}

.badge-level{
  background:rgba(212,164,74,0.15);
  color:var(--accent2);
  border:1px solid rgba(212,164,74,0.3);
}

.badge-cantrip{
  background:rgba(142,68,173,0.2);
  color:#bb6bd9;
  border:1px solid rgba(142,68,173,0.3);
}

.badge-school{
  background:rgba(52,152,219,0.12);
  color:#5dade2;
  border:1px solid rgba(52,152,219,0.25);
}

.badge-source{
  background:rgba(255,255,255,0.04);
  color:var(--fg2);
  border:1px solid var(--border);
}

.icon-badge{
  min-width:1.45rem;
  text-align:center;
  font-size:0.78rem;
  line-height:1.2;
  background:rgba(212,164,74,0.12);
  color:var(--accent2);
  border:1px solid rgba(212,164,74,0.32);
}

.icon-badge.magic{
  background:rgba(142,68,173,0.2);
  color:#bb6bd9;
  border-color:rgba(142,68,173,0.3);
}

.spell-detail{
  display:none;
  padding:0 0.8rem 0.8rem;
  border-top:1px solid var(--border);
  margin-top:0;
}

.spell-card.open .spell-detail{
  display:block;
  padding-top:0.6rem;
}

.detail-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0.3rem 1rem;
  margin-bottom:0.6rem;
  font-size:0.82rem;
}

.detail-label{
  color:var(--fg2);
  font-size:0.7rem;
  text-transform:uppercase;
  letter-spacing:0.08em;
}

.detail-value{color:var(--fg)}

.spell-desc{
  font-size:0.85rem;
  color:var(--fg);
  line-height:1.7;
  margin-bottom:0.5rem;
  padding-top:0.4rem;
  border-top:1px dashed var(--border);
  overflow-x:auto;
}

.spell-desc p{margin:0 0 0.6em}
.spell-desc ul{
  margin:0 0 0.75em 1.1rem;
  padding:0;
}
.spell-desc li{margin:0.15rem 0}
.desc-table{
  width:100%;
  border-collapse:collapse;
  margin:0.4rem 0 0.8rem;
  font-size:0.8rem;
}
.desc-table th,
.desc-table td{
  border:1px solid var(--border);
  padding:0.28rem 0.4rem;
  vertical-align:top;
}
.desc-table th{
  color:var(--gold);
  background:rgba(212,164,74,0.08);
  text-align:left;
  text-transform:uppercase;
  font-size:0.7rem;
  letter-spacing:0.06em;
}
.desc-table td:first-child{
  width:5.5rem;
  white-space:nowrap;
  color:var(--fg2);
}

.spell-ref{
  font-size:0.75rem;
  color:var(--fg2);
  text-align:right;
}

.spell-ref span{
  background:var(--bg3);
  padding:0.15rem 0.5rem;
  border-radius:3px;
  border:1px solid var(--border);
}

.spell-classes{
  display:flex;
  gap:0.25rem;
  flex-wrap:wrap;
  margin-top:0.3rem;
}

.class-tag{
  font-size:0.65rem;
  padding:0.1rem 0.35rem;
  border-radius:3px;
  background:var(--bg2);
  color:var(--fg2);
  border:1px solid var(--border);
}

.class-tag.tag-Arma{border-color:#c0392b;color:#e74c3c}
.class-tag.tag-Armadura{border-color:#d4a44a;color:#e8c06a}
.class-tag.tag-Equipamento{border-color:#3498db;color:#85c1e9}
.class-tag.tag-Ferramenta{border-color:#27ae60;color:#58d68d}
.class-tag.tag-Item{border-color:#8e44ad;color:#bb6bd9}
.class-tag.tag-Montaria{border-color:#1abc9c;color:#76d7c4}
.class-tag.tag-Veículo{border-color:#e67e22;color:#f0b27a}

#no-results{
  display:none;
  text-align:center;
  padding:3rem 1rem;
  color:var(--fg2);
}

#no-results .icon{font-size:3rem;margin-bottom:0.5rem}

footer{
  text-align:center;
  padding:1.5rem;
  font-size:0.75rem;
  color:var(--fg2);
  opacity:0.5;
  border-top:1px solid var(--border);
}

.expand-arrow{
  transition:transform 0.2s;
  color:var(--fg2);
  font-size:0.8rem;
}

.spell-card.open .expand-arrow{transform:rotate(90deg)}

.hidden{display:none!important}

@media(max-width:600px){
  header{
    gap:0.5rem;
    padding:0 0.5rem;
  }
  header h1{
    font-size:0.8rem;
    letter-spacing:0.05em;
  }
  #search-box{
    font-size:0.8rem;
    padding:0.3rem 0.6rem;
  }
  .filter-toggle-btn{
    font-size:0.75rem;
    padding:0.3rem 0.5rem;
  }
  .module-nav{justify-content:flex-start}
  .spell-header{flex-direction:column;align-items:flex-start}
  .spell-meta{justify-content:flex-start}
  .detail-grid{grid-template-columns:1fr}
}

@media(min-width:901px){
  .spell-card:hover{transform:translateX(2px)}
}

@media(prefers-reduced-motion:reduce){
  body.d1-enter-left,
  body.d1-enter-right,
  body.d1-exit-left,
  body.d1-exit-right{animation:none}
  .module-nav a{transition:none}
  .module-nav a::after{transition:none}
}
</style>
</head>

<script>
(function(){
  const dir = sessionStorage.getItem('d1NavDirection');
  sessionStorage.removeItem('d1NavDirection');
  if(dir === 'left' || dir === 'right'){
    document.body.classList.add('d1-enter-' + dir);
  }
})();
</script>

m","Custo","Peso"],"row":["Lanterna coberta","5 po","1kg"]},"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"]},{"id":"livro-do-jogador-equipamento-agua-benta-frasco","nome":"Água benta (frasco)","categoria":"Equipamento","tipo":"Equipamento de aventura","fonte":"Livro do Jogador","pagina_livro":152,"pagina_pdf":151,"referencia":"152 (PDF: 151)","preco":"25 po","peso":"0,5 kg","raridade":null,"sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Usando uma ação, você pode espalhar o conteúdo desse frasco em uma criatura a até 1,5 metro de você ou arremessar a até 6 metros, quebrando o frasco com o impacto. Em ambos os casos, você deve realizar um ataque à distância contra uma criatura alvo, tratando a água benta como uma arma improvisada. Se o alvo for um corruptor ou morto-vivo, ele sofre 2d6 de dano radiante. Um clérigo ou paladino pode criar água benta realizando um ritual especial. O ritual leva 1 hora para ser realizado, consome 25 po de prata em pó e exige que se gaste um espaço de magia de 1º nível.","tabela":{"headers":["Item","Custo","Peso"],"row":["Água benta (frasco)","25 po","0,5 kg"]},"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"]},{"id":"livro-do-jogador-equipamento-lanterna-furta-fogo","nome":"Lanterna furta-fogo","categoria":"Equipamento","tipo":"Equipamento de aventura","fonte":"Livro do Jogador","pagina_livro":152,"pagina_pdf":151,"referencia":"152 (PDF: 151)","preco":"10 po","peso":"1 kg","raridade":null,"sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Uma lanterna furta-fogo lança luz plena em um cone de 18 metros e penumbra por mais 18 metros. Uma vez acesa, ela queima por 6 horas usando um frasco de óleo (500 ml).","tabela":{"headers":["Item","Custo","Peso"],"row":["Lanterna furta-fogo","10 po","1 kg"]},"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"]},{"id":"livro-do-jogador-equipamento-algemas","nome":"Algemas","categoria":"Equipamento","tipo":"Equipamento de aventura","fonte":"Livro do Jogador","pagina_livro":152,"pagina_pdf":151,"referencia":"152 (PDF: 151)","preco":"2 po","peso":"2 kg","raridade":null,"sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Essas algemas de metal podem prender uma criatura Pequena ou Média. Escapar das algemas exige sucesso em um teste de Destreza CD 20. Quebrá-las exige um teste de Força CD 20 bem sucedido. Cada conjunto de algemas vem com uma chave. Sem a chave, uma criatura proficiente com ferramentas de ladrão pode abrir a fechadura das algemas com um sucesso em um teste de Destreza CD 15. As algemas têm 15 pontos de vida.","tabela":{"headers":["Item","Custo","Peso"],"row":["Algemas","2 po","2 kg"]},"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"]},{"id":"livro-do-jogador-equipamento-lente-de-aumento","nome":"Lente de aumento","categoria":"Equipamento","tipo":"Equipamento de aventura","fonte":"Livro do Jogador","pagina_livro":152,"pagina_pdf":151,"referencia":"152 (PDF: 151)","preco":"100 po","peso":null,"raridade":null,"sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Essa lente permite ver pequenos objetos mais de perto. Ela também é útil como um substituto da pederneira e isqueiro para acender fogo. Usar uma lupa para acender fogo necessita de luz tão brilhante como a luz do sol para focar, um pavio e cerca de 5 minutos. Uma lente de aumento concede vantagem em qualquer teste de habilidade feito para avaliar ou inspecionar um item que é pequeno ou muito detalhado.","tabela":{"headers":["Item","Custo","Peso"],"row":["Lente de aumento","100 po",""]},"proficiência_requerida":nul ":"3 km/h"},{"id":"guia-do-mestre-item-magico-adaga-de-envenenamento","nome":"Adaga de Envenenamento","categoria":"Item mágico","tipo":"Arma (adaga)","fonte":"Guia do Mestre","pagina_livro":150,"pagina_pdf":151,"referencia":"150 (PDF: 151)","preco":null,"peso":null,"raridade":"rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Você pode usar uma ação para fazer com que um veneno negro e viscoso cubra a lâmina. O veneno permanece por 1 minuto ou até que um ataque usando essa arma atinja uma criatura. Essa criatura deve ser bem sucedida num teste de resistência de Constituição CD 15 ou sofrerá 2d10 de dano de veneno e ficará envenenada por 1 minuto. A adaga não pode ser usada dessa forma novamente até o próximo amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (adaga), rara","descricao_blocos":[{"type":"paragraph","text":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica."},{"type":"paragraph","text":"Você pode usar uma ação para fazer com que um veneno negro e viscoso cubra a lâmina. O veneno permanece por 1 minuto ou até que um ataque usando essa arma atinja uma criatura. Essa criatura deve ser bem sucedida num teste de resistência de Constituição CD 15 ou sofrerá 2d10 de dano de veneno e ficará envenenada por 1 minuto. A adaga não pode ser usada dessa forma novamente até o próximo amanhecer."}]},{"id":"guia-do-mestre-item-magico-algemas-dimensionais","nome":"Algemas Dimensionais","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":150,"pagina_pdf":151,"referencia":"150 (PDF: 151)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Você pode usar uma ação para colocar estas algemas em uma criatura incapacitada. As algemas se ajustam em uma criatura de tamanho Pequeno a Grande. Além de servirem como grilhões mundanos, as algemas impedem uma criatura presa com elas de usar qualquer método de movimento extradimensional, incluindo teletransporte ou viagem para um plano de existência diferente. Elas não impedem a criatura de passar por um portal interdimensional. Você e qualquer criatura que você designe quando usar as algemas, pode usar uma ação para remove-las. Uma vez a cada 30 dias, a criatura presa pode realizar um teste de Força (Atletismo) CD 30. Se obtiver sucesso, a criatura se libertará e destruirá as algemas.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Você pode usar uma ação para colocar estas algemas em uma criatura incapacitada. As algemas se ajustam em uma criatura de tamanho Pequeno a Grande. Além de servirem como grilhões mundanos, as algemas impedem uma criatura presa com elas de usar qualquer método de movimento extradimensional, incluindo teletransporte ou viagem para um plano de existência diferente. Elas não impedem a criatura de passar por um portal interdimensional."},{"type":"paragraph","text":"Você e qualquer criatura que você designe quando usar as algemas, pode usar uma ação para remove-las. Uma vez a cada 30 dias, a criatura presa pode realizar um teste de Força (Atletismo) CD 30. Se obtiver sucesso, a criatura se libertará e destruirá as algemas."}]},{"id":"guia-do-mestre-item-magico-aljava-de-ehlonna","nome":"Aljava de Ehlonna","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":150,"pagina_pdf":151,"referencia":"150 (PDF: 151)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Cada um dos três compartimentos dessa aljava estão conectados a um espaço extradimensional que permite que a aljava comporte inúmeros itens sem nunca pesar mais de 1 quilo. O compartimento menor pode armazenar até sessenta flechas, virotes ou objetos similares. O compartimento do meio pode armazenar até dezoito azagaias ou objetos similares. O compartimento maior pode armazenar até seis objetos longos, como arcos, bordões ou lanças. Você pode sacar um item contido na aljava como se estivesse o tirando de uma aljava ou bainha comum.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Cada um dos três compartimentos dessa aljava estão conectados a um espaço extradimensional que permite que a aljava comporte inúmeros itens sem nunca pesar mais de 1 quilo. O compartimento menor pode armazenar até sessenta flechas, virotes ou objetos similares. O compartimento do meio pode armazenar até dezoito azagaias ou objetos similares. O compartimento maior pode armazenar até seis objetos longos, como arcos, bordões ou lanças."},{"type":"paragraph","text":"Você pode sacar um item contido na aljava como se estivesse o tirando de uma aljava ou bainha comum."}]},{"id":"guia-do-mestre-item-magico-amuleto-de-protecao-contra-deteccao-e-localizacao","nome":"Amuleto de Proteção contra Detecção e Localização","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":150,"pagina_pdf":151,"referencia":"150 (PDF: 151)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este amuleto, você fica escondido contra magias de adivinhação. Você não pode ser alvo de tais magias ou ser percebido através de sensores de espionagem mágicos.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este amuleto, você fica escondido contra magias de adivinhação. Você não pode ser alvo de tais magias ou ser percebido através de sensores de espionagem mágicos."}]},{"id":"guia-do-mestre-item-magico-amuleto-de-saude","nome":"Amuleto de Saúde","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":150,"pagina_pdf":151,"referencia":"150 (PDF: 151)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Seu valor de Constituição é 19 enquanto você usar este amuleto. Ele não produz qualquer efeito em você se seu valor de Constituição já for 19 ou maior sem ele.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Seu valor de Constituição é 19 enquanto você usar este amuleto. Ele não produz qualquer efeito em você se seu valor de Constituição já for 19 ou maior sem ele."}]},{"id":"guia-do-mestre-item-magico-amuleto-dos-planos","nome":"Amuleto dos Planos","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":150,"pagina_pdf":151,"referencia":"150 (PDF: 151)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este amuleto, você pode usar uma ação para nomear um local com o qual você seja familiarizado em outro plano de existência. Então, realize um teste de Inteligência CD 15. Se for bem sucedido, você conjura a magia viagem planar. Se fracassar, você e cada criatura e objeto a até 4,5 metros de você viajam para um destino aleatório. Role um d100. Entre 1-60, você viaja para um local aleatório no plano escolhido. Entre 61-100, você viaja para um plano de existência determinado aleatoriamente.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, muito raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este amuleto, você pode usar uma ação para nomear um local com o qual você seja familiarizado em outro plano de existência. Então, realize um teste de Inteligência CD 15. Se for bem sucedido, você conjura a magia viagem planar. Se fracassar, você e cada criatura e objeto a até 4,5 metros de você viajam para um destino aleatório. Role um d100. Entre 1-60, você viaja para um local aleatório no plano escolhido. Entre 61-100, você viaja para um plano de existência determinado aleatoriamente."}]},{"id":"guia-do-mestre-item-magico-anel-de-acao-livre","nome":"Anel de Ação Livre","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":151,"pagina_pdf":152,"referencia":"151 (PDF: 152)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este anel, terreno difícil não custa deslocamento extra para você. Além disso, magia não pode nem reduzir seu deslocamento nem te deixar paralisado ou impedido.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este anel, terreno difícil não custa deslocamento extra para você. Além disso, magia não pode nem reduzir seu deslocamento nem te deixar paralisado ou impedido."}]},{"id":"guia-do-mestre-item-magico-anel-de-a nel não está mais armazenada nele, liberando os espaços.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este anel armazena magias conjuradas nele, mantendo-as até que o usuário sintonizado use-as. O anel pode armazenar até 5 níveis de magias por vez. Quando é encontrado, ele conterá 1d6-1 níveis de magia armazenados, escolhidas pelo Mestre."},{"type":"paragraph","text":"Qualquer criatura pode conjurar uma magia de 1° até 5° nível no anel ao toca-lo enquanto a magia é conjurada. A magia não produz efeito, além do de ser armazenada no anel. Se o anel não puder conter a magia, a magia é gasta sem surtir efeito. O nível da magia usado para conjura-la determina quantos espaços são usados."},{"type":"paragraph","text":"Enquanto estiver usando este anel, você pode conjurar qualquer magia armazenada nele. A magia usa o nível de magia, CD de magia, bônus de ataque de magia e habilidade de conjuração do conjurador original, mas, no resto, é tratada como se você tivesse conjurado a magia. A magia conjurada através do anel não está mais armazenada nele, liberando os espaços."}]},{"id":"guia-do-mestre-item-magico-anel-de-calor","nome":"Anel de Calor","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":151,"pagina_pdf":152,"referencia":"151 (PDF: 152)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este anel, você tem resistência a dano de frio. Além disso, você e tudo que você estiver vestindo ou carregando não sofre dano de temperaturas abaixo de-46 graus célsius.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este anel, você tem resistência a dano de frio. Além disso, você e tudo que você estiver vestindo ou carregando não sofre dano de temperaturas abaixo de-46 graus célsius."}]},{"id":"guia-do-mestre-item-magico-anel-de-cativar-animais","nome":"Anel de Cativar Animais","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":151,"pagina_pdf":152,"referencia":"151 (PDF: 152)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este anel possui 3 cargas e recupera 1d3 cargas gastas diariamente ao amanhecer. Enquanto estiver usando o anel, você pode usar uma ação para gastar 1 de suas cargas para conjurar uma das seguintes magias: Amizade animal (CD de resistência 13) Medo (CD de resistência 13), afetando apenas bestas que tiverem Inteligência 3 ou inferior Falar com animais","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, raro","descricao_blocos":[{"type":"paragraph","text":"Este anel possui 3 cargas e recupera 1d3 cargas gastas diariamente ao amanhecer. Enquanto estiver usando o anel, você pode usar uma ação para gastar 1 de suas cargas para conjurar uma das seguintes magias:"},{"type":"list","items":["Amizade animal (CD de resistência 13)","Medo (CD de resistência 13), afetando apenas bestas que tiverem Inteligência 3 ou inferior","Falar com animais"]}]},{"id":"guia-do-mestre-item-magico-anel-de-comandar-elementais","nome":"Anel de Comandar Elementais","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":151,"pagina_pdf":152,"referencia":"151 (PDF: 152)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este anel está ligado a um dos quatro Planos Elementais. O Mestre escolhe ou determina aleatoriamente a qual plano ele está ligado. Enquanto estiver usando este anel, você tem vantagem nas jogadas de ataque contra elementais do plano ao qual ele é ligado e eles tem desvantagem nas jogadas de ataque contra você. Além disso, você tem acesso a propriedades baseadas no plano de ligação. O anel tem 5 cargas. Ele recupera 1d4 + 1 cargas gastas diariamente ao amanhecer. As magias conjuradas através do anel tem CD de resistência 17. Anel de Comandar Elementais do Ar. Você pode gastar 2 cargas do anel para conjurar dominar monstro em um elemental do ar. Além disso, quando você cair, você desce a 18 metros por rodada e não sofre dano de queda. Você também pode falar e compreender Auran. Se você ajudar a matar um elemental do ar enquanto estiver sintonizado com o anel, você ganha acesso as seguintes propriedades adicionais: Você tem resistência a dano elétrico. Você tem um deslocamento de voo igual ao seu deslocamento de caminhada e pode planar. Você pode conjurar as seguintes magias através do anel, gastando a quantidade necessária de cargas: corrente de relâmpagos (3 cargas), lufada de vento (2 cargas) ou muralha de vento (1 carga). Anel de Comandar Elementais da Terra. Você pode gastar 2 cargas do anel para conjurar dominar monstro em um elemental da terra. Além disso, você pode se mover em terreno difícil composto de escombros, pedras ou terra como se fosse terreno normal. Você também pode falar e compreender Terran. Se você ajudar a matar um elemental da terra enquanto estiver sintonizado com o anel, você ganha acesso as seguintes propriedades adicionais: Você tem resistência a dano de ácido. Você pode se mover através de terra sólida ou rocha como se fosse área de terreno difícil. Se você terminar seu turno ai, você é cuspido fora para o espaço desocupado mais próximo que você ocupou antes. Você pode conjurar as seguintes magias através do anel, gastando a quantidade necessária de cargas: moldar rochas (2 cargas), muralha de pedra (3 carga) ou pele de pedra (3 cargas). Anel de Comandar Elementais do Fogo. Você pode gastar 2 cargas do anel para conjurar dominar monstro em um elemental do fogo. Além disso, você tem resistência a dano de fogo. Você também pode falar e compreender Ignan. Se você ajudar a matar um elemental do fogo enquanto estiver sintonizado com o anel, você ganha acesso as seguintes propriedades adicionais: Você é imune a dano de fogo. Você pode conjurar as seguintes magias através do anel, gastando a quantidade necessária de cargas: bola de fogo (2 carga), mãos flamejantes (1 cargas) ou muralha de fogo (3 cargas). fg(g) Anel de Comandar Elementais da Água. Você pode gastar 2 cargas do anel para conjurar dominar monstro em um elemental do água. Além disso, você pode ficar parado ou andar através de superfícies líquidas como se fosse solo firme. Você também pode falar e compreender Aquan. Se você ajudar a matar um elemental da água enquanto estiver sintonizado com o anel, você ganha acesso as seguintes propriedades adicionais: Você pode respirar embaixo d'água e tem deslocamento de natação igual ao seu deslocamento de caminhada. Você pode conjurar as seguintes magias através do anel, gastando a quantidade necessária de cargas: criar ou destruir água (1 cargas), controlar a água (3 cargas), muralha de gelo (3 carga) ou tempestade de gelo (2 cargas).","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, lendário (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este anel está ligado a um dos quatro Planos Elementais. O Mestre escolhe ou determina aleatoriamente a qual plano ele está ligado."},{"type":"paragraph","text":"Enquanto estiver usando este anel, você tem vantagem nas jogadas de ataque contra elementais do plano ao qual ele é ligado e eles tem desvantagem nas jogadas de ataque contra você. Além disso, pedra (3 cargas)."},{"type":"paragraph","text":"Anel de Comandar Elementais do Fogo. Você pode gastar 2 cargas do anel para conjurar dominar monstro em um elemental do fogo. Além disso, você tem resistência a dano de fogo. Você também pode falar e compreender Ignan."},{"type":"paragraph","text":"Se você ajudar a matar um elemental do fogo enquanto estiver sintonizado com o anel, você ganha acesso as seguintes propriedades adicionais:"},{"type":"list","items":["Você é imune a dano de fogo.","Você pode conjurar as seguintes magias através do anel, gastando a quantidade necessária de cargas: bola de fogo (2 carga), mãos flamejantes (1 cargas) ou muralha de fogo (3 cargas)."]},{"type":"paragraph","text":"fg(g) Anel de Comandar Elementais da Água. Você pode gastar 2 cargas do anel para conjurar dominar monstro em um elemental do água. Além disso, você pode ficar parado ou andar através de superfícies líquidas como se fosse solo firme. Você também pode falar e compreender Aquan."},{"type":"paragraph","text":"Se você ajudar a matar um elemental da água enquanto estiver sintonizado com o anel, você ganha acesso as seguintes propriedades adicionais:"},{"type":"list","items":["Você pode respirar embaixo d'água e tem deslocamento de natação igual ao seu deslocamento de caminhada.","Você pode conjurar as seguintes magias através do anel, gastando a quantidade necessária de cargas: criar ou destruir água (1 cargas), controlar a água (3 cargas), muralha de gelo (3 carga) ou tempestade de gelo (2 cargas)."]}]},{"id":"guia-do-mestre-item-magico-anel-de-escudo-mental","nome":"Anel de Escudo Mental","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":152,"pagina_pdf":153,"referencia":"152 (PDF: 153)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este anel, você é imune a magias que permitam que outras criaturas leiam seus pensamentos, determinem se você está mentindo, saibam sua tendência ou conheçam seu tipo de criatura. Criaturas só pode se comunicar telepaticamente com você se você permitir. Você pode usar uma ação para fazer com que o anel fique invisível até você usar outra ação para torna-lo visível, até remove-lo ou quando você morrer. Se você morrer enquanto usa o anel, sua alma entra nele, a não ser que já exista uma alma nele. Você pode permanecer no anel ou partir para o pós vida. Enquanto sua alma permanecer no anel, você pode se comunicar telepaticamente com qualquer criatura que estiver usando ele. Um usuário não pode impedir esta comunicação telepática.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este anel, você é imune a magias que permitam que outras criaturas leiam seus pensamentos, determinem se você está mentindo, saibam sua tendência ou conheçam seu tipo de criatura. Criaturas só pode se comunicar telepaticamente com você se você permitir."},{"type":"paragraph","text":"Você pode usar uma ação para fazer com que o anel fique invisível até você usar outra ação para torna-lo visível, até remove-lo ou quando você morrer."},{"type":"paragraph","text":"Se você morrer enquanto usa o anel, sua alma entra nele, a não ser que já exista uma alma nele. Você pode permanecer no anel ou partir para o pós vida. Enquanto sua alma permanecer no anel, você pode se comunicar telepaticamente com qualquer criatura que estiver usando ele. Um usuário não pode impedir esta comunicação telepática."}]},{"id":"guia-do-mestre-item-magico-anel-de-estrelas-cadentes","nome":"Anel de Estrelas Cadentes","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":152,"pagina_pdf":153,"referencia":"152 (PDF: 153)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este anel sob penumbra ou escuridão, você pode conjurar globos de luz ou luz através dele, à vontade. Conjurar qualquer dessas magias através do anel requer uma ação. O anel tem 6 cargas para as propriedades a seguir. O anel recupera 1d6 cargas gastas diariamente ao amanhecer. Fogo das Fadas. Você pode gastar 1 carga com uma ação para conjurar fogo das fadas através do anel. Bola de Eletricidade. Você pode gastar 2 cargas com uma ação para criar de uma a quatro esferas de 1 metro de diâmetro de eletricidade. Quanto mais esferas você criar, menos poderosas cada uma delas será individualmente. Cada esfera aparece em um espaço desocupado que você possa ver, a até 36 metros de você. As esferas duram enquanto você se concentrar, até 1 minuto. Cada esfera emite penumbra num raio de 9 metros. Com uma ação bônus, você pode movimentar cada esfera até 9 metros, mas não além de 36 metros de você. Quando uma criatura, diferente de você, se aproxima a 1,5 metro de uma esfera, a esfera descarrega eletricidade na criatura e desaparece. A criatura deve realizar um teste de resistência de Destreza CD 15. Se falhar na resistência, a criatura sofre dano elétrico baseado na quantidade de esferas criadas. 1 4d12 2 5d4 3 2d6 4 2d4 Estrelas Cadentes. Você pode gastar de 1 a 3 cargas com uma ação. Para cada carga gasta, você arremessa um fagulha brilhante de luz através do anel em um ponto que você possa ver, a até 18 metros de você. Cada criatura num cubo de 4,5 metros originado no ponto é banhada por faíscas e deve realizar um teste de resistência de Destreza CD 15, sofrendo 5d4 de dano de fogo se falhar na resistência, ou metade desse dano se obtiver sucesso.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, muito raro (requer sintonização ao ar livre durante a noite)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este anel sob penumbra ou escuridão, você pode conjurar globos de luz ou luz através dele, à vontade. Conjurar qualquer dessas magias através do anel requer uma ação."},{"type":"paragraph","text":"O anel tem 6 cargas para as propriedades a seguir. O anel recupera 1d6 cargas gastas diariamente ao amanhecer."},{"type":"paragraph","text":"Fogo das Fadas. Você pode gastar 1 carga com uma ação para conjurar fogo das fadas através do anel."},{"type":"paragraph","text":"Bola de Eletricidade. Você pode gastar 2 cargas com uma ação para criar de uma a quatro esferas de 1 metro de diâmetro de eletricidade. Quanto mais esferas você criar, menos poderosas cada uma delas será individualmente."},{"type":"paragraph","text":"Cada esfera aparece em um espaço desocupado que você possa ver, a até 36 metros de você. As esferas duram enquanto você se concentrar, até 1 minuto. Cada esfera emite penumbra num raio de 9 metros."},{"type":"paragraph","text":"Com uma ação bônus, você pode movimentar cada esfera até 9 metros, mas não além de 36 metros de você. Quando uma criatura, diferente de você, se aproxima a 1,5 metro de uma esfera, a esfera descarrega eletricidade na criatura e desaparece. A criatura deve realizar um teste de resistência de Destreza CD 15. Se falhar na resistência, a criatura sofre dano elétrico baseado na quantidade de esferas criadas."},{"type":"table","headers":["Esferas","Dano Elétrico"],"rows":[["1","4d12"],["2","5d4"],["3","2d6"],["4","2d4"]]},{"type":"paragraph","text":"Estrelas Cadentes. Você pode gastar de 1 a 3 cargas com uma ação. Para cada carga gasta, você arremessa um fagulha brilhante de luz através do anel em um ponto que você possa ver, a até 18 metros de você. Cada criatura num cubo de 4,5 metros originado no ponto é banhada por faíscas e deve realizar um teste de resistência de Destreza CD 15, sofrendo 5d4 de dano de fogo se falhar na resistência, ou metade desse dano se obtiver sucesso."}]},{"id":"guia-do-mestre-item-magico-anel-de-evasao","nome":"Anel de Evasão","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":153,"pagina_pdf":154,"referencia":"153 (PDF: 154)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este anel tem 3 cargas e recupera 1d3 cargas gastas diariamente ao amanhecer. Quando fracassa num teste de resistência de Destreza enquanto estiver usando ele, você pode usar sua reação para gastar 1 das cargas dele para obter sucesso no teste de resistência, ao invés.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este anel tem 3 cargas e recupera 1d3 cargas gastas diariamente ao amanhecer. Quando fracassa num teste de resistência de Destreza enquanto estiver usando ele, você pode usar sua reação para gastar 1 das cargas dele para obter sucesso no teste de resistência, ao invés."}]},{"id":"guia-do-mestre-item-magico-anel-de-invisibilidade","nome":"Anel de Invisibilidade","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":153,"pagina_pdf":154,"referencia":"153 (PDF: 154)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este anel, você pode ficar invisível com uma ação. Tudo que você estiver vestindo ou carregando fica invisível com você. Você permanece invisível até o anel ser removido, até você atacar ou conjurar uma magia ou até você usar uma ação para ficar visível novamente.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, lendário (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este anel, você pode ficar invisível com uma ação. Tudo que você estiver vestindo ou carregando fica invisível com você. Você permanece invisível até o anel ser removido, até você atacar ou conjurar uma magia ou até você usar uma ação para ficar visível novamente."}]},{"id":"guia-do-mestre-item-magico-anel-de-invocacao-de-djinni","nome":"Anel de Invocação de Djinni","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":153,"pagina_pdf":154,"referencia":"153 (PDF: 154)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este anel, você pode falar a palavra de comando dele, com uma ação, para invocar um djinni em particular do Plano Elemental do Ar. O djinni aparece em um espaço desocupado, à sua escolha, a até 18 metros de você. Ele permanece enquanto você se concentrar (como se estivesse se concentrando em uma magia), até o máximo de 1 hora, ou até cair a 0 pontos de vida. Ele então, retorna para o seu plano natal. Quando for invocado, o djinni será amigável a você e aos se us companheiros. Ele obedece qualquer comando que você der, independentemente do idioma que você usar. Se você falhar em comanda-lo, o djinni se defenderá contra atacantes, mas não fará nenhuma ação. Após o djinni partir, ele não poderá ser invocado novame nte por 24 horas, e o anel se torna não-mágico se o djinni morrer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, lendário (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este anel, você pode falar a palavra de comando dele, com uma ação, para invocar um djinni em particular do Plano Elemental do Ar. O djinni aparece em um espaço desocupado, à sua escolha, a até 18"},{"type":"paragraph","text":"metros de você. Ele permanece enquanto você se concentrar (como se estivesse se concentrando em uma magia), até o máximo de 1 hora, ou até cair a 0 pontos de vida. Ele então, retorna para o seu plano natal."},{"type":"paragraph","text":"Quando for invocado, o djinni será amigável a você e aos se us companheiros. Ele obedece qualquer comando que você der, independentemente do idioma que você usar. Se você falhar em comanda-lo, o djinni se defenderá contra atacantes, mas não fará nenhuma ação."},{"type":"paragraph","text":"Após o djinni partir, ele não poderá ser invocado novame nte por 24 horas, e o anel se torna não-mágico se o djinni morrer."}]},{"id":"guia-do-mestre-item-magico-anel-de-natacao","nome":"Anel de Natação","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":153,"pagina_pdf":154,"referencia":"153 (PDF: 154)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Você tem deslocamento de natação de 12 metros enquanto estiver usando este anel.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, incomum","descricao_blocos":[{"type":"paragraph","text":"Você tem deslocamento de natação de 12 metros enquanto estiver usando este anel."}]},{"id":"guia-do-mestre-item-magico-anel-de-protecao","nome":"Anel de Proteção","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":153,"pagina_pdf":154,"referencia":"153 (PDF: 154)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você recebe +1 de bônus na CA e nos testes de resistência enquanto estiver usando este anel.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, raro (r o_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este anel, você tem vantagem em testes de resistência contra qualquer magia que tenha apenas você como alvo (não em uma área de efeito). Além disso, se você rolar um 20 em um teste de resistência e a magia for de 7° nível o inferior, a magia não produz efeito em você e, ao invés disso, tem o conjurador como alvo, usando o espaço de magia, CD de resistência da magia, bônus de ataque e habilidade de conjuração do conjurador."}]},{"id":"guia-do-mestre-item-magico-anel-de-regeneracao","nome":"Anel de Regeneração","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":154,"pagina_pdf":155,"referencia":"154 (PDF: 155)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este anel, você recupera 1d6 pontos de vida a cada 10 minutos, considerando que você esteja com pelo menos 1 ponto de vida. Se você perder uma parte do corpo, o anel faz com que a parte perdida cresça novamente e volte a ser totalmente funcional após 1d6 + 1 dias, caso você esteja com pelo menos 1 ponto de vida durante todo esse período.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, muito raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este anel, você recupera 1d6 pontos de vida a cada 10 minutos, considerando que você esteja com pelo menos 1 ponto de vida. Se você perder uma parte do corpo, o anel faz com que a parte perdida cresça novamente e volte a ser totalmente funcional após 1d6 + 1 dias, caso você esteja com pelo menos 1 ponto de vida durante todo esse período."}]},{"id":"guia-do-mestre-item-magico-anel-de-resistencia","nome":"Anel de Resistência","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":154,"p rar a magia salto através dele, com uma ação bônus, à vontade, mas só pode afetar a si mesmo."}]},{"id":"guia-do-mestre-item-magico-anel-de-telecinesia","nome":"Anel de Telecinésia","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":154,"pagina_pdf":155,"referencia":"154 (PDF: 155)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este anel, você pode conjurar a magia telecinésia, à vontade, mas só pode ter objetos que não estão sendo vestidos ou carregados como alvo.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, muito raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este anel, você pode conjurar a magia telecinésia, à vontade, mas só pode ter objetos que não estão sendo vestidos ou carregados como alvo."}]},{"id":"guia-do-mestre-item-magico-anel-de-visao-de-raio-x-x","nome":"Anel de Visão de Raio-x-x","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":154,"pagina_pdf":155,"referencia":"154 (PDF: 155)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este anel, você pode usar uma ação para falar a palavra de comando. Quando o fizer, você pode ver através de matéria solida por 1 minuto. Esta visão tem um raio de 9 metros. Para você, objetos sólidos dentro desse raio parecem transparentes e não impedem que a luz passe através deles. A visão pode penetrar 30 centímetros de pedra, 2,5 centímetros de metal comum ou até 90 centímetros de madeira ou terra. Substancias mais densas bloqueiam a visão, como uma fina camada de chumbo. Sempre que você usar o anel novamente antes de terminar um descanso longo, você deve ser bem sucedido num teste de resistência o. O anel realiza um teste de Força com +5 de bônus para cada carga que você gastar.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este anel tem 3 cargas e recupera 1d3 cargas gastas diariamente ao amanhecer. Enquanto estiver usando este anel, você pode usar uma ação para gastar de 1 a 3 cargas dele para atacar uma criatura que você possa ver, a até 18 metros de você. O anel cria uma cabeça de carneiro espectral e realiza uma jogada de ataque com +7 de bônus. Se atingir, para cada carga que você gastou, o alvo sofre 2d10 de dano de energia e é empurrado 1,5 metro para trás."},{"type":"paragraph","text":"Alternativamente, você pode gastar de 1 a 3 cargas do anel, com uma ação, para tentar quebrar um objeto que você possa ver, a até 18 metros de você, que não esteja sendo vestido ou carregado. O anel realiza um teste de Força com +5 de bônus para cada carga que você gastar."}]},{"id":"guia-do-mestre-item-magico-anel-dos-tres-desejos","nome":"Anel dos Três Desejos","categoria":"Item mágico","tipo":"Anel","fonte":"Guia do Mestre","pagina_livro":154,"pagina_pdf":155,"referencia":"154 (PDF: 155)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este anel, você pode usar uma ação para gastar 1 de suas 3 cargas para conjurar a magia desejo através dele. O anel torna-se não-mágico quando você usar a última carga.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Anel, lendário","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este anel, você pode usar uma ação para gastar 1 de suas 3 cargas para conjurar a magi
