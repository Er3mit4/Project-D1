a seguir. d10 Propósito 1 Tendencioso. O item busca derrotar ou destruir aqueles de uma tendência diametralmente oposta. (Tal item nunca será neutro.) 2 Caçador. O item busca derrotar ou destruir criaturas de um tipo em particular, como corruptores, metamorfose, trolls ou magos. 3 Protetor. O item busca defender uma raça ou espécie de criatura em particular, como elfos ou druidas. 4 Cruzado. O item busca derrotar, enfraquecer ou destruir os servos de uma divindade em particular. 5 Templário. O item busca defender os servos e interesses de uma divindade em particular. 6 Destruidor. O item almeja destruição e usa seu portador para lutar arbitrariamente. 7 Busca de Glória. O item busca renome como o maior item mágico do mundo, estabelecendo seu usuário como uma figura famosa ou notória. 8 Busca de Conhecimento. O item almeja conhecimento ou está determinado a resolver um mistério, aprender um segredo ou desvendar uma profecia oculta. 9 Busca do Destino. O item está convencido que ele e seu portador têm papeis importantes em eventos futuros. 10 Busca do Criador. O item busca seu criador e deseja compreender porque foi criado. CONFLITO Um item inteligente possui vontade própria, moldada por sua personalidade e tendência. Caso seu portador aja de uma maneira oposta a tendência ou propósito do item, um conflito pode surgir. Quando tal conflito ocorrer, o item realiza um teste de Carisma resistido por um teste de Carisma do portador. Se o item vender a disputa, ele fará uma ou mais das exigências seguintes: O item insiste em ser carregado ou vestido o tempo todo. O item exige que seu portador se desfaça de algo que o item considere repugnante. O item exige que seu portador persiga os objetivos do item em detrimento de todos os outros objetivos. O item exige que seja dado para outra pessoa. Se o portador se recusar a obedecer os desejos do item, ele pode fazer algo ou tudo a seguir: Tornar impossível para seu portador se sintonizar a ele. Suprimir uma ou mais de suas propriedades ativáveis. Tentar tomar controle do seu portador. Se um item inteligente tentar tomar controle de seu portador, o portador deve realizar um teste de resistência de Carisma, com CD igual a 12 + o modificador de Carisma do item. Se falhar na resistência, o portador fica enfeitiçado pelo item por 1d12 horas. Enquanto estiver enfeitiçado, o portador deve tentar seguir os comandos do item. Se o portador sofrer dano, ele pode repetir o teste de resistência, terminado o efeito se obtiver sucesso. Independentemente da tentativa de controlar seu usuário ser bem ou mal sucedida, o item não pode usar este poder novamente até o próximo amanhecer. EXEMPLOS DE ITENS INTELIGENTES As armas inteligentes descritas aqui possuem histórias lendárias.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (qualquer espada), lendária (requer sintonização com um paladino)","descricao_blocos":[{"type":"paragraph","text":"Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Quando você atinge um corruptor ou morto-vivo com ela, a criatura sofre 2d10 de dano radiante extra."},{"type":"paragraph","text":"Enquanto estiver empunhando a espada, ela cria uma aura de 3 metros de raio em sua volta. Você e todas as criaturas amigáveis a você dentro da aura tem vantagem nos testes de resistência contra magias ou outros efeitos mágicos. Se você tiver 17 ou mais níveis da classe paladino, o raio da aura aumenta para 9 metros."},{"type":"paragraph","text":"ITENS MÁGICOS INTELIGENTES"},{"type":"paragraph","text":"Alguns itens mágicos possuem inteligência e personalidade. Tal item pode estar possuído, assombrado pelo espírito do dono anterior, ou autoconsciente graças a mágica usada para cria-lo. De qualquer forma, o item age como um personagem, possuindo sofismas de personalidade, ideias, vínculos e alguns defeitos. Um item inteligente pode ser um aliado caridoso com seu portador ou um estorvo constante ao seu lado."},{"type":"paragraph","text":"A maioria dos itens inteligentes são armas. Outros tipos de itens podem manifestar inteligência, mas itens c onsumíveis, como poções e pergaminhos nunca serão inteligentes."},{"type":"paragraph","text":"Itens mágicos inteligentes funcionam como PdMs sob controle do Mestre. Qualquer propriedade ativável do item está sob controle do item, não do usuário. Enquanto o usuário mantiver um bom relacionamento com o item, ele poderá acessar estas propriedades normalmente. Caso o relacionamento fique tenso, o item pode suprimir suas propriedades ativáveis ou mesmo usa-las contra seu portador."},{"type":"paragraph","text":"CRIANDO ITENS MÁGICOS INTELIGENTES"},{"type":"paragraph","text":"Quando você decidir dar inteligência a um item mágico, você cria a persona do item da mesma forma que criaria um PdM, com algumas exceções descritas aqui."},{"type":"paragraph","text":"HABILIDADES"},{"type":"paragraph","text":"Um item mágico inteligente tem valores de Inteligência, Sabedoria e Carisma. Você pode escolher as habilidades do item ou determina-las aleatoriamente. Para determina-las aleatoriamente, role 4d6 para cada uma, ignorando a pior rolagem e somando o resto."},{"type":"paragraph","text":"COMUNICAÇÃO"},{"type":"paragraph","text":"Um item inteligente tem algumas habilidades para se comunicar, tanto ao partilhar suas emoções, transmitir seus pensamentos telepaticamente ou falar em voz alta. Você pode escolher como ele se comunica ou rolar na tabela a seguir."},{"type":"table","headers":["d100","Comunicacao"],"rows":[["01-60","O item se comunica ao transmitir emoções à criatura que está carregando ou empunhando-o."],["61-90","O item pode falar, ler e compreender um ou mais idiomas."],["91-00","O item pode falar, ler e compreender um ou mais idiomas. Além disso, ele pode se comunicar telepaticamente com qualquer personagem que esteja carregando ou empunhando-o."]]},{"type":"paragraph","text":"SENTIDOS"},{"type":"paragraph","text":"Com inteligência vem consciência. Um item inteligente pode perceber o que está a sua volta a um alcance limitado. Você pode escolher os sentidos ou rolar na tabela a seguir."},{"type":"table","headers":["d4","Sentidos"],"rows":[["1","Audição e visão normal com alcance de 9 metros."],["2","Audição e visão normal com alcance de 18 metros."],["3","Audição e visão normal com alcance de 36 metros."],["4","Audição e visão no escuro com alcance de 36 metros."]]},{"type":"paragraph","text":"TENDÊNCIA"},{"type":"paragraph","text":"Um item mágico inteligente possui uma tendência. Seu criador ou natureza pode sugerir uma tendência. Caso contrário, você pode escolher uma tendência ou rolar na tabela a seguir."},{"type":"paragraph","text":"Tendência"},{"type":"paragraph","text":"Tendência"},{"type":"paragraph","text":"d100"},{"type":"paragraph","text":"d100"},{"type":"paragraph","text":"Caótico e neutro"},{"type":"paragraph","text":"Leal e bom"},{"type":"paragraph","text":"Neutro e bom"},{"type":"paragraph","text":"Leal e mau"},{"type":"paragraph","text":"Caótico e bom"},{"type":"paragraph","text":"Neutro e mau"},{"type":"paragraph","text":"Caótico e mau"},{"type":"paragraph","text":"Leal e neutro"},{"type":"paragraph","text":"51-63"},{"type":"paragraph","text":"Neutro"},{"type":"paragraph","text":"CARACTERÍSTICAS"},{"type":"paragraph","text":"Use as informações de criação de PdMs no capítulo 4 para desenvolver os maneirismos, traços de personalidade, ideias, vínculos e defeitos de um item inteligente. Você também pode se basear na seção \"Características Especiais\" mostrada anteriormente neste capítulo."},{"type":"paragraph","text":"Se você determinar essas características aleatoriamente, ignore ou adapte qualquer resultado que não faça sentido para um objeto inanimado. Você pode rolar novamente até ter um resultado satisfatório."},{"type":"paragraph","text":"PROPÓSITO ESPECIAL"},{"type":"paragraph","text":"Você pode dar a um item inteligente um objetivo que ele persegue, talvez em detrimento de todos os outros. Contanto que o uso do item pelo portador esteja de acordo com o propósito especial do item, o item continuará a cooperar. Desviar do curso dele pode causar um conflito entre o portador e o item e pode, até mesmo, fazer com que o item impeça o uso de suas propriedades ativáveis. Você pode escolher um propósito ou rolar na tabela a seguir."},{"type":"table","headers":["d10","Proposito"],"rows":[["1","Tendencioso. O item busca derrotar ou destruir aqueles de uma tendência diametralmente oposta. (Tal item nunca será neutro.)"],["2","Caçador. O item busca derrotar ou destruir criaturas de um tipo em particular, como corruptores, metamorfose, trolls ou magos."],["3","Protetor. O item busca defender uma raça ou espécie de criatura em particular, como elfos ou druidas."],["4","Cruzado. O item busca derrotar, enfraquecer ou destruir os servos de uma divindade em particular."],["5","Templário. O item busca defender os servos e interesses de uma divindade em particular."],["6","Destruidor. O item almeja destruição e usa seu portador para lutar arbitrariamente."],["7","Busca de Glória. O item busca renome como o maior item mágico do mundo, estabelecendo seu usuário como uma figura famosa ou notória."],["8","Busca de Conhecimento. O item almeja conhecimento ou está determinado a resolver um mistério, aprender um segredo ou desvendar uma profecia oculta."],["9","Busca do Destino. O item está convencido que ele e seu portador têm papeis importantes em eventos futuros."],["10","Busca do Criador. O item busca seu criador e deseja compreender porque foi criado."]]},{"type":"paragraph","text":"CONFLITO"},{"type":"paragraph","text":"Um item inteligente possui vontade própria, moldada por sua personalidade e tendência. Caso seu portador aja de uma maneira oposta a tendência ou propósito do item, um conflito pode surgir. Quando tal conflito ocorrer, o item realiza um teste de Carisma resistido por um teste de Carisma do portador. Se o item vender a disputa, ele fará uma ou mais das exigências seguintes:"},{"type":"list","items":["O item insiste em ser carregado ou vestido o tempo todo.","O item exige que seu portador se desfaça de algo que o item considere repugnante.","O item exige que seu portador persiga os objetivos do item em detrimento de todos os outros objetivos.","O item exige que seja dado para outra pessoa."]},{"type":"paragraph","text":"Se o portador se recusar a obedecer os desejos do item, ele pode fazer algo ou tudo a seguir:"},{"type":"list","items":["Tornar impossível para seu portador se sintonizar a ele.","Suprimir uma ou mais de suas propriedades ativáveis.","Tentar tomar controle do seu portador."]},{"type":"paragraph","text":"Se um item inteligente tentar tomar controle de seu portador, o portador deve realizar um teste de resistência de Carisma, com CD igual a 12 + o modificador de Carisma do item. Se falhar na resistência, o portador fica enfeitiçado pelo item por 1d12 horas. Enquanto estiver enfeitiçado, o portador deve tentar seguir os comandos do item. Se o portador sofrer dano, ele pode repetir o teste de resistência, terminado o efeito se obtiver sucesso. Independentemente da tentativa de controlar seu usuário ser bem ou mal sucedida, o item não pode usar este poder novamente até o próximo amanhecer."},{"type":"paragraph","text":"EXEMPLOS DE ITENS INTELIGENTES"},{"type":"paragraph","text":"As armas inteligentes descritas aqui possuem histórias lendárias."}]},{"id":"guia-do-mestre-item-magico-esmagador","nome":"Esmagador","categoria":"Item mágico","tipo":"Arma (martelo de guerra)","fonte":"Guia do Mestre","pagina_livro":217,"pagina_pdf":218,"referencia":"217 (PDF: 218)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Esmagador é um poderoso martelo de guerra forjado pelos anões e perdido na masmorra da Montanha da Pluma Branca. Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. No raiar do dia, após você realizar sua primeira jogada de ataque com Esmagador, você desenvolve um medo de sair ao ar livre que persiste enquanto você permanecer sintonizado com a arma. Isso faz você ter desvantagem nas jogadas de ataque, testes de resistência e testes de habilidade enquanto você puder ver o céu durante o dia. Arma de Arremesso. Esmagador possui a propriedade arremesso com uma distância normal de 6 metros e distância longa de 18 metros. Quando você atinge com um ataque à distância com aram usando-o, o alvo sofre 1d8 de dano de concussão extra, ou 2d8 de dano de concussão extra se o alvo for um gigante. Cada vez que você arremessa a arma, ela volta para a sua mão após o ataque. Se você não tiver uma mão livre, a arma aterrissa aos seus pés. Onda de Choque. Você pode usar uma ação para golpear o solo com Esmagador e enviar uma onda de choque a partir do ponto de impacto. Cada criatura, à sua escolha, no solo a até 18 metros desse ponto, deve ser bem sucedida num teste de resistência de Constituição CD 15 ou ficará atordoada por 1 minuto. Uma criatura pode repetir o teste de resistência no final de cada um dos turnos dela, terminado o efeito sobre si caso obtenha s ucesso. Uma vez usada, esta propriedade não poderá ser usada novamente até o próximo amanhecer. Percepção Sobrenatural. Enquanto estiver empunhando a arma, ela aleta você da localização de qualquer porta secreta ou escondida a até 9 metros de você. Além disso, você pode usar uma ação para conjurar detectar o mal e bem ou localizar objeto através da arma. Uma vez que tenha conjurado qualquer das magias, você não poderá conjura-las através da arma novamente até o próximo amanhecer. Consciência. Esmagador é uma arma consciente leal e neutra com Inteligência 15, Sabedoria 12 e Carisma 15. Ela tem audição e visão no escuro com alcance de 36 metros. A arma se comunica telepaticamente com seu portador e pode falar, ler e compreender Anão, Gigante e Goblin. Ela berra gritos de guerra em Anão quando usada em combate. Personalidade. O propósito de Esmagador é dizimar gigantes e goblins. Ele também busca proteger os anões contra todos os seus inimigos. Um conflito surge se seu portador fracassar em destruir goblins e gigantes ou em proteger anões. Esmagador tem laços com o clã anão que o criou, chamado diversamente de Dankil ou clã do Martelo Poderoso, ele deseja ser devolvido ao clã. Ele varia qualquer coisa para proteges esses anos das mazelas. O martelo também carrega uma vergonha secreta. Séculos atrás, um anão chamado Ctenmiir empunhou ele valentemente por um tempo. Porem, Ctenmiir foi transformado em um vampiro. Sua vontade era forte o suficiente para curvar Esmagador em seus propósitos malignos, chegando até a matar membros do seu próprio clã.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (martelo de guerra), lendário (requer sintonização com um anão)","descricao_blocos":[{"type":"paragraph","text":"Esmagador é um poderoso martelo de guerra forjado pelos anões e perdido na masmorra da Montanha da Pluma Branca."},{"type":"paragraph","text":"Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. No raiar do dia, após você realizar sua primeira jogada de ataque com Esmagador, você desenvolve um medo de sair ao ar livre que persiste enquanto você permanecer sintonizado com a arma. Isso faz você ter desvantagem nas jogadas de ataque, testes de resistência e testes de habilidade enquanto você puder ver o céu durante o dia."},{"type":"paragraph","text":"Arma de Arremesso. Esmagador possui a propriedade arremesso com uma distância normal de 6 metros e distância longa de 18 metros. Quando você atinge com um ataque à distância com aram usando-o, o alvo sofre 1d8 de dano de concussão extra, ou 2d8 de dano de concussão extra se o alvo for um gigante. Cada vez que você arremessa a arma, ela volta para a sua mão após o ataque. Se você não tiver uma mão livre, a arma aterrissa aos seus pés."},{"type":"paragraph","text":"Onda de Choque. Você pode usar uma ação para golpear o solo com Esmagador e enviar uma onda de choque a partir do ponto de impacto. Cada criatura, à sua escolha, no solo a até 18 metros desse ponto, deve ser bem sucedida num teste de resistência de Constituição CD 15 ou ficará atordoada por 1 minuto. Uma criatura pode repetir o teste de resistência no final de cada um dos turnos dela, terminado o efeito sobre si caso obtenha s ucesso. Uma vez usada, esta propriedade não poderá ser usada novamente até o próximo amanhecer."},{"type":"paragraph","text":"Percepção Sobrenatural. Enquanto estiver empunhando a arma, ela aleta você da localização de qualquer porta secreta ou escondida a até 9 metros de você. Além disso, você pode usar uma ação para conjurar detectar o mal e bem ou localizar objeto através da arma. Uma vez que tenha conjurado qualquer das magias, você não poderá conjura-las através da arma novamente até o próximo amanhecer."},{"type":"paragraph","text":"Consciência. Esmagador é uma arma consciente leal e neutra com Inteligência 15, Sabedoria 12 e Carisma 15. Ela tem audição e visão no escuro com alcance de 36 metros."},{"type":"paragraph","text":"A arma se comunica telepaticamente com seu portador e pode falar, ler e compreender Anão, Gigante e Goblin. Ela berra gritos de guerra em Anão quando usada em combate."},{"type":"paragraph","text":"Personalidade. O propósito de Esmagador é dizimar gigantes e goblins. Ele também busca proteger os anões contra todos os seus inimigos. Um conflito surge se seu portador fracassar em destruir goblins e gigantes ou em proteger anões."},{"type":"paragraph","text":"Esmagador tem laços com o clã anão que o criou, chamado diversamente de Dankil ou clã do Martelo Poderoso, ele deseja ser devolvido ao clã. Ele varia qualquer coisa para proteges esses anos das mazelas."},{"type":"paragraph","text":"O martelo também carrega uma vergonha secreta. Séculos atrás, um anão chamado Ctenmiir empunhou ele valentemente por um tempo. Porem, Ctenmiir foi transformado em um vampiro. Sua vontade era forte o suficiente para curvar Esmagador em seus propósitos malignos, chegando até a matar membros do seu próprio clã."}]},{"id":"guia-do-mestre-item-magico-lamina-da-lua","nome":"Lâmina da Lua","categoria":"Item mágico","tipo":"Arma (espada longa)","fonte":"Guia do Mestre","pagina_livro":218,"pagina_pdf":219,"referencia":"218 (PDF: 219)","preco":null,"peso":null,"raridade":"lendária","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"De todos os itens mágicos criados pelos elfos, um dos mais desejados e zelosamente guardados é a lâmina da lua. Em tempos antigos, praticamente todas as casas nobres élficas reivindicavam tal lâmina. Com o passar dos séculos, algumas lâminas desapareceram do mundo, sua mágica se perdeu quando linhagens familiares se extinguiram. Outras lâminas sumiram com seus portadores durante grandes missões. Então, apenas algumas dessas armas restaram. Uma lâmina da lua passa de pai para filho. A espada escolhe seu portador e permanece vinculada a essa pessoa pelo resto da vida. Se o portador morrer, outro herdeiro pode reivindicar a lâmina. Se nenhum herdeiro digno existir, a espada permanecerá dormente. Ela funciona como uma espada longa normal até uma alma digna encontra-la e reivindicar seu poder. Uma lâmina da lua serve apenas um mestre por vez. O processo de sintonização requer um ritual especial na sala do trono de um regente élfico ou em um templo dedicado aos deuses élficos. Uma lâmina da lua não servirá a ninguém que ela considere covarde, errático, corrupto ou que não concorde em preservar e proteger os elfos. Se a lâmina rejeitar você, você realiza testes de habilidade, jogadas de ataque e testes de resistência com desvantagem por 24 horas. Se a lâmina te aceitar, você se sintoniza com ela e uma nova runa aparece na lâmina. Você permanece sintonizado com a arma até morrer ou a arma ser destruída. Uma lâmina da lua tem uma runa em sua lâmina para cada mestre que ela serviu (geralmente 1d6 + 1). A primeira runa sempre concede +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Cada runa além da primeira concede à lâmina da lua uma propriedade adicional. O Mestre escolhe cada propriedade ou as determina aleatoriamente na tabela Propriedades da Lâmina da Lua. 01-40 Aumenta o bônus nas jogadas de ataque e dano em 1, até o máximo de +3. Role novamente se a lâmina da lua já tiver +3 de bônus. 41-80 A lâmina da lua ganha uma propriedade menor determinada aleatoriamente (veja Características Especiais previamente neste capítulo). 81-82 A lâmina da lua ganha a propriedade acuidade. 83-84 A lâmina da lua ganha a propriedade arremesso (distância 6/18 metros). 85-86 A lâmina da lua funciona como uma defensora. 87-90 A lâmina da lua atinge um acerto crítico numa rolagem 19 ou 20.91-92 Quando você atingir um ataque usando a lâmina da lua, o ataque causa 1d6 de dano cortante extra. 93-94 Quando você atingir uma criatura de um tipo específico, o alvo sofre 1d6 de dano extra de ácido, frio, fogo, elétrico ou trovejante. 95-96 Você pode usar uma ação bônus para fazer a lâmina da lua liberar um clarão luminoso. Cada criatura que puder ver você e estiver a até 9 metros de você deve ser bem sucedida num teste de resistência de Constituição CD 15 ou ficará cega por 1 minuto. 97-98 A lâmina da lua funciona como um anel de armazenar magia. 99 Você pode usar uma ação para convocar uma sombra élfica, considerando que você já não tenha uma servindo você. 00 A lâmina da lua funciona como uma espada vorpal. Consciência. Uma lâmina da lua é uma arma consciente neutra e boa com Inteligência 12, Sabedoria 10 e Carisma 12. Ela tem audição e visão no escuro com alcance de 36 metros. A arma se comunica ao transmitir suas emoções, enviando uma sensação de formigamento pela mão do portador quando deseja comunicar algo que ela sentiu. Ela pode se comunicar mais explicitamente através de visões e sonhos, quando o portador está ou em transe ou dormindo. Personalidade. Cada lâmina da lua busca o avanço da raça élfica e dos ideias élficos. Coragem, lealdade, beleza, música e vida são todos parte deste propósito. A arma é vinculada a linhagem familiar a qual ela era destinada a servir. Enquanto ela estiver vinculada com um dono que partilhe dos seus ideias, sua lealdade será absoluta. Se a lâmina da lua tiver um defeito, é o excesso de confiança. Uma vez que tenha decidido por um dono, ela acredita que apenas essa pessoa deveria empunha-la, mesmo que esse dono não anseie pelos ideias élficos.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (espada longa), lendária (requer sintonização com um elfo ou meio-elfo de tendência neutra e boa)","descricao_blocos":[{"type":"paragraph","text":"De todos os itens mágicos criados pelos elfos, um dos mais desejados e zelosamente guardados é a lâmina da lua. Em tempos antigos, praticamente todas as casas nobres élficas reivindicavam tal lâmina. Com o passar dos séculos, algumas lâminas desapareceram do mundo, sua mágica se perdeu quando linhagens familiares se extinguiram. Outras lâminas sumiram com seus portadores durante grandes missões. Então, apenas algumas dessas armas restaram."},{"type":"paragraph","text":"Uma lâmina da lua passa de pai para filho. A espada escolhe seu portador e permanece vinculada a essa pessoa pelo resto da vida. Se o portador morrer, outro herdeiro pode reivindicar a lâmina. Se nenhum herdeiro digno existir, a espada permanecerá dormente. Ela funciona como uma espada longa normal até uma alma digna encontra-la e reivindicar seu poder."},{"type":"paragraph","text":"Uma lâmina da lua serve apenas um mestre por vez. O processo de sintonização requer um ritual especial na sala do trono de um regente élfico ou em um templo dedicado aos deuses élficos."},{"type":"paragraph","text":"Uma lâmina da lua não servirá a ninguém que ela considere covarde, errático, corrupto ou que não concorde em preservar e proteger os elfos. Se a lâmina rejeitar você, você realiza testes de habilidade, jogadas de ataque e testes de resistência com desvantagem por 24 horas. Se a lâmina te aceitar, você se sintoniza com ela e uma nova runa aparece na lâmina. Você permanece sintonizado com a arma até morrer ou a arma ser destruída."},{"type":"paragraph","text":"Uma lâmina da lua tem uma runa em sua lâmina para cada mestre que ela serviu (geralmente 1d6 + 1). A primeira runa sempre concede +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Cada runa além da primeira concede à lâmina da lua uma propriedade adicional. O Mestre escolhe cada propriedade ou as determina aleatoriamente na tabela Propriedades da Lâmina da Lua."},{"type":"table","headers":["d100","Propriedade"],"rows":[["01-40","Aumenta o bônus nas jogadas de ataque e dano em 1, até o máximo de +3. Role novamente se a lâmina da lua já tiver +3 de bônus."],["41-80","A lâmina da lua ganha uma propriedade menor determinada aleatoriamente (veja Características Especiais previamente neste capítulo)."],["81-82","A lâmina da lua ganha a propriedade acuidade."],["83-84","A lâmina da lua ganha a propriedade arremesso (distância 6/18 metros)."],["85-86","A lâmina da lua funciona como uma defensora."],["87-90","A lâmina da lua atinge um acerto crítico numa rolagem 19 ou 20."],["91-92","Quando você atingir um ataque usando a lâmina da lua, o ataque causa 1d6 de dano cortante extra."],["93-94","Quando você atingir uma criatura de um tipo específico, o alvo sofre 1d6 de dano extra de ácido, frio, fogo, elétrico ou trovejante."],["95-96","Você pode usar uma ação bônus para fazer a lâmina da lua liberar um clarão luminoso. Cada criatura que puder ver você e estiver a até 9 metros de você deve ser bem sucedida num teste de resistência de Constituição CD 15 ou ficará cega por 1 minuto."],["97-98","A lâmina da lua funciona como um anel de armazenar magia."],["99","Você pode usar uma ação para convocar uma sombra élfica, considerando que você já não tenha uma servindo você."],["00","A lâmina da lua funciona como uma espada vorpal."]]},{"type":"paragraph","text":"Consciência. Uma lâmina da lua é uma arma consciente neutra e boa com Inteligência 12, Sabedoria 10 e Carisma 12. Ela tem audição e visão no escuro com alcance de 36 metros."},{"type":"paragraph","text":"A arma se comunica ao transmitir suas emoções, enviando uma sensação de formigamento pela mão do portador quando deseja comunicar algo que ela sentiu. Ela pode se comunicar mais explicitamente através de visões e sonhos, quando o portador está ou em transe ou dormindo."},{"type":"paragraph","text":"Personalidade. Cada lâmina da lua busca o avanço da raça élfica e dos ideias élficos. Coragem, lealdade, beleza, música e vida são todos parte deste propósito."},{"type":"paragraph","text":"A arma é vinculada a linhagem familiar a qual ela era destinada a servir. Enquanto ela estiver vinculada com um dono que partilhe dos seus ideias, sua lealdade será absoluta."},{"type":"paragraph","text":"Se a lâmina da lua tiver um defeito, é o excesso de confiança. Uma vez que tenha decidido por um dono, ela acredita que apenas essa pessoa deveria empunha-la, mesmo que esse dono não anseie pelos ideias élficos."}]},{"id":"guia-do-mestre-item-magico-navalha-negra","nome":"Navalha Negra","categoria":"Item mágico","tipo":"Arma (espada grande)","fonte":"Guia do Mestre","pagina_livro":219,"pagina_pdf":220,"referencia":"219 (PDF: 220)","preco":null,"peso":null,"raridade":"lendária","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Escondida na masmorra da Montanha da Pluma Branca, Navalha Negra brilha como um pedaço de céu noturno cheio de estrelas. Sua bainha negra é decorada com peças de obsidiana cortadas. Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Ela tem as seguintes propriedades adicionais. Devorar Alma. Sempre que você usa-la para reduzir uma criatura a 0 pontos de vida, a espada mata a criatura e devora sua alma, a não ser que ela seja um constructo ou morto-vivo. Uma criatura cuja alma seja devorada pela Navalha Negra pode ser trazida de volta a vida apenas pela magia desejo. Quando ela devora uma alma, Navalha Negra concede a você pontos de vida temporários iguais ao máximo de pontos de vida da criatura morta. Este pontos de vida somem após 24 horas. Enquanto estes pontos de vida permanecerem e você mantiver Navalha Negra em mãos, você tem vantagem nas jogadas de ataque, testes de resistência e testes de habilidade. Se você atingir um morto-vivo com esta arma, você sofre 1d10 de dano necrótico e o alvo recupera 1d10 pontos de vida. Se este dano necrótico reduzir seu pontos de vida a 0, Navalha Negra devorará sua alma. Caçador de Almas. Enquanto você empunhar a arma, você está ciente da presença de criaturas Miúdas ou maiores a até 18 metros de você que não sejam constructos ou mortos-vivos. Você também não pode ser enfeitiçado ou amedrontado. Navalha Negra pode conjurar a magia velocidade em você uma vez por dia. Ela decide quando conjura a magia e mantem concentração nisso, portanto, você não precisa fazê-lo. Consciência. Navalha Negra é uma arma caótica e neutra consciente com Inteligência 17, Sabedoria 10 e Carisma 19. Ela tem audição e visão no escuro com alcance de 36 metros. A arma pode falar, ler e compreender Comum e pode se comunicar telepaticamente com seu portador. Sua voz é profunda e ecoante. Enquanto você estiver sintonizado com ela, Navalha Negra também compreende todos os idiomas que você conhece. Personalidade. Navalha Negra fala com um tom imperioso, já que está acostumada a ser obedecida. O propósito da espada é consumir almas. Ela não se importa de onde vem a alma que ela devora, incluindo seu portador. A espada acredita que toda matéria e energia surgiu de um vácuo de energia negativa e irá, um dia, voltar para ele. Navalha Negra está destinada a acelerar esse processo. Apesar do seu niilismo, Navalha Negra sente uma estranha afinidade com Onda e Esmagador, outras duas armas trancafiadas na Montanha da Pluma Branca. Ela deseja que as três armas se reúnam novamente e sejam empunhadas em combate juntas, mesmo que ela discorde violentamente de Esmagador e ache Onda tediosa. A fome de Navalha Negra por almas deve ser alimentada regularmente. Se a espada passar três dias ou mais sem consumir uma alma, um conflito entre ela e seu portador ocorre no próximo pôr do sol.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (espada grande), lendária (requer sintonização com uma criatura de tendência não-leal)","descricao_blocos":[{"type":"paragraph","text":"Escondida na masmorra da Montanha da Pluma Branca, Navalha Negra brilha como um pedaço de céu noturno cheio de estrelas. Sua bainha negra é decorada com peças de obsidiana cortadas."},{"type":"paragraph","text":"Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Ela tem as seguintes propriedades adicionais."},{"type":"paragraph","text":"Devorar Alma. Sempre que você usa-la para reduzir uma criatura a 0 pontos de vida, a espada mata a criatura e devora sua alma, a não ser que ela seja um constructo ou morto-vivo. Uma criatura cuja alma seja devorada pela Navalha Negra pode ser trazida de volta a vida apenas pela magia desejo."},{"type":"paragraph","text":"Quando ela devora uma alma, Navalha Negra concede a você pontos de vida temporários iguais ao máximo de pontos de vida da criatura morta. Este pontos de vida somem após 24 horas. Enquanto estes pontos de vida permanecerem e você mantiver Navalha Negra em mãos, você tem vantagem nas jogadas de ataque, testes de resistência e testes de habilidade."},{"type":"paragraph","text":"Se você atingir um morto-vivo com esta arma, você sofre 1d10 de dano necrótico e o alvo recupera 1d10 pontos de vida. Se este dano necrótico reduzir seu pontos de vida a 0, Navalha Negra devorará sua alma."},{"type":"paragraph","text":"Caçador de Almas. Enquanto você empunhar a arma, você está ciente da presença de criaturas Miúdas ou maiores a até 18 metros de você que não sejam constructos ou mortos-vivos. Você também não pode ser enfeitiçado ou amedrontado."},{"type":"paragraph","text":"Navalha Negra pode conjurar a magia velocidade em você uma vez por dia. Ela decide quando conjura a magia e mantem concentração nisso, portanto, você não precisa fazê-lo."},{"type":"paragraph","text":"Consciência. Navalha Negra é uma arma caótica e neutra consciente com Inteligência 17, Sabedoria 10 e Carisma 19. Ela tem audição e visão no escuro com alcance de 36 metros."},{"type":"paragraph","text":"A arma pode falar, ler e compreender Comum e pode se comunicar telepaticamente com seu portador. Sua voz é profunda e ecoante. Enquanto você estiver sintonizado com ela, Navalha Negra também compreende todos os idiomas que você conhece."},{"type":"paragraph","text":"Personalidade. Navalha Negra fala com um tom imperioso, já que está acostumada a ser obedecida."},{"type":"paragraph","text":"O propósito da espada é consumir almas. Ela não se importa de onde vem a alma que ela devora, incluindo seu portador. A espada acredita que toda matéria e energia surgiu de um vácuo de energia negativa e irá, um dia, voltar para ele. Navalha Negra está destinada a acelerar esse processo."},{"type":"paragraph","text":"Apesar do seu niilismo, Navalha Negra sente uma estranha afinidade com Onda e Esmagador, outras duas armas trancafiadas na Montanha da Pluma Branca. Ela deseja que as três armas se reúnam novamente e sejam empunhadas em combate juntas, mesmo que ela discorde violentamente de Esmagador e ache Onda tediosa."},{"type":"paragraph","text":"A fome de Navalha Negra por almas deve ser alimentada regularmente. Se a espada passar três dias ou mais sem consumir uma alma, um conflito entre ela e seu portador ocorre no próximo pôr do sol."}]},{"id":"guia-do-mestre-item-magico-onda","nome":"Onda","categoria":"Item mágico","tipo":"Arma (tridente)","fonte":"Guia do Mestre","pagina_livro":219,"pagina_pdf":220,"referencia":"219 (PDF: 220)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Guardado na masmorra na Montanha da Pluma Branca, este tridente é uma arma exótica gravada com ondas, corais e criaturas marinhas. Apesar de você precisar venerar um deus do mar para se sintonizar com esta arma, Onda aceita alegremente novos convertidos. Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Se você atingir um acerto crítico com ela, o alvo sofre dano necrótico extra igual a metade do máximo de pontos de vida dele. A arma também funciona como um tridente de comandar peixes e uma arma de alerta. Ela pode conferir os benefícios de uma capa de respirar na água enquanto você a empunhar, e você pode usa-la como um cubo de força escolhendo o efeito ao invés de pressionar os lados do cubo para seleciona-lo. Consciência. Onda é uma arma consciente de tendência neutra com Inteligência 14, Sabedoria 10 e Carisma 18. Ela tem audição e visão no escuro com alcance de 36 metros. A arma se comunica telepaticamente com seu portador e pode falar, ler e compreender Aquan. Ela também pode falar com animais aquáticos como se estivesse usando a magia falar com animais, usando telepatia para envolver seu portador na conversa. Personalidade. Quando fica agitada, Onda tem o hábito de sussurrar melodias que variam de coros marinhos a hinos sagrados para os deuses do mar. Onda deseja zelosamente converter os mortais a adoração de um ou mais deuses do mar, ou condenar os infiéis à morte. Um conflito pode surgir se o portador falhar em dar seguimento aos objetivos da arma no mundo. O tridente tem um afeto nostálgico pelo lugar onde ele foi forjado, uma ilha desolada chamada Forja do Trovão. Um deus do mar aprisionou uma família de gigantes da tempestade lá, e os gigantes forjaram Onda em um ato de devoção a-ou rebelião contra-esse deus. Onda nutre uma dúvida secreta sobre sua própria natureza e propósito. Por toda sua devoção aos deuses do mar, Onda teme ter sido criado para trazer a morte de um deus do mar em particular. Este destino é algo que Onda não deveria ser capaz de evitar.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (tridente), lendário (requer sintonização com uma criatura que venere um deus do mar)","descricao_blocos":[{"type":"paragraph","text":"Guardado na masmorra na Montanha da Pluma Branca, este tridente é uma arma exótica gravada com ondas, corais e criaturas marinhas. Apesar de você precisar venerar um deus do mar para se sintonizar com esta arma, Onda aceita alegremente novos convertidos."},{"type":"paragraph","text":"Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Se você atingir um acerto crítico com ela, o alvo sofre dano necrótico extra igual a metade do máximo de pontos de vida dele."},{"type":"paragraph","text":"A arma também funciona como um tridente de comandar peixes e uma arma de alerta. Ela pode conferir os benefícios de uma capa de respirar na água enquanto você a empunhar, e você pode usa-la como um cubo de força escolhendo o efeito ao invés de pressionar os lados do cubo para seleciona-lo."},{"type":"paragraph","text":"Consciência. Onda é uma arma consciente de tendência neutra com Inteligência 14, Sabedoria 10 e Carisma 18. Ela tem audição e visão no escuro com alcance de 36 metros."},{"type":"paragraph","text":"A arma se comunica telepaticamente com seu portador e pode falar, ler e compreender Aquan. Ela também pode falar com animais aquáticos como se estivesse usando a magia falar com animais, usando telepatia para envolver seu portador na conversa."},{"type":"paragraph","text":"Personalidade. Quando fica agitada, Onda tem o hábito de sussurrar melodias que variam de coros marinhos a hinos sagrados para os deuses do mar."},{"type":"paragraph","text":"Onda deseja zelosamente converter os mortais a adoração de um ou mais deuses do mar, ou condenar os infiéis à morte. Um conflito pode surgir se o portador falhar em dar seguimento aos objetivos da arma no mundo."},{"type":"paragraph","text":"O tridente tem um afeto nostálgico pelo lugar onde ele foi forjado, uma ilha desolada chamada Forja do Trovão. Um deus do mar aprisionou uma família de gigantes da tempestade lá, e os gigantes forjaram Onda em um ato de devoção a-ou rebelião contra-esse deus."},{"type":"paragraph","text":"Onda nutre uma dúvida secreta sobre sua própria natureza e propósito. Por toda sua devoção aos deuses do mar, Onda teme ter sido criado para trazer a morte de um deus do mar em particular. Este destino é algo que Onda não deveria ser capaz de evitar."}]},{"id":"guia-do-mestre-item-magico-cetro-de-orcus","nome":"Cetro de Orcus","categoria":"Item mágico","tipo":"Varinha","fonte":"Guia do Mestre","pagina_livro":222,"pagina_pdf":223,"referencia":"222 (PDF: 223)","preco":null,"peso":null,"raridade":"artefato","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"O sinistro Cetro de Orcus raramente sai de perto de Orcus. O instrumento, tão maligno quanto seu criador, partilha dos objetivos do lorde demônio de exterminar as vidas de todas as coisas vivas e prender o Plano Material no estase da não-vida. Orcus permite que a varinha saia de sua mão de tempos em tempos. Quando faz isso, ela aparece magicamente em qualquer lugar que seu mestre sinta uma oportunidade de completar algum objetivo depravado. Feita de ossos tão duros quanto o ferro, a varinha tem em sua ponta uma caveira magicamente aumentada que já pertenceu a um herói humano assassinado por Orcus. A varinha pode mudar de tamanho magicamente para se acomodar a empunhadura de seu usuário. Plantas murcham, bebidas estragam, carne apodrece e vermes prosperam na presença da varinha. Qualquer criatura, além de Orcus, que tente se sintonizar com a varinha deve ser bem sucedida num teste de resistência de Constituição CD 17. Se obtiver sucesso, a criatura sofre 10d6 de dano necrótico. Se fracassar, a criatura morre e se ergue como um zumbi. Nas mãos de alguém que tenha se sintonizado com ela, a varinha pode ser empunhada como uma maça mágica que concede +3 de bônus nas jogadas de ataque e dano feitas com ela. A varinha causa 2d12 de dano necrótico extra, se atingir. Propriedades Aleatórias. O Cetro de Orcus tem as seguintes propriedades aleatórias: 2 propriedades benéficas menores 1 propriedade benéfica maior 2 propriedades prejudiciais menores 1 propriedade prejudicial maior As propriedades prejudiciais do Cetro de Orcus são suprimidas enquanto a varinha estiver sintonizada com o próprio Orcus. Proteção. Você ganha +3 de bônus na Classe de Armadura enquanto empunhar a varinha. Magias. A varinha tem 7 cargas. Enquanto estiver empunhando-a, você pode usar uma ação e gastar 1 ou mais cargas para conjurar uma das seguintes magias (CD de resistência 18) através dela: animar mortos (1 carga), círculo da morte (3 cargas), dedo da morte (3 cargas), falar com os mortos (1 carga), malogro (2 cargas) ou palavra de poder matar (4 cargas). A varinha recupera 1d4 + 3 cargas gastas diariamente ao amanhecer. Enquanto estiver sintonizado com a varinha, Orcus ou um seguidor abençoado por ele, pode conjurar cada uma das magias da varinha usando 2 cargas a menos (mínimo de 0). Convocar Mortos-vivos. Enquanto estiver empunhando a varinha, você pode usar uma ação para conjurar esqueletos e zumbis, convocando tantos quanto você possa dividir entre 500 pontos de vida, cada morto-vivo com a média de pontos de vida (veja o Manual dos Monstros para as estatísticas). Os mortos-vivos erguem-se magicamente do solo ou de alguma outra forma, em um espaço desocupado a até 90 metros de você e obedecem seus comando até serem destruídos ou até o amanhecer do próximo dia, quando eles sucumbirão em pilhas inanimadas de ossos e corpos podres. Quando você usar essa propriedade da varinha, não poderá usa-la novamente até o próximo amanhecer. Enquanto estiver sintonizado com a varinha, Orcus pode invocar qualquer espécie de morto-vivo, não apenas esqueletos e zumbis. Os mortos-vivos não perecem ou desaparecem ao amanhecer do dia seguinte, permanecendo até Orcus dispensa-los. Consciência. O Cetro de Orcus é um item caótico e mau con sciente com Inteligência 16, Sabedoria 12 e Carisma 16. Ele tem audição e visão no escuro com alcance de 36 metros. A varinha se comunica telepaticamente com seu portador e pode falar, ler e compreender Abissal e Comum. Personalidade. O propósito da varinha é ajudar a satisfazer o desejo de Orcus de matar tudo no multiverso. A varinha é fria, cruel, niilista e desprovida de senso de humor. A fim de concluir os objetivos de seu mestre, a varinha finge devoção ao seu usuário atual e faz promessas grandiosas que ela não tem a menor intenção de cumpri, como jurar ajudar seu usuário a despojar Orcus. Destruindo a Varinha. Destruir o Cetro de Orcus requer que ele seja levado para o Plano da Energia Positiva pelo herói ancestral cujo crânio ornamenta ele. Para que isso aconteça, o herói há muito perdido deve primeiro ser trazido de volta a vida-uma tarefa nada fácil, dado ao fato que Orcus aprisionou a alma do herói e mantem ela escondida e bem guardada. Banhar a varinha em energia positiva faz com que ela r ache e exploda, mas, a não ser que as condições acima sejam atendidas, a varinha se reconstrói instantaneamente na camada de Orcus no Abismo.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Varinha, artefato (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"O sinistro Cetro de Orcus raramente sai de perto de Orcus. O instrumento, tão maligno quanto seu criador, partilha dos objetivos do lorde demônio de exterminar as vidas de todas as coisas vivas e prender o Plano Material no estase da não-vida. Orcus permite que a varinha saia de sua mão de tempos em tempos. Quando faz isso, ela aparece magicamente em qualquer lugar que seu mestre sinta uma oportunidade de completar algum objetivo depravado."},{"type":"paragraph","text":"Feita de ossos tão duros quanto o ferro, a varinha tem em sua ponta uma caveira magicamente aumentada que já pertenceu a um herói humano assassinado por Orcus. A varinha pode mudar de tamanho magicamente para se acomodar a empunhadura de seu usuário. Plantas murcham, bebidas estragam, carne apodrece e vermes prosperam na presença da varinha."},{"type":"paragraph","text":"Qualquer criatura, além de Orcus, que tente se sintonizar com a varinha deve ser bem sucedida num teste de resistência de Constituição CD 17. Se obtiver sucesso, a criatura sofre 10d6 de dano necrótico. Se fracassar, a criatura morre e se ergue como um zumbi."},{"type":"paragraph","text":"Nas mãos de alguém que tenha se sintonizado com ela, a varinha pode ser empunhada como uma maça mágica que concede +3 de bônus nas jogadas de ataque e dano feitas com ela. A varinha causa 2d12 de dano necrótico extra, se atingir."},{"type":"paragraph","text":"Propriedades Aleatórias. O Cetro de Orcus tem as seguintes propriedades aleatórias:"},{"type":"list","items":["2 propriedades benéficas menores","1 propriedade benéfica maior","2 propriedades prejudiciais menores","1 propriedade prejudicial maior"]},{"type":"paragraph","text":"As propriedades prejudiciais do Cetro de Orcus são suprimidas enquanto a varinha estiver sintonizada com o próprio Orcus."},{"type":"paragraph","text":"Proteção. Você ganha +3 de bônus na Classe de Armadura enquanto empunhar a varinha."},{"type":"paragraph","text":"Magias. A varinha tem 7 cargas. Enquanto estiver empunhando-a, você pode usar uma ação e gastar 1 ou mais cargas para conjurar uma das seguintes magias (CD de resistência 18) através dela: animar mortos (1 carga), círculo da morte (3 cargas), dedo da morte (3 cargas), falar com os mortos (1 carga), malogro (2 cargas) ou palavra de poder matar (4 cargas). A varinha recupera 1d4 + 3 cargas gastas diariamente ao amanhecer."},{"type":"paragraph","text":"Enquanto estiver sintonizado com a varinha, Orcus ou um seguidor abençoado por ele, pode conjurar cada uma das magias da varinha usando 2 cargas a menos (mínimo de 0)."},{"type":"paragraph","text":"Convocar Mortos-vivos. Enquanto estiver empunhando a varinha, você pode usar uma ação para conjurar esqueletos e zumbis, convocando tantos quanto você possa dividir entre 500 pontos de vida, cada morto-vivo com a média de pontos de vida (veja o Manual dos Monstros para as estatísticas). Os mortos-vivos erguem-se magicamente do solo ou de alguma outra forma, em um espaço desocupado a até 90 metros de você e obedecem seus comando até serem destruídos ou até o amanhecer do próximo dia, quando eles sucumbirão em pilhas inanimadas de ossos e corpos podres. Quando você usar essa propriedade da varinha, não poderá usa-la novamente até o próximo amanhecer."},{"type":"paragraph","text":"Enquanto estiver sintonizado com a varinha, Orcus pode invocar qualquer espécie de morto-vivo, não apenas esqueletos e zumbis. Os mortos-vivos não perecem ou desaparecem ao amanhecer do dia seguinte, permanecendo até Orcus dispensa-los."},{"type":"paragraph","text":"Consciência. O Cetro de Orcus é um item caótico e mau con sciente com Inteligência 16, Sabedoria 12 e Carisma 16. Ele tem audição e visão no escuro com alcance de 36 metros."},{"type":"paragraph","text":"A varinha se comunica telepaticamente com seu portador e pode falar, ler e compreender Abissal e Comum."},{"type":"paragraph","text":"Personalidade. O propósito da varinha é ajudar a satisfazer o desejo de Orcus de matar tudo no multiverso. A varinha é fria, cruel, niilista e desprovida de senso de humor."},{"type":"paragraph","text":"A fim de concluir os objetivos de seu mestre, a varinha finge devoção ao seu usuário atual e faz promessas grandiosas que ela não tem a menor intenção de cumpri, como jurar ajudar seu usuário a despojar Orcus."},{"type":"paragraph","text":"Destruindo a Varinha. Destruir o Cetro de Orcus requer que ele seja levado para o Plano da Energia Positiva pelo herói ancestral cujo crânio ornamenta ele."},{"type":"paragraph","text":"Para que isso aconteça, o herói há muito perdido deve primeiro ser trazido de volta a vida-uma tarefa nada fácil, dado ao fato que Orcus aprisionou a alma do herói e mantem ela escondida e bem guardada."},{"type":"paragraph","text":"Banhar a varinha em energia positiva faz com que ela r ache e exploda, mas, a não ser que as condições acima sejam atendidas, a varinha se reconstrói instantaneamente na camada de Orcus no Abismo."}]},{"id":"guia-do-mestre-item-magico-espada-de-kas","nome":"Espada de Kas","categoria":"Item mágico","tipo":"Arma (espada longa)","fonte":"Guia do Mestre","pagina_livro":224,"pagina_pdf":224,"referencia":"224 (PDF: 224)","preco":null,"peso":null,"raridade":"artefato","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Quando Vecna cresceu em poder, ele escolheu um tenente maligno e cruel, Kas Mão Sangrenta, para agir como seu guarda-costas e braço direito. Este vilão desprezível serviu como conselheiro, senhor da guerra e assassino. Seus sucessos atraíram a admiração de Vecna e uma recompensa: uma espada de linhagem tão negra quanto o homem que a empunharia. Por muito tempo, Kas serviu lealmente o lich, mas conforme Kas crescia em poder, também crescia em arrogância. Sua espada o incitou a suplantar Vecna, assim ele poderia governar o império do lich no lugar de Vecna. As lendas contam que a destruição de Vecna veio das mãos de Kas, mas Vecna também trouxe a desgraça para seu tenente rebelde, deixando apenas a espada de Kas para trás. O mundo ficou mais iluminado depois disso. A Espada de Kas é uma espada longa mágica consciente que concede +3 de bônus nas jogadas de ataque e dano feitas com ela. Ela atinge um acerto crítico numa rolagem 19 ou 20 e causa 2d10 de dano cortante extra contra mortos-vivos. Se a espada não for banhada em sangue dentro de 1 minuto após ser sacada de sua bainha, seu usuário deve realizar um teste de resistência de Carisma CD 15. Se obtiver sucesso, ele sofre 3d6 de dano psíquico. Se fracassar, o portador é dominado pela espada, como pela magia dominar monstro, e a espada exige ser banhada em sangue. O efeito da magia terminar quando a exigência da espada for cumprida. Propriedades Aleatórias. A Espada de Kas tem as seguintes propriedades aleatórias: 1 propriedade benéfica menor 1 propriedade benéfica maior 1 propriedade prejudicial menor 1 propriedade prejudicial maior Espírito de Kas. Enquanto a espada estiver em sua posse, você adiciona um d10 a sua iniciativa no início de cada combate. Além disso, quando você usa uma ação para atacar com a espada, você pode transferir parte ou todo o bônus de ataque dela para sua Classe de Armadura. Os bônus ajustados permanecem em efeito até o início do seu próximo turno. Magias. Enquanto a espada estiver em sua posse, você pode usar uma ação para conjurar uma das seguintes magias (CD de resistência 18) através dela: convocar relâmpagos, palavra divina ou dedo da morte. Uma vez que tenha usado a espada para conjurar uma magia, você não poderá conjurar essa magia novamente através dela até o próximo amanhecer. Consciência. A Espada de Kas é uma arma caótica e má consciente com Inteligência 15, Sabedoria 13 e Carisma 16. Ela tem audição e visão no escuro com alcance de 36 metros. A arma se comunica telepaticamente com seu portador e pode falar, ler e compreender Comum. Personalidade. O propósito da espada é trazer ruína a Vecna. Matando os adoradores de Vecna, destruindo os trabalhos do lich e frustrando suas maquinações, tudo ajuda a cumpri seu objetivo. A Espada de Kas também busca destruir qualquer um corrompido pelo Olho e Mão de Vecna. A obsessão da espada com esses artefatos eventualmente se torna uma fixação para seu portador. Destruindo a Espada. Uma criatura sintonizada tanto com o Olho de Vecna quanto com a Mão de Vecna pode usar a propriedade de desejo da combinação dos artefatos para desfazer a Espada de Kas. A criatura deve conjurar a magia desejo e fazer um teste de Carisma resistido por um teste de Carisma da espada. A espada deve estar a até 9 metros da criatura, ou a magia falha. Se a espada vencer a disputa, nada acontece e a magia desejo é desperdiçada. Se a espada perder a disputa, ela é destruída.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (espada longa), artefato (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Quando Vecna cresceu em poder, ele escolheu um tenente maligno e cruel, Kas Mão Sangrenta, para agir como seu guarda-costas e braço direito. Este vilão desprezível serviu como conselheiro, senhor da guerra e assassino. Seus sucessos atraíram a admiração de Vecna e uma recompensa: uma espada de linhagem tão negra quanto o homem que a empunharia."},{"type":"paragraph","text":"Por muito tempo, Kas serviu lealmente o lich, mas conforme Kas crescia em poder, também crescia em arrogância. Sua espada o incitou a suplantar Vecna, assim ele poderia governar o império do lich no lugar de Vecna. As lendas contam que a destruição de Vecna veio das mãos de Kas, mas Vecna também trouxe a desgraça para seu tenente rebelde, deixando apenas a espada de Kas para trás. O mundo ficou mais iluminado depois disso."},{"type":"paragraph","text":"A Espada de Kas é uma espada longa mágica consciente que concede +3 de bônus nas jogadas de ataque e dano feitas com ela. Ela atinge um acerto crítico numa rolagem 19 ou 20 e causa 2d10 de dano cortante extra contra mortos-vivos."},{"type":"paragraph","text":"Se a espada não for banhada em sangue dentro de 1 minuto após ser sacada de sua bainha, seu usuário deve realizar um teste de resistência de Carisma CD 15. Se obtiver sucesso, ele sofre 3d6 de dano psíquico. Se fracassar, o portador é dominado pela espada, como pela magia dominar monstro, e a espada exige ser banhada em sangue. O efeito da magia terminar quando a exigência da espada for cumprida."},{"type":"paragraph","text":"Propriedades Aleatórias. A Espada de Kas tem as seguintes propriedades aleatórias:"},{"type":"list","items":["1 propriedade benéfica menor","1 propriedade benéfica maior","1 propriedade prejudicial menor","1 propriedade prejudicial maior"]},{"type":"paragraph","text":"Espírito de Kas. Enquanto a espada estiver em sua posse, você adiciona um d10 a sua iniciativa no início de cada combate. Além disso, quando você usa uma ação para atacar com a espada, você pode transferir parte ou todo o bônus de ataque dela para sua Classe de Armadura. Os bônus ajustados permanecem em efeito até o início do seu próximo turno."},{"type":"paragraph","text":"Magias. Enquanto a espada estiver em sua posse, você pode usar uma ação para conjurar uma das seguintes magias (CD de resistência 18) através dela: convocar relâmpagos, palavra divina ou dedo da morte. Uma vez que tenha usado a espada para conjurar uma magia, você não poderá conjurar essa magia novamente através dela até o próximo amanhecer."},{"type":"paragraph","text":"Consciência. A Espada de Kas é uma arma caótica e má consciente com Inteligência 15, Sabedoria 13 e Carisma 16. Ela tem audição e visão no escuro com alcance de 36 metros."},{"type":"paragraph","text":"A arma se comunica telepaticamente com seu portador e pode falar, ler e compreender Comum."},{"type":"paragraph","text":"Personalidade. O propósito da espada é trazer ruína a Vecna. Matando os adoradores de Vecna, destruindo os trabalhos do lich e frustrando suas maquinações, tudo ajuda a cumpri seu objetivo."},{"type":"paragraph","text":"A Espada de Kas também busca destruir qualquer um corrompido pelo Olho e Mão de Vecna. A obsessão da espada com esses artefatos eventualmente se torna uma fixação para seu portador."},{"type":"paragraph","text":"Destruindo a Espada. Uma criatura sintonizada tanto com o Olho de Vecna quanto com a Mão de Vecna pode usar a propriedade de desejo da combinação dos artefatos para desfazer a Espada de Kas. A criatura deve conjurar a magia desejo e fazer um teste de Carisma resistido por um teste de Carisma da espada. A espada deve estar a até 9 metros da criatura, ou a magia falha. Se a espada vencer a disputa, nada acontece e a magia desejo é desperdiçada. Se a espada perder a disputa, ela é destruída."}]},{"id":"guia-do-mestre-item-magico-livro-da-escuridao-perversa","nome":"Livro da Escuridão Perversa","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":224,"pagina_pdf":225,"referencia":"224 (PDF: 225)","preco":null,"peso":null,"raridade":"artefato","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"O conteúdo deste torpe manuscrito de maldade inefável é a comida e bebida daqueles que servem o mal. Não se tem notícia de nenhum mortal que conheça os segredos que ele contém, conhecimento tão horrendo que mesmo um vislumbre de suas páginas rabiscadas é um convite à loucura. Muitos acreditam que o deus-lich Vecna, é o autor do Livro da Escuridão Perversa. Ele registrou nessas páginas cada ideia doentia, cada pensamento desvairado e cada exemplo de magia negra com que ele se deparou ou concebeu. Vecna cobriu cada tópico vil que ele pode, fazendo do livro um catálogo macabro de todos os erros mortais. Outros praticantes do mal tiveram posse do livro e adicionaram suas próprias experiências ao catálogo de conhecimento maligno. Suas adições são claras, os escritores de trabalhos posteriores costuraram tudo que eles escreveram no tomo ou, em alguns casos, fizeram anotações e adições ao texto existente. Existem passagens em que há páginas faltando, rasgadas ou cobertas completamente por tinta, sangue e riscos no texto original que não podem ser decifrados. A natureza não consegue tolerar a presença do livro. Plantas ordinárias murcha em sua presença, animais não se aproximam dele voluntariamente e o livro gradualmente destrói tudo que toca. Até mesmo a rocha se parte e vira poeira se o livro permanecer em cima por tempo suficiente. Uma criatura sintonizada ao livro deve passar 80 horas lendo e estudando-o para absorver seu conteúdo e usurpar seus benefícios. A criatura pode então, livremente modificar o conteúdo do livro, considerando que suas modificações progridam na maldade e expandam o conhecimento já contido nele. Sempre que uma criatura não-maligna se sintonizar com o Livro da Escuridão Perversa, essa criatura deve realizar um teste de resistência de Carisma CD 17. Se fracassar, a tendência da criatura muda para neutro e mau. O Livro da Escuridão Perversa permanece com você apenas enquanto você se esforçar em praticar o mal no mundo. Se você fracassar em realizar pelo menos um ato maligno num período de 10 dias, ou se você praticar um ato benigno voluntariamente, o livro desaparece. Se você morrer enquanto estiver sintonizado com o livro, uma entidade de grande mal reivindicará sua alma. Você não poderá ser trazido de volta a vida por quaisquer meios enquanto sua alma permanecer aprisionada. Propriedades Aleatórias. O Livro da Escuridão Perversa possui as seguintes propriedades aleatórias: 3 propriedades benéficas menores 1 propriedade benéfica maiores 3 propriedades prejudiciais menores 2 propriedades prejudiciais maiores Valores de Habilidade Ajustados. Após gastar o tempo requerido lendo e estudando o livro, um valor de habilidade, à sua escolha, aumenta em 2, até o máximo de 24. Outro valor de habilidade, à sua escolha, é reduzido em 2, até o mínimo de 3. O livro não pode ajustar seus valores de habilidade novamente. Marca das Trevas. Após gastar o tempo requerido lendo e estudando o livro, você adquire uma desfiguração física como um sinal medonho de sua devoção a escuridão perversa. Uma runa maligna pode aparecer no seu rosto, seus olhos podem ficar totalmente negros ou chifres podem nascer na sua testa. Ou você pode ficar mirrado e horrendo, perdendo todos os traços faciais, adquirindo uma língua bifurcada ou alguma outra característica, à escolha do Mestre. A marca das trevas concede a você vantagem em testes de Carisma (Persuasão) feitos ao interagir com criaturas malignas e testes de Carisma (Intimidação) feitos ao interagir com criaturas não-malignas. Comandar o Mal. Enquanto estiver sintonizado com o livro e portando-o, você pode usar uma ação para conjurar a magia dominar monstro (CD de resistência 18) em um alvo maligno. Você não pode usar esta propriedade novamente até o próximo amanhecer. CONHECIMENTO VIL O Livro da Escuridão Perversa toca cada mal no cosmos. Um personagem pode usar o conhecimento contido no livro para exumar segredos terríveis que nenhum mortal deveria conhecer. Junto do conteúdo que um personagem poderia encontrar estão os seguintes, mais o que quer que você escolha: Apoteose Maligna. O livro poderia conter um ritual que permita que um personagem se transforme em um lich ou cavaleiro da morte. Nomes Verdadeiros. Os nomes verdadeiros de qualquer número de corruptores poderia estar no livro. Magia Negra. Diversas magias de maldade horrenda criadas e escolhidas pelo Mestre poderiam estar no livro. Essas magias poderiam impor maldições medonhas, desfigurar outros, requerer sacrifício humano, afligir criaturas com dores excruciantes, espalhar pragas malignas e assim por diante. Conhecimento Sombrio. Você pode fazer referência ao Livro da Escuridão Perversa sempre que realizar um teste de Inteligência para lembrar informações sobre algum aspecto do mal, como conhecimento sobre demônios. Quando o fizer, dobre seu bônus de proficiência nesse teste. Discurso Obscuro. Enquanto você carregar o Livro da Escuridão Perversa e estiver sintonizado com ele, você pode usar uma ação para recitar palavras das páginas dele em uma linguagem torpe conhecida como Discurso Obscuro. Cada vez que o fizer, você sofre 1d12 de dano psíquico e cada criatura não-maligna a até 4,5 metros e você sofre 3d6 de dano psíquico. Destruindo o Livro. O Livro da Escuridão Perversa permite que páginas sejam arrancadas dele, mas qualquer conhecimento maligno contido nessas páginas encontram seu caminho de volta para o livro eventualmente, geralmente quando um novo autor adiciona páginas ao tomo. Se um solar partir o livro em dois, o livro é destruído por 1d100 anos, após isso, ele se reconstrói em algum canto sombrio do multiverso. Uma criatura sintonizada com o livro por um século ou mais pode exumar uma frase escondida no texto original dele, quando traduzido para Celestial e pronunciada em voz alta, destrói tanto o locutor quanto o livro em um clarão cegante de radiação. Porém, enquanto o mal existir no multiverso, o livro se reformará 1d10 x 100 anos depois. Caso todo o mal seja extirpado do multiverso, o livro se transformará em pó e será destruído para sempre.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, artefato (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"O conteúdo deste torpe manuscrito de maldade inefável é a comida e bebida daqueles que servem o mal. Não se tem notícia de nenhum mortal que conheça os segredos que ele contém, conhecimento tão horrendo que mesmo um vislumbre de suas páginas rabiscadas é um convite à loucura."},{"type":"paragraph","text":"Muitos acreditam que o deus-lich Vecna, é o autor do Livro da Escuridão Perversa. Ele registrou nessas páginas cada ideia doentia, cada pensamento desvairado e cada exemplo de magia negra com que ele se deparou ou concebeu. Vecna cobriu cada tópico vil que ele pode, fazendo do livro um catálogo macabro de todos os erros mortais."},{"type":"paragraph","text":"Outros praticantes do mal tiveram posse do livro e adicionaram suas próprias experiências ao catálogo de conhecimento maligno. Suas adições são claras, os escritores de trabalhos posteriores costuraram tudo que eles escreveram no tomo ou, em alguns casos, fizeram anotações e adições ao texto existente. Existem passagens em que há páginas faltando, rasgadas ou cobertas completamente por tinta, sangue e riscos no texto original que não podem ser decifrados."},{"type":"paragraph","text":"A natureza não consegue tolerar a presença do livro. Plantas ordinárias murcha em sua presença, animais não se aproximam dele voluntariamente e o livro gradualmente destrói tudo que toca. Até mesmo a rocha se parte e vira poeira se o livro permanecer em cima por tempo suficiente."},{"type":"paragraph","text":"Uma criatura sintonizada ao livro deve passar 80 horas lendo e estudando-o para absorver seu conteúdo e usurpar seus benefícios. A criatura pode então, livremente modificar o conteúdo do livro, considerando que suas modificações progridam na maldade e expandam o conhecimento já contido nele."},{"type":"paragraph","text":"Sempre que uma criatura não-maligna se sintonizar com o Livro da Escuridão Perversa, essa criatura deve realizar um teste de resistência de Carisma CD 17. Se fracassar, a tendência da criatura muda para neutro e mau."},{"type":"paragraph","text":"O Livro da Escuridão Perversa permanece com você apenas enquanto você se esforçar em praticar o mal no mundo. Se você fracassar em realizar pelo menos um ato maligno num período de 10 dias, ou se você praticar um ato benigno voluntariamente, o livro desaparece. Se você morrer enquanto estiver sintonizado com o livro, uma entidade de grande mal reivindicará sua alma. Você não poderá ser trazido de volta a vida por quaisquer meios enquanto sua alma permanecer aprisionada."},{"type":"paragraph","text":"Propriedades Aleatórias. O Livro da Escuridão Perversa possui as seguintes propriedades aleatórias:"},{"type":"list","items":["3 propriedades benéficas menores","1 propriedade benéfica maiores","3 propriedades prejudiciais menores","2 propriedades prejudiciais maiores"]},{"type":"paragraph","text":"Valores de Habilidade Ajustados. Após gastar o tempo requerido lendo e estudando o livro, um valor de habilidade, à sua escolha, aumenta em 2, até o máximo de 24. Outro valor de habilidade, à sua escolha, é reduzido em 2, até o mínimo de 3. O livro não pode ajustar seus valores de habilidade novamente."},{"type":"paragraph","text":"Marca das Trevas. Após gastar o tempo requerido lendo e estudando o livro, você adquire uma desfiguração física como um sinal medonho de sua devoção a escuridão perversa. Uma runa maligna pode aparecer no seu rosto, seus olhos podem ficar totalmente negros ou chifres podem nascer na sua testa. Ou você pode ficar mirrado e horrendo, perdendo todos os traços faciais, adquirindo uma língua bifurcada ou alguma outra característica, à"},{"type":"paragraph","text":"escolha do Mestre. A marca das trevas concede a você vantagem em testes de Carisma (Persuasão) feitos ao interagir com criaturas malignas e testes de Carisma (Intimidação) feitos ao interagir com criaturas não-malignas."},{"type":"paragraph","text":"Comandar o Mal. Enquanto estiver sintonizado com o livro e portando-o, você pode usar uma ação para conjurar a magia dominar monstro (CD de resistência 18) em um alvo maligno. Você não pode usar esta propriedade novamente até o próximo amanhecer."},{"type":"paragraph","text":"CONHECIMENTO VIL"},{"type":"paragraph","text":"O Livro da Escuridão Perversa toca cada mal no cosmos. Um personagem pode usar o conhecimento contido no livro para exumar segredos terríveis que nenhum mortal deveria conhecer. Junto do conteúdo que um personagem poderia encontrar estão os seguintes, mais o que quer que você escolha:"},{"type":"list","items":["Apoteose Maligna. O livro poderia conter um ritual que permita que um personagem se transforme em um lich ou cavaleiro da morte.","Nomes Verdadeiros. Os nomes verdadeiros de qualquer número de corruptores poderia estar no livro.","Magia Negra. Diversas magias de maldade horrenda criadas e escolhidas pelo Mestre poderiam estar no livro. Essas magias poderiam impor maldições medonhas, desfigurar outros, requerer sacrifício humano, afligir criaturas com dores excruciantes, espalhar pragas malignas e assim por diante."]},{"type":"paragraph","text":"Conhecimento Sombrio. Você pode fazer referência ao Livro da Escuridão Perversa sempre que realizar um teste de Inteligência para lembrar informações sobre algum aspecto do mal, como conhecimento sobre demônios. Quando o fizer, dobre seu bônus de proficiência nesse teste."},{"type":"paragraph","text":"Discurso Obscuro. Enquanto você carregar o Livro da Escuridão Perversa e estiver sintonizado com ele, você pode usar uma ação para recitar palavras das páginas dele em uma linguagem torpe conhecida como Discurso Obscuro. Cada vez que o fizer, você sofre 1d12 de dano psíquico e cada criatura não-maligna a até 4,5 metros e você sofre 3d6 de dano psíquico."},{"type":"paragraph","text":"Destruindo o Livro. O Livro da Escuridão Perversa permite que páginas sejam arrancadas dele, mas qualquer conhecimento maligno contido nessas páginas encontram seu caminho de volta para o livro eventualmente, geralmente quando um novo autor adiciona páginas ao tomo."},{"type":"paragraph","text":"Se um solar partir o livro em dois, o livro é destruído por 1d100 anos, após isso, ele se reconstrói em algum canto sombrio do multiverso."},{"type":"paragraph","text":"Uma criatura sintonizada com o livro por um século ou mais pode exumar uma frase escondida no texto original dele, quando traduzido para Celestial e pronunciada em voz alta, destrói tanto o locutor quanto o livro em um clarão cegante de radiação. Porém, enquanto o mal existir no multiverso, o livro se reformará 1d10 x 100 anos depois."},{"type":"paragraph","text":"Caso todo o mal seja extirpado do multiverso, o livro se transformará em pó e será destruído para sempre."}]},{"id":"guia-do-mestre-item-magico-livro-dos-grandes-feitos","nome":"Livro dos Grandes Feitos","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":225,"pagina_pdf":226,"referencia":"225 (PDF: 226)","preco":null,"peso":null,"raridade":"artefato","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Tratado definitivo de tudo que é bom no multiverso, o mítico Livro dos Grande Feitos é um símbolo proeminente em muitas religiões. Ao invés de ser uma escritura devotada a uma crença em particular, os diversos autores do livro preencheram suas páginas com suas próprias visões de virtudes reais, provendo direcionamento para derrotar o mal. O Livro dos Grandes Feitos raramente perdura em um lugar. Assim que o livro é lido, ele desaparece e vai para outro canto do multiverso onde sua orientação moral pode trazer luz a um mundo trevoso. Apesar de tentativas de copia-lo terem sido feitas, os esforços em fazê-lo fracassam em capturar a natureza mágica ou em traduzir os benefícios que ele oferece aqueles de coração puro e propósito determinado. Uma fivela pesada, feita para se parecer com asas de anjo, mantem o conteúdo do livro seguro. Apenas uma criatura de tendência boa que se sintonize com o livro pode liberar a fivela que o mantém fechado. Uma vez que o livro seja aberto, a criatura sintonizada deve gastar 80 horas lendo e estudando o livro para absorver seu conteúdo e ganhar seus benefícios. Outras criaturas que folhearem as páginas do livro aberto podem ler um texto, mas não captarão nenhum sentido mais profundo e não adquirem qualquer benefício. Uma criatura maligna que tente ler o livro sofre 24d6 de dano radiante. Este dano ignora resistência e imunidade e não pode ser reduzido ou evitado de qualquer forma. Uma criatura reduzida a 0 pontos de vida por este dano, desaparece em um clarão cegante e é destruída, deixando seus pertences para trás. Os benefícios conferidos pelo Livro dos Grandes Feitos duram apenas enquanto você permanecer bom. Se você fracassar em realizar pelo menos um ato de gentileza ou generosidade num período de 10 dias, ou se você realizar um ato maligno voluntariamente, você perde todos os benefícios concedidos pelo livro. Propriedades Aleatórias. O Livro dos Grandes Feitos possui as seguintes propriedades aleatórias: 2 propriedades benéficas menores 2 propriedades benéficas maiores Sabedoria Aumentada. Após gastar o tempo necessário lendo e estudando o livro, seu valor de Sabedoria aumenta em 2, até o máximo de 24. Você não pode ganhar esse benefício através desse livro mais de uma vez. Magia Esclarecida. Uma vez que tenha lido e estudado o livro, qualquer espaço de magia que você gaste para conjurar uma magia de clérigo ou paladino conta como um espaço de magia um nível superior. Halo. Uma vez que tenha lido e estudado o livro, você ganha um halo protetor. Este halo emite luz plena num raio de 3 metros e penumbra por mais 3 metros adicionais. Você pode dissipar ou manifestar o halo com um ação bônus. Enquanto estiver presente, o halo dá a você vantagem em testes de Carisma (Persuasão) feitos ao interagir com criaturas boas e testes de Carisma (Intimidação) feitos ao interagir com criaturas malignas. Além disso, corruptores e mortos-vivos dentro da luz plena do halo fazem jogadas de ataque contra você com desvantagem. Destruindo o Livro. Existem rumores que o Livro dos Grandes Feitos não pode ser destruído enquanto o bem existir no multiverso. Porém, imergir o livro no Rio Estige remove todas as escritas e imagens de suas páginas e deixa o livro sem poderes por 1d100 anos.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, artefato (requer sintonização com uma criatura de tendência boa)","descricao_blocos":[{"type":"paragraph","text":"Tratado definitivo de tudo que é bom no multiverso, o mítico Livro dos Grande Feitos é um símbolo proeminente em muitas religiões. Ao invés de ser uma escritura devotada a uma crença em particular, os diversos autores do livro preencheram suas páginas com suas próprias visões de virtudes reais, provendo direcionamento para derrotar o mal."},{"type":"paragraph","text":"O Livro dos Grandes Feitos raramente perdura em um lugar. Assim que o livro é lido, ele desaparece e vai para outro canto do multiverso onde sua orientação moral pode trazer luz a um mundo trevoso. Apesar de tentativas de copia-lo terem sido feitas, os esforços em fazê-lo fracassam em capturar a natureza mágica ou em traduzir os benefícios que ele oferece aqueles de coração puro e propósito determinado."},{"type":"paragraph","text":"Uma fivela pesada, feita para se parecer com asas de anjo, mantem o conteúdo do livro seguro. Apenas uma criatura de tendência boa que se sintonize com o livro pode liberar a fivela que o mantém fechado. Uma vez que o livro seja aberto, a criatura sintonizada deve gastar 80 horas lendo e estudando o livro para absorver seu conteúdo e ganhar seus benefícios. Outras criaturas que folhearem as páginas do livro aberto podem ler um texto, mas não captarão nenhum sentido mais profundo e não adquirem qualquer benefício. Uma criatura maligna que tente ler o livro sofre 24d6 de dano radiante. Este dano ignora resistência e imunidade e não pode ser reduzido ou evitado de qualquer forma. Uma criatura reduzida a 0 pontos de vida por este dano, desaparece em um clarão cegante e é destruída, deixando seus pertences para trás."},{"type":"paragraph","text":"Os benefícios conferidos pelo Livro dos Grandes Feitos duram apenas enquanto você permanecer bom. Se você fracassar em realizar pelo menos um ato de gentileza ou generosidade num período de 10 dias, ou se você realizar um ato maligno voluntariamente, você perde todos os benefícios concedidos pelo livro."},{"type":"paragraph","text":"Propriedades Aleatórias. O Livro dos Grandes Feitos possui as seguintes propriedades aleatórias:"},{"type":"list","items":["2 propriedades benéficas menores","2 propriedades benéficas maiores"]},{"type":"paragraph","text":"Sabedoria Aumentada. Após gastar o tempo necessário lendo e estudando o livro, seu valor de Sabedoria aumenta em 2, até o máximo de 24. Você não pode ganhar esse benefício através desse livro mais de uma vez."},{"type":"paragraph","text":"Magia Esclarecida. Uma vez que tenha lido e estudado o livro, qualquer espaço de magia que você gaste para conjurar uma magia de clérigo ou paladino conta como um espaço de magia um nível superior."},{"type":"paragraph","text":"Halo. Uma vez que tenha lido e estudado o livro, você ganha um halo protetor. Este halo emite luz plena num raio de 3 metros e penumbra por mais 3 metros adicionais. Você pode dissipar ou manifestar o halo com um ação bônus. Enquanto estiver presente, o halo dá a você vantagem em testes de Carisma (Persuasão) feitos ao interagir com criaturas boas e testes de Carisma (Intimidação) feitos ao interagir com criaturas malignas. Além disso, corruptores e mortos-vivos dentro da luz plena do halo fazem jogadas de ataque contra você com desvantagem."},{"type":"paragraph","text":"Destruindo o Livro. Existem rumores que o Livro dos Grandes Feitos não pode ser destruído enquanto o bem existir no multiverso. Porém, imergir o livro no Rio Estige remove todas as escritas e imagens de suas páginas e deixa o livro sem poderes por 1d100 anos."}]},{"id":"guia-do-mestre-item-magico-machado-dos-lordes-anoes","nome":"Machado dos Lordes Anões","categoria":"Item mágico","tipo":"Arma (machado de batalha)","fonte":"Guia do Mestre","pagina_livro":225,"pagina_pdf":226,"referencia":"225 (PDF: 226)","preco":null,"peso":null,"raridade":"artefato","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Vendo o risco que seu povo enfrentava, um jovem príncipe anão veio a crer que seu povo precisava de algo para uni-lo. Então, ele decidiu forjar uma arma que seria tal símbolo. Aventurando-se nas profundezas abaixo das montanhas, mais fundo que qualquer anão já havia ido, o jovem príncipe chegou ao coração ardente de um grande vulcão. Com a ajuda de Moradin, o deus anão da criação, ele primeiro construiu quatro grandes ferramentas: a Picareta Brutal, a Forja do Coração da Terra, a Bigorna das Canções e o Martelo Modelador. Com eles, ele forjou o Machado dos Lordes Anões. Armado com o artefato, o príncipe retornou aos clãs anões e trouxe paz. Seu machado acabou com rancores e respondeu as desavenças. Os clãs se tornaram aliados e afastaram seus inimigos, entrando numa era de prosperidade. Este jovem anão é lembrando como o Primeiro Rei. Quando ele envelheceu, passou a arma, que se tornou o emblema do cargo, ao seu herdeiro. Os herdeiros de direito passaram o machado a diante por muitas gerações. Posteriormente, em uma era de trevas marcada pela traição e maldade, o machado se perdeu em uma sangrenta guerra civil fomentada pela ganância por seu poder e pela posição que ele outorga. Séculos depois, os anões ainda procura pelo machado e muitos aventureiros fizeram carreira atrás de rumores e saqueando câmaras antigas para encontra-lo. Arma Mágica. O Machado dos Lordes Anões é uma arma mágica que concede +3 de bônus nas jogadas de ataque e dano feitas com ele. O machado também funciona como um cinto dos anões, um arremessador anão e uma espada decepadora. Propriedades Aleatórias. O machado tem as seguintes propriedades determinadas aleatoriamente: 2 propriedades benéficas menores 1 propriedade benéfica maior 2 propriedades prejudiciais menores Bênçãos de Mor
