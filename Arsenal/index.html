efenderá, mas não fará mais nada. No final da duração, a criatura agirá de acordo com sua disposição e tendência normais."},{"type":"table","headers":["d100","Conteúdo"],"rows":[["01-50","Vazio"],["51","Arcanaloth"],["52","Cambion"],["53-54","Dao"],["55-57","Demônio (tipo 1)"],["58-60","Demônio (tipo 2)"],["61-62","Demônio (tipo 3)"],["63-64","Demônio (tipo 4)"],["65","Demônio (tipo 5)"],["66","Demônio (tipo 6)"],["67","Deva"],["68-69","Diabo (maior)"],["70-72","Diabo (menor)"],["73-74","Djinni"],["75-76","Efreeti"],["77-78","Elemental (qualquer)"],["79","Cavaleiro githyanki"],["80","Zerth githzerai"],["81","Caçador invisível"],["82","Marid"],["83-84","Mezzoloth"],["85-86","Bruxa da noite"],["87-88","Nycaloth"],["89-90","Planetário"],["91","Salamandra"],["92-93","Slaad (qualquer)"],["94","Solar"],["95","Súcubo/íncubo"],["96","Ultroloth"],["97-00","Xorn"]]},{"type":"paragraph","text":"Uma magia identificação revela que uma criatura está dentro do frasco, mas a única forma de determinar o tipo da criatura é abrindo o frasco. Uma garrafa descoberta recentemente poderia já possuir uma criatura, à escolha do Mestre ou determinada aleatoriamente."}]},{"id":"guia-do-mestre-item-magico-garrafa-de-fumaca-eterna","nome":"Garrafa de Fumaça Eterna","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":186,"pagina_pdf":186,"referencia":"186 (PDF: 186)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Fumaça vaza da boca arrolhada desta garrafa de latão, que pesa 0,5 quilo. Quando você usa uma ação para remover a rolha, uma nuvem de fumaça fina se espalha num raio de 18 metros da garrafa. A área da nuvem é de escuridão densa. Cada minuto que a garrafa permanecer aberta e dentro da nuvem, o raio aumenta em 3 metros até chegar ao raio máximo de 36 metros. A nuvem persiste enquanto a garrafa estiver aberta. Fechar a garrafa requer que você diga a palavra de comando com uma ação. Uma vez fechada, a nuvem se dispersa após 10 minutos. Um vento moderado (16,5 a 30 quilômetros por hora) também pode dispersar a fumaça após 1 minuto, e um vento forte (31,5 ou mais quilômetros por hora) também pode fazer o mesmo após 1 rodada.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Fumaça vaza da boca arrolhada desta garrafa de latão, que pesa 0,5 quilo. Quando você usa uma ação para remover a rolha, uma nuvem de fumaça fina se espalha num raio de 18 metros da garrafa. A área da nuvem é de escuridão densa. Cada minuto que a garrafa permanecer aberta e dentro da nuvem, o raio aumenta em 3 metros até chegar ao raio máximo de 36 metros."},{"type":"paragraph","text":"A nuvem persiste enquanto a garrafa estiver aberta. Fechar a garrafa requer que você diga a palavra de comando com uma ação. Uma vez fechada, a nuvem se dispersa após 10 minutos. Um vento moderado (16,5 a 30 quilômetros por hora) também pode dispersar a fumaça após 1 minuto, e um vento forte (31,5 ou mais quilômetros por hora) também pode fazer o mesmo após 1 rodada."}]},{"id":"guia-do-mestre-item-magico-garrafa-do-efreeti","nome":"Garrafa do Efreeti","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":186,"pagina_pdf":187,"referencia":"186 (PDF: 187)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta garrafa de latão pintada pesa 0,5 quilo. Quando você usa uma ação para remover sua rolha, uma fina nuvem de fumaça sai da garrafa. No final do seu turno, a fumaça desaparece em uma explosão de fogo inofensiva e um efreeti aparece em um espaço desocupado a até 9 metros de você. Veja o Manual dos Monstros para as estatísticas do efreeti. Da primeira vez que a garrafa for aberta, o Mestre rola para determinar o que acontece. d100 Efeito 01-10 O efreeti ataca você. Após lutar por 5 rodadas, ele desaparece e a garrafa perde sua mágica. 11-90 O efreeti serve você por 1 hora, fazendo o que você mandar. Então o efreeti volta para a garrafa e uma nova rolha retém ele. A rolha não pode ser removida por 24 horas. Das próximas duas vezes que a garrafa for aberta, o mesmo efeito ocorre. Se a garrafa for aberta uma quarta vez, o efreeti escapa e desaparece, e a garrafa perde sua mágica. 91-00 O efreeti pode conjurar a magia desejo três vezes para você. Ele desaparece após conceder o desejo final ou após 1 hora e a garrafa perde sua mágica.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, muito raro","descricao_blocos":[{"type":"paragraph","text":"Esta garrafa de latão pintada pesa 0,5 quilo. Quando você usa uma ação para remover sua rolha, uma fina nuvem de fumaça sai da garrafa. No final do seu turno, a fumaça desaparece em uma explosão de fogo inofensiva e um efreeti aparece em um espaço desocupado a até 9 metros de você. Veja o Manual dos Monstros para as estatísticas do efreeti."},{"type":"paragraph","text":"Da primeira vez que a garrafa for aberta, o Mestre rola para determinar o que acontece."},{"type":"table","headers":["d100","Efeito"],"rows":[["01-10","O efreeti ataca você. Após lutar por 5 rodadas, ele desaparece e a garrafa perde sua mágica."],["11-90","O efreeti serve você por 1 hora, fazendo o que você mandar. Então o efreeti volta para a garrafa e uma nova rolha retém ele. A rolha não pode ser removida por 24 horas. Das próximas duas vezes que a garrafa for aberta, o mesmo efeito ocorre. Se a garrafa for aberta uma quarta vez, o efreeti escapa e desaparece, e a garrafa perde sua mágica."],["91-00","O efreeti pode conjurar a magia desejo três vezes para você. Ele desaparece após conceder o desejo final ou após 1 hora e a garrafa perde sua mágica."]]}]},{"id":"guia-do-mestre-item-magico-gema-da-luminosidade","nome":"Gema da Luminosidade","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":186,"pagina_pdf":187,"referencia":"186 (PDF: 187)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este prisma tem 50 cargas. Enquanto você estiver segurando ele, você pode usar uma ação para falar uma das três palavras de comando para ativar um dos seguintes efeitos: A primeira palavra de comando faz com que a gema emita luz plena num raio de 9 metros e penumbra por mais 9 metros adicionais. Esse efeito não gasta nenhuma carga. Ele dura até você usar uma ação bônus para repetir a palavra de comando ou até você usar outra função da gema. A segunda palavra de comando gasta 1 carga e faz com que a gema dispare um raio brilhante de luz em uma criatura, que você possa ver, a até 18 metros de você. A criatura deve ser bem sucedida num teste de resistência de Constituição CD 15 ou ficará cega por 1 minuto. A criatura pode repetir o teste de resistência no final de cada um dos turnos dela, terminando o efeito sobre si, caso obtenha sucesso. A terceira palavra de comando gasta 5 cargas e faz com que a gema brilhe com luz cegante num cone de 9 metros originado em você. Cada criatura no cone deve realizar um teste de resistência como se tivesse sido atingida pelo raio criado com a segunda palavra de comando. Quando todas as cargas da gema tiverem sido gastar, a gema torna-se uma joia não-mágica valendo 50 po.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Este prisma tem 50 cargas. Enquanto você estiver segurando ele, você pode usar uma ação para falar uma das três palavras de comando para ativar um dos seguintes efeitos:"},{"type":"list","items":["A primeira palavra de comando faz com que a gema emita luz plena num raio de 9 metros e penumbra por mais 9 metros adicionais. Esse efeito não gasta nenhuma carga. Ele dura até você usar uma ação bônus para repetir a palavra de comando ou até você usar outra função da gema.","A segunda palavra de comando gasta 1 carga e faz com que a gema dispare um raio brilhante de luz em uma criatura, que você possa ver, a até 18 metros de você. A criatura deve ser bem sucedida num teste de resistência de Constituição CD 15 ou ficará cega por 1 minuto. A criatura pode repetir o teste de resistência no final de cada um dos turnos dela, terminando o efeito sobre si, caso obtenha sucesso.","A terceira palavra de comando gasta 5 cargas e faz com que a gema brilhe com luz cegante num cone de 9 metros originado em você. Cada criatura no cone deve realizar um teste de resistência como se tivesse sido atingida pelo raio criado com a segunda palavra de comando."]},{"type":"paragraph","text":"Quando todas as cargas da gema tiverem sido gastar, a gema torna-se uma joia não-mágica valendo 50 po."}]},{"id":"guia-do-mestre-item-magico-gema-de-visao","nome":"Gema de Visão","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":186,"pagina_pdf":187,"referencia":"186 (PDF: 187)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Esta gema possui 3 cargas. Com uma ação, você pode falar a palavra de comando e gastar 1 carga. Pelos próximos 10 minutos, você tem visão verdadeira com alcance de 36 metros quando você olhar através da gema. A gema recupera 1d3 das cargas gastas diariamente ao amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Esta gema possui 3 cargas. Com uma ação, você pode falar a palavra de comando e gastar 1 carga. Pelos próximos 10 minutos, você tem visão verdadeira com alcance de 36 metros quando você olhar através da gema."},{"type":"paragraph","text":"A gema recupera 1d3 das cargas gastas diariamente ao amanhecer."}]},{"id":"guia-do-mestre-item-magico-gema-elemental","nome":"Gema Elemental","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":186,"pagina_pdf":187,"referencia":"186 (PDF: 187)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta gema contém uma centelha de energia elemental. Quando você usa uma ação para quebra a gema, um elemental é invocado como se você tivesse conjurado a magia conjurar elemental e a mágica da gema é perdida. O tipo da gema determina o elemental invocado pela magia. Elemental Invocado Elemental Invocado Gema Gema Safira azul Safira azul Elemental do ar Elemental do ar Diamante amarelo Elemental da terra Diamante amarelo Elemental da terra Coríndon vermelho Coríndon vermelho Elemental do fogo Elemental do fogo Elemental da água Elemental da água Esmeralda Esmeralda","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Esta gema contém uma centelha de energia elemental. Quando você usa uma ação para quebra a gema, um elemental é invocado como se você tivesse conjurado a magia conjurar elemental e a mágica da gema é perdida. O tipo da gema determina o elemental invocado pela magia."},{"type":"paragraph","text":"Elemental Invocado"},{"type":"paragraph","text":"Elemental Invocado"},{"type":"paragraph","text":"Gema"},{"type":"paragraph","text":"Gema"},{"type":"paragraph","text":"Safira azul"},{"type":"paragraph","text":"Safira azul"},{"type":"paragraph","text":"Elemental do ar"},{"type":"paragraph","text":"Elemental do ar"},{"type":"paragraph","text":"Diamante amarelo"},{"type":"paragraph","text":"Elemental da terra"},{"type":"paragraph","text":"Diamante amarelo"},{"type":"paragraph","text":"Elemental da terra"},{"type":"paragraph","text":"Coríndon vermelho"},{"type":"paragraph","text":"Coríndon vermelho"},{"type":"paragraph","text":"Elemental do fogo"},{"type":"paragraph","text":"Elemental do fogo"},{"type":"paragraph","text":"Elemental da água"},{"type":"paragraph","text":"Elemental da água"},{"type":"paragraph","text":"Esmeralda"},{"type":"paragraph","text":"Esmeralda"}]},{"id":"guia-do-mestre-item-magico-globo-de-fluxo","nome":"Globo de Fluxo","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":187,"pagina_pdf":188,"referencia":"187 (PDF: 188)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta pequena esfera de vidro fino pesa 0,5 quilo. Se você estiver a até 18 metros dela, você pode falar a palavra de comando e fazer com que ela emane a magia luz ou luz do dia. Uma vez usado, o efeito de luz do dia não pode ser usado novamente até o próximo amanhecer. Você pode falar outra palavra de comando, com uma ação, para fazer o globo iluminado se erguer no ar e flutuar a não mais de 1,5 metro do chão. O globo flutua dessa forma até você ou outra criatura pega-lo. Se você se afastar mais de 18 metros do globo flutuante, ele segue você até estar a até 18 metros de você. Ele toma a rota mais rápida para fazer isso. Se for impedido de se mover, o globo pousa suavemente no solo, torna-se inativo e sua luz se apaga.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Esta pequena esfera de vidro fino pesa 0,5 quilo. Se você estiver a até 18 metros dela, você pode falar a palavra de comando e fazer com que ela emane a magia luz ou luz do dia. Uma vez usado, o efeito de luz do dia não pode ser usado novamente até o próximo amanhecer."},{"type":"paragraph","text":"Você pode falar outra palavra de comando, com uma ação, para fazer o globo iluminado se erguer no ar e flutuar a não mais de 1,5 metro do chão. O globo flutua dessa forma até você ou outra criatura pega-lo. Se você se afastar mais de 18 metros do globo flutuante, ele segue você até estar a até 18 metros de você. Ele toma a rota mais rápida para fazer isso. Se for impedido de se mover, o globo pousa suavemente no solo, torna-se inativo e sua luz se apaga."}]},{"id":"guia-do-mestre-item-magico-instrumento-dos-bardos","nome":"Instrumento dos Bardos","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":187,"pagina_pdf":188,"referencia":"187 (PDF: 188)","preco":null,"peso":null,"raridade":"raridade variável","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Um instrumento dos bardos é um exemplar exótico de seu tipo, superior a um instrumento ordinário de todas as formas. Sete tipos desses instrumentos existem, cada um nomeado em homenagem a um lendário colégio de bardos. A tabela a seguir lista as magias comuns a todos os instrumentos, assim como as magias especificas a cada um deles e sua raridade. Uma criatura que tente tocar um instrumento sem se sintonizar a ele, deve ser bem sucedida num teste de resistência de Sabedoria CD 15 ou sofrerá 2d4 de dano psíquico. Você pode usar uma ação para tocar o instrumento e conjurar uma de suas magias. Uma vez que o instrumento tenha sido usado para conjurar uma magia, ele não poderá ser usado para conjurar essa magia novamente até o próximo amanhecer. A magia usa sua habilidade de conjuração e CD de suas magias. Quando você usa o instrumento para conjurar uma magia que faça com que os alvos fiquem enfeitiçados caso fracassem na resistência, os alvos terão desvantagem nos testes de resistência. Esse efeito se aplica tanto quando você está usando o instrumento como fonte de magia quanto como seu foco de conjuração. Todos-Voo, invisibilidade, levitação, proteção contra o bem e mal, mais as magias listadas para o instrumento em particular Harpa de Anstruth Muito raro Controlar o clima, curar ferimentos (5° nível), muralha de espinhos Mandolim de Canaith Raro Curar ferimentos (3° nível), dissipar magia, proteção contra energia (elétrico apenas) Lira de Cli Raro Moldar rochas, muralha de fogo, muralha de vento Alaúde de Doss Incomum Amizade animal, proteção contra energia (fogo apenas), proteção contra veneno Bandolim de Fochlucan Incomum Constrição, fogo das fadas, bordão místico, falar com animais Citara de Mac-Fuirmidh Incomum Pele de árvore, curar ferimentos, névoa obscurecente Harpa de Ollamh Lendário Confusão, controlar o clima, tempestade de fogo","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raridade variável (requer sintonização com um bardo)","descricao_blocos":[{"type":"paragraph","text":"Um instrumento dos bardos é um exemplar exótico de seu tipo, superior a um instrumento ordinário de todas as formas. Sete tipos desses instrumentos existem, cada um nomeado em homenagem a um lendário colégio de bardos. A tabela a seguir lista as magias comuns a todos os instrumentos, assim como as magias especificas a cada um deles e sua raridade."},{"type":"paragraph","text":"Uma criatura que tente tocar um instrumento sem se sintonizar a ele, deve ser bem sucedida num teste de resistência de Sabedoria CD 15 ou sofrerá 2d4 de dano psíquico."},{"type":"paragraph","text":"Você pode usar uma ação para tocar o instrumento e conjurar uma de suas magias. Uma vez que o instrumento tenha sido usado para conjurar uma magia, ele não poderá ser usado para conjurar essa magia novamente até o próximo amanhecer. A magia usa sua habilidade de conjuração e CD de suas magias."},{"type":"paragraph","text":"Quando você usa o instrumento para conjurar uma magia que faça com que os alvos fiquem enfeitiçados caso fracassem na resistência, os alvos terão desvantagem nos testes de resistência. Esse efeito se aplica tanto quando você está usando o instrumento como fonte de magia quanto como seu foco de conjuração."},{"type":"table","headers":["Instrumento","Raridade","Magias"],"rows":[["Todos","-","Voo, invisibilidade, levitação, proteção contra o bem e mal, mais as magias listadas para o instrumento em particular"],["Harpa de Anstruth","Muito raro","Controlar o clima, curar ferimentos (5° nível), muralha de espinhos"],["Mandolim de Canaith","Raro","Curar ferimentos (3° nível), dissipar magia, proteção contra energia (elétrico apenas)"],["Lira de Cli","Raro","Moldar rochas, muralha de fogo, muralha de vento"],["Alaúde de Doss","Incomum","Amizade animal, proteção contra energia (fogo apenas), proteção contra veneno"],["Bandolim de Fochlucan","Incomum","Constrição, fogo das fadas, bordão místico, falar com animais"],["Citara de Mac-Fuirmidh","Incomum","Pele de árvore, curar ferimentos, névoa obscurecente"],["Harpa de Ollamh","Lendário","Confusão, controlar o clima, tempestade de fogo"]]}]},{"id":"guia-do-mestre-item-magico-jarro-de-alquimia","nome":"Jarro de Alquimia","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":187,"pagina_pdf":188,"referencia":"187 (PDF: 188)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este jarro de cerâmica parece comportar até 4 litros de líquido e pesar 6 quilos tanto cheio quanto vazio. Sons de líquido podem ser ouvidos de dentro do jarro quando ele é sacudido, mesmo se o jarro estiver vazio. Você pode usar uma ação e nomear um líquido da tabela abaixo para fazer com que o jarro produza o líquido escolhido. Depois disso, você pode desarrolhar o jarro com uma ação e derramar o líquido, até 7 litros por minuto. A quantidade máxima de líquido que o jarro pode produzir depende do líquido que você nomeou. Uma vez que o jarro tenha começado a produzir um líquido, ele não poderá produzir um diferente, ou mais de um que já tenha atingido seu máximo, até o próximo amanhecer. Líquido Quant Máx Líquido Quant Máx Ácido Óleo 25 ml 1 litro Veneno básico 1,5 ml 8 litros Vinagre Água doce 16 litros 32 litros Cerveja Água salgada Mel 4 litros 48 litros 8 litros Vinho 4 litros Maionese","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Este jarro de cerâmica parece comportar até 4 litros de líquido e pesar 6 quilos tanto cheio quanto vazio. Sons de líquido podem ser ouvidos de dentro do jarro quando ele é sacudido, mesmo se o jarro estiver vazio."},{"type":"paragraph","text":"Você pode usar uma ação e nomear um líquido da tabela abaixo para fazer com que o jarro produza o líquido escolhido. Depois disso, você pode desarrolhar o jarro com uma ação e derramar o líquido, até 7 litros por minuto. A quantidade máxima de líquido que o jarro pode produzir depende do líquido que você nomeou."},{"type":"paragraph","text":"Uma vez que o jarro tenha começado a produzir um líquido, ele não poderá produzir um diferente, ou mais de um que já tenha atingido seu máximo, até o próximo amanhecer."},{"type":"paragraph","text":"Líquido"},{"type":"paragraph","text":"Quant Máx"},{"type":"paragraph","text":"Líquido"},{"type":"paragraph","text":"Quant Máx"},{"type":"paragraph","text":"Ácido"},{"type":"paragraph","text":"Óleo"},{"type":"paragraph","text":"25 ml"},{"type":"paragraph","text":"1 litro"},{"type":"paragraph","text":"Veneno básico"},{"type":"paragraph","text":"1,5 ml"},{"type":"paragraph","text":"8 litros"},{"type":"paragraph","text":"Vinagre"},{"type":"paragraph","text":"Água doce"},{"type":"paragraph","text":"16 litros"},{"type":"paragraph","text":"32 litros"},{"type":"paragraph","text":"Cerveja"},{"type":"paragraph","text":"Água salgada"},{"type":"paragraph","text":"Mel"},{"type":"paragraph","text":"4 litros"},{"type":"paragraph","text":"48 litros"},{"type":"paragraph","text":"8 litros"},{"type":"paragraph","text":"Vinho"},{"type":"paragraph","text":"4 litros"},{"type":"paragraph","text":"Maionese"}]},{"id":"guia-do-mestre-item-magico-ladra-das-nove-vidas","nome":"Ladra das Nove Vidas","categoria":"Item mágico","tipo":"Arma (qualquer espada)","fonte":"Guia do Mestre","pagina_livro":189,"pagina_pdf":189,"referencia":"189 (PDF: 189)","preco":null,"peso":null,"raridade":"muito rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você recebe +2 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. A espada possui 1d8 +1 cargas. Se você atingir um acerto crítico contra uma criatura que esteja com 100 pontos de vida ou menos, ela deve ser bem sucedida num teste de resistência de Constituição CD 15 ou morrerá instantaneamente, conforme a espada arranca sua força vital do corpo dela (um constructo ou morto-vivo é imune). A espada perde 1 carga se a criatura for morta. Quando a espada não tiver mais cargas, ela perde esta propriedade.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (qualquer espada), muito rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Você recebe +2 de bônus nas jogadas de ataque e dano feitas com esta arma mágica."},{"type":"paragraph","text":"A espada possui 1d8 +1 cargas. Se você atingir um acerto crítico contra uma criatura que esteja com 100 pontos de vida ou menos, ela deve ser bem sucedida num teste de resistência de Constituição CD 15 ou morrerá instantaneamente, conforme a espada arranca sua força vital do corpo dela (um constructo ou morto-vivo é imune). A espada perde 1 carga se a criatura for morta. Quando a espada não tiver mais cargas, ela perde esta propriedade."}]},{"id":"guia-do-mestre-item-magico-lamina-da-sorte","nome":"Lâmina da Sorte","categoria":"Item mágico","tipo":"Arma (qualquer espada)","fonte":"Guia do Mestre","pagina_livro":189,"pagina_pdf":189,"referencia":"189 (PDF: 189)","preco":null,"peso":null,"raridade":"lendária","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Enquanto a espada estiver em sua posse, você também ganha +1 de bônus nos testes de resistência. Sorte. Se a espada estiver em sua posse, você pode chamar a sorte dela (nenhuma ação necessária) para jogar novamente uma jogada de ataque, teste de habilidade ou teste de resistência que você não tenha gostado. Você deve usar a segunda jogada. Esta propriedade não pode ser usada até o próximo amanhecer. Desejo. A espada possui 1d4-1 cargas. Enquanto a empunhar, você pode usar uma ação para gastar 1 carga e co njurar a magia desejo através dela. Esta propriedade não pode ser usada novamente até o próximo amanhecer. A espada perde esta propriedade se não tiver mais cargas.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (qualquer espada), lendária (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Enquanto a espada estiver em sua posse, você também ganha +1 de bônus nos testes de resistência."},{"type":"paragraph","text":"Sorte. Se a espada estiver em sua posse, você pode chamar a sorte dela (nenhuma ação necessária) para jogar novamente uma jogada de ataque, teste de habilidade ou teste de resistência que você não tenha gostado. Você deve usar a segunda jogada. Esta propriedade não pode ser usada até o próximo amanhecer."},{"type":"paragraph","text":"Desejo. A espada possui 1d4-1 cargas. Enquanto a empunhar, você pode usar uma ação para gastar 1 carga e co njurar a magia desejo através dela. Esta propriedade não pode ser usada novamente até o próximo amanhecer. A espada perde esta propriedade se não tiver mais cargas."}]},{"id":"guia-do-mestre-item-magico-lamina-do-sol","nome":"Lâmina do Sol","categoria":"Item mágico","tipo":"Arma (espada longa)","fonte":"Guia do Mestre","pagina_livro":189,"pagina_pdf":189,"referencia":"189 (PDF: 189)","preco":null,"peso":null,"raridade":"rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este item parece um cabo de espada longa. Enquanto segura o cabo, você pode usar uma ação bônus para fazer uma lâmina de radiação pura emergir do nada, ou fazer a lâmina desaparecer. Enquanto a lâmina existir, esta espada longa mágica terá a propriedade acuidade. Se você for proficiente com espadas curtas ou espadas longas, você é proficiente com a lâmina do sol. Você recebe +2 de bônus nas jogadas de ataque e dano feitas com esta arma, que causa dano radiante ao invés de dano cortante. Quando você atinge um morto-vivo com ela, o alvo sofre 1d8 de dano radiante extra. A lâmina luminosa da espada emite luz plena num raio de 4,5 metros e penumbra por mais 4,5 metros adicionais. Enquanto a lâmina permanecer, você pode usar uma ação para expandir ou reduzir o raio de luz e penumbra em 1,5 metro cada, até o máximo de 9 metros cada ou até o mínimo de 3 metros cada.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (espada longa), rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este item parece um cabo de espada longa. Enquanto segura o cabo, você pode usar uma ação bônus para fazer uma lâmina de radiação pura emergir do nada, ou fazer a lâmina desaparecer. Enquanto a lâmina existir, esta espada longa mágica terá a propriedade acuidade. Se você for proficiente com espadas curtas ou espadas longas, você é proficiente com a lâmina do sol."},{"type":"paragraph","text":"Você recebe +2 de bônus nas jogadas de ataque e dano feitas com esta arma, que causa dano radiante ao invés de dano cortante. Quando você atinge um morto-vivo com ela, o alvo sofre 1d8 de dano radiante extra."},{"type":"paragraph","text":"A lâmina luminosa da espada emite luz plena num raio de 4,5 metros e penumbra por mais 4,5 metros adicionais. Enquanto a lâmina permanecer, você pode usar uma ação para expandir ou reduzir o raio de luz e penumbra em 1,5 metro cada, até o máximo de 9 metros cada ou até o mínimo de 3 metros cada."}]},{"id":"guia-do-mestre-item-magico-lanterna-de-revelacao","nome":"Lanterna de Revelação","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":189,"pagina_pdf":190,"referencia":"189 (PDF: 190)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Enquanto acessa, esta lanterna coberta queima por 6 horas com 1 litro de óleo, emitindo luz plena num raio de 9 metros e penumbra por 9 metros adicionais. Criaturas e objetos invisíveis serão visíveis enquanto estiverem na luz plena da lanterna. Você pode usar uma ação para abaixar o capuz, reduzindo a luz para penumbra num raio de 1,5 metro.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Enquanto acessa, esta lanterna coberta queima por 6 horas com 1 litro de óleo, emitindo luz plena num raio de 9 metros e penumbra por 9 metros adicionais. Criaturas e objetos invisíveis serão visíveis enquanto estiverem na luz plena da lanterna. Você pode usar uma ação para abaixar o capuz, reduzindo a luz para penumbra num raio de 1,5 metro."}]},{"id":"guia-do-mestre-item-magico-leque-do-vento","nome":"Leque do Vento","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":189,"pagina_pdf":190,"referencia":"189 (PDF: 190)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Enquanto segurar este leque, você pode usar uma ação para conjurar a magia lufada de vento (CD de resistência 13) através dele. Uma vez usado, o leque não deveria ser usado novamente até o próximo amanhecer. Cada vez que ele for usado novamente após isso, existe 20 por cento de chance cumulativa de nada acontecer e ele se rasgar em farrapos não-mágicos imprestáveis.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Enquanto segurar este leque, você pode usar uma ação para conjurar a magia lufada de vento (CD de resistência 13) através dele. Uma vez usado, o leque não deveria ser usado novamente até o próximo amanhecer. Cada vez que ele for usado novamente após isso, existe 20 por cento de chance cumulativa de nada acontecer e ele se rasgar em farrapos não-mágicos imprestáveis."}]},{"id":"guia-do-mestre-item-magico-lingua-flamejante","nome":"Língua Flamejante","categoria":"Item mágico","tipo":"Arma (qualquer espada)","fonte":"Guia do Mestre","pagina_livro":189,"pagina_pdf":190,"referencia":"189 (PDF: 190)","preco":null,"peso":null,"raridade":"rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você pode usar uma ação para falar a palavra de comando desta espada, fazendo com que chamas emerjam de sua lâmina. Essas chamas emitem luz plena num raio de 12 metros e penumbra por amis 12 metros adicionais. Enquanto a espada estiver em chamas, ela causa 2d6 de dano de fogo extra a qualquer alvo que atingir. As chamas duram até que você use uma ação bônus para falar a palavra de comando novamente ou até você largar ou embainhar a espada.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (qualquer espada), rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Você pode usar uma ação para falar a palavra de comando desta espada, fazendo com que chamas emerjam de sua lâmina. Essas chamas emitem luz plena num raio de 12 metros e penumbra por amis 12 metros adicionais. Enquanto a espada estiver em chamas, ela causa 2d6 de dano de fogo extra a qualquer alvo que atingir. As chamas duram até que você use uma ação bônus para falar a palavra de comando novamente ou até você largar ou embainhar a espada."}]},{"id":"guia-do-mestre-item-magico-luvas-de-apanhar-projeteis","nome":"Luvas de Apanhar Projéteis","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":189,"pagina_pdf":190,"referencia":"189 (PDF: 190)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Estas luvas parecem se mesclas às suas mãos quando você as coloca. Quando um ataque armado à distância atinge você enquanto estiver usando-as, você pode usar sua reação para reduzir o dano em 1d10 + seu modificador de Destreza, considerando que você tenha uma mão livre. Se você reduzir o dano a 0, você pode agarrar o projétil caso ele seja pequeno o suficiente para você segura-lo com sua mão.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Estas luvas parecem se mesclas às suas mãos quando você as coloca. Quando um ataque armado à distância atinge você enquanto estiver usando-as, você pode usar sua reação para reduzir o dano em 1d10 + seu modificador de Destreza, considerando que você tenha uma mão livre. Se você reduzir o dano a 0, você pode agarrar o projétil caso ele seja pequeno o suficiente para você segura-lo com sua mão."}]},{"id":"guia-do-mestre-item-magico-luvas-de-nadar-e-escalar","nome":"Luvas de Nadar e Escalar","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":189,"pagina_pdf":190,"referencia":"189 (PDF: 190)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando estas luvas, nadar e escalar não custa movimento extra a você e você recebe +5 de bônus em testes de Força (Atletismo) feitos para escalar ou nadar.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando estas luvas, nadar e escalar não custa movimento extra a você e você recebe +5 de bônus em testes de Força (Atletismo) feitos para escalar ou nadar."}]},{"id":"guia-do-mestre-item-magico-luvas-do-ladrao","nome":"Luvas do Ladrão","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":189,"pagina_pdf":190,"referencia":"189 (PDF: 190)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Estas luvas são invisíveis quando vestidas. Enquanto estiver usando-as, você recebe +5 de bônus em testes de Destreza (Prestidigitação) e testes de Destreza feitos para abrir fechaduras.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Estas luvas são invisíveis quando vestidas. Enquanto estiver usando-as, você recebe +5 de bônus em testes de Destreza (Prestidigitação) e testes de Destreza feitos para abrir fechaduras."}]},{"id":"guia-do-mestre-item-magico-maca-da-destruicao","nome":"Maça da Destruição","categoria":"Item mágico","tipo":"Arma (maça)","fonte":"Guia do Mestre","pagina_livro":189,"pagina_pdf":190,"referencia":"189 (PDF: 190)","preco":null,"peso":null,"raridade":"rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. O bônus aumenta para +3 quando você usa a maça para atacar um constructo. Quando você rolar um 20 em uma jogada de ataque feita com esta arma, o alvo sofre 7 de dano de concussão extra, ou 14 de dano de concussão extra se for um constructo. Se o constructo ficar com 25 pontos de vida ou me nos após sofrer esse dano, ele é destruído.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (maça), rara","descricao_blocos":[{"type":"paragraph","text":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. O bônus aumenta para +3 quando você usa a maça para atacar um constructo."},{"type":"paragraph","text":"Quando você rolar um 20 em uma jogada de ataque feita com esta arma, o alvo sofre 7 de dano de concussão extra, ou 14 de dano de concussão extra se for um constructo. Se o constructo ficar com 25 pontos de vida ou me nos após sofrer esse dano, ele é destruído."}]},{"id":"guia-do-mestre-item-magico-maca-do-rompimento","nome":"Maça do Rompimento","categoria":"Item mágico","tipo":"Arma (maça)","fonte":"Guia do Mestre","pagina_livro":191,"pagina_pdf":191,"referencia":"191 (PDF: 191)","preco":null,"peso":null,"raridade":"rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Quando você atingir um corruptor ou um morto-vivo com esta arma mágica, a criatura sofre 2d6 de dano radiante extra. Se o alvo ficar com 25 pontos de vida ou menos após sofrer esse dano, ele deve ser bem sucedido num teste de resistência de Sabedoria CD 15 ou será destruído. Se obtiver sucesso, a criatura ficará amedrontada em relação a você até o final do seu próximo turno. Enquanto você empunhar esta arma, ela emite luz plena num raio de 6 metros e penumbra por mais 6 metros adicionais.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (maça), rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Quando você atingir um corruptor ou um morto-vivo com esta arma mágica, a criatura sofre 2d6 de dano radiante extra. Se o alvo ficar com 25 pontos de vida ou menos após sofrer esse dano, ele deve ser bem sucedido num teste de resistência de Sabedoria CD 15 ou será destruído. Se obtiver sucesso, a criatura ficará amedrontada em relação a você até o final do seu próximo turno."},{"type":"paragraph","text":"Enquanto você empunhar esta arma, ela emite luz plena num raio de 6 metros e penumbra por mais 6 metros adicionais."}]},{"id":"guia-do-mestre-item-magico-maca-do-terror","nome":"Maça do Terror","categoria":"Item mágico","tipo":"Arma (maça)","fonte":"Guia do Mestre","pagina_livro":191,"pagina_pdf":191,"referencia":"191 (PDF: 191)","preco":null,"peso":null,"raridade":"rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Esta arma mágica possui 3 cargas. Enquanto a empunhar, você pode usar uma ação para gastar 1 carga e liberar uma onda de terror. Cada criatura, à sua escolha, num raio de 9 metros a partir de você, deve ser bem sucedida num teste de resistência de Sabedoria CD 15 ou ficará amedrontada em relação a você por 1 minuto. Enquanto estiver amedrontada dessa forma, uma criatura deve gastar seus turnos tentando se afastar o máximo que puder de você e não pode se mover para um espaço a menos de 9 metros de você voluntariamente. Ela também não pode realizar reações. Para sua ação, ela pode usar apenas a ação de Disparada ou tentar escapar de um efeito que a impeça de se mover. Caso não tenha para onde ir, uma criatura pode repetir o teste de resistência, terminando o efeitos sobre si, caso obtenha sucesso. A massa recupera 1d3 cargas gastas diariamente ao amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (maça), rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Esta arma mágica possui 3 cargas. Enquanto a empunhar, você pode usar uma ação para gastar 1 carga e liberar uma onda de terror. Cada criatura, à sua escolha, num raio de 9 metros a partir de você, deve ser bem sucedida num teste de resistência de Sabedoria CD 15 ou ficará amedrontada em relação a você por 1 minuto. Enquanto estiver amedrontada dessa forma, uma criatura deve gastar seus turnos tentando se afastar o máximo que puder de você e não pode se mover para um espaço a menos de 9 metros de você voluntariamente. Ela também não pode realizar reações. Para sua ação, ela pode usar apenas a ação de Disparada ou tentar escapar de um efeito que a impeça de se mover. Caso não tenha para onde ir, uma criatura pode repetir o teste de resistência, terminando o efeitos sobre si, caso obtenha sucesso."},{"type":"paragraph","text":"A massa recupera 1d3 cargas gastas diariamente ao amanhecer."}]},{"id":"guia-do-mestre-item-magico-machado-furioso","nome":"Machado Furioso","categoria":"Item mágico","tipo":"Arma (qualquer machado)","fonte":"Guia do Mestre","pagina_livro":191,"pagina_pdf":191,"referencia":"191 (PDF: 191)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Além disso, enquanto estiver sintonizado com essa arma, seu máximo de pontos de vida aumenta em 1 para cada nível que você possua. Maldição. Este machado é amaldiçoado e se sintonizar com ele estende a maldição a você. Enquanto você estiver amaldiçoado, você não desejará se separar do machado, mantendo-o a seu alcance o tempo todo. Você também tem desvantagem nas jogadas de ataque com qualquer arma diferente do machado, a não ser que nenhum adversário esteja a menos de 18 metros de você que você possa ver ou ouvir. Toda vez que uma criatura hostil causar dano a você enquanto esse machado estiver com você, você deve ser bem sucedido num teste de resistência de Sabedoria CD 15 ou entrará em frenesi. Enquanto estiver em frenesi, você deve usar sua ação a cada rodada para atacar a criatura mais próxima de você, com o machado. Se você puder realizar ataques extras como parte da ação de Ataque, você usará esses ataques extras, movendo-se para atacar a criatura mais próxima seguinte após derrubar seu alvo atual. Se você tiver diversos alvos possíveis, você ataca um aleatoriamente. Você estará em frenesi até começar seu turno sem nenhuma criatura a menos de 18 metros de você, que você possa ver ou ouvir.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma(qualquer machado), raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Além disso, enquanto estiver sintonizado com essa arma, seu máximo de pontos de vida aumenta em 1 para cada nível que você possua."},{"type":"paragraph","text":"Maldição. Este machado é amaldiçoado e se sintonizar com ele estende a maldição a você. Enquanto você estiver amaldiçoado, você não desejará se separar do machado, mantendo-o a seu alcance o tempo todo. Você também tem desvantagem nas jogadas de ataque com qualquer arma diferente do machado, a não ser que nenhum adversário esteja a menos de 18 metros de você que você possa ver ou ouvir."},{"type":"paragraph","text":"Toda vez que uma criatura hostil causar dano a você enquanto esse machado estiver com você, você deve ser bem sucedido num teste de resistência de Sabedoria CD 15 ou entrará em frenesi. Enquanto estiver em frenesi, você deve usar sua ação a cada rodada para atacar a criatura mais próxima de você, com o machado. Se você puder realizar ataques extras como parte da ação de Ataque, você usará esses ataques extras, movendo-se para atacar a criatura mais próxima seguinte após derrubar seu alvo atual. Se você tiver diversos alvos possíveis, você ataca um aleatoriamente. Você estará em frenesi até começar seu turno sem nenhuma criatura a menos de 18 metros de você, que você possa ver ou ouvir."}]},{"id":"guia-do-mestre-item-magico-malha-do-efreeti","nome":"Malha do Efreeti","categoria":"Item mágico","tipo":"Armadura (cota de malha)","fonte":"Guia do Mestre","pagina_livro":192,"pagina_pdf":192,"referencia":"192 (PDF: 192)","preco":null,"peso":null,"raridade":"lendária","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver vestindo esta armadura, você recebe +3 de bônus na CA, é imune a dano de fogo e pode compreender e falar Primordial. Além disso, você ficar e atravessar rocha derretida como se fosse terreno sólido.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Armadura (cota de malha), lendária (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver vestindo esta armadura, você recebe +3 de bônus na CA, é imune a dano de fogo e pode compreender e falar Primordial. Além disso, você ficar e atravessar rocha derretida como se fosse terreno sólido."}]},{"id":"guia-do-mestre-item-magico-malha-elfica","nome":"Malha Élfica","categoria":"Item mágico","tipo":"Armadura (camisão de malha)","fonte":"Guia do Mestre","pagina_livro":192,"pagina_pdf":192,"referencia":"192 (PDF: 192)","preco":null,"peso":null,"raridade":"rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Você ganha +1 de bônus na CA enquanto vestir esta armadura. Você é considerado proficiente com essa armadura mesmo se você não tiver proficiência com armadura média.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Armadura (camisão de malha), rara","descricao_blocos":[{"type":"paragraph","text":"Você ganha +1 de bônus na CA enquanto vestir esta armadura. Você é considerado proficiente com essa armadura mesmo se você não tiver proficiência com armadura média."}]},{"id":"guia-do-mestre-item-magico-manoplas-de-forca-do-ogro","nome":"Manoplas de Força do Ogro","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":192,"pagina_pdf":192,"referencia":"192 (PDF: 192)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Seu valor de Força é 19 enquanto você usar estas manoplas. Ela não produz qualquer efeito em você se seu valor de Força já for 19 ou maior sem elas.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Seu valor de Força é 19 enquanto você usar estas manoplas. Ela não produz qualquer efeito em você se seu valor de Força já for 19 ou maior sem elas."}]},{"id":"guia-do-mestre-item-magico-manto-da-aranha","nome":"Manto da Aranha","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":192,"pagina_pdf":192,"referencia":"192 (PDF: 192)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Esta peça de vestuário fina é feita de seda negra entrelaçada com finos fios de prata. Enquanto estiver vestindo-o, você ganha os seguintes benefícios: Você tem resistência a dano de veneno. Você tem deslocamento de escalada igual a seu deslocamento de caminhada. Você pode se mover para cima, para baixo e através de superfícies verticais e de cabeça para baixo em tetos, enquanto deixa suas mãos livres. Você não pode ser preso por teias de qualquer tipo e pode se mover através de teias como se elas fossem terreno difícil. Você pode usar uma ação para conjurar a magia teia (CD de resistência 13). A teia criada pela magia preenche o dobro da área normal. Uma vez usada, essa propriedade do manto não poderá ser usada novamente até o próximo amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, muito raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Esta peça de vestuário fina é feita de seda negra entrelaçada com finos fios de prata. Enquanto estiver vestindo-o, você ganha os seguintes benefícios:"},{"type":"list","items":["Você tem resistência a dano de veneno.","Você tem deslocamento de escalada igual a seu deslocamento de caminhada.","Você pode se mover para cima, para baixo e através de superfícies verticais e de cabeça para baixo em tetos, enquanto deixa suas mãos livres.","Você não pode ser preso por teias de qualquer tipo e pode se mover através de teias como se elas fossem terreno difícil.","Você pode usar uma ação para conjurar a magia teia (CD de resistência 13). A teia criada pela magia preenche o dobro da área normal. Uma vez usada, essa propriedade do manto não poderá ser usada novamente até o próximo amanhecer."]}]},{"id":"guia-do-mestre-item-magico-manto-da-arraia","nome":"Manto da Arraia","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":192,"pagina_pdf":192,"referencia":"192 (PDF: 192)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este manto com o capuz sobre a cabeça, você pode respirar embaixo d'água e tem deslocamento de natação de 12 metros. Colocar ou retirar o capuz requer uma ação.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este manto com o capuz sobre a cabeça, você pode respirar embaixo d'água e tem deslocamento de natação de 12 metros. Colocar ou retirar o capuz requer uma ação."}]},{"id":"guia-do-mestre-item-magico-manto-de-deslocamento","nome":"Manto de Deslocamento","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":192,"pagina_pdf":192,"referencia":"192 (PDF: 192)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este manto, ele projeta uma ilusão que faz com que você parece estar em um lugar próximo da sua localização real, fazendo com que qualquer criatura tenha desvantagem nas jogadas de ataque contra você. Se você sofrer dano, a propriedade para de funcionar até o início do seu próximo turno. Essa propriedade é suprimida enquanto você estiver incapacitado, impedido ou, de alguma outra forma, incapaz de se mover.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este manto, ele projeta uma ilusão que faz com que você parece estar em um lugar próximo da sua localização real, fazendo com que qualquer criatura tenha desvantagem nas jogadas de ataque contra você. Se você sofrer dano, a propriedade para de funcionar até o início do seu próximo turno. Essa propriedade é suprimida enquanto você estiver incapacitado, impedido ou, de alguma outra forma, incapaz de se mover."}]},{"id":"guia-do-mestre-item-magico-manto-de-invisibilidade","nome":"Manto de Invisibilidade","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":192,"pagina_pdf":192,"referencia":"192 (PDF: 192)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este manto, você pode colocar o capuz dele sobre sua cabeça para se tornar invisível. Enquanto estiver invisível, qualquer coisa que você esteja carregando ou vestindo fica invisível com você. Você se torna visível quando remove o capuz. Colocar ou retirar o capuz requer uma ação. Deduza o tempo que você ficar invisível, em incrementos de 1 minuto, da duração máxima do manto de 2 horas. Após 2 horas de uso, o manto para de funcionar. Para cada período ininterrupto de 12 horas que o manto ficar sem uso, ele recupera 1 hora de duração.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, lendário (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este manto, você pode colocar o capuz dele sobre sua cabeça para se tornar invisível. Enquanto estiver invisível, qualquer coisa que você esteja carregando ou vestindo fica invisível com você. Você se torna visível quando remove o capuz. Colocar ou retirar o capuz requer uma ação."},{"type":"paragraph","text":"Deduza o tempo que você ficar invisível, em incrementos de 1 minuto, da duração máxima do manto de 2 horas. Após 2 horas de uso, o manto para de funcionar. Para cada período ininterrupto de 12 horas que o manto ficar sem uso, ele recupera 1 hora de duração."}]},{"id":"guia-do-mestre-item-magico-manto-de-protecao","nome":"Manto de Proteção","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":192,"pagina_pdf":192,"referencia":"192 (PDF: 192)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você recebe +1 de bônus na CA e em testes de resistência enquanto estiver usando este manto.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Você recebe +1 de bônus na CA e em testes de resistência enquanto estiver usando este manto."}]},{"id":"guia-do-mestre-item-magico-manto-de-resistencia-a-magia","nome":"Manto de Resistência À Magia","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":192,"pagina_pdf":193,"referencia":"192 (PDF: 193)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você tem vantagem em testes de resistência contra magias enquanto estiver vestindo esta capa.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheir uanto estiver usando o manto numa área de penumbra ou escuridão, você pode usar sua ação para conjurar metamorfose sobre si mesmo, transformando-se em um morcego. Enquanto você estiver na forma de morcego, você mantem seus valores de Inteligência, Sabedoria e Carisma. O manto não poderá ser usado dessa forma novamente até o próximo amanhecer."}]},{"id":"guia-do-mestre-item-magico-manto-elfico","nome":"Manto Élfico","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":192,"pagina_pdf":193,"referencia":"192 (PDF: 193)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto você estiver usando este manto com seu capuz, testes de Sabedoria (Percepção) feitos para ver você tem desvantagem, e você tem vantagem em testes de Destreza (Furtividade) feitos para se esconder, à medida que a cor do manto muda para camuflar você. Colocar ou retirar o capuz requer uma ação.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto você estiver usando este manto com seu capuz, testes de Sabedoria (Percepção) feitos para ver você tem desvantagem, e você tem vantagem em testes de Destreza (Furtividade) feitos para se esconder, à medida que a cor do manto muda para camuflar você. Colocar ou retirar o capuz requer uma ação."}]},{"id":"guia-do-mestre-item-magico-manual-de-rapidez-de-movimentos","nome":"Manual de Rapidez de Movimentos","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":192,"pagina_pdf":193,"referencia":"192 (PDF: 193)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este livro contém exercícios de coordenação e equilíbrio, e suas pala nual, você deve ser um conjurador com pelo menos dois espaços de magias de 5° nível. Uma criatura que não possa usar o manual dos golens e tente lê-lo, sofre 6d6 de dano psíquico. Para criar um golem, você deve gastar o tempo mostrado na tabela, trabalhando sem interrupções com o manual em mãos e descansando não mais de 8 horas por dia. Você também deve pagar o custo especificado para adquirir os suprimentos. 1-5 Barro 65.000 po 30 dias 6-17 Carne 50.000 po 60 dias 18 Ferro 100.000 po 120 dias 19-20 Pedra 80.000 po 90 dias Quando você terminar de criar o golem, o livro é consumido por chamas místicas. O golem torna-se animado quando as cinzas do manual forem aspergidas nele. Ele está sob seu controle, e compreende e obedece aos seus comandos falados. Veja o Manual dos Monstros para as estatísticas de jogo dele.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, muito raro","descricao_blocos":[{"type":"paragraph","text":"Este livro contém informações e encantos necessários para construir um tipo de golem em particular. O Mestre escolhe o tipo ou o determina aleatoriamente. Para decifrar e usar o manual, você deve ser um conjurador com pelo menos dois espaços de magias de 5° nível. Uma criatura que não possa usar o manual dos golens e tente lê-lo, sofre 6d6 de dano psíquico."},{"type":"paragraph","text":"Para criar um golem, você deve gastar o tempo mostrado na tabela, trabalhando sem interrupções com o manual em mãos e descansando não mais de 8 horas por dia. Você também deve pagar o custo especificado para adquirir os suprimentos."},{"type":"table","headers":["d20","Golem","Custo","Tempo"],"rows":[["1-5","Barro","65.000 po","30 dias"],["6-17","Carne","50.000 po","60 dias"],["18","Ferro","100.000 po","120 dias"],["19-20","Pedra","80.000 po","90 dias"]]},{"type":"paragraph","text":"Quando você terminar de criar o golem, o livro é consumido por chamas místicas. O golem torna-se animado quando as cinzas do manual forem aspergidas nele. Ele está sob seu controle, e compreende e obedece aos seus comandos falados. Veja o Manual dos Monstros para as estatísticas de jogo dele."}]},{"id":"guia-do-mestre-item-magico-marca-congelante","nome":"Marca Congelante","categoria":"Item mágico","tipo":"Arma (qualquer espada)","fonte":"Guia do Mestre","pagina_livro":193,"pagina_pdf":194,"referencia":"193 (PDF: 194)","preco":null,"peso":null,"raridade":"muito rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Quando você atinge um ataque usando esta espada mágica, o alvo sofre 1d6 de dano de frio extra. Além disso, enquanto estiver empunhando a espada, você tem resistência a dano de fogo. Em temperaturas congelantes, a lâmina emite luz plena num raio de 3 metros e penumbra por mais 3 metros adicionais. Quando você sacar essa arma, você pode extinguir todas as chamas não-mágicas a até 9 metros de você. Essa propriedade pode ser usada até uma vez por hora.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (qualquer espada), muito rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Quando você atinge um ataque usando esta espada mágica, o alvo sofre 1d6 de dano de frio extra. Além disso, enquanto estiver empunhando a espada, você tem resistência a dano de fogo."},{"type":"paragraph","text":"Em temperaturas congelantes, a lâmina emite luz plena num raio de 3 metros e penumbra por mais 3 metros adicionais."},{"type":"paragraph","text":"Quando você sacar essa arma, você pode extinguir todas as chamas não-mágicas a até 9 metros de você. Essa propriedade pode ser usada até uma vez por hora."}]},{"id":"guia-do-mestre-item-magico-martelo-dos-trovoes","nome":"Martelo dos Trovões","categoria":"Item mágico","tipo":"Arma (malho)","fonte":"Guia do Mestre","pagina_livro":193,"pagina_pdf":194,"referencia":"193 (PDF: 194)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Destruidor de Gigantes (Requer Sintonização). Você deve estar usando um cinturão de força do gigante (qualquer variação) e manoplas de força do ogro para se sintonizar com essa arma. A sintonização termina se você tirar quaisquer dos itens. Enquanto estiver sintonizado com essa arma e empunhando-a, seu valor de Força aumenta em 4 e pode exceder 20, mas não 30. Quando você rolar um 20 em uma jogada de ataque com essa arma contra um gigante, o gigante deve ser bem sucedido num teste de resistência de Constituição CD 17 ou morrerá. O martelo também tem 5 cargas. Enquanto estiver sintonizado a ele, você pode gastar 1 carga e realizar um ataque à distância armado com o martelo, arremessando-o como se ele tivesse a propriedade arremesso com distância normal de 6 metros e distância longa de 18 metros. Se o ataque atingir, o martelo libera um trovão audível a até 90 metros. O alvo e cada criatura a até 9 metros dele deve ser bem sucedido num teste de resistência de Constituição CD 17 ou ficará atordoado até o final do seu próximo turno. O martelo recupera 1d4 +1 das cargas gastas diariamente ao amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (malho), lendário","descricao_blocos":[{"type":"paragraph","text":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica."},{"type":"paragraph","text":"Destruidor de Gigantes (Requer Sintonização). Você deve estar usando um cinturão de força do gigante (qualquer variação) e manoplas de força do ogro para se sintonizar com essa arma. A sintonização termina se você tirar quaisquer dos itens. Enquanto estiver sintonizado com essa arma e empunhando-a, seu valor de Força aumenta em 4 e pode exceder 20, mas não 30. Quando você rolar um 20 em uma jogada de ataque com essa arma contra um gigante, o gigante deve ser bem sucedido num teste de resistência de Constituição CD 17 ou morrerá."},{"type":"paragraph","text":"O martelo também tem 5 cargas. Enquanto estiver sintonizado a ele, você pode gastar 1 carga e realizar um ataque à distância armado com o martelo, arremessando-o como se ele tivesse a propriedade arremesso com distância normal de 6 metros e distância longa de 18 metros. Se o ataque atingir, o martelo libera um trovão audível a até 90 metros. O alvo e cada criatura a até 9 metros dele deve ser bem sucedido num teste de resistência de Constituição CD 17 ou ficará atordoado até o final do seu próximo turno. O martelo recupera 1d4 +1 das cargas gastas diariamente ao amanhecer."}]},{"id":"guia-do-mestre-item-magico-matadora-de-dragoes","nome":"Matadora de Dragões","categoria":"Item mágico","tipo":"Arma (qualquer espada)","fonte":"Guia do Mestre","pagina_livro":193,"pagina_pdf":194,"referencia":"193 (PDF: 194)","preco":null,"peso":null,"raridade":"rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Quando você atinge um dragão com essa arma, o dragão sofre 3d6 de dano extra do tipo da arma. Com os propósitos dessa arma, \"dragão\" se refere a qualquer criatura de tipo dragão, incluindo tartarugas-dragão e wyverns.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (qualquer espada), rara","descricao_blocos":[{"type":"paragraph","text":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica."},{"type":"paragraph","text":"Quando você atinge um dragão com essa arma, o dragão sofre 3d6 de dano extra do tipo da arma. Com os propósitos dessa arma, \"dragão\" se refere a qualquer criatura de tipo dragão, incluindo tartarugas-dragão e wyverns."}]},{"id":"guia-do-mestre-item-magico-matador-de-gigantes","nome":"Matador de Gigantes","categoria":"Item mágico","tipo":"Arma (qualquer machado ou espada)","fonte":"Guia do Mestre","pagina_livro":194,"pagina_pdf":195,"referencia":"194 (PDF: 195)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Quando você atinge um gigante com ela, o gigante sofre 2d6 de dano extra do tipo de dano da arma e deve ser bem sucedido num teste de resistência de Força CD 15, ou será derrubado no chão. Com os propósitos dessa arma, \"gigante\" se refere a qualquer criatura de tipo gigante, incluindo ettins e trolls.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (qualquer machado ou espada), raro","descricao_blocos":[{"type":"paragraph","text":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta arma mágica."},{"type":"paragraph","text":"Quando você atinge um gigante com ela, o gigante sofre 2d6 de dano extra do tipo de dano da arma e deve ser bem sucedido num teste de resistência de Força CD 15, ou será derrubado no chão. Com os propósitos dessa arma, \"gigante\" se refere a qualquer criatura de tipo gigante, incluindo ettins e trolls."}]},{"id":"guia-do-mestre-item-magico-medalhao-de-pensamentos","nome":"Medalhão de Pensamentos","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":194,"pagina_pdf":195,"referencia":"194 (PDF: 195)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este medalhão tem 3 cargas. Enquanto estiver o usando, você pode usar uma ação para gastar 1 carga e conjurar a magia detectar pensamentos (CD de resistência 13) através dele. O medalhão recupera 1d3 cargas gastas diariamente ao amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este medalhão tem 3 cargas. Enquanto estiver o usando, você pode usar uma ação para gastar 1 carga e conjurar a magia detectar pensamentos (CD de resistência 13) através dele. O medalhão recupera 1d3 cargas gastas diariamente ao amanhecer."}]},{"id":"guia-do-mestre-item-magico-mochila-de-carga","nome":"Mochila de Carga","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":194,"pagina_pdf":195,"referencia":"194 (PDF: 195)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta mochila possui um espaço interior consideravelmente maior que suas dimensões exteriores, grosseiramente 60 centímetros de diâmetro na abertura e 120 centímetros de profundidade. A mochila pode comportar até 250 quilos, não excedendo um volume de 20 metros cúbicos. A mochila pesa 7,5 quilos, independente do seu conteúdo. Recuperar um item da mochila requer uma ação. Se a mochila for sobrecarregada, perfurada ou rasgada, ela se rompe e é destruída, seu conteúdo é espalhado pelo Plano Astral. Se a mochila for virada do avesso, seu conteúdo é jogado para fora, ileso, mas a mochila deve ser arrumada antes de poder ser usada novamente. Criaturas que precisem respirar dentro da mochila podem sobreviver por um número de minutos igual a 10 dividido pela quantidade de criaturas (mínimo 1 minuto), a partir do momento que elas começam a sufocar. Colocar uma mochila de carga dentro de um espaço extradimensional criado por uma sacola prestativa de Heward, um buraco portátil ou item similar destruirá instantaneamente ambos os itens e abrirá um portal para o Plano Astral. O portal se origina onde um item foi colocado dentro do outro. Qualquer criatura a até 3 metros do portal é sugada para dentro dele e arremessada nu m local aleatório no Plano Astral. O portal então se fecha. O portal é de via única e não pode ser reaberto.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Esta mochila possui um espaço interior consideravelmente maior que suas dimensões exteriores, grosseiramente 60 centímetros de diâmetro na abertura e 120 centímetros de profundidade. A mochila pode comportar até 250 quilos, não excedendo um volume de 20 metros cúbicos. A mochila pesa 7,5 quilos, independente do seu conteúdo. Recuperar um item da mochila requer uma ação."},{"type":"paragraph","text":"Se a mochila for sobrecarregada, perfurada ou rasgada, ela se rompe e é destruída, seu conteúdo é espalhado pelo Plano Astral. Se a mochila for virada do avesso, seu conteúdo é jogado para fora, ileso, mas a mochila deve ser arrumada antes de poder ser usada novamente. Criaturas que precisem respirar dentro da mochila podem sobreviver por um número de minutos igual a 10 dividido pela quantidade de criaturas (mínimo 1 minuto), a partir do momento que elas começam a sufocar."},{"type":"paragraph","text":"Colocar uma mochila de carga dentro de um espaço extradimensional criado por uma sacola prestativa de Heward, um buraco portátil ou item similar destruirá instantaneamente ambos os itens e abrirá um portal para o Plano Astral. O portal se origina onde um item foi colocado dentro do outro. Qualquer criatura a até 3 metros do portal é sugada para dentro dele e arremessada nu m local aleatório no Plano Astral. O portal então se fecha. O portal é de via única e não pode ser reaberto."}]},{"id":"guia-do-mestre-item-magico-municao-1-2-ou-3","nome":"Munição +1, +2 Ou +3","categoria":"Item mágico","tipo":"Arma (qualquer munição)","fonte":"Guia do Mestre","pagina_livro":194,"pagina_pdf":195,"referencia":"194 (PDF: 195)","preco":null,"peso":null,"raridade":"muito rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Você tem um bônus nas jogadas de ataque e dano feitas com esta munição mágica. O bônus é determinado pela raridade da munição. Quando atinge um alvo, a munição deixa de ser mágica.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (qualquer munição), incomum (+1), rara (+2) ou muito rara (+3)","descricao_blocos":[{"type":"paragraph","text":"Você tem um bônus nas jogadas de ataque e dano feitas com esta munição mágica. O bônus é determinado pela raridade da munição. Quando atinge um alvo, a munição deixa de ser mágica."}]},{"id":"guia-do-mestre-item-magico-oleo-de-forma-eterea","nome":"Óleo de Forma Etérea","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":194,"pagina_pdf":195,"referencia":"194 (PDF: 195)","preco":null,"peso":null,"raridade":"rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Gotas deste óleo cinzento nebuloso se formam no exterior do seu frasco e rapidamente evaporam. O óleo pode cobrir uma criatura Média ou menor, junto com o equipamento que ela esteja vestindo e carregando (um frasco adicional é necessário para cada categoria de tamanho acima de Médio). Aplicar o óleo leva 10 minutos. A criatura afetada então, recebe o efeito da magia forma etérea por 1 hora.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, rara","descricao_
