o nome e tendência, e cada uma carrega uma gema diferente em seu pomo. Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta espada. Além disso, enquanto estiver empunhando a espada, você pode usar sua reação para realizar um ataque corpo-a-corpo com ela contra qualquer criatura no alcance que tenha causado dano a você. Você tem vantagem na jogada de ataque e qualquer dano causado com este ataque especial ignora qualquer imunidade ou resistência a dano que o alvo possua. Tendência Gema Nome Caótica e boa Esmeralda Respondedora Caótica e má Discutidora Jato Finalizadora Leal e neutra Ametista Caótica e neutra Gracejo Final Turmalina Topázio Rebatedora Neutra e boa Replicadora Peridoto Neutra Água marinha Leal e boa Retrucadora Leal e má Treplicadora Granada Neutra e má Espinela Terminadora","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (espada longa), lendária (requer sintonização com uma criatura com a mesma tendência da espada)","descricao_blocos":[{"type":"paragraph","text":"No mundo de Greyhawk, se tem conhecimento da existência de apenas nove destas lâminas. Cada uma foi modelada após a lendária espada Fragarach, que é diversamente traduzida como \"Palavra Final\". Cada uma das nove espadas possui seu próprio nome e tendência, e cada uma carrega uma gema diferente em seu pomo. Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta espada. Além disso, enquanto estiver empunhando a espada, você pode usar sua reação para realizar um ataque corpo-a-corpo com ela contra qualquer criatura no alcance que tenha causado dano a você. Você tem vantagem na jogada de ataque e qualquer dano causado com este ataque especial ignora qualquer imunidade ou resistência a dano que o alvo possua."},{"type":"paragraph","text":"Tendência"},{"type":"paragraph","text":"Gema"},{"type":"paragraph","text":"Nome"},{"ty ria CD 15 toda vez que sofrer dano em combate. Se fracassar na resistência, você deve atacar a criatura que causou dano a você até cair a 0 pontos de vida ou fazê-la cair, ou caso você não consiga alcançar a criatura para realizar um ataque corpo-acorpo contra ela. Você pode quebrar a maldição das formas usuais. Alternativamente, conjurar banimento na espada forçará o espirito vingativo a partir. A espada então, se torna uma arma +1 sem qualquer outra propriedade.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (qualquer espada), incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Você recebe +1 de bônus nas jogadas de ataque e dano feitas com esta espada mágica."},{"type":"paragraph","text":"Maldição. Esta espada é amaldiçoada e possuída por um espírito vingativo. Se sintonizar com ela estende a maldição a você. Enquanto você permanecer amaldiçoado, você não deseja se separar da espada, mantendo-a com você o tempo todo. Enquanto estiver sintonizado a esta espada, você tem desvantagem nas jogadas de ataque feitas com armas diferentes dessa."},{"type":"paragraph","text":"Além disso, enquanto a espada estiver com você, você deve ser bem sucedido num teste de resistência de Sabedoria CD 15 toda vez que sofrer dano em combate. Se fracassar na resistência, você deve atacar a criatura que causou dano a você até cair a 0 pontos de vida ou fazê-la cair, ou caso você não consiga alcançar a criatura para realizar um ataque corpo-acorpo contra ela."},{"type":"paragraph","text":"Você pode quebrar a maldição das formas usuais. Alternativamente, conjurar banimento na espada forçará o espirito vingativo a partir. A espada então, se torna uma arma +1 sem qualquer outra propriedade."}]},{"id":"guia-do-mestre-item-magico-espada-decepadora","nome":"Espada Decepadora","categoria":"Item mágico","tipo":"Arma (qualquer espada que cause dano cortante)","fonte":"Guia do Mestre","pagina_livro":180,"pagina_pdf":181,"referencia":"180 (PDF: 181)","preco":null,"peso":null,"raridade":"muito rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Quando você ataca um objeto com esta espada mágica e atinge, maximize o dado de dano da arma contra o alvo. Quando você ataca uma criatura com esta arma e rola um 20 na jogada de ataque, o alvo sofre 14 de dano cortante extra. Então role outro d20. Se você rolar um 20, você decepa um dos membros do alvo, com o efeito de tal perda sendo determinado pelo Mestre. Se a criatura não tiver um membro para ser decepado, você arranca uma porão do corpo dela, no lugar. Além disso, você pode falar a palavra de comando da espada para fazer a lâmina emitir luz plena num raio de 3 metros e penumbra por mais 3 metros adicionais. Dizer a palavra de comando novamente ou embainhar a espada, apaga a luz.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (qualquer espada que cause dano cortante), muito rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Quando você ataca um objeto com esta espada mágica e atinge, maximize o dado de dano da arma contra o alvo."},{"type":"paragraph","text":"Quando você ataca uma criatura com esta arma e rola um 20 na jogada de ataque, o alvo sofre 14 de dano cortante extra. Então role outro d20. Se você rolar um 20, você decepa um dos membros do alvo, com o efeito de tal perda sendo determinado pelo Mestre. Se a criatura não tiver um membro para ser decepado, você arranca uma porão do corpo dela, no lugar."},{"type":"paragraph","text":"Além disso, você pode falar a palavra de comando da espada para fazer a lâmina emitir luz plena num raio de 3 metros e penumbra por mais 3 metros adicionais. Dizer a palavra de comando novamente ou embainhar a espada, apaga a luz."}]},{"id":"guia-do-mestre-item-magico-espada-do-furto-de-vidas","nome":"Espada do Furto de Vidas","categoria":"Item mágico","tipo":"Arma (qualquer espada)","fonte":"Guia do Mestre","pagina_livro":180,"pagina_pdf":181,"referencia":"180 (PDF: 181)","preco":null,"peso":null,"raridade":"rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Quando você ataca uma criatura com esta espada mágica e rola um 20 na jogada de ataque, o alvo sofre 10 de dano necrótico extra se ele não for um constructo ou morto-vivo. Você também ganha 10 pontos de vida temporários.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (qualquer espada), rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Quando você ataca uma criatura com esta espada mágica e rola um 20 na jogada de ataque, o alvo sofre 10 de dano necrótico extra se ele não for um constructo ou morto-vivo. Você também ganha 10 pontos de vida temporários."}]},{"id":"guia-do-mestre-item-magico-espada-do-sangramento","nome":"Espada do Sangramento","categoria":"Item mágico","tipo":"Arma (qualquer espada)","fonte":"Guia do Mestre","pagina_livro":180,"pagina_pdf":181,"referencia":"180 (PDF: 181)","preco":null,"peso":null,"raridade":"rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Pontos de vida perdidos através do dano causado com esta arma só podem ser recuperados através de um descanso curto ou longo, não por regeneração, magia ou quaisquer outros meios. Uma vez por turno, quando você atingir uma criatura com um ataque usando esta arma mágica, você pode ferir o alvo. No início de cada um dos turnos da criatura ferida, ela sofre 1d4 de dano necrótico para cada vez que você a feriu, e então ela pode fazer um teste de resistência de Constituição CD 15, terminando o efeito de todos os ferimentos em si, com um sucesso. Alternativamente, a criatura ferida, ou uma criatura a até 1,5 metro dela, pode usar uma ação para realizar um teste de Sabedoria (Medicina) CD 15, terminando o efeito de tais ferimentos com um sucesso.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (qualquer espada), rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Pontos de vida perdidos através do dano causado com esta arma só podem ser recuperados através de um descanso curto ou longo, não por regeneração, magia ou quaisquer outros meios."},{"type":"paragraph","text":"Uma vez por turno, quando você atingir uma criatura com um ataque usando esta arma mágica, você pode ferir o alvo. No início de cada um dos turnos da criatura ferida, ela sofre 1d4 de dano necrótico para cada vez que você a feriu, e então ela pode fazer um teste de resistência de Constituição CD 15, terminando o efeito de todos os ferimentos em si, com um sucesso. Alternativamente, a criatura ferida, ou uma criatura a até 1,5 metro dela, pode usar uma ação para realizar um teste de Sabedoria (Medicina) CD 15, terminando o efeito de tais ferimentos com um sucesso."}]},{"id":"guia-do-mestre-item-magico-espada-vorpal","nome":"Espada Vorpal","categoria":"Item mágico","tipo":"Arma (qualquer espada que cause dano cortante)","fonte":"Guia do Mestre","pagina_livro":180,"pagina_pdf":181,"referencia":"180 (PDF: 181)","preco":null,"peso":null,"raridade":"lendária","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Além disso, a arma ignora resistência a dano cortante. Quando você atacar uma criatura que tenha pelo menos uma cabeça com esta arma e rolar um 20 na jogada de ataque, você arranca uma das cabeças da criatura. A criatura morre se não puder sobreviver sem a cabeça perdida. Uma criatura é imune a esse efeito se for imune a dano cortante, não tenha ou precise de uma cabeça, possua ações lendárias ou o Mestre decida que a criatura é muito grande para que sua cabeça seja decepada por esta arma. Tal criatura, ao invés, receberia 6d8 de dano cortante extra pelo ataque.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (qualquer espada que cause dano cortante), lendária (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Além disso, a arma ignora resistência a dano cortante."},{"type":"paragraph","text":"Quando você atacar uma criatura que tenha pelo menos uma cabeça com esta arma e rolar um 20 na jogada de ataque, você arranca uma das cabeças da criatura. A criatura morre se não puder sobreviver sem a cabeça perdida. Uma criatura é imune a esse efeito se for imune a dano cortante, não tenha ou precise de uma cabeça, possua ações lendárias ou o Mestre decida que a criatura é muito grande para que sua cabeça seja decepada por esta arma. Tal criatura, ao invés, receberia 6d8 de dano cortante extra pelo ataque."}]},{"id":"guia-do-mestre-item-magico-espelho-do-aprisionamento","nome":"Espelho do Aprisionamento","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":181,"pagina_pdf":182,"referencia":"181 (PDF: 182)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Quando este espelho de 1,2 metro de altura é visto indiretamente, sua superfície mostra imagens borradas de criaturas. O espelho pesa 25 quilos, tem CA 11, 10 pontos de vida e vulnerabilidade a dano de concussão. Ele se despedaça e é destruído quando for reduzido a 0 pontos de vida. Se o espelho estiver pendurado em uma superfície vertical e você estiver a 1,5 metro dele, você pode usar uma ação para falar a palavra de comando e ativa-lo. Ele permanece ativo até você usar uma ação para falar a palavra de comando novamente. Qualquer criatura, diferente de você, que vir seu reflexo enquanto o espelho estiver ativo, a até 9 metros dele, deve ser bem sucedida num teste de resistência de Carisma CD 15 ou será aprisionada, junto com qualquer coisa que esteja vestindo ou carregando, em uma das doze celas extradimensionais do espelho. Este teste de resistência é feito com vantagem se a criatura souber a natureza do espelho e constructos passam automaticamente nesse teste de resistência. Uma cela extradimensional é uma expansão infinita preenchida com uma fina névoa que reduz a visibilidade a 3 metros. Criaturas presas na cela do espelho não envelhecem e não precisam comer, beber ou dormir. Uma criatura presa dentro de uma cela pode escapar usando magia que permita viagens planares. Do contrário, a criatura está confinada a cela até ser libertada. Se o espelho aprisionar uma criatura, mas suas doze celas extradimensionais já estiverem ocupada, o espelho liberta uma criatura aleatoriamente para acomodar o novo prisioneiro. Uma criatura liberta aparece em um espaço desocupado dentro da visão do espelho, mas olhando para o lado contrário. Caso o espelho seja despedaçado, todas as criaturas contidas nele serão libertadas e aparecerão em espaços desocupados próximos dele. Enquanto estiver a 1,5 metro do espelho, você pode usar uma ação para falar o nome de uma criatura aprisionada nele ou chamar uma cela em particular pelo número. A criatura nomeada ou contida na cela nomeada aparece como uma imagem na superfície do espelho. Você e a criatura podem, então, se comunicar normalmente. De forma similar, você pode usar uma ação para falar uma segunda palavra de comando e libertar uma criatura aprisionada no espelho. A criatura libertada aparece, junto com todos os seus pertences, em um espaço desocupado próximo ao espelho e olhando para o lado contrário dele. ESTÁTUA DE PODERES INCRÍVEIS Item maravilhoso, raridade depende da estátua Uma estátua de poderes incríveis é uma estatueta de uma besta pequena o suficiente para caber no bolso. Se você usar uma ação para falar a palavra de comando e arremessar a estátua em um local no solo a até 18 metros de você, a estátua torna-se uma criatura viva. Se o espaço onde a criatura apareceria estiver ocupado por outras criaturas ou objetos, ou caso não haja espaço suficiente para a criatura, a estátua não se tornará uma criatura. A criatura é amigável a você e aos seus companheiros. Ela compreende seu idioma e obedece seus comandos falados. Se você não der um comando, a criatura se defenderá, mas não realizará nenhuma ação. Veja o Manual dos Monstros para as estatísticas da criatura, exceto para a mosca gigante. A criatura existirá por uma duração específica para cada estátua. Ao final da duração, a criatura reverte a forma de estátua. Ela reverte prematuramente se cair a 0 pontos de vida ou se você usar uma ação para dizer a palavra de comando novamente e toca-la. Quando a criatura se tornar uma estátua novamente, sua propriedade não poderá ser usada novamente até que um certo tempo se passe, como especificado na descrição da estátua. Bodes de Marfim (Raro). Estas estatuetas de marfim de bodes sempre são criadas em conjuntos de três. Cada bode parece único e funciona de forma diferente dos outros. As propriedades deles são as seguintes: O bode de viagem pode se tornar um bode Grande com as mesmas estatísticas de um cavalo de montaria. Ele tem 24 cargas e a cada hora ou porção que tenha passado na forma de besta consome 1 carga. Enquanto ele tiver cargas, você pode usá-lo o quanto desejar. Quando as cargas acabarem, ele reverte a forma de estátua e não pode ser usado novamente até que 7 dias se passem, quando ele recuperará todas as cargas. O bode de trabalho torna-se um bode gigante por 3 horas. Uma vez usado, ele não pode ser usado novamente até que 30 dias se passem. O bode do terror torna-se um bode gigante por até 3 horas. O bode não pode atacar, mas você pode remover os chifres dele e usa-los como armas. Um chifre se transforma em uma lança de montaria +1 e o outro em uma espada longa +2. Remover um chifre requer uma ação e a arma desaparece e o chifre volta quando o bode reverte a forma de estátua. Além disso, o bode emana uma aura de terror, num raio de 9 metros, enquanto você estiver cavalgando ele. Qualquer criatura hostil a você que comece o turno dela na aura deve ser bem sucedida num teste de resistência de Sabedoria CD 15, ou ficará amedrontada pelo bode por 1 minuto ou até que o bode reverta a forma de estátua. A criatura amedrontada pode repetir o teste de resistência no final de cada um dos turnos dela, terminando o efeito sobre si, se obtiver sucesso. Uma vez que tenha obtido sucesso na resistência contra o efeito, uma criatura fica imune a aura do bode pelas próximas 24 horas. Uma vez que a estátua seja usada, ela não pode ser usada novamente até que 15 dias se passem. Cachorro de Ônix (Raro). Esta estatueta de ônix de um cão pode se transformar em um mastim por até 6 horas. O mastim tem Inteligência 8 e pode falar Comum. Ele também tem visão no escuro com alcance de 18 metros e pode ver criaturas e objetos invisíveis dentro desse alcance. Uma vez usado, ele não pode ser usado novamente até que 7 dias se passem. Corcel de Obsidiana (Muito Raro). Este cavalo de obsidiana polido pode se transformar em um pesadelo por até 24 horas. O pesadelo voa apenas para se defender. Uma vez usado, ele não pode ser usado novamente até que 15 dias se passem. Se você tiver tendência boa, a estátua tem 10 por cento de chance, a cada vez que você usa-la, de ignorar suas ordens, incluindo o comando para reverter a forma de estátua. Se você estiver montando o pesadelo enquanto ele ignora suas ordens, você e o pesadelo são instantaneamente transportados para um local aleatório no plano do Hades, onde o pesadelo reverterá a sua forma de estátua. MOSCA GIGANTE MOSCA GIGANTE Besta grande, imparcial Besta grande, imparcial Classe de Armadura 11 Classe de Armadura 11 Pontos de Vida 19 (3d10 + 3) Pontos de Vida 19 (3d10 + 3) Deslocamento 9 m, voo 18 m Deslocamento 9 m, voo 18 m FOR DES CON SAB FOR DES CON SAB CAR CAR INT INT 14 (+2) 13 (+1) 13 (+1) 2 (-4) 10 (+0) 3 (-4) 14 (+2) 13 (+1) 13 (+1) 2 (-4) 10 (+0) 3 (-4) Sentidos visão no escuro 18 m, Percepção passiva 10 Idiomas-Sentidos visão no escuro 18 m, Percepção passiva 10 Idiomas-Coruja de Serpentina (Raro). Esta estatueta de serpentina de uma coruja pode se transformar em uma coruja gigante por até 8 horas. Uma vez usado, ele não pode ser usado novamente até que 2 dias se passem. A coruja pode se comunicar telepaticamente com você a qualquer distância se você e ela estiverem no mesmo plano de existência. Corvo de Prata (Incomum). Esta estatueta de prata de um corvo pode se transformar em um corvo por até 12 horas. Uma vez usada, ela não pode ser usada novamente até que 2 dias se passem. Enquanto estiver na forma de corvo, a estátua permite que você conjure a magia mensageiro animal nela à vontade. Elefante de Mármore (Raro). Esta estatueta de mármore tem aproximadamente 10 centímetros de altura e comprimento. Ela pode se transformar em um elefante por até 24 horas. Uma vez usado, ele não pode ser usado novamente até que 7 dias se passem. Grifo de Bronze (Raro). Esta estatueta de bronze é um grifo rampante. Ela pode se transformar num grifo por até 6 horas. Uma vez usada, ela não pode ser usada novamente até que 5 dias se passem. Leões Dourados (Raro). Esta estatueta de ouro de leões sempre é criada em pares. Você pode usar uma estátua ou ambas simultaneamente. Cada uma pode se transformar em um leão por até 1 hora. Uma vez que um leão tenha sido usado, ele não pode ser usado novamente até que 7 dias se passem. Mosca de Ébano (Raro). Esta estatueta de ébano é esculpida para se parecer com uma mosca varejeira. Ela pode se transformar numa mosca gigante por até 12 horas e pode ser usada como montaria. Uma vez que tenha sido usada, ela não poderá ser usada novamente até que 2 dias se passem.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, muito raro","descricao_blocos":[{"type":"paragraph","text":"Quando este espelho de 1,2 metro de altura é visto indiretamente, sua superfície mostra imagens borradas de criaturas. O espelho pesa 25 quilos, tem CA 11, 10 pontos de vida e vulnerabilidade a dano de concussão. Ele se despedaça e é destruído quando for reduzido a 0 pontos de vida."},{"type":"paragraph","text":"Se o espelho estiver pendurado em uma superfície vertical e você estiver a 1,5 metro dele, você pode usar uma ação para falar a palavra de comando e ativa-lo. Ele permanece ativo até você usar uma ação para falar a palavra de comando novamente."},{"type":"paragraph","text":"Qualquer criatura, diferente de você, que vir seu reflexo enquanto o espelho estiver ativo, a até 9 metros dele, deve ser bem sucedida num teste de resistência de Carisma CD 15 ou será aprisionada, junto com qualquer coisa que esteja vestindo ou carregando, em uma das doze celas extradimensionais do espelho. Este teste de resistência é feito com vantagem se a criatura souber a natureza do espelho e constructos passam automaticamente nesse teste de resistência."},{"type":"paragraph","text":"Uma cela extradimensional é uma expansão infinita preenchida com uma fina névoa que reduz a visibilidade a 3 metros. Criaturas presas na cela do espelho não envelhecem e não precisam comer, beber ou dormir. Uma criatura presa dentro de uma cela pode escapar usando magia que permita viagens planares. Do contrário, a criatura está confinada a cela até ser libertada."},{"type":"paragraph","text":"Se o espelho aprisionar uma criatura, mas suas doze celas extradimensionais já estiverem ocupada, o espelho liberta uma ação, a criatura reverte a forma de estátua. Ela reverte prematuramente se cair a 0 pontos de vida ou se você usar uma ação para dizer a palavra de comando novamente e toca-la. Quando a criatura se tornar uma estátua novamente, sua propriedade não poderá ser usada novamente até que um certo tempo se passe, como especificado na descrição da estátua."},{"type":"paragraph","text":"Bodes de Marfim (Raro). Estas estatuetas de marfim de bodes sempre são criadas em conjuntos de três. Cada bode parece único e funciona de forma diferente dos outros. As propriedades deles são as seguintes:"},{"type":"list","items":["O bode de viagem pode se tornar um bode Grande com as mesmas estatísticas de um cavalo de montaria. Ele tem 24 cargas e a cada hora ou porção que tenha passado na forma de besta consome 1 carga. Enquanto ele tiver cargas, você pode usá-lo o quanto desejar. Quando as cargas acabarem, ele reverte a forma de estátua e não pode ser usado novamente até que 7 dias se passem, quando ele recuperará todas as cargas.","O bode de trabalho torna-se um bode gigante por 3 horas. Uma vez usado, ele não pode ser usado novamente até que 30 dias se passem.","O bode do terror torna-se um bode gigante por até 3 horas. O bode não pode atacar, mas você pode remover os chifres dele e usa-los como armas. Um chifre se transforma em uma lança de montaria +1 e o outro em uma espada longa +2. Remover um chifre requer uma ação e a arma desaparece e o chifre volta quando o bode reverte a forma de estátua. Além disso, o bode emana uma aura de terror, num raio de 9 metros, enquanto você estiver cavalgando ele. Qualquer criatura hostil a você que comece o turno dela na aura deve ser bem sucedida num teste de resistência de Sabedoria CD 15, ou ficará amedrontada pelo bode por 1 minuto ou até que o bode reverta a forma de estátua. A criatura amedrontada pode repetir o teste de resistência no final de cada um dos turnos dela, terminando o efeito sobre si, se obtiver sucesso. Uma vez que tenha obtido {"type":"paragraph","text":"CON"},{"type":"paragraph","text":"SAB"},{"type":"paragraph","text":"CAR"},{"type":"paragraph","text":"CAR"},{"type":"paragraph","text":"INT"},{"type":"paragraph","text":"INT"},{"type":"paragraph","text":"14 (+2)"},{"type":"paragraph","text":"13 (+1)"},{"type":"paragraph","text":"13 (+1)"},{"type":"paragraph","text":"2 (-4)"},{"type":"paragraph","text":"10 (+0)"},{"type":"paragraph","text":"3 (-4)"},{"type":"paragraph","text":"14 (+2)"},{"type":"paragraph","text":"13 (+1)"},{"type":"paragraph","text":"13 (+1)"},{"type":"paragraph","text":"2 (-4)"},{"type":"paragraph","text":"10 (+0)"},{"type":"paragraph","text":"3 (-4)"},{"type":"paragraph","text":"Sentidos visão no escuro 18 m, Percepção passiva 10 Idiomas-"},{"type":"paragraph","text":"Sentidos visão no escuro 18 m, Percepção passiva 10 Idiomas-"},{"type":"paragraph","text":"Coruja de Serpentina (Raro). Esta estatueta de serpentina de uma coruja pode se transformar em uma coruja gigante por até 8 horas. Uma vez usado, ele não pode ser usado novamente até que 2 dias se passem. A coruja pode se comunicar telepaticamente com você a qualquer distância se você e ela estiverem no mesmo plano de existência."},{"type":"paragraph","text":"Corvo de Prata (Incomum). Esta estatueta de prata de um corvo pode se transformar em um corvo por até 12 horas. Uma vez usada, ela não pode ser usada novamente até que 2 dias se passem. Enquanto estiver na forma de corvo, a estátua permite que você conjure a magia mensageiro animal nela à vontade."},{"type":"paragraph","text":"Elefante de Mármore (Raro). Esta estatueta de mármore tem aproximadamente 10 centímetros de altura e comprimento. Ela pode se transformar em um elefante por até 24 horas. Uma vez usado, ele não pode ser usado novamente até que 7 dias se passem."},{"type":"paragraph","text":"Grifo de Bronze (Raro). Esta estatueta de bronze é um grifo rampante. Ela pode se transformar num grifo por até 6 horas. Uma vez usada, ela não pode ser usada novamente até que 5 dias se passem."},{"type":"paragraph","text":"Leões Dourados (Raro). Esta estatueta de ouro de leões sempre é criada em pares. Você pode usar uma estátua ou ambas simultaneamente. Cada uma pode se transformar em um leão por até 1 hora. Uma vez que um leão tenha sido usado, ele não pode ser usado novamente até que 7 dias se passem."},{"type":"paragraph","text":"Mosca de Ébano (Raro). Esta estatueta de ébano é esculpida para se parecer com uma mosca varejeira. Ela pode se transformar numa mosca gigante por até 12 horas e pode ser usada como montaria. Uma vez que tenha sido usada, ela não poderá ser usada novamente até que 2 dias se passem."}]},{"id":"guia-do-mestre-item-magico-faixas-de-ferro-de-bilarro","nome":"Faixas de Ferro de Bilarro","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":183,"pagina_pdf":184,"referencia":"183 (PDF: 184)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Estas esferas de ferro enferrujadas medem 7,5 centímetros de diâmetro e pesam 0,5 quilo. Você pode usar uma ação para falar a palavra de comando e arremessar a esfera em uma criatura Enorme ou menor que você possa ver, a até 18 metros de você. Conforme a esfera se move pelo ar, ela se abre em um faixas de metal entrelaçadas. Realize uma jogada de ataque à distância com um bônus de ataque igual ao seu modificador de Destreza mais seu bônus de proficiência. Se atingir, o alvo fica impedido até você usar uma ação bônus para falar a palavra de comando novamente e liberta-lo. Fazer isso, ou errar o ataque, faz com que as faixas se contraiam e voltem a ser uma esfera novamente. Uma criatura, incluindo a impedida, pode usar uma ação para fazer um teste de Força CD 20 para partir as faixas de ferro. Em um sucesso, o item é destruído e a criatura impedida é libertada. Se o teste falhar, qualquer tentativa posterior feita pela criatura automaticamente fracassa até que 24 horas tenham se passado. Uma vez que as faixas tenha sido usadas, elas não poderão ser usadas novamente até o próximo amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Estas esferas de ferro enferrujadas medem 7,5 centímetros de diâmetro e pesam 0,5 quilo. Você pode usar uma ação para falar a palavra de comando e arremessar a esfera em uma criatura Enorme ou menor que você possa ver, a até 18 metros de você. Conforme a esfera se move pelo ar, ela se abre em um faixas de metal entrelaçadas."},{"type":"paragraph","text":"Realize uma jogada de ataque à distância com um bônus de ataque igual ao seu modificador de Destreza mais seu bônus de proficiência. Se atingir, o alvo fica impedido até você usar uma ação bônus para falar a palavra de comando novamente e liberta-lo. Fazer isso, ou errar o ataque, faz com que as faixas se contraiam e voltem a ser uma esfera novamente."},{"type":"paragraph","text":"Uma criatura, incluindo a impedida, pode usar uma ação para fazer um teste de Força CD 20 para partir as faixas de ferro. Em um sucesso, o item é destruído e a criatura impedida é libertada. Se o teste falhar, qualquer tentativa posterior feita pela criatura automaticamente fracassa até que 24 horas tenham se passado."},{"type":"paragraph","text":"Uma vez que as faixas tenha sido usadas, elas não poderão ser usadas novamente até o próximo amanhecer."}]},{"id":"guia-do-mestre-item-magico-ferraduras-da-velocidade","nome":"Ferraduras da Velocidade","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":183,"pagina_pdf":184,"referencia":"183 (PDF: 184)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Estas ferraduras de ferro vêm em conjuntos de quatro. Enquanto todas as quatro ferraduras estiverem fixadas aos cascos de um cavalo ou criatura similar, elas aumentam o deslocamento de caminhada da criatura em 9 metros.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Estas ferraduras de ferro vêm em conjuntos de quatro. Enquanto todas as quatro ferraduras estiverem fixadas aos cascos de um cavalo ou criatura similar, elas aumentam o deslocamento de caminhada da criatura em 9 metros."}]},{"id":"guia-do-mestre-item-magico-ferraduras-do-zefiro","nome":"Ferraduras do Zéfiro","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":183,"pagina_pdf":184,"referencia":"183 (PDF: 184)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Estas ferraduras de ferro vêm em um conjunto de quatro. Enquanto todas as ferraduras estiverem fixadas nos cascos de um cavalo ou criatura similar, elas permitirão que a criatura se mova normalmente enquanto flutua a 10 centímetros do solo. Esse efeito significa que a criatura pode cruzar ou ficar sobre superfícies não-sólidas ou instáveis, como água ou lava. A criatura não deixa rastros e ignora terrenos difíceis. Além disso, a criatura pode se mover com seu deslocamento normal por 1 horas por dia sem sofrer de exaustão pela marcha forçada.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, muito raro","descricao_blocos":[{"type":"paragraph","text":"Estas ferraduras de ferro vêm em um conjunto de quatro. Enquanto todas as ferraduras estiverem fixadas nos cascos de um cavalo ou criatura similar, elas permitirão que a criatura se mova normalmente enquanto flutua a 10 centímetros do solo. Esse efeito significa que a criatura pode cruzar ou ficar sobre superfícies não-sólidas ou instáveis, como água ou lava. A criatura não deixa rastros e ignora terrenos difíceis. Além disso, a criatura pode se mover com seu deslocamento normal por 1 horas por dia sem sofrer de exaustão pela marcha forçada."}]},{"id":"guia-do-mestre-item-magico-filtro-do-amor","nome":"Filtro do Amor","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":183,"pagina_pdf":184,"referencia":"183 (PDF: 184)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Da próxima vez que você vir uma criatura dentro de 10 minutos após beber esse filtro, você fica enfeitiçado por essa criatura por 1 hora. Se a criatura for da espécie ou gênero que você normalmente é atraído, você a reconhece como seu amor verdadeiro enquanto estiver enfeitiçado. O líquido efervescente de coloração rosa desta poção contém um a bolha em formato de coração difícil de perceber.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, incomum","descricao_blocos":[{"type":"paragraph","text":"Da próxima vez que você vir uma criatura dentro de 10 minutos após beber esse filtro, você fica enfeitiçado por essa criatura por 1 hora. Se a criatura for da espécie ou gênero que você normalmente é atraído, você a reconhece como seu amor verdadeiro enquanto estiver enfeitiçado. O líquido efervescente de coloração rosa desta poção contém um a bolha em formato de coração difícil de perceber."}]},{"id":"guia-do-mestre-item-magico-flauta-assombrada","nome":"Flauta Assombrada","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":183,"pagina_pdf":184,"referencia":"183 (PDF: 184)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Você deve ser proficiente com instrumentos de sopro para usar esta flauta. Ela tem 3 cargas. Você pode usar uma ação para toca-la e gastar 1 carga para criar um misterioso tom fascinante. Cada criatura a até 9 metros de você que ouvir você tocar, deve ser bem sucedida num teste de resistência de Sabedoria CD 15, ou ficará amedrontada em relação a você por 1 minuto. Se desejar, todas as criaturas na área que não sejam hostis a você, obtêm sucesso automaticamente no teste de resistência. Uma criatura que fracasse no teste de resistência pode repeti-lo no final de cada um dos turnos dela, terminando o efeito sobre si, caso obtenha sucesso. Uma criatura que seja bem sucedida no teste de resistência fica imune ao efeito destas flauta por 24 horas. A flauta recupera 1d3 cargas gastas diariamente ao amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Você deve ser proficiente com instrumentos de sopro para usar esta flauta. Ela tem 3 cargas. Você pode usar uma"},{"type":"paragraph","text":"ação para toca-la e gastar 1 carga para criar um misterioso tom fascinante. Cada criatura a até 9 metros de você que ouvir você tocar, deve ser bem sucedida num teste de resistência de Sabedoria CD 15, ou ficará amedrontada em relação a você por 1 minuto. Se desejar, todas as criaturas na área que não sejam hostis a você, obtêm sucesso automaticamente no teste de resistência. Uma criatura que fracasse no teste de resistência pode repeti-lo no final de cada um dos turnos dela, terminando o efeito sobre si, caso obtenha sucesso. Uma criatura que seja bem sucedida no teste de resistência fica imune ao efeito destas flauta por 24 horas. A flauta recupera 1d3 cargas gastas diariamente ao amanhecer."}]},{"id":"guia-do-mestre-item-magico-flauta-dos-esgotos","nome":"Flauta dos Esgotos","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":184,"pagina_pdf":185,"referencia":"184 (PDF: 185)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você deve ser proficiente com instrumentos de sopro para usar esta flauta. Enquanto você estiver sintonizado a ela, ratos ordinários e ratos gigantes serão indiferentes a você e não irão ataca-lo, a não ser que você os ameace ou machuque. A flauta tem 3 cargas. Se você tocar a flauta com uma ação, você pode usar uma ação bônus para gastar 1 das 3 cargas, convocando um enxame de ratos (veja o Manual dos Monstros para as estatísticas) com cada carga gasta, considerando que hajam ratos suficientes, a até 800 metros de você, para serem convocados dessa forma (como determinado pelo Mestre). Se não houverem ratos suficientes para formar um enxame, a carga é desperdiçada. Enxames convocados se movem em direção a música pela rota mais curta disponível, mas não estão sob seu controle. A flauta recuperam 1d3 cargas gastas diariamente ao amanhecer. Sempre que um enxame de ratos que não esteja sob o controle de outra criatura estiver a até 9 metros de você enquanto você estiver tocando a flauta, você pode realizar um teste de Carisma resistido por um teste de Sabedoria do enxame. Se você perder a disputa, o enxame agirá como normalmente faria e não pode ser seduzido pela música pelas próximas 24 horas. Se você vencer a disputa, o enxame é seduzido pela música da flauta e se tornará amigável a você e aos seus companheiros enquanto você continuar a tocar a flauta a cada rodada com uma ação. Um enxame amigável obedece seus comandos. Se você não der nenhum comando a um enxame amigável, ele se defenderá, mas não realizará qualquer ação. Se um enxame amigável começar o turno dele e não puder ouvir a música da flauta, seu controle sobre ele termina e o enxame agirá como normalmente faria e não poderá ser seduzido pela música da flauta pelas próximas 24 horas.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Você deve ser proficiente com instrumentos de sopro para usar esta flauta. Enquanto você estiver sintonizado a ela, ratos ordinários e ratos gigantes serão indiferentes a você e não irão ataca-lo, a não ser que você os ameace ou machuque."},{"type":"paragraph","text":"A flauta tem 3 cargas. Se você tocar a flauta com uma ação, você pode usar uma ação bônus para gastar 1 das 3 cargas, convocando um enxame de ratos (veja o Manual dos Monstros para as estatísticas) com cada carga gasta, considerando que hajam ratos suficientes, a até 800 metros de você, para serem convocados dessa forma (como determinado pelo Mestre). Se não houverem ratos suficientes para formar um enxame, a carga é desperdiçada. Enxames convocados se movem em direção a música pela rota mais curta disponível, mas não estão sob seu controle. A flauta recuperam 1d3 cargas gastas diariamente ao amanhecer."},{"type":"paragraph","text":"Sempre que um enxame de ratos que não esteja sob o controle de outra criatura estiver a até 9 metros de você enquanto você estiver tocando a flauta, você pode realizar um teste de Carisma resistido por um teste de Sabedoria do enxame. Se você perder a disputa, o enxame agirá como normalmente faria e não pode ser seduzido pela música pelas próximas 24 horas. Se você vencer a disputa, o enxame é seduzido pela música da flauta e se tornará amigável a você e aos seus companheiros enquanto você continuar a tocar a flauta a cada rodada com uma ação. Um enxame amigável obedece seus comandos. Se você não der nenhum comando a um enxame amigável, ele se defenderá, mas não realizará qualquer ação. Se um enxame amigável começar o turno dele e não puder ouvir a música da flauta, seu controle sobre ele termina e o enxame agirá como normalmente faria e não poderá ser seduzido pela música da flauta pelas próximas 24 horas."}]},{"id":"guia-do-mestre-item-magico-flecha-assassina","nome":"Flecha Assassina","categoria":"Item mágico","tipo":"Arma (flecha)","fonte":"Guia do Mestre","pagina_livro":184,"pagina_pdf":185,"referencia":"184 (PDF: 185)","preco":null,"peso":null,"raridade":"muito rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Uma flecha assassina é uma arma mágica feita para matar um tipo específico de criatura. Algumas são mais focadas que outras; por exemplo, existem tanto as flechas assassinas de dragão quanto as flechas assassinas de dragão azul. Se uma criatura pertencente ao tipo, raça ou grupo associado a uma flecha assassina sofrer dano dela, a criatura deve ser bem sucedida num teste de resistência de Constituição CD 17, sofrendo 6d10 de dano adicional se fracassar na resistência ou metade desse dano adicional caso obtenha sucesso. Uma vez que uma flecha assassina tenha causado seu dano adicional a uma criatura, ela se torna uma flecha não-mágica. Outros tipos de munição mágica desse tipo existem, como virotes assassinos para bestas, apesar de as flechas serem mais comuns.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (flecha), muito rara","descricao_blocos":[{"type":"paragraph","text":"Uma flecha assassina é uma arma mágica feita para matar um tipo específico de criatura. Algumas são mais focadas que outras; por exemplo, existem tanto as flechas assassinas de dragão quanto as flechas assassinas de dragão azul. Se uma criatura pertencente ao tipo, raça ou grupo associado a uma flecha assassina sofrer dano dela, a criatura deve ser bem sucedida num teste de resistência de Constituição CD 17, sofrendo 6d10 de dano adicional se fracassar na resistência ou metade desse dano adicional caso obtenha sucesso."},{"type":"paragraph","text":"Uma vez que uma flecha assassina tenha causado seu dano adicional a uma criatura, ela se torna uma flecha não-mágica."},{"type":"paragraph","text":"Outros tipos de munição mágica desse tipo existem, como virotes assassinos para bestas, apesar de as flechas serem mais comuns."}]},{"id":"guia-do-mestre-item-magico-fortaleza-instantanea-de-daern","nome":"Fortaleza Instantânea de Daern","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":184,"pagina_pdf":185,"referencia":"184 (PDF: 185)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Você pode usar uma ação para colocar este cubo de metal de 2,5 centímetros no solo e falar sua palavra de comando. O cubo rapidamente cresce e se transforma em uma fortaleza que permanece até que você use uma ação para falar a palavra de comando que a dissipa, que funciona apenas se a fortaleza estiver vazia. A fortaleza é uma torre quadrada de 6 metros de lado e 9 metros de altura, com seteiras em todos os lados e uma ameia no topo dela. Seu interior é dividido em dois pisos, com uma escada correndo por uma lateral conectando-os. A escada termina num alçapão que leva à cobertura. Quando ativada, a torre terá uma pequena porta no lado voltado para você. A porta se abre apenas ao seu comando, o qual você pode dizer com uma ação bônus. Ela é imune a magia arrombar e mágicas similares, como a de um carrilhão de abertura. Cada criatura na área onde a fortaleza aparece deve ser bem sucedida num teste de resistência de Destreza CD 15, sofrendo 10d10 de dano de concussão se fracassar no teste, ou metade desse dano caso obtenha sucesso. Em ambos os casos, a criatura é empurrada para um espaço desocupado mais próximo fora da área da fortaleza. Os objetos na área que não estejam sendo vestidos ou carregados sofrem esse dano e são empurrados automaticamente. A torre é feita de adamante e sua mágica previne que ela seja derrubada. A cobertura, a porta e as paredes, cada um, tem 100 pontos de vida, imunidade a dano de ataques não-mágicos, excluindo as armas de cerco e resistência a todos os outros tipos de dano. Apenas uma magia desejo pode reparar a fortaleza (esse uso da magia conta como replicar uma magia de 8° nível ou inferior). Cada conjuração de desejo faz com que a cobertura, a porta ou uma parede recupere 50 pontos de vida.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Você pode usar uma ação para colocar este cubo de metal de 2,5 centímetros no solo e falar sua palavra de comando. O cubo rapidamente cresce e se transforma em uma fortaleza que permanece até que você use uma ação para falar a palavra de comando que a dissipa, que funciona apenas se a fortaleza estiver vazia."},{"type":"paragraph","text":"A fortaleza é uma torre quadrada de 6 metros de lado e 9 metros de altura, com seteiras em todos os lados e uma ameia no topo dela. Seu interior é dividido em dois pisos, com uma escada correndo por uma lateral conectando-os. A escada termina num alçapão que leva à cobertura. Quando ativada, a torre terá uma pequena porta no lado voltado para você. A porta se abre apenas ao seu comando, o qual você pode dizer com uma ação bônus. Ela é imune a magia arrombar e mágicas similares, como a de um carrilhão de abertura."},{"type":"paragraph","text":"Cada criatura na área onde a fortaleza aparece deve ser bem sucedida num teste de resistência de Destreza CD 15, sofrendo 10d10 de dano de concussão se fracassar no teste, ou metade desse dano caso obtenha sucesso. Em ambos os casos, a criatura é empurrada para um espaço desocupado mais próximo fora da área da fortaleza. Os objetos na área que não estejam sendo vestidos ou carregados sofrem esse dano e são empurrados automaticamente."},{"type":"paragraph","text":"A torre é feita de adamante e sua mágica previne que ela seja derrubada. A cobertura, a porta e as paredes, cada um, tem 100 pontos de vida, imunidade a dano de ataques não-mágicos, excluindo as armas de cerco e resistência a todos os outros tipos de dano. Apenas uma magia desejo pode reparar a fortaleza (esse uso da magia conta como replicar uma magia de 8° nível ou inferior). Cada conjuração de desejo faz com que a cobertura, a porta ou uma parede recupere 50 pontos de vida."}]},{"id":"guia-do-mestre-item-magico-frasco-de-ferro","nome":"Frasco de Ferro","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":186,"pagina_pdf":186,"referencia":"186 (PDF: 186)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta garrafa de ferro possui uma rolha de latão. Você pode usar uma ação para falar a palavra de comando do frasco, focando uma criatura que você possa ver, a até 18 metros de você. Se o alvo for nativo de um plano de existência diferente do que você está, o alvo deve ser bem sucedido num teste de resistência de Sabedoria CD 17 ou será aprisionado no frasco. Se o alvo já tiver sido aprisionado pelo frasco antes, ele terá desvantagem no teste de resistência. Uma vez presa, uma criatura permanece no frasco até ser libertada. O frasco pode conter apenas uma criatura por vez. Uma criatura presa no frasco não precisa respirar, comer ou beber e não envelhece. Você pode usar uma ação para remover a rolha do frasco e libertar a criatura contida nele. A criatura é amigável a você e aos seus companheiros por 1 hora e obedece os seus comando por essa duração. Se você não der nenhum comando ou der um comando que resulte em sua morte, ela se defenderá, mas não fará mais nada. No final da duração, a criatura agirá de acordo com sua disposição e tendência normais. 01-50 Vazi
