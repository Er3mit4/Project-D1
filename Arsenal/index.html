car um elemental do fogo, como se você tivesse conjurado a magia conjurar elemental. O braseiro não pode ser usada dessa forma novamente até o próximo amanhecer. O braseiro pesa 2,5 quilos.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Enquanto uma chama crepitar neste braseiro de bronze, você pode usar uma ação para falar a palavra de comando do braseiro e invocar um elemental do fogo, como se você tivesse conjurado a magia conjurar elemental. O braseiro não pode ser usada dessa forma novamente até o próximo amanhecer."},{"type":"paragraph","text":"O braseiro pesa 2,5 quilos."}]},{"id":"guia-do-mestre-item-magico-broche-do-escudo","nome":"Broche do Escudo","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":165,"pagina_pdf":166,"referencia":"165 (PDF: 166)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este broche, você tem resistência a dano de energia e tem imunidade ao dano causado pela magia mísseis mágicos.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este broche, você tem resistência a dano de energia e tem imunidade ao dano causado pela magia mísseis mágicos."}]},{"id":"guia-do-mestre-item-magico-brunea-de-escamas-de-dragao","nome":"Brunea de Escamas de Dragão","categoria":"Item mágico","tipo":"Armadura (brunea)","fonte":"Guia do Mestre","pagina_livro":165,"pagina_pdf":166,"referencia":"165 (PDF: 166)","preco":null,"peso":null,"raridade":"muito rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Uma brunea de escamas de dragão é feita com escamas de um tipo de dragão. Algumas vezes, dragões recolhem suas escamas soltas e presenteiam-nas a humanoides. Outras vezes, caçadores cuidadosamente arrancam e preservam o couro de um dragão morto. Em ambos os casos, uma brunea de escamas de dragão é extremamente valorizada. Enquanto estiver vestindo esta armadura, você ganha +1 de bônus na CA, tem vantagem nos testes de resistência contra a Presença Aterradora e armas de sopro de dragões e tem resistência a um tipo de dano que é determinado pela espécie de dragão de onde as escamas vieram (veja na tabela). Além disso, você pode focar seus sentidos, com uma ação, para magicamente discernir a distância e direção do dragão mais próximo dentro de 45 quilômetros de você que seja do mesmo tipo da armadura. Essa ação especial não pode ser usada novamente até o próximo amanhecer. Resistência Resistência Dragão Dragão Elétrico Azul Ouro Fogo Frio Frio Branco Prata Ácido Elétrico Bronze Preto Ácido Cobre Verde Veneno Vermelho Latão Fogo Fogo","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Armadura (brunea), muito rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Uma brunea de escamas de dragão é feita com escamas de um tipo de dragão. Algumas vezes, dragões recolhem suas escamas soltas e presenteiam-nas a humanoides. Outras vezes, caçadores cuidadosamente arrancam e preservam o couro de um dragão morto. Em ambos os casos, uma brunea de escamas de dragão é extremamente valorizada."},{"type":"paragraph","text":"Enquanto estiver vestindo esta armadura, você ganha +1 de bônus na CA, tem vantagem nos testes de resistência contra a Presença Aterradora e armas de sopro de dragões e tem resistência a um tipo de dano que é determinado pela espécie de dragão de onde as escamas vieram (veja na tabela)."},{"type":"paragraph","text":"Além disso, você pode focar seus sentidos, com uma ação, para magicamente discernir a distância e direção do dragão mais próximo dentro de 45 quilômetros de você que seja do mesmo tipo da armadura. Essa ação especial não pode ser usada novamente até o próximo amanhecer."},{"type":"paragraph","text":"Resistência"},{"type":"paragraph","text":"Resistência"},{"type":"paragraph","text":"Dragão"},{"type":"paragraph","text":"Dragão"},{"type":"paragraph","text":"Elétrico"},{"type":"paragraph","text":"Azul"},{"type":"paragraph","text":"Ouro"},{"type":"paragraph","text":"Fogo"},{"type":"paragraph","text":"Frio"},{"type":"paragraph","text":"Frio"},{"type":"paragraph","text":"Branco"},{"type":"paragraph","text":"Prata"},{"type":"paragraph","text":"Ácido"},{"type":"paragraph","text":"Elétrico"},{"type":"paragraph","text":"Bronze"},{"type":"paragraph","text":"Preto"},{"type":"paragraph","text":"Ácido"},{"type":"paragraph","text":"Cobre"},{"type":"paragraph","text":"Verde"},{"type":"paragraph","text":"Veneno"},{"type":"paragraph","text":"Vermelho"},{"type":"paragraph","text":"Latão"},{"type":"paragraph","text":"Fogo"},{"type":"paragraph","text":"Fogo"}]},{"id":"guia-do-mestre-item-magico-buraco-portatil","nome":"Buraco Portátil","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":165,"pagina_pdf":166,"referencia":"165 (PDF: 166)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este tecido negro fino, macio como seda, é dobrado para ter as dimensões de um lenço. Ele se desdobra em uma folha circular de 1,8 metro de diâmetro. Você pode usar uma ação para desdobrar um buraco portátil e colocá-lo em uma superfície sólida, onde o buraco portátil criará um buraco extradimensional de 3 metros de profundidade. O espaço cilíndrico dentro do buraco existe em um plano diferente, portanto, ele não pode ser usado para criar passagens. Qualquer criatura dentro de um buraco portátil aberto pode sair do buraco ao escalar para fora dele. Você pode usar uma ação para fechar um buraco portátil ao segurar as bordas do tecido e dobra-lo. Dobrar o tecido fecha o buraco e qualquer criatura ou objeto dentro permanece no espaço extradimensional. Independentemente do que esteja dentro dele, o buraco pesa quase nada. Caso o buraco seja dobrado, uma criatura dentro do espaço extradimensional pode usar uma ação para realizar um teste de Força CD 10. Em um sucesso, a criatura força seu caminho para fora e aparece a 1,5 metro do buraco portátil ou da criatura que o está carregando. Uma criatura que precise respirar dentro de um buraco portátil fechado pode sobreviver por até 10 minutos, quando começará a sufocar. Colocar um buraco portátil dentro do espaço extradimensional criado por uma mochila de carga, sacola prestativa de Heward ou item similar destrói ambos os itens instantaneamente e abre um portal para o Plano Astral. O portal se origina onde um item foi colocado dentro do outro. Qualquer criatura a até 3 metros do portal é sugada para dentro dele e arremessada num local aleatório no Plano Astral. O portal então se fecha. O portal é de via única e não pode ser reaberto.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Este tecido negro fino, macio como seda, é dobrado para ter as dimensões de um lenço. Ele se desdobra em uma folha circular de 1,8 metro de diâmetro."},{"type":"paragraph","text":"Você pode usar uma ação para desdobrar um buraco portátil e colocá-lo em uma superfície sólida, onde o buraco portátil criará um buraco extradimensional de 3 metros de profundidade. O espaço cilíndrico dentro do buraco existe em um plano diferente, portanto, ele não pode ser usado para criar passagens. Qualquer criatura dentro de um buraco portátil aberto pode sair do buraco ao escalar para fora dele."},{"type":"paragraph","text":"Você pode usar uma ação para fechar um buraco portátil ao segurar as bordas do tecido e dobra-lo. Dobrar o tecido fecha o buraco e qualquer criatura ou objeto dentro permanece no espaço extradimensional. Independentemente do que esteja dentro dele, o buraco pesa quase nada."},{"type":"paragraph","text":"Caso o buraco seja dobrado, uma criatura dentro do espaço extradimensional pode usar uma ação para realizar um teste de Força CD 10. Em um sucesso, a criatura força seu caminho para fora e aparece a 1,5 metro do buraco portátil ou da criatura que o está carregando. Uma criatura que precise respirar dentro de um buraco portátil fechado pode sobreviver por até 10 minutos, quando começará a sufocar."},{"type":"paragraph","text":"Colocar um buraco portátil dentro do espaço extradimensional criado por uma mochila de carga, sacola prestativa de Heward ou item similar destrói ambos os itens instantaneamente e abre um portal para o Plano Astral. O portal se origina onde um item foi colocado dentro do outro. Qualquer criatura a até 3 metros do portal é sugada para dentro dele e arremessada num local aleatório no Plano Astral. O portal então se fecha. O portal é de via única e não pode ser reaberto."}]},{"id":"guia-do-mestre-item-magico-cajado-da-piton","nome":"Cajado da Píton","categoria":"Item mágico","tipo":"Cajado","fonte":"Guia do Mestre","pagina_livro":166,"pagina_pdf":167,"referencia":"166 (PDF: 167)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você pode usar uma ação para falar a palavra de comando do cajado e arremessa-lo no chão a até 3 metros de você. O cajado se transforma em uma cobra constritora gigante (veja o Manual dos Monstros para as estatísticas) sob seu controle e agindo em sua própria contagem de iniciativa. Ao usar uma ação bônus para falar a palavra de comando novamente, você faz com que o cajado volte a forma normal em um espaço ocupado anteriormente pela cobra. No seu turno, você pode comandar mentalmente a cobra se ela estiver a até 18 metros de você e você não esteja incapacitado. Você decide que ação a cobra realiza e pra onde ela se move durante o próximo turno dela, ou você pode emitir um comando genérico, como para atacar seus inimigos ou guardar um local. Se a cobra for reduzida a 0 pontos de vida, ela morre e volta a forma de cajado. O cajado então, se parte e é destruído. Se a cobra voltar a forma de cajado antes de perder todos os seus pontos de vida, ela recupera todos eles.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Cajado, incomum (requer sintonização com um bruxo, clérigo ou druida)","descricao_blocos":[{"type":"paragraph","text":"Você pode usar uma ação para falar a palavra de comando do cajado e arremessa-lo no chão a até 3 metros de você. O cajado se transforma em uma cobra constritora gigante (veja o Manual dos Monstros para as estatísticas) sob seu controle e agindo em sua própria contagem de iniciativa. Ao usar uma ação bônus para falar a palavra de comando novamente, você faz com que o cajado volte a forma normal em um espaço ocupado anteriormente pela cobra."},{"type":"paragraph","text":"No seu turno, você pode comandar mentalmente a cobra se ela estiver a até 18 metros de você e você não esteja incapacitado. Você decide que ação a cobra realiza e pra onde ela se move durante o próximo turno dela, ou você pode emitir um comando genérico, como para atacar seus inimigos ou guardar um local."},{"type":"paragraph","text":"Se a cobra for reduzida a 0 pontos de vida, ela morre e volta a forma de cajado. O cajado então, se parte e é destruído. Se a cobra voltar a forma de cajado antes de perder todos os seus pontos de vida, ela recupera todos eles."}]},{"id":"guia-do-mestre-item-magico-cajado-da-vibora","nome":"Cajado da Víbora","categoria":"Item mágico","tipo":"Cajado","fonte":"Guia do Mestre","pagina_livro":166,"pagina_pdf":167,"referencia":"166 (PDF: 167)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você pode usar uma ação bônus para falar a palavra de comando deste cajado e fazer a cabeça dele se transformar em uma serpente venenosa animada por 1 minuto. Ao usar outra ação bônus para falar a palavra de comando novamente, você faz o cajado voltar a sua forma inanimada normal. Você pode realizar um ataque corpo-acorpo usando a cabeça de serpente, com um alcance de 1,5 metro. Se bônus de proficiência se aplica à jogada de ataque. Se atingir, o alvo sofre 1d6 de dano perfurante e deve ser bem sucedido num teste de resistência de Constituição CD 15 ou sofrerá 3d6 de dano de veneno. A cabeça de serpente pode ser atacada enquanto estiver animada. Ela tem Classe de Armadura 15 e 20 pontos de vida. Se a cabeça cair a 0 pontos de vida, o cajado é destruído. Enquanto não for destruído, o cajado recupera todos os pontos de vida perdidos quando volta a sua forma inanimada.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Cajado, incomum (requer sintonização com um bruxo, clérigo ou druida)","descricao_blocos":[{"type":"paragraph","text":"Você pode usar uma ação bônus para falar a palavra de comando deste cajado e fazer a cabeça dele se transformar em uma serpente venenosa animada por 1 minuto. Ao usar outra ação bônus para falar a palavra de comando novamente, você faz o cajado voltar a sua forma inanimada normal."},{"type":"paragraph","text":"Você pode realizar um ataque corpo-acorpo usando a cabeça de serpente, com um alcance de 1,5 metro. Se bônus de proficiência se aplica à jogada de ataque. Se atingir, o alvo sofre 1d6 de dano perfurante e deve ser bem sucedido num teste de resistência de Constituição CD 15 ou sofrerá 3d6 de dano de veneno."},{"type":"paragraph","text":"A cabeça de serpente pode ser atacada enquanto estiver animada. Ela tem Classe de Armadura 15 e 20 pontos de vida. Se a cabeça cair a 0 pontos de vida, o cajado é destruído. Enquanto não for destruído, o cajado recupera todos os pontos de vida perdidos quando volta a sua forma inanimada."}]},{"id":"guia-do-mestre-item-magico-cajado-das-florestas","nome":"Cajado das Florestas","categoria":"Item mágico","tipo":"Cajado","fonte":"Guia do Mestre","pagina_livro":166,"pagina_pdf":167,"referencia":"166 (PDF: 167)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este cajado pode ser empunhado como um bordão mágico que concede +2 de bônus nas jogadas de ataque e dano feitas com ele. Enquanto estiver empunhando-o, você ganha +2 de bônus nas jogadas de ataque com magia. O cajado tem 10 cargas para as propriedades a seguir. Ele recupera 1d6 + 4 cargas gastas diariamente ao amanhecer. Se você gastar a última carga, role um d20. Em um 1, o cajado perde suas propriedades e se torna um bordão não-mágico. Magias. Você pode usar uma ação para gastar 1 ou mais de suas cargas para conjurar uma das seguintes magias através dele, usando a CD de resistência de suas magias: despertar (5 cargas), falar com animais (1 carga), falar com plantas (2 cargas), localizar animais ou plantas (2 cargas), muralha de espinhos (6 cargas) ou pele de árvore (2 cargas). Forma de Árvore. Você pode usar uma ação para enfincar uma ponta do cajado em um terreno fértil e gastar 1 carga para transformar o cajado em uma árvore saudável. A árvore tem 18 metros de altura e um tronco com 1,5 metro de diâmetro e os galhos na sua copa se espalham por 6 metros de raio. A árvore parece ordinária, mas irradia uma fraca aura de magia de transmutação se for alvo de detectar magia. Enquanto estiver tocando a árvore e usar outra ação para falar sua palavra de comando, você faz com que o cajado volte a sua forma natural. Qualquer criatura na árvore cai quando ela volta a ser um cajado.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Cajado, raro (requer sintonização com um druida)","descricao_blocos":[{"type":"paragraph","text":"Este cajado pode ser empunhado como um bordão mágico que concede +2 de bônus nas jogadas de ataque e dano feitas com ele. Enquanto estiver empunhando-o, você ganha +2 de bônus nas jogadas de ataque com magia."},{"type":"paragraph","text":"O cajado tem 10 cargas para as propriedades a seguir. Ele recupera 1d6 + 4 cargas gastas diariamente ao amanhecer. Se você gastar a última carga, role um d20. Em um 1, o cajado perde suas propriedades e se torna um bordão não-mágico."},{"type":"paragraph","text":"Magias. Você pode usar uma ação para gastar 1 ou mais de suas cargas para conjurar uma das seguintes magias através dele, usando a CD de resistência de suas magias: despertar (5 cargas), falar com animais (1 carga), falar com plantas (2 cargas), localizar animais ou plantas (2 cargas), muralha de espinhos (6 cargas) ou pele de árvore (2 cargas)."},{"type":"paragraph","text":"Forma de Árvore. Você pode usar uma ação para enfincar uma ponta do cajado em um terreno fértil e gastar 1 carga para transformar o cajado em uma árvore saudável. A árvore tem 18 metros de altura e um tronco com 1,5 metro de diâmetro e os galhos na sua copa se espalham por 6 metros de raio. A árvore parece ordinária, mas irradia uma fraca aura de magia de transmutação se for alvo de detectar magia. Enquanto estiver tocando a árvore e usar outra ação para falar sua palavra de comando, você faz com que o cajado volte a sua forma natural. Qualquer criatura na árvore cai quando ela volta a ser um cajado."}]},{"id":"guia-do-mestre-item-magico-cajado-de-ataque","nome":"Caja mas de suas cargas para conjurar uma das seguintes magias através dele, usando a CD de resistência de suas magias: inseto gigante (4 cargas), praga de insetos (5 cargas). Nuvem de Insetos. Enquanto empunhar este cajado, você pode usar uma ação e gastar 1 carga para fazer com que um enxame de insetos voadores inofensivos se espalhem num raio de 9 metros de você. Os insetos permanecem por 10 minutos, deixando uma área de escuridão densa para as criaturas, exceto você. O enxame se move com você, permanecendo centrado em você. Um vento de pelo menos 15 quilômetros por hora dispersa o enxame e termina o efeito.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Cajado, raro (requer sintonização com um bardo, bruxo, clérigo, druida, feiticeiro ou mago)","descricao_blocos":[{"type":"paragraph","text":"Este cajado tem 10 cargas e recupera 1d6 + 4 cargas gastas diariamente ao amanhecer. Se você gastar a última carga, role um d20. Em um 1, um enxame de insetos consome e destrói o cajado, então se dispersa."},{"type":"paragraph","text":"Magias. Enquanto empunhar este cajado, você pode usar uma ação para gastar algumas de suas cargas para conjurar uma das seguintes magias através dele, usando a CD de resistência de suas magias: inseto gigante (4 cargas), praga de insetos (5 cargas)."},{"type":"paragraph","text":"Nuvem de Insetos. Enquanto empunhar este cajado, você pode usar uma ação e gastar 1 carga para fazer com que um enxame de insetos voadores inofensivos se espalhem num raio de 9 metros de você. Os insetos permanecem por 10 minutos, deixando uma área de escuridão densa para as criaturas, exceto você. O enxame se move com você, permanecendo centrado em você. Um vento de pelo menos 15 quilômetros por hora dispersa o enxame e termina o efeito."}]},{"id":"guia-do-mestre-item-magico-cajado-de-trovao-e-relampago","nome":"Cajado de Trovão e Relâmpago","categoria":"Item mágico","tipo":"Cajado","fonte":"Guia do Mestre","pagina_livro":169,"pagina_pdf":170,"referencia":"169 (PDF: 170)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este cajado pode ser empunhado como um bordão mágico que concede +2 de bônus nas jogadas de ataque e dano feitas com ele. Ele também possui as seguintes propriedades adicionais. Quando uma dessas propriedades é usada, ela não pode ser usada novamente até o próximo amanhecer. Relâmpago. Quando você atinge com um ataque corpo-acorpo usando o cajado, você pode fazer com que ele causa 2d6 de dano elétrico extra. Trovão. Quando você atinge com um ataque corpo-acorpo usando o cajado, você pode fazer com que ele emita um estrondo de trovão, audível a até 90 metros de distância. O alvo que você atingiu deve ser bem sucedido num teste de resistência de Constituição CD 17, ou ficará atordoado até o final do seu próximo turno. Golpe Elétrico. Você pode usar uma ação para fazer um relâmpago saltar da ponta do cajado em uma linha de 1,5 metro de largura por 36 metros de comprimento. Cada criatura na linha deve realizar um teste de resistência de Destreza CD 17, sofrendo 9d6 de dano elétrico se falhar ou metade desse dano se obtiver sucesso. Golpe Trovejante. Você pode usar uma ação para fazer o cajado emitir um estrondo trovejante ensurdecedor, audível a até 180 metros de distância. Cada criatura a até 18 metros de você (não incluindo você) deve realizar um teste de resistência de Constituição CD 17. Se fracassar na resistência, uma criatura sofre 2d6 de dano trovejante e fica surda por 1 minuto. Se passar na resistência, uma criatura sofre metade desse dano e não fica surda. Trovão e Relâmpago. Você pode usar uma ação para usar as propriedades Golpe Elétrico e Golpe Trovejante ao mesmo tempo. Fazer isso não gasta os usos diários dessas propriedades, apenas o uso desta aqui.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Cajado, muito raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este cajado pode ser empunhado como um bordão mágico que concede +2 de bônus nas jogadas de ataque e dano feitas com ele. Ele também possui as seguintes propriedades adicionais. Quando uma dessas propriedades é usada, ela não pode ser usada novamente até o próximo amanhecer."},{"type":"paragraph","text":"Relâmpago. Quando você atinge com um ataque corpo-acorpo usando o cajado, você pode fazer com que ele causa 2d6 de dano elétrico extra."},{"type":"paragraph","text":"Trovão. Quando você atinge com um ataque corpo-acorpo usando o cajado, você pode fazer com que ele emita um estrondo de trovão, audível a até 90 metros de distância. O alvo que você atingiu deve ser bem sucedido num teste de resistência de Constituição CD 17, ou ficará atordoado até o final do seu próximo turno."},{"type":"paragraph","text":"Golpe Elétrico. Você pode usar uma ação para fazer um relâmpago saltar da ponta do cajado em uma linha de 1,5 metro de largura por 36 metros de comprimento. Cada criatura na linha deve realizar um teste de resistência de Destreza CD 17, sofrendo 9d6 de dano elétrico se falhar ou metade desse dano se obtiver sucesso."},{"type":"paragraph","text":"Golpe Trovejante. Você pode usar uma ação para fazer o cajado emitir um estrondo trovejante ensurdecedor, audível a até 180 metros de distância. Cada criatura a até 18 metros de você (não incluindo você) deve realizar um teste de resistência de Constituição CD 17. Se fracassar na resistência, uma criatura sofre 2d6 de dano trovejante e fica surda por 1 minuto. Se passar na resistência, uma criatura sofre metade desse dano e não fica surda."},{"type":"paragraph","text":"Trovão e Relâmpago. Você pode usar uma ação para usar as propriedades Golpe Elétrico e Golpe Trovejante ao mesmo tempo. Fazer isso não gasta os usos diários dessas propriedades, apenas o uso desta aqui."}]},{"id":"guia-do-mestre-item-magico-cajado-do-arcano","nome":"Cajado do Arcano","categoria":"Item mágico","tipo":"Cajado","fonte":"Guia do Mestre","pagina_livro":171,"pagina_pdf":171,"referencia":"171 (PDF: 171)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este cajado pode ser empunhado como um bordão mágico que concede +2 de bônus nas jogadas de ataque e dano feitas com ele. Enquanto estiver empunhando-o, você ganha +2 de bônus nas jogadas de ataque com magia. O cajado tem 50 cargas para as propriedades a seguir. Ele recupera 4d6 + 2 cargas gastas diariamente ao amanhecer. Se você gastar a última carga, role um d20. Em um 20, o cajado recupera 1d12 + 1 cargas. Absorção de Magias. Enquanto estiver empunhando o caj ajado, você tem vantagem em testes de resistência contra magias. Além disso, você pode usar sua reação quando outra criatura conjurar uma magia que tenha apenas você como alvo. Se o fizer, o cajado absorve a mágica da magia, cancelando seu efeito e ganhando uma quantidade de cargas igual ao nível da magia absorvida. Porém, se fazer isso elevar o número total de cargas do cajado acima de 50, o cajado explode como se você tivesse ativado seu golpe de retribuição (veja abaixo). Magias. Enquanto estiver empunhando este cajado, você pode usar uma ação para gastar 1 ou mais de suas cargas para conjurar uma das seguintes magias através dele, usando a CD de resistência e bônus de ataque de suas magias: arrombar (2 cargas), bola de fogo (versão de 7° nível, 7 cargas), conjurar elemental (7 cargas), dissipar magia (3 cargas), esfera flamejante (2 cargas), invisibilidade (2 cargas), muralha de fogo (4 cargas), relâmpago (versão de 7° nível, 7 cargas), teia (2 cargas) telecinésia (5 cargas) ou tempestade de gelo (4 cargas). Golpe de Retribuição. Você pode usar uma ação para partir o cajado no seu joelho ou em uma superfície sólida, reali a seja removida ou você não esteja mais submerso."}]},{"id":"guia-do-mestre-item-magico-capa-do-saltimbanco","nome":"Capa do Saltimbanco","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":172,"pagina_pdf":173,"referencia":"172 (PDF: 173)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta capa tem um leve cheiro de enxofre. Enquanto você estiver vestindo-a, você pode usa-la para conjurar a magia porta dimensional com uma ação. Essa propriedade da capa não pode ser usada novamente até o próximo amanhecer. Quando você desaparece, você deixa uma nuvem de fumaça para trás e aparece em uma nuvem de fumaça similar no seu destino. A fumaça cria uma área de escuridão leve no espaço que você deixou e no espaço que você aparece, que desaparece no final do seu próximo turno. Um vento leve ou mais forte dispersa a fumaça.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Esta capa tem um leve cheiro de enxofre. Enquanto você estiver vestindo-a, você pode usa-la para conjurar a magia porta dimensional com uma ação. Essa propriedade da capa não pode ser usada novamente até o próximo amanhecer."},{"type":"paragraph","text":"Quando você desaparece, você deixa uma nuvem de fumaça para trás e aparece em uma nuvem de fumaça similar no seu destino. A fumaça cria uma área de escuridão leve no espaço que você deixou e no espaço que você aparece, que desaparece no final do seu próximo turno. Um vento leve ou mais forte dispersa a fumaça."}]},{"id":"guia-do-mestre-item-magico-carrilhao-de-abertura","nome":"Carrilhão de Abertura","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":172,"pagina_pdf":173,"referencia":"172 (PDF: 173)","preco":null iceiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este chapéu, você pode usar uma ação para conjurar a magia disfarçar-se através dele, à vontade. A magia termina caso o chapéu seja removido."}]},{"id":"guia-do-mestre-item-magico-cimitarra-de-velocidade","nome":"Cimitarra de Velocidade","categoria":"Item mágico","tipo":"Arma (cimitarra)","fonte":"Guia do Mestre","pagina_livro":172,"pagina_pdf":173,"referencia":"172 (PDF: 173)","preco":null,"peso":null,"raridade":"muito rara","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você recebe +2 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Além disso, você pode realizar um ataque com ela, com uma ação bônus, em cada um dos seus turnos.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Arma (cimitarra), muito rara (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Você recebe +2 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. Além disso, você pode realizar um ataque com ela, com uma ação bônus, em cada um dos seus turnos."}]},{"id":"guia-do-mestre-item-magico-cinto-dos-anoes","nome":"Cinto dos Anões","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":172,"pagina_pdf":173,"referencia":"172 (PDF: 173)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este cinto, você recebe os seguintes benefícios: Seu valor de Constituição aumenta em 2, até o máximo de 20. Você recebe vantagem em testes de Carisma (Persuasão) feitos interagindo com anões. Além disso, enquanto estiver sintonizado com o cinto, você tem 50 por cento de chance, a cada dia ao amanhec o seu valor de Força sem o cinto já for igual ou superior ao valor do cinto, o item não tem qualquer efeito sobre você. Existem seis variações desse cinto, correspondentes e com raridade variando de acordo com os seis tipos de gigantes verdadeiros. O cinturão de força do gigante de pedra e o cinturão de força do gigante do gelo parecem diferentes, mas possuem o mesmo efeito. Gigante da colina 21 Raro Gigante de pedra/gelo 23 Muito raro Gigante do fogo 25 Muito raro Gigante das nuvens 27 Lendário Gigante da tempestade 29 Lendário","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raridade variável (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este cinto, seu valor de Força muda para o valor concedido pelo cinto. Caso seu valor de Força sem o cinto já for igual ou superior ao valor do cinto, o item não tem qualquer efeito sobre você."},{"type":"paragraph","text":"Existem seis variações desse cinto, correspondentes e com raridade variando de acordo com os seis tipos de gigantes verdadeiros. O cinturão de força do gigante de pedra e o cinturão de força do gigante do gelo parecem diferentes, mas possuem o mesmo efeito."},{"type":"table","headers":["Tipo","Força","Raridade"],"rows":[["Gigante da colina","21","Raro"],["Gigante de pedra/gelo","23","Muito raro"],["Gigante do fogo","25","Muito raro"],["Gigante das nuvens","27","Lendário"],["Gigante da tempestade","29","Lendário"]]}]},{"id":"guia-do-mestre-item-magico-cola-soberana","nome":"Cola Soberana","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":173,"pagina_pdf":174,"referencia":"173 (PDF: 174)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta substância viscosa e leitosa pode formar uma união permanente entre dois objetos quaisquer. Ela deve ser armazenada em um jarro ou frasco revestido por dentro com óleo escorregadio. Quando encontrado, um recipiente contem 1d6 + 1 porções de 30 gramas. Uma porção de cola pode cobrir 30 centímetros quadrados de superfície. A cola leva 1 minuto para secar. Quando ela tiver secado, a união é criada e só pode ser quebrada com aplicação do solvente universal, óleo de forma etérea ou com a magia desejo.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, lendário","descricao_blocos":[{"type":"paragraph","text":"Esta substância viscosa e leitosa pode formar uma união permanente entre dois objetos quaisquer. Ela deve ser armazenada em um jarro ou frasco revestido por dentro com óleo escorregadio. Quando encontrado, um recipiente contem 1d6 + 1 porções de 30 gramas."},{"type":"paragraph","text":"Uma porção de cola pode cobrir 30 centímetros quadrados de superfície. A cola leva 1 minuto para secar. Quando ela tiver secado, a união é criada e só pode ser quebrada com aplicação do solvente universal, óleo de forma etérea ou com a magia desejo."}]},{"id":"guia-do-mestre-item-magico-colar-de-adaptacao","nome":"Colar de Adaptação","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":173,"pagina_pdf":174,"referencia":"173 (PDF: 174)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este colar, você pode respirar normalmente em qualquer ambiente, e você tem vantagem em testes de resistência contra gases e vapores nocivos (como dos efeitos de névoa mortal, névoa fétida, venenos inalados e armas de sopro de alguns dragões).","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este colar, você pode respirar normalmente em qualquer ambiente, e você tem vantagem em testes de resistência contra gases e vapores nocivos (como dos efeitos de névoa mortal, névoa fétida, venenos inalados e armas de sopro de alguns dragões)."}]},{"id":"guia-do-mestre-item-magico-colar-de-bolas-de-fogo","nome":"Colar de Bolas de Fogo","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":173,"pagina_pdf":174,"referencia":"173 (PDF: 174)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este colar possui 1d6 +3 contas penduradas nele. Você pode usar uma ação para arrancar uma conta e arremessala a até 18 metros de distância. Quando alcançar o fim da trajetória, a conta explode como uma magia bola de fogo de 3° nível (CD de resistência 15). Você pode arremessar diversas contas, ou mesmo o colar interior, com uma ação. Quando o ficar, aumente o nível da bola de fogo em 1 por cada conta além da primeira.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Este colar possui 1d6 +3 contas penduradas nele. Você pode usar uma ação para arrancar uma conta e arremessala a até 18 metros de distância. Quando alcançar o fim da trajetória, a conta explode como uma magia bola de fogo de 3° nível (CD de resistência 15)."},{"type":"paragraph","text":"Você pode arremessar diversas contas, ou mesmo o colar interior, com uma ação. Quando o ficar, aumente o nível da bola de fogo em 1 por cada conta além da primeira."}]},{"id":"guia-do-mestre-item-magico-contas-de-forca","nome":"Contas de Força","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":173,"pagina_pdf":174,"referencia":"173 (PDF: 174)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Estas pequenas esferas negras medem 2 centímetros de diâmetro e pesam 30 gramas cada. Geralmente, 1d4 + 4 contas de força são encontradas juntas. Você pode usar uma ação para arremessar a conta a até 18 metros. Ela explode no impacto e é destruída. Cada criatura a até 3 metros de raio de onde a conta atingiu deve ser bem sucedida num teste de resistência de Destreza CD 15 ou sofrerá 5d4 de dano de energia. Uma esfera de energia transparente então cerca a área por 1 minuto. Qualquer criatura que fracassar na resistência e esteja completamente dentro da área, ficará presa dentro da esfera. As criaturas que forem bem sucedidas na resistência, ou que estejam parcialmente dentro da área, são empurradas para longe do centro da esfera até não estarem mais dentro dela. Apenas ar pode passar através a parede da esfera. Nenhum ataque ou outro efeito consegue. Uma criatura aprisionada pode usar sua ação para empurrar a parede da esfera, movendo a esfera até metade do deslocamento de caminhada da criatura. A esfera pode ser erguida e sua magia faz com que ela pese apenas 0,5 quilo, independente do peso da criatura dentro dela.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Estas pequenas esferas negras medem 2 centímetros de diâmetro e pesam 30 gramas cada. Geralmente, 1d4 + 4 contas de força são encontradas juntas."},{"type":"paragraph","text":"Você pode usar uma ação para arremessar a conta a até 18 metros. Ela explode no impacto e é destruída. Cada criatura a até 3 metros de raio de onde a conta atingiu deve ser bem sucedida num teste de resistência de Destreza CD 15 ou sofrerá 5d4 de dano de energia. Uma esfera de energia transparente então cerca a área por 1 minuto. Qualquer criatura que fracassar na resistência e esteja completamente dentro da área, ficará presa dentro da esfera. As criaturas que forem bem sucedidas na resistência, ou que estejam parcialmente dentro da área, são empurradas para longe do centro da esfera até não estarem mais dentro dela. Apenas ar pode passar através a parede da esfera. Nenhum ataque ou outro efeito consegue."},{"type":"paragraph","text":"Uma criatura aprisionada pode usar sua ação para empurrar a parede da esfera, movendo a esfera até metade do deslocamento de caminhada da criatura. A esfera pode ser erguida e sua magia faz com que ela pese apenas 0,5 quilo, independente do peso da criatura dentro dela."}]},{"id":"guia-do-mestre-item-magico-corda-de-escalada","nome":"Corda de Escalada","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":174,"pagina_pdf":175,"referencia":"174 (PDF: 175)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta corda de seda de 18 metros de comprimento pesa 1,5 quilo e pode suportar até 1.500 quilos. Se você segurar uma ponta da corda e usar uma ação para falar a palavra de comando, a corda se anima. Com uma ação bônus, você pode comandar a outra ponta a se mover para um destino de sua escolha. Essa ponta se move 3 metros em seu turno, a primeira vez que você a comandar, e 3 metros em cada um dos seus turnos até alcançar o destino, até sua extensão máxima, ou até você manda-la parar. Você também pode mandar a corda se prender firmemente a um objeto ou para se soltar, para se amarrar ou se desamarrar, ou para se enrolar para ser carregada. Se você mandar a corda se amarrar, grandes nós aparecerão em intervalos de 30 centímetros ao longo da corda. Enquanto estiver nodosa, a corda se encurta para 15 metros de comprimento e concede vantagem em testes feitos para escala-la. A corda tem CA 20 e 20 pontos de vida. Ela recupera 1 ponto de vida a cada 5 minutos, contanto que tenha pelo menos 1 ponto de vida. Se a corda cair para 0 pontos de vida, ela é destruída.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Esta corda de seda de 18 metros de comprimento pesa 1,5 quilo e pode suportar até 1.500 quilos. Se você segurar uma ponta da corda e usar uma ação para falar a palavra de comando, a corda se anima. Com uma ação bônus, você pode comandar a outra ponta a se mover para um destino de sua escolha. Essa ponta se move 3 metros em seu turno, a primeira vez que você a comandar, e 3 metros em cada um dos seus turnos até alcançar o destino, até sua extensão máxima, ou até você manda-la parar. Você também pode mandar a corda se prender firmemente a um objeto ou para se soltar, para se amarrar ou se desamarrar, ou para se enrolar para ser carregada."},{"type":"paragraph","text":"Se você mandar a corda se amarrar, grandes nós aparecerão em intervalos de 30 centímetros ao longo da corda. Enquanto estiver nodosa, a corda se encurta para 15 metros de comprimento e concede vantagem em testes feitos para escala-la."},{"type":"paragraph","text":"A corda tem CA 20 e 20 pontos de vida. Ela recupera 1 ponto de vida a cada 5 minutos, contanto que tenha pelo menos 1 ponto de vida. Se a corda cair para 0 pontos de vida, ela é destruída."}]},{"id":"guia-do-mestre-item-magico-corda-de-estrangulamento","nome":"Corda de Estrangulamento","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":174,"pagina_pdf":175,"referencia":"174 (PDF: 175)","preco":null,"peso":null,"raridade":"raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta corda de 9 metros de comprimento pesa 1,5 quilos. Se você segurar uma ponta da corda e usar uma ação para falar a palavra de comando, a outra ponta se arremessa para frente para estrangular uma criatura que você possa ver, a até 6 metros de você. O alvo deve ser bem sucedido num teste de resistência de Destreza CD 15 ou ficará impedido. Você pode libertar a criatura ao usar uma ação bônus para falar uma segunda palavra de comando. Um alvo impedido pela corda pode usar uma ação para realizar um teste de Força ou de Destreza CD 15 (à escolha do alvo). Com um sucesso, a criatura não estará mais impedida pela corda. A corda tem CA 20 e 20 pontos de vida. Ela recupera 1 ponto de vida a cada 5 minutos, contanto que tenha pelo menos 1 ponto de vida. Se a corda cair para 0 pontos de vida, ela é destruída.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro","descricao_blocos":[{"type":"paragraph","text":"Esta corda de 9 metros de comprimento pesa 1,5 quilos. Se você segurar uma ponta da corda e usar uma ação para falar a palavra de comando, a outra ponta se arremessa para frente para estrangular uma criatura que você possa ver, a até 6 metros de você. O alvo deve ser bem sucedido num teste de resistência de Destreza CD 15 ou ficará impedido."},{"type":"paragraph","text":"Você pode libertar a criatura ao usar uma ação bônus para falar uma segunda palavra de comando. Um alvo impedido pela corda pode usar uma ação para realizar um teste de Força ou de Destreza CD 15 (à escolha do alvo). Com um sucesso, a criatura não estará mais impedida pela corda."},{"type":"paragraph","text":"A corda tem CA 20 e 20 pontos de vida. Ela recupera 1 ponto de vida a cada 5 minutos, contanto que tenha pelo menos 1 ponto de vida. Se a corda cair para 0 pontos de vida, ela é destruída."}]},{"id":"guia-do-mestre-item-magico-corrente-de-contas-de-oracao","nome":"Corrente de Contas de Oração","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":174,"pagina_pdf":175,"referencia":"174 (PDF: 175)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este colar possui 1d4 + 2 contas mágicas feitas de águas marinhas, pérolas negras ou topázios. Ela tem também diversas contas não-mágicas feitas de pedras como âmbar, pedra de sangue, citrina, coral, jade, pérola ou quartzo. Se uma conta mágica for removida da corrente, a conta perde sua mágica. 1-6 Benção Abençoar 7-12 Curar Curar ferimentos (2° nível) ou restauração menor 13-16 Auxiliar Restauração maior 17-18 Destruir Marca da punição 19 Invocar Aliado planar 20 Andar no vento Caminhar no vento Existem seis tipos de contas mágicas. O Mestre decide o tipo de cada uma na corrente ou as determinar aleatoriamente. Uma corrente pode ter mais de um tipo da mesma conta. Para usar uma, você deve estar usando o colar. Cada conta possui uma magia que você pode conjurar através dela, com uma ação bônus (usando sua CD de magia, se um teste de resistência for necessário). Uma vez que a magia de uma conta mágica é conjurada, a conta não poderá ser usada novamente até o próximo amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro (requer sintonização com um clérigo, druida ou paladino)","descricao_blocos":[{"type":"paragraph","text":"Este colar possui 1d4 + 2 contas mágicas feitas de águas marinhas, pérolas negras ou topázios. Ela tem também diversas contas não-mágicas feitas de pedras como âmbar, pedra de sangue, citrina, coral, jade, pérola ou quartzo. Se uma conta mágica for removida da corrente, a conta perde sua mágica."},{"type":"table","headers":["d20","Conta de...","Magia"],"rows":[["1-6","Benção","Abençoar"],["7-12","Curar","Curar ferimentos (2° nível) ou restauração menor"],["13-16","Auxiliar","Restauração maior"],["17-18","Destruir","Marca da punição"],["19","Invocar","Aliado planar"],["20","Andar no vento","Caminhar no vento"]]},{"type":"paragraph","text":"Existem seis tipos de contas mágicas. O Mestre decide o tipo de cada uma na corrente ou as determinar aleatoriamente. Uma corrente pode ter mais de um tipo da mesma conta. Para usar uma, você deve estar usando o colar. Cada conta possui uma magia que você pode conjurar através dela, com uma ação bônus (usando sua CD de magia, se um teste de resistência for necessário). Uma vez que a magia de uma conta mágica é conjurada, a conta não poderá ser usada novamente até o próximo amanhecer."}]},{"id":"guia-do-mestre-item-magico-couro-batido-encantador","nome":"Couro Batido Encantador","categoria":"Item mágico","tipo":"Armadura (couro batido)","fonte":"Guia do Mestre","pagina_livro":175,"pagina_pdf":176,"referencia":"175 (PDF: 176)","preco":null,"peso":null,"raridade":"rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Enquanto estiver vestindo esta armadura, você recebe +1 de bônus na CA. Você também pode usar uma ação bônus para falar a palavra de comando da armadura e fazer com que ela assuma a aparência de um conjunto de roupas normal ou outro tipo de armadura. Você decide qual aparência ela toma, incluindo a cor, estilo e acessórios, mas a armadura mantém seu volume e peso normais. A aparência ilusória dura até você usar essa propriedade novamente ou remover a armadura.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Armadura (couro batido), rara","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver vestindo esta armadura, você recebe +1 de bônus na CA. Você também pode usar uma ação bônus para falar a palavra de comando da armadura e fazer com que ela assuma a aparência de um conjunto de roupas normal ou outro tipo de armadura. Você decide qual aparência ela toma, incluindo a cor, estilo e acessórios, mas a armadura mantém seu volume e peso normais. A aparência ilusória dura até você usar essa propriedade novamente ou remover a armadura."}]},{"id":"guia-do-mestre-item-magico-cubo-de-forca","nome":"Cubo de Força","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":175,"pagina_pdf":176,"referencia":"175 (PDF: 176)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este cubo tem aproximadamente 2,5 centímetros de diâmetro. Cada face possui uma marcação distinta nela que pode ser pressionada. O cubo começa com 36 cargas e recupera 1d20 cargas gastas diariamente pelo amanhecer. Você pode usar uma ação para pressionar uma das faces do cubo, gastando um número de cargas baseado na face escolhida, como mostrado na tabela Faces do Cubo de Força. Cada face possui um efeito diferente. Se o cubo não tiver cargas restantes suficientes, nada acontece. Do contrário, uma barreira de energia invisível surge do nada, formando um cubo de 4,5 metros de lado. A barreira é centrada em você, se move com você e dura 1 minuto, até você usar uma ação para pressionar a sexta face do cubo, ou o cubo ficar sem cargas. Você pode mudar o efeito da barreira ao pressionar uma face diferente do cubo e gastar o número requerido de cargas, reiniciando a duração. Se o seu movimento fizer com que a barreira entre em contato com um objeto sólido que não possa passar pelo cubo, você não poderá se aproximar mais desse objeto enquanto a barreira permanecer. 1 1 Gases, vento e névoa não podem atravessar a barreira. 2 2 Matéria inorgânica não pode atravessar a barreira. Paredes, pisos e tetos podem atravessar ao seu critério. 3 3 Matéria orgânica não pode atravessar a barreira. 4 4 Efeitos de magias não pode atravessar a barreira. 5 5 Nada pode atravessar a barreira. Paredes, pisos e tetos podem atravessar ao seu critério. 6 0 A barreira se desativa. O cubo perde cargas quando a barreira é alvo de certas magias ou entra em contato com certas magias ou efeitos de itens mágicos, como mostrado na tabela abaixo. Desintegrar 1d12 Trombeta da destruição 1d10 Criar passagem 1d6 Rajada prismática 1d20 Muralha de fogo 1d4","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este cubo tem aproximadamente 2,5 centímetros de diâmetro. Cada face possui uma marcação distinta nela que pode ser pressionada. O cubo começa com 36 cargas e recupera 1d20 cargas gastas diariamente pelo amanhecer."},{"type":"paragraph","text":"Você pode usar uma ação para pressionar uma das faces do cubo, gastando um número de cargas baseado na face escolhida, como mostrado na tabela Faces do Cubo de Força. Cada face possui um efeito diferente. Se o cubo não tiver cargas restantes suficientes, nada acontece. Do contrário, uma barreira de energia invisível surge do nada, formando um cubo de 4,5 metros de lado. A barreira é centrada em você, se move com você e dura 1 minuto, até você usar uma ação para pressionar a sexta face do cubo, ou o cubo ficar sem cargas. Você pode mudar o efeito da barreira ao pressionar uma face diferente do cubo e gastar o número requerido de cargas, reiniciando a duração."},{"type":"paragraph","text":"Se o seu movimento fizer com que a barreira entre em contato com um objeto sólido que não possa passar pelo cubo, você não poderá se aproximar mais desse objeto enquanto a barreira permanecer."},{"type":"table","headers":["Face","Cargas","Efeito"],"rows":[["1","1","Gases, vento e névoa não podem atravessar a barreira."],["2","2","Matéria inorgânica não pode atravessar a barreira. Paredes, pisos e tetos podem atravessar ao seu critério."],["3","3","Matéria orgânica não pode atravessar a barreira."],["4","4","Efeitos de magias não pode atravessar a barreira."],["5","5","Nada pode atravessar a barreira. Paredes, pisos e tetos podem atravessar ao seu critério."],["6","0","A barreira se desativa."]]},{"type":"paragraph","text":"O cubo perde cargas quando a barreira é alvo de certas magias ou entra em contato com certas magias ou efeitos de itens mágicos, como mostrado na tabela abaixo."},{"type":"table","headers":["Magia ou Item","Cargas Perdidas"],"rows":[["Desintegrar","1d12"],["Trombeta da destruição","1d10"],["Criar passagem","1d6"],["Rajada prismática","1d20"],["Muralha de fogo","1d4"]]}]},{"id":"guia-do-mestre-item-magico-cubo-do-portal","nome":"Cubo do Portal","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":175,"pagina_pdf":176,"referencia":"175 (PDF: 176)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este cubo de 7,5 centímetros de diâmetro irradia energia mágica palpável. Os seis lados do cubo são, cada um, conectado a um plano de existência diferente, um deles é o Plano Material. Os outros lados são ligados a planos determinados pelo Mestre. Você pode usar uma ação para apertar um dos lados do cubo para conjurar a magia portal através dele, abrindo um portal para o plano conectado a esse lado. Alternativamente, se você usar uma ação para pressionar um lado duas vezes, você pode conjurar a magia viagem planar (CD de resistência 17) com o cubo e transportar os alvos para o plano conectado a esse lado. O cubo tem 3 cargas. Cada uso do cubo gasta 1 carga. O cubo recupera 1d3 das cargas gastas diariamente a cada amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, lendário","descricao_blocos":[{"type":"paragraph","text":"Este cubo de 7,5 centímetros de diâmetro irradia energia mágica palpável. Os seis lados do cubo são, cada um, conectado a um plano de existência diferente, um deles é o Plano Material. Os outros lados são ligados a planos determinados pelo Mestre."},{"type":"paragraph","text":"Você pode usar uma ação para apertar um dos lados do cubo para conjurar a magia portal através dele, abrindo um portal para o plano conectado a esse lado."},{"type":"paragraph","text":"Alternativamente, se você usar uma ação para pressionar um lado duas vezes, você pode conjurar a magia viagem planar (CD de resistência 17) com o cubo e transportar os alvos para o plano conectado a esse lado."},{"type":"paragraph","text":"O cubo tem 3 cargas. Cada uso do cubo gasta 1 carga. O cubo recupera 1d3 das cargas gastas diariamente a cada amanhecer."}]},{"id":"guia-do-mestre-item-magico-decantador-de-agua-infinita","nome":"Decantador de Água Infinita","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":175,"pagina_pdf":176,"referencia":"175 (PDF: 176)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Este frasco de rolha espirra quando sacudido, como se contivesse água. O decantador pesa 1 quilo. Você pode usar uma ação para remover a rolha e falar uma das três palavras de comando, quando uma quantidade de água doce ou água salgada (à sua escolha) jorrará do frasco. A água para de sair no começo do seu próximo turno. Escolhida dentre as seguintes opções: O \"riacho\" produz 4 litros de água. A \"fonte\" produz 20 litros de água. O \"gêiser\" produz 120 litros de água que é expelida em um gêiser de 9 metros de comprimento e 30 centímetros de espessura. Com uma ação bônus, enquanto segura o decantador, você pode mirar o gêiser em uma criatura, que você possa ver, a até 9 metros de você. O alvo deve ser bem sucedido num teste de resistência de Força CD 13 ou sofrerá 1d4 de dano de concussão e cairá no chão. Ao invés de uma criatura, você pode focar um objeto que não esteja sendo vestido ou segurado e que não pese mais de 100 quilos. O objeto também é derrubado ou empurrado até 4,5 metros de você.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Este frasco de rolha espirra quando sacudido, como se contivesse água. O decantador pesa 1 quilo."},{"type":"paragraph","text":"Você pode usar uma ação para remover a rolha e falar uma das três palavras de comando, quando uma quantidade de água doce ou água salgada (à sua escolha) jorrará do frasco. A água para de sair no começo do seu próximo turno. Escolhida dentre as seguintes opções:"},{"type":"list","items":["O \"riacho\" produz 4 litros de água.","A \"fonte\" produz 20 litros de água.","O \"gêiser\" produz 120 litros de água que é expelida em um gêiser de 9 metros de comprimento e 30 centímetros de espessura. Com uma ação bônus, enquanto segura o decantador, você pode mirar o gêiser em uma criatura, que você possa ver, a até 9 metros de você. O alvo deve ser bem sucedido num teste de resistência de Força CD 13 ou sofrerá 1d4 de dano de concussão e cairá no chão. Ao invés de uma criatura, você pode focar um objeto que não esteja sendo vestido ou segurado e que não pese mais de 100 quilos. O objeto também é derrubado ou empurrado até 4,5 metros de você."]}]},{"id":"guia-do-mestre-item-magico-defensora","nome":"Defensora","categoria":"Item mágico","tipo":"Arma (qualquer espada)","fonte":"Guia do Mestre","pagina_livro":175,"pagina_pdf":176,"referencia":"175 (PDF: 176)","preco":null,"peso":null,"raridade":"lendária","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você recebe +3 de bônus nas jogadas de ataque e dano feitas com esta arma mágica. A primeira vez que você ataca com essa espada em cada um dos seus turnos, você pode trans e ou nade."]},{"type":"paragraph","text":"Pernas e cauda se retraem, reduzindo o deslocamento do dispositivo para 0 e deixando-o incapaz de se beneficiar de bônus de deslocamento."},{"type":"list","items":["2 Vigias frontais se abrem."]},{"type":"paragraph","text":"Vigias frontais se fecham."},{"type":"paragraph","text":"Vigias laterais se fecham"},{"type":"paragraph","text":"Vigias laterais se abrem"},{"type":"paragraph","text":"(duas de cada lado)."},{"type":"paragraph","text":"(duas de cada lado)."},{"type":"list","items":["4 Duas garras se estendem dos lados frontais do dispositivo."]},{"type":"paragraph","text":"As garras se retraem."},{"type":"list","items":["5 Cada garra estendida realiza o seguinte ataque com arma corpo-a-corpo: +8 para atingir, alcance 1,5 metro, um alvo. Acerto: 7 (2d6) de dano de concussão."]},{"type":"paragraph","text":"Cada garra estendida"},{"type":"paragraph","text":"realiza o seguinte ataque"},{"type":"paragraph","text":"com arma corpo"},{"type":"paragraph","text":"a-corpo:"},{"type":"paragraph","text":"+8 para atingir, alcance"},{"type":"paragraph","text":"1,5 metro, um alvo."},{"type":"paragraph","text":"Acerto: o alvo fica"},{"type":"paragraph","text":"agarrado (CD 15 para"},{"type":"paragraph","text":"escapar)."},{"type":"list","items":["6 O dispositivo anda ou nada para frente"]},{"type":"paragraph","text":"O dispositivo anda ou"},{"type":"paragraph","text":"nada para trás."},{"type":"list","items":["7 O dispositivo vira 90 graus para a esquerda."]},{"type":"paragraph","text":"O dispositivo vira 90 graus"},{"type":"paragraph","text":"para a direita."},{"type":"list","items":["8 Objetos similares a olhos emitem luz plena num raio de 9 metros e penumbra num raio adicional de 9 metros."]},{"type":"paragraph","text":"As luzes se apagam."},{"type":"paragraph","text":"O dispositivo sobe até 6"},{"type":"list","items":["9 O dispositivo mergulha até 6 metros em um líquido."]},{"type":"paragraph","text":"metros em um líquido."},{"type":"list","items":["10 A escotilha traseira se destranca e abre."]},{"type":"paragraph","text":"A escotilha traseira se fecha e tranca."}]},{"id":"guia-do-mestre-item-magico-elixir-de-saude","nome":"Elixir de Saúde","categoria":"Item mágico","tipo":"Poção","fonte":"Guia do Mestre","pagina_livro":177,"pagina_pdf":178,"referencia":"177 (PDF: 178)","preco":null,"peso":null,"raridade":"rara","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Quando você bebe esta poção, ela cura qualquer doença que esteja afligindo você e remove as condições cego, surdo, paralisado e envenenado. O líquido vermelho claro tem pequenas bolhas de luz nele.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Poção, rara","descricao_blocos":[{"type":"paragraph","text":"Quando você bebe esta poção, ela cura qualquer doença que esteja afligindo você e remove as condições cego, surdo, paralisado e envenenado. O líquido vermelho claro tem pequenas bolhas de luz nele."}]},{"id":"guia-do-mestre-item-magico-elmo-brilhante","nome":"Elmo Brilhante","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":177,"pagina_pdf":178,"referencia":"177 (PDF: 178)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este elmo estonteante é ornado com 1d10 diamantes, 2d10 rubis, 3d10 opalas de fogo e 4d10 opalas. Qualquer gema removida do elmo se desfaz em pó. Quando todas as gemas forem removidas ou destruídas, o elmo perde sua mágica. Você recebe os seguintes benefícios enquanto usá-lo: Você pode usar uma ação para conjurar uma das seguintes magias (CD de resistência 18), usando uma das gemas do elmo do tipo específico como componente: luz do dia (opala), bola de fogo (opala de fogo), rajada prismática (diamante) ou muralha de fogo (rubi). A gema é destruída quando a magia é conjurada e desaparece do elmo. Contanto que ele tenha pelo menos um diamante, o elmo emite penumbra num raio de 9 metros quando pelo menos um morto-vivo estiver na área. Qualquer morto-vivo que começa seu turno na área sofre 1d6 de dano radiante. Contanto que o elmo tenha pelo menos um rubi, você tem resistência a fogo. Contanto que o elmo tenha pelo menos uma opala de fogo, você pode usar uma ação para falar uma palavra de comando para fazer uma arma que você esteja empunhando explodir em chamas. As chamas emitem luz plena num raio de 3 metros e penumbra por 3 metros adicionais. As chamas são inofensivas a você e sua arma. Quando você atingir um ataque usando a arma flamejante, o alvo sofre 1d6 de dano de fogo extra. As chamas duram até você usar uma ação bônus para falar a palavra de comando novamente ou até você largar ou embainhar a arma. Role um d20 se você estiver usando o elmo e sofrer dano de fogo como resultado de fracassar num teste de resistência contra uma magia. Num resultado de 1, o elmo emite raios de luz de suas gemas remanescentes. Cada criatura a até 18 metros do elmo, fora você, deve ser bem sucedida num teste de resistência de Destreza CD 17 ou será atingida pelos raios, sofrendo dano radiante igual ao número de gemas no elmo. O elmo e suas gemas, então, são destruídos.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, muito raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este elmo estonteante é ornado com 1d10 diamantes, 2d10 rubis, 3d10 opalas de fogo e 4d10 opalas. Qualquer gema removida do elmo se desfaz em pó. Quando todas as gemas forem removidas ou destruídas, o elmo perde sua mágica."},{"type":"paragraph","text":"Você recebe os seguintes benefícios enquanto usá-lo:"},{"type":"list","items":["Você pode usar uma ação para conjurar uma das seguintes magias (CD de resistência 18), usando uma das gemas do elmo do tipo específico como componente: luz do dia (opala), bola de fogo (opala de fogo), rajada prismática (diamante) ou muralha de fogo (rubi). A gema é destruída quando a magia é conjurada e desaparece do elmo.","Contanto que ele tenha pelo menos um diamante, o elmo emite penumbra num raio de 9 metros quando pelo menos um morto-vivo estiver na área. Qualquer morto-vivo que começa seu turno na área sofre 1d6 de dano radiante.","Contanto que o elmo tenha pelo menos um rubi, você tem resistência a fogo.","Contanto que o elmo tenha pelo menos uma opala de fogo, você pode usar uma ação para falar uma palavra de comando para fazer uma arma que você esteja empunhando explodir em chamas. As chamas emitem luz plena num raio de 3 metros e penumbra por 3 metros adicionais. As chamas são inofensivas a você e sua arma. Quando você atingir um ataque usando a arma flamejante, o alvo sofre 1d6 de dano de fogo extra. As chamas duram até você usar uma ação bônus para falar a palavra de comando novamente ou até você largar ou embainhar a arma."]},{"type":"paragraph","text":"Role um d20 se você estiver usando o elmo e sofrer dano de fogo como resultado de fracassar num teste de resistência contra uma magia. Num resultado de 1, o elmo emite raios de luz de suas gemas remanescentes. Cada criatura a até 18 metros do elmo, fora você, deve ser bem sucedida num teste de resistência de Destreza CD 17 ou será atingida pelos raios, sofrendo dano radiante igual ao número de gemas no elmo. O elmo e suas gemas, então, são destruídos."}]},{"id":"guia-do-mestre-item-magico-elmo-de-compreencao-de-idiomas","nome":"Elmo de Compreenção de Idiomas","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":177,"pagina_pdf":178,"referencia":"177 (PDF: 178)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este elmo, você pode usar uma ação para conjurar a magia compreender idiomas através dele, à vontade.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este elmo, você pode usar uma ação para conjurar a magia compreender idiomas através dele, à vontade."}]},{"id":"guia-do-mestre-item-magico-elmo-de-telepatia","nome":"Elmo de Telepatia","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":177,"pagina_pdf":178,"referencia":"177 (PDF: 178)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver usando este elmo, você pode usar uma ação para conjurar a magia detectar pensamentos (CD de resistência 13) através dele. Enquanto você mantiver a concentração na magia, você pode usar uma ação bônus para enviar uma mensagem telepática para a criatura em que você está se focando. Ela pode responder-usando uma ação bônus para fazê-lo-enquanto seu foco nela continuar. Enquanto mantiver o foco em uma criatura com detectar pensamentos, você pode usar uma ação para conjurar a magia sugestão (CD de resistência 13) através do elmo na criatura. Uma vez usada, a propriedade de sugestão não poderá ser usada novamente até o próximo amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, incomum (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver usando este elmo, você pode usar uma ação para conjurar a magia detectar pensamentos (CD de resistência 13) através dele. Enquanto você mantiver a concentração na magia, você pode usar uma ação bônus para enviar uma mensagem telepática para a criatura em que você está se focando. Ela pode responder-usando uma ação bônus para fazê-lo-enquanto seu foco nela continuar."},{"type":"paragraph","text":"Enquanto mantiver o foco em uma criatura com detectar pensamentos, você pode usar uma ação para conjurar a magia sugestão (CD de resistência 13) através do elmo na criatura. Uma vez usada, a propriedade de sugestão não poderá ser usada novamente até o próximo amanhecer."}]},{"id":"guia-do-mestre-item-magico-elmo-de-teletransporte","nome":"Elmo de Teletransporte","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":177,"pagina_pdf":178,"referencia":"177 (PDF: 178)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Este elmo possui 3 cargas. Enquanto estiver usando-o, você pode usar uma ação para gastar uma carga e conjurar a magia teletransporte através dele. O elmo recupera 1d3 das cargas gastas diariamente ao amanhecer.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Este elmo possui 3 cargas. Enquanto estiver usando-o, você pode usar uma ação para gastar uma carga e conjurar a magia teletransporte através dele. O elmo recupera 1d3 das cargas gastas diariamente ao amanhecer."}]},{"id":"guia-do-mestre-item-magico-escaravelho-de-protecao","nome":"Escaravelho de Proteção","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":179,"pagina_pdf":179,"referencia":"179 (PDF: 179)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Se você segurar este medalhão em formato de besouro em sua mão por 1 rodada, uma inscrição aparece em sua superfície e revela sua natureza mágica. Ele concede dois benefícios enquanto estiver em sua posse: Você tem vantagem em testes de resistência contra magias. O escaravelho tem 12 cargas. Se você falhar em um teste de resistência contra uma magia necromântica ou um efeito nocivo originado de uma criatura morta-viva, você pode usar sua reação para gastar 1 carga e tornar o fracasso em um sucesso. O escaravelho se desfaz em pó e é destruído quando sua última carga for gasta.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Item maravilhoso, lendário (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Se você segurar este medalhão em formato de besouro em sua mão por 1 rodada, uma inscrição aparece em sua superfície e revela sua natureza mágica. Ele concede dois benefícios enquanto estiver em sua posse:"},{"type":"list","items":["Você tem vantagem em testes de resistência contra magias.","O escaravelho tem 12 cargas. Se você falhar em um teste de resistência contra uma magia necromântica ou um efeito nocivo originado de uma criatura morta-viva, você pode usar sua reação para gastar 1 carga e tornar o fracasso em um sucesso. O escaravelho se desfaz em pó e é destruído quando sua última carga for gasta."]}]},{"id":"guia-do-mestre-item-magico-escudo-1-2-ou-3","nome":"Escudo +1, +2 Ou +3","categoria":"Item mágico","tipo":"Armadura (escudo)","fonte":"Guia do Mestre","pagina_livro":179,"pagina_pdf":179,"referencia":"179 (PDF: 179)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Enquanto estiver segurando este escudo, você tem um bônus na CA determinado por sua raridade. Este bônus é adicionado ao bônus normal do escudo na CA.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Armadura (escudo), incomum (+1), raro (+2) ou muito raro (+3)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver segurando este escudo, você tem um bônus na CA determinado por sua raridade. Este bônus é adicionado ao bônus normal do escudo na CA."}]},{"id":"guia-do-mestre-item-magico-escudo-animado","nome":"Escudo Animado","categoria":"Item mágico","tipo":"Armadura (escudo)","fonte":"Guia do Mestre","pagina_livro":179,"pagina_pdf":179,"referencia":"179 (PDF: 179)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver segurando este escudo, você pode falar sua palavra de comando, com uma ação bônus, para fazê-lo se animar. O escudo salta no ar e flutua no seu espaço para proteger você como se você o estivesse usando, deixando suas mãos livres. O escudo permanece animado por 1 minuto, até você usar uma ação bônus para terminar este efeito ou até você ficar incapacitado ou morrer, nesse momento o escudo cai no chão ou em sua mão, caso você tenha uma mão livre.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Armadura (escudo), muito raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver segurando este escudo, você pode falar sua palavra de comando, com uma ação bônus, para fazê-lo se animar. O escudo salta no ar e flutua no seu espaço para proteger você como se você o estivesse usando, deixando suas mãos livres. O escudo permanece animado por 1 minuto, até você usar uma ação bônus para terminar este efeito ou até você ficar incapacitado ou morrer, nesse momento o escudo cai no chão ou em sua mão, caso você tenha uma mão livre."}]},{"id":"guia-do-mestre-item-magico-escudo-apanhador-de-flechas","nome":"Escudo Apanhador de Flechas","categoria":"Item mágico","tipo":"Armadura (escudo)","fonte":"Guia do Mestre","pagina_livro":179,"pagina_pdf":179,"referencia":"179 (PDF: 179)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Você recebe +2 de bônus na CA contra ataques a distância enquanto estiver empunhando este escudo. Esse bônus é adicionado ao bônus normal do escudo na CA. Além disso, toda vez que um atacante fizer um ataque a distância contra um alvo a até 1,5 metro de você, você pode usar sua reação para se tornar o alvo do ataque, no lugar.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Armadura (escudo), raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Você recebe +2 de bônus na CA contra ataques a distância enquanto estiver empunhando este escudo. Esse bônus é adicionado ao bônus normal do escudo na CA. Além disso, toda vez que um atacante fizer um ataque a distância contra um alvo a até 1,5 metro de você, você pode usar sua reação para se tornar o alvo do ataque, no lugar."}]},{"id":"guia-do-mestre-item-magico-escudo-de-atracao-de-projeteis","nome":"Escudo de Atração de Projéteis","categoria":"Item mágico","tipo":"Armadura (escudo)","fonte":"Guia do Mestre","pagina_livro":179,"pagina_pdf":179,"referencia":"179 (PDF: 179)","preco":null,"peso":null,"raridade":"raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver segurando este escudo, você tem resistência a dano de ataques à distância com armas. Maldição. Este escudo é amaldiçoado. Se sintonizar com ele amaldiçoa você até você ser alvo da magia remover maldição ou mágica similar. Remover o escudo fracassa em terminar a maldição em você. Sempre que um ataque à distância com arma for feito contra um alvo a até 3 metros de você, a maldição faz com que você seja o alvo, no lugar.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Armadura (escudo), raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver segurando este escudo, você tem resistência a dano de ataques à distância com armas."},{"type":"paragraph","text":"Maldição. Este escudo é amaldiçoado. Se sintonizar com ele amaldiçoa você até você ser alvo da magia remover maldição ou mágica similar. Remover o escudo fracassa em terminar a maldição em você. Sempre que um ataque à distância com arma for feito contra um alvo a até 3 metros de você, a maldição faz com que você seja o alvo, no lugar."}]},{"id":"guia-do-mestre-item-magico-escudo-de-protecao-contra-magia","nome":"Escudo de Proteção contra Magia","categoria":"Item mágico","tipo":"Armadura (escudo)","fonte":"Guia do Mestre","pagina_livro":179,"pagina_pdf":179,"referencia":"179 (PDF: 179)","preco":null,"peso":null,"raridade":"muito raro","sintonizacao":true,"propriedades":[],"dano":null,"descricao":"Enquanto estiver segurando este escudo, você tem vantagem em teste de resistência contra magias e outros efeitos mágicos, e ataques com magia tem desvantagem contra você.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Armadura (escudo), muito raro (requer sintonização)","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver segurando este escudo, você tem vantagem em teste de resistência contra magias e outros efeitos mágicos, e ataques com magia tem desvantagem contra você."}]},{"id":"guia-do-mestre-item-magico-escudo-sentinela","nome":"Escudo Sentinela","categoria":"Item mágico","tipo":"Armadura (escudo)","fonte":"Guia do Mestre","pagina_livro":179,"pagina_pdf":179,"referencia":"179 (PDF: 179)","preco":null,"peso":null,"raridade":"incomum","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Enquanto estiver segurando este escudo, você tem vantagem nas jogada de iniciativa e testes de Sabedoria (Percepção). O escudo é brasonado com o símbolo de um olho.","tabela":null,"proficiência_requerida":null,"classes":["Bárbaro","Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Guerreiro","Ladino","Mago","Monge","Paladino","Patrulheiro"],"metadados":"Armadura (escudo), incomum","descricao_blocos":[{"type":"paragraph","text":"Enquanto estiver segurando este escudo, você tem vantagem nas jogada de iniciativa e testes de Sabedoria (Percepção). O escudo é brasonado com o símbolo de um olho."}]},{"id":"guia-do-mestre-item-magico-esfera-de-aniquilacao","nome":"Esfera de Aniquilação","categoria":"Item mágico","tipo":"Item maravilhoso","fonte":"Guia do Mestre","pagina_livro":179,"pagina_pdf":179,"referencia":"179 (PDF: 179)","preco":null,"peso":null,"raridade":"lendário","sintonizacao":false,"propriedades":[],"dano":null,"descricao":"Esta esfera negra de 60 centímetros de diâmetro é um buraco no multiverso, flutuando no espaço e estabilizada por um campo mágico que a envolve. A esfera oblitera toda matéria que ela atravessa e toda matéria que passa através dela. Artefatos são a exceção. A não ser que um artefato seja suscetível ao dano da esfera de aniquilação, ele passa através da esfera ileso. Qualquer outra coisa que toque a esfera, mas não seja totalmente engolfado e obliterado por ela, sofre 4d10 de dano de energia. A esfera fica parada até alguém controla-la. Se você estiver a até 18 metros de uma esfera descontrolada, você pode usar uma ação para realizar um teste de Inteligência (Arcanismo) CD 25. Com um sucesso, a esfera levita em uma direção de sua escolha, até uma quantidade de metros igual a 1,5 x seu modificador de Inteligência (mínimo 1,5 metro). Se fracassar, a esfera se move 3 metros em sua direção. Uma criatura cuja esfera entre no espaço deve ser bem sucedida num teste de resistência de Destreza CD 13 ou seja tocado por ela, sofrendo 4d6 de dano de energia. Se você
