<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grimório — Magias D&D 5e</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d0b0e;
  --bg2:#1a1520;
  --bg3:#241e2c;
  --fg:#e8dcc8;
  --fg2:#a89b8a;
  --accent:#d4a44a;
  --accent2:#e8c06a;
  --card:#1c1724;
  --border:#3a2f48;
  --cantrip:#8e44ad;
  --shadow:0 2px 12px rgba(0,0,0,0.5);
  --sidebar-w:260px;
  --header-h:48px;
}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--fg);
  font-family:'Lora',Georgia,serif;
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
}

/* === HEADER === */
header{
  background:linear-gradient(180deg,#1a0f25 0%,#0d0b0e 100%);
  border-bottom:2px solid var(--border);
  height:var(--header-h);
  display:flex;
  align-items:center;
  padding:0 1rem;
  position:sticky;
  top:0;
  z-index:200;
  gap:0.5rem;
}

#menu-toggle{
  background:none;
  border:1px solid var(--border);
  color:var(--accent);
  font-size:1.3rem;
  cursor:pointer;
  padding:0.2rem 0.5rem;
  border-radius:4px;
  line-height:1;
  transition:background 0.2s,border-color 0.2s;
  flex-shrink:0;
}
#menu-toggle:hover{background:var(--bg3);border-color:var(--accent)}

header h1{
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:1.1rem;
  color:var(--accent);
  letter-spacing:0.12em;
  text-transform:uppercase;
  text-shadow:0 0 20px rgba(212,164,74,0.3);
  white-space:nowrap;
  flex-shrink:0;
}
header h1 .icon{margin-right:0.2em}

#search-box{
  flex:1;
  max-width:420px;
  margin-left:auto;
  padding:0.35rem 0.8rem;
  font-size:0.9rem;
  font-family:'Lora',serif;
  background:var(--bg2);
  color:var(--fg);
  border:1px solid var(--border);
  border-radius:6px;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
#search-box:focus{
  border-color:var(--accent);
  box-shadow:0 0 8px rgba(212,164,74,0.25);
}
#search-box::placeholder{color:var(--fg2);opacity:0.6}

/* === SIDEBAR === */
#sidebar{
  position:fixed;
  top:var(--header-h);
  left:0;
  bottom:0;
  width:var(--sidebar-w);
  background:var(--bg2);
  border-right:2px solid var(--border);
  overflow-y:auto;
  z-index:150;
  transform:translateX(-100%);
  transition:transform 0.3s ease;
  padding:0.8rem;
}
#sidebar.open{transform:translateX(0)}

#sidebar-overlay{
  display:none;
  position:fixed;
  inset:0;
  top:var(--header-h);
  background:rgba(0,0,0,0.5);
  z-index:140;
}

.sidebar-section{margin-bottom:1rem}
.sidebar-section:last-child{margin-bottom:0}

.sidebar-title{
  font-family:'Cinzel',serif;
  font-size:0.7rem;
  color:var(--accent);
  text-transform:uppercase;
  letter-spacing:0.12em;
  padding-bottom:0.3rem;
  border-bottom:1px solid var(--border);
  margin-bottom:0.4rem;
}

.sidebar-buttons{
  display:flex;
  flex-wrap:wrap;
  gap:0.3rem;
}

.filter-btn{
  padding:0.25rem 0.55rem;
  font-size:0.75rem;
  font-family:'Lora',serif;
  background:var(--bg3);
  color:var(--fg2);
  border:1px solid var(--border);
  border-radius:4px;
  cursor:pointer;
  transition:all 0.2s;
  white-space:nowrap;
}
.filter-btn:hover{background:var(--border);color:var(--fg)}
.filter-btn.active{
  background:var(--accent);
  color:#1a0f25;
  border-color:var(--accent);
  font-weight:700;
}
.filter-btn.active-trick{
  background:var(--cantrip);
  color:#fff;
  border-color:var(--cantrip);
  font-weight:700;
}

#sidebar-clear{
  width:100%;
  margin-top:0.5rem;
  padding:0.35rem;
  font-family:'Cinzel',serif;
  font-size:0.7rem;
  text-transform:uppercase;
  letter-spacing:0.08em;
  background:var(--bg);
  color:var(--fg2);
  border:1px solid var(--border);
  border-radius:4px;
  cursor:pointer;
  transition:all 0.2s;
}
#sidebar-clear:hover{color:var(--fg);border-color:var(--accent)}

/* === MAIN CONTENT === */
#main-wrap{
  transition:margin-left 0.3s ease;
  min-height:calc(100vh - var(--header-h));
  display:flex;
  flex-direction:column;
}
body.sidebar-open #main-wrap{margin-left:var(--sidebar-w)}

#stats{
  font-size:0.8rem;
  color:var(--fg2);
  padding:0.5rem 1.5rem 0;
  text-align:center;
}

#spell-list{
  flex:1;
  max-width:1100px;
  width:100%;
  margin:0 auto;
  padding:0.5rem 1.5rem 3rem;
  display:flex;
  flex-direction:column;
  gap:0.4rem;
}

/* === SPELL CARDS === */
.spell-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s;
}
.spell-card:hover{
  border-color:var(--accent);
  box-shadow:var(--shadow);
}
.spell-card.cantrip{border-left:3px solid var(--cantrip)}
.spell-card.leveled{border-left:3px solid var(--accent)}

.spell-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0.65rem 1rem;
  gap:0.6rem;
}
.spell-name{
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:1rem;
  color:var(--fg);
  flex:1;
}
.spell-meta{
  display:flex;
  gap:0.35rem;
  flex-shrink:0;
  flex-wrap:wrap;
  justify-content:flex-end;
  align-items:center;
}

.badge{
  padding:0.1rem 0.4rem;
  font-size:0.65rem;
  font-family:'Cinzel',serif;
  font-weight:700;
  border-radius:3px;
  text-transform:uppercase;
  letter-spacing:0.05em;
}
.badge-level{
  background:rgba(212,164,74,0.15);
  color:var(--accent2);
  border:1px solid rgba(212,164,74,0.3);
}
.badge-cantrip{
  background:rgba(142,68,173,0.2);
  color:#bb6bd9;
  border:1px solid rgba(142,68,173,0.3);
}
.badge-school{
  background:rgba(52,152,219,0.12);
  color:#5dade2;
  border:1px solid rgba(52,152,219,0.25);
}

.spell-detail{
  display:none;
  padding:0 1rem 1rem;
  border-top:1px solid var(--border);
  margin-top:0;
}
.spell-card.open .spell-detail{
  display:block;
  padding-top:0.7rem;
}

.detail-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0.4rem 1.5rem;
  margin-bottom:0.8rem;
  font-size:0.88rem;
}
.detail-label{
  color:var(--fg2);
  font-size:0.72rem;
  text-transform:uppercase;
  letter-spacing:0.08em;
}
.detail-value{color:var(--fg)}

.spell-desc{
  font-size:0.92rem;
  color:var(--fg);
  line-height:1.8;
  white-space:normal;
  margin-bottom:0.6rem;
  padding-top:0.5rem;
  border-top:1px dashed var(--border);
}

.spell-ref{
  font-size:0.75rem;
  color:var(--fg2);
  text-align:right;
}
.spell-ref span{
  background:var(--bg3);
  padding:0.15rem 0.5rem;
  border-radius:3px;
  border:1px solid var(--border);
}

.spell-classes{
  display:flex;
  gap:0.3rem;
  flex-wrap:wrap;
  margin-top:0.4rem;
  margin-bottom:0.2rem;
}
.class-tag{
  font-size:0.68rem;
  padding:0.12rem 0.4rem;
  border-radius:3px;
  background:var(--bg2);
  color:var(--fg2);
  border:1px solid var(--border);
}
.class-tag.tag-Bardo{border-color:#8e44ad;color:#bb6bd9}
.class-tag.tag-Bruxo{border-color:#c0392b;color:#e74c3c}
.class-tag.tag-Clérigo{border-color:#f1c40f;color:#f7dc6f}
.class-tag.tag-Druida{border-color:#27ae60;color:#58d68d}
.class-tag.tag-Feiticeiro{border-color:#e67e22;color:#f0b27a}
.class-tag.tag-Mago{border-color:#3498db;color:#85c1e9}
.class-tag.tag-Paladino{border-color:#d4a44a;color:#e8c06a}
.class-tag.tag-Patrulheiro{border-color:#1abc9c;color:#76d7c4}

.expand-arrow{
  transition:transform 0.2s;
  color:var(--fg2);
  font-size:0.8rem;
}
.spell-card.open .expand-arrow{transform:rotate(90deg)}

#no-results{
  display:none;
  text-align:center;
  padding:3rem 1rem;
  color:var(--fg2);
}
#no-results .icon{font-size:3rem;margin-bottom:0.5rem}

footer{
  text-align:center;
  padding:1.5rem;
  font-size:0.75rem;
  color:var(--fg2);
  opacity:0.5;
  border-top:1px solid var(--border);
}

.hidden{display:none!important}

/* === RESPONSIVE === */
@media(max-width:768px){
  #sidebar{width:280px}
  body.sidebar-open #main-wrap{margin-left:0}
  body.sidebar-open #sidebar-overlay{display:block}
  header h1{font-size:0.9rem;letter-spacing:0.08em}
  #search-box{font-size:0.85rem;max-width:none}
  #spell-list{padding:0.5rem 0.8rem 2rem}
  .spell-header{padding:0.5rem 0.7rem}
  .spell-detail{padding:0 0.7rem 0.7rem}
  .detail-grid{grid-template-columns:1fr}
  .spell-desc{font-size:0.85rem;line-height:1.7}
  .spell-list li{padding-left:1.6rem}
  .spell-list li::before{font-size:0.5rem}
}

@media(min-width:769px){
  .spell-card:hover{transform:translateX(2px)}
}

@media(min-width:1200px){
  #spell-list{max-width:1200px;padding:0.5rem 2.5rem 3rem}
}

.spell-desc p{margin-bottom:0.5rem}
.spell-desc p:last-child{margin-bottom:0}
.spell-list{list-style:none;padding:0;margin:0.5rem 0}
.spell-list li{position:relative;padding-left:1.5rem;margin-bottom:0.3rem;font-size:0.9rem;line-height:1.7}
.spell-list li::before{content:'◆';position:absolute;left:0;color:var(--accent);font-size:0.55rem;top:0.4em}
.spell-level-up{background:rgba(212,164,74,0.08);border-left:3px solid var(--accent);padding:0.5rem 0.8rem;margin:0.5rem 0;border-radius:0 4px 4px 0;font-size:0.9rem;line-height:1.7}
.spell-level-up strong{color:var(--accent2)}
</style>
</head>
<body>

<header>
  <button id="menu-toggle">&#x2630;</button>
  <h1><span class="icon">&#x1F52E;</span> Grimório</h1>
  <input type="text" id="search-box" placeholder="Buscar magia por nome..." autocomplete="off" spellcheck="false">
</header>

<div id="sidebar-overlay"></div>
<nav id="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-title">Nível</div>
    <div class="sidebar-buttons" id="nivel-btns"></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-title">Escola</div>
    <div class="sidebar-buttons" id="escola-btns"></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-title">Classe</div>
    <div class="sidebar-buttons" id="classe-btns"></div>
  </div>
  <button id="sidebar-clear">Limpar Filtros</button>
</nav>

<div id="main-wrap">
  <div id="stats"></div>
  <div id="spell-list"></div>
  <div id="no-results">
    <div class="icon">&#x1F50D;</div>
    <p>Nenhuma magia encontrada.</p>
  </div>
  <footer>Grimório D&D 5e &mdash; Consulta de Magias em Português Brasileiro</footer>
</div>

<script>
const SPELLS = [{"n":"AMIZADE ANIMAL","nv":"1° nível","e":"encantamento","tc":"1 ação","al":"9 metros","co":"V, S, M (um punhado de comida)","du":"24 horas","d":"Essa magia deixa você convencer uma besta que você não \nquer prejudicar. Escolha uma besta que você possa ver \ndentro do alcance. Ela deve ver e ouvir você. Se a \nInteligência da besta for 4 ou maior, a magia falha. Do \ncontrário, a besta deve ser bem sucedida num teste de \nresistência de Sabedoria ou ficará enfeitiçada por você \npela duração da magia. Se você ou um dos seus \ncompanheiros ferir o alvo, a magia termina. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, você pode afetar uma besta adicional para cada \nnível do espaço acima do 1°.","pr":"215 (PDF: 213)","cl":["Bardo","Bruxo","Druida","Feiticeiro","Mago","Patrulheiro"]},{"n":"AMPLIAR PLANTAS","nv":"3° nível","e":"transmutação","tc":"1 ação ou 8 horas","al":"45 metros","co":"V, S","du":"Instantânea","d":"Essa magia canaliza vitalidade nas plantas dentro de \numa área especifica. Existem dois usos possíveis para \nessa magia, concedendo ou benefícios imediatos ou a \nlongo prazo. \nSe você conjurar essa magia usando 1 ação, escolha \num ponto dentro do alcance. Todas as plantas normais \nnum raio de 30 metros centrado no ponto, tornam-se \nespessas e carregadas. Uma criatura se movendo na área \ndeve gastar 6 metros de movimento para cada 1,5 metro \nque se mover. \nVocê pode excluir uma ou mais áreas de qualquer \ntamanho, dentro da área da magia, para não ser afetada. \nSe você conjurar essa magia ao longo de 8 horas, você \nfertiliza a terra. Todas as plantas num raio de 800 \nmetros, centrado no ponto dentro do alcance, ficam \nenriquecidas por 1 ano. As plantas fornecerão o dobro da \nquantidade normal de comida quando colhidas.","pr":"215 (PDF: 213)","cl":["Bardo","Druida","Patrulheiro"]},{"n":"ÂNCORA PLANAR","nv":"5° nível","e":"abjuração","tc":"1 hora","al":"18 metros","co":"V, S, M (uma joia valendo, no mínimo,","du":"24 horas","d":"Com essa magia, você tenta obrigar um celestial, \ncorruptor, elemental ou fada a servi-lo. A criatura deve \nestar dentro do alcance durante toda a conjuração da \nmagia. (Tipicamente, a criatura, primeiramente, é \ninvocada dentro de um círculo mágico invertido para \nmantê-la presa enquanto a magia é conjurada.) Ao \ncompletar a conjuração, o alvo deve realizar um teste de \nresistência de Carisma. Se falhar na resistência, ela é \nobrigada a servir você pela duração. Se a criatura foi \ninvocada ou criada por outra magia, a duração da magia é \nestendida para se equiparar a dessa magia. \nUma criatura obrigada deve seguir suas instruções da \nmelhor forma que puder. Você poderia comandar a \ncriatura a acompanhar você em uma aventura, a guardar \num local ou a enviar uma mensagem. A criatura obedece \nao pé da letra suas instruções, mas se a criatura for hostil \na você, ela se esforçará para distorcer suas palavras para \natingir seus próprios objetivos. Se a criatura atender suas \ninstruções completamente antes da magia acabar, ela \nviajará até você para relatar esse fato se você estiver no \nmesmo plano de existência. Se você estiver em um plano \nde existência diferente, ela retornará para o lugar onde \nvocê a contatou e permanecerá lá até a magia acabar. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de nível superior, a \nduração aumenta para 10 dias com um espaço de 6° nível, \npara 30 dias com um espaço de 7° nível, para 180 dias \ncom um espaço de 8° nível e para um ano com um espaço \nde magia de 9° nível.","pr":"215 (PDF: 213)","cl":["Bardo","Clérigo","Druida","Mago"]},{"n":"ANDAR NA ÁGUA","nv":"3° nível","e":"transmutação","tc":"1 ação","al":"9 metros","co":"V, S, M (uma rolha)","du":"1 hora","d":"Essa magia concede a habilidade de se mover através de \nqualquer superfície líquida – como água, ácido, lama, \nneve, arreia movediça ou lava – como se ela fosse chão \nsólido inofensivo (as criaturas atravessando lava \nderretida ainda podem sofrer dano do calor). Até dez \ncriaturas voluntárias que você possa ver, dentro do \nalcance, ganham essa habilidade pela duração. \nSe você afetar uma criatura submersa em um líquido, \na magia ergue o alvo para a superfície do líquido a uma \ntaxa de 18 metros por rodada.","pr":"215 (PDF: 213)","cl":[]},{"n":"ANIMAR MORTOS","nv":"3° nível","e":"necromancia","tc":"1 minuto","al":"3 metros","co":"V, S, M (uma gota de sangue, um pedaço","du":"Instantânea","d":"Essa magia cria um servo morto-vivo. Escolha uma pilha \nde ossos ou um corpo de um humanoide Médio ou \nPequeno dentro do alcance. Sua magia imbui o alvo com \numa imitação corrompida de vida, erguendo-o como uma \ncriatura morta-viva. O alvo se torna um esqueleto, se você \nescolheu ossos, ou um zumbi, se você escolheu um corpo (o \nMestre tem as estatísticas de jogo da criatura). \nEm cada um dos seus turnos, você pode usar uma ação \nbônus para comandar mentalmente qualquer criatura que \nvocê criou com essa magia, se a criatura estiver a até 18 \nmetros de você (se você controla diversas criaturas, você \npode comandar qualquer uma ou todas elas ao mesmo \ntempo, emitindo o mesmo comando para cada uma). Você \ndecide qual ação a criatura irá fazer e para onde ela irá se \nmover durante o próximo turno dela, ou você pode emitir \num comando geral, como para guardar uma câmara ou \ncorredor especifico. Se você não der nenhum comando, as \ncriaturas apenas se defenderão contra criaturas hostis. \nUma vez que receba uma ordem, a criatura continuará a \nsegui-la até a tarefa estar concluída. \nA criatura fica sob seu controle por 24 horas, depois \ndisso ela para de obedecer aos seus comandos. Para \n218 \nmanter o controle da criatura por mais 24 horas, você \ndeve conjurar essa magia na criatura novamente, antes \ndas 24 horas atuais terminarem. Esse uso da magia \nrecupera seu controle sobre até quatro criaturas que você \ntenha animado com essa magia, ao invés de animar uma \nnova. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 4° nível ou \nsuperior, você pode animar ou recuperar o controle de \nduas criaturas mortas-vivas para cada nível do espaço \nacima do 3°. Cada uma dessas criaturas deve vir de um \ncorpo ou pilha de ossos diferente.","pr":"215 (PDF: 213)","cl":["Clérigo","Mago"]},{"n":"ANIMAR OBJETOS","nv":"5° nível","e":"transmutação","tc":"1 ação","al":"36 metros","co":"V, S","du":"Concentração, até 1 minuto","d":"Objetos ganham vida ao seu comando. Escolha até dez \nobjetos não-mágicos dentro do alcance, que não estejam \nsendo vestidos ou carregados. Alvos Médios contam como \ndois objetos, alvos Grandes contam como quatro objetos e \nalvos Enormes contam como oito objetos. Você não pode \nanimar um objeto maior que Enorme. Cada alvo se anima \ne torna-se uma criatura sob seu controle até o final da \nmagia ou até ser reduzido a 0 pontos de vida. \nCom uma ação bônus, você pode comandar \nmentalmente qualquer criatura que você criar com essa \nmagia se a criatura estiver a até 150 metros de você (se \nvocê controla várias criaturas, você pode comandar \nqualquer ou todas elas ao mesmo tempo, emitindo o \nmesmo comando para cada uma). Você decide qual ação a \ncriatura irá fazer e para onde ela irá se mover durante o \npróximo turno dela, ou você pode emitir um comando \ngeral, como para guardar uma câmara ou corredor \nespecifico. Se você não der nenhum comando, as criaturas \napenas se defenderão contra criaturas hostis. Uma vez \nque receba uma ordem, a criatura continuará a segui-la \naté a tarefa estar concluída. \nESTATÍSTICAS DE OBJETO ANIMADO \nTamanho \nPV \nCA \nAtaque \nFor \nDes \nMiúdo \n20 \n18 \n+8 para atingir, 1d4 + 4 dano \n4 \n18 \nPequeno \n25 \n16 \n+6 para atingir, 1d8 + 2 dano \n6 \n14 \nMédio \n40 \n13 \n+5 para atingir, 2d6 + 1 dano \n10 \n12 \nGrande \n50 \n10 \n+6 para atingir, 2d10 + 2 dano \n14 \n10 \nEnorme \n80 \n10 \n+8 para atingir, 2d12 + 4 dano \n18 \n6 \nUm objeto animado é um constructo com CA, pontos \nde vida, ataques, Força e Destreza determinados pelo seu \ntamanho. Sua Constituição é 10 e sua Inteligência e \nSabedoria são 3 e seu Carisma é 1. Seu deslocamento é 9 \nmetros; se o objeto não tiver pernas ou outros apêndices \nque ele possa usar para locomoção, ao invés, ele terá \ndeslocamento de voo 9 metros e poderá planar. Se o objeto \nestiver firmemente preso a uma superfície ou objeto \nmaior, como uma corrente presa a uma parede, seu \ndeslocamento será 0. Ele tem percepção às cegas num raio \nde 9 metros e é cego além dessa distância. Quando o \nobjeto animado cair a 0 pontos de vida, ele reverte a sua \nforma normal de objeto e qualquer dano restante é \ntransferido para sua forma de objeto original. \nSe você ordenar a um objeto que ataque, ele pode \nrealizar um único ataque corpo-a-corpo contra uma \ncriatura a até 1,5 metro dele. Ele realiza um ataque de \npancada com um bônus de ataque e dano de concussão \ndeterminado pelo seu tamanho. O Mestre pode definir que \num objeto especifico inflige dano cortante ou perfurante, \nbaseado na forma dele.  \nEm Níveis Superiores. Se você conjurar essa magia \nusando um espaço de magia de 6° nível ou superior, você \npode animar dois objetos adicionais para cada nível do \nespaço acima do 5°. \nANTIPATIA/SIMPATIA\n8° nível de encantamento \nTempo de Conjuração: 1 hora \nAlcance: 18 metros \nComponentes: V, S, M (ou um pedaço de alume \nembebido em vinagre para o efeito de antipatia, ou uma \ngota de mel para o efeito de simpatia) \nDuração: 10 dias \nEssa magia atrai ou repele as criaturas de sua escolha. \nVocê escolhe um alvo dentro do alcance, tanto um objeto \nou criatura Enorme ou menor ou uma área que não seja \nmaior que 60 metros cúbicos. Então, especifica um tipo de \ncriatura inteligente, como dragões vermelhos, goblins ou \nvampiros. Você envolve o alvo com uma aura que pode \natrair ou repelir as criaturas especificas pela duração. \nEscolha antipatia ou simpatia como efeito da aura.  \nAntipatia. O encantamento faz com que criaturas do \ntipo designado por você sintam-se fortemente impelidos \nem deixar a área e evitar o alvo. Quando uma dessas \ncriaturas puder ver o alvo ou ficar a 18 metros dele, a \ncriatura deve ser bem sucedida num teste de resistência \nde Sabedoria ou ficará amedrontada. A criatura \ncontinuará amedrontada enquanto puder ver o alvo ou \npermanecer a 18 metros dele. Enquanto estiver \namedrontada pelo alvo, a criatura deve usar seu \ndeslocamento para se mover para o local seguro mais \npróximo o qual ela não possa ver o alvo. Se a criatura se \nmover para mais de 18 metros do alvo e não puder vê-lo, a \ncriatura não estará mais amedrontada, mas ela ficará \namedrontada novamente se voltar a ver o alvo ou ficar a \n18 metros dele. \nSimpatia. O encantamento faz com que as criaturas \nespecificadas sintam-se fortemente impelidos a se \naproximar do alvo enquanto estiverem a 18 metros dele \nou puderem vê-lo. Quando uma dessas criaturas puder \nver o alvo ou ficar a 18 metros dele, a criatura deve ser \nbem sucedida num teste de resistência de Vontade ou \nusará seu deslocamento em cada um dos seus turnos para \nentrar na área ou se mover até o alcance do alvo. Quando \na criatura tiver feito isso, ela não poderá se afastar do \nalvo voluntariamente. \nSe o alvo causar dano ou ferir a criatura afetada de \nalguma forma, a criatura afetada pode realizar um novo \nteste de resistência de Sabedoria para terminar o efeito, \ncomo descrito abaixo. \nTerminando o Efeito. Se uma criatura afetada \nterminar se turno enquanto não estiver a até 18 metros \ndo alvo ou não for capaz de vê-lo, a criatura faz um teste \nde resistência de Sabedoria. Em um sucesso, a criatura \nnão estará mais afetada pelo alvo e reconhecerá o \nsentimento de repugnância ou atração como mágico. Além \ndisso, uma criatura afetada pela magia tem direito a \noutro teste de resistência de Sabedoria a cada 24 horas \nenquanto a magia durar. \nUma criatura que obtenha sucesso na resistência \ncontra esse efeito ficará imune a ele por 1 minuto, depois \ndesse tempo, ela pode ser afetada novamente. \n219","pr":"216 (PDF: 214)","cl":["Bardo","Feiticeiro","Mago"]},{"n":"APRIMORAR HABILIDADE","nv":"2° nível","e":"transmutação","tc":"1 ação","al":"Toque","co":"V, S, M (pelo ou penas de uma besta)","du":"Concentração, até 1 hora","d":"Você toca uma criatura e a agracia com aprimoramento \nmágico. Escolha um dos efeitos a seguir; o alvo ganha esse \nefeito até o fim da magia. \nAgilidade do Gato. O alvo tem vantagem em testes \nde Destreza. Ele também não sofre dano ao cair de 6 \nmetros ou menos, se não estiver incapacitado. \nEsperteza da Raposa. O alvo tem vantagem em \ntestes de Inteligência. \nEsplendor da Águia. O alvo tem vantagem em testes \nde Carisma.  \nForça do Touro. O alvo tem vantagem em testes de \nForça e sua capacidade de carga é dobrada. \nSabedoria da Coruja. O alvo tem vantagem em \ntestes de Sabedoria. \nVigor do Urso. O alvo tem vantagem em testes de \nConstituição. Ele também recebe 2d6 pontos de vida \ntemporários, que são perdidos quando a magia termina. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 3° nível ou \nsuperior, você pode afetar uma criatura adicional para \ncada nível do espaço acima do 2°.","pr":"217 (PDF: 215)","cl":["Bardo","Clérigo","Druida","Feiticeiro"]},{"n":"APRISIONAMENTO","nv":"9° nível","e":"abjuração","tc":"1 minuto","al":"9 metros","co":"V,","du":"Até ser dissipada","d":"Você cria um impedimento mágico para imobilizar uma \ncriatura que você possa ver, dentro do alcance. O alvo \ndeve ser bem sucedido num teste de resistência de \nSabedoria ou será vinculado à magia; se ele for bem \nsucedido, ele será imune a essa magia se você conjura-la \nnovamente. Enquanto estiver sob efeito dessa magia, a \ncriatura não precisará respirar, comer ou beber e não \nenvelhece. Magias de adivinhação não podem localizar ou \nperceber o alvo. \nQuando você conjura essa magia, você escolhe uma \ndas seguintes formas de aprisionamento. \nEnterrar. O alvo é sepultado bem fundo na terra em \numa esfera de energia mágica que é grande o suficiente \npara conter o alvo. Nada pode atravessar a esfera e \nnenhuma criatura pode se teletransportar ou usar viagem \nplantar para entrar ou sair dela. \nO componente especial para essa versão da magia é \num pequeno globo de mitral. \nAcorrentar. Pesadas correntes, firmemente presas ao \nsolo, matem o alvo no lugar. O alvo está impedido até a \nmagia acabar e ele não pode se mover ou ser movido por \nnenhum meio, até lá. \nO componente especial para essa versão da magia é \numa fina corrente de metal precioso. \nPrisão Cercada. A magia transporta o alvo para \ndentro de um pequeno semiplano que é protegido contra \nteletransporte e viagem planar. O semiplano pode ser um \nlabirinto, uma jaula, uma torre ou qualquer estrutura ou \nárea confinada similar, à sua escolha. \nO componente material especial para essa versão da \nmagia é uma representação em miniatura da prisão, feita \nde jade. \nContenção Reduzida. O alvo é reduzido até o \ntamanho de 30 centímetros e é aprisionado dentro de uma \ngema ou objeto similar. A luz pode passar através da \ngema normalmente (permitindo que o alvo veja o exterior \ne outras criaturas vejam o interior), mas nada mais pode \natravessa-la, mesmo por meios de teletransporte ou \nviagem planar. A gema não pode ser partida ou quebrada \nenquanto a magia estiver efetiva. \nO componente especial para essa versão da magia é \numa gema transparente grande, como um coríndon, \ndiamante ou rubi. \nTorpor. O alvo cai no sono e não pode ser acordado. \nO componente especial para essa versão da magia \nconsiste em ervas soporíferas raras.  \nTerminando a Magia. Durante a conjuração da \nmagia, em quaisquer das versões, você pode especificar \numa condição que irá fazer a magia terminar e libertará o \nalvo. A condição pode ser o quão especifica ou elaborada \nquanto você quiser, mas o Mestre deve concordar que a \ncondição é razoável e tem uma probabilidade de \nacontecer. As condições podem ser baseadas no nome, \nidentidade ou divindade da criatura mas, no mais, devem \nser baseadas em ações ou qualidades observáveis e não \nem valores intangíveis tais como nível, classe e pontos de \nvida. \nA magia dissipar magia pode terminar a magia \napenas se for conjurada como uma magia de 9° nível, \ntendo como alvo ou a prisão ou o componente especial \nusado para cria-la.  \nVocê pode usar um componente especial em particular \npara criar apenas uma prisão por vez. Se você conjurar \nessa magia novamente usando o mesmo componente, o \nalvo da primeira conjuração é, imediatamente, liberado do \nvínculo.","pr":"217 (PDF: 215)","cl":["Bruxo","Mago"]},{"n":"ARCA SECRETA DE LEOMUND","nv":"4° nível","e":"conjuração","tc":"1 ação","al":"Toque","co":"V, S, M (um baú requintado, de 90 cm","du":"Instantânea","d":"Você esconde um baú, e todo o seu conteúdo, no Plano \nEtéreo. Você deve tocar o baú e a réplica em miniatura \nque serve como componente material para a magia. O baú \npode acomodar até 3,6 metros cúbicos de matéria \ninorgânica (90 cm por 60 cm por 60 cm). \nEnquanto o baú permanecer no Plano Etéreo, você \npode usar uma ação e tocar a réplica para revocar o baú. \nEle aparece em um espaço desocupado no chão a 1,5 \nmetro de você. Você pode enviar o baú de volta ao Plano \nEtéreo usando uma ação e tocando tanto no baú quanto \nna réplica. \nApós 60 dias, existe 5 por cento de chance, cumulativa, \npor dia do efeito da magia terminar. Esse efeito termina \nse você conjurar essa magia novamente, se a pequena \nréplica do baú for destruída ou se você decidir terminar a \nmagia usando uma ação. Se a magia terminar enquanto o \nbaú maior estiver no Plano Etéreo, ele estará \nirremediavelmente perdido. \n220","pr":"217 (PDF: 215)","cl":["Mago"]},{"n":"ÁREA ESCORREGADIA","nv":"1° nível","e":"conjuração","tc":"1 ação","al":"18 metros","co":"V, S, M (um pouco de pele de porco ou","du":"1 minuto","d":"Graxa escorregadia cobre o solo em um quadrado de 3 \nmetros centrado em um ponto, dentro do alcance, \ntornando essa área em terreno difícil pela duração. \nQuando a graxa aparece, cada criatura de pé na área \ndeve ser bem sucedida num teste de resistência de \nDestreza ou cairá no chão. Uma criatura que entre na \nárea ou termine seu turno nela, deve ser bem sucedido \nnum teste de resistência de Destreza ou cairá no chão.","pr":"218 (PDF: 216)","cl":["Mago"]},{"n":"ARMA ELEMENTAL","nv":"3° nível","e":"transmutação","tc":"1 ação","al":"Toque","co":"V, S","du":"Concentração, até 1 hora","d":"Uma arma não-mágica que você tocar se torna uma arma \nmágica. Escolha um dos tipos de dano a seguir: ácido, \nelétrico, frio, fogo ou trovejante. Pela duração, a arma tem \n+1 de bônus nas jogadas de ataque e causa 1d4 de dano \nextra, do tipo de elemento escolhido, ao atingir. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 5° ou 6° nível, o \nbônus nas jogadas de ataque aumenta pra +2 e o dano \nextra aumenta para 2d4. Quando você usar um espaço de \nmagia de 7° nível ou superior, o bônus aumenta para +3 e \no dano extra aumenta para 3d4.","pr":"218 (PDF: 216)","cl":["Paladino"]},{"n":"ARMA ESPIRITUAL","nv":"2° nível","e":"evocação","tc":"1 ação bônus","al":"18 metros","co":"V, S","du":"1 minuto","d":"Você cria uma arma espectral flutuante, dentro do \nalcance, que permanece pela duração ou até você conjurar \nessa magia novamente. Quando você conjura essa magia, \nvocê pode realizar um ataque corpo-a-corpo com magia \ncontra uma criatura a 1,5 metro da arma. Se atingir, o \nalvo sofre dano de energia igual a 1d8 + seu modificador \nde habilidade de conjuração. \nCom uma ação bônus, no seu turno, você pode mover a \narma até 6 metros e repetir o ataque contra uma criatura \na 1,5 metro dela. \nA arma pode ter a forma que você desejar. Clérigos de \ndivindades associadas com uma arma em particular \n(como St. Cuthbert é conhecido por sua maça ou Thor por \nseu martelo) fazem o efeito dessa magia se assemelhar a \nessa arma. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 4° nível ou \nsuperior, o dano aumenta em 1d8 para cada dois níveis do \nespaço acima do 2°.","pr":"218 (PDF: 216)","cl":["Clérigo"]},{"n":"ARMA MÁGICA","nv":"2° nível","e":"transmutação","tc":"1 ação bônus","al":"Toque","co":"V, S","du":"Concentração, até 1 hora","d":"Você toca uma arma não-mágica. Até a magia acabar, a \narma se torna uma arma mágica com +1 de bônus nas \njogadas de ataque e jogadas de dano. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 4° nível ou \nsuperior, o bônus aumenta para +2. Quando você usar um \nespaço de magia de 6° nível ou superior, o bônus aumenta \npara +3.","pr":"218 (PDF: 216)","cl":["Mago","Paladino"]},{"n":"ARMADURA ARCANA","nv":"1° nível","e":"abjuração","tc":"1 ação","al":"Toque","co":"V, S, M (um pedaço de couro curado)","du":"8 horas","d":"Você toca uma criatura voluntária que não esteja vestindo \narmadura e uma energia mágica protetora a envolve até a \nmagia acabar. A CA base do alvo se torna 13 + o \nmodificador de Destreza dele. A magia acaba se o alvo \ncolocar uma armadura ou se você dissipa-la usando uma \nação.","pr":"218 (PDF: 216)","cl":["Feiticeiro","Mago"]},{"n":"ARMADURA DE AGATHYS","nv":"1° nível","e":"abjuração","tc":"1 ação","al":"Pessoal","co":"V, S, M (um copo de água)","du":"1 hora","d":"Uma força magica protetora envolve você, manifestando-\nse como um frio espectral que cobre você e seu \nequipamento. Você ganha 5 pontos de vida temporários \npela duração. Se uma criatura atingir você com um \nataque corpo-a-corpo enquanto estiver com esses pontos \nde vida, a criatura sofrerá 5 de dano de frio. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, tanto os pontos de vida temporários quanto o \ndano de frio aumentam em 5 para cada nível do espaço \nacima do 1°.","pr":"218 (PDF: 216)","cl":["Bruxo"]},{"n":"ARROMBAR","nv":"2° nível","e":"transmutação","tc":"1 ação","al":"18 metros","co":"V","du":"Instantânea","d":"Escolha um objeto que você possa ver, dentro do alcance. \nO objeto pode ser uma porta, uma caixa, um baú ou um \npar de algemas, um cadeado ou outro objeto que contenha \num meio mundano ou mágico que previne o acesso. \nUm alvo que esteja fechado por uma fechadura \nmundana ou preso ou barrado torna-se destrancado, \ndestravado ou desbloqueado. Se o objeto tiver múltiplas \nfechaduras, apenas uma delas é destrancada. \nSe você escolher um alvo que esteja travado pela \nmagia tranca arcana, essa magia será suprimida por 10 \nminutos, durante esse período o alvo pode ser aberto e \nfechado normalmente. \nQuando você conjurar essa magia, uma batida forte, \naudível a até 90 metros de distância, emana do objeto \nalvo.","pr":"218 (PDF: 216)","cl":["Bardo","Feiticeiro","Mago"]},{"n":"ASSASSINO FANTASMAGÓRICO","nv":"4° nível","e":"ilusão","tc":"1 ação","al":"36 metros","co":"V, S","du":"Concentração, até 1 minuto","d":"Você mexe com os pesadelos de uma criatura que você \npossa ver, dentro do alcance, e cria uma manifestação \nilusória dos seus medos mais profundos, visível apenas \npara a criatura. O alvo deve realizar um teste de \nresistência de Sabedoria. Se falhar na resistência, ele \nficará amedrontado pela duração. No final de cada turno \ndo alvo, antes da magia acabar, ele deve ser bem sucedido \nnum teste de resistência de Sabedoria ou sofrerá 4d10 de \ndano psíquico. Se passar na resistência, a magia acaba.  \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 5° nível ou \nsuperior, o dano aumenta em 1d10 para cada nível do \nespaço acima do 4°.","pr":"218 (PDF: 216)","cl":["Mago"]},{"n":"ATAQUE CERTEIRO","nv":"Truque","e":"adivinhação","tc":"1 ação","al":"9 metros","co":"S","du":"Concentração, até 1 rodada","d":"Você estende sua mão e aponta o dedo para um alvo no \nalcance. Sua magia garante a você uma breve intuição \nsobre as defesas do alvo. No seu próximo turno, você terá \nvantagem na primeira jogada de ataque contra o alvo, \nconsiderando que essa magia não tenha acabado.","pr":"219 (PDF: 217)","cl":["Bardo","Bruxo","Feiticeiro","Mago"]},{"n":"ATAQUE VISUAL","nv":"6° nível","e":"necromancia","tc":"1 ação","al":"Pessoal","co":"V, S","du":"Concentração, até 1 minuto","d":"Pela duração da magia, seus olhos tornam-se manchas \nvazias imbuídas com poder terrível. Uma criatura, à sua \nescolha, a até de 18 metros de você que você puder ver, \ndeve ser bem sucedida num teste de resistência de \nSabedoria ou será afetada por um dos efeitos a seguir, à \nsua escolha, pela duração. A cada um dos seus turnos, até \na magia acabar, você pode usar sua ação para afetar \noutra criatura, mas não pode afetar uma criatura \nnovamente se ela tiver sido bem sucedida no teste de \nresistência contra essa conjuração de ataque visual. \nAdormecer. O alvo cai inconsciente. Ele acorda se \nsofrer qualquer dano ou se outra criatura usar sua ação \npara sacudir o adormecido até acordá-lo.  \nApavorar. O alvo está amedrontado. Em cada um dos \nturnos dele, a criatura amedrontada deve realizar a ação \nde Disparada e se mover para longe de você pela rota \nsegura mais curta disponível, a não ser que não haja \nlugar para se mover. Se o alvo se mover para um local a, \npelo menos, 18 metros de distância de você onde ela não \npossa mais te ver, esse efeito termina. \nAdoecer. O alvo tem desvantagem nas jogadas de \nataque e testes de habilidade. No final de cada um dos \nturnos dele, ele pode realizar outro teste de resistência de \nSabedoria. Se for bem sucedido, o efeito termina.","pr":"219 (PDF: 217)","cl":["Bardo","Bruxo","Feiticeiro","Mago"]},{"n":"AUGÚRIO","nv":"2° nível","e":"adivinhação","tc":"1 minuto","al":"Pessoal","co":"V, S, M (varetas, ossos ou objetos","du":"Instantânea","d":"Ao lançar varetas cravejados com gemas, rolar ossos de \ndragão, puxar cartas ornamentadas ou usar outro tipo de \nferramenta de adivinhação, você recebe um pressagio de \numa entidade de outro mundo, sobre os resultados de \ncursos de ação específicos que você planeja tomar nos \npróximos 30 minutos. O Mestre escolhe dentre os \npossíveis presságios a seguir: \n•\nÊxito, para resultados bons\n•\nFracasso, para resultados maus\n•\nÊxito e fracasso, para resultados bons e maus\n•\nNada, para resultados que não são especialmente bons\nou ruins\nA magia não leva em conta qualquer possível \ncircunstancia que possa mudar o resultado, como a \nconjuração de magias adicionais ou a perda ou ganho de \num companheiro. \nSe você conjurar a magia duas ou mais vezes antes de \ncompletar seu próximo descanso longo, existe uma chance \ncumulativa de 25 por cento de cada conjuração, depois da \nprimeira que você fez, ter um resultado aleatório. O \nMestre faz essa jogada secretamente. \nAUMENTAR/REDUZIR\n2° nível de transmutação \nTempo de Conjuração: 1 ação \nAlcance: 9 metros \nComponentes: V, S, M (um pouco de pó de ferro) \nDuração: Concentração, até 1 minuto \nVocê faz com que uma criatura ou um objeto que você \npossa ver dentro do alcance, fique maior ou menor, pela \nduração. Escolha entre uma criatura ou um objeto que \nnão esteja sendo carregado nem vestido. Se o alvo for \ninvoluntário, ele deve realizar um teste de resistência de \nConstituição. Se for bem sucedido, a magia não surte \nefeito. \nSe o alvo for uma criatura, tudo que ele esteja vestindo \nou carregando muda e tamanho com ela. Qualquer item \nlargado por uma criatura afetada, retorna ao seu \ntamanho natural. \nAumentar. O tamanho do alvo dobra em todas as \ndimensões e seu peso é multiplicado por oito. Esse \naumento eleva seu tamanho em uma categoria – de Médio \npara Grande, por exemplo. Se não houver espaço \nsuficiente para que o alvo dobre de tamanho, a criatura \nou objeto alcança o tamanho máximo possível no espaço \ndisponível. Até o fim da magia, o alvo também tem \nvantagem em testes de Força e testes de resistência de \nForça. O tamanho das armas do alvo crescem para se \nadequar ao seu novo tamanho. Quando essas armas são \nampliadas, os ataques do alvo com elas causam 1d4 de \ndano extra.  \nReduzir. O tamanho do alvo é reduzido à metade em \ntodas as dimensões e seu peso é reduzido a um oitavo do \nnormal. Essa redução diminui o tamanho do alvo em uma \ncategoria – de Médio para Pequeno, por exemplo. Até o \nfim da magia, o alvo tem desvantagem em testes de Força \ne testes de resistência de Força. O tamanho das armas do \nalvo diminuem para se adequar ao seu novo tamanho. \nQuando essas armas são reduzidas, os ataques do alvo \ncom elas causam 1d4 de dano a menos (isso não pode \nreduzir o dano a menos de 1).","pr":"219 (PDF: 217)","cl":[]},{"n":"AURA DE PUREZA","nv":"4° nível","e":"abjuração","tc":"1 ação","al":"Pessoal (9 metros de raio)","co":"V","du":"Concentração, até 10 minutos","d":"222 \nEnergia purificante irradia de você em uma aura com 9 \nmetros de raio. Até a magia acabar, a aura se move \nmantendo-se centrada em você. Todas as criaturas não-\nhostis na aura (incluindo você) não podem ficar doentes, \ntem resistência a dano de veneno e tem vantagem em \ntestes de resistência contra efeitos que deixem ela com \nqualquer das condições a seguir: amedrontado, atordoado, \ncego, enfeitiçado, envenenado, paralisado e surdo.","pr":"219 (PDF: 217)","cl":["Paladino"]},{"n":"AURA DE VIDA","nv":"4° nível","e":"abjuração","tc":"1 ação","al":"Pessoal (9 metros de raio)","co":"V","du":"Concentração, até 10 minutos","d":"Energia de prevenção vital irradia de você em uma aura \ncom 9 metros de raio. Até a magia acabar, a aura se move \nmantendo-se centrada em você. Todas as criaturas não-\nhostis na aura (incluindo você) tem resistência a dano \nnecrótico e seu máximo de pontos de vida não pode ser \nreduzido. Além disso, uma criatura viva não-hostil, \nrecupera 1 ponto de vida quando começa seu turno na \naura com 0 pontos de vida.","pr":"220 (PDF: 218)","cl":["Paladino"]},{"n":"AURA DE VITALIDADE","nv":"3° nível","e":"evocação","tc":"1 ação","al":"Pessoal (9 metros de raio)","co":"V","du":"Concentração, até 1 minuto","d":"Energia curativa irradia de você em uma aura com 9 \nmetros de raio. Até a magia acabar, a aura se move \nmantendo-se centrada em você. Você pode usar uma ação \nbônus para fazer com que uma criatura na aura \n(incluindo você) recupere 2d6 pontos de vida.","pr":"220 (PDF: 218)","cl":["Paladino"]},{"n":"AURA MÁGICA DE NYSTUL","nv":"2° nível","e":"ilusão","tc":"1 ação","al":"Toque","co":"V, S, M (um pequeno quadrado de seda)","du":"24 horas","d":"Você coloca uma ilusão em uma criatura ou objeto que \nvocê tocar, então magias de adivinhação revelarão \ninformações falsas sobre ele. O alvo pode ser uma criatura \nvoluntária ou um objeto que não esteja sendo carregado \nou vestido por outra criatura. \nQuando você conjura essa magia, escolha um ou \nambos os efeitos seguintes. O efeito permanece pela \nduração. Se você conjurar essa magia na mesma criatura \nou objeto a cada dia por 30 dias, colocando o mesmo efeito \nnele todas as vezes, a ilusão durará até ser dissipada. \nAura Falsa. Você modifica a forma como o alvo \naparece para magias e efeitos mágicos, como detectar \nmagia, que detectam auras mágicas. Você pode fazer um \nobjeto não-mágico parecer mágico ou mudar a aura \nmágica de um objeto para que ela pareça pertencer a \noutra escola de magia a sua escolha. Quando você usar \nesse efeito num objeto, você pode fazer a aura falsa \naparente a qualquer criatura que manusear o item. \nMáscara. Você modifica a forma como o alvo aparece \npara magias e efeitos que detectam tipos de criaturas, \ncomo o Sentido Divino do paladino ou o gatilho de um \nmagia símbolo. Você escolhe o tipo de criatura e outras \nmagias e efeitos mágicos consideram o alvo como se ele \nfosse uma criatura desse tipo ou tendência.","pr":"220 (PDF: 218)","cl":["Mago"]},{"n":"AURA SAGRADA","nv":"8° nível","e":"abjuração","tc":"1 ação","al":"Pessoal","co":"V, S, M (um minúsculo relicário valendo,","du":"Concentração, até 1 minuto","d":"Luz divina emana de você e adere em uma aureola suave \nnum raio de 9 metros, em volta de você. As criaturas de \nsua escolha, no raio, quando você conjurar essa magia, \nemitem penumbra num raio de 1,5 metro e tem vantagem \nem todos os testes de resistência e as outras criaturas tem \ndesvantagem nas jogadas de ataque contra elas, até a \nmagia acabar. Além disso, quando um corruptor ou \nmorto-vivo atingir uma criatura afetada com um ataque \ncorpo-a-corpo, a aura lampeja com luz plena. O atacante \ndeve ser bem sucedido num teste de resistência de \nConstituição ou ficara cego até a magia acabar.","pr":"220 (PDF: 218)","cl":["Clérigo"]},{"n":"AUXÍLIO DIVINO","nv":"1° nível","e":"evocação","tc":"1 ação bônus","al":"Pessoal","co":"V, S","du":"Concentração, até 1 minuto","d":"Sua oração fortalece você com radiação divina. Até o fim \nda magia, seus ataques com arma causam 1d4 de dano \nradiante extra ao atingirem.","pr":"220 (PDF: 218)","cl":["Paladino"]},{"n":"BANIMENTO","nv":"4° nível","e":"abjuração","tc":"1 ação","al":"9 metros","co":"V, S, M (um item desagradável ao alvo)","du":"Concentração, até 1 minuto","d":"Você tenta enviar uma criatura que você pode ver dentro \ndo alcance, para outro plano de existência. O alvo deve \nser bem sucedido num teste de resistência de Carisma ou \nserá banido. \nSe o alvo for nativo do plano de existência que você \nestá, você bane o alvo para um semiplano inofensivo. \nEnquanto estiver lá, a criatura estará incapacitada. Ela \npermanece lá até a magia acabar, a partir desse ponto, o \nalvo reaparece no espaço em que ela deixou ou no espaço \ndesocupado mais próximo, se o espaço dela estiver \nocupado. \nSe o alvo for nativo de um plano de existência \ndiferente do que você está, o alvo é banido em um lampejo \nsutil, retornando para o seu plano natal. Se a magia \nacabar antes de 1 minuto se passar, o alvo reaparece no \nlugar em que estava ou no espaço desocupado mais \npróximo, se o espaço dela estiver ocupado. Do contrário, o \nalvo não retorna. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 5° nível ou \nsuperior, você pode afetar uma criatura adicional para \ncada nível do espaço acima do 4°.","pr":"220 (PDF: 218)","cl":["Bruxo","Clérigo","Feiticeiro","Mago","Paladino"]},{"n":"BANQUETE DE HERÓIS","nv":"6° nível","e":"conjuração","tc":"10 minutos","al":"9 metros","co":"V, S, M (uma tigela encrustada de gemas","du":"Instantânea","d":"Você traz um grande banquete, incluindo comida e bebida \nmagnificas. O banquete leva 1 hora para ser consumido e \ndesaparece ao final desse tempo e os efeitos benéficos não \nse aplicam até essa hora terminar. Até doze criaturas \npodem participar do banquete. \nUma criatura que participe do banquete ganha \ndiversos benefícios. A criatura é curada de todas as \ndoenças e venenos, torna-se imune a veneno e a ser \namedrontada e faz todos os seus testes de resistência de \nSabedoria com vantagem. Seu máximo de pontos de vida \ntambém aumenta em 2d10 e ela ganha a mesma \nquantidade de pontos de vida. Esses benefícios duram por \n24 horas.","pr":"220 (PDF: 218)","cl":["Clérigo","Druida"]},{"n":"BARREIRA DE LÂMINAS","nv":"6° nível","e":"evocação","tc":"1 ação","al":"24 metros","co":"V, S","du":"Concentração, até 10 minutos","d":"Você cria uma muralha vertical de lâminas giratórias, \nafiadas como navalhas, feitas de energia mágica. A \nmuralha aparece dentro do alcance e permanece pela \nduração. Você pode fazer uma muralha reta de até 30 \nmetros de comprimento por 6 metros de altura e 1,5 \nmetro de largura ou uma muralha anelar com até 18 \nmetros de diâmetro, 6 metros de altura e 1,5 metro de \nlargura. A muralha confere três-quartos de cobertura a \ncriaturas atrás dela e seu espaço é terreno difícil. \nQuando uma criatura entrar a área da muralha pela \nprimeira vez em um turno, ou começar seu turno nela, a \ncriatura deve realizar um teste de resistência de \nDestreza. Se falhar, a criatura sofrerá 6d10 de dano \ncortante. Em um sucesso, a criatura sofre metade desse \ndano.","pr":"221 (PDF: 219)","cl":["Clérigo"]},{"n":"BÊNÇÃO","nv":"1° nível","e":"encantamento","tc":"1 ação","al":"9 metros","co":"V, S, M (um borrifo de água benta)","du":"Concentração, até 1 minuto","d":"Você abençoa até três criaturas, à sua escolha, dentro do \nalcance. Sempre que um alvo realizar uma jogada de \nataque ou teste de resistência antes da magia acabar, o \nalvo pode jogar um d4 e adicionar o valor jogado ao \nataque ou teste de resistência. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, você pode afetar uma criatura adicional para \ncada nível do espaço acima do 1°.","pr":"221 (PDF: 219)","cl":["Clérigo","Paladino"]},{"n":"BOCA ENCANTADA","nv":"2° nível","e":"ilusão","tc":"1 minuto","al":"9 metros","co":"V, S, M (um pedaço de favo de mel e pó","du":"Até ser dissipada","d":"Você implanta uma mensagem em um objeto dentro do \nalcance, uma mensagem que é pronunciada quando uma \ncondição de ativação é satisfeita. Escolha um objeto que \nvocê possa ver e não esteja sendo vestido ou carregado por \noutra criatura. Então, fale a mensagem, que deve conter \n25 palavras ou menos, apesar de ela poder ser entregue \ndurante um período de até 10 minutos. Finalmente, \ndetermine a circunstância que irá ativar a magia para \nque sua mensagem seja entregue. \nQuando essa circunstância ocorrer, a boca encantada \naparecerá no objeto e recitará a mensagem com sua voz e \ncom o mesmo volume que você falou. Se o objeto que você \nescolheu tiver uma boca ou algo semelhante a uma boca \n(por exemplo, a boca de uma estátua), a boca mágica \naparece ai, então, as palavras parecerão vir da boca do \nobjeto. Quando você conjura essa magia, você pode fazer a \nmagia acabar depois de enviar sua mensagem ou ela pode \npermanecer e repetir a mensagem sempre que a \ncircunstância de ativação ocorrer. \nA circunstância de ativação pode ser tão genérica ou \ntão detalhada quando você quiser, apesar de ela precisar \nser baseada em condições visuais ou audíveis que ocorram \na até 9 metros do objeto. Por exemplo, você pode instruir \na boca a falar quando uma criatura se aproximar a menos \nde 9 metros do objeto ou quando um sino de prata tocar a \nmenos de 9 metros dela.","pr":"221 (PDF: 219)","cl":[]},{"n":"BOLA DE FOGO","nv":"3° nível","e":"evocação","tc":"1 ação","al":"45 metros","co":"V, S, M (uma minúscula bola de guano de","du":"Instantânea","d":"Um veio brilhante lampeja na ponta do seu dedo em \ndireção a um ponto que você escolher, dentro do alcance, e \nentão eclode com um estampido baixo, explodindo em \nchamas. Cada criatura em uma esfera de 6 metros de \nraio, centrada no ponto, deve realizar um teste de \nresistência de Destreza. Um alvo sofre 8d6 de dano de \nfogo se falhar na resistência, ou metade desse dano se \nobtiver sucesso. \nO fogo se espalha, dobrando esquinas. Ele incendeia \nobjetos inflamáveis na área que não estejam sendo \nvestidos ou carregados. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 4° nível ou \nsuperior, o dano aumenta em 1d6 para cada nível do \nespaço acima do 3°.","pr":"221 (PDF: 219)","cl":["Feiticeiro","Mago"]},{"n":"BOLA DE FOGO CONTROLÁVEL","nv":"7° nível","e":"evocação","tc":"1 ação","al":"45 metros","co":"V, S, M (uma minúscula bola de guano de","du":"Concentração, até 1 minuto","d":"Um feixe de luz amarelada é disparado da ponta do seu \ndedo, então se condensa e aguarda no ponto escolhido, \ndentro do alcance, como uma conta brilhante, pela \nduração. Quando a magia termina, seja por sua \nconcentração ter sido interrompida ou por você ter \ndecidido termina-la, a conta eclode com um estampido \nbaixo, explodindo em chamas que se espalhando, \ndobrando esquinas. Cada criatura numa esfera, com 6 \nmetros de raio, centrada na conta, deve realizar um teste \nde resistência de Destreza. Uma criatura sofre dano igual \nao total de dano acumulado se falhar na resistência, ou \nmetade do total se obtiver sucesso. \n224 \nO dano base da magia é 12d6. Se até o final do seu \nturno, a conta ainda não tiver sido detonada, o dano \naumenta em 1d6. \nSe a conta brilhante for tocada antes do intervalo \nexpirar, a criatura que a tocou deve realizar um teste de \nresistência de Destreza. Se falhar na resistência, a magia \ntermina imediatamente, fazendo a conta explodir em \nchamas. Se obtiver sucesso na resistência, a criatura pode \narremessar a conta a até 12 metros. Quando ela atinge \numa criatura ou objeto solido, a magia termina e a conta \nexplode. \nO fogo danifica objetos na área e incendeia objetos \ninflamáveis que não estejam sendo vestidos ou \ncarregados. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 8° nível ou \nsuperior, o dano base aumenta e 1d6 para cada nível do \nespaço acima do 7°.","pr":"221 (PDF: 219)","cl":["Feiticeiro","Mago"]},{"n":"BOM FRUTO","nv":"1° nível","e":"transmutação","tc":"1 ação","al":"Toque","co":"V, S, M (um raminho de visco)","du":"Instantânea","d":"Até dez frutos aparecem na sua mão e são infundidos com \nmagia pela duração. Uma criatura pode usar sua ação \npara comer um fruto. Comer um fruto restaura 1 ponto de \nvida e um fruto produz nutrientes suficientes para \nsustentar uma criatura por um dia. \nOs frutos perdem seu potencial se não forem \nconsumidos dentro de 24 horas da conjuração dessa \nmagia.","pr":"222 (PDF: 220)","cl":["Druida","Patrulheiro"]},{"n":"BORDÃO MÍSTICO","nv":"Truque","e":"transmutação","tc":"1 ação bônus","al":"Toque","co":"V, S, M (visco, uma folha de trevo e uma","du":"1 minuto","d":"A madeira de uma clava ou bordão, que você esteja \nsegurando, é imbuída com o poder da natureza. Pela \nduração, você pode usar sua habilidade de conjuração ao \ninvés da sua Força para as jogadas de ataque e dano \ncorpo-a-corpo usando essa arma, e o dado de dano da \narma se torna um d8. A arma também se torna mágica, se \nela já não for. A magia acaba se você conjura-la \nnovamente ou se você soltar a arma.","pr":"222 (PDF: 220)","cl":["Druida"]},{"n":"BRAÇOS DE HADAR","nv":"1° nível","e":"conjuração","tc":"1 ação","al":"Pessoal (3 metros de raio)","co":"V, S","du":"Instantânea","d":"Você invoca o poder de Hadar, o Faminto Sombrio. \nTentáculos de energia negra brotam de você e golpeiam \ntodas as criaturas a até 3 metros de você. Cada criatura \nna área deve realizar um teste de resistência de Força. Se \nfalhar, o alvo sofre 2d6 de dano necrótico e não pode fazer \nreações até o próximo turno dela. Em um sucesso, uma \ncriatura sofre metade do dano e não sofre qualquer outro \nefeito. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, o dano aumenta em 1d6 para cada nível do \nespaço acima do 1°. \n225","pr":"222 (PDF: 220)","cl":["Bruxo"]},{"n":"BRUXARIA","nv":"1° nível","e":"encantamento","tc":"1 ação bônus","al":"18 metros","co":"V, S, M (o olho petrificado de um tritão)","du":"Concentração, até 1 hora","d":"Você coloca uma maldição em uma criatura que você \npossa ver, dentro do alcance. Até a magia acabar, você \ncausa 1d6 de dano necrótico extra no alvo sempre que \natingi-lo com um ataque. Além disso, escolha uma \nhabilidade quando você conjurar a magia. O alvo tem \ndesvantagem em testes de habilidade feitos com a \nhabilidade escolhida. \nSe o alvo cair a 0 pontos de vida antes da magia \nacabar, você pode usar uma ação bônus, em um turno \nsubsequente, para amaldiçoar outra criatura. \nUma magia remover maldição conjurada no alvo acaba \ncom a magia prematuramente. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 3° ou 4° nível, você \npoderá manter sua concentração na magia por até 8 \nhoras. Quando você usar um espaço de magia de 5° nível \nou superior, você poderá manter sua concentração na \nmagia por até 24 horas.","pr":"223 (PDF: 221)","cl":["Bruxo"]},{"n":"CAMINHAR EM ÁRVORES","nv":"5° nível","e":"conjuração","tc":"1 ação","al":"Pessoal","co":"V, S","du":"Concentração, até 1 minuto","d":"Você adquire a habilidade de entrar em uma árvore e se \nmover de dentro dela para dentro de outra árvore de \nmesmo tipo à até 150 metros. Ambas as árvores devem \nestar vivas e ter, pelo menos, o mesmo tamanho que você. \nVocê deve usar 1,5 metro de deslocamento para entrar \nnuma árvore. Você, instantaneamente, sabe a localização \nde todas as outras árvores de mesmo tipo à 150 metros e, \ncomo parte do movimento usado para entrar na árvore, \npode tanto passar por uma dessas árvores quanto sair da \nárvore em que você está. Você aparece no espaço que você \nquiser a 1,5 metro da árvore destino, usando outro \nmovimento de 1,5 metro. Se você não tiver movimento \nrestante, você aparece a 1,5 metro da árvore que você \nterminou seu movimento. \nVocê pode usar esse habilidade de transporte uma vez \npor rodada pela duração. Você deve terminar cada turno \nfora da árvore.","pr":"223 (PDF: 221)","cl":["Druida","Patrulheiro"]},{"n":"CAMINHAR NO VENTO","nv":"6° nível","e":"transmutação","tc":"1 minuto","al":"9 metros","co":"V, S, M (fogo e água benta)","du":"8 horas","d":"Você e até dez criaturas voluntária que você possa ver, \ndentro do alcance, assumem uma forma gasosa pela \nduração, parecidas com pedaços de nuvem. Enquanto \nestiver na forma de nuvem, uma criatura tem \ndeslocamento de voo de 90 metros e tem resistência a \ndano de concussão, cortante e perfurante de ataques não-\nmágicos. As únicas ações que uma criatura pode realizar \nnessa forma são a ação de Disparada ou para reverter a \nsua forma normal. Reverter leva 1 minuto, período pelo \nqual a criatura estará incapacitada e não poderá se \nmover. Até a magia acabar, uma criatura pode reverter \npara a forma de nuvem, o que também requer a \ntransformação de 1 minuto. \nSe uma criatura estiver na forma de nuvem e voando \nquando o efeito acabar, a criatura descerá a 18 metros por \nrodada por 1 minuto, até aterrissar na solo, o que é feito \ncom segurança. Se ela não puder aterrissar em 1 minuto, \na criatura cairá a distância restante.","pr":"223 (PDF: 221)","cl":["Druida"]},{"n":"CAMPO ANTIMAGIA","nv":"8° nível","e":"abjuração","tc":"1 ação","al":"Pessoal (3 metros de raio)","co":"V, S, M (um punhado de pó de ferro ou","du":"Concentração, até 1 hora","d":"Uma esfera invisível, de 3 metros de raio, de antimagia \nenvolve você. Essa área é separada da energia mágica que \nse espalha pelo multiverso. Dentro da esfera, magias não \npodem ser conjuradas, criaturas invocadas desaparecem \ne, até mesmo itens mágicos, se tornam mundanos. Até o \nfim da magia, a esfera se move com você, centrada em \nvocê. \nMagias e outros efeitos mágicos, exceto os criados por \nartefatos ou divindades, são suprimidos na esfera e não \npodem adentra-la. Um espaço gasto para conjurar uma \nmagia suprimida é consumido. Enquanto o efeito estiver \nsuprimido, ela não funciona, mas o tempo que ela \npermanecer suprimida é descontado da sua duração. \nEfeitos de Alvo. Magias e outros efeitos mágicos, \ncomo mísseis mágicos e enfeitiçar pessoa, que forem \nusados em uma criatura ou objeto dentro da esfera, não \nsurtem efeito no alvo.  \nÁreas de Magia. A área de outra magia ou efeito \nmágico, como uma bola de fogo, não se estende para \ndentro da esfera. Se a esfera sobrepor um área mágica, a \nparte da área que for coberta pela espera é suprimida. \nPor exemplo, as chás criadas por uma muralha de fogo \nserão suprimidas dentro da esfera, criando um abertura \nna muralha se a sobreposição por grande o suficiente. \nMagias. Qualquer magia ativa ou outro efeito mágico \nem uma criatura ou objeto dentro da esfera é suprimido \nenquanto a criatura ou objeto permanecer dentro dela. \nItens Mágicos. As propriedades e poderes de itens \nmágicos são suprimidas dentro da esfera. Por exemplo, \numa espada longa +1 dentro da esfera funciona como uma \nespada não-mágica. \nAs propriedades e poderes de uma arma mágica são \nsuprimidos se ela for usada contra um alvo dentro da \nesfera ou empunhada por um atacante dentro da esfera. \nSe uma arma mágica ou munição mágica deixar a esfera \ncompletamente (por exemplo, se você disparar uma flecha \nmágica ou arremessar uma lança mágica e um alvo fora \nda esfera), a magia do item deixa de ser suprimida tão \nlogo ele deixe a esfera. \nViagem Mágica. Teletransporte e viagem planar não \nfunciona dentro da esfera, tanto se a esfera for o destino \nquando o ponto de partida para tais viagens mágicas. Um \nportal para outro lugar, mundo ou plano de existência, \nassim como um espaço extradimensional aberto, como o \ncriado pela magia truque de corda, é temporariamente \nfechado enquanto estiver dentro da esfera.  \nCriaturas e Objetos. Uma criatura ou objeto \ninvocado ou criado através de magia, temporariamente \ndesaparece da existência dentro da esfera. Tais criaturas \nreaparecem instantaneamente quando o espaço ocupado \npela criatura não estiver mais dentro da esfera. \nDissipar Magia. Magias e efeitos mágicos como \ndissipar magia, não surtem efeito sob esfera. Da mesma \nforma, esferas criadas por magias de campo antimagia \ndiferentes não se anulam. \n226","pr":"223 (PDF: 221)","cl":["Clérigo","Mago"]},{"n":"CÃO FIEL DE MORDENKAINEN","nv":"4° nível","e":"conjuração","tc":"1 ação","al":"9 metros","co":"V, S, M (um minúsculo apito de prata,","du":"8 horas","d":"Você conjura um cão de guarda fantasma em um espaço \ndesocupado que você possa ver, dentro do alcance, que \npermanece pela duração, até você dissipa-lo com uma \nação ou até você se mover para mais de 30 metros dele. \nO cão é invisível para todas as criaturas, exceto para \nvocê, e não pode ser ferido. Quando uma criatura \nPequena ou maior se aproximar a 9 metros sem, \nprimeiramente, falar a senha que você especifica quando \nconjura a magia, o cão começa a latir muito alto. O cão vê \ncriaturas invisíveis e pode ver no Plano Etéreo. Ele ignora \nilusões. \nNo começo de cada um dos seus turnos, o cão tenta \nmorder uma criatura a 1,5 metro dele que seja hostil a \nvocê. O bônus de ataque do cão é igual ao seu modificador \nde habilidade de conjuração + seu bônus de proficiência. \nSe atingir, ele causa 4d8 de dano perfurante.","pr":"224 (PDF: 222)","cl":["Mago"]},{"n":"CATIVAR","nv":"2° nível","e":"encantamento","tc":"1 ação","al":"18 metros","co":"V, S","du":"1 minuto","d":"Você tece um cordão de palavras distrativas, fazendo as \ncriaturas, à sua escolha, que você puder ver dentro do \nalcance e que puderem ouvir você, realizarem um teste de \nresistência de Sabedoria. Qualquer criatura que não \npuder ser enfeitiçada, passa automaticamente nesse teste \nde resistência e, se você ou seus companheiros estiverem \nlutando com a criatura, ela terá vantagem na resistência. \nSe falhar na resistência, a criatura terá desvantagem em \ntestes de Sabedoria (Percepção) feitos para notar \nqualquer criatura além de você, até a magia acabar ou até \no alvo não poder mais ouvir você. A magia acaba se você\nestiver incapacitado ou incapaz de falar.","pr":"224 (PDF: 222)","cl":["Bardo","Bruxo"]},{"n":"CARNE PARA PEDRA","nv":"6° nível","e":"transmutação","tc":"1 ação","al":"18 metros","co":"V, S, M (uma pitada de cal, água e terra)","du":"Concentração, até 1 minuto","d":"Você tenta transformar uma criatura que você possa ver, \ndentro do alcance, em pedra. Se o corpo do alvo for feito \nde carne, a criatura deve realizar um teste de resistência \nde Constituição. Em caso de falha, ela ficará impedida, à \nmedida que sua carne começa a endurecer. Se obtiver \nsucesso, a criatura não é afetada. \nUma criatura impedida por essa magia deve realizar \noutro teste de resistência de Constituição no final de cada \num dos turnos dela. Se obtiver sucesso na resistência \ncontra essa magia três vezes, a magia termina. Se ela \nfalhar no teste de resistência três vezes, ela se torna \npedra é afetada pela condição petrificado pela duração. Os \nsucessos e falhas não precisam ser consecutivos; anote \nambos os resultados até o alvo acumular três de mesmo \ntipo. \nSe a criatura for quebrada fisicamente enquanto \npetrificada, ela sofre deformidades similares se for \nrevertida ao seu estado original. \nSe você mantiver sua concentração nessa magia \ndurante toda a duração possível, a criatura é \ntransformada em pedra até o efeito ser removido. \nCEGUEIRA/SURDEZ\n2° nível de necromancia \nTempo de Conjuração: 1 ação \nAlcance: 9 metros \nComponentes: V \nDuração: 1 minuto \nVocê pode cegar ou ensurdecer um oponente. Escolha uma \ncriatura que você possa ver dentro do alcance para fazer \num teste de resistência de Constituição. Se ela falhar, \nficará ou cega ou surda (à sua escolha) pela duração. No \nfinal de cada um dos turnos dele, o alvo pode realizar um \nteste de resistência de Constituição. Se obtiver sucesso, a \nmagia termina. \nEm Níveis Superiores. Se você conjurar essa magia \nusando um espaço de magia de 3° nível ou superior, você \npode afetar uma criatura adicional para cada nível de \nespaço acima do 2°.","pr":"224 (PDF: 222)","cl":["Bruxo","Mago"]},{"n":"CHAMA CONTÍNUA","nv":"2° nível","e":"evocação","tc":"1 ação","al":"Toque","co":"V, S, M (pó de rubi no valor de 50 po,","du":"Até ser dissipada","d":"Uma chama, que produz iluminação equivalente a uma \ntocha, surge de um objeto que você tocar. O efeito é \nparecido com o de uma chama normal, mas ele não \nproduz calor e não consome oxigênio. Uma chama \ncontinua pode ser coberta ou escondida, mas não sufocada \nou extinta.","pr":"224 (PDF: 222)","cl":["Clérigo","Mago"]},{"n":"CHAMA SAGRADA","nv":"Truque","e":"evocação","tc":"1 ação","al":"18 metros","co":"V, S","du":"Instantânea","d":"Radiação similar a uma chama desce sobre uma criatura \nque você possa ver, dentro do alcance. O alvo deve ser \nbem sucedido num teste de resistência de Destreza ou \nsofrerá 1d8 de dano radiante. O alvo não recebe qualquer \nbenefício de cobertura contra esse teste de resistência. \nO dano da magia aumenta em 1d8 quando você \nalcança o 5° nível (2d8), 11° nível (3d8) e 17° nível (4d8).","pr":"224 (PDF: 222)","cl":["Clérigo"]},{"n":"CHICOTE DE ESPINHOS","nv":"Truque","e":"transmutação","tc":"1 ação","al":"9 metros","co":"V, S, M (um muda de uma planta com","du":"Instantânea","d":"Você cria um longo chicote de vinhas coberto por espinhos \nque chicoteia, ao seu comando, em direção de uma \ncriatura dentro do alcance. Realize um ataque corpo-a-\ncorpo com magia contra o alvo. Se o ataque atingir, a \ncriatura sofrerá 1d6 de dano perfurante e, se a criatura \nfor Grande ou menor, você a puxa até 3 metros para perto \nde você. \nO dano dessa magia aumenta em 1d6 quando você \nalcança o 5° nível (2d6), 11° nível (3d6) e 17° nível (4d6). \n227","pr":"224 (PDF: 222)","cl":["Druida"]},{"n":"CHUVA DE METEOROS","nv":"9° nível","e":"evocação","tc":"1 ação","al":"1,5 quilômetro","co":"V, S","du":"Instantânea","d":"Esferas de fogo incandescentes atingem o solo em quatro \npontos diferentes que você possa ver, dentro do alcance. \nCada criatura numa esfera de 12 metros de raio, centrada \nem cada ponto escolhido por você, deve realizar um teste \nde resistência de Destreza. A esfera se espalha, dobrando \nesquinas. Uma criatura sofre 20d6 de dano de fogo e 20d6 \nde dano de concussão se falhar na resistência ou metade \ndesse dano se obtiver sucesso. Uma criatura na área de \nmais de uma explosão de chamas é afetada apenas uma \nvez. \nA magia causa dano aos objetos na área e incendeia \nobjetos inflamáveis que não estejam sendo vestidos ou \ncarregados.","pr":"225 (PDF: 223)","cl":["Feiticeiro","Mago"]},{"n":"CÍRCULO DA MORTE","nv":"6° nível","e":"necromancia","tc":"1 ação","al":"45 metros","co":"V, S, M (o pó de uma pérola negra","du":"Instantânea","d":"Uma esfera de energia negativa ondula em um raio de 18 \nmetros de um ponto ao alcance. Cada criatura na área \ndeve realizar um teste de resistência de Constituição. Um \nalvo sofre 8d6 de dano necrótico se falhar no seu teste de \nresistência, ou metade desse dano se passar. \nEm Níveis Superiores. Se você conjurar essa magia \nusando um espaço de magia de 7° nível ou superior, o \ndano aumenta em 2d6 para cada nível do espaço acima do \n6°.","pr":"225 (PDF: 223)","cl":["Bruxo","Feiticeiro","Mago"]},{"n":"CÍRCULO DE PODER","nv":"5° nível","e":"abjuração","tc":"1 ação","al":"Pessoal (9 metros de raio)","co":"V","du":"Concentração, até 10 minutos","d":"Energia divina irradia de você, distorcendo e espalhando \nenergia mágica a até 9 metros de você. Até a magia \nacabar, a esfera se move com você, centrada em você. Pela \nduração, cada criatura amigável na área (incluindo você) \ntem vantagem em testes de resistência contra magias e \noutros efeitos mágicos. Além disso, quando uma criatura \nafetada for bem sucedida num teste de resistência contra \numa magia ou efeito mágico realizado para sofrer apenas \nmetade do dano, ao invés disso, ela não sofrerá dano \nnenhum se passar na resistência.","pr":"225 (PDF: 223)","cl":["Paladino"]},{"n":"CÍRCULO DE TELETRANSPORTE","nv":"5° nível","e":"conjuração","tc":"1 minuto","al":"3 metros","co":"V, M (giz e tintas raros infundidos com","du":"1 rodada","d":"À medida que você conjura essa magia, você desenha um \ncírculo de 3 metros de diâmetro no chão, inscrevendo \nselos que conectam sua localização a um círculo de \nteletransporte permanente, à sua escolha, cuja sequência \nde selos você conheça e esteja no mesmo plano de \nexistência que você. Um portal cintilante se abre dentro \ndo círculo que você desenhou e permanece aberto até o \nfinal do seu próximo turno. Qualquer criatura que entrar \nno portal, instantaneamente, aparecerá a 1,5 metro do \ncírculo de destino ou no espaço desocupado mais próximo, \nse o espaço estiver ocupado. \nMuitos templos principais, guildas e outros locais \nimportantes possuem círculos de teletransporte \npermanentes inscritos em algum lugar dos seus confins. \nCada círculo desse inclui uma sequência única de selos – \numa sequência de runas mágicas dispostas em um padrão \nespecífico. Quando você adquire a capacidade de conjurar \nessa magia pela primeira vez, você aprende a sequência \nde selos de dois destinos no Plano Material, determinadas \npelo Mestre. Você pode aprender sequências de selos \nadicionais durante suas aventuras. Você pode consignar \numa nova sequência de selos a memória após estuda-la \npor 1 minuto. \nVocê pode criar um círculo de teletransporte \npermanente ao conjurar essa magia no mesmo local a \ncada dia por um ano. Você não precisa usar o círculo para \nse teletransportar quando você conjurar a magia desse \nmodo.","pr":"225 (PDF: 223)","cl":["Bardo","Feiticeiro","Mago"]},{"n":"CÍRCULO MÁGICO","nv":"3° nível","e":"abjuração","tc":"1 minuto","al":"3 metros","co":"V, S, M (água benta ou pó de prata e","du":"1 hora","d":"Você cria um cilindro de energia mágica de 3 metros de \nraio por 6 metros de altura, centrado num ponto no solo \nque você possa ver, dentro do alcance. Runas brilhantes \naparecem toda vez que o cilindro toca o chão ou outra \nsuperfície. \nEscolha um ou mais dos tipos de criaturas seguintes: \ncelestiais, corruptores, elementais, fadas ou mortos-vivos. \nO círculo afeta uma criatura do tipo escolhido das \nseguintes maneiras: \n\nA criatura não consegue entrar no cilindro\nvoluntariamente por meios não-mágicos. Se a criatura\ntentar usar teletransporte ou viagem interplanar para\nfazê-lo, ela deve, primeiro, ser bem sucedida num teste\nde resistência de Carisma.\n\nA criatura tem desvantagem nas jogadas de ataque\ncontra alvos dentro do cilindro.\n\nAlvos dentro do cilindro não podem ser enfeitiçados,\namedrontados ou possuídos pela criatura.\nQuando você conjurar essa magia, você pode decidir \nque a mágica dela opere na direção reversa, prevenindo \nque uma criatura de um tipo especifico saia do cilindro e \nprotegendo os alvos fora dele. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 4° nível ou \nsuperior, a duração aumenta em 1 hora para cada nível \ndo espaço acima do 3°.","pr":"225 (PDF: 223)","cl":["Bruxo","Clérigo","Mago","Paladino"]},{"n":"CLARIVIDÊNCIA","nv":"3° nível","e":"adivinhação","tc":"10 minutos","al":"1,5 quilômetro","co":"V, S, M (um foco valendo, no mínimo, 100","du":"Concentração, até 10 minutos","d":"228 \nVocê cria um sensor invisível, dentro do alcance, em um \nlocal familiar a você (um local que você tenha visitado ou \nvisto antes) ou em um local obvio que não seja familiar a \nvocê (como atrás de uma porta, ao redor de um canto ou \nem um bosque de árvores). O sensor se mantem no local \npela duração e não pode ser atacado ou manipulado de \noutra forma. \nQuando você conjurar essa magia, escolhe visão ou \naudição. Você pode escolher sentir através do sensor como \nse você estivesse no espaço dele. Com sua ação, você pode \ntrocar entre visão e audição. \nUma criatura que puder ver o sensor (como uma \ncriatura beneficiada por ver o invisível ou visão \nverdadeira) vê um globo luminoso e intangível do \ntamanho do seu olho.","pr":"225 (PDF: 223)","cl":["Bardo","Clérigo","Feiticeiro","Mago"]},{"n":"CLONE","nv":"8° nível","e":"necromancia","tc":"1 hora","al":"Toque","co":"V, S, M (um diamante valendo, no","du":"Instantânea","d":"Essa magia produz uma duplicata inerte de uma criatura \nviva como uma garantia contra a morte. Esse clone é \nformado dentro de um receptáculo selado e cresce ao seu \ntamanho total, atingindo a maturidade após 120 dias; \nVocê também pode escolher que o clone seja uma versão \nmais jovem da mesma criatura. Ele permanece inerte e \ndura indefinidamente, enquanto seu receptáculo \npermanecer intocado. \nA qualquer momento, após o clone amadurecer, se a \ncriatura original morrer, sua alma é transferida para o \nclone, considerando que a alma está livre e deseje \nretornar. O clone é fisicamente idêntico ao original e tem \na mesma personalidade, memórias e habilidades, mas não \npossui qualquer equipamento do original. O físico da \ncriatura original permanece, se ainda existir, se tornando \ninerte e não podendo, consequentemente, ser trazido de \nvolta à vida, já que a alma da criatura está em outro \nlugar.","pr":"226 (PDF: 224)","cl":["Mago"]},{"n":"COLUNA DE CHAMAS","nv":"5° nível","e":"evocação","tc":"1 ação","al":"18 metros","co":"V, S, M (uma pitada de enxofre)","du":"Instantânea","d":"Uma coluna vertical de fogo divino emerge de baixo para \nos céus, no local que você especificar. Cada criatura num \ncilindro de 3 metros de raio por 12 metros de altura, \ncentrado num ponto dentro do alcance, deve realizar um \nteste de resistência de Destreza. Uma criatura sofre 4d6 \nde dano de fogo e 4d6 de dano radiante se falhar na \nresistência, ou metade desse dano se obtiver sucesso. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 6° nível ou \nsuperior, o dano de fogo ou o dano radiante (à sua \nescolha) aumenta em 1d6 por nível do espaço acima do 5°.","pr":"226 (PDF: 224)","cl":["Clérigo"]},{"n":"COMANDO","nv":"1° nível","e":"encantamento","tc":"1 ação","al":"18 metros","co":"V","du":"1 rodada","d":"Você pronuncia uma palavra de comando para uma \ncriatura que você possa ver dentro do alcance. O alvo deve \nser bem sucedido num teste de resistência de Sabedoria \nou seguirá seu comando no próximo turno dele. A magia \nnão tem efeito se o alvo for um morto-vivo, se ele não \nentender seu idioma ou se o comando for diretamente \nnocivo a ele. \nAlguns comandos típicos e seus efeitos a seguir. Você \npode proferir um comando diferente dos descritos aqui. Se \no fizer, o Mestre descreve como o alvo reage. Se o alvo não\npuder cumprir o comando, a magia termina. \nAproxime-se. O alvo se move para próximo de você o \nmáximo que puder na rota mais direta, terminando seu \nturno, se ele se mover a até 1,5 metro de você. \nLargue. O alvo larga o que quer que ele esteja \nsegurando, e termina seu turno. \nFuja. O alvo gasta seu turno se movendo para longe \nde você da forma mais rápida que puder. \nDeite-se. O alvo deita-se no chão e então, termina seu \nturno. \nParado. O alvo não se move e não realiza nenhuma \nação. Uma criatura voadora continua no alto, \nconsiderando que ela seja capaz de fazê-lo. Se ela tiver \nque se mover para continuar no alto, ela voa a mínima \ndistância necessária para permanecer no ar. \nEm Níveis Superiores. Se você conjurar essa magia \nusando um espaço de magia de 2° nível ou superior, você \npode afetar uma criatura adicional para cada nível do \nespaço acima do 1°. As criaturas devem estar a 9 metros \nentre si para serem afetadas.","pr":"226 (PDF: 224)","cl":["Clérigo","Paladino"]},{"n":"COMPREENDER IDIOMAS","nv":"1° nível","e":"adivinhação","tc":"1 ação","al":"Pessoal","co":"V, S, M (um pitada de fuligem e sal)","du":"1 hora","d":"Pela duração, você compreende o significado literal de \nqualquer idioma falado que você ouvir. Você também \ncompreende qualquer idioma escrito que vir, mas você \ndeve tocar a superfície onde as palavras estão escritas. \nLeva, aproximadamente, 1 minuto para ler uma página \nde texto. \nEssa magia não decifra mensagens secretas em textos \nou glifos, como um selo arcano, que não seja parte de um \nidioma escrito.","pr":"226 (PDF: 224)","cl":[]},{"n":"COMPULSÃO","nv":"4° nível","e":"encantamento","tc":"1 ação","al":"9 metros","co":"V, S","du":"Concentração, até 1 minuto","d":"Criaturas, à sua escolha, que você puder ver dentro do \nalcance e que puderem ouvir você, devem realizar um \nteste de resistência de Sabedoria. Um alvo passa \nautomaticamente nesse teste de resistência se ele não \npuder ser enfeitiçado. Se falhar no teste, um alvo é \nafetado por essa magia. Até a magia acabar, você pode \nusar uma ação bônus em cada um dos seus turnos, para \ndesignar uma direção horizontal a você. Cada criatura \n229 \nafetada deve se mover, da melhor forma possível, para \nessa direção no próximo turno dela. Ela pode realizar sua \nação antes de se mover. Depois de se mover dessa forma, \nela pode realizar outra resistência de Sabedoria para \ntentar acabar com o efeito. \nUm alvo não é obrigado a se mover em direção de um \nperigo obviamente mortal, como uma fogueira ou abismo, \nmas ele vai provocar ataques de oportunidade por se \nmover na direção designada.","pr":"226 (PDF: 224)","cl":["Bardo"]},{"n":"COMUNHÃO","nv":"5° nível","e":"adivinhação","tc":"1 minuto","al":"Pessoal","co":"V, S, M (incenso e um frasco de água","du":"1 minuto","d":"Você contata sua divindade ou um representante divino e \nfaz até três perguntas que podem ser respondidas com um \nsim ou não. Você deve fazer suas perguntas antes da \nmagia terminar. Você recebe uma resposta correta para \ncada pergunta. \nSeres divinos não são necessariamente oniscientes, \nportanto, você pode receber “incerto” como uma resposta \nse uma pergunta que diga respeito a uma informação \nalém do conhecimento da divindade. Em caso de uma \nresposta de única palavra puder levar ao engano ou \ncontrariar os interesses da divindade, o Mestre pode \noferecer uma frase curta como resposta, no lugar. \nSe você conjurar essa magia duas ou mais vezes antes \nde terminar um descanso longo, existe uma chance \ncumulativa de 25 por cento de cada conjuração, depois da \nprimeira que você fez, ter um resultado aleatório. O \nMestre faz essa jogada secretamente.","pr":"227 (PDF: 225)","cl":[]},{"n":"COMUNHÃO COM A NATUREZA","nv":"5° nível","e":"adivinhação","tc":"1 minuto","al":"Pessoal","co":"V, S","du":
