nde o \nsuficiente para comportar seu corpo inteiro, mesclando-se, \njunto com todo o equipamento que você esteja carregando, \ncom a rocha pela duração. Usando seu movimento, você \nentra na rocha num ponto que você possa tocar. Nada da \nsua presença ficará visível ou, de outra forma, detectável \npor sentidos não-mágicos. \nEnquanto estiver imerso na rocha, você não pode ver o \nque está ocorrendo do lado de fora e, qualquer teste de \nSabedoria (Percepção) que você fizer para ouvir os sons do \nlado de fora são feitos com desvantagem. Você continua \nconsciente do tempo transcorrido e pode conjurar magias \nem você enquanto estiver imerso na rocha. Você pode usar \nseu movimento para sair da rocha onde você entrou, o que \ntermina a magia. Do contrário, você não pode se mover. \nPequenos danos físicos a rocha não ferem você, mas \ndestruição parcial ou uma mudança no formato (fazendo \nque você já não caiba mais dentro dela) expelirá você \ncausando-lhe 6d6 de dano de concussão. A destruição \ncompleta da rocha (ou transmutação em uma substância \ndiferente) expelirá você causando-lhe 50 de dano de \nconcussão. Se você for expelido, você ficará caído no chão \nem um espaço desocupado perto de onde você entrou da \nprimeira vez.","pr":"256 (PDF: 254)","cl":["Bardo","Feiticeiro","Mago"]},{"n":"METAMORFOSE","nv":"4° nível","e":"transmutação","tc":"1 ação","al":"18 metros","co":"V, S, M (um casulo de lagarta)","du":"Concentração, até 1 hora","d":"Essa magia transforma uma criatura que você possa ver, \ndentro do alcance, em uma nova forma. Uma criatura \ninvoluntária deve realizar um teste de resistência de \nSabedoria para evitar o efeito. Um metamorfo obtém \nsucesso automaticamente nesse teste de resistência. \nA transformação permanece pela duração, ou até o \nalvo cair a 0 pontos de vida ou morrer. A nova forma pode \nser qualquer besta a qual o nível de desafio seja igual ou \nmenor que o do alvo (ou o nível do alvo, se ele não possuir \num nível de desafio). As estatísticas de jogo do alvo, \nincluindo seus valores de habilidades mentais, são \nsubstituídas pelas estatísticas da besta escolhida. Ele \nmantem sua tendência e personalidade. \nO alvo assume os pontos de vida da sua nova forma. \nQuando ele reverter a sua forma normal, a criatura \nretorna à quantidade de pontos de vida que ela tinha \nantes da transformação. Se ela reverter como resultado de \nter caído a 0 pontos de vida, qualquer dano excedente é \nrecebido pela sua forma normal. Contanto que o dano \nexcedente não reduza os pontos de vida da forma normal \nda criatura a 0, ela não cairá inconsciente. Essa magia \nnão pode afetar um alvo com 0 pontos de vida. \nA criatura é limitada em suas ações pela natureza da \nsua nova forma e ela não pode falar, conjurar magias ou \nrealizar qualquer outra ação que precise de mãos ou de \nvocalização. \nO equipamento do alvo mescla-se a sua nova forma. O \nalvo não pode ativar, empunhar ou, de outra forma, se \nbeneficiar de qualquer de seus equipamentos.  \n259","pr":"256 (PDF: 254)","cl":["Bardo","Druida","Feiticeiro","Mago"]},{"n":"METAMORFOSE VERDADEIRA","nv":"9° nível","e":"transmutação","tc":"1 ação","al":"9 metros","co":"V, S, M (uma gota de mercúrio, uma","du":"Concentração, até 1 hora","d":"Escolha uma criatura ou objeto não-mágico que você \npossa ver, dentro do alcance. Você transforma a criatura \nem uma criatura diferente, a criatura em um objeto ou o \nobjeto em uma criatura (o objeto não pode nem estar \nsendo vestido nem carregado por outra criatura). A \ntransformação permanece pela duração ou até o alvo cair \na 0 pontos de vida ou morrer. Se você se concentrar nessa \nmagia por toda a duração, a transformação será \npermanente. \nMetamorfos não são afetados por essa magia. Uma \ncriatura involuntária pode realizar um teste de \nresistência de Constituição e, se for bem sucedida, não \nserá afetada por essa magia. \nCriatura em Criatura. Se você transformar uma \ncriatura em outro tipo de criatura, a nova forma pode ser \nde qualquer tipo que você desejar, contanto que o nível de \ndesafio seja igual ou menor que o do alvo (ou o nível dele, \ncaso o alvo não possua nível de desafio). As estatísticas de \njogo do alvo, incluindo seus valores de habilidades \nmentais, são substituídas pelas estatísticas da nova \nforma. Ele mantem sua tendência e personalidade. \nO alvo assume os pontos de vida da sua nova forma e, \nquando ela reverter a sua forma normal, a criatura \nretorna à quantidade de pontos de vida que ela tinha \nantes da transformação. Se ela reverter como resultado de \nter caído a 0 pontos de vida, qualquer dano excedente é \nrecebido pela sua forma normal. Contanto que o dano \nexcedente não reduza os pontos de vida da forma normal \nda criatura a 0, ela não cairá inconsciente. Essa magia \nnão pode afetar um alvo com 0 pontos de vida. \nA criatura é limitada em suas ações pela natureza da \nsua nova forma e ela não pode falar, conjurar magias ou \nrealizar qualquer outra ação que precise de mãos ou de \nvocalização, a não ser que a nova forma seja capaz de tais \nações. \nO equipamento do alvo mescla-se a sua nova forma. O \nalvo não pode ativar, empunhar ou, de outra forma, se \nbeneficiar de qualquer de seus equipamentos.  \nObjeto em Criatura. Você pode transformar um \nobjeto em um tipo de criatura, contanto que o tamanho da \ncriatura não seja maior que o tamanho do objeto e, o nível \nde desafio da criatura será 9 ou menor. A criatura é \namigável a você e aos seus companheiros. Ela age em \ncada um dos seus turnos. Você decide qual ação ela \nrealizará e como ela se move. O Mestre tem as \nestatísticas da criatura e resolve todas as ações e \nmovimentos dela. \nSe a magia se tornar permanente, você não terá mais \ncontrole sobre a criatura. Ele pode continuar amigável a \nvocê, dependendo da forma como você a tratou. \nCriatura em Objeto. Se você transformar uma \ncriatura em um objeto, ela se transformará, junto com \ntudo que estiver vestindo ou carregando, nessa forma. As \nestatísticas da criatura tornam-se as do objeto e a \ncriatura não se lembrará do tempo que passou nessa \nforma, depois da magia acabar e ela retornar a sua forma \nnormal.","pr":"257 (PDF: 255)","cl":["Bardo","Bruxo","Mago"]},{"n":"MIRAGEM","nv":"7° nível","e":"ilusão","tc":"10 minutos","al":"Visão","co":"V, S","du":"10 dias","d":"Você faz um terreno em uma área de até 1,5 quilômetro \nquadrados pareça, soe, cheire e, até, sinta com outro tipo \nde terreno natural. Os formatos gerais do terreno \npermanecem os mesmos, no entanto. Campos abertos ou \numa estrada podem ser modificados para se \nassemelharem a um pântano, colina, fenda ou algum \noutro tipo de terreno difícil ou intransponível. Uma lagoa \npode ser modificada para se parecer com um prado, um \nprecipício com um declive suave ou um barranco \npedregoso com uma estrada larga e lisa.  \nSimilarmente, você pode alterar a aparência de \nestruturas ou adiciona-las onde nenhuma existia. A \nmagia não disfarça, esconde ou adiciona criaturas. \nA ilusão inclui elementos audíveis, visuais, táteis e \nolfativos, portanto, ela pode transformar solo limpo em \nterreno difícil (ou vice-versa) ou, de outra forma, impedir \no movimento através da área. Qualquer porção de terreno\nilusório (como uma rocha ou galho) que seja removida da \nárea da magia desaparece imediatamente. \nCriaturas com visão verdadeira podem ver através da \nilusão a verdadeira forma do terreno; porém, todos os \noutros elementos da ilusão permanecem, então, mesmo \nque a criatura esteja ciente da presença da ilusão, ela \nainda interage fisicamente com a ilusão.","pr":"257 (PDF: 255)","cl":["Bardo","Druida","Mago"]},{"n":"MISSÃO","nv":"5° nível","e":"encantamento","tc":"1 minuto","al":"18 metros","co":"V","du":"30 dias","d":"Você impõe um comando mágico a uma criatura que você \npossa ver, dentro do alcance, forçando-a a fazer algum \nserviço ou reprimindo-a por alguma ação ou curso de \natividade, como você decidir. Se a criatura puder \ncompreender você, ela deve ser bem sucedida num teste \nde resistência de Sabedoria ou ficará enfeitiçada por você \npela duração. Enquanto a criatura estiver enfeitiçada por \nvocê, ela sofrerá 5d6 de dano psíquico toda vez que ela \nagir de maneira diretamente contrária às suas instruções, \nmas não mais de uma vez por dia. Uma criatura que não \npuder compreender você não é afetada por essa magia. \nVocê pode emitir qualquer comando que escolher, \nexceto uma atividade que resulte em morte certa. Se você \nemitir um comando suicida, a magia termina. \nVocê pode terminar a magia prematuramente usando \numa ação para dissipa-la. As magias remover maldição, \nrestauração maior ou desejo também podem termina-la. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 7° ou 8° nível, a \nduração será 1 ano. Quando você conjurar essa magia \nusando um espaço de magia de 9° nível, a magia dura até \nser terminada por uma das magias mencionadas acima.","pr":"257 (PDF: 255)","cl":["Bardo","Clérigo","Druida","Mago","Paladino"]},{"n":"MÍSSEIS MÁGICOS","nv":"1° nível","e":"evocação","tc":"1 ação","al":"36 metros","co":"V, S","du":"Instantânea","d":"Você cria três dardos brilhantes de energia mística. Cada \ndardo atinge uma criatura, à sua escolha, que você possa \nver, dentro do alcance. Um dardo causa 1d4 + 1 de dano \nde energia ao alvo. Todos os dardos atingem \nsimultaneamente e você pode direciona-los para atingir \numa criatura ou várias. \n260 \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, a magia cria um dardo adicional para cada nível \ndo espaço acima do 1°.","pr":"257 (PDF: 255)","cl":["Feiticeiro","Mago"]},{"n":"MODIFICAR MEMÓRIA","nv":"5° nível","e":"encantamento","tc":"1 ação","al":"9 metros","co":"V, S","du":"Concentração, até 1 minuto","d":"Você tenta modelar as memórias de outra criatura. Uma \ncriatura que você possa ver, deve realizar um teste de \nresistência de Sabedoria. Se você estiver lutando com a \ncriatura, ela terá vantagem no teste de resistência. Se \nfalhar na resistência, o alvo fica enfeitiçado por você pela \nduração. O alvo enfeitiçado está incapacitado e não sabe o \nque está acontecendo seu redor, apesar de ainda poder \nouvir você. Se ele sofrer qualquer dano ou for alvo de \noutra magia, essa magia acaba, e nenhuma das memórias \ndo alvo é modificada. \nEnquanto esse feitiço durar, você pode afetar a \nmemória sobre um evento que o alvo participou nas \núltimas 24 horas e que não tenha durado mais de 10 \nminutos. Você pode, permanentemente, eliminar todas as \nmemórias desse evento, permitir que o alvo relembre do \nevento com perfeita clareza e riqueza de detalhes, mudar \nsua memória sobre os detalhes do evento ou criar uma \nmemória de outro evento qualquer. \nVocê deve falar ao alvo para descrever como sua \nmemória é afetada e ele deve ser capaz de compreender \nseu idioma para que as memórias modificadas se \nenraízem. A mente dele preenche qualquer lacuna nos \ndetalhes da sua descrição. Se a magia terminar antes de \nvocê ter finalizado a descrição das memórias modificadas, \na memória da criatura não será alterada. Do contrário, as \nmemórias modificadas tomam lugar quando a magia \nacabar. \nUma memória modificada não afeta, necessariamente, \ncomo uma criatura se comporta, particularmente se a \nmemória contradiz as inclinações, tendência ou crenças \nnaturais da criatura. Uma modificação ilógica na \nmemória, como implantar uma memória de como a \ncriatura gosta de se encharcar de ácido, é repudiada, \ntalvez como um sonho ruim. O Mestre pode considerar \numa modificação na memória muito absurda para afetar \numa criatura de uma forma significativa. \nUma magia remover maldição ou restauração maior, \nconjurada no alvo, restaura a verdadeira memória da \ncriatura. \nEm Níveis Superiores. Se você conjurar essa magia \nusando um espaço de magia de 6° nível ou superior, você \npode alterar a memória do alvo de um evento que \naconteceu a até 7 dias atrás (6° nível), 30 dias atrás (7° \nnível), 1 ano atrás (8° nível) ou em qualquer momento do \npassado da criatura (9° nível).","pr":"258 (PDF: 256)","cl":["Bardo","Mago"]},{"n":"MOLDAR ROCHAS","nv":"4° nível","e":"transmutação","tc":"1 ação","al":"Toque","co":"V, S, M (barro mole, que deve ser","du":"Instantânea","d":"Você toca um objeto de pedra de tamanho Médio ou \nmenor, ou uma seção de rocha com não mais de 1,5 metro \nem qualquer dimensão e modela-a em qualquer forma que \nsirva aos seus propósitos. Então, por exemplo, você \npoderia modelar uma pedra grande em uma arma, ídolo \nou caixão, ou fazer uma pequena passagem através de um \nmuro, contanto que o muro não tenha mais de 1,5 metro \nde espessura. Você poderia, também, modelar uma porta \nde pedra ou sua moldura para selar a porta. O objeto que \nvocê cria pode ter até duas dobradiças e um trinco, mas \ndetalhes mecânicos mais complexos não são possíveis.","pr":"258 (PDF: 256)","cl":["Clérigo","Druida","Mago"]},{"n":"MONTARIA FANTASMAGÓRICA","nv":"3° nível","e":"ilusão","tc":"1 minuto","al":"9 metros","co":"V, S","du":"1 hora","d":"Uma criatura Grande, quase-real, similar a um cavalo, \naparece no solo em um espaço desocupado, à sua escolha, \ndentro do alcance. Você decide a aparência da criatura, \nmas ela é equipada com sela, estribo e arreio. Qualquer \nequipamento criado por essa magia vira fumaça caso se \nafaste a mais de 3 metros da montaria. \nPela duração, você ou a criatura que você escolher, \npode cavalgar a montaria. A criatura usa as estatísticas \nde um cavalo de montaria, exceto por seu deslocamento \nser de 30 metros e poder viajar 15 quilômetros em uma \nhora, ou 20 quilômetros em um ritmo rápido. Quando a \nmagia acaba, a montaria desaparece gradualmente, \ndando ao cavaleiro 1 minuto para desmontar. A magia \nacaba se você usar uma ação para dissipa-la ou se a \nmontaria sofrer qualquer dano.","pr":"258 (PDF: 256)","cl":[]},{"n":"MOVER TERRA","nv":"6° nível","e":"transmutação","tc":"1 ação","al":"36 metros","co":"V, S, M (uma lâmina de ferro e uma","du":"Concentração, até 2 horas","d":"Escolha uma área de terreno não maior que 12 metros de \nlado, dentro do alcance. Você pode remodelar terra, areia \nou barro na área da maneira que quiser, pera duração. \nVocê pode erguer ou abaixar a elevação da área, criar ou \npreencher valas, levantar ou deitar um muro ou formar \numa coluna. A extensão de tais mudanças não pode \nexceder metade da maior dimensão da área. Portanto, se \nvocê afetar um quadrado de 12 metros, você poderá criar \num pilar de até 6 metros de altura, erguer ou abaixar a \nelevação do quadrado em até 6 metros ou cavar uma vala \nde até 6 metros de profundidade e assim por diante. Leva \n10 minutos para completar essas modificações. \nAo final de cada 10 minutos que você gastar se \nconcentrando nessa magia, você pode escolher uma nova \nárea de terreno para afetar. \nDevido às transformações no terreno ocorrerem \nlentamente, as criaturas na área normalmente não podem \nficar presas ou sofrer dano pela movimentação do solo. \nEssa magia pode manipular rocha natural ou \nconstruções de pedra. Pedra e estruturas deslocam-se \npara acomodar o novo terreno. Se a forma pela qual você \nmodela o terreno poderia tornar uma estrutura instável, \nela poderá desmoronar. \nSimilarmente, essa magia não afeta diretamente o \ncrescimento da vegetação. A terra movida carrega \nquaisquer plantas no caminho junto com ela. \n261","pr":"258 (PDF: 256)","cl":["Druida","Feiticeiro","Mago"]},{"n":"MOVIMENTAÇÃO LIVRE","nv":"4° nível","e":"abjuração","tc":"1 ação","al":"Toque","co":"V, S, M (uma fita de couro, enrolada no","du":"1 hora","d":"Você toca uma criatura voluntária. Pela duração, os \nmovimentos do alvo não são afetados por terreno difícil e \nmagias e outros efeitos mágicos também não podem \nreduzir o deslocamento do alvo ou fazer com que o alvo \nfique paralisado ou impedido. \nO alvo também pode gastar 1,5 metro de deslocamento \npara escapar, automaticamente, de impedimentos não-\nmágicos, como algemas ou o agarrão de uma criatura. \nFinalmente, estar submerso não impõe penalidades no \ndeslocamento ou ataques do alvo.","pr":"259 (PDF: 257)","cl":["Bardo","Clérigo","Druida","Patrulheiro"]},{"n":"MURALHA DE ENERGIA","nv":"5° nível","e":"evocação","tc":"1 ação","al":"36 metros","co":"V, S, M (um pouco de pó feito de uma","du":"Concentração, até 10 minutos","d":"Uma muralha invisível de energia aparece do nada num \nponto, à sua escolha, dentro do alcance. A muralha \naparece em qualquer orientação que você escolher, como \numa barreira horizontal ou vertical ou em uma \nangulação. Ela pode estar flutuando no ar ou apoiada em \numa superfície sólida. Você pode molda-la em uma cúpula \nhemisférica ou uma esfera com um raio de até dez painéis \nde 3 metros por 3 metros. Cada painel deve ser contíguo \ncom outro painel. Em qualquer formato, a muralha terá \n0,6 centímetros de espessura. Ela permanece pela \nduração. Se a muralha passar pelo espaço ocupado por \numa criatura quando ela surgir, a criatura será \nempurrada para um dos lados da muralha (você escolhe \nqual lado). \nNada pode passar fisicamente através da muralha. \nEla é imune a todos os danos e não pode ser dissipada por \ndissipar magia. A magia desintegrar destrói a muralha \ninstantaneamente, no entanto. A muralha também se \nestende ao Plano Etéreo, bloqueando a viagem etérea \natravés dela.","pr":"259 (PDF: 257)","cl":["Mago"]},{"n":"MURALHA DE ESPINHOS","nv":"6° nível","e":"conjuração","tc":"1 ação","al":"36 metros","co":"V, S, M (um punhado de espinhos)","du":"Concentração, até 10 minutos","d":"Você cria uma muralha de arbustos robustos, flexíveis, \nemaranhados e eriçados com espinhos pontudos. A \nmuralha aparece, dentro do alcance, em uma superfície \nsólida e permanece pela duração. Você escolher fazer a \nmuralha com até 18 metros de comprimento, 3 metros de \naltura e 1,5 metro de espessura ou um círculo com 6 \nmetros de diâmetro e até 6 metros de altura com 1,5 \nmetro de espessura. A muralha bloqueia a visão. \nQuando a muralha aparece, cada criatura dentro da \nárea deve realizar um teste de resistência de Destreza. Se \nfalhar na resistência, uma criatura sofrerá 7d8 de dano \nperfurante ou metade desse dano se obtiver sucesso. \nUma criatura pode se mover através da muralha, \nembora lentamente e dolorosamente. Para cada 1,5 metro \nque a criatura atravesse da muralha, ela deve gastar 6 \nmetros de movimento. Além disso, a primeira vez que a \ncriatura entrar na muralha num turno ou termina o \nturno nela, ela deve fazer um teste de resistência de \nDestreza. Ela sofre 7d8 de dano cortante se falhar na \nresistência ou metade desse dano se obtiver sucesso. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 7° nível ou \nsuperior, ambos os tipos de dano aumentam em 1d8 para \ncada nível do espaço acima do 6°.","pr":"259 (PDF: 257)","cl":["Druida"]},{"n":"MURALHA DE FOGO","nv":"4° nível","e":"evocação","tc":"1 ação","al":"36 metros","co":"V, S, M (um pequeno pedaço de fósforo)","du":"Concentração, até 1 minuto","d":"Você cria uma muralha de fogo numa superfície sólida \ndentro do alcance. Você pode fazer uma muralha de até \n18 metros de comprimento, 6 metros de altura e 30 \ncentímetros de espessura ou uma muralha anelar de até 6 \nmetros de diâmetro, 6 metros de altura e 30 centímetros \nde espessura. A muralha é opaca e permanece pela \nduração. \nQuando a muralha aparece, cada criatura dentro da \nárea dela deve realizar um teste de resistência de \nDestreza. Se falhar na resistência, uma criatura sofrerá \n5d8 de dano, ou metade desse dano se passar na \nresistência. \nUm lado da muralha, escolhido por você no momento \nda conjuração da magia, causa 5d8 de dano de fogo a cada \ncriatura que terminar o turno dela a até 3 metros desse \nlado ou dentro da muralha. Uma criatura sofre o mesmo \ndano quando entra na muralha pela primeira vez num \nturno ou termina seu turno nela. O outro lado da muralha \nnão causa dano algum. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 5° nível ou \nsuperior, o dano aumenta em 1d8 para cada nível do \nespaço acima do 4°.","pr":"259 (PDF: 257)","cl":["Druida","Feiticeiro","Mago"]},{"n":"MURALHA DE GELO","nv":"6° nível","e":"evocação","tc":"1 ação","al":"36 metros","co":"V, S, M (um pequeno pedaço de quartzo)","du":"Concentração, até 10 minutos","d":"Você cria uma muralha de gelo numa superfície sólida \ndentro do alcance. Você pode molda-la em uma cúpula \nhemisférica ou uma esfera com um raio de até dez painéis \nde 3 metros por 3 metros. Cada painel deve ser contíguo \ncom outro painel. Em qualquer formato, a muralha terá \n0,6 centímetros de espessura. Ela permanece pela \nduração. \nSe a muralha passar pelo espaço ocupado por uma \ncriatura quando ela surgir, a criatura na área será \nempurrada para um dos lados da muralha (você escolhe \nqual lado) e deve realizar um teste de resistência de \nDestreza. Se falhar na resistência, a criatura sofrerá 10d6 \nde dano de frio ou metade desse dano se passar na \nresistência. \nA muralha é um objeto que pode ser danificado e \nentão, partido. Ela tem CA 12, 30 pontos de vida por \nseção de 3 metros e é vulnerável a dano de fogo. Reduzir \nos pontos de vida de uma seção de 3 metros da muralha a \n0 destruirá essa seção, deixando para trás uma camada \nde ar gelado no espaço ocupado pela muralha. Uma \ncriatura que atravesse a camada de ar gelado pela \nprimeira vez num turno, deve realizar um teste de  \n262 \n263 \nresistência de Constituição. Essa criatura sofrerá 5d6 de \ndano de frio se fracassar na resistência, ou metade desse \ndano se obtiver sucesso. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 7° nível ou \nsuperior, o dano causado quando ela aparece aumenta em \n2d6 e o dano por atravessar através da camada de ar \ngelado aumenta em 1d6 para cada nível do espaço acima \ndo 6°.","pr":"259 (PDF: 257)","cl":["Mago"]},{"n":"MURALHA DE PEDRA","nv":"5° nível","e":"conjuração","tc":"1 ação","al":"36 metros","co":"V, S, M (um pequeno bloco de granito)","du":"Concentração, até 10 minutos","d":"Uma muralha não-mágica de rocha sólida surge do nada \nnum ponto, à sua escolha, dentro do alcance. A muralha \ntem 15 centímetros de espessura e é composta por dez \npainéis de 3 metros por 3 metros. Cada painel deve ser \ncontíguo com, pelo menos, outro painel. \nAlternativamente, você pode criar painéis de 3 metros por \n6 metros com apenas 7,5 centímetros de espessura. \nSe a muralha passar pelo espaço ocupado por uma \ncriatura quando ela surgir, a criatura será empurrada \npara um dos lados da muralha (você escolhe qual lado). Se \na criatura fosse ser rodeada por todos os lados da \nmuralha (ou pela muralha e outra superfície sólida), a \ncriatura pode realizar um teste de resistência de \nDestreza. Se obtiver sucesso, ela pode usar sua reação \npara se mover até seu deslocamento, assim não ficando \nmais cercada pela muralha. \nA muralha pode ter qualquer formato que você \ndesejar, no entanto, ela não pode ocupar o mesmo espaço \nde uma criatura ou objeto. A muralha não precisa ser \nvertical ou se apoiar em qualquer fundação estável. Ela \ndeve, no entanto, se fundir e estar solidamente suportada \npor rocha existente.  Então, você pode usar essa magia \npara criar uma ponte sobre um abismo ou criar uma \nrampa. \nSe você criar um vão com mais de 6 metros de \ncomprimento, você deve reduzir o tamanho de cada painel \nà metade para criar suportes. Você pode moldar \ngrosseiramente a parede para criar merlões, ameias e \nassim por diante. \nA muralha é um objeto feito de pedra que pode ser \ndanificado e então, partido. Cada painel tem CA 15 e 30 \npontos de vida para cada 2,5 centímetros de espessura. \nReduzir os pontos de vida de um painel a 0, o destruirá e \npode fazer painéis conectados desmoronarem, à critério do \nMestre. \nSe você mantiver sua concentração nessa magia por \ntoda a duração, a muralha se tornará permanente e não \npoderá ser dissipada. Do contrário, a muralha desaparece \nquando a magia acabar.","pr":"261 (PDF: 259)","cl":["Druida","Feiticeiro","Mago"]},{"n":"MURALHA DE VENTO","nv":"3° nível","e":"evocação","tc":"1 ação","al":"36 metros","co":"V, S, M (um leque minúsculo e uma pena","du":"Concentração, até 1 minuto","d":"Uma muralha de ventos fortes ergue-se do chão num \nponto, à sua escolha, dentro do alcance. Você pode fazer a \nmuralha ter até 15 metros de comprimento, 4,5 metros de \naltura e 30 centímetros de espessura. Você pode moldar a \nmuralha em qualquer forma que desejar, contanto que ela \nfaça um caminho contínuo pelo solo. A muralha \npermanece pela duração. \nQuando a muralha aparece, cada criatura dentro da \nárea dela deve realizar um teste de resistência de Força. \nUma criatura sofre 3d8 de dano de concussão se falhar na \nresistência, ou metade desse dano se obtiver sucesso. \nOs ventos fortes mantem névoa, fumaça e outros gases \nafastados. Criaturas ou objetos voadores Pequenos ou \nmenores, não podem atravessar a muralha. Materiais \nleves e soltos trazidos para a muralha são arremessados \npara cima. Flechas, virotes e outros projéteis ordinários \ndisparados contra alvos além da muralha são defletidos \npara cima e erram automaticamente. (Pedras \narremessadas por gigantes ou armas de cerco e projéteis \nsimilares, não são afetados.) As criaturas em forma \ngasosa não podem atravessa-la.","pr":"261 (PDF: 259)","cl":["Druida","Patrulheiro"]},{"n":"MURALHA PRISMÁTICA","nv":"9° nível","e":"abjuração","tc":"1 ação","al":"18 metros","co":"V, S","du":"10 minutos","d":"Uma plano cintilante multicolorido de luzes forma uma \nparece vertical opaca – de até 27 metros de comprimento, \n9 metros de altura e 2,5 centímetros de espessura – \ncentrada num ponto que você possa ver, dentro do \nalcance. Alternativamente, você pode moldar a muralha \nnuma esfera de 9 metros de diâmetro centrada num \nponto, à sua escolha, dentro do alcance. A muralha \npermanece no lugar pela duração. Se você posicionar a \nmuralha de forma que ela passaria através do espaço \nocupado por uma criatura, a magia falha e sua ação e o \nespaço de magia são desperdiçados. \nA muralha emite luz plena num raio de 30 metros e \npenumbra por 30 metros adicionais. Você e as criaturas \ndesignadas, no momento que você conjurou a magia, \npodem passar através e permanecer perto da muralha \nsem se ferirem. Se outra criatura que puder ver a \nmuralha se aproximar mais de 6 metros dela ou começar \nseu turno lá, a criatura deve realizar um teste de \nresistência de Constituição ou ficará cega por 1 minuto. \nA muralha consiste em sete camadas, cada uma de \numa cor diferente. Quando uma criatura tenta tocar ou \npassar através da muralha, ela atravessa uma camada de \ncada vez, até atravessar todas as camadas da muralha. À \nmedida que ela passa ou toca cada camada, a criatura \nrealiza um teste de resistência de Destreza ou será \nafetada pelas propriedades daquela camada, como \ndescrito abaixo. \nA muralha pode ser destruída, também, uma camada \npor vez, em ordem de vermelho à violeta, pelos meios \nespecificados em cada camada. Quando uma camada é \ndestruída, ela permanece assim pela duração da magia. \nUm bastão do cancelamento destrói uma muralha \nprismática, mas um campo antimagia não produz efeito \nnela. \n1. Vermelho. O alvo sofre 10d6 de dano de fogo se\nfalhar na resistência ou metade desse dano se obtiver \nsucesso. Enquanto essa camada estiver no lugar, ataques \nà distância não-mágicos não podem atravessar a muralha. \nA camada pode ser destruída causando, pelo menos, 25 de \ndano de frio a ela. \n2. Laranja. O alvo sofre 10d6 de dano de ácido se\nfalhar na resistência ou metade desse dano se obtiver \nsucesso. Enquanto essa camada estiver no lugar, ataques \nà distância mágicos não podem atravessar a muralha. A \ncamada pode ser destruída por um vento forte. \n264 \n3. Amarelo. O alvo sofre 10d6 de dano elétrico se\nfalhar na resistência ou metade desse dano se obtiver \nsucesso. A camada pode ser destruída causando, pelo \nmenos, 60 de dano de energia a ela. \n4. Verde. O alvo sofre 10d6 de dano de veneno se\nfalhar na resistência ou metade desse dano se obtiver \nsucesso. A magia criar passagem ou outra magia de nível \nigual ou superior que possam abrir um portal em uma \nsuperfície sólida, destroem essa camada. \n5. Azul. O alvo sofre 10d6 de dano de frio se falhar na\nresistência ou metade desse dano se obtiver sucesso. A \ncamada pode ser destruída causando, pelo menos, 25 de \ndano de fogo a ela. \n6. Anil. Se falhar na resistência, o alvo ficará\nimpedido. Ele deve então, fazer um teste de resistência de \nConstituição ao final de cada um dos turnos dele. Se \nobtiver sucesso três vezes, a magia termina. Se falhar na \nresistência três vezes, ela se torna pedra é afetada pela \ncondição petrificado. Os sucessos e falhas não precisam \nser consecutivos; anote ambos os resultados até o alvo \nacumular três de mesmo tipo. \nEnquanto essa camada estiver no lugar, magias não \npodem ser conjuradas através da muralha. A camada \npode ser destruída por luz plena emitida pela magia luz \ndo dia ou uma magia similar de nível equivalente ou \nsuperior. \n7. Violeta. Se falhar na resistência, o alvo ficará cego.\nEle deve realizar um teste de resistência de Sabedoria no \ninício do seu próximo turno. Um sucesso na resistência \nacaba com a cegueira. Se falhar na resistência, a criatura \né transportada para outro plano de existência, escolhido \npelo Mestre, e não estará mais cego. (Tipicamente, uma \ncriatura que esteja em um plano que não seja o seu plano \nnatal é banida para lá, enquanto que outras criaturas \ngeralmente são enviadas para os Planos Astral ou \nEtéreo.) Essa camada é destruída pela magia dissipar \nmagia ou por uma magia similar de nível equivalente ou \nsuperior que possa acabar com magias e efeitos mágicos.","pr":"261 (PDF: 259)","cl":["Mago"]},{"n":"NEVASCA","nv":"3° nível","e":"conjuração","tc":"1 ação","al":"45 metros","co":"V, S, M (um punhado de poeira e","du":"Concentração, até 1 minuto","d":"Até a magia acabar, uma chuva congelante e neve caem \nnum cilindro de 6 metros de altura por 12 metros de raio, \ncentrado num ponto, à sua escolha, dentro do alcance. A \nárea é de escuridão densa e, chamas expostas na área são \nextintas. \nO solo na área é coberto por gelo escorregadio, \ntornando-o terreno difícil. Quando uma criatura entrar na \nárea da magia pela primeira vez num turno ou começar \nseu turno nela, ela deve realizar um teste de resistência \nde Destreza. Se falhar, cairá no chão. \nSe um, criatura estiver se concentrando na área da \nmagia, a criatura deve realizar um teste de resistência de \nConstituição contra a CD da magia, ou perderá a \nconcentração.","pr":"262 (PDF: 260)","cl":["Druida","Feiticeiro","Mago"]},{"n":"NÉVOA FÉTIDA","nv":"3° nível","e":"conjuração","tc":"1 ação","al":"27 metros","co":"V, S, M (um ovo podre ou várias folhas de","du":"Concentração, até 1 minuto","d":"Você cria uma esfera, de 6 metros de raio, de gás \namarelado nauseante, centrada num ponto dentro do \nalcance. A névoa se espalha, dobrando esquinas, e sua \nárea é de escuridão densa. A névoa perdura no ar pela \nduração. \nCada criatura que estiver completamente dentro da \nnévoa no início do seu turno deve realizar um teste de \nresistência de Constituição contra veneno. Se falhar na \nresistência, a criatura gastará sua ação nesse turno \ntentando vomitar e cambaleando. \nUm vento moderado (pelo menos 15 quilômetros por \nhora) dispersará a névoa depois de 4 rodadas. Um vento \nforte (pelo menos 30 quilômetros por hora) dispersará a \nnévoa após 1 rodada.","pr":"262 (PDF: 260)","cl":["Bardo","Feiticeiro","Mago"]},{"n":"NÉVOA MORTAL","nv":"5° nível","e":"conjuração","tc":"1 ação","al":"36 metros","co":"V, S","du":"Concentração, até 10 minutos","d":"Você cria uma esfera de nevoeiro venenoso de cor \namarelo-esverdeado, com 6 metros de raio, centrado em \num ponto, à sua escolha, dentro do alcance. O nevoeiro se \nespalha, dobrando esquinas. Ele permanece pela duração \nou até um vento forte dispersar o nevoeiro, terminando a \nmagia. Sua área é de escuridão densa. \nQuando uma criatura entra na área da magia pela \nprimeira vez no turno dela ou começa seu turno lá, essa \ncriatura deve realizar um teste de resistência de \nConstituição. A criatura sofre 5d8 de dano de veneno, ou \nmetade desse dano, se passar no teste. As criaturas serão \nafetadas mesmo se prenderem a respiração ou não \nprecisarem respirar. \nO nevoeiro se afasta 3 metros de você no começo de \ncada um dos seus turnos, deslizando pela superfície do \nsolo. Os vapores são mais pesados que o ar, mantendo-se \nnos níveis mais baixos do terreno, até mesmo caindo em \naberturas. \nEm Níveis Superiores. Se você conjurar essa magia \nusando um espaço de magia de 6° nível ou superior, o \ndano aumenta em 1d8 para cada nível do espaço acima do \n5°.","pr":"262 (PDF: 260)","cl":["Feiticeiro","Mago"]},{"n":"NÉVOA OBSCURECENTE","nv":"1° nível","e":"conjuração","tc":"1 ação","al":"36 metros","co":"V, S","du":"Concentração, até 1 hora","d":"Você cria uma esfera de 6 metros de raio de névoa, \ncentrada num ponto, dentro do alcance. A esfera se \nespalha, dobrando esquinas, e a área dela é de escuridão \ndensa. Ela permanece pela duração ou até um vento \nmoderado ou mais rápido (pelo menos 15 quilômetros por \nhora) dispersa-la. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, o raio da névoa aumenta em 6 metros para cada \nnível do espaço acima do 1°.","pr":"262 (PDF: 260)","cl":["Druida","Feiticeiro","Mago","Patrulheiro"]},{"n":"NUBLAR","nv":"2° nível","e":"ilusão","tc":"1 ação","al":"Pessoal","co":"V","du":"Concentração, até 1 minuto","d":"265 \nSeu corpo se torna turvo, mudando e oscilando para todos \nque puderem ver você. Pela duração, qualquer criatura \nterá desvantagem nas jogadas de ataque contra você. Um \natacante é imune a esse efeito se não depender de visão, \ncomo os que tenham percepção às cegas ou os que \npuderem ver através de ilusões, como os com visão \nverdadeira.","pr":"262 (PDF: 260)","cl":["Feiticeiro","Mago"]},{"n":"NUVEM DE ADAGAS","nv":"2° nível","e":"conjuração","tc":"1 ação","al":"18 metros","co":"V, S, M (uma lasca de vidro)","du":"Concentração, até 1 minuto","d":"Você preenche o ar com adagas giratórias num cubo de \n1,5 metro quadrado, centrado em m ponto, à sua escolha, \ndentro do alcance. Uma criatura sofre 4d4 de dano \ncortante quando entra na área da magia pela primeira \nvez no turno dela ou começa seu turno na área. \nEm Níveis Superiores. Se você conjurar essa magia \nusando um espaço de magia de 3° nível ou superior, o \ndano aumenta em 2d4 para cada nível do espaço acima do \n2°.","pr":"263 (PDF: 261)","cl":["Bardo","Bruxo","Feiticeiro","Mago"]},{"n":"NUVEM INCENDIÁRIA","nv":"8° nível","e":"conjuração","tc":"1 ação","al":"45 metros","co":"V, S","du":"Concentração, até 1 minuto","d":"Uma nuvem de fumaça rodopiante que dispara brasas \nincandescentes aparece numa esfera de 6 metros centrada \nnum ponto, dentro do alcance. A nuvem se espalha, \ndobrando esquinas, e gera escuridão densa. Ela \npermanece pela duração ou até que um vento de \nvelocidade moderada ou mais forte (pelo menos 15 \nquilômetros por hora) a disperse. \nQuando a nuvem aparece, cada criatura deve realizar \num teste de resistência de Destreza. Uma criatura sofre \n10d8 de dano de fogo se falhar na resistência ou metade \ndesse dano se passar. Uma criatura deve, também, \nrealizar um teste de resistência quando entrar na área da \nmagia pela primeira vez num turno ou terminar seu \nturno nela. \nA nuvem se afasta 3 metros de você numa direção, que \nvocê escolheu, no começo de cada um dos seus turnos.","pr":"263 (PDF: 261)","cl":["Feiticeiro","Mago"]},{"n":"OLHO ARCANO","nv":"4° nível","e":"adivinhação","tc":"1 ação","al":"9 metros","co":"V, S, M (um punhado de pelo de morcego)","du":"Concentração, até 1 hora","d":"Você cria um olho mágico invisível, dentro do alcance, que \nflutua no ar pela duração. \nVocê mentalmente recebe informações visuais do olho, \nque possui visão normal e visão no escuro com alcance de \n9 metros. O olho pode ver em todas as direções. \nCom uma ação, você pode mover o olho até 9 metros \nem qualquer direção. Não existe limite de quão longe de \nvocê o olho pode se mover, mas ele não pode entrar em \noutro plano de existência. Uma barreira solida bloqueia o \nmovimento do olho, mas o olho pode passar através de \naberturas de até 3 centímetros de diâmetro. \n266","pr":"263 (PDF: 261)","cl":["Mago"]},{"n":"ONDA DESTRUTIVA","nv":"5° nível","e":"evocação","tc":"1 ação","al":"Pessoal (9 metros de raio)","co":"V","du":"Instantânea","d":"Você golpeia o chão, criando uma explosão de energia \ndivina que se propaga de você. Cada criatura, à sua \nescolha, a até 9 metros de você, deve ser bem sucedida em \num teste de resistência de Constituição ou sofrerá 5d5 de \ndano trovejante, assim como 5d6 de dano radiante ou \nnecrótico (à sua escolha), e será derrubada no chão. Uma \ncriatura que obtenha sucesso no teste de resistência sofre \nmetade desse dano e não é derrubada no chão.","pr":"264 (PDF: 262)","cl":["Paladino"]},{"n":"ONDA TROVEJANTE","nv":"1° nível","e":"evocação","tc":"1 ação","al":"Pessoal (cubo de 4,5 metros)","co":"V, S","du":"Instantânea","d":"Uma onda de força trovejante varre tudo a partir de você. \nCada criatura num cubo de 4,5 metros originado em você, \ndeve realizar um teste de resistência de Constituição. Se \nfalhar na resistência, uma criatura sofrerá 2d8 de dano \ntrovejante e será empurrada 3 metros para longe de você. \nSe obtive sucesso na resistência, a criatura sofrerá \nmetade desse dano e não será empurrada. \nAlém disso, objetos soltos que estiverem \ncompletamente dentro da área de efeito serão \nautomaticamente empurrados 3 metros para longe de \nvocê pelo efeito da magia e a magia emitirá um \nressonante barulho de trovão audível a até 90 metros. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, o dano aumenta em 1d8 para cada nível acima \ndo 1°.","pr":"264 (PDF: 262)","cl":["Bardo","Druida","Feiticeiro","Mago"]},{"n":"ORAÇÃO CURATIVA","nv":"2° nível","e":"evocação","tc":"10 minutos","al":"9 metros","co":"V","du":"Instantânea","d":"Até seis criaturas, à sua escolha, que você possa ver, \ndentro do alcance, recuperam uma quantidade de pontos \nde vida igual a 2d8 + seu modificador de habilidade de \nconjuração, cada uma. Essa magia não afeta mortos-vivos \nou constructos. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 3° nível ou \nsuperior, a cura aumenta em 1d8 para cada nível do \nespaço acima do 2°.","pr":"264 (PDF: 262)","cl":["Clérigo"]},{"n":"ORBE CROMÁTICA","nv":"1° nível","e":"evocação","tc":"1 ação","al":"27 metros","co":"V, S, M (um diamante valendo, no","du":"Instantânea","d":"Você arremessa uma esfera de energia de 12 centímetros \nde diâmetro numa criatura que você possa ver dentro do \nalcance. Você escolhe ácido, frio, fogo, elétrico, veneno ou \ntrovejante para o tipo de orbe que você cria e, então, \nrealiza um ataque à distância com magia. Se o ataque \natingir, a criatura sofre 3d8 de dano do tipo escolhido. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, o dano aumenta em 1d8 para cada nível do \nespaço acima do 1°.","pr":"264 (PDF: 262)","cl":["Feiticeiro","Mago"]},{"n":"ORIENTAÇÃO","nv":"Truque","e":"adivinhação","tc":"1 ação","al":"Toque","co":"V, S","du":"Concentração, até 1 minuto","d":"Você toca uma criatura voluntária. Uma vez, antes da \nmagia acabar, o alvo pode rolar um d4 e adicionar o \nnúmero rolado a um teste de habilidade a escolha dele. \nEle pode rolar o dado antes ou depois de realizar o teste \nde habilidade. Após isso, a magia termina.","pr":"264 (PDF: 262)","cl":["Clérigo","Druida"]},{"n":"PADRÃO HIPNÓTICO","nv":"3° nível","e":"ilusão","tc":"1 ação","al":"36 metros","co":"S, M (uma vareta brilhante de incenso ou","du":"Concentração, até 1 minuto","d":"Você cria um padrão retorcido de cores que se entrelaça \natravés do ar dentro de um cubo de 9 metros, dentro do \nalcance. O padrão aparece por um momento depois \ndesaparece. Cada criatura na área que ver o padrão, deve \nrealizar um teste de resistência de Sabedoria. Se falhar \nna resistência, a criatura fica enfeitiçada pela duração. \nEnquanto estiver enfeitiçada por essa magia, a criatura \nestá incapacitada e tem deslocamento 0. \nA magia acaba em uma criatura afetada se ela sofrer \ndano ou se alguém usar uma ação para agitar a criatura \npara tira-la de seu estupor.","pr":"264 (PDF: 262)","cl":["Bardo","Bruxo","Feiticeiro","Mago"]},{"n":"PALAVRA CURATIVA","nv":"1° nível","e":"evocação","tc":"1 ação bônus","al":"18 metros","co":"V","du":"Instantânea","d":"Uma criatura, à sua escolha, que você possa ver dentro do \nalcance recupera uma quantidade de pontos de vida igual \na 1d4 + seu modificador de habilidade de conjuração. Essa \nmagia não tem efeito em mortos-vivos ou constructos \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, a cura aumenta em 1d4 para cada nível do \nespaço acima do 1°.","pr":"264 (PDF: 262)","cl":["Bardo","Clérigo","Druida"]},{"n":"PALAVRA CURATIVA EM MASSA","nv":"3° nível","e":"evocação","tc":"1 ação bônus","al":"18 metros","co":"V","du":"Instantânea","d":"À medida que você brada palavras de restauração, até \nseis criaturas, à sua escolha, que você possa ver, dentro \ndo alcance, recuperam uma quantidade de pontos de vida \nigual a 1d4 + seu modificador de habilidade de \nconjuração. Essa magia não afeta mortos-vivos ou \nconstructos. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 4° nível ou \nsuperior, a cura aumenta em 1d4 para cada nível do \nespaço acima do 3°. \n267","pr":"264 (PDF: 262)","cl":["Clérigo"]},{"n":"PALAVRA DE PODER ATORDOAR","nv":"8° nível","e":"encantamento","tc":"1 ação","al":"18 metros","co":"V","du":"Instantânea","d":"Você pronuncia uma palavra de poder que pode oprimir a \nmente de uma criatura que você possa ver, dentro do \nalcance, deixando-a estupefata. Se o alvo escolhido estiver \ncom 150 pontos de vida ou menos, ele ficará atordoado. Do \ncontrário, essa magia não produz efeito. \nO alvo atordoado deve realizar um teste de resistência \nde Constituição no final de cada um dos turnos dele. Se \nobtiver sucesso na resistência, o efeito de atordoamento \ntermina.","pr":"265 (PDF: 263)","cl":[]},{"n":"PALAVRA DE PODER CURAR","nv":"9° nível","e":"evocação","tc":"1 ação","al":"Toque","co":"V, S","du":"Instantânea","d":"Uma onda de energia curativa inunda a criatura tocada. \nO alvo recupera todos os seus pontos de vida. Se a \ncriatura estiver enfeitiçada, amedrontada, paralisada ou \natordoada, a condição termina. Se a criatura estiver \ncaída, ela pode usar a reação dela para se levantar. Essa \nmagia não afeta mortos-vivos ou constructos.","pr":"265 (PDF: 263)","cl":["Bardo"]},{"n":"PALAVRA DE PODER MATAR","nv":"9° nível","e":"encantamento","tc":"1 ação","al":"18 metros","co":"V","du":"Instantânea","d":"Você profere uma palavra de poder que pode compelir \numa criatura que você possa ver, dentro do alcance, a \nmorrer instantaneamente. Se o alvo escolhido estiver com \n100 pontos de vida ou menos, ele morre. Do contrário, \nessa magia não produz efeito.","pr":"265 (PDF: 263)","cl":["Bardo","Bruxo","Feiticeiro","Mago"]},{"n":"PALAVRA DE RECORDAÇÃO","nv":"6° nível","e":"conjuração","tc":"1 ação","al":"1,5 metro","co":"V","du":"Instantânea","d":"Você e até cinco criaturas voluntária a 1,5 metro de você, \ninstantaneamente são teletransportadas para um \nsantuário previamente designado. Você e qualquer \ncriatura que se teletransportar com você, aparece no \nespaço desocupado mais próximo do ponto que você \ndesignou quando preparou seu santuário (veja abaixo). Se \nvocê conjurar essa magia sem ter preparado um santuário \nprimeiro, a magia não funciona. \nVocê deve designar um santuário na conjuração dessa \nmagia dentro de um local, como um templo dedicado ou \nfortemente ligado a sua divindade. Se você tentar \nconjurar essa magia dessa forma em uma área que não \nseja dedicada à sua divindade, a magia não funciona.","pr":"265 (PDF: 263)","cl":["Clérigo"]},{"n":"PALAVRA DIVINA","nv":"7° nível","e":"evocação","tc":"1 ação bônus","al":"9 metros","co":"V","du":"Instantânea","d":"Você profere uma palavra divina, imbuída com o poder \nque moldou o mundo na aurora da criação. Escolha \nqualquer quantidade de criaturas que você possa ver \ndentro do alcance. Cada criatura que puder ouvir você \ndeve realizar um teste de resistência de Carisma. Ao \nfalhar na resistência, uma criatura sofre um efeito \nbaseado nos seus pontos de vida atuais: \n\n50 pontos de vida ou menos: surda por 1 minuto\n\n40 pontos de vida ou menos: surda e cega por 10\nminutos\n\n30 pontos de vida ou menos: surda, cega e atordoada\npor 1 hora\n\n20 pontos de vida ou menos: morta instantaneamente\nIndependentemente dos seus pontos de vida atuais,\num celestial, corruptor, elemental ou fada que falhar na \nsua resistência é obrigado a voltar para o plano de origem \ndele (se já não for aqui) e não pode retornar para o plano \natual por 24 horas através de nenhum meio inferior à \nmagia desejo.","pr":"265 (PDF: 263)","cl":["Clérigo"]},{"n":"PARAR O TEMPO","nv":"9° nível","e":"transmutação","tc":"1 ação","al":"Pessoal","co":"V","du":"Instantânea","d":"Você, por um breve momento, para o fluxo do tempo pra \ntudo, menos pra você. Nenhum tempo se passa para as \noutras criaturas, enquanto você realiza 1d4 + 1 turnos de \numa vez, durante os quais você pode usar ações e se \nmover normalmente. \nEssa magia termina se uma das ações que você fizer \ndurante esse período ou qualquer efeito que você criar, \nafetar uma criatura diferente de você ou um objeto que \nesteja sendo vestido ou carregado por outro que não você. \nAlém disso, a magia termina se você se mover para um \nlugar a mais de 300 metros do local onde você conjurou \nessa magia.","pr":"265 (PDF: 263)","cl":["Feiticeiro","Mago"]},{"n":"PASSO NEBULOSO","nv":"2° nível","e":"conjuração","tc":"1 ação bônus","al":"Pessoal","co":"V","du":"Instantânea","d":"Brevemente envolto por uma neblina prateada, você se \nteletransporta a até 9 metros para um espaço desocupado \nque você possa ver.","pr":"265 (PDF: 263)","cl":["Bruxo","Feiticeiro","Mago"]},{"n":"PASSOS LONGOS","nv":"1° nível","e":"transmutação","tc":"1 ação","al":"Toque","co":"V, S, M (um pouco de barro)","du":"1 hora","d":"Você toca uma criatura. O deslocamento do alvo aumenta \nem 3 metros, até a magia acabar. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, você pode afetar uma criatura adicional para \ncada nível do espaço acima do 1°. \n268","pr":"265 (PDF: 263)","cl":["Bardo","Druida","Mago","Patrulheiro"]},{"n":"PASSOS SEM PEGADAS","nv":"2° nível","e":"abjuração","tc":"1 ação","al":"Pessoal","co":"V, S, M (cinzas de uma folha de visco","du":"Concentração, até 1 hora","d":"Um véu de sombras e silencia irradia de você, encobrindo \nvocê e seus companheiros contra detecção. Pela duração, \ncada criatura, à sua escolha, a até 9 metros de você \n(incluindo você) recebe +10 de bônus em testes de \nDestreza (Furtividade) e não pode ser rastreada, exceto \npor meio mágicos. Uma criatura que receber esse bônus \nnão deixa quaisquer pegadas ou outros vestígios da sua \npassagem.","pr":"266 (PDF: 264)","cl":["Druida","Patrulheiro"]},{"n":"PATAS DE ARANHA","nv":"2° nível","e":"transmutação","tc":"1 ação","al":"Toque","co":"V, S, M (uma gota de betume e uma","du":"Concentração, até 1 hora","d":"Até a magia acabar, uma criatura voluntária que você \ntocar, recebe a habilidade de se mover para cima, para \nbaixo e através de superfícies verticais e de cabeça para \nbaixo pelos tetos, enquanto deixa suas mãos livres. O alvo \ntambém ganha deslocamento de escalada igual a seu \ndeslocamento de caminhada.","pr":"266 (PDF: 264)","cl":["Bruxo","Feiticeiro","Mago"]},{"n":"PELE DE ÁRVORE","nv":"2° nível","e":"transmutação","tc":"1 ação","al":"Toque","co":"V, S, M (um pedaço de casca de carvalho)","du":"Concentração, até 1 hora","d":"Você toca uma criatura voluntária. Até o fim da magia, a \npele da criatura fica rígida, similar a casca de um \ncarvalho, e a CA do alvo não pode ser inferior a 16, \nindependentemente do tipo de armadura que ela esteja \nvestindo.","pr":"266 (PDF: 264)","cl":["Druida","Patrulheiro"]},{"n":"PELE DE PEDRA","nv":"4° nível","e":"abjuração","tc":"1 ação","al":"Toque","co":"V, S, M (pó de diamante no valor de 100","du":"Concentração, até 1 hora","d":"Essa magia transforma a pele de uma criatura voluntária \nque você tocar em rocha sólida. Até a magia acabar, o alvo \ntem resistência a dano de concussão, cortante e \nperfurante não-mágico.","pr":"266 (PDF: 264)","cl":["Druida","Feiticeiro","Mago","Patrulheiro"]},{"n":"PEQUENA CABANA DE LEOMUND","nv":"3° nível","e":"evocação","tc":"1 minuto","al":"Pessoal (hemisfério de 3 metros de raio)","co":"V, S, M (uma pequena conta de cristal)","du":"8 horas","d":"Um domo de energia imóvel, de 3 metros de raio, aparece \ndo nada, ao seu redor e acima de você e permanece parado \npela duração. A magia termina se você deixar a área. \nNove criaturas de tamanho Médio ou menor podem \ncaber dentro do domo com você. A magia falha se a área \n269 \nincluir criaturas maiores ou mais de nove criaturas. \nCriaturas e objetos dentro do domo quando você conjurou \nessa magia, podem se mover através dele livremente. \nTodas as outras criaturas e objetos são bloqueados ao \ntentarem atravessa-lo. Magias e outros efeitos mágicos \nnão podem se estender através do domo ou serem \nconjurados através dele. A atmosfera dentro do espaço é \nconfortável e seca, independente do clima do lado de fora. \nAté a magia acabar, você pode comandar o interior \npara que fique mal iluminado ou escuro. O domo é opaco \ndo lado de fora, de qualquer cor que você desejar, mas é \ntransparente do lado de dentro.","pr":"266 (PDF: 264)","cl":[]},{"n":"PERDIÇÃO","nv":"1° nível","e":"encantamento","tc":"1 ação","al":"9 metros","co":"V, S, M (uma gota de sangue)","du":"Concentração, até 1 minuto","d":"Até três criaturas, à sua escolha, que você possa ver \ndentro do alcance, devem realizar um teste de resistência \nde Carisma. Sempre que um alvo que falhou nessa \nresistência realizar uma jogada de ataque ou um teste de \nresistência antes da magia acabar, o alvo deve rolar um \nd4 e subtrair o valor rolado da jogada de ataque ou teste \nde resistência. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, você pode afetar uma criatura adicional para \ncada nível do espaço acima do 1°.","pr":"267 (PDF: 265)","cl":["Bardo","Clérigo"]},{"n":"PISCAR","nv":"3° nível","e":"transmutação","tc":"1 ação","al":"Pessoal","co":"V, S","du":"1 minuto","d":"Role um d20 no final de cada um dos seus turnos pela \nduração da magia. Com um resultado de 11 ou maior, \nvocê desaparece do seu plano de existência atual e \nreaparece no Plano Etéreo (a magia falha e a conjuração é \nperdida se você já estiver nesse plano). No início do seu \npróximo turno e quando a magia terminar, se você estiver \nno Plano Etéreo, você retorna a um espaço desocupado de \nsua escolha que você possa ver a até 3 metros do espaço \nem que você desapareceu. Se não houver um espaço \ndisponível dentro do alcance, você reaparece no espaço \ndesocupado mais próximo (escolhido aleatoriamente, se \nexistir mais de um espaço a mesma distância). Você pode \ndissipar a magia com uma ação. \nQuando estiver no Plano Etéreo, você pode ver e ouvir \no plano de onde você veio, que aparece em tons de cinza, e\nvocê não pode ver nada além de 18 metros. Você só pode \nafetar ou ser afetado por outras criaturas no Plano \nEtéreo. As criaturas que não estiverem lá não podem \nnotar você nem interagir com você, a não ser que elas \ntenham uma habilidade que as permita.","pr":"267 (PDF: 265)","cl":["Feiticeiro","Mago"]},{"n":"PORTA DIMENSIONAL","nv":"4° nível","e":"conjuração","tc":"1 ação","al":"150 metros","co":"V","du":"Instantânea","d":"Você se teletransporte da sua posição atual para qualquer \nlocal dentro do alcance. Você aparece exatamente no local \ndesejado. Pode ser um lugar que você possa ver, um que \nvocê possa visualizar ou um que você possa descrever \nindicando a distância e direção, como “60 metros \ndiretamente pra baixo” ou “90 metros, subindo para \nnoroeste num ângulo de 45 graus”. \nVocê pode levar objetos com você, contanto que o peso \ndeles não exceda o que você pode carregar. Você também \npode levar uma criatura voluntária do seu tamanho ou \nmenor, que esteja carregando equipamento até o limite da \ncapacidade de carga dela. A criatura deve estar a 1,5 \nmetro de você quando você conjurar a magia. \nSe você aparecer em um lugar que já esteja ocupado \npor um objeto ou uma criatura, você e qualquer criatura \nviajando com você, sofrem 4d6 de dano de energia cada \num e a magia falha em teletransportar vocês.","pr":"267 (PDF: 265)","cl":["Bardo","Bruxo","Feiticeiro","Mago"]},{"n":"PORTAL","nv":"9° nível","e":"conjuração","tc":"1 ação","al":"18 metros","co":"V, S, M (um diamante valendo, no","du":"Concentração, até 1 minuto","d":"Você conjura um portal conectando um espaço desocupado \nque você possa ver, dentro do alcance, a uma localização \nprecisa em um plano de existência diferente. O portal é \numa abertura circular, que você pode fazer ter de 1,5 a 6 \nmetros de diâmetro. Você pode orientar o portal em \nqualquer direção, à sua escolha. O portal permanece pela \nduração. \nO portal terá uma frente e um fundo em cada plano \nque ele aparecer. Viajar pelo portal só é possível ao \natravessa-lo pela frente. Qualquer coisa que o fizer, é \ninstantaneamente transportado para o outro plano, \naparecendo no espaço desocupado mais próximo do portal. \nDivindades e outros soberanos planares podem \nimpedir que portais criados através dessa magia se abram \nna presença deles ou em qualquer parte dos seus \ndomínios. \nQuando você conjurar essa magia, você pode falar o \nnome de uma criatura especifica (um pseudônimo, título \nou apelido não funcionará). Se essa criatura estiver em \num plano diferente do que você está, o portal se abre na \nvizinhança imediata da criatura nomeada e suga a \ncriatura para dentro do portal, fazendo-a aparecer no \nespaço desocupado mais próximo do seu lado do portal. \nVocê não adquire qualquer poder especial sobre a criatura \ne ela está livre para agir como o Mestre julgar apropriado. \nEla pode ir embora, atacar você ou ajudar você.","pr":"267 (PDF: 265)","cl":["Clérigo","Feiticeiro","Mago"]},{"n":"PORTAL ARCANO","nv":"6° nível","e":"conjuração","tc":"1 ação","al":"150 metros","co":"V, S","du":"Concentração, até 10 minutos","d":"Você cria portais de teletransporte conectados que \npermanecem abertos pela duração. Escolha dois pontos no \nsolo que você possa ver, um ponto a até 3 metros de você e \noutro a até 150 metros de você. Um portal circular, com 3 \nmetros de diâmetro, se abre em cada ponto. Se o portal se \nabriria num local ocupado por uma criatura, a magia \nfalha e a conjuração é perdida. \nOs portais são dois anéis dimensionais brilhantes \ncheios de névoa, flutuando a centímetros do chão, \nperpendicular a ele no ponto escolhido. Um anel é visível \napenas de um lado (à sua escolha), que é o lado que \nfunciona como portal. \n270 \nQualquer criatura ou objeto que adentrar o portal, \nsairá pelo outro portal, como se ambos estivessem \nadjacentes um ao outro; atravessar um portal do lado que \nnão é um portal não tem efeito. A névoa que preenche \ncada portal é opaca e bloqueia a visão através dele. No \nseu turno, você pode girar os anéis, com uma ação bônus, \nfazendo o lado ativo ficar em uma direção diferente.","pr":"267 (PDF: 265)","cl":["Bruxo","Feiticeiro","Mago"]},{"n":"PRAGA","nv":"5° nível","e":"necromancia","tc":"1 ação","al":"Toque","co":"V, S","du":"7 dias","d":"Seu toque inflige uma doença. Faça um ataque de magia \ncorpo-a-corpo contra uma criatura ao seu alcance. Se \natingir, você aflige a criatura com uma doença, de sua \nescolha, entre qualquer um das descritas abaixo. \nNo final de cada turno do alvo, ele deve realizar um \nteste de resistência de Constituição. Após obter três \nfalhas nesses testes de resistência, o efeito da doença \npermanece pela duração e a criatura para de fazer testes \nde resistência. Após obter três sucessos nesses testes de \nresistência, a criatura se recupera da doença e a magia \ntermina. \nJá que essa magia induz uma doença natural no alvo, \nqualquer efeito que remova uma doença, ou de outra \nforma, melhore os efeitos de uma doença, se aplica a ela. \nArdência Mental. A mente da criatura fica febril. A \ncriatura tem desvantagem em testes de Inteligência, \ntestes de resistência de Inteligência e a criatura age como \nse estivesse sob efeito da magia confusão durante um \ncombate. \nEnjoo Cegante. A dor se agarra a mente da criatura e \nseus olhos ficam branco-leitosos. A criatura tem \ndesvantagem em testes de Sabedoria e testes de \nresistência de Sabedoria e está cega. \nFebre do Esgoto. Uma febre voraz se espalha pelo \ncorpo da criatura. A criatura tem desvantagem em testes \nde Força, testes de resistência de Força e jogadas de \nataque que usem Força. \nNecrose da Carne. A carne da criatura se decompõe. \nA criatura tem desvantagem em testes de Carisma e \nvulnerabilidade a todos os danos. \nPerdição Pegajosa. A criatura começa a sangrar \nincontrolavelmente. A criatura tem desvantagem em \ntestes de Constituição e testes de resistência de \nConstituição. Além disso, sempre que a criatura sofrer \ndano, ela ficará atordoada até o fim do seu próximo turno. \nTremedeira. A criatura é acometida por espasmos. A \ncriatura tem desvantagem em testes de Destreza, testes \nde resistência de Destreza e jogadas de ataque que usem \nDestreza.","pr":"268 (PDF: 266)","cl":["Clérigo","Druida"]},{"n":"PRAGA DE INSETOS","nv":"5° nível","e":"conjuração","tc":"1 ação","al":"90 metros","co":"V, S, M (alguns grãos de açúcar, alguns","du":"Concentração, até 10 minutos","d":"Um enxame voraz de gafanhotos preenche uma esfera de \n6 metros de raio, centrada no ponto que você escolher, \ndentro do alcance. A esfera se espalha dobrando esquinas. \nA esfera permanece pela duração e sua área é de \nescuridão leve. A área da esfera é de terreno difícil. \nQuando a área aparece, cada criatura dentro dela deve \nrealizar um teste de resistência de Constituição. Uma \ncriatura sofre 4d10 de dano perfurante se falhar na \n271 \nresistência ou metade desse dano se passar. Uma criatura \ndeve, também, realizar um teste de resistência quando \nentrar na área da magia pela primeira vez num turno ou \nterminar seu turno nela. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 6° nível ou \nsuperior, o dano aumenta em 1d10 para cada nível do \nespaço acima do 5°.","pr":"268 (PDF: 266)","cl":["Clérigo","Druida","Feiticeiro"]},{"n":"PRESTIDIGITAÇÃO","nv":"Truque","e":"transmutação","tc":"1 ação","al":"3 metros","co":"V, S","du":"Até 1 hora","d":"Essa magia é um truque mágico simples que conjuradores \niniciantes usam para praticar. Você cria um dos seguintes \nefeitos mágicos dentro do alcance: \n\nVocê cria, instantaneamente, um efeito sensorial\ninofensivo, como uma chuva de faíscas, um sopro de\nvento, notas musicais suaves ou um odor estranho.\n\nVocê, instantaneamente, acende ou apaga uma vela,\numa tocha ou uma pequena fogueira.\n\nVocê, instantaneamente, limpa ou suja um objeto de\naté 1 metro cúbico.\n\nVocê esfria, esquenta ou melhora o sabor de até 1\nmetro cubico de matéria inorgânica por 1 hora.\n\nVocê faz uma cor, uma pequena marca ou um símbolo\naparecer em um objeto ou superfície por 1 hora.\n\nVocê cria uma bugiganga não-mágica ou uma imagem\nilusória que caiba na sua mão e que dura até o final do\nseu próximo turno.\nSe você conjurar essa magia diversas vezes, você pode \nter até três dos seus efeitos não-instantâneos ativos, ao \nmesmo tempo, e você pode dissipar um desses efeitos com \numa ação.","pr":"269 (PDF: 267)","cl":["Bardo","Bruxo","Feiticeiro","Mago"]},{"n":"PRISÃO DE ENERGIA","nv":"7° nível","e":"evocação","tc":"1 ação","al":"30 metros","co":"V, S, M (pó de rubi no valor de 1.500 po)","du":"1 hora","d":"Uma prisão em formato cúbico, imóvel e invisível, \ncomposta de energia mágica brota do nada, em volta de \numa área, à sua escolha, dentro do alcance. A prisão pode \nser uma cela ou uma caixa sólida, à sua escolha. \nUma prisão em formato de cela pode ter até 6 metros \nquadrados e é feita de barras com 1,5 centímetro de \ndiâmetro espaçadas a 1,5 centímetro umas das outras. \nUma prisão em formato de caixa pode ter até 3 metros \nquadrados, criando uma barreira sólida que impede \nqualquer matéria de atravessa-la e bloqueia qualquer \nmagia conjurada de entrar ou sair da área. \nQuando você conjura a magia, qualquer criatura que \nestiver completamente dentro da área da prisão ficará \npresa. As criaturas que estiverem apenas parcialmente \nna área, ou as grandes demais para caber dentro da área, \nsão empurradas do centro da área, até estarem \ncompletamente fora dela. \nUma criatura dentro da prisão não pode sair dela por \nmeios não-mágicos. Se a criatura tentar usar \nteletransporte ou viagem entre planos para abandonar a \nprisão, ela deve, primeiro, realizar um teste de resistência \nde Carisma. Se obtiver sucesso, a criatura pode usar a \nmagia e sair da prisão. Se falhar, a criatura não pode sair \nda prisão e desperdiça o uso da magia ou efeito. A prisão \ntambém se estende ao Plano Etéreo, bloqueando viagem \netérea. \nEssa magia não pode ser dissipada por dissipar magia.","pr":"269 (PDF: 267)","cl":["Bardo","Bruxo","Mago"]},{"n":"PROIBIÇÃO","nv":"6° nível","e":"abjuração","tc":"10 minutos","al":"Toque","co":"V, S, M (uma borrifada de água benta,","du":"1 dia","d":"Você cria uma defesa contra viagem mágica que protege \naté 12.000 metros quadrados de solo até 9 metros de \naltura do solo. Pela duração, criaturas não conseguem se \nteletransportar para dentro da área ou usar portais, como \nos criados pela magia portal, para entrar na área. A \nmagia protege a área contra viagem planar e, portanto, \nimpede criaturas de acessarem a área por meio do Plano \nAstra, Plano Etéreo, Faéria, Umbra ou pela magia viagem \nplanar. \nAlém disso, a magia causa dano a certos tipos de \ncriatura, à sua escolha, quando a conjurar. Escolha um ou \nmais dentre os seguintes: celestiais, corruptores, \nelementais, fadas ou mortos-vivos. Quando uma criatura \nescolhida entrar na área da magia pela primeira vez em \num turno ou começa seu turno nela, a criatura sofre 5d6 \nde dano radiante ou necrótico (à sua escolha, quando você \nconjura a magia). \nQuando você conjura essa magia, você pode definir \numa senha. Uma criatura que falar a senha quando \nentrar na área não sofrerá dano dessa magia. \nA área da magia não pode sobrepor a área de outra \nmagia proibição. Se você conjurar proibição a cada dia por \n30 dias no mesmo local, a magia durará até ser dissipada, \ne os componentes materiais serão consumidos apenas na \núltima conjuração.","pr":"269 (PDF: 267)","cl":[]},{"n":"PROJEÇÃO ASTRAL","nv":"9° nível","e":"necromancia","tc":"1 hora","al":"3 metros","co":"V, S, M (para cada criatura que você","du":"Especial","d":"Você e até oito criaturas voluntárias dentro do alcance, \nprojetam seus corpos astrais para o Plano Astral (a magia \nfalha e a conjuração é perdida se você já estiver no plano). \nO corpo material que você deixa para trás ficará \ninconsciente e em estado de animação suspensa; ele não \nprecisa de comida ou ar e não envelhece. \nSeu corpo astral assemelhasse à sua forma mortal em \npraticamente tudo, copiando suas estatísticas de jogo e \nposses. A principal diferença é a adição de um cordão \nprateado que se estende de trás da sua omoplata e traça \num caminho atrás de você, sumindo após 30 centímetros. \nEsse cordão é a sua corrente com o seu corpo material. \nEnquanto sua corrente permanecer intacta, você pode \nencontrar seu caminho de volta pra casa. Se o cordão for \ncortado – algo que só pode acontecer se um efeito dizer \n272 \nespecificamente que faz isso – sua alma e corpo estão \nseparados, matando você instantaneamente. \nSua forma astral pode viajar livremente dentro do \nPlano Astral e pode passar através de portais que levam a \nqualquer outro plano. Se você entrar em um novo portal \nou retornar para o plano que você estava quando conjurou \na magia, seu corpo e posses são transportados ao longo do \ncordão de prata, permitindo que você reentre no seu corpo \nao entrar no novo plano. Sua forma astral é uma \nencarnação separada. Qualquer dano ou outros efeitos \nque se aplicarem a ela, não terão efeito no seu corpo \nfísico, nem persistem quando você voltar. \nA magia termina para você e seus companheiros \nquando você usar sua ação para dissipa-la. Quando a \nmagia termina, as criaturas afetadas voltam para seus \ncorpos físicos e acordam. \nA magia também pode terminar prematuramente para \nvocê ou um dos seus companheiros. Uma magia dissipar \nmagia, bem sucedida, usada contra um corpo astral ou \nfísico termina a magia para a criatura. Se o corpo original \nde uma criatura ou sua forma astral caírem a 0 pontos de \nvida, a magia termina para essa criatura. Se a magia \nterminar e o cordão prateado estiver intacto, o cordão \npuxa a forma astral da criatura de volta para seu corpo, \nterminando seu estado de animação suspensa. \nSe você retornar para o seu corpo prematuramente, \nseus companheiros permanecem nas suas formas astrais \ne devem encontrar seus próprios meios de voltar para \nseus corpos, geralmente caindo a 0 pontos de vida.","pr":"269 (PDF: 267)","cl":["Bruxo","Clérigo","Mago"]},{"n":"PROJETAR IMAGEM","nv":"7° nível","e":"ilusão","tc":"1 ação","al":"750 quilômetros","co":"V, S, M (uma pequena réplica sua feita","du":"Concentração, até 1 dia","d":"Você cria uma cópia ilusória de si mesmo, que permanece \npela duração. A cópia pode aparecer em qualquer lugar, \ndentro do alcance, que você já tenha visto antes, \nindependentemente da intervenção de obstáculos. A \nilusão se parece e fala como você, mas é intangível. Se a \nilusão sofrer qualquer dano, ela desaparece e a magia \nacaba. \nVocê pode ver através dos olhos e ouvir através dos \nouvidos da cópia como se você estivesse no lugar dela. Em \ncada um dos seus turnos, com uma ação bônus, você pode \ntrocar o uso dos sentidos dela pelo seu ou voltar \nnovamente. Enquanto você está usando os sentidos dela, \nvocê fica cego e surdo ao que está a sua volta. \nInteração física com a imagem revelará ela como sendo \numa ilusão, já que as coisas podem atravessa-la. Uma \ncriatura que usar sua ação para examinar a imagem, \npode determinar que ela é uma ilusão sendo bem sucedida \nnum teste de Inteligência (Investigação) contra a CD da \nmagia para desacredita-la. Se a criatura discernir a \nilusão como ela é, a criatura poderá ver através da \nimagem e qualquer barulho que ela fizer soará oco para a \ncriatura.","pr":"270 (PDF: 268)","cl":["Bardo","Mago"]},{"n":"PROTEÇÃO CONTRA A MORTE","nv":"4° nível","e":"abjuração","tc":"1 ação","al":"Toque","co":"V, S","du":"8 horas","d":"Você toca uma criatura e concede a ela uma certa \nproteção contra a morte. \nA primeira vez que o alvo cair a 0 pontos de vida, como \nresultado de ter sofrido dano, o alvo, ao invés disso, cai a \n1 ponto de vida e a magia termina. \nSe a magia ainda estiver funcionando quando o alvo \nfor afetado por um efeito que poderia mata-lo \ninstantaneamente sem causar dano, o efeito, ao invés \ndisso, não funciona no alvo e a magia termina.","pr":"270 (PDF: 268)","cl":["Clérigo","Paladino"]},{"n":"PROTEÇÃO CONTRA ENERGIA","nv":"3° nível","e":"abjuração","tc":"1 ação","al":"Toque","co":"V, S","du":"Concentração, até 1 hora","d":"Pela duração, a criatura voluntária que você tocar terá \nresistência a um tipo de dano de sua escolha: ácido, \nelétrico, fogo, frio ou trovejante.","pr":"270 (PDF: 268)","cl":["Clérigo","Druida","Feiticeiro","Mago","Patrulheiro"]},{"n":"PROTEÇÃO CONTRA LÂMINAS","nv":"Truque","e":"abjuração","tc":"1 ação","al":"Pessoal","co":"V, S","du":"1 rodada","d":"Você estende suas mãos e desenha um símbolo de \nproteção no ar. Até o final do seu próximo turno, você terá \nresistência contra dano de concussão, cortante e \nperfurante causado por ataques com armas.","pr":"270 (PDF: 268)","cl":["Bardo","Bruxo","Feiticeiro","Mago"]},{"n":"PROTEÇÃO CONTRA O BEM E MAL","nv":"1° nível","e":"abjuração","tc":"1 ação","al":"Toque","co":"V, S, M (água benta ou pó de prata e","du":"Concentração, até 10 minutos","d":"Até a magia acabar, uma criatura voluntária que você \ntocar estará protegida contra certos tipos de criaturas: \naberrações, celestiais, corruptores, elementais, fadas e \nmortos-vivos. \nA proteção garante diversos benefícios. As criaturas \ndesse tipo tem desvantagem nas jogadas de ataque contra \no alvo. O alvo não pode ser enfeitiçado, amedrontado ou\npossuído por elas. Se o alvo já estiver enfeitiçado, \namedrontado ou possuído por uma dessas criaturas, o \nalvo terá vantagem em qualquer novo teste de resistência \ncontra o efeito relevante.","pr":"270 (PDF: 268)","cl":["Bruxo","Clérigo","Mago","Paladino"]},{"n":"PROTEÇÃO CONTRA VENENO","nv":"2° nível","e":"abjuração","tc":"1 ação","al":"Toque","co":"V, S","du":"1 hora","d":"Você toca uma criatura. Se ela estiver envenenada, você \nneutraliza o veneno. Se mais de um veneno estiver \nafligindo o alvo, você neutraliza um veneno, que você \nsaiba estar presente, ou neutraliza um aleatório. \n273 \nPela duração, o alvo terá vantagem em testes de \nresistência para não envenenado e terá resistência a dano \nde veneno.","pr":"270 (PDF: 268)","cl":["Clérigo","Druida","Paladino","Patrulheiro"]},{"n":"PROTEGER FORTALEZA","nv":"6° nível","e":"abjuração","tc":"10 minutos","al":"Toque","co":"V, S, M (incenso aceso, uma porção de","du":"24 horas","d":"Você cria uma defesa que protege até 225 metros \nquadrados de espaço (uma área de um quadrado de 15 \nmetros ou cem quadrados de 1,5 metro ou vinte e cinco \nquadrados de 3 metros). A área protegida pode ter até 6 \nmetros de altura, no formado que você desejar. Você pode \nproteger diversos armazéns de uma fortaleza dividindo a \nárea entre eles, contanto que você possa andar em cada \nárea contígua enquanto estiver conjurando a magia. \nQuando você conjura essa magia, você pode especificar \nindivíduos que não serão afetados por qualquer dos \nefeitos que você escolher. Você também pode especificar \numa senha que, ao ser falada em voz alta, deixa o orador \nimune aos efeitos. \nProteger fortaleza cria os seguintes efeitos dentro da \nárea protegida. \nCorredores. Névoa preenche todos os corredores \nprotegidos, tornando-os área de escuridão densa. Além \ndisso, cada interseção ou passagem ramificada oferecendo \numa escolha de direção, há 50 por cento de chance de uma \ncriatura diferente de você acredite que está indo na \ndireção oposta à que escolheu. \nPortas. Todas as portas na área protegida estão \ntrancadas magicamente, como se estivessem seladas pela \nmagia tranca arcana. Além disso, você pode cobrir até dez \nportas com uma ilusão (equivalente a função de objeto \nilusório da magia ilusão menor) para fazê-las parecer \nseções simples da parede.  \nEscadas. Teias preenchem todas as escadas na área \nprotegida do topo ao solo, como a magia teia. Esses fios \nvoltam a crescer em 10 minutos se forem queimados ou \npartidos enquanto proteger fortaleza durar. \nOutros Efeitos de Magia. Você pode colocar, à sua \nescolha, um dos seguintes efeitos mágicos dentro da área \nprotegida de uma fortaleza. \n\nColocar globos de luz em quatro corredores. Você pode\ndesignar uma programação simples que as luzes\nrepetem enquanto proteger fortaleza durar.\n\nColocar boca encantada em duas localizações.\n\nColocar névoa fétida em duas localizações. Os vapores\naparecem nos locais que você designar; eles retornam\ndentro de 10 minutos, se forem dispersados por um\nvento, enquanto proteger fortaleza durar.\n\nColocar uma lufada de vento constante em um\ncorredor ou aposento.\n\nColocar uma sugestão em uma localização. Você\nseleciona uma área de um quadrado de 1,5 metro e,\nqualquer criatura que entrar ou passar através dessa\nárea recebe a sugestão mentalmente.\nA área protegida inteira irradia magia. Uma dissipar \nmagia conjurada em uma área especifica, se for bem \nsucedida, remove apenas aquele efeito. \nVocê pode criar uma estrutura, permanentemente, \nafetada por proteger fortaleza ao conjurar essa magia nela \na cada dia por um ano.","pr":"271 (PDF: 269)","cl":["Bardo","Mago"]},{"n":"PURIFICAR ALIMENTOS","nv":"1° nível","e":"transmutação","tc":"1 ação","al":"3 metros","co":"V, S","du":"Instantânea","d":"Toda comida e bebida não-mágica dentro de uma esfera \nde 1,5 metro de raio centrada num ponto, à sua escolha, \ndentro do alcance é purificada e se livrada de venenos ou \ndoenças.","pr":"271 (PDF: 269)","cl":[]},{"n":"QUEDA SUAVE","nv":"1° nível","e":"transmutação","tc":"1 reação, que você realiza","al":"18 metros","co":"V, M (uma pequena pena ou penugem","du":"1 minuto","d":"Escolha até cinco criaturas caindo, dentro do alcance. A \ntaxa de descendência de uma criatura caindo é reduzida \npara 18 metros por rodada, até o fim da magia. Se a \ncriatura aterrissar antes da magia acabar, ela não sofre \nnenhum dano de queda, pode aterrissar em pé e a magia \ntermina para essa criatura.","pr":"271 (PDF: 269)","cl":["Bardo","Feiticeiro","Mago"]},{"n":"RAIO ADOECENTE","nv":"1° nível","e":"necromancia","tc":"1 ação","al":"18 metros","co":"V, S","du":"Instantânea","d":"Um raio adoecente de energia esverdeada chicoteia na \ndireção de uma criatura dentro do alcance. Faça um \nataque à distância com magia contra o alvo. Se atingir, o \nalvo sofrerá 2d8 de dano de veneno e deve realizar um \nteste de resistência de Constituição. Se falhar na \nresistência, ele também ficará envenenado até o final do \nseu próximo turno. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, o dano da magia aumenta em 1d8 para cada \nnível do espaço acima do 1°.","pr":"271 (PDF: 269)","cl":["Feiticeiro","Mago"]},{"n":"RAIO ARDENTE","nv":"2° nível","e":"evocação","tc":"1 ação","al":"36 metros","co":"V, S","du":"Instantânea","d":"Você cria três raios de fogo e os arremessa em alvos \ndentro do alcance. Você pode arremessa-los em um alvo \nou em vários. \nRealize um ataque à distância com magia para cada \nraio. Se atingir, o alvo sofrerá 2d6 de dano de fogo. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 3° nível ou \nsuperior, você cria um raio adicional para cada nível do \nespaço acima do 2°.","pr":"271 (PDF: 269)","cl":["Feiticeiro","Mago"]},{"n":"RAIO DE BRUXA","nv":"1° nível","e":"evocação","tc":"1 ação","al":"9 metros","co":"V, S, M (um galho de uma árvore que","du":"Concentração, até 1 minuto","d":"274 \nUm raio crepitante de energia azul é arremessado em \numa criatura dentro do alcance, formando um arco \nelétrico contínuo entre você e o alvo. Faça um ataque à \ndistância com magia contra a criatura. Se atingir, o alvo \nsofrerá 1d12 de dano elétrico e, em cada um dos seus \nturnos, pela duração, você pode usar sua ação para causar \n1d12 de dano elétrico ao alvo, automaticamente. A magia \nacaba se você usar sua ação para fazer qualquer outra \ncoisa. A magia também acaba se o alvo estiver fora do \nalcance da magia ou se você tiver cobertura total para ele. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, o dano inicial aumenta em 1d12 para cada nível \ndo espaço acima do 1°.","pr":"271 (PDF: 269)","cl":["Bruxo","Feiticeiro","Mago"]},{"n":"RAIO DE FOGO","nv":"Truque","e":"evocação","tc":"1 ação","al":"36 metros","co":"V, S","du":"Instantânea","d":"Você arremessa um cisco de fogo em uma criatura ou \nobjeto dentro do alcance. Faça um ataque à distância com \nmagia contra o alvo. Se atingir, o alvo sofre 1d10 de dano \nde fogo. Um objeto inflamável atingido por essa magia, \nincendeia se não estiver sendo vestido ou carregado. \nO dano dessa magia aumenta em 1d10 quando você \nalcança o 5° nível (2d10), 11° nível (3d10) e 17° nível \n(4d10).","pr":"272 (PDF: 270)","cl":["Feiticeiro","Mago"]},{"n":"RAIO DE GELO","nv":"Truque","e":"evocação","tc":"1 ação","al":"18 metros","co":"V, S","du":"Instantânea","d":"Um raio frigido de luz azul clara parte em direção de uma \ncriatura, dentro do alcance. Realize um ataque à \ndistância com magia contra o alvo. Se atingir, ele sofre \n1d8 de dano de frio e seu deslocamento é reduzido em 3 \nmetros até o começo do seu próximo turno. \nO dano da magia aumenta em 1d8 quando você \nalcança o 5° nível (2d8), 11° nível (3d8) e 17° nível (4d8).","pr":"272 (PDF: 270)","cl":["Feiticeiro","Mago"]},{"n":"RAIO DO ENFRAQUECIMENTO","nv":"2° nível","e":"necromancia","tc":"1 ação","al":"18 metros","co":"V, S","du":"Concentração, até 1 minuto","d":"Um raio negro de energia enervante parte do seu dedo em \ndireção de uma criatura, dentro do alcance. Faça um \nataque à distância com magia contra o alvo. Se atingir, o \nalvo causará metade do dano com ataques com armas que \nusem Força, até a magia acabar. \nNo final de cada um dos turnos do alvo, ele pode \nrealizar um teste de resistência de Constituição contra a \nmagia. Se obtiver sucesso, a magia acaba.","pr":"272 (PDF: 270)","cl":["Bruxo","Mago"]},{"n":"RAIO GUIADOR","nv":"1° nível","e":"evocação","tc":"1 ação","al":"36 metros","co":"V, S","du":"1 rodada","d":"Um lampejo de luz se lança em direção de uma criatura, à \nsua escolha, dentro do alcance. Realize um ataque à \ndistância com magia contra o alvo. Se atingir, o alvo sofre  \n275 \n4d6 de dano radiante e, a próxima jogada de ataque \ncontra esse alvo, antes do final do seu próximo turno, terá \nvantagem, graças a penumbra mística cintilando no alvo, \naté então. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, o dano aumenta em 1d6 para cada nível do \nespaço acima do 1°.","pr":"272 (PDF: 270)","cl":["Clérigo"]},{"n":"RAIO LUNAR","nv":"2° nível","e":"evocação","tc":"1 ação","al":"36 metros","co":"V, S, M (várias sementes de qualquer","du":"Concentração, até 1 minuto","d":"Um raio prateado de luz pálida brilha para baixo em um \ncilindro com 1,5 metro de raio e 12 metros de altura, \ncentrado num ponto dentro do alcance. Até a magia \nacabar, penumbra preenche o cilindro. \nQuando uma criatura entrar na área da magia pela \nprimeira vez em um turno, ou começar seu turno lá, ela é \nengolfada por chamas fantasmagóricas que causam dores \nlancinantes e ela deve realizar um teste de resistência de \nConstituição. Ela sofre 2d10 de dano radiante se falhar \nna resistência ou metade desse dano se passar. \nUm metamorfo faz seu teste de resistência com \ndesvantagem. Se ele falhar, ele, também, reverte \ninstantaneamente para sua forma original e não pode \nassumir uma forma diferente até deixar a luz da magia. \nEm c
