ue sua posição inicial.\nATORDOADO\n•\nUma criatura atordoada está incapacitada (veja a\ncondição). Ela não pode se mover e somente pode falar\nhesitantemente.\n•\nA criatura falha automaticamente em testes de\nresistência de Força ou Destreza.\n•\nJogadas de ataque contra a criatura possuem\nvantagem.\nCAÍDO\n•\nA única opção de movimento que uma criatura caída\ntem é rastejar, a menos que ela se levante, encerrando\nassim a condição.\n•\nA criatura sofre desvantagem nas jogadas de ataque.\n•\nUma jogada de ataque contra a criatura possui\nvantagem se o atacante estiver a 1,5 metro dela. De\nqualquer outra forma a jogada sofre desvantagem.\nCEGO\n•\nUma criatura cega falha automaticamente em\nqualquer teste de habilidade que requeira o uso da\nvisão.\n•\nJogadas de ataque contra a criatura possuem\nvantagem, e os ataques da criatura sofrem\ndesvantagem.\n292 \nENFEITIÇADO\n•\nUma criatura enfeitiçada não pode atacar quem a\nenfeitiçou ou tê-lo como alvo de habilidades ou efeitos\nmágicos nocivos.\n•\nQuem a enfeitiçou possui vantagem em testes de\nhabilidade feitos para interagir socialmente com a\ncriatura.\nENVENENADO\n•\nUma criatura envenenada sofre desvantagem em\njogadas de ataque e testes de habilidade.\nIMPEDIDO\n•\nO deslocamento de uma criatura impedida se torna 0,\ne ela não pode se beneficiar de qualquer bônus em seu\ndeslocamento.\n•\nJogadas de ataque contra a criatura possuem\nvantagem, e os ataques da criatura sofrem\ndesvantagem.\n•\nA criatura sofre desvantagem em testes de resistência\nde Destreza.\nINCAPACITADO\n•\nUma criatura incapacitada não pode realizar ações ou\nreações.\nINCONSCIENTE\n•\nUma criatura inconsciente está incapacitada (veja a\ncondição). Ela não pode se mover ou falar e não tem\nciência de seus arredores.\n•\nA criatura larga tudo que estiver segurando e fica\ncaída.\n•\nA criatura falha automaticamente em testes de\nresistência de Força ou Destreza.\n•\nJogadas de ataque contra a criatura possuem\nvantagem.\n•\nQualquer ataque que atinja a criatura é um acerto\ncrítico, se o atacante estiver a 1,5 metro dela.\n EXAUSTÃO \nAlgumas habilidades especiais e perigos ambientais, como fome e \nexposição prolongada a temperaturas congelantes ou escaldantes, \npodem impor uma condição especial chamada exaustão. A \nexaustão é medida em seis níveis. Um efeito pode fazer com que \numa criatura sofra um ou mais níveis de exaustão, como \nespecificado na descrição do efeito. \nNível Efeito \n1 \nDesvantagem em testes de habilidade \n2 \nDeslocamento reduzido à metade \n3 \nDesvantagem nas jogadas de ataque e testes de \nresistência \n4 \nMáximo de pontos de vida reduzido à metade \n5 \nDeslocamento reduzido à 0 \n6 \nMorte \nSe uma criatura que já possui um nível de exaustão sofrer \noutro efeito que também causa exaustão, o nível atual de \nexaustão da criatura aumenta em uma quantidade especificada \npela descrição do efeito que a causou. \nConforme o nível de exaustão de uma criatura aumenta, os \nefeitos pioram. A criatura não sofre apenas o efeito do seu nível \natual de exaustão, mas de todos os níveis anteriores, sendo assim \numa criatura sofrendo o nível 2 de exaustão tem seu \ndeslocamento reduzido pela metade além de sofrer desvantagem \nem testes de habilidade. \nUm efeito que remova exaustão reduz seu nível, com todos os \nefeitos de exaustão desaparecendo se esse nível for reduzido \nabaixo de 1. \nTerminar um descanso longo reduz a exaustão de uma \ncriatura em 1 nível, contanto que ela também tenha ingerido um \npouco de água e comida. \n293 \nINVISÍVEL\n•\nUma criatura invisível é impossível de ser vista sem a\najuda de magia ou sentidos especiais. Para o propósito\nde se esconder, a criatura é considerada em área de\nescuridão densa. A localização da criatura pode ser\ndetectada por qualquer barulho que ela faça ou rastros\nque ela deixe.\n•\nJogadas de ataque contra a criatura sofrem\ndesvantagem, e os ataques da criatura possuem\nvantagem.\nPARALISADO\n•\nUma criatura paralisada está incapacitada (veja a\ncondição). Ela não pode se mover ou falar.\n•\nA criatura falha automaticamente em teste de\nresistência de Força e Destreza.\n•\nJogadas de ataque contra a criatura possuem\nvantagem.\n•\nQualquer ataque que atinja a criatura é um acerto\ncrítico, se o atacante estiver a 1,5 metro dela.\nPETRIFICADO\n•\nUma criatura petrificada está transformada,\njuntamente com todos os objetos não-mágicos que\nestiver vestindo ou carregando, em uma substância\nsólida e inanimada (geralmente pedra). Seu peso\né multiplicado por dez, e ela para de envelhecer.\n•\nA criatura está incapacitada (veja a\ncondição), não pode se mover ou falar, e\nnão tem ciência de seus arredores.\n•\nJogadas de ataque contra a criatura\npossuem vantagem.\n•\nA criatura falha automaticamente em testes de\nresistência de Força e Destreza.\n•\nA criatura tem resistência a todos os tipos de dano.\n•\nA criatura é imune a veneno e doenças, embora um\nveneno ou doença previamente presente em seu\nsistema seja apenas suspenso, não neutralizado.\nSURDO\n•\nUma criatura surda falha automaticamente em\nqualquer teste de habilidade que requeira o uso\nda audição.\n294 \nAPÊNDICE B: DEUSES DO MULTIVERSO \nRELIGIÃO É UMA PARTE MUITO IMPORTANTE NA \nvida nos mundos do multiverso de D&D. \nQuando deuses andam no mundo, clérigos \ncanalizam poder divino, cultos malignos \nrealizam sacrifícios em covis subterrâneos e \npaladinos reluzentes se impõem como bastiões \ncontra as trevas, é difícil manter-se ambivalente sobre as \ndivindades e negar a existência delas. \nMuitas pessoas nos mundos de D&D veneram deuses \ndiferentes em momentos e circunstâncias diferentes. As \npessoas nos Reinos Esquecidos, por exemplo, podem rezar \npara Sune para ter sorte no amor, fazer uma oferenda a \nWaukeen antes de ir para o mercado e rezar para acalmar \nTalos quando uma forte tormenta chegar – tudo no \nmesmo dia. Muitas pessoas tem um favorito dentre os \ndeuses, um cujos ideias e ensinamentos eles tomam para \nsi próprios. E, alguns poucos, dedicam-se inteiramente a \num único deus, geralmente servindo como sacerdotes ou \ncampeões dos ideias desse deus. \nSeu Mestre define quais deuses, se tiver algum, são \nadorados na campanha dele. Dentre os deuses \ndisponíveis, você pode escolher apenas uma divindade \npara que seu personagem sirva, adore ou diga venerar da \nboca pra fora. Ou você pode selecionar alguns para os \nquais seu personagem reza com mais frequência. Ou \napenas fazer uma nota mental dos deuses que são \nvenerados na campanha do seu Mestre, assim você poderá \nchamar pelos seus nomes quando apropriado. Se você \nestiver jogando com um clérigo ou um personagem com o \nantecedente acólito, decida a qual deus você serve ou \nserviu e considere os domínios sugeridos da divindade \nquando escolher o domínio do seu personagem. \nPANTEÕES DE D&D\nCada mundo no multiverso de D&D tem seus próprios \npanteões de divindades, variando de tamanho desde os \nabundantes panteões dos Reinos Esquecidos e Greyhawk \naté as religiões mais focadas de Eberron e Dragonlance. \nMuitas raças não-humanas adoram os mesmos deuses em \nmundos diferentes – Moradin, por exemplo, é venerado \npelos anões dos Reinos Esquecidos, Greyhawk e muitos \noutros mundos. \nOS REINOS ESQUECIDOS\nDezenas de divindades são veneradas, adoradas e \ntemidas através do mundo dos Reinos Esquecidos. Pelo \nmenos trinta deuses são amplamente conhecidos através \ndos Reinos e muitos mais são adorados localmente, por \ntribos individuais, pequenos cultos ou certas seitas de \ntemplos religiosos maiores. \n OS DOMÍNIOS DA VIDA E DA MORTE \nMuitas divindades nessa seção sugerem o domínio da Vida, \nparticularmente se elas forem intimamente associadas à cura, \nproteção, parto, carinho ou fertilidade. Como descrito no capítulo \n3, no entanto, o domínio da Vida é incrivelmente amplo e, um \nclérigo de qualquer divindade não-maligna pode escolhe-lo. \nUma quantidade de divindades, a imensa maioria malignas, \nsugerem o domínio da Morte, que é detalhado no Guia do Mestre. \nA maioria dos clérigos que escolhem esse domínio são PdMs \nmalignos, porém, se você deseja venerar uma divindade da morte, \nconsulte seu Mestre. \nGREYHAWK\nOs deuses de Greyhawk vem de, pelo menos, quatro \npanteões diferentes, representando as crenças dos vários \ngrupos étnicos que povoam o continente de Oerik pelas \neras. Como resultado, existe uma grande quantidade de \nsobreposições em seus portfólios: Pelor é o deus Flan do \nsol e Pholtus é o deus Oeridiano do sol, por exemplo. \nDRAGONLANCE\nOs deuses do mundo de Krynn fazem parte de três \nfamílias: sete deuses do bem, liderados por Paladine e \nMishakal, sete deuses da neutralidade, liderados por \nGilean e sete deuses do mal, liderados por Takhisis e \nSargonnas. Essas divindades tem sido chamadas por \nmuitos nomes diferentes e possuem diferentes níveis de \nestima por diferentes povos e culturas através da história \ndo mundo, mas eles são os únicos deuses no mundo – seus \nlugares são fixos nas estrelas como constelações. \nEBERRON\nO mundo de Eberron possui muitas religiões diferentes, \nmas a mais importante gira em torno do panteão \nchamado de Soberano Anfitrião e seus muitos vestígios \nmalignos, os Seis Sombrios. Os deuses do Soberano \nAnfitrião são conhecidos por terem domínio sobre cada \naspecto da existência e por falarem com uma voz \nunificada. Mas os Seis Sombrios são deuses primitivos, \nsanguinários e cruéis que oferecem uma voz discordante. \nAs outras religiões de Eberron são muito diferentes \ndos panteões tradicionais de D&D. A Igreja monoteísta da \nChama Prateada é devotada a lutar contra o mal no \nmundo, mas está infestada pela corrupção em suas \npróprias fileiras. A filosofia do Sangue de Vol ensina que \na divindade existe dentro de cada ser mortal e venera os \nmortos-vivos, os quais conseguiram assegurar a \nimortalidade. Vários cultos insanos são devotados a \ncorruptores e horrores aprisionados nos Subterrâneos de \nEberron (chamado Khyber, o Dragão Abaixo). Os \nseguidores do Caminho da Luz acreditam que o mundo \nestá caminhando para um futuro glorioso onde as \nsombras que obscurecem esse mundo serão \ntransformadas em luz. E duas nações relacionadas de \nelfos reverenciam seus espíritos ancestrais: a Corte \nEterna, preservada em formas de espíritos ou, até mesmo, \nde mortos-vivos e os glorificados Espíritos do Passado, os \ngrandes heróis das guerras antigas. \nDIVINDADES NÃO-HUMANAS\nCertos deuses intimamente associados com raças não-\nhumanas são venerados em muitos mundos diferentes, \napesar de nem sempre da mesma forma. As raças não-\nhumanas dos Reinos Esquecidos e Greyhawk \ncompartilham essas divindades. \nRaças não-humanas, frequentemente, possuem seus \npróprios panteões inteiros. Além de Moradin, por \nexemplo, os deuses anões incluem a esposa de Moradin, \nBerronar Verdade Prateada e uma quantidade de outros \ndeuses que imagina-se serem seus filhos e netos: \nAbbathor, Clangeddin Barba Prateada, Dugmaren Manto \nBrilhante, Dumathoin, Gorm Gulthyn, Haela Machado \nBrilhante, Marthammor Duin, Sharindlar, Thard Harr e \nVergadain. Clãs e reinos anões individuais podem \nvenerar algumas, todas ou nenhuma dessas divindades e, \nalgumas tem outros deuses desconhecidos (ou conhecidos \npor outros nomes) para forasteiros. \n295 \nDIVINDADES DOS REINOS ESQUECIDOS \nDivindade \nTendência Domínios Sugeridos \nSímbolo \nAuril, deusa do inverno  \nNM \nNatureza, Tempestade \nFloco de neve de seis pontas \nAzuth, deus dos magos \nLN \nConhecimento \nMão esquerda apontada para cima, envolta por \nchamas \nBane, deus da tirania \nLM \nGuerra \nRaios esverdeados esmagados por punho negro \nBeshaba, deusa da má sorte \nCM \nEnganação \nGalhadas negras \nBhaal, deus do assassinato \nNM \nMorte \nCaveira rodeada por um anel de gotas de sangue \nChauntea, deusa da agricultura \nNB \nVida \nRosa desabrochada sobre uma coroa dourada de \ngrãos \nCyric, deus das m impo se fazem conhecidos com o suave \nbater das ondas nos litorais e o estrondo do trovão entre \nos picos enevoados. As espessas florestas ressecadas \ninfestadas de javalis e as colinas cobertas por oliveiras \nguardam vestígios da sua passagem. Cada aspecto da \nnatureza ecoa com a presença deles e eles adquiriram um \nlugar pra si mesmos dentro do coração dos humanos, \ntambém. \nO PANTEÃO EGÍPCIO\nEsses deuses são a jovem dinastia de uma antiga família \ndivina, herdeiros da regência do cosmos e da manutenção \ndo princípio divino de Ma’at – a ordem fundamental da \nverdade, justiça, lei e ordem que coloca deuses, faraós \nmortais e o homem e mulher comuns em seus lugares \nlógicos e justos no universo. \nO panteão egípcio é incomum por ter três deuses com o \ndomínio da Morte em diferentes tendências. Anúbis é o \ndeus leal e neutro do além-vida, julgando as almas dos \nmortos. Set é o deus caótico e mau do assassinato, no  \n299 \nentanto, mais conhecido por matar seu irmão, Osíris. E \nNephthys é a deusa caótica e boa da manhã. Portanto, \napesar da maioria dos clérigos com o domínio da Morte \n(encontrado no Guia do Mestre) serem personagens \npróprios para vilões, os clérigos que servem Anúbis ou \nNephthys não precisam ser. \nO PANTEÃO NÓRDICO\nOnde a terra despenca das colinas nevadas para os \nfiordes gelados abaixo, onde os escaleres atracam na \npraia, onde as geleiras avançam e recuam a cada outono e \nprimavera – essa é a terra dos Vikings, o lar do panteão \nNórdico. É um clima brutal, que clama por uma vida \nbrutal. Os guerreiros dessa terra tiveram que se adaptar \nas condições inóspitas para sobreviverem, mas eles não \nforam dobrados pelas necessidades do ambiente. Dada a \nnecessidade de assaltar atrás de comida e riqueza, é \nimpressionante que esses mortais tenham chegado onde \nchegaram. Seus poderes refletem as necessidades que os \nguerreiros tem de uma liderança forte e de ações \ndecisivas. Então, eles veem suas divindades em cada \ncurva de um rio, as ouvem no estrondo do trovão e no \nressoar das geleiras, e sentem o cheiro deles na fumaça de \numa maloca em chamas. \nO panteão Nórdico inclui duas famílias principais, os \nAesir (divindades da guerra e destino) e os Vanir (deuses \nda fertilidade e prosperidade). Uma vez inimigas, essas \nduas famílias agora estão bastante unidas contra seus \ninimigos em comum, os gigantes (incluindo os deuses \nSurtur e Thrym). Como os deuses de Greyhawk, deuses \nde famílias diferentes, as vezes sobrepõem suas esferas de \ninfluência: Frey (dos Vanir) e Odur (dos Aesir) são ambos \nassociados com o sol, por exemplo. \nDIVINDADES CELTAS \nDivindade \nTendência Domínios Sugeridos \nSímbolo \nO Daghdha, deus do clima e das colheitas \nCB \nEnganação, Natureza \nCaldeirão borbulhante ou escudo \nArawn, deus da vida e da morte \nNM \nMorte, Vida \nEstrela negra num fundo cinza \nBelenus, deus do sol, da luz e do calor \nNB \nLuz \nDisco solar e monólitos \nBrigantia, deusa dos rios e da pecuária \nNB \nVida \nPassarela \nDiancecht, deus da medicina e da cura \nLB \nVida \nRamos de carvalho e visco cruzados \nDunatis, deus das montanhas e dos picos \nN \nNatureza \nSol vermelho encoberto pelo pico da montanha \nGoibhniu, deus da ferraria e da cura \nNB \nConhecimento, Vida \nMarreta gigante sobre espada \nLugh, deus das artes, da viagem e do comércio \nCN \nConhecimento, Vida \nPar de mão longas \nManannan mac Lir, deus dos oceanos e das \ncriaturas marinhas \nLN \nNatureza, Tempestade \nOnda de água branca no gramado \nMath Mathonwy, deus da magia \nNM \nConhecimento \nCajado \nMorrigan, deusa da batalha \nCM \nGuerra \nDuas lanças cruzadas \nNuada, deus da guerra e dos guerreiros \nN \nGuerra \nMão prateada num fundo preto \nOghma, deus da fala e da escrita \nNB \nConhecimento \nPergaminho desfraldado \nSilvanus, deus da natureza e das florestas \nN \nNatureza \nCarvalho no verão \nDIVINDADES GREGAS \nDivindade \nTendência Domínios Sugeridos \nSímbolo \nZeus, d de \nMartelo \nThrym, deus dos gigantes do gelo e do frio \nCM \nGuerra \nMachado branco de duas lâminas \nTyr, deus da coragem e da estratégia \nLN \nConhecimento, Guerra \nEspada \nUller, deus da caça e do inverno \nCN \nNatureza \nArco longo \n301 \nAPÊNDICE C: OS PLANOS DE EXISTÊNCIA \nCOSMOS É INCRIVELMENTE VASTO NO JOGO DE\nDUNGEONS & DRAGONS, que está repleto por \numa infinidade de mundos assim como \nmiríades dimensões alternativas da realidade, \nchamadas de planos de existência. Eles  \nenglobam cada mundo onde o Mestre executa suas \naventuras, tudo dentro do reino, relativamente mundano, \ndo Plano Material. Além desse plano existem domínios de \nmatéria e energia elemental bruta, reinos de pensamento \ne etos puros, lares de corruptores e anjos e domínios dos \ndeuses. \nMuitas magias e itens mágicos podem obter energia \ndesses planos, invocar as criaturas que habitam neles, se \ncomunicar com os habitantes e permitir que aventureiros \nviagem para eles. À medida que seu personagem atinge \npoderes maiores e níveis mais altos, você poderá \nempreender uma busca para resgatar um amigo das \nterríveis profundezas do Abismo ou se encontrar \nlevantando uma caneca com os gigantes amigáveis de \nYsgard. Você poderá andar nas estradas feitas de fogo \nsólido ou por sua coragem a prova nos campos de batalha \nonde os caídos são ressuscitados a cada alvorecer. \nO PLANO MATERIAL \nO Plano Material é o nexo onde as forças filosóficas e \nelementais que definem os outros planos, colide com a \nexistência misturada da vida mortal e matéria mundana. \nTodos os mundos de D&D existem dentro do Plano \nMaterial, fazendo dele o ponto de partida da maioria das \ncampanhas e aventuras. O resto do multiverso é definido \nem relação ao Plano Material. \nOs mundos do Plano Material são infinitamente \ndiversos, já que eles refletem a imaginação criativa dos \nMestres que estabelecem seus jogos nele, assim como os \njogadores os quais os heróis se aventuram nele. Eles \nincluem planetas desertos devastados por magia e \narquipélagos de ilhas em mundos aquáticos, mundos onde \na magia se mistura com tecnologia avançada e outros \npresos numa Idade da Pedra interminável, mundos onde \nos deuses caminham e lugares abandonados por eles. \nOs mundos mais conhecidos no multiverso são os que \nforam publicados como cenários de campanha oficiais \npara o jogo de D&D ao longo dos anos – Greyhawk, \nBlackmoor, Dragonlance, os Reinos Esquecidos, Mystara, \nBirthright, Dark Sun e Eberron, dentro outros. Cada um \ndesses mundos ostenta seu próprio elenco de heroicos \naventureiros e de vilões conspiradores, suas próprias \nmasmorras e seus próprios dragões. Porém, se sua \ncampanha se estabelecer em um desses mundos, a critério \ndo seu Mestre – você poderá imagina-lo como uma das \nmilhares de versões paralelas desse mundo, o que pode \ndivergir bastante da versão publicada. \nECOS DO MATERIAL \nO Plano Material é um local amplamente mágico, e sua \nnatureza mágica é refletida em dois planos que partilha \nseu local central no multiverso. Faéria e Umbra são \ndimensões paralelas ocupando o mesmo lugar \ncosmológico, por isso eles também são chamados de \nplanos de eco ou planos reflexos do Plano Material. Os \nmundos e paisagens desses planos, refletem o mundo \nnatural do plano Material, mas reflete suas \ncaracterísticas de formas diferentes – mais maravilhoso e \nmágico em Faéria, distorcido e pálido na Umbra. Onde \nhouver um vulcão no Plano Material, uma montanha \ncoberta por cristais do tamanho de arranha-céus que \nbrilha com torres de fogo internas existirá em Faéria e \numa aglomerado de rochas irregulares lembrando uma \ncaveira marcará o lugar na Umbra. \nFaéria, também chamada de Plano das Fadas, é uma \nterra de luzes suaves e maravilhosas, um país de pessoas \npequenas com grandes desejos, um lugar de música e \nmorte. É um reino de eterno crepúsculo, com lanternas \nbalançando lentamente na brisa suave e enormes \nvagalumes zumbindo nos bosques e campos. O céu é \niluminado com as cores desbotadas do sol poente, ou \ntalvez nascente. Mas, de fato, o sol nunca se põe ou se \nergue de verdade; ele se mantem parado, obscuro e baixo \nno céu. Fora das áreas de assentamento governadas pela \nCorte Luminosa, a terra é um emaranhado espinhoso de \ndentes afiados e pântanos xaroposos – território ideal \npara que o Sombrio cace suas presas. Criaturas feéricas, \ncomo as que são enviadas para o mundo através de \nconjurar seres da floresta ou magias similares, habitam \nFaéria. \nUmbra, também chamada de Plano das Sombras, é \numa dimensão sombriamente iluminada, um mundo em \npreto e branco onde a cor foi filtrada de tudo. É um local \nde escuridão tóxica que odeia a luz, onde o céu é uma \nabobada negra sem sol nem estrelas. \nPLANOS POSITIVO E NEGATIVO \nComo um domo sobre os outros planos, o Plano Positivo é a fonte \nda energia radiante e a força vital crua que preenche todos os \nseres vivos, desde o insignificante até o sublime. Seu reflexo negro \né o Plano Negativo, a fonte da energia necrótica que destrói os \nvivos e anima os mortos-vivos. \n302 \nALÉM DO MATERIAL \nAlém do Plano Material, os vários planos de existência \nsão reinos de mitos e mistério. Eles não são apenas outros \nmundos, mas qualidades diferentes de ser, formados e \ngovernados por princípios espirituais e elementais \nabstratos do mundo comum. \nVIAGEM PLANAR \nQuando aventureiros viajam para outros planos de \nexistência, eles empreendem uma jornada lendária \natravés das fronteiras da existência para destinos \nmísticos onde eles se esforçam para completar a busca \ndeles. Jornadas como essa é ingrediente para as lendas. \nDesbravando os reinos dos mortos, buscando os servos \ncelestiais de uma divindade ou barganhando com um \nefreeti na sua cidade natal, serão assuntos para as \ncanções e histórias nos anos vindouros. \nViajar para os planos além do Plano Material pode ser \nrealizado de duas maneiras: conjurando-se uma magia ou \nusando um portal planar. \nMagias. Uma quantidade de magias garante acesso \ndireto ou indireto a outros planos de existência. Viagem \nplanar e Portal pode transportar aventureiros \ndiretamente para qualquer outro plano de existência, com \ndiferentes graus de precisão. Forma etérea permite que os \naventureiros entrem no Plano Etéreo e viagem de lá para \noutros planos de existência que ele tocar – Umbra, Faéria \nou os Planos Elementais. E a magia projeção astral deixa \nos aventureiros projetarem a si mesmos para o Plano \nAstra e viajarem para os Planos Exteriores. \nPortais. Um portal é um termo genérico para uma \nconexão interplanar imóvel que conecta um local \nespecifico em um plano a um local especifico em outro. \nAlguns portais são como portas, uma janela aberta ou \numa passagem enevoada e, simplesmente atravessa-la \nefetua a viagem interplanar. Outros são locais – círculos \nde monólitos, torres crescentes, veleiros ou, até mesmo, \ncidades inteiras – que existem em diversos planos ao \nmesmo tempo ou saltam de um plano para o outro em um \nturno. Alguns são vórtices, tipicamente juntando um \nPlano Elemental com um local muito similar no Plano \nMaterial, como o coração de um vulcão (levando para o \nPlano do Fogo) ou as profundezas do oceano (para o Plano \nda Água). \nPLANOS DE TRANSIÇÃO \nO Plano Etéreo e o Plano Astral são chamados de Planos \nde Transição. Eles são reinos incolores que, geralmente, \nservem principalmente como formas de viajar de um \nplano para outro. Magias como forma etérea e projeção \nastral permitem que os personagens entre nesses planos e \natravessem-nos para alcançar os planos além. \nO Plano Etéreo é uma dimensão nebulosa delimitada \npor brumas que é, as vezes, descrita como um grande \noceano. Suas margens, chamadas de Fronteira Etérea, \nsobrepõem o Plano Material e os Planos Interiores, \nportanto, cada local nesses planos tem um local \ncorrespondente no Plano Etéreo. Certas criaturas pode \nver na Fronteira Etérea e as magias ver o invisível e visão \nda verdade concedem essa habilidade. Alguns efeitos \nmágicos também se estendem do Plano Material para a \nFronteira Etérea, particularmente efeitos que usem \nenergia como as magias prisão de energia e muralha de \nenergia. As profundezas do plano, o Abismo Etéreo, são \numa região de turbilhões nebulosos e nevoeiros coloridos. \nO Plano Astral é um reino de pensamento e sonho, \nonde visitantes viajam como almas desincorporadas para \nalcançar os planos do divino e do demoníaco. É um imenso \nmar argênteo, o mesmo acima e abaixo, vórtices de \nmanchas brancas e cinzas estriando-se entre os motes de \nluz que se assemelham a estrelas distantes. Turbilhões \nerráticos de cores piscam em pleno ar como moedas \nrodopiantes. Ocasionalmente, pedaços de matéria sólida \npodem ser encontrados aqui, mas a maior parte do Plano \nAstral é um domínio aberto interminável. \nPLANOS INTERIORES \nOs Planos Interiores cercam e envolvem o Plano Material \ne seus ecos, fornecendo a substância elemental bruta a \nqual todos os mundos são feitos. Os quatro Planos \nElementais – Água, Ar, Fogo e Terra – formam um anel \nem volta do Plano Material, suspensos dentro do agitado \nPlano do Caos. \nNas suas margens internas, onde eles estão mais \npróximos do Plano Material (num senso geográfico \nconceitual, se não até literal), os quatro Planos \nElementais assemelham-se a um mundo no Plano \nMaterial. Os quatro elementos se misturam, como eles \nfazem no Plano Material, formando terra, mar e céu. Mais \ndistante do Plano Material, no entanto, os Planos \nElementais são tanto alheios quanto hostis. Aqui, os \nelementos existem na sua forma mais pura – grandes \nexpansões de terra sólida, chamas ardentes, água \ncristalina e ar puro. Essas regiões são pouco conhecidas, \npor isso, quando se fala do Plano do Fogo, por exemplo, o \norador geralmente se refere apenas as regiões de \nfronteira. Nas extensões mais distantes dos Planos \nInternos, os elementos puros se dissolvem e se mesclam \nem um tumulto interminável de confrontos de energias e \nsubstâncias colidindo, o Caos Elemental. \nPLANOS EXTERIORES \nSe os Planos Interiores são a matéria e energia bruta que \nformam o multiverso, os Planos Exteriores são o \ndirecionamento, pensamento e propósito para tal \nconstrução. Consequentemente, muitos sábios referem-se \naos Planos Exteriores como planos divinos, planos \nespirituais ou planos de devoção, mas os Planos \nExteriores são mais conhecidos como o lar das divindades. \nQuando se discute qualquer coisa que tenha a ver com \ndivindades, a linguagem usada deve ser extremamente \nmetamórfica. Os seus lares reais não são literalmente \n“lugares” na verdade, mas exemplificam a ideia de que os \nPlanos Exteriores são reinos de pensamento e espírito. \nAssim como os Planos Elementais, alguém pode imaginar \na parte perceptível dos Planos Exteriores como uma \nespécie de região fronteiriça, enquanto as regiões \nespirituais extensas jazem além de experiências \nsensoriais ordinárias. \nAté mesmo nessas regiões perceptíveis, as aparências \npodem enganar. Inicialmente, muitos dos Planos \nExteriores parecem hospitaleiros e familiares aos nativos \ndo Plano Material. Mas a paisagem pode mudar aos \ncaprichos das poderosas forças que vivem nos Planos \nExteriores. Os desejos das forças poderosas que habitam \nnesses planos pode refazê-los completamente, \nefetivamente apagando e reconstruindo a própria \nexistência para melhor se adequar as suas necessidades. \nA distância é, virtualmente, um conceito insignificante \nnos Planos Exteriores. As regiões perceptíveis dos planos, \nmuitas vezes, parecem muito pequenas, mas elas também \npodem se esticar para se parecerem com o infinito. Seria \npossível realizar um passeio com guia aos Nove Infernos, \nda primeira camada até a última, num único dia – se os \npoderes dos Infernos assim desejassem. Ou poderia levar \n303 \nsemanas para que os viajantes terminassem uma \nexaustiva caminhada através de um única camada. \nOs Planos Exteriores mais conhecidos são um grupo de \ndezesseis planos que correspondem às oito tendências \n(excluindo a neutralidade) e os matizes de distinção entre \nelas. \nOs planos com algum elemento bom na sua natureza \nsão chamados de Planos Superiores. Criaturas celestiais, \ncomo os anjos e pégasos habitam os Planos Superiores. \nOs planos com algum elemento mau são os Planos \nInferiores. Corruptores como os demônios, diabos e \nyugoloths habitam os Planos Inferiores. A tendência de \num plano é sua essência e, um personagem cuja tendência \nnão corresponda a do plano, experimentará uma profunda \nsensação de dissonância nele. Quando uma criatura boa \nvisitar Elísio, por exemplo, ela se sentira em sintonia com \no plano, mas uma criatura maligna se sentirá fora de\nsintonia e mais do que apenas desconfortável. \nPLANOS EXTERIORES \nPlano Exterior \nTendência \nOs Sete Paraísos Escalonados de Celestia \nLB \nOs Paraísos Gêmeos de Bitopia \nNB, LB \nOs Campos Abençoados do Elísio \nNB \nA Floresta das Terras Selvagens \nNB, CB \nAs Clareiras Olímpicas de Arbórea \nCB \nOs Domínios Heroicos de Ysgard \nCN, CB \nO Caos Eternamente Mutável do Limbo \nCN \nAs Profundezas Ecoantes de Pandemônio \nCN, CM \nAs Camadas Infinitas do Abismo \nCM \nAs Profundezas Tártaras de Cárceri \nNM, CM \nOs Desertos Cinzentos de Hades \nNM \nA Eternidade Gélida de Geena \nNM, LM \nOs Nove Infernos de Baator \nLM \nOs Campos de Batalha Infinitos de Aqueronte \nLN, LM \nO Nirvana Tecnológico de Mecânus \nLN \nOs Reinos Pacíficos de Arcádia \nLN, LB \nOUTROS PLANOS \nExistindo, de alguma forma, entre ou além dos planos de \nexistência conhecidos, há uma variedade de outros reinos. \nSIGIL E AS TERRAS EXTERIORES\nAs Terras Exteriores são o plano entre os Planos \nExteriores, um plano de neutralidade, mas não a \nneutralidade do nada. Ao invés disso, ele incorpora um \npouco de tudo, mantendo o todo em um equilíbrio \nparadoxal – simultaneamente, concordando e se opondo. \nÉ uma região ampla de terreno diversificado, com \npradarias abertas, altas montanhas e sinuosos rios rasos, \nlembrando bastante um mundo comum do Plano \nMaterial. \nAs Terras Exteriores são circulares, como uma grande \nroda – de fato, aqueles que encaram os Planos Exteriores \ndo um ponto da roda das Terras Exteriores, tem essa \ncomprovação, chamando-as de microcosmo dos planos. \nEsse argumento pode ser circular, no entanto, graças a \nele é possível que o arranjo das Terras Exteriores tenha \ninspirado a ideia da Grande Roda, em primeiro lugar. \nNa margem externa do círculo, uniformemente \nespaçadas, existem as cidades-portal: dezesseis \nassentamentos, cada um construído em volta de um \nportal que leva para um dos Planos Exteriores. Cada \ncidade partilha de muitas das características do plano \npara onde seu portal leva. \nNo centro das Terras Exteriores, como o eixo da roda \nplanar, o Pináculo ergue-se a alturas impossíveis até os \ncéus. Acima desse fino pico, flutua a cidade em forma de \nanel de Sigil, a Cidade das Portas. Essa movimentada \nmetrópole planar contem incontáveis portais para outros \nplanos e mundos. \nSigil é uma cidade comercial. Bens, mercadorias e \ninformação vem para ela de todos os planos. Existe um \ncomércio rico em informações sobre os planos, em \nparticular sobre as palavras de comando ou itens \nnecessários para operação de portais particulares. Essas \nchaves de portal são bastante procuradas, e muitos \nviajantes dentro da cidade estão à procura de um portal \nespecifico ou uma chave de portal que os dê acesso a eles \npara que continuem seus caminhos. \nSEMIPLANOS\nSemiplanos são pequenos espaços extradimensionais com \nsuas próprias regras exclusivas. Eles são pedaços de \nrealidade que não parecem se encaixar em lugar nenhum. \nOs semiplanos surgem por uma variedade de motivos. \nAlguns são criados através de magia, como semiplano, ou \ngerados pelo desejo de uma divindade ou outra força \npoderosa. Eles podem existir naturalmente, como uma \ndobra na realidade existente que foi expelida do resto do \nmultiverso, ou como um universo bebê ficando mais forte. \nUm determinado semiplano pode ser acessado através de \num único ponto onde ele toca outro plano. Teoricamente, \na magia viagem planar também pode levar viajantes para \num semiplano, mas a frequência apropriada necessária \npara encontrar a sintonia é extremamente difícil de \nalcançar. A magia portal é mais confiável, assumindo que \no conjurador conhece o semiplano.\nO REINO DISTANTE\nO Reino Distante está além do multiverso conhecido. De \nfato, ele deve ser um multiverso inteiramente separado \ncom suas próprias leis físicas e mágicas. Onde energias \ndispersas do Reino Distante vazam para outro plano, vida \ne matéria são deformadas e retorcidas em formas \nalienígenas que desafiam geometria e biologia comuns. \nAs entidades que residem no Reino Distante são muito \nalienígenas para que uma mente normal assimile sem \nsofrer dano. Criaturas titânicas nadam no nada, \npreocupados com a loucura. Coisas indescritíveis \nsussurram verdades terríveis para aqueles que ousem \nouvi-los. Para os mortais, o conhecimento do Reino \nDistante é um triunfo da mente sobre as rusticas \nfronteiras da matéria, espaço e, eventualmente, sanidade. \nNão existem portais conhecidos para o Reino Distante, \npelo menos nenhum que ainda esteja funcional. Antigos \nelfos certa vez penetraram as fronteiras dos evos com um \nvasto portal para o Reino Distante dentro de uma \nmontanha chamada de Pico da Tormenta de Fogo, mas a \ncivilização deles implodiu em um terror sanguinário e a \nlocalização do portal – até mesmo seu mundo de origem – \nfoi a muito esquecido. Outros portais ainda podem existir, \nmarcados por forças alienígenas vazando para o Plano \nMaterial para corromper seus arredores. \n304 \n305 \nAPÊNDICE D: ESTATÍSTICAS DE CRIATURAS \nAGIAS E CARACTERÍSTICAS DE CLASSE  \npermitem que os personagens se \ntransformem em animais, invoquem \ncriaturas para servir como familiares e \ncriam mortos-vivos. As estatísticas para \nessas criaturas estão agrupadas nesse  \napêndice para sua conveniência, se estiver em dúvida, a \nversão do bloco de estatísticas de uma criatura do Manual \ndos Monstros será imperativa. Para informações de como \nler um bloco de estatísticas, veja o Manual dos Monstros. \nÁGUIA GIGANTE\nBesta grande, neutro e bom \nClasse de Armadura 13 \nPontos de Vida 26 (4d10 + 4) \nDeslocamento 3 m, voo 24 m \nFOR \n16 (+3) \nDES \n17 (+3) \nCON \n13 (+1) \nINT \n8 (–1) \nSAB \n14 (+2) \nCAR \n10 (+0) \nPerícias Percepção +4 \nSentidos Percepção passiva 14 \nIdiomas Águia gigante, compreende comum mas não fala \nNível de Desafio 1 (200 XP) \nVisão Aguçada. A águia tem vantagem em testes de Sabedoria \n(Percepção) relacionados à visão.  \nAÇÕES \nAtaques Múltiplos. A águia realiza dois ataques: um com sua \nbicada e um com suas garras. \n Bicada. Ataque Corpo-a-Corpo com Arma: +5 para atingir, alcance \n1,5 m, um alvo. Acerto: 6 (1d6 + 3) de dano perfurante. \nGarras. Ataque Corpo-a-Corpo com Arma: +5 para atingir, alcance \n1,5 m, um alvo. Acerto: 10 (2d6 + 3) de dano cortante. \nARANHA GIGANTE\nBesta grande, imparcial \nClasse de Armadura 14 (armadura natural) \nPontos de Vida 26 (4d10 + 4) \nDeslocamento 9 m, escalada 9 m \nFOR \n14 (+2) \nDES \n16 (+3) \nCON \n12 (+1) \nINT \n2 (–4) \nSAB \n11 (+0) \nCAR \n4 (–3) \nPerícias Furtividade +7 \nSentidos percepção às cegas 3 m, visão no escuro 18 m, \nPercepção passiva 10 \nIdiomas – \nNível de Desafio 1 (200 XP) \nEscalada Aracnídea. A aranha pode escalar superfícies difíceis, \nincluindo tetos de cabeça para baixo, sem precisar realizar um \nteste de habilidade. \nSentido na Teia. Quando em contato com uma teia, a aranha sabe \na localização exata de qualquer outra criatura em contato com a \nmesma teia. \nAndar na Teia. A aranha ignora restrições de movimento causadas \npor estar numa teia. \nAÇÕES \n Mordida. Ataque Corpo-a-Corpo com Arma: +5 para atingir, \nalcance 1,5 m, uma criatura. Acerto: 7 (1d8 + 3) de dano \nperfurante e o alvo deve realizar um teste de resistência de \nConstituição CD 11, sofrendo 9 (2d8) de dano de veneno se falhar \nna resistência ou metade desse dano se obtiver sucesso. Se o \ndano de veneno reduzir o alvo a 0 pontos de vida, o alvo estará \nestável, porém, envenenado, por 1 hora e paralisado enquanto \nestiver envenenado dessa forma. \nTeia (Recarrega 5–6). Ataque à Distância com Arma: +5 para \natingir, alcance 9 m/ 18 m, uma criatura. Acerto: O alvo ficará \nimpedido pela teia. Com uma ação, o alvo impedido pode realizar \num teste de Força CD 12, rompendo a teia com sucesso. A teia \ntambém pode ser atacada e destruída (CA 10; 5 pv; \nvulnerabilidade a fogo; imune a dano de concussão, veneno e \npsíquico). \nCAVALO DE GUERRA\nBesta grande, imparcial \nClasse de Armadura 11 \nPontos de Vida 19 (3d10 + 3) \nDeslocamento 18 m \nFOR \n18 (+4) \nDES \n12 (+1) \nCON \n13 (+1) \nINT \n2 (–4) \nSAB \n12 (+1) \nCAR \n7 (–2) \nSentidos Percepção passiva 11 \nIdiomas – \nNível de Desafio 1/2 (100 XP) \nAtropelar. Se o cavalo se mover, pelo menos, 6 metros em linha \nreta em direção de um alvo logo antes de atingi-lo com seu ataque \nde cascos, o alvo deve ser bem sucedido num teste de resistência \nde Força CD 14 para não cair no chão. Se o alvo cair no chão, o \ncavalo poderá realizar uma ação bônus para realizar outro ataque \nde cascos contra ele. \nAÇÕES \nCascos. Ataque Corpo-a-Corpo com Arma: +4 para atingir, alcance \n1,5 m, um alvo. Acerto: 11 (2d6 + 4) de dano de concussão. \nVARIAÇÃO: ARMADURA PARA CAVALO DE GUERRA \nUm cavalo de guerra de armadura terá uma Classe de Armadura \nbaseada no tipo de armadura vestida (veja o capítulo 5 para mais \ninformações sobre armaduras). A Classe de Armadura dele inclui o \nmodificador de Destreza do cavalo, quando aplicável. \nCA \nArmadura \nCA \nArmadura \n12 te pode usar sua ação para se \nmetamorfosear nas formas de besta de um rato, corvo ou aranha, \nou em sua forma de diabo. Suas estatísticas são as mesmas em \ntodas as formas, no entanto, seu ataque é diferente em algumas \ndelas. Qualquer equipamento carregado não será transformado. \nSe for morto, o diabrete volta a sua forma de diabo. \nResistência à Magia. O diabrete tem vantagem em testes de \nresistência contra magias e outros efeitos mágicos. \nVisão de Diabo. Escuridão mágica não impede a visão no escuro \ndo diabrete. \nAÇÕES \nFerrão (Mordida em Forma de Besta). Ataque Corpo-a-Corpo com \nArma: +5 para atingir, alcance 1,5 m, uma criatura. Acerto: 5 (1d4 \n+ 3) de dano perfurante e o alvo deve realizar um teste de \nresistência de Constituição CD 11, sofrendo 10 (3d6) de dano de \nveneno se falhar na resistência ou metade desse dano se obtiver \nsucesso. \nInvisibilidade. O diabrete fica invisível até ele atacar ou sua \nconcentração acabar. Qualquer coisa que o diabrete invisível \nestiver carregando ou vestindo fica invisível contanto que \npermaneça em contato com ele. \nESQUELETO\nMorto-vivo médio, leal e mau \nClasse de Armadura 13 (pedaços de armadura) \nPontos de Vida 13 (2d8 + 4) \nDeslocamento 9 m \nFOR \n10 (+0) \nDES \n14 (+2) \nCON \n15 (+2) \nINT \n6 (–2) \nSAB \n8 (–1) \nCAR \n5 (–3) \nVulnerabilidade a Dano concussão \nImunidades a Dano veneno \nImunidades a Condições envenenado \nSentidos visão no escuro 18 m, Percepção passiva 9 \nIdiomas compreende os idiomas que conhecia em vida, mas não \npode falar \nNível de Desafio 1/4 (50 XP) \nAÇÕES \nArco Curto. Ataque à Distância com Arma: +4 para atingir, distância \n24 m/96 m, um alvo. Acerto: 5 (1d6 + 2) de dano perfurante. \nEspada Curta. Ataque Corpo-a-Corpo com Arma: +4 para atingir, \nalcance 1,5 m, um alvo. Acerto: 5 (1d6 + 2) de dano perfurante. \nFALCÃO\nBesta miúdo, imparcial \nClasse de Armadura 13 \nPontos de Vida 1 (1d4 – 1) \nDeslocamento 3 m, voo 18 m \nFOR \n5 (–3) \nDES \n16 (+3) \nCON \n8 (–1) \nINT \n2 (–4) \nSAB \n14 (+2) \nCAR \n6 (–2) \nPerícias Percepção +4 \nSentidos Percepção passiva 14 \nIdiomas – \nNível de Desafio 0 (10 XP) \nVisão Aguçada. O falcão tem vantagem em testes de Sabedoria \n(Percepção) relacionados à visão.  \nAÇÕES \nGarras. Ataque Corpo-a-Corpo com Arma: +5 para atingir, alcance \n1,5 m, um alvo. Acerto: 1 de dano cortante. \n308 \nGATO\nBesta miúdo, imparcial \nClasse de Armadura 12 \nPontos de Vida 2 (1d4) \nDeslocamento 12 m, escalada 9 m \nFOR \n3 (–4) \nDES \n15 (+2) \nCON \n10 (+0) \nINT \n3 (–4) \nSAB \n12 (+1) \nCAR \n7 (–2) \nPerícias Furtividade +4, Percepção +3 \nSentidos Percepção passiva 13 \nIdiomas – \nNível de Desafio 0 (10 XP) \nFaro Aguçado. O gato tem vantagem em testes de Sabedoria \n(Percepção) relacionados ao olfato.  \nAÇÕES \nGarras. Ataque Corpo-a-Corpo com Arma: +0 para atingir, alcance \n1,5 m, um alvo. Acerto: 1 de dano cortante. \nJAVALI\nBesta médio, imparcial \nClasse de Armadura 11 (armadura natural) \nPontos de Vida 11 (2d8 + 2) \nDeslocamento 12 m \nFOR \n13 (+1) \nDES \n11 (+0) \nCON \n12 (+1) \nINT \n2 (–4) \nSAB \n9 (–1) \nCAR \n5 (–3) \nSentidos Percepção passiva 9 \nIdiomas – \nNível de Desafio 1/4 (50 XP) \nInvestida. Se o javali se mover, pelo menos, 6 metros em linha \nreta em direção de uma criatura logo antes de atingi-la com seu \nataque de presa, o alvo sofre 3 (1d6) de dano cortante extra e \ndeve ser bem sucedido num teste de resistência de Força CD 11 \npara não cair no chão. \nImplacável (Recarrega após o javali terminar um descanso curto \nou longo). Se o javali sofrer dano que o reduziria a 0 pontos de \nvida, a não ser que o dano seja 7 ou mais ou de um acerto crítico, \nele cairá a 1 ponto de vida, no lugar. \nAÇÕES \n Presas. Ataque Corpo-a-Corpo com Arma: +3 para atingir, alcance \n1,5 m, um alvo. Acerto: 4 (1d6 + 1) de dano cortante. \nLEÃO\nBesta grande, imparcial \nClasse de Armadura 12 \nPontos de Vida 26 (4d10 + 4) \nDeslocamento 15 m \nFOR \n17 (+3) \n uro 36 m Percepção passiva 10 \nIdiomas Abissal, Comum \nNível de Desafio 1 (200 XP) \nMetamorfo. O quasit pode usar sua ação para se metamorfosear \nnas formas de besta de um morcego, centopeia ou sapo, ou em \nsua forma de demônio. Suas estatísticas são as mesmas em todas \nas formas, no entanto, seu ataque é diferente em algumas delas. \nQualquer equipamento carregado não será transformado. Se for \nmorto, o quasit volta a sua forma de demônio. \nResistência à Magia. O quasit tem vantagem em testes de \nresistência contra magias e outros efeitos mágicos. \nAÇÕES \nAssustar (1/dia). Uma criatura, à escolha do quasit, a até 6 metros \ndele, deve ser bem sucedida num teste de resistência de \nSabedoria CD 10 ou ficará amedrontada por 1 minuto. O alvo pode \nrepetir o teste de resistência no final de cada um dos seus turnos, \ncom desvantagem se o quasit estiver em sua linha de visão, \nterminando o efeito prematuramente se obtiver sucesso. \nGarras (Mordida em Forma de Besta). Ataque Corpo-a-Corpo com \nArma: +5 para atingir, alcance 1,5 m, um alvo. Acerto: 5 (1d4 + 3) \nde dano perfurante. Se o alvo por uma criatura, ela deve ser bem \nsucedida num teste de resistência de Constituição CD 10 ou \nsofrerá 5 (2d4) de dano de veneno e ficará envenenado por 1 \nminuto. A criatura pode repetir o teste de resistência no final de \ncada um dos seus turnos, terminando o efeito prematuramente se \nobtiver sucesso. \nInvisibilidade. O quasit fica invisível até ele atacar, usar Assustar \nou sua concentração acabar. Qualquer coisa que o quasit invisível \nestiver carregando ou vestindo fica invisível contanto que \npermaneça em contato com ele. \nRATO\nBesta miúdo, imparcial \nClasse de Armadura 10 \nPontos de Vida 1 (1d4 – 1) \nDeslocamento 6 m \nFOR \n2 (–4) \nDES \n11 (+0) \nCON \n9 (–1) \nINT \n2 (–4) \nSAB \n10 (+0) \nCAR \n4 (–3) \n311 \nSentidos visão no escuro 9 m, Percepção passiva 10 \nIdiomas – \nNível de Desafio 0 (10 XP) \nFaro Aguçado. O rato tem vantagem em test e em fantasia, \nsendo um ávido leitor de todas as ficções cientificas e \nliteraturas fantásticas desde 1950. Os autores a seguir \nforam minhas inspirações particulares. \n–E. Gary Gygax, Guia do Mestre (1979)\nUma grande parte da literatura de fantasia havia sido \npublicada antes do coautor de DUNGEONS & DRAGONS \nescrever essas palavras, importantes avanços nas obras \nestabelecidas nos mundos compartilhados de D&D. A \nlista a seguir inclui a lista original de Gary e algumas \nobras adicionais que foram inspiradoras para os \ndesenvolvedores nos anos desde então. \nAhmed, Saladin. Throne of the Crescent Moon. \nAlexander, Lloyd. The Book of Three e o resto da série \nChronicles of Prydain. \nAnderson, Poul. The Broken Sword, The High Crusade, e \nThree Hearts and Three Lions. \nAnthony, Piers. Split Infinity e o resto da série Apprentice \nAdept. \nAugusta, Lady Gregory. Gods and Fighting Men. \nBear, Elizabeth. Range of Ghosts e o resto da trilogia Eternal \nSky. \nBellairs, John. The Face in the Frost. \nBrackett, Leigh. The Best of Leigh Brackett, The Long \nTomorrow, e The Sword of Rhiannon. \nBrooks, Terry. The Sword of Shannara e o resto dos \nromances de Shannara. \nBrown, Fredric. Hall of Mirrors e What Mad Universe. \nBulfinch, Thomas. Bulfinch’s Mythology. \nBurroughs, Edgar Rice. At the Earth’s Core e o resto da série \nPellucidar, Pirates of Venus e o resto da série Venus, e A \nPrincess of Mars e o resto da série Mars. \nCarter, Lin. Warrior of World’s End e o resto da série World’s \nEnd. \nCook, Glen. The Black Company e o resto da série Black \nCompany. \nde Camp, L. Sprague. The Fallible Fiend e Lest Darkness \nFall. \nde Camp, L. Sprague & Fletcher Pratt. The Compleat \nEnchanter e o resto da série Harold Shea, e Carnelian \nCube. \nDerleth, August e H.P. Lovecraft. Watchers out of Time. \nDunsany, Lord. The Book of Wonder, The Essential Lord \nDunsany Collection, The Gods of Pegana, The King of \nElfland’s Daughter, Lord Dunsany Compendium, const ESCOLAS = ['abjuração','adivinhação','conjuração','encantamento','evocação','ilusão','necromancia','transmutação'];
const CLASSES = ['Bardo','Bruxo','Clérigo','Druida','Feiticeiro','Mago','Paladino','Patrulheiro'];
const NIVEIS = ['Truque','1° nível','2° nível','3° nível','4° nível','5° nível','6° nível','7° nível','8° nível','9° nível'];

let activeFilters = {nivel:new Set(),escola:new Set(),classe:new Set()};
let searchQuery = '';
let openSpell = null;
let sidebarOpen = false;

function buildFilters(){
  const nBtns = document.getElementById('nivel-btns');
  NIVEIS.forEach(nv => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = nv === 'Truque' ? '★' : nv.replace(' nível','');
    btn.dataset.filter = 'nivel';
    btn.dataset.value = nv;
    if(nv === 'Truque') btn.classList.add('cantrip-filter');
    btn.onclick = () => toggleFilter('nivel',nv,btn);
    nBtns.appendChild(btn);
  });

  const eBtns = document.getElementById('escola-btns');
  ESCOLAS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = e.charAt(0).toUpperCase() + e.slice(1);
    btn.dataset.filter = 'escola';
    btn.dataset.value = e;
    btn.onclick = () => toggleFilter('escola',e,btn);
    eBtns.appendChild(btn);
  });

  const cBtns = document.getElementById('classe-btns');
  CLASSES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = c;
    btn.dataset.filter = 'classe';
    btn.dataset.value = c;
    btn.onclick = () => toggleFilter('classe',c,btn);
    cBtns.appendChild(btn);
  });
}

function toggleSidebar(){
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
  document.body.classList.toggle('sidebar-open', sidebarOpen);
}

function closeSidebar(){
  sidebarOpen = false;
  document.getElementById('sidebar').classList.remove('open');
  document.body.classList.remove('sidebar-open');
}

function clearFilters(){
  activeFilters.nivel.clear();
  activeFilters.escola.clear();
  activeFilters.classe.clear();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active','active-trick'));
  render();
}

function toggleFilter(type,value,btn){
  if(activeFilters[type].has(value)){
    activeFilters[type].delete(value);
    btn.classList.remove('active','active-trick');
  } else {
    activeFilters[type].add(value);
    if(type === 'nivel' && value === 'Truque'){
      btn.classList.add('active-trick');
    } else {
      btn.classList.add('active');
    }
  }
  render();
}

function getFiltered(){
  return SPELLS.filter(s => {
    if(searchQuery && !s.n.toLowerCase().includes(searchQuery)) return false;
    if(activeFilters.nivel.size && !activeFilters.nivel.has(s.nv)) return false;
    if(activeFilters.escola.size && !activeFilters.escola.has(s.e)) return false;
    if(activeFilters.classe.size){
      const has = s.cl.some(c => activeFilters.classe.has(c));
      if(!has) return false;
    }
    return true;
  });
}

function escHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function isListItem(line){
  return /^[\uf0b7•]/.test(line)||/^[\u2013\u2014\-]\s/.test(line)||/^\d+\.\s/.test(line);
}

function stripListMarker(line){
  return line.replace(/^[\uf0b7•]\s*/,'').replace(/^[\u2013\u2014\-]\s*/,'').replace(/^\d+\.\s*/,'');
}

function wrapParagraph(text){
  var escaped=escHtml(text);
  var m=escaped.match(/(Em Níveis Superiores\.\s*)/i);
  if(m){
    var i=m.index;
    var before=escaped.substring(0,i);
    var marker=m[1];
    var after=escaped.substring(i+marker.length);
    var r='';
    if(before)r+='<p>'+before+'</p>';
    r+='<p class="spell-level-up"><strong>'+marker+'</strong>'+after+'</p>';
    return r;
  }
  return '<p>'+escaped+'</p>';
}

function cleanDescription(text){
  text=text.replace(/\n\d{2,3}\n/g,'\n');
  text=text.replace(/^\d{1,3}\s*/,'');
  text=text.replace(/(?<!\n)\n(?!\n)/g,' ');
  text=text.replace(/ {2,}/g,' ');
  var blocks=text.split(/\n\n+/);
  var html='';
  for(var b=0;b<blocks.length;b++){
    var block=blocks[b].trim();
    if(!block)continue;
    if(/[\uf0b7•]/.test(block)){
      var items=block.split(/[\uf0b7•]+/);
      html+='<ul class="spell-list">';
      for(var i=0;i<items.length;i++){
        var item=items[i].trim();
        if(item){
          item=item.replace(/^[\u2013\u2014\-\–]\s*/,'').replace(/^\d+\.\s*/,'');
          html+='<li>'+escHtml(item)+'</li>';
        }
      }
      html+='</ul>';
    }else{
      html+=wrapParagraph(block);
    }
  }
  return html;
}

function render(){
  const filtered = getFiltered();
  const list = document.getElementById('spell-list');
  const noRes = document.getElementById('no-results');
  const stats = document.getElementById('stats');
  stats.textContent = filtered.length + ' de ' + SPELLS.length + ' magias';

  if(!filtered.length){
    list.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  let html = '';
  for(const s of filtered){
    const isCantrip = s.nv === 'Truque';
    const cls = isCantrip ? 'cantrip' : 'leveled';
    const badgeCls = isCantrip ? 'badge-cantrip' : 'badge-level';
    const badgeTxt = isCantrip ? 'Truque' : s.nv;

    let classTags = '';
    if(s.cl.length){
      classTags = '<div class="spell-classes">' +
        s.cl.map(c => '<span class="class-tag tag-'+c+'">'+c+'</span>').join('') +
        '</div>';
    }

    html += '<div class="spell-card '+cls+'" data-name="'+escHtml(s.n)+'" onclick="toggleSpell(this)">' +
      '<div class="spell-header">' +
        '<span class="spell-name">'+escHtml(s.n)+'</span>' +
        '<div class="spell-meta">' +
          '<span class="badge '+badgeCls+'">'+badgeTxt+'</span>' +
          '<span class="badge badge-school">'+escHtml(s.e)+'</span>' +
          '<span class="expand-arrow">&#x25B6;</span>' +
        '</div>' +
      '</div>' +
      '<div class="spell-detail">' +
        '<div class="detail-grid">' +
          '<div><span class="detail-label">Tempo</span><br><span class="detail-value">'+escHtml(s.tc)+'</span></div>' +
          '<div><span class="detail-label">Alcance</span><br><span class="detail-value">'+escHtml(s.al)+'</span></div>' +
          '<div><span class="detail-label">Componentes</span><br><span class="detail-value">'+escHtml(s.co)+'</span></div>' +
          '<div><span class="detail-label">Duração</span><br><span class="detail-value">'+escHtml(s.du)+'</span></div>' +
        '</div>' +
        classTags +
        '<div class="spell-desc">'+cleanDescription(s.d)+'</div>' +
        '<div class="spell-ref"><span>&#x1F4D6; '+escHtml(s.pr)+'</span></div>' +
      '</div>' +
    '</div>';
  }
  list.innerHTML = html;
}

function toggleSpell(el){
  if(openSpell && openSpell !== el){
    openSpell.classList.remove('open');
  }
  el.classList.toggle('open');
  openSpell = el.classList.contains('open') ? el : null;
  if(openSpell){
    setTimeout(() => {
      openSpell.scrollIntoView({behavior:'smooth',block:'nearest'});
    }, 50);
  }
}

document.getElementById('search-box').addEventListener('input', function(){
  searchQuery = this.value.toLowerCase().trim();
  openSpell = null;
  render();
});

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    if(sidebarOpen){
      closeSidebar();
    } else {
      document.getElementById('search-box').value = '';
      searchQuery = '';
      render();
    }
  }
  if(e.key === '/' && document.activeElement !== document.getElementById('search-box')){
    e.preventDefault();
    document.getElementById('search-box').focus();
  }
});

document.getElementById('menu-toggle').addEventListener('click', toggleSidebar);
document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);
document.getElementById('sidebar-clear').addEventListener('click', clearFilters);

buildFilters();
render();
</script>
</body>
