"Instantânea","d":"Você, momentaneamente, se torna uno com a natureza e \nganha conhecimento do território ao seu redor. Ao ar \nlivre, a magia lhe oferece conhecimento do terreno a até \n4,5 quilômetros de você. Em cavernas e outros formações \nsubterrâneas naturais, o raio é limitado a 150 metros. A \nmagia não funciona onde a natureza foi substituída por \nconstruções, como em masmorras ou cidades. \nVocê, instantaneamente, adquire conhecimento de até \ntrês fatos, à sua escolha, sobre qualquer dos assuntos a \nseguir, relacionados a área: \n\nTerrenos e corpos de água\n\nPlantas, minérios, animais e povo predominante\n\nCelestiais, fadas, corruptores, elementais ou mortos-\nvivos mais poderosos\n\nInfluência de outros planos de existência\n\nConstruções\nPor exemplo, você poderia determinar a localização de\num morto-vivo poderoso na área, a localização da maior \nfonte de água potável e a localização de quaisquer cidades \npróximas.","pr":"227 (PDF: 225)","cl":[]},{"n":"CONE DE FRIO","nv":"5° nível","e":"evocação","tc":"1 ação","al":"Pessoal (cone de 18 metros)","co":"V, S, M (um pequeno cristal ou cone de","du":"Instantânea","d":"Uma explosão de ar gelado irrompe das suas mãos. Cada \ncriatura dentro do cone de 18 metros, deve realizar um \nteste de resistência de Constituição. Uma criatura sofre \n8d8 de dano de frio se falhar na resistência, ou metade \ndesse dano se passar. \nUma criatura morta por essa magia se torna uma \nestátua congelada até derreter. \nEm Níveis Superiores. Se você conjurar essa magia \nusando um espaço de magia de 6° nível ou superior, o \ndano aumenta em 1d8 para cada nível do espaço acima do \n5°.","pr":"227 (PDF: 225)","cl":["Feiticeiro","Mago"]},{"n":"CONFUSÃO","nv":"4° nível","e":"encantamento","tc":"1 ação","al":"27 metros","co":"V, S, M (três cascas de noz)","du":"Concentração, até 1 minuto","d":"Essa magia ataca e embaralha as mentes das criaturas, \ngerando delírios e provocando ações descontroladas. Cada \ncriatura em uma esfera com 3 metros de raio, centrada \nnum ponto, à sua escolha, dentro do alcance, deve ser bem \nsucedida num teste de resistência de Sabedoria, quando \nvocê conjurar essa magia ou for afetada por ela. \nUm alvo afetado não pode realizar reações e deve rolar \num d10 no início de cada um dos seus turnos para \ndeterminar seu comportamento nesse turno. \nd10 Comportamento \n1 \nA criatura usa todo seu deslocamento para se mover em \numa direção aleatória. Para determinar a direção, role \num d8 e atribua uma direção a cada face do dado. A \ncriatura não realiza uma ação nesse turno.  \n2–6 \nA criatura não se move ou realiza ações nesse turno. \n7–8 \nA criatura usa sua ação para realizar um ataque corpo-a-\ncorpo contra uma criatura, determinada aleatoriamente, \nao seu alcance. Se não houver criaturas dentro do \nalcance, a criatura não faz nada nesse turno. \n9–10 A criatura pode agir e se mover normalmente. \nAo final de cada um dos seus turnos, um alvo afetado \npode realizar um teste de resistência de Sabedoria. Se for \nbem sucedido, esse efeito acaba nesse alvo. \nEm Níveis Superiores. Se você conjurar essa magia \nusando um espaço de magia de 5° nível ou superior, o raio \nda esfera aumenta em 1,5 metro para cada nível do \nespaço acima do 4°.","pr":"227 (PDF: 225)","cl":["Bardo","Druida","Feiticeiro","Mago"]},{"n":"CONHECIMENTO LENDÁRIO","nv":"5° nível","e":"adivinhação","tc":"10 minutos","al":"Pessoal","co":"V, S, M (incenso valendo, no mínimo, 250","du":"Instantânea","d":"Nomeie ou descreva uma pessoa, local ou objeto. A magia \ntraz a sua mente um breve resumo do conhecimento \nsignificativo sobre a coisa que você nomeou. O \nconhecimento deve consistir em contos atuais, histórias \nesquecidas ou, até mesmo, conhecimento secreto que \nnunca foi amplamente divulgado. Se a coisa que você \nnomeou não for de importância lendária, você não recebe \nqualquer informação sofre ela. Quanto mais informação \n230 \nvocê possuir sobre a coisa, mais precisa e detalhada será \na informação que você receberá. \nA informação que você aprende é precisa, mas pode ser \nredigida em linguagem figurada. Por exemplo, se você \npossuir um misterioso machado mágico na mão, a magia \npode proporcionar essa informação: “Ai do malfeitor cuja \nmão toca o machado, até mesmo seu cabo corta a mão dos \nmalignos. Só um verdadeiro Filho da Pedra, adorador e \nadorado de Moradin, pode despertar os verdadeiros \npoderes do machado e apenas com a palavra sagrada \nRudnogg nos lábios.”","pr":"227 (PDF: 225)","cl":["Bardo","Clérigo","Mago"]},{"n":"CONJURAR ANIMAIS","nv":"3° nível","e":"conjuração","tc":"1 ação","al":"18 metros","co":"V, S","du":"Concentração, até 1 hora","d":"Você invoca espíritos feéricos, que assumem formas de \nbestas, que aparecem em espaços desocupados, que você \npossa ver dentro do alcance. Escolha uma das opções a \nseguir para aparecer: \n\nUma besta de nível de desafio 2 ou inferior\n\nDuas bestas de nível de desafio 1 ou inferior\n\nQuatro bestas de nível de desafio 1/2 ou inferior\n\nOito bestas de nível de desafio 1/4 ou inferior\nCada besta é também considerada uma fada e\ndesaparece quando cair a 0 pontos de vida ou quando a \nmagia acabar. \nAs criaturas invocadas são amigáveis a você e a seus \ncompanheiros. Role a iniciativa para as criaturas \ninvocadas como um grupo, que age no seu próprio turno. \nEles obedecem a quaisquer comandos verbais que você \nemitir (não requer uma ação sua). Se você não emitir \nnenhum comando a elas, elas se defenderão de criaturas \nhostis, mas no mais, não realizarão nenhuma ação. \nO Mestre possui as estatísticas das criaturas. \nEm Níveis Superiores. Se você conjurar essa magia \nusando certos espaços de magia superiores, você escolhe \numa das opções de invocação acima e mais criaturas \naparecem: o dobro delas com um espaço de 5° nível, o \ntriplo delas com um espaço de 7° nível e o quadruplo delas \ncom um espaço de 9° nível.","pr":"228 (PDF: 226)","cl":["Druida","Patrulheiro"]},{"n":"CONJURAR CELESTIAL","nv":"7° nível","e":"conjuração","tc":"1 minuto","al":"27 metros","co":"V, S","du":"Concentração, até 1 hora","d":"Você invoca um celestial de nível de desafio 4 ou inferior, \nque aparece num espaço desocupado, que você possa ver \ndentro do alcance. O celestial desaparece se cair a 0 \npontos de vida ou quando a magia acabar. \nO celestial é amigável a você e a seus companheiros \npela duração. Role a iniciativa para o celestial, que age no \nseu próprio turno. Ele obedece a quaisquer comandos \nverbais que você emitir (não requer uma ação sua), \ncontanto que não violem sua tendência. Se você não \nemitir nenhum comando a ele, ele se defenderá de \ncriaturas hostis, mas no mais, não realizará nenhuma \nação. \nO Mestre possui as estatísticas do celestial. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 9° nível, você \ninvoca um celestial de nível de desafio 5 ou inferior.","pr":"228 (PDF: 226)","cl":["Clérigo"]},{"n":"CONJURAR ELEMENTAIS MENORES","nv":"4° nível","e":"conjuração","tc":"1 minuto","al":"27 metros","co":"V, S","du":"Concentração, até 1 hora","d":"Você invoca elementais que aparecem em espaços \ndesocupados, que você possa ver dentro do alcance. Você \nescolhe uma das opções a seguir para aparecer: \n\nUm elemental de nível de desafio 2 ou inferior\n\nDois elementais de nível de desafio 1 ou inferior\n\nQuatro elementais de nível de desafio 1/2 ou inferior\n\nOito elementais de nível de desafio 1/4 ou inferior\nUm elemental invocado através dessa magia\ndesaparece quando cair a 0 pontos de vida ou quando a \nmagia acabar. \nAs criaturas invocadas são amigáveis a você e a seus \ncompanheiros. Role a iniciativa para as criaturas \ninvocadas como um grupo, que age no seu próprio turno. \nEles obedecem a quaisquer comandos verbais que você \nemitir (não requer uma ação sua). Se você não emitir \nnenhum comando a elas, elas se defenderão de criaturas \nhostis, mas no mais, não realizarão nenhuma ação. \nO Mestre possui as estatísticas das criaturas. \nEm Níveis Superiores. Se você conjurar essa magia \nusando certos espaços de magia superiores, você escolhe \numa das opções de invocação acima e mais criaturas \naparecem: o dobro delas com um espaço de 6° nível e o \ntriplo delas com um espaço de 8° nível.","pr":"228 (PDF: 226)","cl":[]},{"n":"CONJURAR ELEMENTAL","nv":"5° nível","e":"conjuração","tc":"1 minuto","al":"27 metros","co":"V, S, M (incenso aceso para ar, argila","du":"Concentração, até 1 hora","d":"Você invoca um servo elemental. Escolha uma área de ar, \nágua, fogo ou terra que preencha 3 metros cúbicos, dentro \ndo alcance. Um elemental de nível de desafio 5 ou \ninferior, adequado a área que você escolheu, aparece em \num espaço desocupado a até 3 metros dela. Por exemplo, \num elemental do fogo emergiria de uma fogueira e um \nelemental da terra erguer-se-ia do solo. O elemental \ndesaparece quando cair a 0 pontos de vida ou quando a \nmagia acabar. \nO elemental é amigável a você e a seus companheiros \npela duração. Role a iniciativa para o elemental, que age \nno seu próprio turno. Ele obedece a quaisquer comandos \nverbais que você emitir (não requer uma ação sua). Se \nvocê não emitir nenhum comando a ele, ele se defenderá \nde criaturas hostis, mas no mais, não realizará nenhuma \nação. \n Se sua concentração for interrompida, o elemental \nnão desaparece. Ao invés disso, você perde o controle \nsobre o elemental e ele se torna hostil a você e aos seus \ncompanheiros, e irá atacar. Um elemental fora de controle \nnão pode ser dispensado e desaparece 1 hora depois de \nvocê ter o invocado.","pr":"228 (PDF: 226)","cl":["Druida","Mago"]},{"n":"CONJURAR FADA","nv":"6° nível","e":"conjuração","tc":"1 minuto","al":"27 metros","co":"V, S","du":"Concentração, até 1 hora","d":"231 \nVocê invoca uma criatura feérica de nível de desafio 6 ou \ninferior ou um espírito feérico que assume a forma de \numa besta de nível de desafio 6 ou inferior. Ela aparece \nnum espaço desocupado, que você possa ver dentro do \nalcance. A criatura feérica desaparece se cair a 0 pontos \nde vida ou quando a magia acabar. \nA criatura feérica é amigável a você e a seus \ncompanheiros pela duração. Role a iniciativa para a \ncriatura, que age no seu próprio turno. Ela obedece a \nquaisquer comandos verbais que você emitir (não requer \numa ação sua), contanto que não violem sua tendência. Se \nvocê não emitir nenhum comando a ela, ela se defenderá \nde criaturas hostis, mas no mais, não realizará nenhuma \nação. \n Se sua concentração for interrompida, a criatura \nfeérica não desaparece. Ao invés disso, você perde o \ncontrole sobre o elemental e ele se torna hostil a você e \naos seus companheiros, e irá atacar. Uma criatura feérica \nfora de controle não pode ser dispensada e desaparece 1 \nhora depois de você ter a invocado. \nO Mestre possui as estatísticas da criatura feérica. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 7° nível ou \nsuperior, o nível de desafio aumenta em 1 para cada nível \ndo espaço acima do 6°.","pr":"228 (PDF: 226)","cl":["Bruxo","Druida"]},{"n":"CONJURAR RAJADA","nv":"3° nível","e":"conjuração","tc":"1 ação","al":"Pessoal (cone de 18 metros)","co":"V, S, M (uma munição ou arma de","du":"Instantânea","d":"Você arremessa uma arma não-mágica ou dispara uma \nmunição não-mágica no ar para criar um cone de armas \nidênticas que se lançam a frente e então desaparecem. \nCada criatura num cone de 18 metros, deve ser bem \nsucedida num teste de resistência de Destreza. Uma \ncriatura sofre 3d8 de dano se falhar na resistência, ou \nmetade desse dano num sucesso. O tipo do dano é o \nmesmo da arma ou munição usada como componente.","pr":"229 (PDF: 227)","cl":["Patrulheiro"]},{"n":"CONJURAR SARAIVADA","nv":"5° nível","e":"conjuração","tc":"1 ação","al":"45 metros","co":"V, S, M (uma munição ou arma de","du":"Instantânea","d":"Você dispara uma munição não-mágica de uma arma à \ndistância ou arremessa uma arma não-mágica no ar e \nescolhe um ponto dentro do alcance. Centenas de \nduplicatas da munição ou arma caem em uma saraivada \nvinda de cima e então desaparecem. Cada criatura num \ncilindro com 12 metros de raio e 6 metros de altura \ncentrado no ponto, deve realizar um teste de resistência \nde Destreza. Uma criatura sofre 8d8 de dano se falhar na \nresistência, ou metade desse dano num sucesso. O tipo do \ndano é o mesmo da munição ou arma.","pr":"229 (PDF: 227)","cl":["Patrulheiro"]},{"n":"CONJURAR SERES DA FLORESTA","nv":"4° nível","e":"conjuração","tc":"1 ação","al":"18 metros","co":"V, S, M (um fruto sagrado por criatura","du":"Concentração, até 1 hora","d":"Você invoca criaturas feéricas que aparecem em espaços \ndesocupados, que você possa ver dentro do alcance. \nEscolha uma das opções a seguir para aparecer: \n\nUma criatura feérica de nível de desafio 2 ou inferior\n\nDuas criaturas feéricas de nível de desafio 1 ou\ninferior\n\nQuatro criaturas feéricas de nível de desafio 1/2 ou\ninferior\n\nOito criaturas feéricas de nível de desafio 1/4 ou\ninferior\nUma criatura invocado desaparece quando cair a 0 \npontos de vida ou quando a magia acabar. \nAs criaturas invocadas são amigáveis a você e a seus \ncompanheiros. Role a iniciativa para as criaturas \ninvocadas como um grupo, que age no seu próprio turno. \nEles obedecem a quaisquer comandos verbais que você \nemitir (não requer uma ação sua). Se você não emitir \nnenhum comando a elas, elas se defenderão de criaturas \nhostis, mas no mais, não realizarão nenhuma ação. \nO Mestre possui as estatísticas das criaturas. \nEm Níveis Superiores. Se você conjurar essa magia \nusando certos espaços de magia superiores, você escolhe \numa das opções de invocação acima e mais criaturas \naparecem: o dobro delas com um espaço de 6° nível e o \ntriplo delas com um espaço de 8° nível.","pr":"229 (PDF: 227)","cl":["Druida","Patrulheiro"]},{"n":"CONSAGRAR","nv":"5° nível","e":"evocação","tc":"24 horas","al":"Toque","co":"V, S, M (ervas, óleos e incenso valendo,","du":"Até ser dissipada","d":"Você toca um ponto e infunde uma área ao redor com \npoder sagrado (ou profano). A área pode ter até 18 metros \nde raio e a magia falha se o raio incluir uma área já sob \nefeito da magia consagrar. A área afetada está sujeita aos \nseguintes efeitos. \nPrimeiro, celestiais, corruptores, elementais, fadas e \nmortos-vivos não conseguem entrar na área, nem, tais \ncriaturas, podem enfeitiçar, amedrontar ou possuir \ncriaturas dentro da área. Qualquer criatura enfeitiçada, \namedrontada ou possuída por uma criatura dessas, não \nestará mais enfeitiçada, amedrontada ou possuída ao \nadentrar a área. Você pode excluir um ou mais desses \ntipos de criaturas desse efeito. \nSegundo, você pode vincular um efeito extra a área. \nEscolha o efeito da lista a seguir, ou escolha um efeito \noferecido pelo Mestre. Alguns desses efeitos se aplicam a \ncriaturas na área; você pode definir seu o efeito se aplica \na todas as criaturas, criaturas que seguem uma divindade \nou líder especifico ou criaturas de uma espécie especifica, \ncomo orcs ou trolls. Quando uma criatura que seria \nafetada entrar na área da magia pela primeira vez em um \nturno, ou começar seu turno nela, ela pode fazer um teste \nde resistência de Carisma. Se obtiver sucesso, a criatura \nignora o efeito extra até sair da área. \nCoragem. As criaturas afetadas não podem ser \namedrontadas enquanto estiverem na área.  \nDescanso Eterno. Cadáveres enterrados na área não \npodem ser transformados em mortos-vivos.   \nEscuridão. Escuridão preenche a área. Luz normal, \nassim como luz mágica criada por magias de nível inferior \nao nível do espaço usado para conjurar essa magia, não \npodem iluminar a área.  \n232 \nIdiomas. As criaturas afetadas podem se comunicar \ncom qualquer outra criatura na área, mesmo que elas não \npartilhem um idioma em comum. \nInterferência Extradimensional. As criaturas \nafetadas não podem se mover ou viajar usando \nteletransporte ou por meios extradimensionais ou \ninterplanares.  \nLuz do Dia. Luz plena preenche a área. Escuridão \nmágica criada por magias de nível inferior ao nível do \nespaço usado para conjurar essa magia, não podem \nextinguir a luz. \nMedo. As criaturas afetadas ficam amedrontadas \nenquanto estiverem na área.  \nProteção contra Energia. As criaturas afetadas na \nárea tem resistência a um tipo de dano, à sua escolha, \nexceto de concussão, cortante ou perfurante. \nSilêncio. Nenhum som pode ser emitido de dentro da \nárea e nenhum som pode adentra-la.  \nVulnerabilidade à Energia. As criaturas afetadas \nna área tem vulnerabilidade a um tipo de dano, à sua \nescolha, exceto de concussão, cortante ou perfurante.","pr":"229 (PDF: 227)","cl":["Clérigo"]},{"n":"CONSERTAR","nv":"Truque","e":"transmutação","tc":"1 minuto","al":"Toque","co":"V, S, M (dois ímãs)","du":"Instantânea","d":"Essa magia repara um única quebra ou fissura em um \nobjeto que você tocar, como um elo quebrado de uma \ncorrente, duas metades de uma chave partida, um manto \nrasgado ou o vazamento em um odre. Contanto que a \nquebra ou fissura não tenha mais de 30 centímetros em \nqualquer dimensão, você pode remenda-la, não deixando \nqualquer vestígio do dano anterior. \nEssa magia pode reparar fisicamente um item mágico \nou constructo, mas a magia não irá restaurar a magia em \ntais objetos.","pr":"230 (PDF: 228)","cl":["Bardo","Clérigo","Druida","Feiticeiro","Mago"]},{"n":"CONSTRIÇÃO","nv":"1° nível","e":"conjuração","tc":"1 ação","al":"27 metros","co":"V, S","du":"Concentração, até 1 minuto","d":"Ervas e vinhas poderosas brotam do solo num quadrado \nde 6 metros a partir de um ponto dentro do alcance. Pela \nduração, essas plantas transformam o solo na área em \nterreno difícil. \nUma criatura na área quando você conjurar a magia \ndeve ser bem sucedida num teste de resistência de Força \nou ficará impedida pelo emaranhado de plantas, até a \nmagia acabar. Uma criatura impedida pelas plantas pode \nusar sua ação para realizar um teste de Força, contra a \nCD da magia. Se for bem sucedido, irá se libertar. \nQuando a magia termina, as plantas conjuradas \nmurcharão.","pr":"230 (PDF: 228)","cl":["Druida"]},{"n":"CONTATO EXTRAPLANAR","nv":"5° nível","e":"adivinhação","tc":"1 minuto","al":"Pessoal","co":"V","du":"1 minuto","d":"Você contata mentalmente um semideus, o espírito de um \nsábio morto há muito tempo ou alguma outra entidade \nmisteriosa de outro plano. Contatar esse extraplanar \ninteligente pode distorcer ou até mesmo arruinar com sua \nmente. Quando você conjurar essa magia, faça um teste \nde resistência de Inteligência CD 15. Se falhar, você sofre \n6d6 de dano psíquico e fica insano até terminar um \ndescanso longo. Enquanto estiver insano, você não pode \nrealizar ações, não entende o que as outras criaturas \ndizem, não pode ler e fala apenas coisas sem sentido. \nConjurar a magia restauração maior em você acaba com \nesse efeito. \nSe obtiver sucesso no teste de resistência, você pode \nfazer até cinco perguntas à entidade. Você deve fazer suas \nperguntas antes da magia acabar. O Mestre responde \ncada pergunta com uma única palavra, como “sim”, “não”, \n“talvez”, “nunca”, “irrelevante” ou “incerto” (se a entidade \nnão souber a resposta para a pergunta). Em caso de uma \nresposta de única palavra puder levar ao engano, o \nMestre pode, ao invés disso, oferecer uma frase curta \ncomo resposta.","pr":"230 (PDF: 228)","cl":[]},{"n":"CONTRAMÁGICA","nv":"3° nível","e":"abjuração","tc":"1 reação, que você realiza","al":"18 metros","co":"S","du":"Instantânea","d":"Você tenta interromper uma criatura no processo de \nconjuração de uma magia. Se a criatura estiver \nconjurando uma magia de 3° nível ou inferior, a magia \nfalha e não gera nenhum efeito. Se ela estiver conjurando \numa magia de 4° nível ou superior, faça um teste de \nhabilidade usando sua habilidade de conjuração. A CD é \nigual a 10 + o nível da magia. Caso seja bem sucedido, a \nmagia da criatura falha e não gera nenhum efeito. \nEm Níveis Superiores. Se você conjurar essa magia \nusando um espaço de magia de 4° nível ou superior, a \nmagia interrompida não vai gerar efeito se o nível dela for \nmenor ou igual ao nível do espaço de magia que você usar.","pr":"230 (PDF: 228)","cl":["Bruxo","Feiticeiro","Mago"]},{"n":"CONTINGÊNCIA","nv":"6° nível","e":"evocação","tc":"10 minutos","al":"Pessoal","co":"V, S, M (uma estátua sua esculpida em","du":"10 dias","d":"Escolha uma magia de 5° nível ou inferior que você possa \nconjurar, que tenha um tempo de conjuração de 1 ação e \nque possa ter você como alvo. Você conjura essa magia – \nchamada de magia contingente – como parte da \nconjuração de contingência, gastando espaços de magia \npara ambas, mas a magia contingente não tem efeito \nimediato. Ao invés disso, ela se ativa quando uma certa \ncircunstância ocorre. Você descreve a circunstância \nquando conjura as duas magias. Por exemplo, uma \ncontingência conjurada com respirar na água pode \nestipular que respirar na água se ative quando você \nestiver imerso em água ou um líquido similar. \nA magia contingente se ativa imediatamente depois da \ncircunstância ser satisfeita pela primeira vez, quer você \nqueira, quer não, e a contingência termina. \nA magia contingente afeta apenas você, mesmo que ela \nnormalmente possa afetar outros alvos. Você pode ter \napenas uma contingência ativa por vez. Se você conjurar \nessa magia novamente, o efeito da outra magia \ncontingência termina. Além disso, a contingência também \n233 \ntermina em você se os componentes materiais dela não \nestiverem mais com você.","pr":"230 (PDF: 228)","cl":["Mago"]},{"n":"CONTROLAR A ÁGUA","nv":"4° nível","e":"transmutação","tc":"1 ação","al":"90 metros","co":"V, S, M (uma gota de água e uma pitada","du":"Concentração, até 10 minutos","d":"Até o fim da magia, você controla qualquer corpo de água \ndentro da área que você escolher, que é um cubo de 30 \nmetros quadrados. Você pode escolher dentre quaisquer \ndos efeitos seguintes, quando você conjurar essa magia. \nCom uma ação no seu turno, você pode repetir o mesmo \nefeito ou escolher um diferente.  \nInundação. Você faz com que o nível da água de toda \nárea afetada suba até 6 metros. Se a área incluir uma \nmargem, a inundação ira transbordar para a terra seca. \nSe você escolher uma área em um extenso corpo de \nágua, ao invés disso, você cria uma onda com 6 metros de \naltura que irá de um lado ao outro da área e então \ndesaba. Qualquer veículo Enorme ou menor no caminho \nda onda será carregado por ela até o outro lado. Qualquer \nveículo Enorme ou menor atingido pela onda tem uma \nchance de 25 por cento de emborcar. \nO nível da água se mantem elevado até a magia \nacabar ou você escolher um efeito diferente. Se esse efeito \nproduzir uma onda, a onda se repete no início do seu \npróximo turno enquanto o efeito de inundação durar.  \nDividir Água. Você faz com que a água na área se \ndivida e crie uma trincheira. A trincheira se estende por \ntoda área da magia e a água separada forma uma parede \nde cada lado. A trincheira permanece até a magia acabar \nou você escolher um efeito diferente. A água, então, \nlentamente preenche a trincheira ao longo do curso da \npróxima rodada até o nível normal da água ser \nrestaurado.  \nRedirecionar Fluxo. Você faz com que o fluxo da \nágua na área se mova na direção que você escolher, \nmesmo que a água tenha que fluir através de obstáculos, \nsubir muros ou em outra direção improvável. A água na \nárea se move na direção ordenada, mas uma vez que \ntenha se movido além da área da magia, ela conclui seu \nfluxo baseado nas condições do terreno. A água continua a \nse mover na direção que você escolheu até a magia acabar \nou você escolher um efeito diferente.  \nRedemoinho. Esse efeito requer um corpo de água de, \npelo menos, 15 metros quadrados e 7,5 metros de \nprofundidade. Você faz com que um redemoinho se forme \nno centro da área. O redemoinho forma um vórtice com \n1,5 metro de largura na base, chegando a 15 metros de \nlargura no topo e 7,5 metros de altura. Qualquer criatura \nou objeto na água a até 7,5 metros do vórtice é puxado 3 \nmetros na direção dele. Uma criatura pode tentar nadar \npara longe do vórtice com um teste de Força (Atletismo) \ncontra a CD da magia. \nQuando uma criatura entrar no vórtice pela primeira \nvez no turno dela ou começar seu turno dentro dele, ela \ndeve realizar um teste de resistência de Força. Se falhar, \na criatura sofre 2d8 de dano de concussão e estará presa \nno vórtice até a magia acabar. Se passar na resistência, a \ncriatura sofre metade do dano e não estará presa no \nvórtice. Uma criatura presa no vórtice pode usar sua ação \npara tentar nadar para fora do vórtice como descrito \nacima, mas terá desvantagem no teste de Força \n(Atletismo) para fazer isso. \nA primeira vez a cada turno que um objeto entrar no \nvórtice, o objeto sofre 2d8 de dano de concussão; esse dano \nse repete a cada rodada que ele permanecer no vórtice.","pr":"231 (PDF: 229)","cl":["Clérigo","Druida","Mago"]},{"n":"CONTROLAR O CLIMA","nv":"8° nível","e":"transmutação","tc":"10 minutos","al":"Pessoal (7,5 quilômetros de raio)","co":"V, S, M (incenso aceso e pedaços de terra","du":"Concentração, até 8 horas","d":"Você toma controle do clima numa área de 7,5 \nquilômetros de você pela duração. Você deve estar ao ar \nlivre para conjurar essa magia. Se mover para um lugar \nonde você não tenha uma visão clara do céu termina a \nmagia prematuramente. \nQuando você conjurar essa magia, você muda as \ncondições climáticas atuais, que são determinadas pelo \nMestre baseado no ambiente e estação. Você pode mudar \na precipitação, temperatura e vento. Leva 1d4 x 10 \nminutos para as novas condições fazerem efeito. Quando \na magia terminar, o clima, gradualmente, volta ao \nnormal. \nQuando você altera as condições climáticas, encontre a \ncondição atual nas tabelas a seguir e mude em um \nestágio, para cima ou para baixo. Quando mudar o vento, \nvocê pode mudar a direção do mesmo. \nPRECIPITAÇÃO \nEstágio \nCondição \n1 \nCéu claro \n2 \nParcialmente encoberto \n3 \nCéu escuro ou nublado \n4 \nChuva, granizo ou neve \n5 \nChuva torrencial, tempestade de granizo ou nevasca \nTEMPERATURA \nVENTO \nEstágio \nCondição \nEstágio \nCondição \n1 \nCalor insuportável \n1 \nCalmo \n2 \nQuente \n2 \nVento moderado \n3 \nMorno \n3 \nVento forte \n4 \nFrio \n4 \nVentania \n5 \nGelado \n5 \nTemporal \n6 \nFrio ártico","pr":"231 (PDF: 229)","cl":["Clérigo","Druida","Mago"]},{"n":"CONVOCAR FAMILIAR","nv":"1° nível","e":"conjuração","tc":"1 hora","al":"3 metros","co":"V, S, M (carvão, incenso e ervas no valor","du":"Instantânea","d":"Você adquire os serviços de uma familiar, um espírito que \ntoma a forma de um animal, à sua escolha: aranha, \ncaranguejo, cavalo marinho, coruja, corvo, doninha, gato, \nfalcão, lagarto, morcego, peixe (arenque), polvo, rato, rã \n(sapo) ou serpente venenosa. Aparecendo em um espaço \ndesocupado dentro do alcance, o familiar tem as mesmas \nestatísticas da forma escolhida, no entanto, ele é um \ncelestial, corruptor ou fada (à sua escolha) ao invés de \numa besta. \nSeu familiar age independentemente de você, mas ele \nsempre obedece aos seus comandos. Em combate, ele rola \nsua a própria iniciativa e age no seu próprio turno. Um \nfamiliar não pode atacar, mas ele pode realizar outras \nações, como de costume. \n234 \nQuando um familiar cai a 0 pontos de vida, ele \ndesaparece, não deixando qualquer corpo físico para trás. \nEle reaparece depois de você conjurar essa magia \nnovamente. \nEnquanto seu familiar estiver a até 30 metros de você, \nvocê pode se comunicar telepaticamente com ele. Além \ndisso, com uma ação, você pode ver através dos olhos do \nfamiliar e ouvir através dos ouvidos dele, até o início do \nseu próximo turno, adquirindo os benefícios de qualquer \nsentido especial que o familiar possua. Durante esse \nperíodo, você estará cego e surdo em relação aos seus \npróprios sentidos. \nCom uma ação, você pode, temporariamente, \ndispensar seu familiar. Ele desaparece dentro de uma \nbolsa dimensional onde ele aguarda sua convocação. \nAlternativamente, você pode dispensa-lo para sempre. \nCom uma ação, enquanto ele estiver temporariamente \ndispensado, você pode fazê-lo reaparecer em qualquer \nespaço desocupado a até 9 metros de você. \nVocê não pode ter mais de um familiar por vez. Se você \nconjurar essa magia enquanto já tiver um familiar, ao \ninvés disso, você faz seu familiar existente adotar uma \nnova forma. Escolha uma das formas da lista acima. Seu \nfamiliar se transforma na criatura escolhida. \nFinalmente, quando você conjura uma magia com \nalcance de toque, seu familiar pode transmitir a magia, \ncomo se ele tivesse conjurado ela. Seu familiar precisa \nestar a até 30 metros de você e deve usar a reação dele \npara transmitir a magia quando você a conjurar. Se a \nmagia necessitar de uma jogada de ataque, você usa seu \nmodificador de ataque para essa jogada.","pr":"231 (PDF: 229)","cl":[]},{"n":"CONVOCAR MONTARIA","nv":"2° nível","e":"conjuração","tc":"10 minutos","al":"9 metros","co":"V, S","du":"Instantânea","d":"Você convoca um espírito que assume a forma de uma \nmontaria excepcionalmente inteligente, forte e leal, \ncriando uma ligação duradoura com ela. Aparecendo em \num espaço desocupado dentro do alcance, a montaria \nadquire a forma que você escolher, como um cavalo de \nguerra, um pônei, um camelo, um alce ou um mastim. \n(Seu Mestre pode permitir outros animais para serem \nconvocados como montarias.) A montaria tem as \nestatísticas da forma escolhida, no entanto, ele é um \ncelestial, corruptor ou fada (à sua escolha) ao invés do seu \ntipo normal. Além disso, se sua montaria tiver \nInteligência 5 ou menor, a Inteligência dela se torna 6 e \nela ganha a capacidade de compreender um idioma, à sua \nescolha, que você fala. \nSua montaria serve tanto para cavalgar quando para o \ncombate e você tem uma ligação instintiva com ela que \npermite a vocês lutarem como uma unidade singular. \nEnquanto estiver montado na sua montaria, você pode \nfazer com que qualquer magia que você conjure que tenha \nalcance pessoal, também afete a sua montaria. \nQuando a montaria cair a 0 pontos de vida, ela \ndesaparece, não deixando qualquer corpo físico para trás. \nVocê também pode dispensar sua montaria a qualquer \nmomento, com uma ação, fazendo-a desaparecer. Em \nambos os casos, conjurar essa magia novamente \nconvocará a mesma montaria, restaurando-a ao seu \nmáximo de pontos de vida. \nEnquanto sua montaria estiver a até 1,5 quilômetro de \nvocê, você pode se comunicar telepaticamente com ela. \nVocê não pode ter mais de uma montaria ligado por \nessa magia por vez. Com uma ação, você pode liberar a \nmontaria da ligação a qualquer momento, fazendo-a \ndesaparecer.","pr":"232 (PDF: 230)","cl":["Paladino"]},{"n":"CONVOCAR RELÂMPAGOS","nv":"3° nível","e":"conjuração","tc":"1 ação","al":"36 metros","co":"V, S","du":"Concentração, até 10 minutos","d":"Uma nuvem tempestuosa aparece em formato cilíndrico \ncom 3 metros de altura e 18 metros de raio, centrada num \nponto que você possa ver, 30 metros acima de você. A \nmagia falha se você não puder ver um ponto no ar em que \na nuvem possa aparecer (por exemplo, se você estiver em \numa sala que não possa comportar a nuvem). \nQuando você conjurar a magia, escolha um ponto que \nvocê possa ver dentro do alcance. Um raio de eletricidade \né disparado da nuvem no ponto. Cada criatura a 1,5 \nmetro desse ponto deve realizar um teste de resistência \nde Destreza. Uma criatura sofre 3d10 de dano elétrico se \nfalhar no teste, ou metade desse dano se passar. Em cada \num dos seus turnos, até a magia acabar, você pode usar \nsua ação para convocar um relâmpago dessa forma \nnovamente, afetando o mesmo ponto ou um diferente. \nSe você estiver a céu aberto em condições \ntempestuosas quando conjurar essa magia, a magia lhe \ndá controle sobre a tempestade existente ao invés de criar \numa nova. Sob tais condições, o dano da magia aumenta \nem 1d10.  \nEm Níveis Superiores. Se você conjurar essa magia \nusando um espaço de magia de 4° nível ou superior, o \ndano aumenta em 1d10 para cada nível do espaço acima \ndo 3°.","pr":"232 (PDF: 230)","cl":["Druida"]},{"n":"COROA DA LOUCURA","nv":"2° nível","e":"encantamento","tc":"1 ação","al":"36 metros","co":"V, S","du":"Concentração, até 1 minuto","d":"Um humanoide, à sua escolha, que você possa ver dentro \ndo alcance, deve ser bem sucedido num teste de \nresistência de Sabedoria ou ficará enfeitiçado por você \npela duração. Enquanto o alvo estiver enfeitiçado dessa \nforma, uma coroa retorcida de ferro denteado aparece na \ncabeça dele e a loucura brilha em seus olhos. \nA criatura enfeitiçada deve usar sua ação antes de se \nmover, em cada um dos turnos dela, para realizar um \nataque corpo-a-corpo contra uma criatura, diferente de si \nmesma, que você escolher mentalmente. \nO alvo pode agir normalmente no turno dele se você \nnão escolher uma criatura ou se você não estiver dentro \ndo alcance. \nNos seus turnos subsequentes, você deve usar sua \nação para manter o controle sobre o alvo, ou a magia \ntermina. Igualmente, o alvo pode realizar um teste de \nresistência de Sabedoria no final de cada um dos turnos \ndele. Se obtiver sucesso, a magia termina.","pr":"232 (PDF: 230)","cl":["Bardo","Bruxo","Feiticeiro","Mago"]},{"n":"CORDÃO DE FLECHAS","nv":"2° nível","e":"transmutação","tc":"1 ação","al":"1,5 metro","co":"V, S, M (quatro ou mais flechas ou","du":"8 horas","d":"Você enfinca quatro munições não-mágicas – flechas ou \nvirotes de besta – no solo dentro do alcance e conjura \n235 \nmagia neles para proteger uma área. Até a magia acabar, \nsempre que uma criatura diferente de você se aproximar \na 9 metros das munições pela primeira vez em um turno \nou terminar seu turno na área, uma das munições voa \npara atingi-la. A criatura deve ser bem sucedida num \nteste de resistência de Destreza ou sofrerá 1d6 de dano \nperfurante. A munição, então, é destruída. A magia \ntermina quando não restar nenhuma munição. \nQuando você conjurar essa magia, você pode designar \nquaisquer criaturas, à sua escolha, e a magia ignora-as.  \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 3° nível ou \nsuperior, a quantidade de munições que você pode afetar \naumenta em dois para cada nível do espaço acima do 2°.","pr":"232 (PDF: 230)","cl":["Patrulheiro"]},{"n":"CORRENTE DE RELÂMPAGOS","nv":"6° nível","e":"evocação","tc":"1 ação","al":"45 metros","co":"V, S, M (um pouco de pelo; um pedaço de","du":"Instantânea","d":"Você cria um raio elétrico que atinge um alvo, à sua \nescolha, que você possa ver dentro do alcance. Três raios \nsaltam do alvo para até três outros alvos, cada um a não \nmais de 9 metros do alvo primário. Um alvo pode ser uma \ncriatura ou um objeto e só pode ser alvo de um único \ndesses raios. \nUm alvo deve realizar um teste de resistência de \nDestreza. O alvo sofre 10d8 de dano elétrico se falhar no \nteste ou metade desse dano se for bem sucedido. \nEm Níveis Superiores. Se você conjurar essa magia \nusando um espaço de magia de 7° nível ou superior, um \nraio adicional salta do alvo primário para outro alvo para \ncada nível do espaço acima do 6°.","pr":"233 (PDF: 231)","cl":["Feiticeiro","Mago"]},{"n":"CRESCER ESPINHOS","nv":"2° nível","e":"transmutação","tc":"1 ação","al":"45 metros","co":"V, S, M (sete espinhos afiados ou sete","du":"Concentração, até 10 minutos","d":"O solo num raio de 6 metros, centrado num ponto dentro \ndo alcance, se retorce e brotam cavilhas rígidas e \nespinhos. A área se torna terreno difícil pela duração. \nQuando uma criatura entrar ou se mover dentro da área, \nela sofrerá 2d4 de dano perfurante para cada 1,5 metro \nque ela atravessar. \nA transformação do terreno é camuflada para parecer \nnatural. Qualquer criatura que não puder ver a área no \nmomento que a magia for conjurada, deve realizar um \nteste de Sabedoria (Percepção) contra a CD da magia para \nreconhecer o terreno como perigoso, antes de adentra-lo.","pr":"233 (PDF: 231)","cl":["Druida","Patrulheiro"]},{"n":"CRIAÇÃO","nv":"5° nível","e":"ilusão","tc":"1 minuto","al":"9 metros","co":"V, S, M (um pequeno pedaço de material","du":"Especial","d":"Você puxa mechas de matéria sombria da Umbra para \ncriar objetos inanimados de matéria vegetal dentro do \nalcance: bens finos, cordas, madeira ou algo similar. Você \ntambém pode usar a magia para criar objetos minerais \ncomo pedra, cristal ou metal. O objeto criado não pode ser \nmaior que um cubo de 1,5 metro e o objeto deve ser de um \nformado e material que você já tenha visto antes. \nA duração depende do material do objeto. Se o objeto \nfor composto por diversos materiais, use o de menor \nduração. \nMaterial  \nDuração \nMatéria vegetal \n1 dia \nPedra ou cristal \n12 horas \nMetais preciosos \n1 hora \nGemas \n10 minutos \nAdamante ou mitral \n1 minuto \nUsar qualquer material criado por essa magia como \ncomponente material de outra magia faz com que a magia \nfalhe. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 6° nível ou \nsuperior, o tamanho do cubo aumenta em 1,5 metro para \ncada nível do espaço de magia acima do 5°.","pr":"233 (PDF: 231)","cl":["Feiticeiro","Mago"]},{"n":"CRIAR ALIMENTOS","nv":"3° nível","e":"conjuração","tc":"1 ação","al":"9 metros","co":"V, S","du":"Instantânea","d":"Você cria 25 quilos de comida e 100 litros de água no solo \nou em um recipiente dentro do alcance, suficiente para \nsustentar até quinze humanoide ou cinco montarias por \n24 horas. A comida é insossa, porém, nutritiva e estraga \nse não for consumida após 24 horas. A água é limpa e não \nfica ruim.","pr":"233 (PDF: 231)","cl":["Clérigo","Paladino"]},{"n":"CRIAR CHAMAS","nv":"Truque","e":"conjuração","tc":"1 ação","al":"Pessoal","co":"V, S","du":"10 minutos","d":"Uma chama tremulante aparece na sua mão. A chama \npermanece ai pela duração e não machuca nem você nem \nseu equipamento. A chama emite luz plena num raio de 3 \nmetros e penumbra por 3 metros adicionais. A magia \nacaba se você dissipa-la usando uma ação ou se conjura-la \nnovamente. \nVocê pode, também, atacar com a chama, no entanto, \nfazer isso acaba com a magia. Quando você conjura essa \nmagia ou com uma ação em um turno posterior, você pode \narremessar a chama numa criatura a até 9 metros de \nvocê. Faça um ataque à distância com magia. Se atingir, o \nalvo sofre 1d8 de dano de fogo. \nO dano dessa magia aumenta em 1d8 quando você \nalcança o 5° nível (2d8), 11° nível (3d8) e 17° nível (4d8). \nCRIAR MORTOS-VIVOS\n6° nível de necromancia \nTempo de Conjuração: 1 minuto \nAlcance: 3 metros \nComponentes: V, S, M (um pote de barro cheio de terra \nde sepultura, um pote de barro cheio de água salobra, \ne uma ônix negra no valor de 150 po, para cada corpo) \nDuração: Instantânea \nVocê só pode conjurar essa magia durante a noite. \nEscolha até três corpos de humanoides Médios ou \nPequenos dentro do alcance. Cada corpo se torna um \n236 \ncarniçal sob seu controle. (O Mestre tem as estatísticas de \njogo das criaturas.) \nCom uma ação bônus, em cada um dos seus turnos, \nvocê pode comandar mentalmente qualquer criatura que \nvocê animou com essa magia, se a criatura estiver a até \n36 metros de você (se você controla diversas criaturas, \nvocê pode comandar qualquer uma ou todas elas ao \nmesmo tempo, emitindo o mesmo comando para cada \numa). Você decide qual ação a criatura irá fazer e para \nonde ela irá se mover durante o próximo turno dela, ou \nvocê pode emitir um comando geral, como para guardar \numa câmara ou corredor especifico. Se você não der \nnenhum comando, as criaturas apenas se defenderão \ncontra criaturas hostis. Uma vez que receba uma ordem, \na criatura continuará a segui-la até a tarefa estar \nconcluída. \nA criatura fica sob seu controle por 24 horas, depois \ndisso ela para de obedecer aos seus comandos. Para \nmanter o controle da criatura por mais 24 horas, você \ndeve conjurar essa magia na criatura novamente, antes \ndas 24 horas atuais terminarem. Esse uso da magia \nrecupera seu controle sobre até três criaturas que você \ntenha animado com essa magia, ao invés de animar \nnovas. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 7° nível, você pode \nanimar ou recuperar o controle de quatro carniçais. \nQuando você conjura essa magia usando um espaço de \nmagia de 8° nível, você pode animar ou recuperar o \ncontrole de cinco carniçais ou dois lívidos ou aparições. \nQuando você conjurar essa magia usando um espaço de \nmagia de 9° nível, você pode animar ou recuperar o \ncontrole de seis carniçais, três lívidos ou aparições ou \nduas múmias.","pr":"233 (PDF: 231)","cl":["Druida"]},{"n":"CRIAR OU DESTRUIR ÁGUA","nv":"1° nível","e":"transmutação","tc":"1 ação","al":"9 metros","co":"V, S, M (uma gota de água se estiver","du":"Instantânea","d":"Você pode tanto criar quanto destruir água. \nCriar Água. Você cria 30 litros de água limpa dentro \ndo alcance, em um recipiente aberto. Alternativamente, a \nágua pode cair como chuva em um cubo de 9 metros \ndentro do alcance, extinguindo chamas expostas na área.  \nDestruir Água. Você destrói até 30 litros de água de \num \nrecipiente \naberto \ndentro \ndo \nalcance. \nAlternativamente, você pode destruir um nevoeiro em um \ncubo de 9 metros dentro do alcance.  \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, você pode criar ou destruir 30 litros de água \nadicionais, ou o tamanho do cubo aumenta em 1,5 metro, \npara cada nível do espaço acima do 1°.","pr":"234 (PDF: 232)","cl":["Clérigo","Druida"]},{"n":"CRIAR PASSAGEM","nv":"5° nível","e":"transmutação","tc":"1 ação","al":"9 metros","co":"V, S, M (algumas sementes de gergelim)","du":"1 hora","d":"Uma passagem aparece em um ponto, à sua escolha, que \nvocê possa ver em uma superfície de madeira, gesso ou \nrocha (como um muro, um teto ou um piso) dentro do \nalcance e permanece pela duração. Você escolhe as \ndimensões da passagem: até 1,5 metro de largura, 2,10 de \naltura e 6 metros de profundidade. A passagem não \nprovoca instabilidade na estrutura ao seu redor. \nQuando a abertura desaparecer, qualquer criatura ou \nobjeto que ainda estiver dentro da passagem criada pela \nmagia é ejetada em segurança para o espaço desocupado \nmais próximo da superfície onde a magia foi conjurada.","pr":"234 (PDF: 232)","cl":["Mago"]},{"n":"CÚPULA ANTIVIDA","nv":"5° nível","e":"abjuração","tc":"1 ação","al":"Pessoal (3 metros de raio)","co":"V, S","du":"Concentração, até 1 hora","d":"Uma barreira cintilante se estende de você até 3 metros \nde raio, e se move com você, permanecendo centrada em \nvocê e restringindo criaturas diferentes de mortos-vivos e \nconstructos. A barreira mantem-se pela duração. \nA barreira previna uma criatura afetada de atravessa-\nla ou alcançar através dela. Uma criatura afetada pode \nconjurar magias ou realizar ataques à distância ou \nataques com armas de haste através da barreira. \nSe você se mover forçando uma criatura afetada a \natravessar a barreira, a magia termina.","pr":"234 (PDF: 232)","cl":["Druida"]},{"n":"CURA COMPLETA","nv":"6° nível","e":"evocação","tc":"1 ação","al":"18 metros","co":"V, S","du":"Instantânea","d":"Escolha uma criatura que você possa ver, dentro do \nalcance. Um surto de energia positiva banha a criatura, \nfazendo-a recuperar 70 pontos de vida. Essa magia \ntambém acaba com efeitos de cegueira, surdez e qualquer \ndoença que estejam afetando o alvo. Essa magia não tem \nefeito em constructos ou mortos-vivos. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 7° nível ou \nsuperior, a quantidade de cura aumenta em 10 para cada \nnível do espaço acima do 6°.","pr":"234 (PDF: 232)","cl":["Clérigo","Druida"]},{"n":"CURA COMPLETA EM MASSA","nv":"9° nível","e":"evocação","tc":"1 ação","al":"18 metros","co":"V, S","du":"Instantânea","d":"Uma inundação de energia curativa emerge de você para \nas criaturas feridas ao seu redor. Você restaura até 700 \npontos de vida, divididos, à sua escolha, entre qualquer \nquantidade de criaturas que você possa ver, dentro do \nalcance. As criaturas curadas por essa magia também são \ncuradas de todas as doenças e qualquer efeito que as \ndeixou cegas ou surdas. Essa magia não afeta mortos-\nvivos ou constructos.","pr":"234 (PDF: 232)","cl":["Clérigo"]},{"n":"CURAR FERIMENTOS","nv":"1° nível","e":"evocação","tc":"1 ação","al":"Toque","co":"V, S","du":"Instantânea","d":"Uma criatura que você tocar recupera uma quantidade de \npontos de vida igual a 1d8 + seu modificador de \nhabilidade de conjuração. Essa magia não produz efeito \nem mortos-vivos ou constructos. \n237 \nEm Níveis Superiores. Se você conjurar essa magia \nusando um espaço de magia de 2° nível ou superior, a \ncura aumenta em 1d8 para cada nível do espaço acima do \n1°.","pr":"234 (PDF: 232)","cl":["Bardo","Clérigo","Druida","Paladino","Patrulheiro"]},{"n":"CURAR FERIMENTOS EM MASSA","nv":"5° nível","e":"evocação","tc":"1 ação","al":"18 metros","co":"V, S","du":"Instantânea","d":"Uma onda de energia curativa emerge de um ponto, à sua \nescolha, dentro do alcance. Escolha até seis criaturas \nnuma esfera de 9 metros de raio, centrada nesse ponto. \nCada alvo recupera uma quantidade de pontos de vida \nigual a 3d8 + seu modificador de habilidade de \nconjuração. A magia não afeta mortos-vivos ou \nconstructos. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 6° nível ou \nsuperior, a cura aumenta em 1d8 para cada nível do \nespaço acima do 5°.","pr":"235 (PDF: 233)","cl":["Bardo","Clérigo","Druida"]},{"n":"DANÇA IRRESISTÍVEL DE OTTO","nv":"6° nível","e":"encantamento","tc":"1 ação","al":"9 metros","co":"V","du":"Concentração, até 1 minuto","d":"Escolha uma criatura que você possa ver, dentro do \nalcance. O alvo começa a dançar comicamente no lugar: \nrodopiando, batendo os pés e saltitando pela duração. As \ncriaturas que não podem ser enfeitiçadas são imunes a \nessa magia. \nUma criatura dançando deve usar todo o seu \nmovimento para dançar sem abandonar seu espaço e tem \ndesvantagem nos testes de resistência de Destreza e nas \njogadas de ataque. Enquanto o alvo estiver sob efeito \ndessa magia, as outras criaturas terão vantagem nas \njogadas de ataque contra ele. Com uma ação, uma \ncriatura dançando pode realizar um teste de resistência \nde Sabedoria para recuperar controle sobre si mesmo. \nNum sucesso na resistência, a magia acaba.","pr":"235 (PDF: 233)","cl":["Bardo","Mago"]},{"n":"DEDO DA MORTE","nv":"7° nível","e":"necromancia","tc":"1 ação","al":"18 metros","co":"V, S","du":"Instantânea","d":"Você envia energia negativa na direção de uma criatura \nque você possa ver, dentro do alcance, causando dores \nseveras nela. O alvo deve realizar um teste de resistência \nde Constituição. Ele sofre 7d8 + 30 de dano necrótico se \nfalhar na resistência, ou metade desse dano se obtiver \nsucesso. \nUm humanoide morto por essa magia, se ergue no \ninício do seu próximo turno como um zumbi que está \npermanentemente sob seu controle, seguindo suas ordens \nverbais da melhor forma possível.","pr":"235 (PDF: 233)","cl":["Bruxo","Feiticeiro","Mago"]},{"n":"DESEJO","nv":"9° nível","e":"conjuração","tc":"1 ação","al":"Pessoal","co":"V","du":"Instantânea","d":"Desejo é a magia mais poderosa que uma criatura mortal \npode conjurar. Apenas ao falar em voz alta, você pode \nalterar os próprios fundamentos da realidade, de acordo \ncom seus desejos. \nO uso básico dessa magia é de copiar qualquer magia \nde 8° nível ou inferior. Você não precisa atender a \nqualquer pré-requisito da magia copiada, incluindo os \ncomponentes dispendiosos. A magia simplesmente \nacontece. \nAlternativamente, você pode criar um dos seguintes \nefeitos, à sua escolha: \n\nVocê cria um objeto no valor de até 25.000 po, que não\nseja mágico. O objeto não pode ter dimensões maiores\nque 90 metros e ele aparece em um espaço desocupado\nque você possa ver, no chão.\n\nVocê permite que até doze criaturas que você possa\nver, recuperem todos os seus pontos de vida e você\nacaba com todos os efeitos descritos na magia\nrestauração maior.\n\nVocê concede a até dez criaturas que você possa ver,\nresistência a um tipo de dano, à sua escolha.\n\nVocê concede a até dez criaturas que você possa ver,\nimunidade a uma única magia ou outro efeito mágico\npor 8 horas. Por exemplo, você poderia deixar você e\ntodos os seus companheiros imunes ao ataque de\ndreno de vida de um lich.\n\nVocê desfaz um único evento recente forçando uma\nnova jogada de qualquer jogada feita na última rodada\n(incluindo seu último turno). A realidade remodela-se\npara acomodar o novo resultado. Por exemplo, uma\nmagia desejo poderia desfazer o teste de resistência\nbem sucedido de um oponente, um acerto crítico de um\ninimigo ou o teste de resistência fracassado de um\namigo. Você pode forçar que a nova jogada seja feita\ncom vantagem ou desvantagem e você pode escolher se\nirá usar o resultado da nova jogada ou da jogada\noriginal.\nVocê é capaz de fazer coisas além do alcance dos \nexemplos acima. Apresente seu desejo ao Mestre o mais \nprecisamente possível. O Mestre tem grande amplitude \nem definir o que ocorre em tais circunstâncias; quanto \nmaior o desejo, maior será a possibilidade de que algo dê \nerrado. Essa magia pode simplesmente falhar, o efeito do \n238 \nseu desejo pode ser apenas parcialmente atendido ou você \npode sofrer consequências imprevistas como resultado da \nforma que você formulou o desejo. Por exemplo, desejar \nque um vilão esteja morto pode impulsionar você para um \nperíodo no tempo em que o vilão não esteja mais vivo, \nefetivamente removendo você do jogo. Similarmente, \ndesejar um item mágico lendário ou um artefato poderia, \ninstantaneamente, transportar você para a presença do \ndono atual do item. \nO estresse da conjuração dessa magia para produzir \nqualquer efeito diferente de copiar outra magia \nenfraquece você. Após enfrentar esse estresse, a cada vez \nque você conjurar uma magia, antes de terminar um \ndescanso longo, você sofrerá 1d10 de dano necrótico por \nnível da magia. Esse dano não pode ser reduzido ou \nprevenido de forma alguma. Além disso, sua Força cai \npara 3, se ela já não for 3 ou inferior, por 2d4 dias. Para \ncada dia desses que você permanecer descansando e não \nfizer nada além de atividades leves, seu tempo de \nrecuperação é reduzido em 2 dias. Finalmente, existe 33 \npor cento de chance de você se tornar incapaz de conjurar \ndesejo novamente se você sofrer esse estresse.","pr":"235 (PDF: 233)","cl":["Feiticeiro","Mago"]},{"n":"DESINTEGRAR","nv":"6° nível","e":"transmutação","tc":"1 ação","al":"18 metros","co":"V, S, M (um ímã e uma pitada de poeira)","du":"Instantânea","d":"Um fino raio esverdeado é lançado da ponta do seu dedo \nem um alvo que você possa ver dentro do alcance. O alvo \npode ser uma criatura, um objeto ou uma criação de \nenergia mágica, como uma muralha criada por muralha \nde energia. \nUma criatura afetada por essa magia deve realizar um \nteste de resistência de Destreza. Se falhar na resistência, \no alvo sofrerá 10d6 + 40 de dano de energia. Se esse dano\nreduzir os pontos de vida do alvo a 0, ele será \ndesintegrado. \nUma criatura desintegrada e tudo que ela está \nvestindo ou carregando, exceto itens mágicos, são \nreduzidos a uma pilha de um fino pó acinzentado. A \ncriatura só pode ser trazida de volta a vida por meio das \nmagias ressurreição verdadeira ou desejo. \nEssa magia desintegra, automaticamente, um objeto \nnão-mágico Grande ou menor ou uma criação de energia \nmágica. Se o alvo for um objeto ou criação de energia \nEnorme ou maior, a magia desintegra uma porção de 3 \nmetros cúbicos dele. Um item mágico não pode ser afetado \npor essa magia.  \nEm Níveis Superiores. Se você conjurar essa magia \nusando um espaço de magia de 7° nível ou superior, o \ndano aumenta em 3d6 para cada nível do espaço acima do \n6°.","pr":"236 (PDF: 234)","cl":["Feiticeiro","Mago"]},{"n":"DESPEDAÇAR","nv":"2° nível","e":"evocação","tc":"1 ação","al":"18 metros","co":"V, S, M (uma lasca de mica)","du":"Instantânea","d":"Um alto som estridente, dolorosamente intenso, emerge \nde um ponto, à sua escolha, dentro do alcance. Cada \ncriatura, numa esfera de 3 metros de raio, centrada no \nponto deve fazer um teste de resistência de Constituição. \nUma criatura sofre 3d8 de dano trovejante se falhar na \nresistência ou metade desse dano se obtiver sucesso. Uma \ncriatura feita de material inorgânico como pedra, cristal \nou metal, tem desvantagem nesse teste de resistência. \nUm objeto não-mágico que não esteja sendo vestido ou \ncarregado, também sofre o dano, se estiver na área da \nmagia.   \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 3° nível ou \nsuperior, o dano aumenta em 1d8 para cada nível do \nespaço acima do 2°.","pr":"236 (PDF: 234)","cl":["Bardo","Bruxo","Feiticeiro","Mago"]},{"n":"DESPERTAR","nv":"5° nível","e":"transmutação","tc":"8 horas","al":"Toque","co":"V, S, M (uma ágata valendo, no mínimo,","du":"Instantânea","d":"Depois de gastar o tempo de conjuração traçando runas \nmágicas com uma gema preciosa, você toca uma besta ou \nplanta Enorme ou menor. O alvo deve ter ou um valor de \nInteligência nulo, ou Inteligência 3 ou menor. O alvo \nganha Inteligência 10. O alvo também ganha a \ncapacidade de falar um idioma que você conheça. Se o \nalvo for uma planta, ela ganha a habilidade de mover \nseus membros, raízes, vinhas, trepadeiras e assim por \ndiante, e ganha sentidos similares ao de um humano. Seu \nMestre escolhe as estatísticas apropriadas para o arbusto \ndesperto ou árvore desperta. \nA besta ou planta desperta estará enfeitiçada por você \npor 30 dias ou até você ou seus companheiros fazerem \nqualquer coisa nociva contra ela. Quando a condição \nenfeitiçado terminar, a criatura desperta pode escolher \npermanecer amigável a você, baseado em como ela foi \ntratada enquanto estava enfeitiçada.","pr":"236 (PDF: 234)","cl":["Bardo","Druida"]},{"n":"DESPISTAR","nv":"5° nível","e":"ilusão","tc":"1 ação","al":"Pessoal","co":"S","du":"Concentração, até 1 hora","d":"Você fica invisível ao mesmo tempo que uma cópia \nilusória sua aparece onde você estava. A cópia permanece \npela duração, mas a invisibilidade acaba se você atacar ou \nconjurar uma magia. \nVocê pode usar sua ação para mover a cópia ilusória \naté o dobro do seu deslocamento e fazê-la gesticular, falar \ne se comportar da forma que você quiser. \nVocê pode ver através dos olhos e ouvir através dos \nouvidos da cópia como se você estivesse localizado onde \nela está. Em cada um dos seus turnos, com uma ação \nbônus, você pode trocar o uso dos sentidos dela pelo seu \nou voltar novamente. Enquanto você está usando os \nsentidos dela, você fica cego e surdo ao que está a sua \nvolta.","pr":"236 (PDF: 234)","cl":["Bardo","Mago"]},{"n":"DESTRUIÇÃO BANIDORA","nv":"5° nível","e":"abjuração","tc":"1 ação bônus","al":"Pessoal","co":"V","du":"Concentração, até 1 minuto","d":"Da próxima vez que você atingir uma criatura com um \nataque com arma, antes do fim da magia, seu ataque \ncrepita com energia e o ataque causa 5d6 de dano de \nenergia extra ao alvo. Além disso, se esse ataque reduzir o \nalvo a 50 pontos de vida ou menos, você a bane. Se o alvo \n239 \nfor nativo de um plano de existência diferente do que você \nestá, o alvo desaparece, retornando ao seu plano natal. Se \no alvo for nativo do plano que você está, a criatura é\nenviada para um semiplano inofensivo. Enquanto estiver \nlá, a criatura estará incapacitada. Ela permanece lá até a \nmagia acabar, a partir desse ponto, o alvo reaparece no \nespaço em que ela deixou ou no espaço desocupado mais \npróximo, se o espaço dela estiver ocupado.","pr":"236 (PDF: 234)","cl":["Paladino"]},{"n":"DESTRUIÇÃO CEGANTE","nv":"3° nível","e":"evocação","tc":"1 ação bônus","al":"Pessoal","co":"V","du":"Concentração, até 1 minuto","d":"Da próxima vez que você atingir uma criatura com um \nataque com arma, antes do fim da magia, sua arma emite \numa luz intensa, e o ataque causa 3d8 de dano radiante \nextra ao alvo. Além disso, o alvo deve ser bem sucedido \nnum teste de resistência de Constituição ou ficará cego \naté a magia acabar. \nUma criatura cega por essa magia realiza outro teste \nde resistência de Constituição no final de cada um dos \nturnos dela. Se obtiver sucesso, não estará mais cega.","pr":"237 (PDF: 235)","cl":["Paladino"]},{"n":"DESTRUIÇÃO COLÉRICA","nv":"1° nível","e":"evocação","tc":"1 ação bônus","al":"Pessoal","co":"V","du":"Concentração, até 1 minuto","d":"Da próxima vez que você atingir com um ataque corpo-a-\ncorpo com arma enquanto essa magia durar, seu ataque \ncausará 1d6 de dano psíquico extra. Além disso, se o alvo \nfor uma criatura, ele deve realizar um teste de resistência \nde Sabedoria ou ficará amedrontado por você até a magia \nacabar. Com uma ação, a criatura pode realizar um teste \nde resistência de Sabedoria contra a CD da magia para se \nmanter resoluto e terminar a magia.","pr":"237 (PDF: 235)","cl":["Paladino"]},{"n":"DESTRUIÇÃO ESTONTEANTE","nv":"4° nível","e":"evocação","tc":"1 ação bônus","al":"Pessoal","co":"V","du":"Concentração, até 1 minuto","d":"Da próxima vez que você atingir uma criatura com um \nataque corpo-a-corpo com arma, antes do fim da magia, \nsua arma penetra tanto no corpo quanto na mente e o \nataque causa 4d6 de dano psíquico adicional ao alvo. O \nalvo deve realizar um teste de resistência de Sabedoria. \nSe falhar na resistência, ele terá desvantagem nas \njogadas de ataque e testes de habilidade e não poderá \nefetuar reações até o final do próximo turno dele.","pr":"237 (PDF: 235)","cl":["Paladino"]},{"n":"DESTRUIÇÃO LANCINANTE","nv":"1° nível","e":"evocação","tc":"1 ação bônus","al":"Pessoal","co":"V","du":"Concentração, até 1 minuto","d":"Da próxima vez que você atingir uma criatura com um \nataque corpo-a-corpo com arma enquanto essa magia \ndurar, sua arma flameja com intensas chamas brancas e o \nataque causa 1d6 de dano de fogo extra ao alvo, fazendo-o \nincendiar pelas chamas. No início de cada turno dele, até \na arma acabar, o alvo deve realizar um teste de \nresistência de Constituição. Se falhar na resistência, ele \nsofre 1d6 de dano de fogo. Se passar na resistência, a \nmagia acaba. Se o alvo ou uma criatura a 1,5 metro dele \nusar uma ação para apagar as chamas ou se algum outro \nefeito extinguir as chamas (como submergir o alvo em \nágua), a magia acaba. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 2° nível ou \nsuperior, o dano extra inicial causado por esse ataque \naumenta em 1d6 para cada nível do espaço acima do 1°.","pr":"237 (PDF: 235)","cl":["Paladino"]},{"n":"DESTRUIÇÃO TROVEJANTE","nv":"1° nível","e":"evocação","tc":"1 ação bônus","al":"Pessoal","co":"V","du":"Concentração, até 1 minuto","d":"Da primeira vez que você atingir um ataque corpo-a-corpo \ncom arma enquanto essa magia durar, sua arma é \nrodeada por trovões que são audíveis a até 90 metros de \nvocê e o ataque causa 2d6 de dano trovejante extra no \nalvo. Além disso, se o alvo for uma criatura, ele deve ser \nbem sucedido num teste de resistência de Força ou será \nempurrado 3 metros para longe de você e cairá no chão.","pr":"237 (PDF: 235)","cl":["Paladino"]},{"n":"DETECTAR O BEM E MAL","nv":"1° nível","e":"adivinhação","tc":"1 ação","al":"Pessoal","co":"V, S","du":"Concentração, até 10 minutos","d":"Pela duração, você sabe se existe uma aberração, \ncelestial, corruptor, elemental, fada ou morto-vivo, a até 9 \nmetros de você, assim como onde a criatura está \nlocalizada. Similarmente, você sabe se existe um local ou \nobjeto, a até 9 metros de você, que tenha sido consagrado \nou profanado magicamente. \nA magia pode penetrar a maioria das barreiras, mas é \nbloqueada por 30 centímetros de rocha, 2,5 centímetros de \nmetal comum, uma fina camada de chumbo, ou 90 \ncentímetros de madeira ou terra.","pr":"237 (PDF: 235)","cl":["Clérigo","Paladino"]},{"n":"DETECTAR MAGIA","nv":"1° nível","e":"adivinhação","tc":"1 ação","al":"Pessoal","co":"V, S","du":"Concentração, até 10 minutos","d":"Pela duração, você sente a presença de magia a até 9 \nmetros de você. Se você sentir magia dessa forma, você \npode usar sua ação para ver uma aura suave em volta de \nqualquer criatura ou objeto visível, na área que carrega \nmagia, e você descobre a escolha de magia, se houver \numa. \nA magia pode penetrar a maioria das barreiras, mas é \nbloqueada por 30 centímetros de rocha, 2,5 centímetros de \nmetal comum, uma fina camada de chumbo, ou 90 \ncentímetros de madeira ou terra.","pr":"237 (PDF: 235)","cl":[]},{"n":"DETECTAR PENSAMENTOS","nv":"2° nível","e":"adivinhação","tc":"1 ação","al":"Pessoal","co":"V, S, M (um pedaço de cobre)","du":"Concentração, até 1 minuto","d":"Pela duração, você pode ler os pensamentos de certas \ncriaturas. Quando você conjura essa magia e, com sua \n240 \nação a cada turno até o fim da magia, você pode focar sua \nmente em qualquer criatura que você puder ver a até 9 \nmetros de você. Se a criatura escolhida possuir \nInteligência 3 ou inferior ou não falar nenhum tipo de \nidioma, a criatura não poderá ser afetada. \nVocê, inicialmente, descobre os pensamentos \nsuperficiais da criatura – o que está mais presente na sua \nmente no momento. Com uma ação, você pode tanto \nmudar sua atenção para os pensamentos de outra \ncriatura, como tentar sondar mais profundamente na \nmente da mesma criatura. Se você resolver sondar \nprofundamente, a criatura deve realizar um teste de \nresistência de Sabedoria. Se falhar, você ganha ciência do \nseu raciocínio (se possuir), seu estado emocional e algo \nque tome grande parte da sua mente (como algo que ele se \npreocupe, amores ou ódios). Se ele for bem sucedido, a \nmagia termina. Em ambas situações, o alvo saberá que \nvocê está sondando a mente dele e, a não ser que você \nmude sua atenção para os pensamentos de outra criatura, \na criatura pode usar a ação dela, no turno dela, para \nrealizar um teste de Inteligência resistido por seu teste de \nInteligência; se ela for bem sucedida, a magia termina. \nPerguntas feitas diretamente para a criatura alvo, \nnormalmente moldarão o curso dos seus pensamentos, \nportanto, essa magia é particularmente eficiente como \nparte de um interrogatório. \nVocê pode, também, usar essa magia para detectar a \npresença que criaturas pensantes que você não possa ver. \nQuando você conjura essa magia ou, com sua ação \nenquanto ela durar, você pode procurar por pensamentos \na até 9 metros de você. A magia pode penetrar a maioria \ndas barreiras, mas é bloqueada por 30 centímetros de \nrocha, 2,5 centímetros de metal comum, uma fina camada \nde chumbo, ou 90 centímetros de madeira ou terra. Você \nnão pode detectar uma criatura com Inteligência 3 ou \ninferior ou uma que não fale qualquer idioma. \nUma vez que você tenha detectado a presença de uma \ncriatura dessa forma, você pode ler os pensamentos dela \npelo resto da duração, como descrito acima, mesmo que \nvocê não possa vê-la, mas ela ainda precisa estar dentro \ndo alcance.","pr":"237 (PDF: 235)","cl":["Bardo","Feiticeiro","Mago"]},{"n":"DETECTAR VENENO E DOENÇA","nv":"1° nível","e":"adivinhação","tc":"1 ação","al":"Pessoal","co":"V, S, M (uma folha de teixo)","du":"Concentração, até 10 minutos","d":"Pela duração, você sente a presença e localização de \nvenenos, criaturas venenosas e doenças a até 9 metros de \nvocê. Você também identifica o tipo de veneno, criatura \nvenenosa ou doença em cada caso. \nA magia pode penetrar a maioria das barreiras, mas é \nbloqueada por 30 centímetros de rocha, 2,5 centímetros de \nmetal comum, uma fina camada de chumbo, ou 90 \ncentímetros de madeira ou terra.","pr":"238 (PDF: 236)","cl":[]},{"n":"DIFICULTAR DETECÇÃO","nv":"3° nível","e":"abjuração","tc":"1 ação","al":"Toque","co":"V, S, M (um pouco de pó de diamante","du":"8 horas","d":"Pela duração, você esconde um alvo que você tocar de \nmagias de adivinhação. O alvo pode ser uma criatura \nvoluntária, um local ou um objeto com não mais de 3 \nmetros em qualquer dimensão. O alvo não pode ser alvo \nde magias de adivinhação ou percebido através de \nsensores mágicos de vidência.","pr":"238 (PDF: 236)","cl":["Bardo","Mago","Patrulheiro"]},{"n":"DISCO FLUTUANTE DE TENSER","nv":"1° nível","e":"conjuração","tc":"1 ação","al":"9 metros","co":"V, S, M (uma gota de mercúrio)","du":"1 hora","d":"Essa magia cria um plano horizontal, circular de energia \nde 90 cm de diâmetro por 2,5 cm de espessura, que flutua \n90 centímetros acima do chão em um espaço desocupado, \nà sua escolha, que você possa ver dentro do alcance. O \ndisco permanece pela duração e pode suportar até 250 \nquilos. Se mais peso for colocado nele, a magia termina, e \ntudo em cima do disco cai no chão. \nO disco é imóvel enquanto você estiver a até 6 metros \ndele. Se você se afastar a mais de 6 metros dele, o disco \nseguirá você, mantendo-se a 6 metros de você. Ele pode \natravessar terreno irregular, subir ou descer escadas, \nencostas e similares, mas ele não pode atravessar \nmudanças de elevação de 3 metros ou mais. Por exemplo, \no disco não pode atravessar um fosso de 3 metros de\nprofundidade nem poderia sair de tal fosso se tivesse sido \ncriado no fundo dele. \nSe você se afastar mais de 30 metros do disco \n(tipicamente por ele não poder rodear um obstáculo para \nseguir você), a magia acaba. \nDISFARÇAR-SE\n1° nível de ilusão \nTempo de Conjuração: 1 ação \nAlcance: Pessoal \nComponentes: V, S \nDuração: 1 hora \nVocê faz com que você mesmo – incluindo suas roupas, \narmadura, armas e outros pertences no seu personagem – \npareça diferente até a magia acabar ou até você usar sua \nação para dispensa-la. Você pode se parecer 30 \ncentímetros mais baixo ou mais alto, e pode parecer \nmagro, gordo ou entre ambos. Você não pode mudar o tipo \ndo seu corpo, portanto, você deve adotar uma forma que \ntenha a mesma disposição básica de membros. No mais, a \nextensão da sua ilusão cabe a você. \nAs mudanças criadas por essa magia não conseguem \nse sustentar perante uma inspeção física. Por exemplo, se \nvocê usar essa magia para adicionar um chapéu ao seu \nvisual, objetos que passarem pelo chapéu e qualquer um \nque tocá-lo não sentirá nada ou sentirá sua cabeça e \ncabelo. Se você usar essa magia para aparentar ser mais \nmagro do que é, a mão de alguém que a erguer para tocar \nem você, irá esbarrar em você enquanto ainda está, \naparentemente, está no ar. \nPara perceber que você está disfarçado, uma criatura \npode usar a ação dela para inspecionar sua aparência e \ndeve ser bem sucedida em um teste de Inteligência \n(Investigação) contra a CD da sua magia.","pr":"238 (PDF: 236)","cl":[]},{"n":"DISSIPAR MAGIA","nv":"3° nível","e":"abjuração","tc":"1 ação","al":"36 metros","co":"V, S","du":"Instantânea","d":"Escolha uma criatura, objeto ou efeito mágico dentro do \nalcance. Qualquer magia de 3° nível ou inferior no alvo, \n241 \ntermina. Para cada magia de 4° nível ou superior no alvo, \nrealize um teste de habilidade usando sua habilidade de \nconjuração. A CD é igual a 10 + o nível da magia. Se \nobtiver sucesso, a magia termina. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 4° nível ou \nsuperior, você dissipa automaticamente os efeitos de \nmagias no alvo se o nível da magia for igual ou inferior ao \nnível do espaço de magia que você usar.","pr":"238 (PDF: 236)","cl":["Bardo","Bruxo","Clérigo","Druida","Feiticeiro","Mago","Paladino"]},{"n":"DISSIPAR O BEM E MAL","nv":"5° nível","e":"abjuração","tc":"1 ação","al":"Pessoal","co":"V, S, M (água benta ou pó de prata e","du":"Concentração, até 1 minuto","d":"Energia cintilante envolve e protege você de fadas, \nmortos-vivos e criaturas originarias além do Plano \nMaterial. Pela duração, celestiais, corruptores, \nelementais, fadas e mortos-vivos tem desvantagem nas \njogadas de ataque contra você. \nVocê pode terminar a magia prematuramente usando \numa das funções especiais a seguir. \nCancelar Encantamento. Com sua ação, você toca \numa criatura que você possa alcançar que esteja \nenfeitiçada, amedrontada ou possuída por um celestial, \ncorruptor, elemental, fada ou morto-vivo. A criatura \ntocada não estará mais enfeitiçada, amedrontada ou \npossuída por tais criaturas.  \nDemissão. Com sua ação, faça um ataque corpo-a-\ncorpo com magia contra um celestial, corruptor, \nelemental, fada ou morto-vivo que você possa alcançar. Se \natingir, você pode tentar guiar a criatura de volta ao seu \nplano natal. A criatura deve ser bem sucedida num teste \nde resistência de Carisma ou será enviada de volta ao seu \nplano natal (se já não for aqui). Se elas não estiverem em \nseus planos de origem, mortos-vivos serão enviados para \nUmbra e fadas serão enviadas para Faéria.","pr":"239 (PDF: 237)","cl":["Clérigo","Paladino"]},{"n":"DOENÇA PLENA","nv":"6° nível","e":"necromancia","tc":"1 ação","al":"18 metros","co":"V, S","du":"Instantânea","d":"Você introduz uma doença virulenta em uma criatura que \nvocê puder ver, dentro do alcance. O alvo deve realizar \num teste de resistência de Constituição. Se falhar na \nresistência, ele sofre 14d6 de dano necrótico ou metade \ndesse dano se obtiver sucesso na resistência. O dano não \npode reduzir os pontos de vida do alvo abaixo de 1. Se o \nalvo falhar no teste de resistência, seu máximo de pontos \nde vida é reduzidos por 1 hora em uma quantidade igual \nao dano necrótico causado. Qualquer efeito que remova \numa doença permitirá que o máximo de pontos de vida do \nalvo volte ao normal antes do período indicado.","pr":"239 (PDF: 237)","cl":["Clérigo"]},{"n":"DOMINAR BESTA","nv":"4° nível","e":"encantamento","tc":"1 ação","al":"18 metros","co":"V, S","du":"Concentração, até 1 minuto","d":"Você tenta seduzir uma besta que você possa ver dentro \ndo alcance. Ela deve ser bem sucedida num teste de \nresistência de Sabedoria ou ficará enfeitiçada por você \npela duração. Se você ou criaturas amigáveis a você \nestiverem lutando com ela, ela terá vantagem no teste de \nresistência. \nEnquanto a besta estiver enfeitiçada, você terá uma \nligação telepática com ela, contanto que ambos estejam no \nmesmo plano de existência. Você pode usar essa ligação \ntelepática para emitir comandos para a criatura enquanto \nvocê estiver consciente (não requer uma ação), aos quais \nela obedece da melhor forma possível. Você pode \nespecificar um curso de ação simples e genérico, como \n“Ataque aquela criatura”, “Corra até ali”, ou “Traga \naquele objeto”. Se a criatura completar a ordem e não \nreceber direções posteriores de você, ela se defenderá e se \nauto preservará da melhor forma que puder. \nVocê pode usar sua ação para tomar controle total e \npreciso do alvo. Até o final do seu próximo turno, a \ncriatura realiza apenas as ações que você escolher e não \nfaz nada que você não permita que ela faça. Durante esse \nperíodo, você também pode fazer com que a criatura use \numa reação, mas isso requer que você usa sua própria \nreação também. \nCada vez que o alvo sofrer dano, ele realiza um novo \nteste de resistência de Sabedoria contra a magia. Se \nobtiver sucesso no teste de resistência, a magia termina. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 5° nível, a duração \nserá concentração, até 10 minutos. Quando você usar um \nespaço de magia de 6° nível, a duração será concentração, \naté 1 hora. Quando você usar um espaço de magia de 7° \nnível, a duração será concentração, até 8 horas.","pr":"239 (PDF: 237)","cl":["Druida","Feiticeiro"]},{"n":"DOMINAR MONSTRO","nv":"8° nível","e":"encantamento","tc":"1 ação","al":"18 metros","co":"V, S","du":"Concentração, até 1 hora","d":"Você tenta seduzir uma criatura que você possa ver \ndentro do alcance. Ela deve ser bem sucedida num teste \nde resistência de Sabedoria ou ficará enfeitiçada por você \npela duração. Se você ou criaturas amigáveis a você \nestiverem lutando com ela, ela terá vantagem no teste de \nresistência. \nEnquanto a criatura estiver enfeitiçada, você terá uma \nligação telepática com ela, contanto que ambos estejam no \nmesmo plano de existência. Você pode usar essa ligação \ntelepática para emitir comandos para a criatura enquanto \nvocê estiver consciente (não requer uma ação), aos quais \nela obedece da melhor forma possível. Você pode \nespecificar um curso de ação simples e genérico, como \n“Ataque aquela criatura”, “Corra até ali”, ou “Traga \naquele objeto”. Se a criatura completar a ordem e não \nreceber direções posteriores de você, ela se defenderá e se \nauto preservará da melhor forma que puder. \nVocê pode usar sua ação para tomar controle total e \npreciso do alvo. Até o final do seu próximo turno, a \ncriatura realiza apenas as ações que você escolher e não \nfaz nada que você não permita que ela faça. Durante esse \nperíodo, você também pode fazer com que a criatura use \numa reação, mas isso requer que você usa sua própria \nreação também. \nCada vez que o alvo sofrer dano, ele realiza um novo \nteste de resistência de Sabedoria contra a magia. Se \nobtiver sucesso no teste de resistência, a magia termina. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 9° nível, a duração \nserá concentração, até 8 horas. \n242","pr":"239 (PDF: 237)","cl":["Bardo","Bruxo","Feiticeiro","Mago"]},{"n":"DOMINAR PESSOA","nv":"5° nível","e":"encantamento","tc":"1 ação","al":"18 metros","co":"V, S","du":"Concentração, até 1 minuto","d":"Você tenta seduzir um humanoide que você possa ver \ndentro do alcance. Ele deve ser bem sucedido num teste \nde resistência de Sabedoria ou ficará enfeitiçado por você \npela duração. Se você ou criaturas amigáveis a você \nestiverem lutando com ele, ele terá vantagem no teste de \nresistência. \nEnquanto o alvo estiver enfeitiçado, você terá uma \nligação telepática com ela, contanto que ambos estejam no \nmesmo plano de existência. Você pode usar essa ligação \ntelepática para emitir comandos para a criatura enquanto \nvocê estiver consciente (não requer uma ação), aos quais \nela obedece da melhor forma possível. Você pode \nespecificar um curso de ação simples e genérico, como \n“Ataque aquela criatura”, “Corra até ali”, ou “Traga \naquele objeto”. Se a criatura completar a ordem e não \nreceber direções posteriores de você, ela se defenderá e se \nauto preservará da melhor forma que puder. \nVocê pode usar sua ação para tomar controle total e \npreciso do alvo. Até o final do seu próximo turno, a \ncriatura realiza apenas as ações que você escolher e não \nfaz nada que você não permita que ela faça. Durante esse \nperíodo, você também pode fazer com que a criatura use \numa reação, mas isso requer que você usa sua própria \nreação também. \nCada vez que o alvo sofrer dano, ele realiza um novo \nteste de resistência de Sabedoria contra a magia. Se \nobtiver sucesso no teste de resistência, a magia termina. \nEm Níveis Superiores. Quando você conjurar essa \nmagia usando um espaço de magia de 6° nível, a duração \nserá concentração, até 10 minutos. Quando você usar um \nespaço de magia de 7° nível, a duração será concentração, \naté 1 hora. Quando você usar um espaço de magia de 8° \nnível, a duração será concentração, até 8 horas.","pr":"240 (PDF: 238)","cl":["Bardo","Feiticeiro","Mago"]},{"n":"DRUIDISMO","nv":"Truque","e":"transmutação","tc":"1 ação","al":"9 metros","co":"V, S","du":"Instantânea","d":"Sussurrando para os espíritos da natureza, você cria um \ndos seguintes efeitos, dentro do alcance: \n\nVocê cria um efeito sensorial minúsculo e inofensivo\nque prevê como será o clima na sua localização pelas\npróximas 24 horas. O efeito deve se manifestar como\num globo dourado para céu claro, uma nuvem para\nchuva, flocos de neve para nevasca e assim por diante.\nEsse efeito persiste por 1 rodada.\n\nVocê faz uma flor florescer, uma semente brotar ou um\nfolha amadurecer, instantaneamente.\n\nVocê cria um efeito sensorial inofensivo instantâneo,\ncomo folhas caindo, um sopro de vento, o som de um\npequeno animal ou o suave odor de um repolho. O\nefeito deve caber num cubo de 1,5 metro.\n\nVocê, instantaneamente, acende ou apaga uma vela,\ntocha ou fogueira pequena.","pr":"240 (PDF: 238)","cl":["Druida"]},{"n":"DUELO COMPELIDO","nv":"1° nível","e":"encantamento","tc":"1 ação bônus","al":"9 metros","co":"V","du":"Concentração, até 1 minuto","d":"Você tenta compelir uma criatura a duelar com você. Uma \ncriatura que você possa ver, dentro do alcance, deve \nrealizar um teste de resistência de Sabedoria. Se falhar, a \ncriatura é atraída por você, compelida pela sua exigência \ndivina. Pela duração, ela tem desvantagem nas jogadas \nde ataque contra criaturas diferentes de você e deve \nrealizar um teste de resistência de Sabedoria cada vez \nque tentar se mover para um espaço que esteja a mais de \n9 metros de você; se ela passar no teste de resistência, \nessa magia não restringirá o movimento do alvo nesse \nturno. \nA magia termina se você atacar qualquer outra \ncriatura, se você conjurar uma magia que afete uma \ncriatura hostil diferente do alvo, se uma criatura \namigável a você causar dano ou conjurar uma magia \nnociva nele ou se você terminar seu turno a mais de 9 \nmetros do alvo.","pr":"240 (PDF: 238)","cl":["Paladino"]},{"n":"ENCARNAÇÃO FANTASMAGÓRICA","nv":"9° nível","e":"ilusão","tc":"1 ação","al":"36 metros","co":"V, S","du":"Concentração, até 1 minuto","d":"Baseado nos mais profundos medos de um grupo de \ncriaturas, você cria criaturas ilusórias nas mentes delas, \nvisíveis apenas por elas. Cada criatura numa esfera com 9 \nmetros de raio centrada num ponto, à sua escolha, dentro \ndo alcance, deve realizar um teste de resistência de \nSabedoria. Se falhar na resistência, uma criatura ficará \namedrontada pela duração. A ilusão invoca os medos mais \nprofundos da criatura, manifestando seus piores \npesadelos como uma ameaça implacável. No final de cada \nturno da criatura amedrontada, ela deve ser bem \nsucedida num teste de resistência de Sabedoria ou sofrerá \n4d10 de dano psíquico. Se obtiver sucesso na resistência, \na magia termina para essa criatura.","pr":"240 (PDF: 238)","cl":["Mago"]},{"n":"ENCONTRAR ARMADILHAS","nv":"2° nível","e":"adivinhação","tc":"1 ação","al":"36 metros","co":"V, S","du":"Instantânea","d":"Você sente a presença de qualquer armadilha dentro do \nalcance a qual você tenha linha de visão. Uma armadilha, \npara os propósitos dessa magia, inclui qualquer coisa que \npossa causar um efeito repentino ou inesperado em você, \nconsiderado nocivo ou indesejável, que foi especificamente \nplanejado para ser por seu criador. Portanto, a magia \nsentirá a área afetada pela magia alarme, um glifo de \nvigilância ou uma armadilha mecânica de fosso, mas ela \nnão revelará uma fragilidade natural no piso, um teto \ninstável ou um sumidouro escondido. \nEssa magia apenas revela que existe uma magia \npresente. Você não descobre a localização de cada \narmadilha, mas você também descobre a natureza \ngenérica do perigo representando pela armadilha que \nvocê sentiu.","pr":"240 (PDF: 238)","cl":["Clérigo","Druida","Patrulheiro"]},{"n":"ENCONTRAR O CAMINHO","nv":"6° nível","e":"adivinhação","tc":"1 minuto","al":"Pessoal","co":"V, S, M (um conjunto de ferramentas de","du":"Concentração, at
